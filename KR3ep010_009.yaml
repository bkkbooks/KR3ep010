body:
  text: 卷九調經張二九經先期色變膚腠刺痛無定所晨泄不爽利從來不生育由情懷少歡悅多愁悶鬱則周行之氣血不通而脈絡間亦致間斷蒙痹例以通劑愁鬱氣血滯川芎當歸肉桂生艾小茴茯苓生香附南山楂益母膏丸姚二二久嗽背寒晨汗右臥咳甚經事日遲脈如數而虛谷減不欲食此情志郁傷延成損怯非清寒肺藥所宜後期郁傷久嗽肺氣虛黃耆桂枝白芍炙草南棗飴糖肺為氣出入之道內有所傷五臟之邪上逆於肺則咳嗽此則久嗽背寒晨汗全是肺氣受傷而經事日遲不但氣血不流行血枯肝閉可想而知脈數虛火也虛則不可以清寒況谷減不欲食中氣之餒已甚可復以苦寒損胃乎與黃耆建中損其肺者益其氣而桂枝白芍非斂陰和血之妙品乎秦二一氣衝心痛嘔涎氣墜少腹為瀉經來後期其色或淡或紫病在衝脈從厥陰陽明兩治肝犯胃川連小茴川楝子歸尾炒半夏茯苓桂枝橘紅華二三郁傷肝脾是因懷抱不暢致氣血不和逍遙散減白朮加山楂香附不欲其守中務在宣通氣血耳今經來日遲郁痹宜通而氣弱不主統血況春深泄氣之候必佐益氣之屬方為合法郁傷肝脾歸脾湯又向有郁傷肝脾用逍遙散歸脾湯甚合今因動怒少腹氣衝過胃上膈咽喉腫痹四肢逆冷遂令昏迷此皆肝木拂逆甚則為厥夫肝臟相火內寄病來迅速皆動極之徵為肝用太過宜制其用前此耆朮守補不可用矣安胃理中丸去黃柏細辛錢脈澀脘悶減食經水來遲腹痛墜柴胡炒白芍黃芩鬱金香附茯苓蘇梗神麯又諸恙未減腹但痛不墜逍遙散去白朮甘草加鬱金香附神麯許十八經閉寒熱便溏腹痛加味逍遙散去山梔某血虛內熱經不至加味逍遙散去朮某經遲腹痛風疹絡血不寧久郁成熱法當通利血絡鬱熱腹痛涼膈去芒硝加丹皮赤芍孫二九奇脈下損經遲腹痛先用當歸建中湯續商八脈治法奇脈虛寒滯歸建中湯又久嗽遇勞寒熱歸耆建中去姜謝三十能食不運瘕泄經事愆期少腹中乾涸而痛下焦麻痹衝心嘔逆腹鳴心辣八脈奇經交病人參茯苓艾葉制香附淡蓯蓉淡骨脂肉桂當歸鹿角霜小茴香紫石英益母膏丸王三一脈右緩左澀經水色淡後期嘔吐痰水食物畢姻三載余不孕此久郁凝痰滯氣務宜宣通從陽明厥陰立方半夏廣皮茯苓厚朴茅朮淡吳萸小香附山楂肉薑汁法丸又三月中用辛溫宣郁方痰瘀自下胸次寬嘔逆緩今喜暖食惡寒經遲至五十餘日來必色淡且少議用溫養衝任栽培生氣方法八珍去朮草地加小茴肉桂蘄艾香附紫石英河車膠丸朱二六經水一月兩至或幾月不來五年來並不孕育下焦肢體常冷是衝任脈損無有貯蓄暖益腎肝主之肝腎虛寒人參河車膠熟地砂仁制歸身白芍川芎香附茯神肉桂艾炭小茴紫石英益母膏丸程三七十三年不孕育其中幻病非一病人述經期遲至來期預先三日周身筋骨脈絡牽掣酸楚不得舒展凡女人月水諸絡之血必彙集血海而下血海者即衝脈也男子藏精女子系胞不孕經不調衝脈病也腹為陰陰虛生熱肢背為陽陽虛生寒究竟全是産後不復之虛損惑見病治病之誤有終身不育淹淹之纍肝血陰虛木火內寄古人溫養下焦必佐涼肝堅陰勿執經後期為氣滯亂投破氣剛藥劫陰衝脈肝陰虛河車膠生地枸杞沙苑生杜仲白薇山楂黃柏白花益母草朱經云陽維為病苦寒熱緣上年冰雪甚少冬失其藏春半潮濕地氣升泄以肝腎血液久虧之質春生力淺八脈隸乎肝腎一身綱維八脈乏束固之司陰弱內熱陽微外寒矣膂脊常痛經事愆期血海漸涸久延虛怯情景已露局方逍遙散固女科聖藥大意重在肝脾二經因郁致損木土交傷氣血痹阻和氣血之中佐柴胡微升以引少陽生氣上中二焦之鬱勃可使條暢今則入暮病劇天曉安然顯是肝腎至陰損傷八脈不為約束故熱無汗至陰深遠古人謂陰病不得有汗也當宗仲景甘藥之例勿取氣辛助陽可矣肝腎奇脈陰虛炙甘草阿膠細生地生白芍麥冬牡蠣某陰虧內熱經事愆期陰虛雄烏骨雞小生地阿膠白芍枸杞天冬茯苓茺蔚子女貞子桂圓上十味用青蒿汁童便醇酒熬膏加蜜丸張四三寒熱間日經來腹痛痛經郁傷氣血滯小生地丹皮知母花粉生鱉甲澤蘭某二十先腹痛而後經至氣滯為多晨泄腹鳴亦脾胃之病與下焦瘕泄則異川芎當歸香附煨廣木香楂肉茯苓某二六寒熱無汗經先腹痛喉中燥癢咳逆食物不思此郁傷氣血八脈主病姑先與澤蘭湯歸身澤蘭丹參白芍柏子仁茯神周十七室女經水不調先後非一來期必先腹痛較之平日為重飲食大減始於初夏入秋下焦常冷腹鳴忽瀉忽結究脈察色是居室易於鬱怒肝氣偏橫胃先受戕而奇經衝任蹺維諸脈皆肝胃屬隸脈不循序流行氣血日加阻痹失治必結瘕聚痃痞之纍南山楂生香附延胡當歸青皮三稜蓬朮牛膝川楝子澤蘭肉桂炒小茴蔥白汁丸顧經來筋掣腹痛常有心痛乾嘔此肝氣厥逆衝任皆病務在宣通氣血以調經溫燥忌用自可得效川楝一錢丹皮三錢炒楂二錢胡連八分延胡一錢澤蘭二錢歸鬚二錢生白芍一錢半又柏子仁丸吳郁傷絡脈痛經川芎當歸香附小茴烏藥茯苓紅棗費經水紫黑來時嘈雜脈絡收引而痛經過帶下不斷形瘦日減脈來右大左弱上部火升下焦冷徹骨中陰陽乖違焉得孕育閲醫都以補血澀劑宜乎鮮效議通陽攝陰法鮑魚生地淡蓯蓉天冬當歸柏子仁炒山楂牛膝茯苓紅棗蘄艾湯法丸朱脈數右肩痛痿經不調經來氣攻觸皆性躁氣分有熱氣分熱細子芩白芍黑山梔鉤藤茯苓當歸鬚香附茺蔚子桑枝李酸澀入里氣血呆鈍痛自心胸脹及少腹昔經行三日今四日猶未已為凝澀所致痛脹何疑讀內經遺意以辛勝酸主治但辛氣最易入表當求其宣絡者宜之食酸氣血滯韭白汁桃仁延胡小茴當歸鬚川楝子王三八苦辛泄降胸脘脹悶已舒此嗽血皆肝膽氣火上逆必經來可安經閉木火鬱熱南山楂桃仁黑山梔丹皮橘葉降香末老韭白汁朱當節令呵缺煩倦秋深進食微有噁心病起至今月事不來夫衝任血海皆屬陽明主司見症胃弱此陰柔膩滯當停以理胃陽為務胃陽虛人參半夏曲廣皮白茯苓生益智仁煨姜某脈數形疲咳經閉半年已經食減便溏浮腫無清嗽通經之理扶持中土望其加谷脾胃陽虛四君子湯某三六經閉兩月脘痹嘔惡此氣窒不宣胃陽礙鈍使然當用和中為主胃陽不運半夏曲老蘇梗茯苓廣皮枳殼川斛某夏令寒熱經阻少腹痛脹血結洞瀉不爽乃內傷氣血不和兼有時令濕邪濕滯腹痛瀉茯苓皮三錢大腹皮一錢半生益智一錢厚朴一錢蓬莪朮五分青皮子五分炒研又服五劑後氣已略平蔥白丸用生蘄艾三分紅棗十五枚煎清湯送某脈數經閉腹脹足腫氣滯濕凝腫脹茯苓皮大腹皮青皮小香附延胡炒山楂茺蔚子炒砂仁顧經停四月腹滿尻髀足肢盡腫食納脹悶不化大便溏瀉不實女科認為胎氣恐未必然方書謂先經斷而後腫脹者治在血分生白朮厚朴大腹皮茺蔚子椒目小黑穭豆皮傅大凡痞滿在氣燥實在血腹脹經水仍來大便微溏固是氣分病也下之暫愈氣得泄也繼而腹脹經水不來氣與血俱病也病非輕渺議中滿分消方法生於術豬苓澤瀉椒目雞內金青皮汁厚朴鄒十八腰以下腫經閉四月腹痛瀉不爽議開太陽導其氣阻水濕牡蠣澤瀉豬苓茯苓生白朮防己厚朴椒目何經阻腹滿瀉後變痢小溫中丸王三一居經三月痞悶膨脹無妊脈發現詢知勞碌致病必屬脾胃陽傷中氣愈餒衝脈乏血貯注洵有諸矣氣血虛滯兼濕大腹皮絨半夏曲老蘇梗橘紅炒山楂茺蔚子又經停腹滿便祕郁李仁冬葵子柏子仁當歸鬚鮮杜牛膝王十九服阿魏丸高突已平痛未全止經閉已有十餘月腹微膨全屬氣血凝滯若不經通病何以去氣滯血澀川芎當歸延胡桃仁楂肉香附青皮牛膝益母膏丸石二二入肝必麻木諸厥皆厥陰心痛便燥氣痹血枯乃勞怒情志不遂起見桃仁當歸鬚炒延胡生香附茺蔚子南山楂又辛潤氣藥病減血虛氣滯當以調經為要見病理病為非桃仁當歸山楂茺蔚子澤蘭柏子仁某二二心下有形不飢經水澀少漸閉由氣滯漸至血結左右隧道不行大便堅祕不爽當與通絡炒桃仁炒五靈脂延胡蘇梗生香附木香汁半夏薑汁姚經閉一年腹漸大恐延血蠱沉疴況聚瘕日久形寒跗腫議用大針砂丸每服一錢二分六服血蠱金面無華色脈右弦左澀經阻三月沖氣攻左脅而痛腹時脹兩足跗腫是血蠱症勿得小視桂枝茯苓澤瀉牡蠣金鈴子延胡吳三九經阻兩載少腹堅硬大便不爽不時咯出紫血塊此屬血蠱之象鮮生地汁五錢熟大黃一錢半潯桂心五分老生薑渣炒桃仁三錢郁李仁一錢半四服某經閉腹脹漸成蠱香附木香青皮烏藥赤芍五靈脂廷胡當歸鬱金王二十脈右虛左虛弦數腹痛兩月胸痹咽阻冷汗周身刺痛寒栗此屬內損有經閉成勞之事郁損營陰桂枝湯加茯苓又照前方加當歸肉桂又內損情懷少暢非偏寒偏熱可以攻病方中溫養氣血以使條達非因寒投熱之謂開懷安養為宜勿徒恃藥繼此可進養營法歸桂枝去姜加茯苓潘二七經水不來少腹刺痛鳴脹大便不爽心中熱痛食辛辣及酒其病更甚不敢通經姑與甘緩臟燥甘麥大棗湯某陽升風動眩暈心悸鼻衄經停兩月陰虛風陽動生地阿膠麥冬白芍柏子仁棗仁茯神炙草顧二八病起經阻形容日瘦嘈雜刻飢心腹常熱此乃悲惋離愁內損而成勞陰臟受傷陽脈不流難治之症必得怡悅情懷經來可挽但通經敗血斷不可用郁勞陰虛生地人參茯苓沉香汁琥珀末調入陳自經阻寒熱延及浮腫腹膨小溲日少入暮心腹中熱此臟陰已涸腑陽日痹內因悒鬱成勞情志為病當收肅司令而病日加增料難入冬無成法可遵勉擬回生丹每次服半丸冀通其壅痹氣血漫言治病也徐二三經水久不來寒熱喉痛痹郁勞藥難取效清阿膠丸雞子黃湯送董脈數色奪久嗽經閉寒從背起熱過無汗此非瘧邪由乎陰陽並損營衛循行失其常度經云陽維為病苦寒熱矣症屬血痹成勞為難治痹阻氣分務宜宣通血痹成勞生鹿角川桂枝木當歸茯苓炙草姜棗另回生丹二服仲二三先因經阻繼以五心煩熱咳吐涎沫食減微嘔面腫色瘁乃肝陽化風旋動不息乾血勞病醫治無益陰虛肝風動乾血勞阿膠生地麥冬牡蠣小麥王面色㿠白脈來細促久嗽不已減食腹痛便溏經閉半載此三焦臟真皆損乾血勞怯之疴極難調治俗醫兒嗽見熱多投清肺寒涼生氣斷盡何以挽回營虛乾血勞歸建中湯去姜尼十七少年形色衰奪側眠咳血天柱骨垂經水已閉皆不治見症歸耆建中湯去姜某脈弱無力發熱汗出久咳形冷減食過半顯然內損成勞大忌寒涼清熱治嗽姑與建中法冀得加谷經行猶可調攝桂枝五分生白芍一錢半炙草五分棗肉三錢飴糖二錢歸身一錢半程十九乾血勞病百脈枯槁漸至危篤三月間診脈一次當面告辭余非憒憒醫流不肯因循誤事益母丸早晚服二三錢某營虛寒熱咳血經閉當歸炒白芍丹參棗仁遠志茯苓炙草廣皮桂圓肉顧三一潮熱經阻脈來弦數營血被寒熱交蒸斷其流行之機即為乾血勞瘵非小恙也桂枝三分白芍一錢半阿膠一錢半生地三錢炙草四分麥冬一錢半大麻仁一錢朱女沖年天癸未至春陽升動寒熱衄血平昔溺後腰痛耳目甚聰明先天質薄陰本難充易虧最多倒經之慮倒經雄烏骨雞生地生白芍茯神天冬知母牛膝茺蔚子女貞子阿膠諸藥除阿膠用水煎汁二次其烏雞去毛及翅足另以童便一碗青蒿汁四碗醇酒二碗米醋一碗同煮再加入前藥汁收膏入阿膠收燉暖服五錢張十七歲天癸不至咳嗽失血乃倒經重症先以順氣導血降香末鬱金鉤藤丹皮蘇子炒山楂黑山梔又震動氣衝咳嗆失血雞子黃阿膠鮮生地天冬生白芍炒半膝又脈細數腹痛營熱經不通人參天冬鮮生地白芍丹參調入琥珀末三分易曰乾道成男坤道成女女子屬陰以血為主故女科治法首重調經經常也如潮汐之有信如月之盈虧不愆其期故曰經水又曰月事又曰月信內經云太衝脈盛月事以時下景嶽云沖為五臟六腑之海臟腑之血皆歸衝脈可見衝脈為月經之本也然血氣之化由於水穀水穀盛則血氣亦盛水穀衰則血氣亦衰是水穀之海又在陽明可見衝脈之血又總由陽明水穀所化而陽明胃氣又為衝脈之本也故月經之本所重在衝脈所重在胃氣所重在心脾生化之源耳心主血脾統血肝藏血凡傷心傷脾傷肝者均能為經脈之病內經曰二陽之病發心脾有不得隱曲女子不月其傳為風消其傳為息賁者死不治不得隱曲言情欲不遂而病發心脾也風消者發熱消瘦胃主肌肉也息賁者喘息上奔胃氣上逆也此雖言病發心脾而實重在胃氣因心為胃之母胃為脾之腑也內經又曰有病胸脅支滿者妨於食病至則先聞腥臊臭出清液先唾血四肢清目眩時時前後血病名血枯此得之年少時有所大脫血若醉入房中氣竭肝傷故月事衰少不來也治之以四烏鰂骨一藘茹二物併合之丸以雀卵大如小豆以五丸為後飯飲以鮑魚汁利腸中及傷肝也此段經文全重在氣竭肝傷四字為通節之綱旨胸脅肝部也支滿肝病也妨於食木邪凌土也病則先聞腥臊臭脾喜芳香今脾土為木邪凌虐病則先聞腥臊乃肝之旺氣也出清液脾虛不能敷化水精也先唾血脾傷不能統運營血也四肢清陽衰不能傍達四末也目眩陽不充而水上溢於經也前後血陰受傷而血內溢於絡也血枯內有乾血血不歸經而結胞門也良由年少不禁氣竭肝傷而致月事衰少或不來也治以烏鰂骨四分取其味鹹走腎性溫達肝配以藘茹一分取其辛散內風溫去惡血二物併合功專破宿生新丸以雀卵取其溫補助陽能調子臟精血以五丸為後飯者先藥後飯使藥徐行下焦力貴專功五丸不為少也飲以鮑魚汁利腸垢和肝傷取其臭穢之味佐烏鰂骨而闢宿積之血也金匱要略言調經之法甚詳後世如王節齊薛立齊諸賢論症透徹用方精切俱可為程式茲不具贅今觀葉先生案奇經八脈固屬扼要其次最重調肝因女子以肝為先天陰性凝結易於拂鬱鬱則氣滯血亦滯木病必妨土故次重脾胃余則血虛者養之血熱者涼之血瘀者通之氣滯者疏之氣弱者補之其不治之症直言以告之誠一代之良工女科之明鑑學者當奉為典型更能參考內經仲景及諸賢案論自然學業日進登峰造極矣秦天一徐評婦人之疾除經帶之外與男子同治而經帶之疾全屬衝任治衝任之法全在養血故古人立方無不以血藥為主者案中大段亦養血為先而未能說著變化蓋未得女科專門傳授也淋帶某溫邪劫陰帶下火升胸痞脈小數溫邪傷陰生地阿膠牡蠣川斛小麥茯苓某陽明脈虛手麻足冷身動帶下如注用通攝方胃虛人參桂枝木桑螵蛸生杜仲歸身茯苓又胸中似冷熱飲乃爽照前方去杜仲加白芍炮姜陳二七色蒼脈數是陰不足心中泛泛即頭暈腹痛經水仍來兼有帶下肝陽內擾風木乘土法當酸以和陽鹹苦堅陰風陽乘土生白芍細生地清阿膠牡蠣樗根皮黃柏又烏骨雞生地阿膠牡蠣天冬白芍白薇杜仲川斷湖蓮蔣帶下不止少腹內踝連痛至不能伸縮絡脈不宣最有結癰綿纏不可不慮醫云肝氣豈有是理血虛脈絡滯痛桂枝生沙苑遠志當歸鹿角霜杞子茯苓龔帶淋日久脂液垂涸奇脈俱傷營衛亦偏內風自動則中焦氣奪浮腫腹膨為寒為熱矣暫以咸緩和陰液涸風動阿膠牡蠣蓯蓉柏子霜郁李仁袁舌光赤頭脹身熱帶下如注此五液走泄陽浮熱蒸當用攝劑若與鹿角霜沙苑仍是升舉動陽則無效矣陰虛陽浮熟地炭阿膠芡實茯苓湖蓮肉炒山藥又照前方去阿膠山藥加桑螵蛸萸肉炭吳崩帶淋漓陰從下走暈厥汗出陽從上冒逢穀雨暴凶身中陰陽不相接續怕延虛脫戌亥時為劇肝腎病治人參阿膠生龍骨生牡蠣五味茯神又血液去則臟陰失守神不內附致目中妄見非鬼祟也當先鎮陽神為主若驟用陰藥則有妨胃納矣人參龍骨五味茯苓芡實建蓮肉又淋帶黃白未淨五更心悸汗出人參炒枸杞五味茯苓芡實湖蓮肉某二五脈左細前用通補據述痛起得按痛緩八脈空虛昭然舍此補養恐反增劇矣奇脈虛當歸烏賊骨紫石英杜仲杞子柏子仁沙苑茯神某女科病多倍於男子而胎産調經為主要淋帶瘕泄奇脈虛空腰背脊膂牽掣似墜而熱氣反升於上從左而起女人以肝為先天也醫人不曉八脈之理但指其虛剛如桂附柔如地味皆非奇經治法先以震靈丹固之每服一錢五分又淋帶瘕泄諸液耗必陰傷此參附薑桂劫陰不效而膠地陰柔亦不能效蓋脈隧氣散不攝陰藥沉降徒擾其滑耳必引之收之固之震靈丹意通則達下澀則固下惟其不受偏寒偏熱是法效靈矣後方常用人參一錢鹿角霜一錢半沙苑一錢半桑螵蛸三錢炒杞子一錢半茯神三錢炙草五分人參二兩隔紙烘研麋茸二兩切烘研生菟絲子二兩研淡補骨脂一兩半炒生紫石英一兩二錢生餘糧石一兩二錢茯苓一兩半炒黑小茴五錢炒黑遠志五錢晚服妙香三錢姚二三自乳血耗脈絡空豁脊膂椎髀酸耎帶下不已問下部已冷陰虛及陽速速斷乳不致延勞人參鹿角霜枸杞桑螵蛸殼杜仲茯苓沙苑白薇徐四十經漏成帶下焦畏冷眩暈肝臟陽升八脈空乏當歸炒白芍炒黑枸杞杜仲海螵蛸炒沙苑楊三七寡居獨陰自多愁煩思郁加以針黹目注凝神陽上巔為眩暈八脈無氣自帶下下冷內風日動痱疹麻木常為隱現以暖下柔劑和其陰陽可得小效制首烏三角胡麻枸杞甘菊花炭用紅棗搗丸早上服四錢王二七産後漏淋成帶入暮溺頻不爽驚恐神呆骨骱盡痛是肝腎內損漸及奇經不司束固是産後虛在下甘辛潤補肝腎不與燥藥以腎惡燥肝忌剛也枸杞子炒黑鹿角霜歸身菟絲子炒香生杜仲沙苑子茯苓補骨脂鹽水煎淡某少腹拘急大便燥艱淋帶赤白此屬液涸陰陽並虛肉蓯蓉枸杞子河車當歸柏子仁郁李仁又淋帶年久少腹拘急脹痛溲不爽大便艱澀得泄氣則脹寬食物少納脘中不降必撫摩始下此病久臟陰腑陽皆傷熱藥難受以通陽固陰兼之早服人參歸身炒杞子茯苓麋茸河車暮服震靈丹二十粒帶下者由濕痰流注於帶脈而下濁液故曰帶下婦女多有之赤者屬熱兼虛兼火治之白者屬濕兼虛兼痰治之年久不止補脾腎兼升提大抵瘦人多火肥人多痰最要分辨白帶白濁白淫三種三者相似而迥然各別白帶者時常流出清冷稠黏此下元虛損也白濁者濁隨小便而來渾濁如泔此胃中濁氣滲入膀胱也白淫者常在小便之後而來亦不多此男精不攝滑而自出也至於淋症由腎虛膀胱積熱所致腎虛則小便數膀胱熱則小便澀淋有氣血砂膏勞五者之殊皆屬濕熱氣淋為病小便澀滯常有餘瀝不盡血淋為病遇熱即發甚則溺血痛者為血淋不痛者為尿血砂淋為病陰莖中有砂石而痛溺不得卒出砂出痛止是也膏淋為病溺濁如膏敗精結者為砂精結散者為膏又煮海為鹽之義勞淋遇勞即發痛引氣衝大約帶病惟女子有之淋濁男女俱有景嶽云婦人淋帶其因有六一心旌搖心火不靜而帶下者先當清火宜硃砂安神丸清心蓮子飲之類若無邪火但心虛帶下宜祕元煎人參丸茯菟丸之類一欲事過度滑泄不固而帶下者宜祕元煎苓朮菟絲丸濟生固精丸之類一人事不暢精道逆而為濁為帶者初宜威喜丸久宜固陰煎之類一濕熱下流而為濁帶脈必滑數煩渴多熱宜保陰煎加味逍遙散若熱甚兼淋而赤者宜龍膽瀉肝湯一元氣虛而帶下者宜壽脾煎七福飲十全大補湯若陽氣虛寒脈微澀腹痛多寒宜加姜附家韭子丸一脾腎氣虛下陷多帶者宜歸脾湯補中益氣湯之類以上淋帶辨症論治倣佛已備語云鴛鴦繡出從君看莫把金針度與人若求金針暗度全憑葉案搜尋秦天一崩漏徐三三肝脾郁損血崩郁損肝脾人參逍遙散去柴術炙草加桑螵蛸杜仲某經漏不止久風飧泄肝風胃虛人參茯苓木瓜炒烏梅赤石脂餘糧石龔脈數寒熱汗出腹脅痛病起經漏崩淋之後是陰傷陽乘消渴喜涼飲不可純以外邪論和營衛調中甘緩主治營陰傷臟燥熱當歸白芍淮小麥炙草南棗茯神文五五産育頻多衝任脈虛天癸當止之年有紫黑血如豚肝暴下之後黃水綿綿不斷三年來所服歸脾益氣但調脾胃補虛未嘗齒及奇經為病論女科衝脈即是血海今紫黑成塊幾月一下必積貯之血久而瘀濁有不得不下之理此屬奇經絡病與臟腑無異考古云久崩久帶宜清宜通仿此為法奇脈虛血滯柏子仁細生地青蒿根淡黃芩澤蘭樗根皮接服斑龍丸張五十五旬天癸當止而經淋周身牽掣右肢漸不能舉不但衝任督帶損傷陽明胃脈衰微少氣乃最難向安之病衝任胃皆虛人參生黃耆炙草炒沙苑炒杞子炒歸身朱崩漏兩年先有帶下始而半月發病今夏季每交申酉其漏必至思下午為陽中之陰陰虛陽動衝脈任脈皆動下無提防約束夫奇經肝腎主司為多而衝脈隸於陽明陽明久虛脈不固攝有開無闔矣醫但以澀劑圖旦夕苟安未及按經論病宜毫無一效海螵蛸鮑魚茜草生菟絲子石殼廣蓮肉接服烏賊魚骨丸顧髓虛崩淋不止筋掣痛不能行髓虛筋痛蓯蓉枸杞柏子仁茯神川斛紫石英羊內腎青鹽成衝任二脈損傷經漏經年不痊形瘦膚干畏冷由陰氣走乎陽位益氣以培生陽溫攝以固下真衝任陽虛人參鹿角霜歸身蘄艾炭茯神炮姜紫石英桂心張四三經漏十二年五液皆涸衝任不用冬令稍安夏季病加心搖動腹中熱腰膝跗骨皆熱此皆枯槁日著方書謂暴崩宜溫久崩宜清以血去陰耗耳衝任陰虛人參生地阿膠天冬人乳粉柏子仁茯神棗仁白芍知母蜜丸張固補衝任涼肝寧血方丸人參二兩生地二兩阿膠二兩白芍二兩茯苓二兩鮮河車膠一兩石殼建蓮肉四兩二膠如少可加蒸熟山藥搗漿為丸早服四錢參湯送晚服二錢沈天癸當止之年經來淋漓不斷乃陰衰陽動入秋深夜寐甚少汗泄四肢胸臆夫衝脈隸於陽明其氣行乎身前陽明脈空陽越衛疏陰火升舉當宗丹溪補陰丸或虎潛丸之屬久病投湯太過恐妨胃耳每早服丹溪補陰丸四錢十服黃長齊有年脾胃久虛瘧由四末必犯中宮血海隸於陽明苦味辛散皆傷胃系雖天癸久絶病邪藥味擾動血絡是為暴崩欲脫閲醫童便阿膠味鹹潤滑大便溏瀉豈宜潤下即熟地五味補斂陰液咽湯停脘頃欲吐淨滋膩酸濁之藥下焦未得其益脘中先已受戕議以仲景理中湯血脫有益氣之法坤土陽和旋轉喜其中流砥柱倘得知味納穀是為轉機重症之尤勿得忽視苦寒辛散傷中陽理中湯某停經三月下漏成塊少腹膨痛議通和奇脈奇脈不和鹿角霜生杜仲桂枝木生沙苑當歸茯苓紅棗羅二四病屬下焦肝腎內損延及衝任奇脈遂至經漏淋漓腰脊痿弱脈絡交空有終身不得孕育之事肝腎衝任虛寒制熟地砂仁制河車膠當歸白芍人參茯苓於朮炙草蘄艾炭香附小茴紫石英陳五十五旬年歲經漏如崩繼以白帶綿綿昔形充今瘦損當年飲酒濕勝大便久溏自病經年便乾不爽夜熱多汗四肢皆冷氣短腹鳴上噫氣下泄氣腰足跗酸耎無力食物日減不知其味此陽明脈衰厥陰風木由乎血去液傷衝任交損內風旋轉而為風消之象病在乎絡故令久延金匱謂絡熱則痿矣液傷絡熱風消人參黃耆苦參茯神牡蠣小麥濾清人參湯收張外冷內熱食過如飢唇燥裂渴飲下漏漏多則陰虛陽亢便溏不實不可寒潤陰虛陽亢生地炭阿膠炒白芍湖蓮樗根皮茯神蘄艾炭又消渴心悸阿膠生雞子黃生地天冬生白芍茯神胡心痛如飢口吐膩涎濁沫值經來甚多因驚動肝陽化內風欲厥之象治以鹹苦佐以微辛使入陰和陽阿膠二錢牡蠣三錢川楝子一錢小川連三分川芎二分當歸一錢又和陽固陰諸病大減因經漏陰傷陽易浮越心怔悸肢末痛內風未熄藥以甘柔使胃汁日充則砥柱中流矣人參阿膠麥冬生白芍炙草茯神邱四四經漏成帶年餘醫療無功乃衝任督帶交病古稱久帶久崩宜清視其體豐松耎陽氣久虧與內經血脫方法烏鰂魚丸鮑魚汁丸又照前方加阿膠人中白某經漏三年診色脈俱奪面浮跗腫肌乏華色納穀日減便堅不爽自脊膂腰髀酸楚如墮入夏以來形神日羸思經水必諸路之血貯於血海而下其不致崩決淋漓者任脈為之擔任帶脈為之約束剛維蹺脈之擁護督脈以總督其統攝今者但以衝脈之動而血下諸脈皆失其司症固是虛日餌補陽不應未達奇經之理耳考內經於胸脅支滿妨食時時前後血特製烏鰂丸鹹味就下通以濟澀更以穢濁氣味為之導引同氣相需後賢謂暴崩暴漏宜溫宜補久漏久崩宜清宜通正與聖經相符況乎耆朮皆守不能入奇脈無病用之誠是好藥藉以調病焉克有濟夏之月大氣正在泄越脾胃主令歲氣天和保之最要議以早進通陰以理奇經午余天熱氣泄必加煩倦隨用清暑益氣之劑順天之氣以扶生生安穩百日秋半收肅令行可望其藏聚氣交而奇絡漸固此久損難復非幸試速功矣奇脈陰虛風陽動早上湯藥議以通陰潛陽方法早服龜甲心秋石水浸鹿角霜真阿膠柏子霜生牡蠣鎖陽另煎清人參湯入清藥煎取五十沸鹿性陽入督脈龜體陰走任脈阿膠得濟水沉伏味鹹色黑熄肝風養腎水柏子芳香滑潤養血理燥牡蠣去濕消腫咸固下仲景云病人腰以下腫者牡蠣澤瀉湯鎖陽固下焦之陽氣乃治八脈之大意烏鰂丸方烏鰂骨四分米醋炙去甲另研水飛藘藘茹一分上為細末用雀卵量搗為丸每服三錢用藥前先飲淡鮑魚湯一小杯為導引又進潛陽頗投但左耳鳴甚腸中亦鳴肝陽內風升動未息減氣剛用柔早服龜甲心照前制真阿膠柏子霜天冬女真實旱蓮草另煎人參湯二錢加入濾清藥內再煎五十餘沸又兩進柔潤清補頗投詢知病由乎悲哀煩勞調理向愈繼因目病服苦辛寒散太過遂經漏淋帶年前七八日始淨今則兩旬而止此奇脈內乏前議非誣據述周身纍現癮疹㾦纍瘙癢不寧想脂液久滲陰不內營陽氣浮越衛怯少固客氣外乘凡六淫客邪無有不從熱化內經以瘡痍諸病皆屬於火然內症為急正不必以肌腠見病為治刻下兩三日間又值經至之期議進固脈實下佐以東垣瀉陰火意經至之先用此方龜甲心真阿膠人參桑螵蛸生白龍骨旱蓮草茯神知母早上服又當經行周身寒凜腰痠腹膨白疹大發議用固氣和血方人參熟地阿膠川芎當歸白芍南山楂蘄艾早上服又經來腹墜腰痠疹現肌癢鼻孔耳竅皆然想陰血下注必陽氣鼓動內風沸起風非外來乃陽之化氣耳昨因經至用膠艾四物湯和補固經今午診脈右大而澀左小數中有堅疾如刃之象洵乎液枯風動初定烏鰂魚丸當進其早上湯藥凡氣味之辛裁去雖為補劑勿取動陽耗液也早上服人參生地天冬阿膠生白芍女貞子旱蓮膏地榆早上服又兩日早進清補柔劑夕用通固下焦衝任是月經來甚少起居頗安與先哲云暴崩當溫澀久漏宜宣通若合符節矣連次候脈必小弱為少安則知陽動不息內風必旋耆朮呆守歸艾辛溫守則氣壅辛則陽動皆不知變化之旨坐失機宜耳余未能久候焉有經年經月之恙驟期速愈故丸藥創自內經七方之一世多渺忽實出軒岐祕奧再議理陰熄風早用諒不致誤擬長夏調理二法晚服烏鰂丸三錢晨進養肝陰和陽熄風以安胃蓋衝脈即血海隸於陽明胃脈乃仿經旨立方人參阿膠白芍生地旱蓮膏女貞子桑寄生咸秋石細子芩三角胡麻藥末膠膏再加熟蜜三兩搗千餘杵丸宜細光早上服四錢小暑至處暑生脈散送又此番經後帶下仍有久漏奇脈少固前案申說已著丸劑專司通攝衝任恪守定然必效但外來寒暄易御內因勞嗔難調余諄諄相告者為此人參生地阿膠白芍茯神女貞子旱蓮膏小黑穭豆皮早上服初十日又昨晚煩冗陽動氣升頭額震痛經再下注更定鎮攝一法久後亦可備用人參生地阿膠龜甲心生牡蠣天冬黑殼建蓮又十二日午診脈仍用初十日早服方法去穭豆皮加生牡蠣交小暑後驟熱午後另煎生脈散微溫服一次盧停經半載雨水節後忽然暴崩交春分節血止黃白淋漓自下寒則周身拘束熱時煩燥口乾晡至天明汗出乃止寐必身麻如蟲行四肢骨節皆痛蓋血既大去衝任之脈傷損而為寒為熱陰損及乎陽位矣書云崩中日久為白滯漏下多時骨髓枯由脂液蕩盡致形骸枯槁延為瘵疾矣天熱氣暖所當謹慎烏賊骨阿膠生地生白芍茜草小麥程暴冷陽微後崩陽虛附子理中湯崩如山冢崒崩言其血之橫決莫制也漏如漏卮難塞言其血之漫無關防也經云陰在內陽之守也氣得之以和神得之以安毛髮得之以潤經脈得之以行身形之中不可斯須離也去血過多則諸病叢生矣原其致病之由有因衝任不能攝血者有因肝不藏血者有因脾不統血者有因熱在下焦迫血妄行者有因元氣大虛不能收斂其血者又有瘀血內阻新血不能歸經而下者醫者依此類推仿葉氏用筆靈活於崩漏治法無餘蘊矣秦天一徐評崩漏必用補血大劑而兼黑色之藥大概輕劑不能中病胎前秦十七經停三月無寒熱診脈大系惡阻減食惡阻細子芩知母蘇梗砂仁橘紅當歸生白芍方丸細子芩三兩蘇梗一兩生研砂仁五錢白芍一兩半熟白朮二兩當歸一兩半青苧湯法丸某懷妊將三月肝氣攻衝脅痞嘔吐紅痰肝氣細條芩生白芍川楝子栝蔞皮半夏曲橘紅竹茹生薑程二六殞胎每三月是肝虛肝虛滑胎人參阿膠當歸白芍川芎桑寄生錢三九上年夏産過月經轉今經停四個月左脈弦滑流動乃為妊象此氣急脘痞咳嗽熱氣上乘迫肺之徵形肉日瘦熱能爍陰耗氣議清金平氣勿礙於下熱傷肺陰桑葉川貝桔梗廣皮黑山梔地骨皮茯苓甘草楊血液僅僅養胎春陽升舉上焦易燥喉嗆心嘈皆液虧陽亢鮮生地茯神白扁豆元參心川斛謝始而熱入陰傷少腹痛溺不爽秋暑再傷霍亂繼起今不飢不食全是胃病況懷妊五月胎氣正吸脾胃真氣津液重傷致令咳逆胃虛咳逆人參知母炒麥冬木瓜蓮子肉茯神金懷妊五月得熱病久傷陰液身中陽氣有升無降耳竅失聰便難艱澀議用仲景復脈法以生津液熱邪傷陰炙甘草人參生地炭阿膠天冬麥冬生白芍麻仁某懷妊百日丙丁養胎胎熱從戌亥時升耳前赤痱刺痛當養陰制火細生地茯神生白芍建蓮桑葉鉤藤某脈右虛左弦身麻肢冷胎沖脹悶五六月當脾胃司胎厥陰內風暗動不飢吞酸全屬中虛肝風犯脾胃人參枳殼半夏薑汁桔梗胡懷妊六月陽明司胎閃動絡脈環跳痛連腰膂最防胎氣閃動絡脈歸身桂枝木炒杞子炙草羊脛骨白茯苓某氣逆壅熱於上齦腫喉痹胸悶腹腫七月太陰司胎法宜宣化清上熱壅上焦川貝牛蒡子連翹蘇梗杏仁花粉菊花橘紅汪娠八月胎動不安脘悶不飢宜涼血調氣可以安適氣滯血熱黃芩知母橘紅生白芍當歸砂仁程娠八月形寒氣逆神煩倦無寐乃肝陽乘中之徵擬進熄風和陽法肝風黃芩當歸生白芍生牡蠣橘紅茯神又肝風眩暈麻痹少寐熟首烏炒黑杞子白芍女貞子茯神黑穭豆皮王先寒後熱咳嗆是春月風溫肺病風為陽邪溫漸變熱客氣著人即曰時氣懷妊九月足少陰腎脈養胎上受熱氣肺痹喘急消渴胸滿便溺不爽皆肺與大腸為表裡之現症狀若繪矣芎歸辛溫參朮守補肉桂沉香辛熱皆胎前忌用致大熱煩悶勢屬危殆議以清肺之急潤肺之燥俾胎得涼則安去病身安自為不補之補古人先治其實實者邪也熱傷肺陰泡淡黃芩知母鮮生地花粉阿膠天冬又喘熱減半四肢微冷腹中不和胎氣有上衝之慮昨進清潤之方漐漐有汗可見辛燥耗血便是助熱今煩渴既止問初病由悲哀驚恐之傷養肝陰滋腎液為治穩保胎元病體可調復脈去桂麻薑棗加天冬知母子芩朱脈右澀小數左弦促納食脘脹常有甘酸濁味微嘔吐清涎旬朝始一更衣仍不通爽詢知病起情懷抑鬱由氣鬱化熱如內經五志過極皆從火化就懷妊惡阻按徐之才逐月安養亦在足少陽經正取清熱養胎況肝膽相火內寄非涼劑無以和平古人治病以偏救偏幸勿畏虛以貽患鬱熱金石斛黑山梔茯苓半夏曲橘紅竹茹枳實某惡阻本欲噁心厭食今夾時邪頭痛身熱當先清熱時邪發熱竹葉連翹生甘草黃芩花粉蘇梗某交節上吐下瀉況胎動不安脈虛唇白急用理中法吐瀉傷熱陽附子人參於朮茯苓白芍周病中懷妊泄瀉泄瀉焦術炒白芍炒黃芩炒廣皮金懷妊若患時症古人重在保胎今者喜暖惡寒升則厥痛墜微便痛繞腹暖胎須避絡傷以及奇脈畏慮胎墜難挽辛香溫柔之補冀其止厥寒邪厥鹿角霜淡蓯蓉炒杞子柏子仁當歸炒沙苑炒大茴茯苓某固護胎元諸症俱減惟心嘈覺甚陰火上升營虛之徵營虛火炎人參桑寄生熟地阿膠絲綿灰條芩白芍當歸茯苓香附某懷妊痢滯半月胃陰既虧陽氣上逆咽中阻飲水欲噦舌尖紅赤津液已耗燥補燥劫恐陰愈傷而胎元不保議益胃和陽生津治之痢傷胃陰熟地烏梅白芍山藥建蓮茯苓用川石斛煎湯代水潘血液護胎尚且不固心中如飢空洞食不能納況又戰栗嘔逆凡內外搖動都是動胎從來有胎而病外感麻桂硝黃等劑必加四物是治病保胎第一要法熱邪傷陰小生地白芍阿膠知母黃芩青蒿梗王臨月下痢膿血色紫形濃熱伏陰分議用白頭翁湯熱邪下痢膿血又苦味見效知溫熱動血以小其製為劑可全功矣黃芩黃柏炒銀花炒山楂茯苓澤瀉某胎漏鼻衄發疹而喘胎漏淡黃芩真阿膠青苧某觸胎下血腹痛而墜觸胎下血人參炒白芍炙草廣皮熟地炭炒砂仁末加紋銀一二兩青苧一兩又照前方去熟地加炮姜熟術又人參熟地炒歸身炒白芍炙草茯神廣皮炒砂仁陸十八形瘦脈數尺動不食噁心證象惡阻腰痛見紅為胎漏欲墜青苧二錢建蓮五錢紋銀一兩砂仁七分白糯米一錢某三月胎漏用固下益氣人參熟術熟地阿膠白芍炙草砂仁艾炭華血下殞胎未下濁氣擾動暈厥嘔逆腹滿少腹硬二便窒塞不通此皆有形有質之阻若不急為攻治濁瘀上冒必致敗壞仿子和玉燭散意殞胎不下川芎當歸芒硝茺蔚子大腹皮青皮黑豆皮調回生丹程懷妊八月子腫腹漸墜正氣虛弱補劑必須理氣預為臨産之算子腫人參茯苓廣皮大腹皮蘇梗砂仁末易曰大哉乾元萬物資始此言氣之始也又曰至哉坤元萬物資生此言形之始也人得父母之氣以生氣生形即稟此乾坤之氣也兩儀既兆五行斯彰故天一生水水屬腎腎臟先生地二生火火屬心心又次生天三生木木屬肝肝又次生地四生金金屬肺肺又次生天五生土土屬脾脾又次生天既以五行生五臟而仁義禮智信之五德亦即寓於其中朱夫子所云天以陰陽五行化生萬物氣以成形而理亦賦焉此之謂也因此古人重胎教所以端其本也而今不復講矣然六淫之感七情之傷妊婦稟氣有強弱小兒胎元有靜躁故安胎之法不可不詳如惡阻胎淋胎暈胎腫胎懸及漏胎等症古人言之甚晰茲不具贅今閲葉先生案胎前大約以涼血順氣為主而肝脾胃三經尤為所重因肝藏血血以護胎肝血失榮胎無以蔭矣肝主升肝氣橫逆胎亦上衝矣胎氣繫於脾如寄生之託於苞桑蔦與女蘿之施於松柏脾氣過虛胎無所附墮滑難免矣至於胃為水穀之海妊婦全賴水穀之精華以養身護胎故胃氣如兵家之餉道不容一刻稍緩也其餘有邪則去邪有火則治火陰虛則清滋陽虛則溫補隨機應變無所執著學者更能引而伸之觸類而通之安胎之法可一以貫之無餘蘊矣秦天一徐評案方亦清無大出入然非婦科專門多有未到之處當更博求之産後欽初産汗出眩暈胸痞腹痛宜通惡露新産惡露瘀滯炒山楂延胡鬱金赤芍炒牛膝香附童便沖益母草湯代水又腹痛少緩但胸痞痰多治從上焦炒山楂鬱金丹參橘紅炒川貝甜花粉程衝脈為病男子內結七疝女子帶下瘕聚故奇脈之結實者古人必用苦辛和芳香以通脈絡其虛者必辛甘溫補佐以流行脈絡務在氣血調和病必全愈今産後體虛兼瘀而痛法當益體攻病日期已多緩治為宜體虛兼瘀生地生薑丹皮琥珀末調入此苦辛偶方加丹皮以通外琥珀以通內所以取效又回生丹取米醋煮大黃一味約入病所不礙無病之所故亦效二法皆入絡藥又小生地歸鬚紅花郁李仁柏子仁茯神又照前方去紅花郁李仁加澤蘭某二五惡露淋漓痛由腰起攻及少腹此督帶空虛奇經氣阻奚疑奇經為病通因一法為古聖賢之定例當歸楂肉炭炒丹皮澤蘭川斷制首烏唐産後驟脫參附急救是挽陽固氣方法但損在陰分其頭痛汗出煩渴乃陽氣上冒凡開泄則傷陽辛熱則傷陰俱非新産鬱冒之治道嘗讀仲景書明本草意為是擬方於後亦非杜撰也鬱冒生左牡蠣一錢生地二錢上阿膠二錢炒黑楂肉三錢茺蔚子一錢半吳新産陰氣下泄陽氣上冒日晡至戌亥陽明胃衰厥陰肝橫肝血無藏氣衝擾膈致心下格拒氣干膻中神亂昏譫若惡露衝心則死矣焉有天明再醒之理回生丹酸苦直達下焦血分用過不應諒非瘀痹想初由汗淋發熱凡外感風邪邪滯汗解此熱昏亂即仲景之新産鬱冒也倘失治必四肢牽掣如驚似風癇則危議從亡陽汗出譫語例用救逆法生龍骨三錢生牡蠣三錢桂枝五分淮小麥百粒炙甘草三分南棗二錢又氣從湧泉小腹中直衝胸臆而心下痛巔暈神迷此肝腎內怯無以收納自固每假寐必魂魄飛越驚恐畏懼非止一端救逆法鎮陽頗應但少補虛寧神益之固之耳人參二錢龍齒三錢搗棗仁三錢茯神三錢炒黑杞子二錢黑殼建蓮肉五錢紫石英一兩搗碎用水三盞煎減半用以煎藥又兩法皆效下元虛損無疑八脈無氣把握帶下淋漓不止夢魂跌僕正經旨下虛則夢墜也議鎮固奇脈方人參二錢龍齒三錢棗仁三錢茯神三錢桑螵蛸炙二錢炒黑遠志五分用紫石英煎湯煎藥又昨午憂悲嗔怒大便後陡然頭暈繼以嘔逆胸痞止心洞嘈雜仍不能食子夜寒戰鼓栗寅刻津津微熱神昏妄見巔痛乳脹腹鳴短氣呵缺似乎嘆息之聲此乃下元根蒂未堅偶觸心機諸陽神飛旋動舞仲景論先厥後熱知飢不能食乾嘔列於厥陰篇中蓋危病初效未沾水穀精華則胃土大虛中無砥柱俾厥陰風木之威橫衝震蕩一如釋典混沌劫於地水火風卒來莫御矣當此醫藥全以護陽固陰但血舍耗涸剛猛及滋膩總在難施之例無暇理病存體為要人參五錢熟附子一錢川桂枝木一錢炮薑炭一錢炙黑甘草五分茯苓三錢沈此産後陰虛瘧疾鼻煤喉燥舌乾脘痞不飢大便窒塞不通乃陽明津枯不上供肺下少滋腸風陽遊行面腫耳聾仲景謂陰氣先絶陽氣獨發後人以飲食消息取義甘寒則知辛溫逐瘀之謬人參炒麥冬棗仁烏梅肉蜜水炒黃知母又酸味泄肝胃氣乃降大便通後汗大出心中刺痛皆營液內耗陽氣衝突仲景三病之鬱冒見端矣雖痰吐咯無苦燥耗氣之理人參阿膠生地麥冬生白芍炙草張産後鬱冒汗出潮熱腹痛炒生地炒山楂丹參茯神浮小麥黑穭豆皮吳産後十二朝先寒戰後發熱少腹㽲痛腹膨滿下部腰肢不能轉側伸縮小溲澀少而痛此敗血流入經絡延及變為瘍症議用交加散敗血入經絡為瘍小生地生薑車前牛膝五靈脂炒楂肉調入琥珀末一錢又十六朝諸症稍減每黃昏戌亥時沖氣自下而上至胸中即脹悶肢冷汗出右腹板實此厥陰肝臟因驚氣逆今惡露未清重鎮酸斂均為暫忌擬和血調血為穩歸鬚炒桃仁延胡炒楂肉官桂香附川楝小茴又人參當歸白芍炙草茯神香附桂心廣皮程脈濡惡露紫黑痛處緊按稍緩此屬絡虛治在衝任以辛甘理陽營絡虛寒惡露未清炒歸身炒白芍肉桂茯苓小茴杜仲又脈濡空大營絡虛冷人參炒歸身炒白芍茯神炙草桂心又當歸羊肉湯加茯苓茴香許産後陰虛肝風動灼喉干嗆咳晚則頭暈陰虛風陽動阿膠細生地天冬茯神小麥川斛程坐蓐過勞肝風陽氣動面浮氣短腹膨惡露未清不可膩滯須防痙厥小生地丹參澤蘭茯神黑穭豆皮琥珀末又血分既虧風陽動泄汗出心悸此辛氣走泄須忌所慮痙厥如已見端議靜藥和陽意阿膠雞子黃細生地生牡蠣丹參茯神某産後下焦陰虧奇脈不固陽浮乃升風動則飧泄嘈雜液損必消渴骨熱治在肝腎靜藥固攝熟地湖蓮炙草五味芡實山藥旱蓮女貞某新産後陰分大虛汗出胸痞潮熱陽浮衛不固雖痰多咳頻忌用苦辛表散恐久延蓐勞耳陰虛陽浮汗泄炒生地炒麥冬生扁豆炙草金石斛丹參茯神甘蔗漿某産後身痛少腹滿血虛寒滯楂肉川芎醋炒延胡醋炒澤蘭丹皮艾葉小茴香附醋炒茯苓益母膏丸又當歸桂心茴香香附紫石英茯苓羊肉膠丸孫産難傷力驚恐面微浮腹膨小便不爽氣血滯兼濕炒黑楂肉大黑豆皮大腹皮絨生香附茯苓澤瀉白花益母草煎湯代水金腹脹氣滯久瀉産後五日氣滯脹瀉於朮厚朴茯苓澤瀉南山楂延胡凌一歲四氣之交夏季發泄為甚凡夏至一陰初復未及充盈恰當産期為陰氣未充先泄暑熱乘隙內侵正如內經最虛之處便是容邪之處矣産科未明此旨徒曉産後逐瘀成藥苦辛破血津液愈劫所伏暑熱無由可驅六氣客邪內迫臟腑漸漸昏蒙內閉攻熱害正養正邪留藥難立方調治幼讀仲景揣摩聖誨惟育陰可以除熱況乎暑必傷氣人參非益氣之聖藥乎大隊陰藥佐以人參誠為陰分益氣之法服之熱癤壘壘而起惡露緩緩而下扶正卻邪並行不悖今穀食已安諒無反復難成易虧之陰須安養可望圖功倘加情志感觸輕則奇損帶淋重則髓枯蓐損莫道贈言之不詳也陰虛夾暑雄烏骨雞一隻人參二兩秋石拌鮮生地三兩柏子仁一兩半天冬一兩半麥冬二兩阿膠二兩建蓮肉三兩茯神二兩熬膏項初病舌赤神煩産後陰虧暑熱易深入此亟清營熱所謂瘦人慮虛其陰暑傷營陰竹葉細生地銀花麥冬玄參連翹張産後十三朝舌黃邊赤口渴脘中緊悶不食不飢不大便此陰分已虛熱入營中狀如瘧症大忌表散清克議滋清營熱救其津液為要細生地天冬生鱉甲丹皮丹參茯神又産後血絡空虛暑邪客氣深入瘧乃間日而發嘔惡胸滿口渴皆暑熱爍胃津液也此虛人夾雜時氣只宜和解不可發汗膩補青蒿梗淡黃芩丹皮鬱金花粉川貝杏仁橘紅又脈緩熱止病減之象但舌色未淨大便未通産後大虛不敢推蕩勿進葷膩恐滯蒸化熱蔬粥養胃以滋清潤燥便通再議補虛生首烏麻仁麥冬蜜水炒知母蘇子花粉某濁陰上逆噁心不食冷汗煩燥最防暴脫不可但執惡露滯滿而專瀉氣攻血也陽虛欲脫人參乾薑附子澤瀉衝入童便某脈無神神倦欲昏汗出乃陽氣走泄瀉利系陰氣不守産後見症是屬重虛深恐節間暴脫而寒熱胸痞腹痛豈遑論及標末人參製附子人尿豬膽汁某二五産後驟加驚恐陽上瞀冒為厥左肢麻木耳竅失聰皆陽挾內風混入清竅以上實下虛鎮陽填陰味厚質靜之藥産後陰虛陽浮發厥熟地龜甲心天冬萸肉五味磁石茯神黑殼建蓮某産後去血過多陰虛陽實頭中眩暈汗出肉瞤驚畏身熱等症最易昏厥苦辛氣味宜忌生地小麥炙黑甘草麥冬阿膠茯神生左牡蠣顧三一産後真陰不復陽越風動四肢麻木先厥後熱熟地阿膠炒杞子生白芍茯苓菊花炭徐少腹沖及心下脘中痛而脹滿若云肝氣犯胃必有嘔逆前法益陰和陽不應顯是産後下虛厥氣上攻議用柔陽之藥衝任虛氣上逆脘痛脹炒歸身蓯蓉炒枸杞柏子仁小茴茯神又沖逆震動而痛是産後衝任空乏按定痛減尤為虛象緣胃弱減谷未便湯劑之多防胃倒耳當歸蓯蓉紫石英茯苓河車鹿角霜又衝脈逆則諸脈皆動天朗晴和少安由陰分虛及陽分可徵前法包舉大氣溫養佐通是為絡方日來春升略有衄血然無清寒可投加鹹味佐其入陰從産後下焦先傷耳原方減鹿霜歸身亦恐升陽也加枸杞桂圓以痛在左故養肝是議虞三二背寒心熱天明汗出乃涼産後兩三月若此此屬下焦真陰已虧漸擾陽位二氣交乘並非客症頭暈耳鳴心悸寒熱後必瀉內風震動當與靜藥陰虛風陽動六月二十日人參炙草白芍麥冬炒生地炒烏梅又前法酸甘益陰和陽諸病皆減然此恙是産後下焦百脈空乏謂之蓐損填隙固髓為正治緣穀食未加沉膩恐妨胃口加餐可用丸藥七月初三人參炙草阿膠生地麥冬又照前方加桂枝木茯苓南棗八月初七又産後都屬下焦先損百脈空隙時序夏秋天暖發泄加病此扶陽益陰得效今諸症向愈寢食已安獨經水未至其衝任奇脈不振須臟陰充旺脈中得以遊溢耳九月初一熟地水制人參阿膠萸肉遠志炭山藥茯神建蓮烏骨雞膏丸吳坐蓐過勞驚恐交迫真陰既傷經年不復目暗昏花煩動熱升皆腎陰不得自充何以涵養肝木厥僕眩暈陽挾肝風直上無制則當靜藥填陰佐酸以收攝熟地阿膠五味萸肉北沙參茯神黑穭豆皮秋石二分調入陳二八寒熱時作經歲不痊且産後病起陽維為病明矣陽維病寒熱歸桂枝湯郭二四産後下元陰分先傷而奇經八脈皆麗於下肝腎怯不固八脈咸失職司經旨謂陽維脈痛苦寒熱陰維脈病苦心痛下損及胃食物日減然産傷先傷真陰忌用桂附之剛溫煦陰中之陽能入奇經者宜之下損及胃奇脈虛人參鹿茸紫石英當歸補骨脂茯苓陳四一産後四月腰痛牽引少腹冷汗不食營絡虛寒腰腹痛當歸羊肉小茴桂枝木茯苓紫石英沈産後動怒氣血皆逆痛嘔不臥俯不能仰面冷肢冷口鼻氣寒痛必自下衝上此屬疝瘕厥痛氣血寒滯結瘕淡吳萸韭白兩頭尖川楝子桂枝木茯苓吳二六産後百日內右脅下少腹痛堅膨絡空無血氣乘於中有結聚癥瘕之纍延及變成脹滿經水不轉成大病矣當歸桂心生桃仁牛膝山楂炒黑小茴陸産後邪深入陰氣血膠結遂有瘕疝之形身體傴僂乃奇脈綱維不用充形通絡可效仿仲景當歸羊肉湯意歸身蓯蓉杞子小茴茯苓紫石英羊肉膠丸某産後胞損溺淋筋脈牽掣治當攝下胞損桑螵蛸生沙苑萸肉炭炒黃柏茯神馮四二産後兩月汗出身痛營衛兼虛歸耆建中湯余産後不復心悸欲嘔遇寒腹痛先議進和營衛繼當補攝歸桂枝湯加茯苓吳三八胃痛三月不止茹素面黃産後吞酸少食中焦陽憊豈宜再加攻泄與辛補血絡方陽虛胃痛血絡瘀滯桃仁歸鬚公丁香皮川桂枝半夏茯苓某産虛下焦起病久則延胃不飢不食乃陰損及陽陽明脈空厥陰風動掀旋而頭痛面浮肢冷指麻皆亡血家見象陰損及陽肝風犯胃人參一錢杞子炒焦三錢歸身一錢牛膝鹽水炒焦一錢巴戟天一錢浙江黃甘菊花炭五分茯苓一錢半丸方人參二兩另研茯苓二兩蒸萸肉二兩炒焦五味一兩半杞子二兩炒桑螵蛸谷鹽水煮烘一兩生白龍骨一兩浙江黃菊花一兩炙炭蜜丸早服四錢開水送楊三一自幼作勞即患頭眩加之刮痧一月之內必發數次前歲産後體甚不健右耳日夜響鳴鳴即頭眩神色衰奪唇黃舌白帶下手冷腳腫脈右大是陽明空氣泄不固暖下溫中主之胃虛下焦虛寒人參二兩桑螵蛸三兩制鹿角霜一兩半淡蓯蓉一兩半炒杞子二兩柏子霜一兩半茯苓一兩半紫石英一兩半醋煅飛白龍骨一兩半紅棗四兩蘄艾五錢水煮搗丸服四錢某胃痛欲嘔肢冷痛引腰背産後病發更甚當歸炒沙苑炒黑杞子炒黑小茴鹿角霜生精羊肉煎服丸方人參鹿茸生杜仲炒杞子當歸鹿角霜茯苓沙苑小茴羊腰子蒸熟搗丸鄒三二陽不入陰不寐汗出産傷陰先受損繼而損至奇經前主溫養柔補謂陰傷不受桂附剛猛閲開列病情全是陰虛陽浮漏經幾一月尤為急治夜進局方震靈丹五十粒前方復入涼肝益陰配陽是兩固法則陰虛陽浮經漏人參麋茸枸杞天冬茯神沙苑某産後淋帶都是衝任奇脈內怯最有崩漏勞損淹纏之慮但固補實下須通奇經者宜之奇脈虛淋滯桑螵蛸人參茯苓生杜仲沙苑芡實湖蓮陳産後百脈空隙腰脊痛漏淋桑螵蛸鹿角霜龍骨淡蓯蓉炒杞子沙苑茯苓吳閲病原産後陰虛液虧加以平時嗔怒陽氣暴升絡血不寧奇空衝任少貯帶淋暗泄等症阿膠天冬當歸白芍淡黃芩青蒿膏女貞子茯神烏骨雞炙蜜丸趙蓐損八脈經水不來帶下頻頻頗多産後下焦先虛繼及中宮乃血液脂膏之涸桂附熱燥更助劫爍此溫藥是溫養之義非溫熱之謂人參河車麋茸鹿角霜歸身茯苓紫石英楊瘕泄起於産後三年方愈下損已極經水幾月一至來必衰頽如病奇經衝任交空下焦畏冷食冷則瀉心中疼熱暖下溫經主之虛寒瘕泄人參鹿角霜炒菟絲生杜仲炒杞子熟白朮淡骨脂茯苓蒸餅丸金三八經後即背寒不熱逾月不愈嗽痰有血自秋令産蓐屢屢若傷風咳嗽正月至谷減思産後不復是下虛形寒減食先調脾胃即和營衛法中虛人參建中湯某易飢易怒腹溏氣墜知飢不進食自胎前至今兩月不愈並非客邪用固攝升陽督任虛寒鹿茸鹿角霜熟地炭當歸桂枝五味茯苓某産後十年有餘病發必頭垂脊痛椎尻氣墜心痛冷汗此督任氣乖蹺維皆不用是五液全涸草木藥餌總屬無情不能治精血之憊故無效當以血肉充養取其通補奇經鹿茸鹿角霜鹿角膠當歸茯苓杞子柏子仁沙苑生杜仲川斷潘胎前水溢浮腫喘滿不得臥余用開太陽膀胱獲效既産浮腫自然漸退女科不明産後下虛專以破氣寬脹百日來腹大且滿按之則痛此皆氣散瀰漫丸藥又補澀守中益助其鈍氣血凝澀經候不來為難治之病議腎氣湯煅藥成炭取其氣之通勿令味濁兼調琥珀末以調其血澀仿古法中之所有非杜撰也陽虛腫脹桂七味加車前牛膝炒炭水洗煎臨服調入琥珀末徐三六産後九年心中脹甚則瀉甚肌浮足腫食減過半凡脹必有喘産後先傷在下用薛氏濟生丸三錢十服某産後血去過多下焦衝任空虛跗腫腹膨形寒面黃脈濡當用溫養鹿角霜三錢補骨脂一錢紫石英三錢茯苓三錢桂心四分炒黑小茴七分方三二脈沉濡産虛寒入痛脹腹鳴晨泄病人述心痛嘔逆其實治下為是熟附子胡蘆巴良薑炒黑茴香茯苓廣木香朱四六脈微弱形無華色據說病起産後食減吐瀉是下焦不復中焦又傷漸加浮腫脹滿倏甚忽平皆下焦厥逆上衝也下虛於産後剛劑難以專任是病之不易取效者在此淡蓯蓉炒黑杞子當歸小茴茯苓沙苑又濟生腎氣丸一兩二錢某四五産後未滿百日胸脅骨節收引四肢肌肉麻木浮腫腹脹早輕夜重食減畏寒便溏脈得右遲左弦先與理中健陽驅濁人參炮姜淡附子焦白朮枳實茯苓範病脹起於産後下焦先傷濁陰犯中不可以脹滿為實症夫腑陽不通腎氣散漫吸氣不入息音如喘此身動便喘非外客之邪干肺春半溫氣外侵面腫頸項結核曾以夏枯菊葉辛解得效乃一時暴邪治法至於本病之腹滿洞泄跗腫未經調理且脹勢侵晨至午頗減日暮黃昏脹形漸甚中焦陽微已見一斑愚見脹滿在中而病根在下仲景於産後失調都從下虛起見閲女科湯藥一方殊屬不解思平居咽乾喉痹牙宣肝腎真陰下虧不敢剛藥宣通仿薛氏腎氣法減泄肝如牛膝肉桂之辛不致劫陰仍可通陽為法六味去萸加芍藥附子牡蠣炒炭煎又小滿節古云痛隨利減今便利仍痛非是實症肝失調暢當理用以益水母不取芍藥之和陰加當歸小茴香拌炒焦黑以通肝臟脈絡之陽又辛散益腎也照前方去芍加茴香拌炒當歸某産後腫脹不愈顯系下虛肝腎氣不收攝形寒痞悶食少痰多脈細肉消治從陰分非分和攻消者濟生腎氣丸沉香汁衝開水送接服金匱腎氣丸王脹滿六年産後小愈今脹勢復甚兼脫肛淋症大腿熱如滾水滾潑食入臍中作痛議治其腑溫熱腫脹小溫中丸三錢六服傅風勝為腫濕甚生熱乃經脈為病但産後百日精神未復不可過劫風濕羚羊角木防己片薑黃川桂枝大杏仁苡仁方産後腹大半年不愈近日有形衝突腸如刀攪據述坐蓐艱産血去盈斗而腹形即已脹滿想八脈不用腎氣散越不收非瘀血積氣為病議用大全方烏雞煎丸奇脈虛腎氣不攝腫脹烏骨雞人參蒼朮附子烏藥肉桂陳皮草果紅花海桐皮黃耆白朮蓬朮川烏延胡白芍木香肉果琥珀丹皮即以雞撏去毛頭嘴爪腸雜將藥放雞肚內貯砂鍋中以好酒一斗同煮令乾去雞骨以油單盛焙令乾為末蜜丸範衝任傷督帶損皆由産時勞怖理難復元固攝下真兼理奇脈治非背謬但腹滿膨痛若徒固補不以通調恐滋脹腫大意陽宜通陰宜固包舉形骸和養脈絡乃正治方法病樣多端紛紜縷治難以立方矣人參鮮河車膠淡蓯蓉砂仁制熟地鹿角霜歸身茯苓紫石英小茴香羊腰子某産後下虛血病為多今脘中痞脹減食不適全是氣分之恙但調氣寬中勿動下焦為穩氣滯脘痞脹香附神麯蘇梗白蔻仁茯苓桔梗朱四十産後冬月右腿浮腫按之自冷若論敗血半年已成癰瘍針刺泄氣其痛反加此乃衝任先虛蹺維脈不為用溫養下元須通絡脈然取效甚遲恪守可望卻病下焦脈絡寒滯腫痛蓯蓉鹿角霜當歸肉桂小茴牛膝茯苓鹿角膠溶酒蜜丸某産後必病陰虛可知兩足跗中筋掣瘀痛不耐走趨當溫養肝腎以壯筋骨但食後脘中痞阻按之漉漉有聲手麻脅痛心煩耳目昏眩宛是陽氣不主流行痰飲內聚之象處方難以兼攝議用分治法肝腎虛兼痰飲中焦藥日中服桂苓六君子竹瀝薑汁法丸下焦藥侵晨服從四斤丸金剛丸參寫蓯蓉牛膝虎骨生杜仲粉天麻木瓜萆薢蜜丸程脈沉喘咳浮腫鼻竅黑唇舌赤渴飲則脹急大便解而不爽此秋風燥化上傷肺氣氣壅不降水穀湯飲之濕痹阻經隧最多坐不得臥之慮法宜開通太陽之裡用仲景越婢小青龍合方若畏産後久虛以補溫暖斯客氣散漫三焦皆纍閉塞告危矣燥傷肺氣水氣痹阻桂枝木杏仁生白芍石膏茯苓炙草乾薑五味陳三十夏季坐蓐秋月熱病半年來不寐不便無皮毛焦落之象是痰飲為氣所阻以致升降失常乃痹之基也議宣肺以通腸痰飲阻氣不寐不便紫菀八錢杏仁三錢枳殼一錢桔梗一錢栝蔞皮一錢鬱金一錢陸背寒夜臥氣衝欲坐乃下元虛乏厥濁飲邪皆令上泛胎前僅僅支撐産後變症蜂起奈何庸庸者流泄肺冀其嗽緩宜乎藥增病勢矣下虛飲濁上逆桂枝茯苓炙草五味淡乾薑許實喘屬肺虛喘屬腎産後下虛最多痰飲易於上泛喘嗽食減有浮腫脹滿不得臥之憂不可小視茯苓生白芍乾薑五味王産後未復風溫入肺舌白麵腫喘咳泄瀉小水漸少必加腫滿不易治之症風溫客肺飲邪上逆蘆根苡仁通草大豆黃卷又淡滲通泄氣分肺壅得開而臥再宗前議通草蘆根苡仁大豆黃卷木防己茯苓又過投絶産凝寒重藥致濕聚阻痰兩投通泄氣分已效再用暖胃滌飲法半夏薑汁黍米茯苓又支飲未盡溏瀉不渴神氣已虛用澤術湯生於術建澤瀉茯苓苡仁某脈小左弦咳逆脘悶小便不利大便溏瀉不思納穀噯氣臭穢此皆胎前氣上逆沖濁得盤踞膈間肺失清肅降令上竅痹致下竅不利湯食聚濕氣不宣行怕延出浮腫腹滿喘急不臥諸款不獨以産後通瘀為事濕濁踞膈肺不肅降鬱金汁杏仁通草桔梗茯苓皮苡仁沈産後未復加以暑熱上干暑必傷氣上焦先受頭脹微微嘔惡脘悶不曉飢飽暮熱早涼汗泄不已經水連至熱迫血絡妄動蓋陰虛是本病而暑熱系客氣清上勿得礙下便是理邪勿混亂首鼠致延蓐損不復矣暑傷上焦氣分捲心竹葉生地炒川貝連翹心元參地骨皮袁二一神識不甚靈慧陡然狂亂入井夫暴病痰火風為多今診視色脈産後未滿百日多驚怕五味皆變厥陰肝木順乘陽明古稱一陰一陽變亂為癇先以清心胞解營熱食進便通再酌調理木火盛心營熱犀角生地菖蒲元參心羚羊角鬱金竹葉心連翹心又復脈湯去參薑桂某三五産後不復元仍自乳撫育損不能復即是蓐勞速速斷乳藥力可扶凡産必下焦先損必以形質血氣之屬莫以心熱再用寒涼伐其生氣蓐勞人參當歸沙苑杜仲補骨脂茯苓羊內腎二枚沈時熱屬上焦病逾時自解緣體質素薄長夏坐蓐不但肝腎陰傷諸氣皆為發泄陰不主戀陽衝脈上衝而心熱骨痿總是陰虧不肯復元久久延成損症此與清潤治肺之咳無預法宜填補下焦攝之固之迎養秋收冬藏胃納有加庶乎漸安鮮紫河車人參真秋石茯神水煮熟地歸身五味芡實山藥生羯羊肉膠共河車膠二共和丸姚三十面少華色脈似數按之芤澀産後三年從未經來腹中有形升逆則痛肩背映脅卒痛難忍咳吐都是涎沫著枕氣衝欲坐食減便溏身動語言喘急此乃蓐勞損極不復諒非草木可以圖幸由下焦元海少振驚恐餒弱衝脈動斯諸脈交動擬益元氣充形骸佐重鎮以理怯護持體質之義非治病方藥矣人參杞子白龍骨茯苓紫石英羊肉鄒二八産後成勞損先傷下焦血分寒熱數發不止奇經八脈俱傷欲嘔不飢肝腎及胃有形凝瘕議柔劑溫通補下人參當歸小茴香拌炒茯苓沙苑淡蓯蓉杞子鹿角霜生紫石英汪産後百日寒熱消渴心痛惡食溏瀉此蓐勞液涸已屬沉疴難治擬酸甘化陰扶胃望其小安而已人參烏梅炙草赤石脂木瓜茯神炒粳米張二八産後下虛厥氣上衝犯胃食入嘔脹脈絡日空營衛兩怯寒熱汗泄淹淹為蓐勞之病最難調治淡吳萸七分桂枝五分茯苓三錢炮姜八分炒木瓜一錢南棗黃産後陡然驚恐陰虧厥陽上逆血湧吐痰胸背脅俞大痛乃八脈空乏之徵蓐勞重症延綿最難全好議鎮固一法熟地炭炒杞子五味紫石英茯神牛膝炭又脈少斂痛止血緩仍用鎮納熟地炒杞子五味女貞子芡實茯神又眩暈腹鳴脘痛熟地炒杞子五味茯神阿膠萸肉菊花炭北沙參又烏骨雞阿膠熟地杞子五味桂圓茯神建蓮熬膏人參湯送顧小産三日脈數頭痛脘痞小腹墜痛欲厥此屬鬱冒小産鬱冒連翹鬱金汁丹皮鉤藤茯苓炒山楂益母草湯煎某二五小産後惡露淋漓營血內虧厥陽由是鼓動頭脹耳鳴心中洞然病在下焦矣營血虛陽升枸杞子三錢柏子仁一錢全當歸一錢半白芍一錢半穭豆皮三錢茯神三錢朱脈小半産一日舌白頻頻嘔吐青緑水汁涎沫左肢浮腫神迷如寐此胃陽大虛肝風內泛欲脫之象急急護陽安胃冀得嘔緩再商治病胃陽虛肝風動嘔吐欲脫人參淡附子炒焦粳米煨老薑又雖得小效必三陰三陽一周扶過七日庶有愈理人參淡附子熟於朮炮姜茯苓南棗某小産不及一月忽有厥逆痰潮此陰分既虛厥陽上冒今二便已通神志似屬憒散病雖已成癲癇卻非痰火有餘肝腎位遠治宜鎮補擬陳無擇琥珀散陰虛陽冒成癲癇人參白芍鐵落辰砂磁石遠志菖蒲牛黃琥珀孔形畏寒凜凜忽然轟熱腰膝墜脹帶下汗出由半産下焦之損致八脈失其擁護少腹不和通攝脈絡治之奇脈陽虛不升固鹿角霜炒當歸杜仲菟絲子小茴香桂枝陳懷妊三月小産半年不復寒從背起熱起心胸經水後期不爽帶下脈脈不斷脊膂腰髀痿墜痠疼膝骨跗脛易冷無力由衝任督帶傷損致陰陽維蹺不用調治非法有終身不肯孕育之纍奇脈虛淋滯鹿角霜炒枸杞當歸炒沙苑桂枝小茴顧上年小産下虛不復冬令藏聚未固春夏陽升風溫乘虛上受清竅不利耳失聰鼻多塞咽燥痰稠悉見上焦不清究竟下虛是本病議食後用清竅早上用鎮納下虛上受風溫青菊葉三錢羚羊角一錢黑梔皮一錢連翹心一錢半玄參心二錢苦丁茶一錢磁石六味加龜膠北味程久瀉延虛痛後而瀉氣弱不司運行病因小産而來法當中下兩調陽氣虛久瀉人參炒菟絲子木香茯苓炒白芍炒補骨脂汪小産後氣衝結瘕是奇經八脈損傷醫謂病尚有形僉從瘀血施治半年來肌肉大消內熱咯痰帶血食過脘下輒云腹痛蓋産後下焦真陰大虧攻瘀清熱氣味苦辛是重虛其虛藥先入胃既不中病先戕胃口致令飲食廢矣陰虛生熱經訓灼然只以胃口傷殘難與滋膩之藥此症延成蓐勞必得飲食漸和方有調病之理見病治病貽害豈可再循前轍議肝胃兩和方法蓐勞炒黑杞子三錢云茯神一錢半柏子仁三錢生沙苑一錢焦當歸一錢小茴七分同當歸合炒紫石英五錢先煎草滾入藥某三次兩月胎漏而下是厥陰失養脈數右大腹痛惡露未盡肝虛血滯柏子仁炒楂肉丹皮澤蘭葉細生地調入琥珀末倪小産半月頗安忽然腰腹大痛或攢膝跗足底或引脅肋肩胛甚至湯飲藥餌嘔吐無存娠去液傷絡空風動昔賢謂按之痛緩屬虛勿道諸痛為實液虛風動炙草淮小麥南棗阿膠細生地生白芍又往常經候不調乃癥瘕為痛蔥白丸金匱要略云新産婦人有三病一者病痙二者病鬱冒三者大便難新産血虛多汗出善中風故令病痙亡血復汗寒多故令鬱冒亡津液胃燥故大便難心典云血虛汗出筋脈失養風入而益其徑此筋病也亡陰血虛陽氣遂厥而寒復郁之則頭眩而目瞀此神病也胃藏津液而滲灌諸陽亡津液胃燥則大腸失其潤而大便難此液病也三者不同其為亡血傷津則一故皆為産後所有之病即此推之凡産後血虛諸症可心領而神會矣張路玉云産後元氣虧損惡露乘虛上攻眼花頭暈或心下滿悶神昏口噤或痰涎壅盛者急用熱童便主之或血下多而暈或神昏煩亂者芎歸湯加人參澤蘭童便兼補而散之又敗血上衛有三或歌舞談笑或怒罵坐臥甚則逾牆上屋此敗血衝心多死用花蕊石散或琥珀黑龍丹如雖悶亂不致顛狂者失笑散加鬱金若飽悶嘔惡腹滿脹痛者此敗血沖胃五積散或平胃加薑桂不應送來復丹嘔逆腹脹血化為水者金匱下瘀血湯若面赤嘔逆欲死或喘急者此敗血沖肺人參蘇木甚則加芒硝蕩滌之大抵衝心者十難救一沖胃者五死五生沖肺者十全一二又産後口鼻起黑色而鼻衄者是胃氣虛敗而血滯也急用人參蘇木稍遲不救丹溪云産後當大補氣血即有雜症以末治之一切病多是血虛皆不可發表景嶽云産後既有表邪不得不解既有火邪不得不清既有內傷停滯不得不開通消導不可偏執如産後外感風寒頭痛身熱便實中滿脈緊數洪大有力此表邪實症也又火盛者必熱渴躁煩或便結腹脹口鼻舌焦黑酷喜冷飲眼眵尿痛溺赤脈洪滑此內熱實症也又或因産過食致停蓄不散此內傷實症也又或鬱怒動肝胸脅脹痛大便不利脈弦滑此氣逆實症也又或惡露未盡瘀血上衝心腹脹滿疼痛拒按大便難小便利此血逆實症也遇此等實症若用大補是養虎為患誤矣以上四家之論俱屬産後治病扼要處學者當細心體察再參觀葉先生醫案更能博考群書以治産後諸病易如反掌矣否則如眇能視不足以有明也如跛能履不能以與行也烏得稱司命哉秦天一婦人善病而病由産後者為更多亦為更劇産後氣血大虧內而七情外而六氣稍有感觸即足致病使治之失宜為患莫測朱丹溪曰産後以大補氣血為主雖有他症以末治之此語固為産後症之宗旨而症實多端論其常未盡其變也醫者惟辨乎脈候以明內外之因審乎陰陽以別虛實之異病根透徹而施治自效慎毋以逐瘀為了事亦毋以溫補為守經今觀先生案中凡內因之實症未嘗不用攻治之劑然如熱熾昏亂有似惡露衝心者先生則曰陰氣下泄陽氣上冒從亡陽汗出譫語例為救逆法如少腹沖及心脘痛而脹滿有似肝氣犯胃者先生則曰産後下虛厥氣上攻惟用柔陽之藥如頭痛汗出煩渴有似感冒風寒者先生則曰開泄則傷陽辛熱則傷陰從仲景新産鬱冒之治以立方至於奇經八脈為産後第一要領蓋八脈麗於下産後陰分一傷而八脈自失所司溫補鎮攝在所必先無奈世人罕知即有一二講論者終屬影響模糊惟先生於奇經之法條分縷析盡得其精微如衝脈為病用紫石英以為鎮逆任脈為病用龜板以為靜攝督脈為病用鹿角以為溫煦帶脈為病用當歸以為宣補凡用奇經之藥無不如芥投針若夫外因為病者風溫入肺用葦莖湯甘寒淡滲以通肺氣遇寒腹痛用當歸桂枝湯辛甘化陽以和營衛暑氣上干則陰虛是本病暑熱是客氣清上勿致礙下便是理邪如濕傷脾陽而飲邪阻氣用苦溫淡滲之品澤術湯治之熱蒸化燥而胃阻腸痹用首烏麻仁麥冬花粉清滋潤燥之劑治之熱乘陰虛而入營中則忌表散清克惟育陰可以除熱更如邪入營絡而成瘧症不得發汗膩補當以輕清和解為主要之先生於內因之症一一尋源探本非同俗手漫謂補虛於外因之端種種審變達權不以産後自為荊棘惟讀書多而胸具靈機故於丹溪本末二字尤為神化無跡此所謂知其要者一言而終不知其要者流散無窮也案中諸症甚多學者果能悟焉則一以貫之矣龔商年徐評近來諸醫誤信産後屬寒之說凡産後無不用炮姜熟地肉桂人參等藥不知産後血脫孤陽獨旺雖石膏竹茹仲景亦不禁用而世之庸醫反以辛熱之藥戕其陰而益其火無不立斃我見甚多案中絶無此弊足徵學有淵源惟喜用人參而少用血藥消痰清胃之法尚未見及則有未到也胎産之後總由營虛大脫不論有邪無邪必養血為主其去瘀消痰降火驅風種種治法皆從血分中推詳變化不離本官案中諸方多隨見施竟有不似産後之方者此非專門之故也癥瘕張久痛在絡營中之氣結聚成瘕始而夜發繼而晝夜俱痛陰陽兩傷遍閲醫藥未嘗說及絡病便難液涸香燥須忌營絡氣聚結瘕青蔥管新絳當歸鬚桃仁生鹿角柏子仁朱二六辛潤通絡成形瘀濁吐出然瘀濁必下行為順上湧雖安恐其復聚仍宜緩通以去瘀生新為治無取沉降急攻謂怒勞多令人傷陽耳當歸桃仁茺蔚子制蒺藜生鹿角茯苓香附汁法丸周三十瘕聚結左肢節寒冷病在奇脈以辛香治絡鹿角霜桂枝木當歸小茴茯苓香附蔥白龔脈症向安辛甘化風方法非謬據云痛時少腹滿脹其有形疝瘕狀亦略小法宜益營之中再佐通泄其氣古稱通則不痛耳人參當歸肉桂吳萸小茴茯苓青蔥管欽疝瘕少腹痛當歸生薑羊肉桂枝小茴茯苓又瘕痛已止當和營理虛歸身紫石英白芍酒炒小茴淡蓯蓉肉桂丸方用養營去耆朮桂合杞圓膏朱四十疝瘕腹痛有形用柔溫辛補當歸生薑羊肉某右脅攻痛作脹應時而發是濁陰氣聚成瘕絡脈病也議溫通營絡當歸三錢小茴炒焦一錢上桂肉一錢青蔥管十寸談瘕聚有形高突痛在胃脘心下或垂岕腰少腹重按既久痛勢稍定經水後期色多黃白此皆衝脈為病絡虛則脹氣阻則痛非辛香何以入絡苦溫可以通降氣血凝絡脘痛經阻延胡川楝香附鬱金茯苓降香汁茺蔚子炒山楂烏藥又瘕聚痼結痛脹妨食得食不下痛甚今月經阻不至帶淋甚多病由衝任脈絡擾及肝胃之逆亂若不宣暢經通日久延為蠱疾矣炒桃仁當歸鬚延胡川楝子青皮小茴吳萸紫降香青蔥管柳四二絡血不注衝脈則經阻氣攻入絡聚而為瘕乃痛衝脈是陽明屬隸痛升於右脹及中脘作嘔清涎濁沫操家煩怒犯胃莫如肝泄肝正救胃金鈴子炒延胡蓬莪朮青橘葉半夏厚朴薑汁茯苓又蔥白丸二錢艾棗湯送某臍下瘕形漸大氣塞至心胸及咽喉飲不解渴遂氣攻至背部經水百餘日不來小溲得利大便不爽氣滯血瘀皆因情志易郁肝膽相火內灼衝脈之血欲涸丹溪謂氣有餘便是火口甜食後痞用苦辛清降木火鬱氣滯血瘀胡黃連八分山梔仁一錢半南山楂三錢蘆薈一錢雞肫皮不落水去垢炙脆五錢化服回生丹半丸陸十六經阻半年腹形漸大痛不拒按溲短便通據形色脈象不是用通經丸者下氣還攻於絡有形若癥瘕炒枯腎氣丸腎氣不攝經阻腹痛脹繆脈弦左搏數年胃痛不痊發時手不可按脅中拘急少腹左傍素有瘕聚之形氣自下焦衝起為脹為嘔此乃驚憂嗔怒致動肝木乘其中土胃傷失降脈絡逆並痛勢為甚初起或理氣獲效久發中衰辛香氣燥脾胃不勝克伐矣議疏肝木安土為法冀其漸緩再酌後法氣血凝絡肝逆胃痛嘔川楝子川連乾薑桂枝當歸川椒生白芍烏梅又少腹疝瘕多年衝起散漫胃脘兩脅痛甚欲嘔年前用安胃泄肝頗效但下焦至陰足跗發瘰裂水久留濕熱瘀留經脈絡中交病若非宣通氣血壅遏恐非至理桃仁柏子仁川芎當歸小茴小香附茯苓山梔薑汁炒為末用青蔥管百莖加水一杯取汁法丸某五十數年左脅聚瘕發作必嘔吐涎沫酸苦濁水寤不成寐便閉忽瀉始於悒鬱病由肝失暢達木必傳土胃氣受侮病久入絡氣血兼有緩圖為宜急攻必變脹病生牡蠣川楝子肉延胡桃仁半夏茯苓橘紅白芥子川連吳萸香附汁薑汁法丸趙脈小身不發熱非時氣也凡經水之至必由衝脈而始下此脈胃經所管醫藥消導寒涼不能中病反傷胃口致衝脈上衝犯胃為嘔攻胸痞塞升巔則昏厥經言衝脈為病男子內疝女子瘕聚今小腹有形兼有動氣其病顯然夫曰結曰聚皆奇經中不司宣暢流通之義醫不知絡脈治法所謂愈究愈窮矣肝逆犯胃奇絡虛滯鹿角霜淡蓯蓉炒當歸炒小茴生杜仲茯苓用紫石英一兩煎湯煎藥蔣四七天癸將止之年小腹厥陰部位起瘕動則滿腹脹痛形堅或時脊巔掣痛必有穢痰血筋吐出此起於郁傷久則液枯氣結內風陽氣煩蒸則心熱痞結咽阻已屬痼疾治必無效倘腹大中滿則劇矣郁傷液涸陽升痛脹牡蠣生地阿膠小胡麻茯苓穭豆皮沈四十肢冷腹痛有形為瘕久瀉厥陰寒滯嘔瀉當歸炒黑小茴炒黑上肉桂山楂炒黑茯苓又冷利有瘕遇冷則嘔吳萸炒小茴延胡茯苓川楝子生香附某脘中瘕聚肝鬱犯胃川楝子一錢延胡一錢吳萸五分青皮七分良薑一錢茯苓三錢林脈左弦澀少腹攻逆痛即大便肝氣不疏厥陰滯積香附一錢半雞肫皮炙一錢半茯苓一錢半麥芽一錢香櫞皮八分青皮五分炒楂肉二錢砂仁殼五分又少腹瘕聚攻逆身熱或噫或濁氣下泄則諸恙悉舒惱怒病發厥陰肝木鬱遏不疏顯露一斑川楝子一錢小茴五分生牡蠣三錢桂枝木五分生白芍一錢青皮一錢程聚氣疝瘕大便不爽必腹中㽲痛當通腑經氣分蔥白丸二錢五分紅棗湯送又仿朱南陽意以濁攻濁韭白根去須五錢兩頭尖一百粒炒香橘核一錢半小茴香七分金鈴子肉一錢半又瘕聚已解用八珍丸加香附小茴白花益母膏丸某瘕聚在左脅中肝病桃仁川楝子延胡當歸橘紅香附王四一瘕聚季脅漸加煩倦減食入夏土旺氣泄用泄少陽補太陰方膽克脾暑傷氣人參茯苓炙草當歸丹皮生地鱉甲澤蘭膏周痛久在絡凝聚成形仍屬經病議用河間法痰氣凝結川楝子栝蔞皮香附汁延胡生牡蠣又理氣豁痰痛止思食仍以前法參用半夏栝蔞皮香附汁生牡蠣橘紅香豉葛四一用丹溪小溫中丸脹利自減知腸胃濕熱皆阻腑陽之流暢水穀之氣不主遊溢瘕屬氣聚癥為血結由無形釀為有形攻堅過急藥先入胃徒致後天氣乏恐脹病必至矣俗有痞散成蠱之說可為治此病之戒律濕熱結癥老韭根生曬一兩桃仁一兩生香附一兩炒楂肉一兩當歸鬚一兩山甲片一兩小茴香三錢桂枝木三錢胡二十少腹聚瘕能食便不爽腹微脹濕熱腹脹小溫中丸王二一初病寒熱半年經水不來少腹已有瘕形食又減半當此年犯乾血勞慮寒熱食減乾血勞焦術茯苓廣皮香附當歸南山楂白芍夫癥者徵也血食凝阻有形可徵一定而不移瘕者假也臟氣結聚無形成假推之而可動昔有七癥八瘕之說終屬強分名目不若有形無形之辨為明的也二癥病在肝脾而胃與八脈亦與有責治之之法即從諸經再究其氣血之偏勝氣虛則補中以行氣氣滯則開鬱以宣通血衰則養營以通絡血瘀則入絡以攻痹此治癥瘕之大略古方甚多而蔥白丸烏雞煎丸尤為神效癥瘕之外更有痃癖腸覃石瘕內疝等症古人論之已詳茲不必贅今參先生方案如營傷氣阻者於益營之中佐通泄其氣如絡虛則脹氣阻則痛者以辛香苦溫入絡通降又如肝胃兩病者以泄肝救胃肝胃脾同病者則扶土製木肝臟之氣獨郁不宣者辛香專治於氣血痹絡迸失和者辛香專理其血病由衝任擾及肝胃之逆亂者仍從肝胃兩經主治以疏降溫通凡此悉靈機法眼藥不妄投總之治癥瘕之要用攻法宜緩宜曲用補法忌澀忌呆上逆則想肝臟沖病之源頭下垂則究中氣陰邪之衰旺吞酸吐水必兼剛藥液枯腸結當祖滋營再辨脈象之神力形色之枯澤致病之因由則治法自然無誤矣龔商年徐評案中方論平正清切又極和潤無剛燥克削等弊但有形之疾多有凝結而不可破者古人膏丸蒸尉等法必不可少此則全未見及恐沉痼之疾斷不能除也熱入血室沈氏溫邪初發經水即至寒熱耳聾乾嘔煩渴飲見症已屬熱入血室前醫見咳嗽脈數舌白為溫邪在肺用辛涼輕劑而煩渴愈甚拙見熱深十三日不解不獨氣分受病況體質素虛面色黯慘恐其邪陷痙厥三日前已經發痙五液暗耗內風掀旋豈得視為渺小之恙議用玉女煎兩清氣血邪熱仍有救陰之能熱邪內陷液傷發痙玉女煎加竹葉心武火煎五分又脈數色黯舌上轉紅寒熱消渴俱緩前主兩清氣血伏邪已得效驗大凡體質素虛驅邪及半必兼護養元氣仍佐清邪腹痛便溏和陰是急白芍炙草人參炒麥冬炒生地又脈右數左虛臨晚微寒熱復脈湯去薑桂吳氏熱病十七日脈右長左沉舌痿飲冷心煩熱神氣忽清忽亂經來三日患病血舍內之熱氣乘空內陷當以瘀熱在裡論病但病已至危從蓄血如狂例蓄血細生地丹皮製大黃炒桃仁澤蘭人中白考熱入血室金匱有五法第一條主小柴胡因寒熱而用雖經水適斷急提少陽之邪勿令下陷為最第二條傷寒發熱經水適來已現晝明夜劇譫語妄見恐人誤認陽明實病故有無犯胃氣及上二焦之戒第三條中風寒熱經水適來七八日脈遲身涼胸脅滿如結胸狀譫語者顯無表症全露熱入血室之候自當急刺期門使人知針力比藥力尤捷第四條陽明病下血譫語但頭汗出亦為熱入血室亦刺期門汗出而愈仲景無非推廣其義教人當知通變第五條明其一症而有別因為害如痰潮上脘昏冒不知當先化其痰後除其熱等語所謂急者先除也乃今人一遇是症不辨熱入之輕重血室之盈虧遽與小柴胡湯貽害必多要之熱甚而血瘀者與桃仁承氣及山甲歸尾之屬血舍空而熱陷者用犀角地黃湯加丹參木通之屬表邪未盡而表症仍兼者當合乎和解熱輕而清藥過投氣機致鈍者不妨借溫通為使血結胸有桂枝紅花湯參入海蛤桃仁之治昏狂甚進牛黃膏調入清氣化結之煎再觀案中有兩解氣血燔蒸之玉女法熱甚陰傷有育陰養氣之復脈法又有護陰滌熱之緩攻法先聖後賢其治總條分縷析學者審症制方慎毋拘乎柴胡一法也邵新甫徐評向時閲此老親筆醫案每多假借偏造之談而文理亦有不貫串處今所刻諸案不但文理通達兼之筆力簡淨明達近日時文家亦不能望其萬一不知原文本來如是抑編輯之人為之筆削也
