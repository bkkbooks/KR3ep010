body:
  text: 卷二咳嗽某五三寒傷衛陽咳痰寒川桂枝五分杏仁三錢苡仁三錢炙草四分生薑一錢大棗二枚某三九勞傷陽氣形寒咳嗽桂枝湯加杏仁某四四寒熱咳嗽當以辛溫治之桂枝湯去芍加杏仁某五十形寒咳嗽頭痛口渴桂枝湯去芍加杏仁花粉某咳嗽寒熱杏仁三錢嫩蘇梗一錢桔梗一錢桑皮一錢象貝母一錢生甘草三分王三一脈沉細形寒咳桂枝一錢杏仁三錢苡仁三錢炙草五分生薑一錢大棗二枚吳四一咳嗽聲音漸窒診脈右寸獨堅此寒熱客氣包裹肺俞鬱則熱先以麻杏石甘湯寒包熱又葦莖湯徐四七瘧屬外邪瘧止聲音不揚必是留邪干於肺系故咳嗽不已納食起居如常中下無病但以搜逐上焦勿令邪結可望病已麻黃杏仁生甘草射干苡仁某二八風邪阻於肺衛咳嗽面浮當辛散之麻黃先煎去沫五分杏仁三錢生甘草三分生石膏三錢某三十風襲肺衛咳嗽鼻塞當以辛涼解散風杏仁嫩蘇梗桑皮象貝桔梗苡仁某女風熱上痹痰多咳嗽杏仁嫩蘇梗橘紅桑葉白沙參通草夏五二風鬱咳不止薄荷前胡杏仁桔梗橘紅桑皮連翹枳殼方煩勞衛疏風邪上受痰氣交阻清竅失和鼻塞音低咳嗽甚皆是肺病辛以散邪佐微苦以降氣為治風邪阻竅杏仁蘇梗辛荑牛蒡子苡仁橘紅桔梗枳殼項二一風溫脈虛嗽風溫桑葉薄荷杏仁象貝大沙參連翹沈脈右搏數風溫嗆咳桑葉杏仁象貝苡仁栝蔞皮白沙參某女風溫發熱咳薄荷連翹杏仁桑皮地骨皮木通黃芩炒楂某十歲頭脹咳嗽此風溫上侵所致連翹一錢半薄荷七分杏仁一錢半桔梗一錢生甘草三分象貝一錢某十二風溫上受咳嗽失音咽痛杏仁薄荷連翹桔梗生甘草射干邱向來陽氣不充得溫補每每奏效近因勞煩令陽氣弛張致風溫過肺衛以擾心營欲咳心中先癢痰中偶帶血點不必過投沉降清散以辛甘涼理上燥清絡熱蔬食安閒旬日可安風溫化燥冬桑葉玉竹大沙參甜杏仁生甘草苡仁糯米湯煎宋二一脈右浮數風溫干肺化燥喉間癢咳不爽用辛甘涼潤劑桑葉玉竹大沙參甜杏仁生甘草糯米湯煎某積勞更受風溫咽乾熱咳形脈不充與甘緩柔方桑葉一錢玉竹五錢南沙參一錢生甘草五分甜水梨皮二兩又風邪鬱蒸化燥發熱後咳嗽口乾喉癢先進清肺杏仁花粉蘇子象貝山梔橘紅薛三六風熱咳經月不止活水蘆根桑葉大沙參生苡仁地骨皮象貝滑石橘紅某風溫客邪化熱劫爍胃津喉間燥癢嗆咳用清養胃陰是土旺生金意風溫化燥傷胃陰金匱麥門冬湯陸二三陰虛體質風溫咳嗽苦辛開泄肺氣加病今舌咽乾燥思得涼飲藥劫胃津無以上供先以甘涼令其胃喜仿經義虛則補其母桑葉玉竹生甘草麥冬元米炒白沙參蔗漿某外受風溫郁遏內因肝膽陽升莫制斯皆肺失清肅咳痰不解經月來猶覺氣壅不降進食頗少大便不爽津液久已乏上供腑中之氣亦不宣暢議養胃陰以杜陽逆不得泛泛治咳麥冬沙參玉竹生白芍扁豆茯苓某溫邪外襲咳嗽頭脹當清上焦溫邪杏仁桑皮桔梗象貝通草蘆根某二六咳嗽痰黃咽喉不利此溫邪上侵肺氣不清故耳桑葉川貝母白沙參杏仁兜鈴鮮枇杷葉某二八陰虧挾受溫邪咳嗽頭脹當以輕藥桑葉杏仁川貝白沙參生甘草甜水梨皮某脈細數咳嗽痰黃咽痛當清溫邪桑葉杏仁川貝苡仁兜鈴鮮蘆根又照前方加白沙參冬瓜子某四一脈右弦大咳嗽痰多黃此屬溫邪上伏之故桑葉杏仁白沙參南花粉兜鈴甜水梨肉王二六脈小數能食乾咳暮甚冬藏失納水虧溫伏防其失血用復脈法復脈湯去參薑桂張十七冬季溫邪咳嗽是水虧熱氣內侵交驚蟄節嗽減用六味加阿膠麥冬秋石金水同治是瀉陽益陰方法為調體治病兼方近旬日前咳嗽復作納食不甘詢知夜坐勞形當暮春地氣主升夜坐達旦身中陽氣亦有升無降最有失血之虞況體豐肌柔氣易泄越當暫停誦讀數日可愈桑葉甜杏仁大沙參生甘草玉竹青蔗漿楊二四形瘦色蒼體質偏熱而五液不充冬月溫暖真氣少藏其少陰腎臟先已習習風生乃陽動之化不以育陰驅熱以卻溫氣泛泛乎辛散為暴感風寒之治過辛泄肺肺氣散斯咳不已苦味沉降胃口戕而腎關傷致食減氣怯行動數武氣欲喘急封藏納固之司漸失內損顯然非見病攻病矣靜養百日猶冀其安陰虛感溫邪麥冬米拌炒甜沙參生甘草南棗肉衝入青蔗漿一杯王二五氣分熱熾頭脹痰嗽氣分熱連翹石膏杏仁鬱金薄荷山梔又照前方去山梔加蔞皮桔梗範四十脈左弱右寸獨搏久咳音嘶寐則成噎阻咽平昔嗜飲胃熱遺肺酒客忌甜微苦微辛之屬能開上痹山梔香淡豉杏仁栝蔞皮鬱金石膏林氏宿病營衛兩虛茲當燥氣上犯暴涼外侮氣餒衛怯肺先受邪脈浮數咳喘欲嘔上熱下冷宜先清化上氣有取微辛微苦之屬桑葉杏仁蘇梗山梔象貝苡仁糯米湯煎王十歲嗽緩潮熱稚年陰虧氣熱所致地骨皮三錢青蒿一錢知母一錢生甘草三分南沙參一錢川斛三錢某嗽已百日脈右數大從夏季伏暑內郁治在氣分桑葉生甘草石膏苡仁杏仁蘇梗史四十濕鬱溫邪總是阻遏肺氣嘔咳脘痞即病形篇中諸嘔喘滿皆屬於肺不明口鼻受侵阻氣之理清中疏導乃過病所伐其無病之地矣熱鬱成毒鮮枇杷葉杏仁象貝黑山梔兜鈴馬勃又輕浮苦辛治肺咳嗆頗減咽痛紅腫皆邪窒既久壅而成毒嗌乾不喜飲舌色淡不紅仍清氣分佐以解毒雞子白麥冬大沙參金銀花綠豆皮蔗漿陸秋暑燥氣上受先干於肺令人咳熱此為清邪中上當以辛涼清潤不可表汗以傷津液暑青竹葉連翹花粉杏仁象貝六一散又脈右大癉熱無寒暑郁在肺當清氣熱佐以宣通營衛桂枝白虎湯加麥冬又熱止脈右數咳不已知母生甘草麥冬沙參炒川貝竹葉汪女暑熱入肺為咳花粉六一散杏仁橘紅大沙參黑山梔皮某二九咳嗽頭脹口渴此暑風襲於肺衛暑風杏仁三錢香薷五分桔梗一錢桑皮一錢飛滑石三錢絲瓜葉三錢倪二三兩寸脈皆大冷熱上受咳嗽無痰是為清邪中上從暑風法竹葉蔞皮橘紅滑石杏仁沙參潘氏久咳不已則三焦受之是病不獨在肺矣況乎咳甚嘔吐涎沫喉癢咽痛致咳之由必衝脈之傷犯胃擾肺氣蒸熏灼悽悽燥癢咳不能忍近日晝暖夜涼秋暑風潮熱溏泄客氣加臨營衛不和經阻有諸但食姜氣味過辛致病辛則泄肺氣助肝之用醫者知此理否耶夫診脈右弦數微寒熱渴飲擬從溫治上焦氣分以表暑風之邪用桂枝白虎湯王三歲暑風入肺熇熱咳嗽防驚益元散黃芩竹葉花粉苡仁地骨皮張二五形瘦脈數驟涼暮熱肺失和為咳小暑後得之亦由時令暑濕之氣輕則治上大忌發散暑濕大竹葉飛滑石杏仁花粉桑葉生甘草某咳嗽喉痛溺澀西瓜翠衣三錢杏仁三錢六一散三錢桔梗一錢通草一錢半桑葉一錢川貝一錢半連翹一錢半曹水穀不運濕聚氣阻先見喘咳必延蔓腫脹治在氣分濕杏仁厚朴苡仁廣皮白蘇梗白通草陸二二濕必化熱熏蒸為嗽氣隧未清納穀不旺必薄味靜養壯盛不致延損濕熱飛滑石南花粉象貝苡仁綠豆皮通草某渴飲咳甚大便不爽石膏花粉通草紫菀木防己杏仁苡仁某雨濕寒熱汗出痰多咳嗽大小便不爽胸脘不飢臍左窒塞濕痰阻氣杏仁萊菔子白芥子蘇子鬱金蔞皮通草橘紅朱五十中虛少運濕痰多阻氣分咳嗽舌白炒半夏茯苓桂枝木炙草苡仁馮脈右弦大而緩形瘦目黃久嗽聲嘶而濁水穀氣蘊之濕再加時序之濕熱壅阻氣分咳不能已久成老年痰火咳嗽無性命之憂有終年之累濕熱痰火蘆根馬勃苡仁浙茯苓川斛通草陳秋燥痰嗽氣促燥桑葉玉竹沙參嘉定花粉苡仁甘草蔗漿又用清燥法桑葉玉竹沙參苡仁甘草石膏杏仁施脈沉弦為飲近加秋燥上咳氣逆中焦似痞姑以辛泄涼劑暫解上燥栝蔞皮鬱金香豉杏仁苡仁橘紅北沙參山梔胡六六脈右勁因疥瘡頻以熱湯沐浴衛疏易傷冷熱皮毛內應乎肺咳嗽氣塞痰多久則食不甘便燥結胃津日耗不司供肺況秋冬天降燥氣上加漸至老年痰火之象此清氣熱以潤燥理勢宜然倘畏虛日投滯補益就枯燥矣霜桑葉甜杏仁麥冬玉竹白沙參天花粉甘蔗漿甜梨汁熬膏某四十脈弦胸膈痹痛咳嗽頭脹此燥氣上侵肺氣不宣使然當用輕藥以清上焦枇杷葉桑葉川貝杏仁冬瓜子桔梗某十九舌白咳嗽耳脹口乾此燥熱上郁肺氣不宣使然當用辛涼宜薄滋味鮮荷葉二錢連翹殼一錢半大杏仁三錢白沙參一錢飛滑石三錢冬桑葉一錢某二五邪爍肺陰咳嗽咽痛晡甚玉竹南沙參冬桑葉川斛元參青蔗漿某二四鼻淵三載藥投辛散如水投石未能卻除辛辣炙爆耳近復咳嗽音嘶燥氣上逼肺衛使然杏仁連翹象貝白沙參桑皮兜鈴僧三十脈右寸獨大氣分咳有一月桑葉杏仁玉竹苡仁沙參茯苓糯米湯煎某脈右大寤咳寐安病在氣分桑葉川貝知母地骨皮梨汁蔗漿熬膏朱女肝陰虛燥氣上薄咳嗽夜熱桑葉白沙參杏仁橘紅花粉地骨皮糯米湯煎陸女燥風外侵肺衛不宣咳嗽痰多不時身熱當用輕藥以清上焦桑葉杏仁花粉大沙參川貝綠豆皮戎咽阻咳嗆兩月來聲音漸低按脈右堅是冷熱傷肺生雞子白桑葉玉竹沙參麥冬甜杏仁吳七歲燥氣上逼咳嗆以甘寒治氣分之燥大沙參桑葉玉竹生甘草甜梨皮某十二燥熱內伏發熱咳嗽口渴桑葉杏仁白沙參連翹囫圇滑石鮮蘆根費十一久瘧傷陰冬季溫舒陽不潛藏春木升舉陽更泄越入暮寒熱晨汗始解而頭痛口渴咳嗽陰液損傷陽愈熾冬春溫邪最忌發散謂非暴感汗則重劫陰傷迫成虛勞一途況有汗不痊豈是表病診得色消肉爍脈獨氣口空搏與脈左大屬外感有別更有見咳不已謬為肺熱徒取清寒消痰降氣之屬必致胃損變重嘗考聖訓仲景云凡元氣已傷而病不愈者當與甘藥則知理陽氣當推建中顧陰液須投復脈乃邪少虛多之治法但幼科未讀其書焉得心究是理然乎否乎炙甘草鮮生地麥冬火麻仁阿膠生白芍青蔗漿又由陰傷及胃痿黃食少餐法當補養胃陰虛則補母之治也見咳治肺生氣日憊矣金匱麥門冬湯某五一脘痹咳嗽鮮枇杷葉三錢叭噠杏仁三錢桔梗一錢川貝二錢冬瓜子三錢蜜炙橘紅一錢周三二秋燥從天而降腎液無以上承咳嗽吸不肯通大便三四日一更衣脈見細小議治在臟陰牛乳紫衣胡桃生白蜜薑汁吳久嗽因勞乏致傷絡血易瘀長夜熱灼議養胃陰胃陰虛北沙參黃耆皮炒麥冬生甘草炒粳米南棗某喉痹咳嗆脈右大而長生扁豆麥冬北沙參川斛青蔗漿毛上年夏秋病傷冬季不得復元是春令地氣陽升寒熱咳嗽乃陰弱體質不耐升泄所致徒謂風傷是不知陰陽之義北參炒麥冬炙甘草白粳米南棗某二六病後咳嗆當清養肺胃之陰生扁豆麥冬玉竹炒黃川貝川斛白粳米湯煎徐二七形寒畏風冷食減久嗽是衛外二氣已怯內應乎胃陽脈不用用藥莫偏治寒熱以甘藥調宗仲景麥門冬湯法張十七入夏嗽緩神倦食減渴飲此溫邪延久津液受傷夏令暴暖泄氣胃汁暗虧筋骨不束兩足痠痛法以甘緩益胃中之陰仿金匱麥門冬湯制膏參鬚二兩北沙參一兩生甘草五錢生扁豆二兩麥冬二兩南棗二兩熬膏湯二四脈左堅數促冬溫咳嗽是水虧熱升治不中窾胃陰受傷穢濁氣味直上咽喉即清肺冀緩其嗽亦致氣泄而嗽仍未罷先議甘涼益胃陰以制龍相胃陰自立可商填下生扁豆米炒麥冬北沙參生甘草冬桑葉青蔗漿水錢氏脈右數咳兩月咽中干鼻氣熱早暮甚此右降不及胃津虛厥陽來擾金匱麥門冬湯去半夏加北沙參某十四咳早甚屬胃虛生扁豆炒麥冬大沙參苡仁橘紅陳秋冬形體日損咳嗽吐痰診脈兩寸促數大便通而不爽此有年煩勞動陽不得天地收藏之令日就其消乃虛症也因少納胃衰未可重進滋膩議用甘味養胃陰一法金匱麥門冬湯錢久咳三年痰多食少身動必息鳴如喘診脈左搏數右小數自覺內火燔燎乃五液內耗陽少制伏非實火也常以瓊玉膏滋水益氣暫用湯藥總以勿損胃為上治嗽肺藥諒無益於體病北沙參白扁豆炒麥冬茯神川石斛花粉範氏兩寸脈大咳甚脘悶頭脹耳鼻竅閉此少陽鬱熱上逆犯肺肺燥喉癢先擬解木火之郁膽火犯肺羚羊角連翹梔皮薄荷梗苦丁茶杏仁蔞皮菊花葉陸嫗脈小久咳背寒骨熱知飢不食厭惡食物氣味此憂思悒鬱皆屬內損閱方藥都以清寒治肺不應議益土泄木法鬱火傷胃炙甘草茯神冬桑葉炒丹皮炒白芍南棗尤氏寡居煩勞脈右搏左澀氣燥在上血液暗虧由思郁致五志煩煎固非溫熱補澀之症晨咳吐涎姑從胃治以血海亦隸陽明耳生白扁豆玉竹大沙參茯神經霜桑葉苡仁用白糯米半升淘濾清入滾水泡一沸取清湯煎藥又本虛在下情懷悒鬱則五志之陽上熏為咳固非實火但久郁必氣結血涸延成乾血勞病經候澀少愆期已屬明徵當培肝腎之陰以治本清養肺胃氣熱以理標剛熱之補畏其劫陰非法也生扁豆一兩北沙參三錢茯神三錢炙草五分南棗肉三錢丸方熟地砂仁末拌炒四兩鹿角霜另研一兩當歸小茴香拌炒二兩淮牛膝鹽水炒炭二兩雲茯苓二兩紫石英醋煅水飛一兩青鹽五錢另熬生羊肉膠和丸早服四錢開水送章二五自服八味鹿角膠以溫補反咳嗽吐痰形瘦減食皆一偏之害宜清營熱勿事苦寒營熱鮮生地麥冬元參心甘草苦百合竹葉心某二七脈數沖氣咳逆當用攝納腎陰滋養柔金為金水同治之法勞嗽熟地四錢白扁豆五錢北沙參三錢麥冬二錢川斛三錢茯神三錢王三八脈左尺堅久嗽失音入夏見紅天明咳甚而納穀減損此勞損之症急宜靜養者麥冬大沙參玉竹川斛生白扁豆雞子白某久嗽咽痛入暮形寒雖屬陰虧形痿脈耎未宜夯補麥冬南沙參川斛生甘草糯稻根鬚某氣急咳頻欲嘔下午火升此上有燥熱下焦陰虧也早都氣丸晚威喜丸張今年春季時疫大半皆有咳嗽咽喉之患乃邪自上干肺氣先傷耳近日身動氣喘聲音漸不揚著左眠臥左脅上有牽掣之狀此肝腎陰虧沖氣上觸冬藏失司漸有側眠音啞至矣勞傷致損非清邪治咳之病六味丸加陽秋石阿膠麥冬蜜丸顧真陰不旺先後天皆虧以填精實下為主若清熱冀圖治嗽必胃損減谷熟地萸肉山藥茯苓湖蓮芡實五味人乳粉金櫻膏丸湯三三脈左弱右搏久有虛損交春不復夜臥著枕氣衝咳甚即行走亦氣短喘促此乃下元根蒂已薄冬藏不固春升生氣淺少急當固納攝下世俗每以辛涼理嗽每致不救矣水制熟地五味湖蓮芡實茯神青鹽羊內腎某二七氣衝咳逆行動頭脹下體自汗都氣丸樂二九熱病兩三反復真陰必傷當戌亥時厥昏汗出者乃虛陽上冒肝腎根蒂不牢衝脈震動則諸脈俱逆陽泄為汗耳此咳嗽乃下焦陰不上承非肺病也急當收攝固納閱醫蘇子鉤藤皆泄氣鋒芒之藥施於陰陽兩損之體最宜斟酌都氣加青鉛朱五三吸氣息音行動氣喘此咳嗽是腎虛氣不收攝形寒怯冷護衛陽微腎氣丸頗通形氣不足加人參河車王五十氣急嗽逆足冷當用攝納水中藏火法薛氏加減八味丸三錢淡鹽湯送下郭二八形瘦脈垂尺澤久嗽嘔逆半年不愈是腎虛厥氣上干醫藥清寒治肺者不少誤人匪淺坎炁人乳粉杞子五味胡桃肉茯神巴戟肉萸肉山藥漿丸某六二冬季咳嗽吐痰漸至臥則氣衝喘急起坐今三載矣經以肺腎為俯仰之臟是肺主出氣腎主納氣老年患此按脈右弦左沉為腎氣不收主治不必因痔患而畏辛熱腎氣丸去牛膝肉桂加沉香蜜丸張三十冬季喘嗽似屬外因表散沓進反致失音不得著枕臥眠今戌亥時濁陰上干而喘急氣逆為甚仍議引導納氣歸腎六味加附子車前補骨脂胡桃沉香朱虛勞食減便瀉已無清肺治嗽之法必使胃口旺冀其久延此非藥餌可效之病人參秋石泡湯拌烘茯神山藥建蓮芡實苡仁訶子皮用糯稻根鬚煎湯煎藥沈十九勞嗽食減便瀉汗出陰損已及陽腑中宜扶胃下固腎陰為治大忌清肺寒涼希冀治嗽熟地熟冬朮五味芡實湖蓮山藥某氣弱久嗽痰多午前為甚早服都氣丸三錢午服異功散某久咳損及中州脾失輸化食減神倦肺無所資至咳不已診得兩手脈弦細數精氣內損非泛常治咳消痰所可投熟地阿膠燕窩海參天冬茯苓紫石英紫衣胡桃肉孫脈搏大陽不下伏咳頻喉痹暮夜為甚先從上治陰虛火炎生雞子白生扁豆皮玉竹白沙參麥冬地骨皮周四八脈來虛芤形色衰奪久患漏瘍陰不固攝經營勞動陽氣再傷冬月客邪致咳都是本體先虛春深入夏天地氣泄身中無藏日加委頓理固當然此豈治咳治血者議補三陰臟陰方法人參秋石湯拌熟地麥冬扁豆茯神白粳米施氏脈細數乾咳咽燥脊酸痿弱此本病欲損阿膠雞子黃北沙參麥冬茯神小黑穭豆皮某左脈弦數遺泄久嗽痰黃當用填補炒熟地芡實扁豆女貞茯神糯稻根鬚丁六三秋令天氣下降上焦先受燥化其咳症最多屢進肺藥無功按經云久咳不已則三焦受之是不專於理肺可知矣六旬又三形體雖充而真氣漸衰古人於有年久嗽都從脾腎子母相生主治更有咳久氣多發泄亦必益氣甘補斂攝實至理也茲議攝納下焦於早服而純甘清燥暮進填實在下清肅在上凡藥味苦辛宜忌為傷胃泄氣預防也腎陰胃陰兼虛早服水制熟地八兩白雲苓乳蒸四兩五味子去核蒸烘三兩建蓮去心衣三兩淮山藥乳蒸四兩車前子三兩淮牛膝鹽水拌蒸烘三兩柴衣胡桃肉霜連紫皮研三兩上為末用蒸熟豬脊髓去膜搗丸服二三錢開水送晚用益胃土以生金方法真北沙參有根有須者四兩生黃耆薄皮三兩麥冬去心二兩生白扁豆囫圇連皮四兩生細甘草一兩南棗肉四兩淡水煎汁濾清收膏臨成加真柿霜二兩收晚上開水化服五錢徐四八色萎脈濡心悸嗆痰咳逆勞心經營氣餒陽虛中年向衰病加治法中宮理胃下固腎真務以加谷為安縷治非宜煎藥用大半夏湯早服附都氣丸中氣虛某色白肌柔氣分不足風溫上受而咳病固輕淺無如羌防辛溫膏知沉寒藥重已過病所陽傷背寒胃傷減谷病恙仍若身體先憊問誰之過歟小建中湯又苦辛泄肺損胃進建中得安宗內經辛走氣以甘緩其急然風溫客氣皆從火化是清養胃陰使津液得以上供斯燥癢咳嗆自緩土旺生金虛則補母古有然矣金匱麥門冬湯王亂藥雜投胃口先傷已經減食便溏何暇紛紛治嗽急急照顧身體久病宜調寢食異功去白朮加炒白芍炒山藥高甘藥應驗非治嗽而嗽減病根不在上腹鳴便忽溏陰中之陽損傷人參冬白朮雲茯苓炙甘草炒白芍南棗徐二六勞損咳嗽用建中法得效乃無形之氣受傷故益氣之藥氣醇味甘中土寧金受益然必安穀加餐庶幾可御長夏濕熱蒸逼真氣致泄反復異功加歸耆薑棗某內損虛症經年不復色消奪畏風怯冷營衛二氣已乏納穀不肯充長肌肉法當建立中宮大忌清寒理肺希冀止嗽嗽不能止必致胃敗減食致劇黃耆建中湯去姜陳二七脈細促久嗽寒熱身痛汗出由精傷及胃黃耆建中湯去姜許二七久嗽不已則三焦受之一年來病咳而氣急脈得虛數不是外寒束肺內熱迫肺之喘急矣蓋餒弱無以自立短氣少氣皆氣機不相接續既曰虛症虛則補其母黃耆建中湯李三四久嗽經年背寒足跗常冷汗多色白嗽甚不得臥此陽微衛薄外邪易觸而濁陰挾飲上犯議和營衛兼護其陽黃耆建中湯去飴糖加附子茯苓任五六勞力傷陽自春至夏病加煩倦神羸不食豈是嗽藥可醫內經有勞者溫之之訓東垣有甘溫益氣之方堪為定法歸耆建中湯張二九館課誦讀動心耗氣凡心營肺衛受傷上病延中必漸減食當世治咳無非散邪清熱皆非內損主治法黃耆建中湯去姜呂脈左細右空搏久咳吸短如喘肌熱日瘦為內損怯症但食納已少大便亦溏寒涼滋潤未能治嗽徒令傷脾妨胃昔越人謂上損過脾下損及胃皆屬難治之例自云背寒忽熱且理心營肺衛仲景所云元氣受損甘藥調之二十日議建中法黃耆建中去姜馬虛損脈弦久嗽食減小建中去姜鄭二七脈來虛弱久嗽形瘦食減汗出吸短久虛不復謂之損宗內經形不足溫養其氣黃耆建中湯去姜加人參五味某二四脈弦右大久嗽背寒盜汗小建中去姜加茯神朱三九五年咳嗽遇風冷咳甚是肌表衛陽疏豁議固劑緩其急黃耆建中湯吳三六勞力神疲遇風則咳此乃衛陽受傷宜和經脈之氣勿用逐瘀攻傷之藥當歸桂枝湯合玉屏風散某久咳神衰肉消是因勞內傷醫投苦寒沉降致氣泄汗淋液耗夜熱胃口傷殘食物頓減黃耆建中去姜某脾胃脈部獨大飲食少進不喜飲水痰多咳頻是土衰不生金氣建中去飴加茯神接服四君子湯某風溫咳嗽多勞氣分不充戊己湯人參茯苓於朮炙草廣皮炒白芍某勞嗽喜得辛暖之物異功加煨姜南棗吳嫗病去五六當調寢食於醫藥之先此平素體質不可不論自來納穀恆少大便三日一行胃氣最薄而滋膩味厚藥慎商從來久病後天脾胃為要咳嗽久非客症治脾胃者土旺以生金不必窮究其嗽人參鮮蓮子新會皮茯神炒麥冬生穀芽某脈虛久嗽減食四君子加南棗汪初咳不得臥今左眠咳甚並不口渴欲飲周身漐漐汗出此積勞內傷木反乘金不飢不納滋膩難投惟以培中土制木生金合乎內傷治法勞倦陽虛川桂枝茯苓淡乾薑五味子生甘草大棗某二一咳逆欲嘔是胃咳也當用甘藥胃咳生扁豆一兩北沙參一錢半麥冬米拌炒一錢半茯神三錢南棗三錢糯稻根鬚五錢某伏邪久咳胃虛嘔食殆內經所謂胃咳之狀耶麻黃杏仁甘草石膏半夏苡仁王二七脈沉短氣咳甚嘔吐飲食便溏泄乃寒濕鬱痹漬陽明胃營衛不和胸痹如閟無非陽不旋運夜陰用事濁泛嘔吐矣庸醫治痰順氣治肺論咳不思內經胃咳之狀咳逆而嘔耶小半夏湯加薑汁石氣左升腹膨嘔吐涎沫黃水吞酸暴咳不已是肝逆乘胃射肺致坐不得臥肝犯胃肺安胃丸三錢範嫗久咳涎沫欲嘔長夏反加寒熱不思食病起嗔怒氣塞上衝不能著枕顯然肝逆犯胃沖肺此皆疏泄失司為郁勞之症故滋膩甘藥下咽欲嘔矣小青龍去麻辛甘加石膏顏氏久有痛經氣血不甚流暢驟加暴怒肝陽逆行乘肺則咳病家云少腹沖氣上干其咳乃作則知清潤肺藥非中窾之法今寒熱之餘咳不聲揚但脅中拘急不飢不納乃左升右降不司旋轉而胃中遂失下行為順之旨古人以肝病易於犯胃然則肝用宜泄胃腑宜通為定例矣桑葉丹皮鉤藤茯苓半夏廣皮威喜丸三錢某脈弦右甚嗽午潮熱便溏畏風以大腸嗽治之大腸嗽生於術一錢半茯苓三錢赤石脂一錢禹糧石二錢薑汁四分大棗三枚又照前方加白芍炙甘草又脈數右長左弦上咳下溏生於術一錢半茯苓三錢炙草五分木瓜一錢薑汁四分大棗肉四錢石四三咳嗽十月醫從肺治無效而巔脹喉痹脘痞顯是厥陽肝風議鎮補和陽熄風肝風生牡蠣阿膠青黛淡菜某昨議上焦肺病百日未痊形肌消爍悉由熱化久熱無有不傷陰液擬咸補如阿膠雞子黃復入芩連苦寒自上清氣熱以補下雖為暫服之方原非峻克之劑細思手經之病原無遽入足經之理但人身氣機合乎天地自然肺氣從右而降肝氣由左而升肺病主降日遲肝橫司升日速咳嗆未已乃肝膽木反刑金之兆試言及久寐寤醒左常似閃爍嘈雜如飢及至進食未覺胃中安適此肝陽化風旋擾不息致嗆無平期即倏熱之來升至左頰其左升太過足為明驗倘升之不已入春肝木司權防有失血之累故左右為陰陽之道路陰陽既造其偏以致病所以清寒滋陰不能驟其速功阿膠雞子黃生地天冬女貞實糯稻根鬚姚脅痛久嗽脅痛旋覆花湯加桃仁柏子仁某寒熱右脅痛咳嗽蘆根一兩杏仁三錢冬瓜子三錢苡仁三錢枇杷葉三錢白蔻仁三分咳為氣逆嗽為有痰內傷外感之因甚多確不離乎肺臟為患也若因於風者辛平解之因於寒者辛溫散之因於暑者為熏蒸之氣清肅必傷當與微辛微涼苦降淡滲俾上焦矇昧之邪下移出腑而後已若因於濕者有兼風兼寒兼熱之不同大抵以理肺治胃為主若因秋燥則嘉言喻氏之議最精若因於火者即溫熱之邪亦以甘寒為主但溫熱猶有用苦辛之法非比秋燥而絕不用之也至於內因為病不可不逐一分之有剛亢之威木扣而金鳴者當清金制木佐以柔肝入絡若土虛而不生金真氣無所稟攝者有甘涼甘溫二法合乎陰土陽土以配剛柔為用也又因水虛而痰泛元海竭而諸氣上衝者則有金水雙收陰陽並補之治或大劑滋填鎮攝葆固先天一炁元精至於飲邪竊發亦能致嗽另有專門兼參可也以上諸法皆先生臨證權衡之治非具慧心手眼能如是乎邵新甫徐評凡述醫案必擇大症及疑症人所不能治者數則以立法度以啟心思為後學之所法今載百餘方重複者八九此非醫案乃逐日之總簿耳吐血朱形寒暮熱咳嗽震動頭中脘中脅骨皆痛先經嗽紅體氣先虛此時序冷熱不勻夾帶寒邪致病脈得寸口獨大當清解上焦大忌溫散之劑寒邪桑葉蘇梗杏仁象貝玉竹大沙參某風溫上受吐血風溫桑葉薄荷杏仁連翹石膏生甘草徐陰虛風溫氣逆嗽血生扁豆玉竹白沙參茯苓桑葉鬱金顧四十寸口脈搏指而勁痰血能食初因風溫咳嗽震動絡血以清心營肺衛之熱小生地黑山梔地骨皮天花粉丹參連翹竹葉心汪右脈大咽喉癢嗆頭中微脹此冬溫內侵陽氣不伏絡熱血得外溢當調其復邪冬溫桑葉山梔皮連翹白沙參象貝牛蒡子某脈小而勁少年體豐真氣易泄經月咳嗆自非外感因冬溫失藏咳頻震絡痰帶血出當薄味以和上焦氣熱得清病患可卻桑葉山梔杏仁鬱金象貝花粉糯米湯代水王三五脈右大溫邪震絡咳痰帶血溫熱桑皮杏仁山梔皮花粉大沙參石膏高溫邪上郁清空目赤頭脹咳嗆見血此屬客病不必為內損法連翹黑山梔草決明桑葉薄荷梗荷葉邊苦丁茶花粉藥用急火煎唐二七血後喉燥癢欲嗆脈左搏堅玉竹南花粉大沙參川斛桑葉糯米飲煎高二一脈小澀欲涼飲熱阻氣升血冒仍議治上嫩竹葉飛滑石山梔皮鬱金汁杏仁汁新荷葉汁某春溫嗽痰固屬時邪然氣質有厚薄不可概以辛散且正在知識發動之年陰分自不足以至咳嗆失血當以甘寒潤降以肅肺金鮮枇杷葉甜杏仁南沙參川貝甜水梨甘蔗漿郭熱傷元氣血後咳逆舌赤脈寸大熱鮮生地麥冬玉竹地骨皮川斛竹葉心又心眩不飢熱灼氣升鮮生地玄參丹參鬱金汁銀花竹葉心綠豆皮某脈澀咳嗽痰血不時寒熱此邪阻肺衛所致寒熱鬱傷肺葦莖湯加杏仁通草孫二六用力氣逆血亂咳出腥痰濁血用千金葦莖湯某邪鬱熱壅咳吐膿血音啞麻杏甘膏湯加桔梗苡仁桃仁紫菀倪二七肛瘍潰膿雖愈陰氣已經走泄當陽氣弛張發泄今加嗽血痰多胃納減於平昔脈數促喘逆脘悶姑清肅上焦氣分上焦氣分蓄熱蘇子杏仁香豉黑梔皮鬱金蔞皮降香桔梗汪七十天明至午嗽甚痰血春暖陽浮是腎虛不藏聞咳音重濁不爽先議輕清治氣分之熱桑葉南花粉黑梔皮桔梗甘草橘紅某脈搏數舌心灰咳痰有血頻嘔絡傷致血隨熱氣上出仍理氣分桑葉花粉苡仁川貝黃芩茯苓方夏熱泄氣胃弱沖逆失血暑熱扁豆茯苓參三七茜草施脈小數舌絳喉中癢咳嗆血因暑熱旬日熱入營絡震動而溢凡肺病為手太陰經逆傳必及膻中仍以手厥陰治竹葉心生地銀花連翹心玄參赤豆皮高脈數汗出身熱吐血五日胸脘不舒舌色白此陰虛本質暑熱內侵營絡漸有時瘧之狀小溲莖中微痛宣通腑經為宜鮮生地連翹鬱金汁滑石竹葉甘草梢又氣阻不飢黑梔皮香豉蔞皮鬱金杏仁橘紅王氏入夏嗆血乃氣泄陽升幸喜經水仍來大體猶可無妨近日頭脹脘中悶上午煩倦是秋暑上受防發寒熱竹葉飛滑石杏仁連翹黃芩荷葉汁江積瘀在絡動絡血逆今年六月初時令暴熱熱氣吸入首先犯肺氣熱血湧強降其血血藥皆屬呆滯而清空熱氣仍蒙閉於頭髓空靈之所諸竅痹塞鼻窒瘜肉出納之氣都從口出顯然肺氣鬱蒸致腦髓熱蒸脂液自下古稱爍物消物莫如火但清寒直泄中下清空之病仍然議以氣分輕揚無取外散專事內通醫工遇此法則每每忽而失察暑熱鬱肺阻竅連翹牛蒡子通草桑葉鮮荷葉汁青菊花葉臨服入生石膏末煎一沸某二三以毒藥熏瘡火氣逼射肺金遂令咳嗆痰血咽乾胸悶診脈尺浮下焦陰氣不藏最慮病延及下即有虛損之患姑以輕藥暫清上焦以解火氣火氣逼肺杏仁三錢綠豆皮三錢冬瓜子三錢苡仁三錢川貝一錢半兜鈴七分趙三三咳逆自左而上血亦隨之先以少陽膽絡治木火升逆擾動陽絡生地丹皮澤蘭茯苓降香末荷葉汁張三六耳目昏蒙甚於午前此屬少陽鬱勃之升嘔惡痰血多是絡熱治以開泄莫投滋膩桑葉丹皮黑梔連翹菊葉蔞皮川貝橘紅董十七色蒼能食脘有積氣兩年秋冬曾有嗆血此非虛損由乎體稟木火嗔怒拂逆肝膽相火擾動陽絡故也金斛山梔鬱金丹參川貝蘇子鉤藤茯苓又接用清氣熱安血絡方生地麥冬玄參知母花粉百部桔梗川貝蜜丸嚴四二脈數澀小結痰血經年屢發仍能納食應酬此非精血損怯由乎五志過動相火內寄肝膽操持鬱勃皆令動灼致絡血上滲混痰火必靜養數月方安否則木火劫爍胃傷減食病由是日加矣丹皮薄荷梗菊花葉黑梔淡黃芩生白芍鬱金川貝顏入夏陽升疾走驚惶更令諸氣益升飲酒多食櫻桃皆辛熱甘辣絡中血沸上出議消酒毒和陽生地阿膠麥冬嘉定花粉川斛小黑穭豆皮沈脈左堅上透是肝腎病血色紫乃既離絡中之色非久瘀也勞役暑蒸內陰不生有諸仿瓊玉意仍是陰柔之通劑陰虛鮮生地人參茯苓琥珀末張血止脈左大天冬生地人參茯神炙草生白芍女貞旱蓮顧二八脈左堅陰傷失血致咳復脈去參桂姜加白芍凡咳血之脈右堅者治在氣分系震動胃絡所致宜薄味調養胃陰如生扁豆茯神北沙參苡仁等類左堅者乃肝腎陰傷所致宜地黃阿膠枸杞五味等類脈弦脅痛者宜蘇子桃仁降香郁金等類成盆盈碗者葛可久花蕊石散仲景大黃黃連瀉心湯一症而條分縷晰從此再加分別則臨症有據矣趙四一虛不肯復謂之損納食不充肌膚臥眠不能著左遇節令痰必帶血脈左細右勁數是從肝腎精血之傷延及氣分倘能節勞安逸僅堪帶病永年損症五六年無攻病之理臟屬陰議平補足三陰法人參山藥熟地天冬五味女貞張四十失血五六年脈虛氣喘不運不飢治在中下二焦望其安穀精生勿許攻病為上人參炙草白芍茯神炒熟地五味某二七勞力血復來沖氣咳逆當用攝納為要熟地四錢參三七一錢大淡菜一兩牛膝炭一錢半川斛三錢茯神三錢某四一脈弦脅痛已緩血仍來大淡菜一兩參三七一錢牛膝炭一錢半茯苓二錢川斛三錢小黑穭豆皮三錢某四七失血後咳嗽咽痛音啞少陰已虧耗藥不易治糯稻根鬚一兩生扁豆五錢麥冬三錢川斛一錢半北沙參一錢半茯神一錢半早服都氣丸淡鹽湯下某三四脈虛數失血心悸頭眩大淡菜五錢牛膝炭一錢半白扁豆一兩白茯苓三錢藕節三枚洗糯稻根鬚五錢某四九血來稍緩猶能撐持步履乃稟賦強健者且能納穀陽明未敗可驗而脈象細澀陰傷奚疑北沙參一錢半扁豆一兩參三七一錢半炒麥冬一錢茯神三錢川斛三錢施二二嗆血數發是陽氣過動診脈已非實熱夏至一陰來復預宜靜養迎其生氣秋分後再議生脈六味去丹澤加阿膠秋石蜜丸張脈右弦數左細澀陰損失血後久咳食減便溏熟地炭茯神建蓮五味芡實炒山藥某四三失音咽痛繼而嗽血脈來澀數已成勞怯幸賴能食胃強勿見咳治咳庶幾帶病延年細生地三錢玄參心一錢麥冬一錢半細川斛三錢鮮蓮子肉一兩糯稻根鬚五錢沙三六陰虛血後痰嗽必胃強加谷者陰藥可以效靈形羸食少滋膩久用必更反胃靜養望其漸復熟地炭萸肉五味川斛茯神芡實建蓮山藥馬五六脈左堅右弱木火易燃營液久耗中年春季失血嗽痰由情志鬱勃致傷抑且少食尩羸古語謂瘦人之病慮虛其陰生地阿膠北沙參麥冬茯神川斛某女脈左數側眠嗽血生地阿膠麥冬淡菜生白芍炙草金氏脈細左小促乾咳有血寒熱身痛經水先期漸漸色淡且少此臟陰傷及腑陽奇脈無氣內損成勞藥難驟效生地阿膠牡蠣炙草麥冬南棗盧氏沉著濃厚肝腎之血熟地炭炒杞子炒歸身牛膝炭茯神青鉛砂仁末又照前方去牛膝青鉛加桂圓肉天冬繆二八勞傷血後咳夜熱食少清骨散加生地耿三七久損交節血溢青鉛六味去萸加炒牛膝川斛沖熱童便服某脈細弦數陰分不足痰中帶紅腸風春溫之後再劫津液以致上下失血風淫於內宜鹹寒生地炭阿膠龜膠玄參白芍女貞茯苓穭豆皮陶二二下虛陽動失血陰虛陽升六味去丹澤加阿膠淡菜陳日來寒暄不勻煩勞陽升咳嗆震動絡血上沸診脈左數五心熱知飢納穀議育陰和陽方法生地清阿膠天冬麥冬茯神川斛炒牛膝青鉛童便陳五一形瘦脈促數吸氣如喘痰氣自下上升此屬腎虛氣不收攝失血後有此乃勞怯難愈大症用貞元飲鄒二一內傷驚恐肝腎臟陰日損陽浮引陰血以冒上竅二氣不交日加寒熱骨熱咽乾不寐陰分虛其熱甚於夜阿膠雞子黃湯沈勞動陽升血自左溢阿膠參三七甜北沙參茯神生白扁豆炒麥冬江二二少壯情志未堅陰火易動遺精淋瀝有諸腎水既失其固春木地氣上升遂痰中帶血入夏暨秋胃納不減後天生旺頗好不致勞怯之憂但酒色無病宜節有病宜絕經年之內屏絕必得卻病熟地水制萸肉山藥茯神湖蓮遠志五味黃柏芡實金櫻膏丸陸十六知識太早真陰未充龍火易動陰精自泄痰吐帶血津液被爍幸胃納安穀保養少動宜靜固陰和陽可痊熟地水制萸肉山藥茯苓芡實遠志五味煅牡蠣白蓮鬚蜜丸徐四二心腎精血不安火風陽氣熾失血眩暈心悸溺精若過用心作勞不能復元矣熟地萸肉山藥茯神芡實遠志建蓮五味海參膠彭十七陰虛有遺痰嗽有血誦讀久坐陽升桑葉生扁豆北沙參麥冬霍山石斛生甘草苡仁茯苓吳二八失血在五年前咳頻嘔噦氣自上衝逆乃下元精血之虛非外邪寒熱之咳痰出腥氣亦從下出節欲勿勞力胃壯可免勞怯都氣丸周二七左脈弦數失血後咳嗽音嘶少寐陰虧陽升不潛之候當滋養為主生地炭三錢生牡蠣五錢阿膠一錢半麥冬一錢半茯神三錢川斛三錢周三四屢屢失血飲食如故形瘦面赤稟質木火陰不配陽據說服桂枝治外感即得此恙凡辛溫氣味宜戒可以無妨六味加阿膠龜甲天冬麥冬孫二三形瘦脈數寸口搏指浮陽易動上冒都屬陰精不旺幸胃納尚佳數發不致困頓然須戒酒淡欲怡情靜養水足火不妄動絡血自必寧靜矣六味加龜甲秋石趙二八屢遭客熱傷陰逢夏氣泄吐血下午火升咳嗽液虧陰火自灼胃口尚健安閒絕欲可安熟地萸肉龜甲淡菜膠五味山藥茯苓建蓮蜜丸某內經分上下失血為陰絡陽絡是腑絡取胃臟絡論脾今飲食甚少柔膩姑緩上下交病治在中焦其午火升煩嗽亦因血去陰傷以胃藥從中鎮補使生氣自充也人參茯苓白朮炙草扁豆白芍山藥又因觸脅氣閃絡血復上過戌亥時自緩早上診脈細促無神左目珠痛假寐喉息有音足脛冰冷皆血冒不已孤陽上升從肝腎引陽下納法人參熟地炭炒杞子茯神淡菜炒牛膝四服又每下午戌亥少陰厥陰龍相上越絡中之血隨氣火上升考五行之中無形有聲莫如風火此皆情志之變動必須陽潛陰固方免反復也人參河車膠大熟地五味炒杞子茯苓炒牛膝倘嗆逆有聲加青鉛喉癢痛加阿膠秋石火升用秋石湯煎藥加女貞子便秘加咸蓯蓉柏子仁血止幾日或涉思慮惱怒復有脅痛減食不甘乃少陽木火犯脾當泄膽益土用四君加丹皮桑葉徐二六脈左垂右弦陰精不足胃納亦少初冬痰中見紅冬春寐有盜汗難藏易泄入夏當防病發諸凡節勞安逸經年可望安康熟地阿膠五味萸肉秋石山藥茯神川斛旱蓮草膏丸又脈左細數肉消肌爍氣衝咳嗽嘔吐失血是肝腎內損下元不主納氣厥陽上冒所致非肺咳矣當交夏氣升血溢姑以鎮納望其血止青鉛六味加牛膝白芍又脈兩手已和惟煩動恍惚欲暈議靜藥益陰和陽三才湯加金箔葉講誦煩心五志之陽皆燃恰值芒種節陰未來復陽氣升騰絡中血不寧靜隨陽泄以外溢午後上竅煩熱陰不戀陽之徵致頭中微痛主以和陽鎮逆生地阿膠牛膝炭生白芍茯神青鉛杜二七脈小數入尺澤夏季時令發泄失血形倦治宜攝固下焦熟地萸肉山藥茯神建蓮五味芡實線魚膠金櫻膏丸蘇三九脈左堅冬令失血能食而咳脊痛腰痠乃腎臟不固少納腎脈虛餒五液不承寐則口乾喉燥宜固陰益氣固本丸加阿膠芡實蓮肉丸潘二二形色充偉脈長關搏述冬季衂血痰血交夏不病蓋夏月藏陰冬月藏陽陽不潛伏升則血溢降則遺精乃稟陽體而性情喜動之累耳生地熟地天冬麥冬龜腹甲心秋石龍骨遠志梅二九性情過動失血失血貴寧靜不宜疏動疏動則有泛溢之虞瘦人陽有餘陰不足補陰潛陽法補陰丸某五十脈數咳血曾咯腥痰若作肺癰體質木火因煩勞陽升逼肺肺熱不能生水陰愈虧而陽愈熾故血由陽而出也當金水同治為主熟地四兩生地二兩天冬二兩麥冬二兩茯神二兩龜版三兩海參膠二兩淡菜膠二兩川斛膏四兩女貞一兩半北沙參二兩旱蓮草一兩半膠膏丸鄒二四向有失血是真陰不旺夏至陰生伏天陽越於表陰伏於裡理宜然矣無如心神易動暗吸腎陰絡脈聚血陽觸乃溢陰伏不固隨陽奔騰自述下有衝突逆氣血湧如泉蓋任脈為擔任之職失其擔任衝陽上衝莫制皆腎精肝血不主內守陽翔為血溢陽墜為陰遺腰痛足脛畏冷何一非精奪下損現症經言精不足者補之以味藥味宜取質靜填補重者歸下莫見血以投涼勿因嗽以理肺若此治法元海得以立基衝陽不來犯上然損非旬日可復須寒暑更遷凝然不動自日逐安適調攝未暇縷悉也人參三錢熟地炒鬆成炭四錢冷水洗一次鮮河車膏一錢和服茯苓一錢半炒黑枸杞子一錢半北五味一錢研沙苑一錢半紫石英五錢生研血脫益氣用人參熟地兩儀煎方謂人參同陰藥則補陰茯苓入陽明能引陰藥入於至陰之鄉河車血肉溫養同石英收鎮衝脈兼以包固大氣之散越五味酸收領其氣液枸杞溫潤同沙苑之松靈入肝絡參方中之藥應乎取味況肝腎之病同一治也劉二十脈左數入尺是真陰下虧先有血症畢姻後血復來下午火升嗆咳陰中陽浮保扶胃口以填陰阿膠淡菜生扁豆麥冬炙草茯神婁二八思慮太過心陽擾動吸傷腎陰時時莖舉此失血皆矯陽獨升夜不得寐歸家談笑怡情可安人中白龜腹甲知母黃柏錢交夏陽氣大升陰根失涵火升血溢必在晡刻沖年大忌身心少持必使陽和陰守為要生地阿膠淡菜牛膝炭茯神川斛某口氣腥臊血色渾濁下元無根恐難接續還元事已至急與王先生同議攝陰陽法人參川熟附熟地五味炙草青鉛某脈動極無序血湧如泉汗出畏冷少焉熱躁此無根之陽上冒血凝成塊非涼藥可止熟地炭生龍骨茯神五味潯桂生白芍鹽水炒牛膝又人參生龍骨熟地炭茯神炒杞子五味華二五陽動失血皆系陰虧如心悸咽乾咳嗽都是陽浮上亢必久進填實臟陰斯浮越自和面亮油光皆下虛少納都氣加龜版人乳粉蜜丸徐陰根愈薄陽越失交初夏發泄血湧吸短心腹皆熱豈止澀之藥可療益氣攝陰乃據理治法人參熟地五味子羅上年脅痹已屬絡傷今夏四月陽氣升發絡中血沸上溢陰分熱蒸下午乃甚喉癢而嗆心中嘈雜肝風內震顯然陰虛肝風動鮮生地阿膠丹參鹽水炒牛膝女貞子川斛童便龔咳嗽繼以失血經言三焦皆傷喉痛失音乃陰液無以上承厥陽燔燎不已病深難於奏功憑理而論鎮胃制肝乃和陽熄風之義淮小麥南棗阿膠茯苓北沙參天冬陸脈數血後咳甚痰腥肢腫陽升內風鼓動最屬難治生地阿膠天冬麥冬生白芍茯神沈味進辛辣助熱之用致肺傷嗽甚其血震動不息陽少潛伏而夜分為甚清氣熱而不妨胃口甘寒是投與內經辛苦急急食甘以緩之恰符生甘草玉竹麥冬川貝沙參桑葉又肝陽易逆內風欲沸不得著左臥惡辛氣喜甘潤治肝體用潤劑和陽生地阿膠天冬茯神牡蠣小麥羅十九血去絡傷陽氣上蒸胸脅微痛非有形滯濁脈得左關前動躍如浮頭中微暈陽氣化風何疑鮮生地玄參心麥冬地骨皮知母川斛又左脈形略斂仍堅微暈喉燥脘痛熱蒸陽明津衰厥陰陽風自動而胃氣欲逆大便不爽是其明徵熄風和陽必用柔緩少佐宣暢脘氣亦暫進之法鮮生地麥冬火麻仁桑葉鬱金生香附汁又復脈去參薑桂加白芍某血後氣衝形寒法當溫納血後沖氣上逆茯苓三錢粗桂枝八分炙草五分五味七分何早晨未進飲食咳逆自下焦上衝有欲嘔之象虛里左脅呼吸牽引震動背部四肢寒冷入暮心腹熱灼而舌上干辣夫陽虛生外寒陰虛生內熱陽屬腑氣主乎外衛陰屬臟真主乎內營由絡血大去新血未充穀味精華不得四布知味容納而健運未能自然脅右少舒全系胃絡下焦陰精損傷中焦胃陽不振夏至初陰不主來復交節絡血再動總是既損難以驟復之徵大意下焦陰陽宜潛宜固中焦營衛宜守宜行用藥大旨如此至於潛心滌慮勿擾情志再於子午參以靜功俾水火交陰陽偶是藥餌已外工夫皆培植生氣之助陰陽血虛養營湯去黃耆遠志又自服養營湯溫補足三陰臟法半月來諸症皆減惟午余心腹中熱未罷凡精血久損理必質重味厚填納空隙只因中焦運納不旺況長夏時令熱最耗氣議早進通陽守陰晚用益中消暑冀其生旺非攻病也午服生脈散早服人參熟地杞子當歸蓯蓉肉桂茯神五味某嫗操持怫鬱五志中陽動極失血嗆咳有年皆緣性情內起之病草木難以奏安今形色與脈日現衰憊系乎生氣克削慮春半以後地氣升陽氣泄久病傷損里真少聚冬春天冷主藏總以攝補足三陰臟扶持帶病延年就是人工克盡矣人參炒白芍熟地炭五味炙草建蓮馬四五閱病原是腎虛嗽血年分已久腎病延傳脾胃遂食減腹膨病是老勞難以速功行走喘促元海無納氣之權莫以清寒理嗽急急收納根蒂久進可得其益陰陽並虛腎氣上逆人參人乳粉坎炁枸杞沙苑五味茯苓胡桃宋臟脈附背督脈行身之背足少陰真氣不攝唾中有血吸氣少入而腰脊酸楚寐泄魄汗皆真氣內損若加嗔怒再動肝陽木火劫爍脂液春木日旺調之非易水制熟地蜜炙五味女貞茯神川斛炒山藥芡實湖蓮袁三六下虛當春升之令形耎無力嗽血復來以甘溫厚味養其陰中之陽陰中陽虛枸杞沙苑歸身炭牛膝巴戟精羊肉錢一陽初萌血症即發下焦真氣久已失固亡血後飲食漸減咳嗽則脘中引痛沖氣上逆乃下損及中最難痊愈擬進攝納方法下損及中人參熟地五味茯神川斛紫衣胡桃調入鮮河車膠王十七少年陰火直升直降上則失血咳逆下墜肛瘍延漏皆虛勞見端食減至半胃關最要非可見熱投涼以血嗽泥治熟地炭建蓮霍石斛茯神炒山藥芡實某三二診脈數澀咳血氣逆晨起必嗽得食漸緩的是陰損及陽而非六氣客邪可通可泄法當養胃之陰必得多納穀食乃治此損之要著生扁豆五錢北沙參一錢半麥冬一錢半川斛三錢生甘草三分茯神三錢南棗肉一錢半糯稻根鬚五錢鄭二八虛損四五年肛漏未愈其咳嗽失血正如經旨陰精不主上奉陽氣獨自升降奈何見血投涼治嗽理肺病加反復胃困減食夫精生於穀中土運納則二氣常存久病以寢食為要不必汲汲論病生黃耆黃精訶子肉白芨苡仁南棗淡水熬膏不用蜜收略飢用五錢參湯送某五五向衰之年夏四月時令陽氣發泄遇煩勞身中氣泄絡血外溢臟液少涵遂痰嗽不已俗醫見嗽愈投清肺滋陰必不效驗此非少年情欲陰火之比必當屏煩戒勞早進都氣晚進歸脾平補臟真再用嗽藥必然胃減脾腎兼虛姜十九自上年冬失血漸形減氣弱精血內損不肯再復延成勞怯填養精血務在有情庶幾不奪胃氣腎胃兼虛人參鮮河車膠水制熟地五味茯神山藥芡實黑殼建蓮顧二六失血血形濃厚必自下先傷胃減無力氣分亦損此陰藥中必兼扶胃非沉滯清寒所宜人參熟地建蓮芡實山藥茯苓邵六八脈堅形瘦久咳失血有年食物厭惡夜寢不適固以培本為要所服七味八味湯丸乃肝腎從陰引陽法服之不效此液虧不受桂附之剛當溫養攝納其下兼與益胃津以供肺晨服熟地蓯蓉杞子五味胡桃肉牛膝柏子仁茯苓蜜丸晚服人參麥冬五味炙草茯苓鮮蓮子山藥胡四三冬季失藏吐血四月純陽升泄病不致發已屬萬幸其痰嗽未宜窮治用藥大旨迎夏至一陰來復兼以扶培胃氣為要人參熟地麥冬五味茯苓山藥王十八沖年形瘦腹脹食減便溏自上秋失血以來日加孱弱脈左堅右澀雖陰虛起見而中焦為急此非小恙勞傷中氣虛人參茯苓炙草白芍廣皮厚朴席半月前恰春分陽氣正升因情志之動厥陽上燔致咳震動絡中遂令失血雖得血止診右脈長大透寸部食物不欲納寐中呻吟囈語由至陰損及陽明精氣神不相交合矣議斂攝神氣法人參茯神五味棗仁炙草龍骨金箔又服一劑自覺直入少腹腹中微痛逾時自安此方斂手少陰之散失以和四臟不為重墜至於直下者陽明胃虛也脈緩大長肌膚甲錯氣衰血虧如繪姑建其中參耆建中湯去姜又照前方去糖加茯神又診脾胃脈獨大為病飲食少進不喜飲水痰多嗽頻皆土衰不生金氣金匱謂男子脈大為勞極虛者亦為勞夫脈大為氣分泄越思慮鬱結心脾營損於上中而陽分萎頓極虛亦為勞為精血下奪肝腎陰不自立若脈細欲寐皆少陰見症今寢食不安上中為急況厥陰風木主令春三月木火司權脾胃受戕一定至理建中理陽之餘繼進四君子湯大固氣分多多益善徐四八因積勞久嗽見血是在內損傷先聖曰勞者溫之損者益之溫非熱藥乃溫養之稱甘補藥者氣溫煦味甘甜也今醫見血投涼見嗽治肺最多予見此治法胃口立即敗壞者不少歸脾去木香黃耆加杞子杜二八積勞思慮內損失血久病秋季再發乃夏暑氣泄勞則氣愈泄不收絡空動沸此與陰虛有別色脈胃減涼降非法人參建中湯龐血大去則絡脈皆空其傷損已非一腑一臟之間矣秋分寒露天氣令降身中氣反升越明明裡不肯收攝虛象何疑今診脈弱濡澀肢節微冷氣傷上逆若煙霧迷離熏灼喉底故作嗆逆大旨以上焦宜降宜通下焦宜封宜固得安穀崇土再商後法人參炒黑杞子炒黑牛膝茯神生苡仁炒山藥又血止納穀甚少不飢泄瀉此脾胃大困陰火上觸面赤忽嘈先理中宮必得加餐為主大忌寒涼治嗽再伐脾胃生氣人參茯神新會皮山藥炙草炒白芍又脈右濡左未斂人參茯神熟術廣皮南棗又左脈靜而虛右如數初進穀食宜培中宮霜降後五日以丸劑攝下人參茯神熟術廣皮南棗炒白芍炙草陳脈如數痰嗽失血百日來反復不已每咳嘔而汗出此屬氣傷失統絡血上泛凡寒涼止血理嗽不但敗胃妨食決無一效從仲景元氣受損當進甘藥冀胃土日旺柔金自寧黃耆生白芍五味炙草南棗飴糖某勞傷嗽血生黃耆皮三錢茯苓三錢炙黑甘草五分黃精三錢南棗三錢錢四一形神積勞氣泄失血食減喘促由氣分陽分之傷非酒色成勞之比黃耆建中湯去薑桂陸脈細形瘦血後久咳不已復加喘促緣內損不肯充復所投藥餌肺藥理嗽居多當此天令收肅根蒂力怯無以攝納陰乏戀陽多升少降靜坐勉可支撐身動勃勃氣泛所納食物僅得其悍氣未能充養精神矣是本身精氣暗損為病非草木攻滌可卻山林寂靜兼用元功經年按法使陰陽漸交而生生自振徒求諸醫藥恐未必有當建中湯去姜加茯苓董三六此內損症久嗽不已大便不實夏三月大氣主泄血吐後肌肉麻木骨痿痠疼陽明脈絡不用治當益氣大忌肺藥清潤寒涼黃耆炙草苡仁白芨南棗米糖李三一飲酒少谷中氣先虛酒力溫散助熱絡血隨熱氣以上沸血止之後頓然食減脘痞顯是中氣已困敗靜坐稍舒煩言咳急當以調中為急若見血見咳即投寒涼清陽愈傷日就敗壞矣雖酒客忌甘然救其苦寒藥傷勿拘此例戊己去朮加南棗王二八脈耎形勞失血小建中加玉竹顧二八勞心神耗營損上下見血經年日衰今勉納穀不飢中焦因不至運滋陰清肺更令傷中無卻病好藥欲冀其安須山居靜養寒暑無害方得堅固異功散錢二七形瘦脈左數是陰分精奪自述談笑或多或胃中飢虛必沖氣咳逆前年已失血盈碗此下損精血有形難復以略精飲食氣返不趨急以甘藥益胃中流砥柱病至中不可緩矣人參茯神炙草山藥許四八勞倦傷陽形寒失血咳逆中年不比少壯火亢之嗽血黃耆建中湯徐二九奔走五日即是勞力動傷陽氣血從右起夜有冷汗乃陽絡空隙而泄越矣凡治吐血之初多投涼血降氣以冀其止孰知陽愈滲泄益增病劇屢矣黃精黃耆炙草苡仁茯神汪肝風鴟張胃氣必虛酒客不喜柔膩肌柔色嫩質體氣弱清明春木大旺理必犯土急宜培養中宮中有砥柱風陽不得上越而血可止矣人參炒黃耆炒山藥茯苓炒白芍炙草朱二二秋暑失血初春再發診脈右大頗能納食金匱云男子脈大為勞極虛者亦為勞要之大者之勞是煩勞傷氣脈虛之勞為情欲致損大旨要病根驅盡安靜一年可愈生黃耆北沙參苡仁炙草白芨南棗某勞力煩心失血早食則運暮食飽脹疏補調中方人參茯苓炙草生穀芽廣皮白芍馮四五脈弦勁按之空豁久嗽先有瀉血大便不實近又嗽血是積勞久損陰陽兩虧今食不欲餐先宜甘溫益氣但貧窘患此參苓未能常繼斯為難調人參黃耆茯苓炙草苡仁白芨許四四頻頻傷風衛陽已疏而勞怒亦令陽傷此失血症當獨理陽明胃壯則肝犯自少脈右空大可證若三陰之熱蒸脈必參於左部胃陽虛衛疏人參一錢黃耆三錢炙草五分煨姜一錢南棗二錢又甘溫益胃血止五日食腥嗔怒血咳復來不獨衛陽疏豁絡脈空動若谷豈沉寒堵塞冀獲片時之效倘胃口拒納無法可投按脈微澀議治心營肺衛人參黃耆炙草南棗白芨茯神棗仁湯二三脈細促右空大爪甲灰枯久嗽入春夏見紅食減身痛形容日瘁是內損難復與養營法營虛人參炒白芍歸身炙草桂枝木廣皮煨姜南棗丁二七夏季痰嗽入冬失血自述晝臥安逸微寒熱不來則知二氣已損傷身動操持皆與病相背脈大無神面無膏澤勞怯不復元大著溫養甘補使寢食兩安若以痰嗽為熱日餌滋陰潤肺胃傷變症調之無益歸耆異功散陳二八失血前後心痛歸建中去姜某形瘦色枯脈濡寒熱失血心悸是營傷歸耆建中去姜某脈芤汗出失血背痛此為絡虛人參炒歸身炒白芍炙草棗仁茯神某氏失血半年心悸忡脅下動絡脈空隙營液損傷議甘緩辛補枸杞柏子仁棗仁茯神炙草桂圓又生地阿膠小麥廣三七烏賊骨菟絲子茯神扁豆夜服三錢徐四九館課之勞心脾營傷食酸助木中土更虧春陽主升血乃大吐況茹素既久當培土營陰損極熱自內熾非實火也歸脾湯去參陳二三先患失血復遭驚駭平素有遺泄獨處囈語是有形精血無形神氣交傷漫言治痰治血真粗工卑陋矣補精宜填安神宜靜然無形真氣為要與心脾二經主治人參一錢半當歸一錢半茯神三錢棗仁三錢遠志七分炙草三分桂圓二錢龍齒二錢金箔五張衝入宓遇節血症反復脈弱廢食脅痛胃耎無治咳止血之理扶得胃口受納可商調理人參炙黃耆當歸炭棗仁茯神炙草桂圓肉又歸脾去木香遠志加枸杞子關三二思郁傷於心脾二臟主乎營血營出中焦臟陰受損陰虛生熱熏蒸絡脈致血不寧靜食少痰多色澤少華皆虛象也不宜久進涼潤嗽藥當以錢氏異功散間進歸脾湯減木香馬六七上秋下血今年湧血飲橘餅湯甘辛心中如針刺營枯液耗不受辛藥但以甘藥柔劑與心脾有益人參黃精茯神柏子仁炙草南棗某老弱虛咳失血生黃耆皮歸身煨姜大棗馮診脈左手平和尺中微動右手三部關前動數尺脈帶數夜臥不寐咳嗆有血晝日咳嗆無血但行走微微喘促夫陰陽互為樞紐隆冬天氣藏納緣煩心勞神五志皆動陽不潛伏當欲寐之時氣機下潛觸其陽氣之升衝脈升動絡中之血未得寧靜隨咳嗆溢於上竅至於步趨言談亦助其動搏氣火此咳嗆喘息失血同是一原之恙當靜以制動投藥益水生金以制君相之火然食味宜遠辛辣熱燥凡上實者必下虛薄味清肅上焦正謂安下令其藏納也愚見約方參末俟裁勞心過度陽升生扁豆一兩勿碎麥冬二錢川斛一錢半上阿膠二錢小根生地二錢真北沙參一錢半又診脈同前述心中怯冷交四更咽中干咳嗆連聲必血已盈口論心營肺衛皆在上焦更擬斂心液滋肺津一法炒棗仁五錢勿研鮮生地三錢天冬一錢炒麥冬一錢茯神一錢半黑牛膝一錢半茜草一錢參三七一錢磨沖又熟地四錢生地二錢天冬一錢麥冬一錢北沙參三錢茯神一錢臥時服天王補心丹查二十舌辣失血易飢心營熱生地玄參連翹心竹葉心丹參鬱金汁陳血止脈兩寸未和仍議心營肺衛方生地生扁豆麥冬北沙參丹參茯苓陳夜熱邪迫血妄行議清營熱犀角鮮生地丹皮白芍邵營熱失血生地竹葉心玄參丹參川斛茯神王二十脈右大失血知飢胃陽上逆咽乾喉癢胃陰虛生地扁豆玄參麥冬川斛新荷葉汁某四九脈右澀初氣衝失血咳逆能食無味血來潮湧乃陽明胃絡空虛血隨陽升而然法當填中為要著莫見血治咳而用肺藥斯症可圖正在此歟大淡菜一兩生扁豆五錢麥冬三錢川斛三錢茯神三錢牛膝炭一錢半陶十六色黃脈小數右空大咳嘔血溢飲食漸減用建中旬日頗安沐浴氣動血咳復至當以靜藥養胃陰方金匱麥門冬湯去半夏郭脈右部不鼓擊應指惟左寸數疾昨晚失血之因因於傴僂拾物致陽明脈絡血升今視面色微黃為血去之象不宜涼解妨胃仿古血脫必先益氣理胃又宜遠肝人參秋石水拌烘黃耆阿膠茯神炙草生白芍王三六腸紅愈後吐血一兩月必發此陽明胃絡氣血皆多故吐後寢食如昔久發陰虧仍有內損之憂宜養肺胃之陰以和陽生黃耆北沙參麥冬生甘草茯神元米湯煎程二七吐血數發肢震面熱汗出寐中驚惕蓋陽明脈絡已虛厥陰風陽上熾飲食不為肌膚皆消爍之徵也生黃耆北沙參生牡蠣麥冬小麥南棗程二一脈左小數右弦食減不肌易於傷風大便結燥冬春已見血症夫胃陽外應衛氣九竅不和都屬胃病由冬失藏聚發生氣少遇長夏熱蒸真氣漸困故也急宜絕欲靜養至秋分再議參鬚黃耆皮鮮蓮子茯神炒麥冬生甘草某著右臥眠喘咳更甚遇勞動陽痰必帶血經年久嗽三焦皆病麥門冬湯華三八勞怒用力傷氣動肝當春夏天地氣機皆動病最易發食減過半熱升沖咽血去後風陽皆熾鎮養胃陰勿用清寒理嗽生扁豆沙參天冬麥冬川斛茯神又沖氣攻腹繞喉乃肝膽厥陽肆橫久久虛損而嘔痰減食皆犯胃之象若不靜養經年必甚甜北沙參生白扁豆生黃耆皮茯神炙草白糯米半升泡清湯煎藥徐陰臟失守陽乃騰越咳甚血來皆屬動象靜藥頗合屢施不應乃上下交徵陽明絡空隨陽氣升降自由先以柔劑填其胃陰所謂執中近之金匱麥門冬湯去半夏加黃耆某五九失血後咳嗽不飢此屬胃虛宜治陽明甜北參生扁豆麥冬茯神川斛陸食酸助木胃土受侮脘中陽逆絡血上溢內經辛酸太過都從甘緩立法谷少氣衰沉苦勿進生扁豆北沙參炒麥冬茯苓川斛甘蔗漿又甘涼養胃中之陰痰少血止兩寸脈大心煩脊熱汗出營熱氣泄之徵議用竹葉地黃湯鮮生地竹葉心炒麥冬建蓮肉川斛茯神陶四一兩年前吐血咳嗽夏四月起大凡春盡入夏氣機升泄而陽氣弛張極矣陽既多動陰乏內守之職司絡血由是外溢今正交土旺發泄欲病氣候急養陽明胃陰夏至後兼進生脈之屬勿步趨於炎熇烈日之中可望其漸次日安金匱麥門冬湯去半夏王二八見紅兩年冬月加嗽入春聲音漸嘶喉舌乾燥診脈小堅厚味不納胃口有日減之虞此甘緩益胃陰主治麥冬雞子黃生扁豆北沙參地骨皮生甘草盧四四脈大色蒼冬月嗽血納穀減半迄今乾咳無痰春夏間有吐血夫冬少藏聚陽升少制安閒靜養五志氣火自平可望病愈形瘦谷減當養胃土之津以生金甜北參麥冬玉竹木瓜生扁豆生甘草某二二脈右大左虛夏四月陽氣正升煩勞過動其陽絡中血溢上竅血去必陰傷生熱宜養胃陰大忌苦寒清火北沙參生扁豆麥冬生甘草茯神川斛某二九脈搏血湧飢易納食風陽過動而為消爍若不自保攝餌藥無益生地天冬丹參茯苓生扁豆川斛倪三一陽明脈弦空失血後咽痹即嗆是納食雖強未得水穀精華之遊溢當益胃陰北沙參生扁豆麥冬杏仁生甘草糯米湯煎徐三一失血能食痰嗽色蒼脈數可與甘涼養胃中之陰胃和金生痔血便躁柔藥最宜生扁豆生地天冬麥冬銀花柿餅灰側柏葉某失血咽乾穭豆皮三錢丹參一錢麥冬一錢半川斛一錢半藕汁一小杯陳胃虛客氣上逆為呃噫痰帶血星咽中微痛姑擬鎮攝法胃虛氣逆人參熟地炭五味茯神青鉛又照前方去青鉛加麥冬川斛遠志炭孫三五脈小弦血去食減服地黃柔膩反覺呆滯且不喜肥甘議兩和肝胃肝胃不和蘇子茯苓金石斛降香鉤藤黑山梔蔡三九新沐熱蒸氣泄絡血上溢出口平昔痰多又不渴飲而大便頗艱此胃氣不得下行為順之旨兼以勞煩嗔怒治在肝胃金石斛紫降香炒桃仁橘紅苡仁茯苓萬脈數左堅當夏四月陽氣方張陡然嗔怒肝陽勃升絡血上湧雖得血止而咳逆欲嘔眠臥不得欹左此肝陽左升太過木失水涵陰虧則生熱是皆本體陰陽迭偏非客邪實火可清可降之比最宜恬澹無為安靜幽閒經年不反可望轉偏就和但圖藥治胃減損怯矣經云胃咳之狀咳逆而嘔木犯胃土貫膈即至沖咽入肺肺衰木反刑金從內經甘緩以制其急米炒麥冬糯稻根鬚女貞子茯神生甘草南棗肉又乙癸同治益胃養陰人參秋石湯洗烘乾為末生地熟地天冬麥冬以人參末收實某血去胃傷當從中治況五年前勞怒而得病肝木無不剋土醫者溫補競進氣壅為脹至夜咽乾無寐食物不思杳不知味為嘔為咳全是胃陽升逆經云胃不和則臥不安而陽不潛降似屬濁氣膠痰有形之物阻撓升降而然古人有二虛一實當先治實以開一面之文余從胃病為主制肝救中理氣清膈乃不足中有餘圓通之治此機勿得亂治人參枳實半夏杏仁甘草竹茹生薑大棗李暴怒肝陽大升胃絡血湧甚多已失氣下行為順之旨仲淳吐血三要云降氣不必降火目今不飢不納寒膩之藥所致炒蘇子降香汁山梔炒山楂鬱金茯苓川斛丹參某左脈細堅搏指肝陽逆失血汗熟地五味炙草牛膝白芍桂心童便沖李氏脈細小如無素多鬱怒經來即病冬月胃痛隨有咯血不止寒戰面赤驚惕頭搖顯是肝陽變風絡血沸起四肢逆冷真炁衰微內經有肝病暴變之文勢豈輕渺議用景岳鎮陰煎法制其陽逆仍是就下之義熟地炭牛膝炭肉桂茯神生白芍童便又經來血止肝病何疑炒楂肉當歸炒延胡澤蘭桃仁茯苓沈氏血後久咳脘痛食減經閉便溏擬進疏泄肝氣肝氣蘇子炒丹皮桃仁鬱金鉤藤白芍蔡三七水寒外加驚恐內迫陰瘧三年繼患嗽血迄今七年未有愈期詢及血來紫塊仍能知味安穀參其瘧傷驚傷必是肝絡凝瘀得怒勞必發勿與酒色傷損亂投滋陰膩濁之藥恐胃氣日減致病漸劇血絡痹阻桃仁三錢鱉甲三錢川桂枝七分歸鬚一錢大黃五分茺蔚子二錢柴二五勞傷寒暖不勻脅痛嗽血食物不減宜降氣和絡蘇子茯苓降香橘紅桔梗苡仁韭白汁陸交春分前五日肝木升旺之候涎血大吐胸脘不爽此久鬱氣火灼熱神志失守遂多驚恐絡中之血隨火升氣逆而上當先降其氣不宜寒苦礙阻蘇子降香丹參楂肉桃仁鬱金茯苓黑梔皮吳脈澀能食咳血降香桃仁鬱金蘇子炒山楂苡仁韭白汁衝入姚四五此勞傷身動失血脅有瘕聚因咳甚而血來先宜降氣蘇子苡仁茯苓黑山梔丹皮降香荊芥炭牛膝炭藕汁吳三四形畏冷寒熱左脅有宿痞失血咳嗽曾驟勞力經年尩羸藥不易效旋覆花新絳歸鬚炒桃仁柏子仁茯神何三七左乳傍脅中常似針刺汗出心嘈能食此少陽絡脈陽氣燔灼都因謀慮致傷將有絡血上湧之事議清絡宣通勿令瘀著生地丹皮澤蘭葉桃仁鬱金琥珀末又服通絡方瘀血得下新血亦傷嘈雜善飢陽亢燔灼營陰不得涵護也仍以和陽熄風方法阿膠雞子黃生地麥冬生甘草生白芍王二十吐血後不飢胸背痛蘇子桔梗鬱金蔞皮山梔皮降香羅十八因左脈堅搏兩投柔劑和陽益陰血未得止而右胸似痞左脅中刺痛此少陽絡脈經由之所夫膽為清淨之腑陰柔滋養未能宣通絡中是痛咳未罷議以辛潤宣暢通劑桃仁丹皮歸鬚柏子仁澤蘭降香末又照前方去降香末澤蘭加黑山梔皮又辛潤痛嗽皆減略進苦降脅右皆痛不但絡空氣分亦餒古人以身半以上為陽原無取乎沉苦桃仁柏子仁鮮生地玄參鮮銀花程四一脈左弦右小濡據病原起於憂鬱鬱勃久而化熱蒸迫絡脈血為上溢凝結成塊者離絡留而為瘀也血後納食如昔是腑絡所貯頗富況腑以通為用血逆氣亦上並漉漉有聲皆氣火旋動非有形質之物凡血病五臟六腑皆有是症當清陽明之絡為要至於病發當治其因又不必拘執其常也枇杷葉苡仁茯苓蘇子桑葉丹皮炒桃仁降香末某二八努力咳血胸背悉痛當用仲淳法蘇子降香汁炒丹皮苡仁冬瓜仁炒桃仁牛膝川貝母某冬令過溫人身之氣不得潛藏陰弱之質血隨氣逆診得陽明脈動吐出瘀黑絡中離位之血尚有未可以止澀為事生地丹參丹皮降香桃仁牛膝韭汁童便沖某肝逆失血蘇子鬱金降香汁炒丹皮鉤藤赤芍丹參茯苓白糯米湯煎侯十九胃脘當心肝經交絡所過上布於肺咳嗽胃旁作酸腹䐜脹絡氣逆也當慮失血脈數能食宜和絡氣生地桃仁桑葉丹皮麥冬茯神陳二七吐血八日脘悶脅痛肢冷絡傷氣窒先與降氣和血血絡痹胸脅痛蘇子鬱金杏仁茯苓桃仁降香翁二二問誦讀靜坐痰血夏發入冬不已胸脅痛引背部脈小微澀非欲傷陰火夫痛為絡脈失和絡中氣逆血上宗仲淳氣為血帥蘇子苡仁茯苓山楂桑葉丹皮降香末老韭白江診脈數涕有血嗽痰冷熱外因動肺緣素患肝痹左脅不耐臥著恐陽升血溢微用苦辛泄降不宜通劑黑山梔桑葉花粉知母栝蔞皮降香沈左脅岑脹攻觸作楚咳痰帶血無非絡中不得寧靜姑進降氣通絡方降香汁蘇子苡仁茯苓橘紅鉤藤白蒺韭白汁又脈右長嗆血仍宜降氣蘇子苡仁茯苓山梔丹皮鉤藤鬱金金二九飢飽勞力氣逆血瘀胸痛頻吐此液耗陽升上逆不已血無止期先宜降氣通調莫與膩塞蘇子降香桃仁丹參韭白汁山梔茯苓某四一脈弦失血脅痛氣逆枇杷葉三錢冬瓜子三錢蘇子一錢苡仁三錢炒丹皮一錢桃仁三錢降香汁八分牛膝炭一錢半方四二憂思怫鬱五志氣火內燔加以煙辛泄肺酒熱戕胃精華營液為熱蒸化敗濁經云陽絡傷則血外溢蓋胃絡受傷陽明氣血頗富猶勉強延磨歲月至於陽明脈絡日衰斯背先發冷右脅痠疼而咳吐不已胃土愈憊肝木益橫厥陽愈逆穢濁氣味無有非自下泛上大凡左升屬肝右降屬肺由中焦胃土既困致有升無降壅阻交迫何以著左臥眠遏其升逆之威且煩蒸熱灼並無口渴飲水之狀病情全在血絡清熱滋陰之治力量不能入絡茲定清養胃陰為主另進通絡之義肝膽厥陽少和冀其涎少脅通積久沉疴調之非易桑葉丹皮苡仁蘇子鉤藤鬱金降香桃仁又桑葉枇杷葉苡仁大沙參蘇子茯苓鬱金降香又早服瓊玉膏胡六七有年冬藏失司似乎外感熱熾辛散苦寒是有餘實症治法自春入夏大氣開泄日見懨懨衰倦呼吸喉息有聲脅肋窒板欲痛咯嗆紫血絡脈不和議以辛補通調不致寒凝燥結冀免關格上下交阻之累柏子仁細生地當歸鬚桃仁降香茯神石三四先有骨痛鼓慄每至旬日必吐血碗許自冬入夏皆然近僅可仰臥著右則咳逆不已據說因怒勞致病都是陽氣過動而消渴舌翳仍納穀如昔姑以兩和厥陰陽明之陽非徒泛泛見血見嗽為治怒勞血痹石膏熟地麥冬知母牛膝又石膏生地知母丹皮大黃桃仁牛膝蔣六二宿傷怒勞動肝血溢紫塊先以降氣導血蘇子降香末桃仁黑山梔金斛製大黃又天地杞圓加棗仁茯神某形盛脈弦目眥黃咳痰黏濁嘔血此胃有濕熱膠痰因怒勞動肝故左脅中痛血逆而上非虛損也當薄味靜調戒嗔怒百日可卻蘇子降香廣皮白生薑桃仁鬱金金斛六服後接服海粉丸半斤某向有背痛尚在勞力氣逆咳血乃勞傷病也勞力傷歸建中去姜加茯苓某二八努力傷絡失血面黃口中味甜脘中煩悶沖氣病在肝胃勿以失血治以滋膩旋覆花代赭石半夏淡乾薑塊茯苓南棗肉呂二九脈數上出右脅上疼則痰血上溢必因嗔怒努力勞煩致絡中氣阻所致宜安閒靜攝戒怒慎勞一歲之中不致舉發可云病去降香末八分沖炒焦桃仁三錢丹皮一錢野鬱金一錢茯苓三錢黑山梔一錢丹參一錢橘紅一錢吳氏氣塞失血咳嗽心熱至暮寒熱不思納穀此悒鬱內損二陽病發心脾若不情懷開爽服藥無益郁阿膠麥冬茯神白芍北沙參女貞子李氏情志久郁氣逆痰喘入夏咳血都因五志陽升況脘有聚氣二年寡居隱曲不伸論理治在肝脾然非藥餌奏功降香末枇杷葉蘇子鬱金栝蔞皮黑梔皮茯苓苡仁吳氏郁損咳血頻發當交節氣逆嘔吐肢冷厥逆所現俱是虛勞末路豈是佳景勉擬方生白芍烏梅炙草炒麥冬茯神橘紅張氏失血口碎舌泡乃情懷鬱勃內因營衛不和寒熱再熾病郁延久為勞所喜經水尚至議手厥陰血分主治犀角金銀花鮮生地玄參連翹心鬱金失血一症名目不一茲就上行而吐者言之三因之來路宜詳也若夫外因起見陽邪為多蓋犯是症者陰分先虛易受天之風熱燥火也至陰邪為患不過其中之一二耳其治法總以手三陰為要領究其病在心營肺衛如何若夫內因起見不出乎嗔怒鬱勃之激傷肝臟勞形苦志而耗損心脾及恣情縱欲以賊腎臟之真陰真陽也又當以足三陰為要領再審其乘侮制化如何若夫不內不外因者為飲食之偏好努力及墜墮之傷治分臟腑經絡之異要知外因而起者必有感候為先里因而起者必有內症可據此三因根蒂用藥切勿混亂大凡理肺衛者用甘涼肅降如沙參麥冬桑葉花粉玉竹川斛等類治心營者以輕清滋養如生地玄參丹參連翹竹葉骨皮等類以此兩法為宗隨其時令而加減若風淫津涸加以甘寒如蘆根蔗汁薄荷羚羊之品若溫淫火壯參入苦寒如山梔黃芩杏仁石膏之品若暑逼氣分佐滑石鮮荷之開解在營與銀花犀角之清芳秋令選純甘以清燥冬時益清補以助藏凡此為外因之大略所云陰邪為患者難以並言也舊有麻黃人參芍藥湯先生有桂枝加減法至於內因傷損其法更繁若嗔怒而動及肝陽血隨氣逆者用繆氏氣為血帥法如蘇子鬱金桑葉丹皮降香川貝之類也若鬱勃日久而傷及肝陰木火內燃陽絡者用柔肝育陰法如阿膠雞黃生地麥冬白芍甘草之類也若勞煩不息而偏損心脾氣不攝血者用甘溫培固法如保元湯歸脾湯之類也若縱欲而竭其腎真或陽亢陰勝或陰傷陽越者有從陰從陽法如青鉛六味肉桂七味並加童便之類也若精竭海空氣泛血湧者先生用急固真元大補精血法如人參枸杞五味熟地河車紫石英之類也凡此為內因之大略至於不內不外因亦非一種如案中所謂煙辛泄肺酒熱戕胃之類皆能助火動血有治上治中之法如葦莖湯甘露飲茅根藕汁等劑在人認定而用之可也墜墮之傷由血瘀而泛大抵先宜導下後宜通補若努力為患屬勞傷之根陽動則絡松血溢法與虛損有間滋陰補氣最忌凝澀如當歸建中湯旋覆花湯虎潛丸金剛四斤丸取其有循經入絡之能也凡此為不內外因之大略但血之主司者如心肝脾三臟血之所生化者莫如陽明胃腑可見胃為血症之要道若胃有不和當先治胃也仁齋直指云一切血症經久不愈每每以胃藥收功想大黃黃連瀉心湯犀角地黃湯理中湯異功散雖補瀉寒溫不同確不離此旨所以先生髮明治胃方法獨多有薄味調養胃陰者如金匱麥冬湯及沙參扁豆茯神石斛之類有甘溫建立中陽者如人參建中湯及四君子加減之類有滋陰而不礙胃甘守津還者如復脈湯加減之類其餘如補土生金法鎮肝益胃法補脾疏胃法寧神理胃法腎胃相關法無分症之前後一遇胃不加餐不飢難運諸候每從此義見長源源生化不息何患乎病之不易醫也邵新甫徐評此老治血症其議論大端不信於古而用藥全然不知此等醫案貽誤後人不可紀極無容不辯其大犯在用麥冬五味玉竹沙參夫麥冬乃補肺之重劑肺氣虛極氣不能續則用之以補肺氣然仲景往往與半夏同用如麥門冬湯竹葉石膏是也蓋防其窒膩耳若吐血咳嗽乃肺家痰火盤踞之病豈宜峻補從此無愈日矣至五味之酸一味收斂仲景用之以治上氣咳逆肺脈不合之症然必與乾薑同用以辛散寒邪從無獨用者今吐血之嗽火邪入肺痰凝血湧惟恐其不散不降乃反欲其痰火收住肺中不放一毫出路是何法也其沙參玉竹之補肺大略相近嗚呼此又不明後世永無吐血不死之人矣舉世盡然今為尤甚傷哉古時虛勞與吐血確是二病虛勞是虛寒症以溫補為主吐血之症不一大概屬陰虛火旺者為多此老頗得言之鑿鑿但有時仍以建中湯為治則又誤以仲景虛勞治法混入吐血門中終是胸無定見也五十年吐血者極少諸前輩無不以服補肺藥為戒所以死者絕少目今吐血者十人而五不服藥者無不生服麥冬五味者無不死此雖時令使然而藥誤亦不少也可不畏哉醫案亦多重複可刪大半十同八九令閱者厭煩編書無識可笑失音吳三六外冷內熱久逼失音用兩解法寒熱客邪迫肺麻杏甘膏湯宋三十先失音繼喉痹是氣分窒塞微寒而熱水飲嗆出咯痰隨出隨阻此仍在上痹舌黃口渴議與苦辛寒方射干麻黃杏仁生甘草石膏苡仁陸二二秋涼燥氣咳嗽初病皮毛凜凜冬月失音至夏未愈而納食頗安想屢經暴冷暴暖之傷未必是二氣之餒仿金實無聲議治麻黃杏仁生甘草石膏射干苡仁又蘆根汁杏仁汁萊菔汁鮮竹瀝熬膏範三一氣燥喉痹失音少陽木火犯上膽火爍喉生雞子白冬桑葉丹皮麥冬生白扁豆殼某喉干失音一月未復津液不上供肺失清肅右寸脈浮大氣分燥津液虧枇杷葉一錢半馬兜鈴八分地骨皮一錢桑皮八分麥冬一錢生甘草三分桔梗六分白粳米二錢某血後音啞便溏失血津液虧生扁豆炒白芍炙草川斛山藥米糖大棗何勞損氣喘失音全屬下元無力真氣不得上注紛紛清熱治肺致食減便溏改投熱藥又是劫液宜乎喉痛神疲矣用補足三陰方法陰虛熟地五味炒山藥茯苓芡實建蓮肉孫二一久咳失音喉痹陳阿膠同煎二錢生雞子黃同煎一枚炒麥冬一錢半川斛三錢甜北沙參一錢半炒生地二錢生甘草三分茯神一錢半夫宮商角徵羽歌哭呼笑呻此五臟所屬之音聲也原其發聲之本在於腎其標則在乎肺病有虛實由咳嗽而起者居多或肺有燥火外感寒邪火氣鬱遏而喑者有肺金燥甚木火上炎咽乾喉痹而喑者有風熱痰涎壅遏肺竅而喑者有嗔怒叫號致傷會厭者亦有龍相之火上炎凌爍肺金久咳不已而喑者有內奪而厥則為喑俳此腎虛也是即暴中之不能言者也先生有金空則鳴金實則無聲金破碎亦無聲此三言足以該之矣有邪者是肺家實也無邪者是久咳損肺破碎無聲也其治法有寒者散寒有火者清火有風痰則祛風豁痰若龍相上炎爍肺者宜金水同治若暴中之喑全屬少陰之虛宜峻補肝腎或稍兼痰火而治之其用藥總宜甘潤而不宜苦燥斯得之矣華岫云徐評久嗽失音必由藥誤麥冬五味此失音之靈丹也服之久無不失音者若全失即使其人力如虎而走如馬半年之後無有不死若風寒痰火偶爾失音者即不治亦愈但更加以麥冬五味則弄假成真矣此老竟茫然也肺痿洪三二勞煩經營陽氣弛張即冬溫外因咳嗽亦是氣泄邪侵辛以散邪苦以降逆希冀嗽止而肺欲辛過辛則正氣散失音不能揚色消吐涎喉痹是肺痿難治矣仿內經氣味過辛主以甘緩苦辛散邪傷肺胃津液北沙參炒麥冬飴糖南棗查二四脈細心熱呼吸有音夜寤不寐過服發散氣泄陽傷為肺痿之疴仲景法以胃藥補母救子祟生氣也金匱麥門冬湯徐四一肺痿頻吐涎沫食物不下並不渴飲豈是實火津液蕩盡二便日少宗仲景甘藥理胃乃虛則補母仍佐宣通脘間之扞格人參麥冬熟半夏生甘草白粳米南棗肉沈積勞憂思固是內傷冬溫觸入而為咳嗽乃氣分先虛而邪得外湊辛散斯氣分愈泄滋陰非能安上咽痛音啞虛中邪伏恰值春暖陽和脈中脈外氣機流行所以小效旬日者生陽漸振之象穀雨暴冷驟加衛陽久弱不能擁護致小愈病復診得脈數而虛偏大於右寸口吐涎沫不能多飲湯水面色少華五心多熱而足背浮腫古人謂金空則鳴金實則無聲金破碎亦無聲是為肺病顯然然內傷虛餒為多虛則補母胃土是也肺痿之疴議宗仲景麥門冬湯王三十潰瘍流膿經年脈細色奪聲嘶食減咳嗽喉中梗痛皆漏損脂液陰失內守陽失外衛肺痿之疴諒難全好液傷衛虛人參黃耆苡仁炙草歸身白芨顧三六久咳神衰氣促汗出此屬肺痿黃耆蜜炙八兩生苡仁二兩白百合四兩炙黑甘草二兩白芨四兩南棗四兩水熬膏米飲湯送湯肺氣不降咳痰嘔逆肺氣不降鮮蘆根桃仁絲瓜子苡仁肺痿一症概屬津枯液燥多由汗下傷正所致夫痿者萎也如草木之萎而不榮為津亡而氣竭也然致痿之因非止一端金匱云或從汗出或從嘔吐或從消渴小便利數或從便難又被快藥下之重亡津液故令肺熱干痿也肺熱干痿則清肅之令不行水精四布失度脾氣雖散津液上歸於肺而肺不但不能自滋其干亦不能內灑陳於六腑外輸精於皮毛也其津液留貯胸中得熱煎熬變為涎沫侵肺作咳唾之不已故乾者自干唾者自唾愈唾愈干痿病成矣金匱治法貴得其精意大意生胃津潤肺燥補真氣以通肺之小管清火熱以復肺之清肅故外臺用炙甘草湯在於益肺氣之虛潤肺金之燥千金用甘草湯及生薑甘草湯用參甘以生津化熱薑棗以宣上焦之氣使胸中之陽不滯而陰火自熄也及觀先生之治肺痿每用甘緩理虛或宗仲景甘藥理胃虛則補母之義可謂得仲景心法矣鄒時乘
