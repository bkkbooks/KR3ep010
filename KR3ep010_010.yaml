body:
  text: 卷十幼科要略按襁褓小兒體屬純陽所患熱病最多世俗醫者固知謂六氣之邪皆從火化飲食停留鬱蒸變熱驚恐內迫五志動極皆陽奈今時治法初則發散解肌以退表熱仍混入消導繼用清熱苦降或兼下奪再令病家禁絶乳食每致胃氣索然內風來乘變見驚癇告斃甚多附記世俗通套之方藥於左不可不知不足取法也防風荊芥葛根前胡桔梗木通赤芍卜子厚朴陳皮山楂麥芽枳殼神麯鉤藤夏佐香薷冬佐麻黃羌活兩三日熱不解柴胡前胡黃連黃芩山梔連翹薄荷葛根木通鉤藤厚朴枳實栝蔞實丸劑必用大黃四五日不解但言食滯未盡表裡不和總以柴芩小陷胸若嘔逆煩渴用竹茹黃連半夏若痰多喘促即用葶藶杏仁蘇子卜子膽星貝母甚者加牛黃此皆套法所當戒也屢清消不愈便無方法苟不變驚必曰骨蒸孩勞所用藥餌不分氣血陰陽但知見症施治如早涼暮熱必用地骨皮丹皮生地元參甘草北沙參石斛知母有痰加蘇子杏仁貝母橘紅膽星桔梗其鉤藤石斛茯苓穀芽之屬每劑必用總之取無故疲藥待其自愈倘有變症希冀掩飾而已愚按嬰兒肌肉柔脆不耐風寒六腑五臟氣弱乳汁難化內外二因之病自多然有非風寒竟致外感不停滯已屬內傷其故何歟嘗思人在氣交之中春夏地氣之升秋冬天令之降呼出吸入與時消息間有穢濁吸入即是三焦受邪過募原直行中道必發熱煩躁倘幼醫但執前藥表散消導清火通便病輕或有幸成病重必然顛覆錢仲陽云糞履不可近襁褓小兒余言非無據矣四十年來治效頗多略述其概云夫春溫夏熱秋涼冬寒四時之序也春應溫而反大寒夏應熱而反大涼秋應涼而反大熱冬應寒而反大溫皆不正之乖氣也病自外感治從陽分若因口鼻受氣未必恰在足太陽經矣大凡吸入之邪首先犯肺發熱咳喘口鼻均入之邪先上繼中咳喘必兼嘔逆䐜脹雖因外邪亦是表中之裡設宗世醫發散陽經雖汗不解幼稚質薄神怯日期多延病變錯綜茲以四氣常法列左伏氣春溫一症由冬令收藏未固昔人以冬寒內伏藏於少陰入春發於少陽以春木內應肝膽也寒邪深伏已經化熱昔賢以黃芩湯為主方苦寒直清裡熱熱伏於陰苦味堅陰乃正治也知溫邪忌散不與暴感門同法若因外邪先受引動在裡伏熱必先辛涼以解新邪繼進苦寒以清裡熱況熱乃無形之氣幼醫多用消滯攻治有形胃汁先涸陰液劫盡者多矣備用方黃芩湯蔥豉湯新邪引動伏邪涼膈散清心涼膈散風溫風溫者春月受風其氣已溫經謂春氣病在頭治在上焦肺位最高邪必先傷此手太陰氣分先病失治則入手厥陰心胞絡血分亦傷蓋足經順傳如太陽傳陽明人皆知之肺病失治逆傳心胞絡幼科多不知者俗醫見身熱咳喘不知肺病在上之旨妄投荊防柴葛加入枳朴杏蘇卜子查麥廣皮之屬輒云解肌消食有見痰喘便用大黃礞石滾痰丸大便數行上熱愈結幼稚谷少胃薄表裡苦辛化燥胃汁已傷復用大黃大苦沉降丸藥致脾胃陽和傷極陡變驚癇莫救者多矣按此症風溫肺病治在上焦夫風溫春溫忌汗初病投劑宜用辛涼若雜入消導發散不但與肺病無涉劫盡胃汁肺乏津液上供頭目清竅徒為熱氣熏蒸鼻乾如煤目暝或上竄無淚或熱深肢厥狂躁溺澀胸高氣促皆是肺氣不宣化之徵斯時若以肺藥少加一味清降使藥力不致直趨腸中而上痹可開諸竅自爽無如城市庸醫僉云結胸皆用連蔞柴枳苦寒直降致閉塞愈甚告斃甚多按此症初因發熱喘嗽首用辛涼清肅上焦如薄荷連翹牛蒡象貝桑葉沙參梔皮蔞皮花粉若色蒼熱勝煩渴用石膏竹葉辛寒清散痧症亦當宗此若日數漸多邪不得解芩連涼膈亦可選用至熱邪逆傳入膻中神昏目暝鼻竅無涕淚諸竅欲閉其勢危急必用至寶丹或牛黃清心丸病減後餘熱只甘寒清養胃陰足矣備用方葦莖湯清心涼膈散涼膈散瀉白散葶藶大棗湯白虎湯至寶丹清心牛黃丸竹葉石膏湯喻氏清燥救肺湯夏熱夏為熱病然夏至已前時令未為大熱經以先夏至病溫後夏至病暑溫邪前已申明暑熱一症幼醫易眩夏暑發自陽明古人以白虎湯為主方後賢劉河間創議迥出諸家謂溫熱時邪當分三焦投藥以苦辛寒為主若拘六經分症仍是傷寒治法致誤多矣蓋傷寒外受之寒必先從汗解辛溫散邪是已口鼻吸入之寒即為中寒陰病治當溫里分三陰見症施治若夫暑病專方甚少皆因前人略於暑詳於寒耳考古如金匱暑暍痙之因而潔古以動靜分中暑中熱各具至理茲不概述論幼科病暑熱夾雜別病有諸而時下不外發散消導加入香薷一味或六一散一服考本草香薷辛溫發汗能泄宿水夏熱氣閉無汗渴飲停水香薷必佐杏仁以杏仁苦降泄氣大順散取義若此長夏濕令暑必兼濕暑傷氣分濕亦傷氣汗則耗氣傷陽胃汁大受劫爍變病由此甚多發泄司令里真自虛張鳳逵云暑病首用辛涼繼用甘寒再用酸泄酸斂不必用下可稱要言不煩矣然幼科因暑熱蔓延變生他病茲摘其概受熱厥逆夏令受熱昏迷若驚此為暑厥即熱氣閉塞孔竅所致其邪入絡與中絡同法牛黃丸至寶丹芳香利竅可效神蘇以後用清涼血分如連翹心竹葉心玄參細生地鮮生地二冬之屬此症初起大忌風藥初病暑熱傷氣竹葉石膏湯或清肺輕劑大凡熱深厥深四肢逆冷但看面垢齒燥二便不通或瀉不爽為是大忌誤認傷寒也疳幼兒斷乳納食值夏月脾胃主氣易於肚膨泄瀉頭熱手足心熱形體日瘦或煩渴善食漸成五疳積聚當審體之強弱病之新久有餘者當疏胃清熱食入糞色白或不化當健脾佐消導清熱若濕熱內郁蟲積腹痛導滯驅蟲微下之緩調用肥兒丸之屬口疳夏季秋熱小兒泄瀉或初愈未愈滿口皆生疳蝕嘗有阻塞咽喉致危者此皆在裡濕盛生熱熱氣蒸灼津液不升濕熱偏傷氣分治在上焦或佐淡滲世俗常刮西瓜翠衣治疳取其輕揚滲利也脹夏季濕熱鬱蒸脾胃氣弱水穀之氣不運溫者內蘊為熱漸至浮腫腹脹小水不利治之非法水濕久漬逆行犯肺必生咳嗽喘促甚則坐不得臥俯不能仰危期速矣大凡喘必生脹脹必生喘方書以先喘後脹者治在肺先脹後喘者治在脾亦定論也金匱有風水皮水石水正水黃汗以分表裡之治河間有三焦分消子和有磨積逐水皆有奧義學者不可不潛心體認難以概述閲近代世俗論水濕喘脹之症以內經開鬼門取汗為表治分利小便潔淨府為里治經旨病能篇謂諸濕腫滿皆屬於脾以健脾燥濕為穩治治之不效技窮束手矣不知凡病皆本乎陰陽通表利小便乃宣經氣利腑氣是陽病治法暖水臟溫脾腎補方以驅水是陰病治法治肺痹以輕開上治脾必佐溫通若陰陽表裡乖違臟真日漓陰陽不運亦必作脹治以通陽乃可奏績如局方禹餘糧丸甚至三焦交阻必用分消腸胃窒塞必用下奪然不得與傷寒實熱同例擅投硝黃枳朴擾動陰血若太陰脾臟飲濕阻氣溫之補之不應欲用下法少少甘遂為丸可也其治實症選用方法備採備用方葶藶大棗湯瀉白散大順散牡蠣澤瀉散五苓散越婢湯甘遂半夏湯控涎丹五子五皮湯子和桂苓湯禹功丸茯苓防己湯中滿分消湯小青龍湯木防己湯附記一徐姓小兒單脹數月幼科百治無功僉用肥兒丸萬安散磨積丹緑礬丸雞肫藥俱不效余謂氣分不效宜治血絡所謂絡瘀則脹也用歸鬚桃仁延胡山甲蜣螂蟅蟲靈脂山楂之類為丸十日全愈吐瀉霍亂吐瀉一症幼兒脾胃受傷陡變驚搐最多若是不正穢氣觸入或口食寒冷套用正氣散六和湯五積散之類正氣受傷肢冷厄忒嘔吐自利即用錢氏益黃散有痰用星附六君子湯理中湯等倘熱氣深伏煩渴引飲嘔逆者連香飲黃連竹茹橘皮半夏湯熱閉神昏用至寶丹寒閉用來復丹食瓜果泄瀉稚年夏月食瓜果水寒之濕著於脾胃令人泄瀉其寒濕積聚未能遽化熱氣必用辛溫香竄之氣古方中消瓜果之積以丁香肉桂或用麝香今七香餅治瀉亦祖此意其平胃散胃苓湯亦可用瘧瘧因暑發居多方書雖有痰食寒熱瘴癘之互異幼稚之瘧都因脾胃受病然氣怯神弱初病驚癇厥逆為多在夏秋之時斷不可認為驚癇大方瘧症須分十二經與咳症相等若幼科庸俗但以小柴胡去參或香薷葛根之屬不知柴胡劫肝陰葛根竭胃汁致變屢矣幼科純陽暑為熱氣症必熱多煩渴邪自肺受者桂枝白虎湯二進必愈其有冷食不運有足太陰脾病見症初用正氣或用辛溫如草果生薑半夏之屬方書謂草果治太陰獨勝之寒知母治陽明獨勝之熱瘧久色奪唇白汗多餒弱必用四獸飲陰虛內熱必用鱉甲首烏知母便漸溏者忌用久瘧營傷寒勝加桂薑擬初中末瘧門用藥於左初病暑風濕熱瘧藥脘痞悶枳殼桔梗杏仁厚朴二味喘最宜栝蔞皮山梔香豉頭痛宜辛涼輕劑連翹薄荷赤芍羚羊角蔓荊子滑石淡滲清上重則用石膏口渴用花粉煩渴用竹葉石膏湯熱甚則用黃芩黃連山梔夏季身痛屬濕羌防辛溫宜忌宜用木防己蠶砂暑熱邪傷初在氣分日多不解漸入血分反渴不多飲唇舌絳赤芩連膏知不應必用血藥諒佐清氣熱一味足矣輕則用青蒿丹皮汗多忌犀角竹葉心玄參鮮生地細生地木通亦能發汗淡竹葉若熱久痞結瀉心湯選用又夏月熱久入血最多蓄血一症讝語昏狂看法以小便清長者大便必黑為是桃仁承氣湯為要藥幼稚瘧久面腫腹膨泄瀉不欲食或囊腫或跗腫必用東垣益氣以升陽倘脾陽消憊前方不應用理中湯或錢氏益黃散得效二三日須投五苓散一二日再與異功參苓白朮散之類必全好徐忠可注金匱有云幼兒未進穀食者患瘧久不止用冰糖濃湯余試果驗瘧多用烏梅以酸泄木安土之意用常山草果乃劫其太陰之寒以常山極走使二邪不相併之謂用人參生薑曰露薑飲一以固元一以散邪取通神明去穢惡之氣總之久瘧氣餒凡壯膽氣皆可止瘧未必真有瘧鬼又瘧邪既久深入血分或結瘧母鱉甲煎丸設用煎方活血通絡可矣痢痢疾一症古稱滯下蓋里有滯濁而後下也但滯在氣滯在血冷傷熱傷而滯非一今人以滯為食但以消食並令禁忌飲食而已夫瘧痢皆起夏秋都因濕熱鬱蒸以致脾胃水穀不運濕熱灼氣血為黏膩先痛後痢痢後不爽若偶食瓜果冰寒即病未必即變為熱先宜辛溫疏利之劑若膿血幾十行㽱痛後重初用宣通驅熱如芩連大黃必加甘草以緩之非如傷寒糞堅須用芒硝咸以耎堅直走破泄至陰此不過苦能勝濕寒以逐熱足可卻病古云行血則便膿愈導氣則後重除行血涼血如丹皮桃仁延胡黑楂歸尾紅花之屬導氣如木香檳榔青皮枳朴廣皮之屬世俗通套不過如此蓋瘧傷於經猶可延挨痢關乎臟誤治必危診之大法先明體質強弱肌色蒼嫩更詢起居致病因由初病體堅症實前法可遵久病氣餒神衰雖有腹痛後重亦宜詳審不可概以攻積清奪施治聊附記一治驗備考施姓子年七歲七月二十三日天久雨陰晦遂發泄瀉數次越日腹痛下痢紅白延幼科二人調治五六日至初二日余診之嘔逆不食下痢無度都是血水其腹痛晝夜無寧刻兩脈俱細右澀欲歇坐次鼻聞藥氣乃大黃氣令其勿進施云有二醫在枉先生一商何如余唯之入書室索方一醫曰下痢已來全無糟粕若非攻蕩去積無別法可投余曰肢冷下血液七八日痛不飲水望面色枯白中極氣黯脈形細耎按之不鼓明是冷濕中於太陰仲景太陰九法示不用下乃急煎人參炙草炮薑歸芍陳皮少佐肉桂二劑垢滯得下痛痢大減繼以歸芍異功散參苓白朮散半月全安噤口不納水穀下痢都因熱升濁攻必用大苦如芩連石蓮清熱人參輔胃益氣熱氣一開即能進食藥宜頻頻進二三口小兒休息久痢變為糞後下血最難速愈有因氣弱下陷者補中益氣虛寒飲食不化者錢氏益黃散濕熱未淨氣分延虛者清暑益氣湯胃強善食者苦寒清熱更節飲食須善調經月久瀉久痢必傷及腎以腎司二便也必肛門後墜不已與初病濕熱裡急下重不同治以攝陰液或佐疏補久則純與攝納小兒熱病最多者以體屬純陽六氣著人氣血皆化為熱也飲食不化蘊蒸於裡亦從熱化矣然有解表已復熱攻裡熱已復熱利小便愈後復熱養陰滋清熱亦不除者張季明謂元氣無所歸著陽浮則倏熱矣六神湯主之秋燥秋深初涼稚年發熱咳嗽證似春月風溫症但溫乃漸熱之稱涼即漸冷之意春月為病猶冬藏固密之餘秋令感傷恰值夏熱發泄之後其體質之虛實不同但溫自上受燥自上傷理亦相等均是肺氣受病世人誤認暴感風寒混投三陽發散津劫燥甚喘急告危若果暴涼外束身熱痰嗽只宜蔥豉湯或蘇梗前胡杏仁枳桔之屬僅一二劑亦可更有粗工亦知熱病與瀉白散加芩連之屬不知愈苦助燥必增他變當以辛涼甘潤之方氣燥自平而愈慎勿用苦燥劫爍胃汁秋燥一症氣分先受治肺為急若延綿數十日之久病必入血分又非輕浮肺藥可醫須審體質症端古謂治病當活潑潑地如盤走珠耳翁姓子方數月秋燥潮熱咳嗽如瘧幼科用發散藥二日不效忙令禁乳更醫用瀉白散再加芩連二日晝夜煩熱喘而不咳下痢黏膩藥後竟痢藥水延余診之余曰稚年以乳食為命餓則胃虛氣餒肺氣更不爽矣與玉竹甘草炒廣皮竹葉心一劑熱緩繼與香粳米南棗廣皮甘草沙參二劑與乳少進令夜抱勿倒三日全愈冬寒深秋入冬暴冷折陽外感發熱頭痛身痛嘔惡必從太陽若渴能飲水者裡熱見症即非純以表散傷寒每以風傷衛用桂枝法寒傷營用麻黃法小兒肌疏易汗難任麻桂辛溫表邪太陽治用輕則紫蘇防風一二味身痛用羌活然不過一劑傷風症亦肺病為多前杏枳桔之屬辛勝即是汗藥其蔥豉湯乃通用要方若肢冷寒戰嘔吐自痢或身無熱即從中寒里症三陰須分但小兒科太陰中寒最多厥陰間有若冬令應寒氣候溫暖當藏反泄即能致病名曰冬溫溫為欲熱之漸非寒症得汗而解若涉表邪一二裡熱必兼七八是癮疹丹痧非徒風寒或外受之邪與里邪相薄亦令鬱於經絡或飲醇厚味裡熱熾烈而衛氣不與營分相和或不正直入內侵即有腹痛下痢諸症其治法按症必以里症為主稍兼清散有諸設用辛溫禍不旋踵矣至於痧痘時癘須分四氣也看三關法滑氏云小兒三歲以內看男左女右手虎口三節曰三關紋色紫熱紅傷寒青驚風白疳病黃色淡紅乃平常小恙其筋紋宜藏不宜暴露若見黑色則為危險再脈紋見下截風關為輕中截氣關為重上截命關為尤重耳直透三關為大危痧疹痧子吳音瘄子浙江疹北音丹痧屬陽腑經邪初起必從表治症見頭痛喘急咳嗽氣粗嘔惡一日二日即發者輕三五日者重陽病七日外隱伏不透邪反內攻喘不止必腹痛脹祕悶危矣治法宜苦辛清熱涼膈去硝黃方書謂足陽明胃疹如雲布密或大顆如痘但無根盤方書謂手太陰肺疹但有點粒無片片者用辛散解肌冬月無汗壯熱喘急用麻杏如華蓋散三拗湯夏月無汗用辛涼解肌葛根前胡薄荷防風香薷牛蒡枳桔木通之屬古人以表邪口渴即加葛根以其升陽明胃津熱甚煩渴用石膏辛寒解肌無汗忌用凡瘡疹辛涼為宜連翹辛涼翹出衆草能升能清最利幼科能解小兒六經諸熱春令發痧從風溫夏季從暑風暑必兼濕秋令從熱爍燥氣冬月從風寒疹宜通泄泄瀉為順下痢五色者亦無妨惟二便不利者最多凶症治法大忌止瀉痧本六氣客邪風寒暑濕必從火化痧既外發世人皆云邪透孰謂出沒之際升必有降勝必有復常有痧外發身熱不除致咽啞齦腐喘急腹脹下痢不食煩躁昏沉竟以告斃者皆屬裡症不清致變須分三焦受邪孰多或兼別病纍瘁須細體認上焦藥用辛涼中焦藥用苦辛寒下焦藥用鹹寒上焦藥氣味宜以輕肺主氣皮毛屬肺之合外邪宜辛勝里甚宜苦勝若不煩渴病日多邪郁不清可淡滲以泄氣分中焦藥痧火在中為陽明燥化多氣多血用藥氣味苦寒為宜若日多胃津消爍苦則助燥劫津甘寒宜用下焦藥鹹苦為主若熱毒下注成痢不必咸以耎堅但取苦味堅陰燥濕古人以痧為經腑之病忌溫燥澀補所謂痘喜溫暖疹喜清涼也然常有氣弱體虛表散寒涼非法淹淹釀成損怯但陰傷為多救陰必扶持胃汁氣衰者亦有之急當益氣稚年陽體純剛之藥忌用幼科方書歌括曰赤疹遇清涼而消白疹得溫暖而解此溫字即後人酒釀柳木粗草紙木棉紗之屬雖不可不知然近年用者多無益痧疳濕盛熱蒸口舌咽喉疳蝕若不速治有穿腮破頰咽閉喘促告斃矣治之宜早外治另有專方若湯藥方法必輕淡能解上病或清散亦可痧痢乃熱毒內陷與傷寒協熱邪盡則痢止同法忌升提忌補澀輕則分利宣通重則苦寒解毒痘論痘首推錢仲陽陳文中二家錢用寒涼陳用溫熱確乎相左丹溪祖錢非陳分解毒和中安表為要以犀角地黃湯為主方舉世宗之莫敢異議後之萬氏以脾胃為主魏氏以保元為主皆從二家脫化費建中救偏悉以石膏大黃胡氏輒投汗下松江東地多宗秦鏡明京口江寧咸推管柳保赤吾蘇悉遵翁仲仁金鏡録可謂家喻戶曉者其取長在看不在乎治看法精確有可以前知之巧妙後之翟氏聶氏深以氣血盈虧解毒化毒分晰闡揚錢陳底蘊超出諸家因分別太多讀者目眩心憒不若翁仲仁芻蕘悅口也然眼目之功須宗翁氏而匯治講究參之諸家可矣姑舉看法大凡發熱三日而後見標是其常好以熱勢參詳見症定其吉凶翁仲仁鑫鏡録甚明茲不復贅其未刻悉補入傷寒邪由外入痘子熱從內起但時邪引動而出與傷寒兩途周歲小兒初熱即現驚搐昏迷之狀最多世俗謂驚痘最好此言未必皆然方書云先驚後痘者生先痘後驚者死頻頻驚厥最多悶痘蓋痘由腎至肝至心脾及肺自里至外自深及淺未發之前痘熱先已內動目現水晶光芒腎熱也水生木而入肝木生火而入心火生土而入脾土生金而入肺其先天痘毒從至陰以過陽全藉身中元氣領載充長以化毒為漿漿必濃厚蒼老而始結痂毒已外泄元氣內返斯無變症周歲以內身小元弱常有熱一日即出亦有順痘但須看神氣靜躁熱勢輕重見點徐徐而出既出即長熱緩安乳便是好症若神氣雖安熱亦不盛痘點雖不多形呆色鈍或作頭耎足落脈懈不束筋骨隱隱嘆息或短氣如喘或嘔或瀉最多悶症若二三日間痘苗已長色亦頗好竟夜終日煩躁不止最防隱處發疔及發斑夾疹等症一發熱煩躁標點雖見熱躁愈加細詢無忽再參兼症為六氣鬱遏者從時氣治為內傷停滯者從里症治亦有表裡兩解治亦有下奪者但下法寒涼之中必須活血理氣防其凝澀冰伏初起必三次而出熱止即齊其贈點亦有陸續發出者須看顏色靈活生氣頃刻轉機變化為要察形辨症治法用藥表藥活血疏肌次則涼血解毒實熱便閉者微下之虛弱氣怯者忌進疏解寒涼間有虛寒弱稚初發身不大熱四肢皆冷吐乳瀉乳痘點不長聞聲悠悠欲絶望色慘淡無形恰在一二朝間余見程氏女年甫半齡布痘極多痘形耎色淡白前症迭見近地幼科僉用荊防蒡蟬紅花楂肉木通胡荽筍尖之屬方雖寫而示以凶危延余診視余曰毒重氣虛法在不治但身無熱見症虛寒不因癘氣表邪焉用表藥考萬氏始終以脾胃為主以理中湯加丁桂與服一劑肢暖嘔止再服利緩痘起再用參歸鹿茸二服以錢氏異功散而愈凡看痘先論兒體強弱辨肌色如色白多氣虛色蒼多血熱形象尩羸有宿病或渴乳肌柔白嫩者痘必鮮明蒼黑皮粗者色必暗晦羸瘦病質色燥形枯必須辨依期長養內症安和病軀出痘即平常無奇亦難調理歌訣云形體羸瘦骨如柴肌肉枯焦神思衰遍體鋪排如此痘縱能漿足亦堪嗟一初見腰痛足耎不能起立者死此毒伏於腎一初見腹脹胸高續增喘噦者死一初見目睛呆瞪或暗無光或黑白高低皆屬緊悶症一初見痘煩躁不止即防疔斑疔必現於隱處多死一初見痘痘不續發斑色深紫漸變藍黑六日內死一初見痘紫斑漸起痘反隱伏此名紫斑白悶一初見痘痘斑間雜若似酒朱點墨必死以上皆論初見看法以定凶危發齊熱退後皆無諸惡症翁仲仁云三日四日痘出當齊點至足心勢方安靜若論幼小之兒氣血易周常有未及三日而發齊者年長之體四日以外猶有贈發者痘子稀少數不盈百不必點至足心仲仁大意謂發齊安靜無慮變症然須辨明痘形痘色是何等呈色身體強壯痘屬上中方可許其無慮倘幼小弱質或病後或帶別病而後布痘未可見痘好浪許再以冬夏氣候審詳可以百千無誤今世用方初見宜解肌疏表通套法十六味荊芥四日不用防風三日不用前胡三日不用牛蒡四日不用紫草二三日便滑忌木通紅花甘草赤芍天蟲楂肉川芎連翹桔梗廣皮蟬蛻三四日不用方書中未見點用升麻葛根湯今人不用伍氏方法見點忌升麻後人謂葛根表疏亦忌此輕揚升表通套藥若里症急須兩解伍氏方一二日用羌防透肌湯今人不用惡其辛溫氣雄也一二日壯熱氣促煩渴便祕痘粒不發翁仲仁云若非風寒壅遏定是氣虛不振愚謂近世布痘每盛發於君相風木燥金司令蓋非火不發也火鬱發之升陽散火是已但前症若裡熱甚重煎灼脂液苟非苦寒下奪佐以升表不能用也費建中方頗為中的石膏大黃連翹赤芍青皮腹痛用楂肉花粉紫草木通丹皮辛涼入血犀角辛涼通血發齊後用黃連凡寒涼清火解毒必佐活血疏暢恐凝滯氣血也實熱便祕通用涼膈通聖前胡枳殼湯四順清涼飲痘四日發足伍氏遵古方用牛蒡熟末三分用荸薺汁酒釀燉熱調勻臨服刺入生雞冠血十餘滴與服毒輕者即起光潤之色世皆宗之發齊已四五日用涼血解毒湯藥伍氏名四聖飲非扁鵲原方生地連翹銀花紅花甘草天蟲桔梗紫草便滑用紫銚血熱加丹皮犀角火盛加黃連石膏羚羊角有斑加金汁元參頭面不起加川芎雞冠血咽喉痛加射干元參山豆根狂亂躁擾加地龍汁毒重血凝加豬尾血冰片量兒大小用近世涼血解毒多用地丁銀花湯煎藥凡看痘初起要根盤其痘易長綻倘尖瘦不肥多險成漿之後務要根盤即化一線圈紅緊附頂滿滾圓是為毒化若頂陷頂皺根盤黯僵其毒與氣血交凝實宜攻虛宜補實火宜清攻不宜早看來火色大赤痘形色濕潤方可攻托否則搔擦立至干剝毒陷不治虛有血虛氣虛之分血虛為熱氣虛為寒但虛熱與實熱不同虛熱用滋清方藥痘頂屬氣根盤屬血氣領血載毒得煅煉化漿凡體強質實者多火以清涼之劑火解漿成誤補則癰癰者壅也其氣虛血弱色必淡白形不雄偉或頂陷或皮皺內症則噁心少食便溏年少未進穀食者腸胃薄劣最多虛症七日以來元氣用事不能勝毒使之外出多有內陷致變者余最究心是症調之應手取效魏氏保元湯聶氏參歸鹿茸湯陳氏木香異功散腸滑不禁用七味豆蔻丸白朮散理中湯多獲奇效甚者必用三服大凡兒肌白嫩者多虛症蒼黑者多實火雖為大概亦屬至要白嫩發痘色必鮮豔勿謂便是善症蒼黑髮痘色必晦昧勿便許為凶總以神氣安靜顏色日換形象漸長便吉六七日伍氏內托散生黃耆甘草陳皮川芎當歸白糯米防風天蟲角刺銀花血熱者不用耆防芎歸表疏者去天蟲角刺血熱仍用丹皮地黃紫草連翹羚羊豬尾雞冠雞鳴散達表之藥豬尾膏通里之藥保元湯人參黃耆炙草加川芎當歸名芎歸保元虛寒加肉桂升頂加鹿茸氣滯正氣加廣皮厚朴瀉加木香肉果質弱加坎氣河車嘔逆加丁香厚朴參歸鹿茸湯人參當歸鹿茸黃耆龍眼肉炙草木香散人參木香丁香大腹皮桂心青皮訶子半夏甘草前胡赤苓異功散人參木香官桂廣皮當歸茯苓丁香白朮附子肉果厚朴半夏豆蔻丸肉果木香砂仁枯礬訶子龍骨赤石脂白朮散四君加藿香木香七八九日頻用清涼痘火色既退漿不能透或有半漿頂有箬笠之形不克充灌今人多用桑蟲漿生用雞冠血生用同酒漿和服倘攻起少頃後呆滯者須用補托伍氏攻發藥用老人牙煅研極細加麝香少許每服二三分名黑靈丹右天蟲乃疏表風藥山甲乃攻經隧風藥一味為末酒漿服曰獨勝散凡蟲蟻皆攻無血者走氣有血者走血飛者升地行者降凡漿足聲音啞者不妨驟喘痰升者大忌翁仲仁云挫喉聲啞漿行飽滿亦無妨蓋痘漿因熱氣以煉成必升騰以達頭面肺位最高熱上蒸迫肺先受損是以聲出不揚倘喘急扶肚抬胸乃火毒歸肺必不治矣火毒歸肺幼科每用珠子牛黃膏連之屬多不效余遵孫思邈葦莖湯或仲景葶藶大棗湯間有效者肺氣壅遏苦寒直下已過病所故無效方書以六七日以前寒戰屬肺熱六七日以後寒戰屬氣虛六七日以前咬牙屬胃熱六七日以後咬牙屬血虛亦屬定論八九日癢塌咬牙痘不起漿或灰白或涸或癟危險極矣速速溫補亦可望生翁仲仁云塌陷咬牙便實聲清猶可治聲清則上無熱壅痰聚便實則腑陽未至盡泄所以溫補得效耳木香散異功散八九日順痘漿色蒼黃毒氣悉化亦云垂成須謹防護持搔損流膿裂血倘正氣大泄毒從虛陷常有不治之患斯時預囑伴母勿懈使痂靨乾結肌肉完固便是全功若痘已破碎聲不啞者毒不陷也無妨伍氏方用芍藥湯炒白芍苡仁茯苓地骨皮銀花百合山藥建蓮十一二日漸次成痂之際極好之症必有咳嗽或夜暮身熱世俗幼科僉云毒氣未盡概投苦寒多有胃減廢食釀成痘勞童怯者吾嘗論痘自腎臟骨髓之中由肝主筋心主血脈脾主肌肉肺主皮毛從內之外毒乃渙釋收疤之時真氣歸里肺合皮毛是為末傳處位高體清肅從前灌脹成痂蒸迫之氣受虧已極氣泄為咳矣況投利濕下注藥而結痂其上焦已經轉燥若毒仍留伏焉能收靨此斷斷然也再論幼稚陽常有餘陰未充長布痘至於結痂一身脂液大損其陰氣告匱可知故暮夜屬陰時為煩為熱者正內經云陰虛生內熱也昔西郊吳氏女年甫四歲痘系順症幼科調治至漿滿成痂之日忽發煩躁夜熱不寐晨起安然醫用保元及錢氏五味異功加芍藥與服熱躁益加又更一醫曰毒氣未盡乃誤補之故用桑蟲漿暨涼解藥服後躁熱甚而添泄瀉邀余視之睹漿痂形色詢平素起居時日當午即用六味地黃湯一服而安此二條人多忽而不究故辨及之旬朝後嗽大法以甘寒生津胃藥蔗漿麥冬沙參緑豆皮地骨皮甘草玉竹甜杏仁解餘毒藥全以不傷胃氣為主若用芩連必須酒製翟聶二氏辨之詳矣平和無奇斷不敗事如三豆飲之屬若金銀花一味本草稱解毒不寒余見脾胃虛弱者多服即瀉伍氏用連翹飲子亦取平和痘毒癰瘍熱症十有七八虛寒十有二三甚至骨出腐敗亦有愈者但外科大忌用火煉升藥其診看之法亦如瘍毒須分陰陽耳痘疳濕盛生熱強者用苦寒清降以苦能去濕也若阻咽廢食以及穿腮破頰者難治年長出痘男女欲火已動其初即現膝痛腰痠咽喉窒痛欲閉苦辛寒藥必不效驗宜甘鹹寒滋水制火佐以解毒六七日來痛勢日緩聶氏有參麥清補方余每用錢氏六味加龜膠元參秋石獲效者甚多若漿不肯起頻吐黏涎者凶凡惡痘凶危瞬刻如諸悶症不過三五日已發而縮其危最速總在七日內再若矇頭鎖喉懸鏡纏腰蜘窠蠶種等為十惡症其袁氏十八惡症今人未嘗齒及如此等痘治之不易難望全生更有糖沙夾斑十朝危期又根枝雖好布於歲內幼小之兒必八九風波不治半漿毒陷之變必斃於十一二四之期若能食者十救一二痘至八九旬日外無漿則里毒不化必嗆啞瘙癢痰潮不食眼開條款難以盡言危期速矣常有忽然連串片片之痘裂水形如松脂桃膠外露轉眼堆聚內症漸安變凶轉吉更有旬朝內外干板涸如焦鍋巴狀毫無生氣忽從地角承漿諸處裂縫流臭水漸升頭額堆腫高厚若糊臉名曰發臭毒泄即當補托遲則氣脫驚小兒倉猝驟然驚搐古曰陽癇從熱症治古人用涼膈散為主方按急驚屬陽熱病用涼膈以清膈間無形之熱膈上邪熱逼近膻中絡閉則危殆矣此宣通乃一定之法然必詢病因察時候治之幼科以痰熱風驚四治猶可説也吾鄉有專科立方鉤藤連翹木通薄荷前胡枳殼桔梗加入表散消食多不效驗驚為七情內應乎肝肝病發驚駭木強火熾其病動不能靜且火內寄肝膽火病來必迅速後世龍薈芩連必加冰麝硝黃取其苦寒直降鹹苦走下辛香通里竅之閉也如牛黃丸至寶丹紫雪皆可選用凡熱邪塞竅神迷昏憒者仿此鉤藤丹皮之屬僅泄少陽膽熱與急驚暴熱內閉之症無益若火熱劫爍血液苦寒鹹寒不中與也宜用犀角地黃湯之屬方書有鎮墜金石之藥有攻風劫痰之藥雖非常用不可不考驚與厥皆逆亂之象仲景云蛔厥都從驚恐得之凡吐蛔腹痛嘔惡明是肝木犯胃幼醫亂治束手告斃余宗仲景法每效慢驚古稱陰癇其治法急培脾胃理中湯為主方有痰嘔吐用南星白附子六君子湯聲音不出開竅如竹瀝薑汁菖蒲根鬱金之屬是病皆他病致變其因非一有過飢禁食氣傷有峻藥強灌傷胃有暴吐暴瀉脾胃兩敗其症面青㿠白身無熱雖熱不甚短氣骨耎昏倦如寐皆溫補治之惟嘔逆不受乳食溫補反佐薑連連理湯錢氏益黃散錢氏異功散疳稚年五疳猶大方之五勞雖方書有五臟之分是症夏令為多固從脾胃蓋小兒乳食雜進運化不及初斷乳後果腥雜進氣傷滯聚致熱蒸於裡肌肉消瘦腹大肢細名曰丁奚或善食或不嗜食或渴飲無度或便瀉白色久延不已多致凶危宜忌食生冷腥肥凝滯治法初用清熱和中分利次則疏補佐運常有繼病治之無效待妊婦産過自愈者夏季霍亂吐瀉通用藿香正氣散水瀉宜分利四苓散寒加薑桂熱用芩連腹痛宜疏氣調氣用木香青皮有滯加炒楂肉厚朴重則加萊蔔子檳榔腹痛有熱用芩芍枳實有寒則用草果砂仁吳萸吐瀉後能食便反祕結者愈不能食神怯色痿者防慢驚治法調中溫中若有餘熱煩渴甘寒或甘酸救津故木瓜之酸制暑通用要藥春溫風溫春月暴暖忽冷先受溫邪繼為冷束咳嗽痰喘最多辛解忌溫只用一劑大忌絶谷若甚者宜晝夜豎抱勿倒三四日夫輕為咳重為喘喘急則鼻掀胸挺春溫皆冬季伏邪詳於大方諸書幼科亦有伏邪治從大方然暴感為多如頭痛惡寒發熱喘促鼻塞身重脈浮無汗原可表散春令溫舒辛溫宜少用陽經表藥最忌混亂至若身熱咳喘有痰之症只宜肺藥辛解瀉白散加前胡牛蒡薄荷之屬消食藥只宜一二味若二便俱通者消食少用須辨表裡上中下何者為急施治春季溫暖風溫極多溫變熱最速若發散風寒消食劫傷津液變症尤速初起咳嗽喘促通行用薄荷汗多不用連翹象貝牛蒡花粉桔梗沙參木通枳殼橘紅桑皮甘草山梔泄瀉不用蘇子瀉不用降氣表解熱不清用黃芩連翹桑皮花粉地骨皮川貝知母山梔裡熱不清早上涼晚暮熱即當清解血分久則滋清養陰若熱陷神昏痰升喘促急用牛黃丸至寶丹之屬按風溫乃肺先受邪遂逆傳心胞治在上焦不與清胃攻下同法吾鄉幼科當此初投發散消食不應改用柴芩栝蔞枳實川連再下奪不應多致危殆皆因不明手經之病耳若寒痰阻閉亦有喘急胸高不可與前法用三白吐之或妙香丸暑熱暑邪必挾濕狀如外感風寒忌用柴葛羌防如肌表熱無汗辛涼輕劑無誤香薷辛溫氣升熱伏易吐佐苦降如杏仁川連黃芩則不吐宣通上焦如杏仁連翹薄荷竹葉暑熱深入伏熱煩渴白虎湯六一散暑邪首用辛涼繼用甘寒後用酸泄斂津不必用下暑病頭脹如蒙皆濕盛生熱白虎竹葉酒濕食滯加辛溫通里小兒發熱最多變蒸之熱頭緒煩不能載詳於巢氏病源矣然春溫夏熱秋涼冬寒四季中傷為病當按時論治其內傷飲食治法不宜混入表藥消滯宜用丸藥潔古東垣已詳悉徐評此卷論幼科及看痘之法和平精切字字金玉可法可傳得古人之真詮而融化之不愧名家聞此老太翁為幼科專門名聞遠近此老既得家學淵源又於大方諸書探取經絡藥性之義而附益之所以其理益精其方益正不若前所列之諸案尚多可議處也痧疹袁溫邪痰嗽氣喘肚膨四日不解防發痧溫邪連翹山梔牛蒡杏仁石膏汪痧將退熱未去肺氣不清咳逆無痰熱邪留肺前胡桑皮杏仁橘紅桔梗木通蘇子象貝王痧隱太早咳喘發熱宜開肺氣薄荷杏仁象貝連翹桑皮木通紫菀鬱金某溫邪發痧不透熱毒內陷深藏上熏肺為喘下攻腸則利皆冬溫火化之症經云火淫於內治以苦寒幼科不究病本不明藥中氣味愈治愈劇至此凶危熱邪內陷川連黃芩飛滑石炒銀花連翹甘草丹皮地骨皮蔣喘為肺病脹乃肝病因時痧寒熱未解熱邪內陷所致王先生用苦辛酸法極通然浮腫腹痛未減得非經腑之濕熱留著歟木防己石膏杏仁大豆黃卷通草苡仁連翹艾痧退後呻吟不肯出聲涕淚皆無唇紫掀腫乃毒火未經清解上竅漸閉氣促痰鳴猶是溫邪客氣致此自當清解務盡其神識自和奈何以畏虛滋肺邪火愈熾矣毒火未清川連元參杏仁甘草黃芩連翹桔梗銀花王痧後及暮加喉痛咳元參犀角鮮生地連翹花粉丹皮鄒咽痛鼻燥唇腫自利風溫熱化發疹上焦熱熾宜辛涼微苦以泄降風溫發疹連翹黃芩犀角桔梗牛蒡杏仁元參通草談六歲溫邪時癘觸自口鼻穢逆遊行三焦而為麻疹目赤鼻煤吐蛔瀉蛔津津汗出而喘渴欲飲當與辛苦寒劉河間法世俗不知僉曰發痧但以荊防蟬殼升提火得風揚焰烈莫遏津劫至變矣癘邪涼膈去硝黃加石膏牛蒡赤芍張三歲手足煩熱時發赤塊緑豆殼捲心竹葉痘程見點若隱若現神倦不寧勢如悶伏表裡俱不宣暢雙解固宜再佐以芳香搜逐使蘊伏之毒透發為主見點悶症紫雪丹周熱閉心胞絡中目綻口開舌縮兩手撮空發痙溺通便澀血分大傷九日險期按法圖幸勉與紫雪丹二錢開水調緩緩下用茶銚倘得神蘇痙舒方有生機又神醒舌絳紫音縮渴飲不已心胞熱閉雖開而在裡脂液已涸古人以心熱消渴多系臟陰現症不可攻奪明矣鮮生地竹葉心元參知母銀花露金汁先用紫雪一錢龔初起腰足俱耎肝腎蘊毒不得外越目泛匝舌繼增喘促是緊悶不治之症諸醫僉用石膏大黃然此藥僅通陽明胃腑之壅未能搜逐肝腎至陰之臟讀宋醫錢仲陽直訣毒伏於陰亦有下奪之法其制方曰棗變百祥丸乃百中望一二生全者肝腎蘊毒悶症紅芽大戟五錢紅棗五枚水煮至棗熟去核及大戟湯但用棗肉研化開水送某毒伏不肯宣透氣滯血凝焉能起綻成漿七八險關診視肉腫瘡枯神躁不安議疏利內壅佐活血透肌法犀角紫草炒楂鮮生地酒浸大黃紅花青皮丹皮連翹牛蒡茅根筍尖湯代水俞發熱五六日來神煩不寧腹膨咳逆詢知二三日前眉間見點數粒狀如麩㾦隨即隱伏不見乃毒重壅遏悶伏景象設或發出亦屬重險且甫生六月胃乏穀氣難進湯藥擬進紫雪須少搜其蘊蓄之邪使其神安再商紫雪丹一分高點雖繁密根腳綻立寒涼藥不宜太重可以維持收功犀角連翹牛蒡炒楂紫草丹皮天蟲桔梗龐二朝神倦腹痛點粒繁瑣地界不清是時邪毒火兼重急進雙解法使大便稍通六腑氣宣則痘毒外透再商犀角連翹牛蒡酒大黃紫草青皮桃仁炒楂木通生石膏荊芥筍尖程成片不立頂焦黑滯肝肺毒重不能起脹焉得化毒今喘咳交加九朝難過羚羊角元參連翹天蟲土貝紫草炒楂丹皮銀花地丁湯代水錢三朝雖未發齊其點形繁密色澤不潤重險何疑今痧未全退尚宜清解犀角生石膏炒楂紫草連翹牛蒡赤芍桔梗木通程三朝身小氣弱布痘繁稠用藥不宜寒涼五日後受得補托可冀有成連翹牛蒡炒楂紅花天蟲川芎歸身桔梗炒乾荷葉毛身小氣弱漿發驚竄屬虛人參炒歸身炙草廣皮炒白芍炒黃米童四朝痘形黏著肌肉不肯起綻高立兼之繁紅殼薄乃時火毒火交熾而元氣素虧體質目今六日前時癘未徹宜先清解活血提頂希冀磊磊分成地界再究犀角羚羊元參丹皮炒楂秦皮紫草茸銀花鄭痘發猶熱身熱咳嗽乃風溫入肺未解診其點粒黏著不爽溫邪鬱滯氣血更體質素虛議開肺氣以宣之活血以疏動之冀其形色充長若一進沉降恐無好音連翹桔梗紅花牛蒡甘草炒楂鬱金丹皮雞冠血又昨進輕揚提頂活血痘形頗長所嫌色不光潤蓬鬆盤耎有干塌無漿之慮今明時氣將解氣血用事況正欲納穀苦寒不但冰伏毒氣更防大傷胃口古人於重症更加詳慎者為此川芎當歸天蟲桔梗甘草角刺紫草茸丹皮炒楂又六朝進和氣血法形色略潤究不肥綻焉得起脹成漿議進十宣散法人參川芎歸身廣皮紫草茸天蟲紅花白芷甘草桔梗張四朝船小重載難許全功勉議進雞鳴散二分陸五朝點雖不密色滯形痿痰多嗆逆如嘶是痘雖發出毒猶在內上衝心肺故有喘咳不寧之象進涼血透毒法羚羊桔梗甘草紫草丹皮川貝連翹元參射干天蟲西牛黃一分朱四朝炒黃米炒山楂紅花筍尖又五朝身小痘多元氣最薄胃腑未納穀味湯藥大過須慮嘔泄宜少少與藥扶過八九風波方得平安川芎炒當歸桔梗甘草黃米雞冠血又六朝薄嫩無漿仍宜內托黃耆防風歸身川芎紫草茸丹皮天蟲桔梗甘草雞冠血宋五朝顴頰形似紅沙余痘乾枯不潤昨進清毒活血續發點子盈千仲仁謂毒重壅閉氣血必乾焦退縮今五朝形象僅似初齊痘以十二日為常數已經壅遏未發三日矣當此質薄神弱恐難延多日即或望其堆沙發臭然必在旬日以外目下總以解毒清涼八九波濤洶湧恐難人力穩全犀角羚羊角川連炒楂土貝母紫草茸元參鮮生地連翹丹皮牛蒡子豬尾血吳五朝半痘子分顆原屬純正所嫌色滯乾枯防八九癢塌涼藥兼以活血是為平準方法看守勿懈為上羚羊角丹皮連翹炒楂紫草茸黃連元參天蟲生地雞冠血孫肌柔白嫩體質是虛但布痘必由時癘感觸地中六氣咸從火化癘固客氣相混氣血若非清解何以透達今視色油紅按形松耎怯再視面部肌肉先腫痘形未具起脹之象體症未為合局慮進鋭退速清涼解毒佐以提頂在五六日之法然險症變遷不一未可以經常定論羚羊角連翹丹皮天蟲生甘草紫草茸川連炒楂桔梗銀花湯煎和入雞冠血數滴汪五朝痘形繁瑣成片色紫滯乃火毒重險症藉身大氣旺扶持十四險關冀其發臭堆沙庶幾可以圖幸犀角羚羊角桔梗炒楂連翹天蟲紫草茸丹皮石膏銀花地丁牛蒡豬尾血冰片又六朝雖血熱毒重猶幸八齡體堅急清解活血莫令痰阻廢食扶持堆沙可望向安照前方去石膏地丁天蟲牛蒡加川連元參土貝查痘子成漿濕氣蘊於皮毛與熱氣相蒸內應乎肺發出罩痘疹宜忌葷腥輕清理肺淡滲消其濕熱驗其體質最薄慎勿過劑苡仁茯苓連翹地骨皮通草桑葉白沙參甘草顧痘發由絡其毒不化而轉陷亦歸於絡當世略曉攻補而已讀古人書辛香溫煦乃治毒陷大法人參肉桂炙草丁香厚朴訶子皮廣皮木香前胡茯苓徐未納穀食但以湯藥所以滑泄不止頭仰胸突擁痰身熱肺熱未清不可驟補翁仲仁有泄瀉安寧大虛少毒之議姑以和中清咽再商桔梗甘草炒歸川芎廣皮炒楂炒黃米湯煎沖雞冠血又七朝身小痘密氣弱難任雖清漿三四防護宜慎八九日不致損破可以有成人參黃耆炙草紫茸天蟲廣皮川芎歸身厚朴炒楂加炒冬米孫七朝色嬌皮薄漿汁未灌緣身小痘多氣血交虧不能運毒化漿八九日期最有癢塌之慮扶過十二朝無變庶幾可望有成進參歸鹿茸湯法人參歸身鹿茸生黃耆炙草廣皮厚朴煨木香又八朝照前方加肉果炒冬米又漿清四五不能充灌因元氣餒弱不振不能煅煉毒氣成漿恐有內陷之慮再進補托冀其堆沙或可回春人參黃耆廣皮炙草木香鹿茸歸身肉果坎氣官桂又十三朝靨痂甚薄中凝血迹兼之嗆逆帶嘔食入便有不化之形此虛中有毒非純補純清之症炒川貝炒銀花茯苓苡仁甘草地骨皮楊八朝闊塌癟陷漿色白滯不榮謂之氣衰毒陷所冀堆沙加食一線機耳人參黃耆川芎歸身木香炙草廣皮桂心又十一朝漿滿堆沙四肢圓綻但氣弱恐其不肯收痂必實脾利水為法人參冬朮炙草茯苓新會皮白芍又十三朝已經堆沙加食都是向安之象便溏滑膩皆寒涼傷里腸中脂垢自下當脾胃藥中少佐固腸以久延不已尚貽變症人參熟術訶子廣皮肉果白芍木香炙草茯苓又十六朝納食不化腹膨便糞白色要之胃滯當消脾弱宜補古稱痞滿屬氣氣行滯通但痘後虛體純消猶恐變症人參焦術炒楂木香焦麥芽廣皮茯苓澤瀉鮑九朝漿不外達毒欲內陷已經咬牙滑瀉嘔惡內症諸款皆屬深畏十二十四總屬險關痘子毒氣必氣元旺冀其托出議以陳氏木香散救里托毒人參木香丁香官桂炒歸身厚朴廣皮肉果訶子皮孫面腫目泛頭搖微嘔肝風離體乘上逆攻此乃變驚欲厥之象夫相火寄於肝膽氣斂痘痂宜進涼解清毒倘得微熱緩仍進谷方有佳音羚羊角川連鉤藤石菖蒲黑山梔膽星天麻連翹又肝風熱定疳蝕亦緩仍宜清熱解毒但不可犯胃羚羊角連翹膽星丹皮炒銀花金石斛茯苓諸十三朝痘已收靨然痂落太早恐有餘毒今瀉止溺短宜進清涼佐以分利生苡仁百合茯苓川斛白沙參炒麥冬某已經回痂不宜再進補劑恐氣血壅滯致有餘毒變幻宗翁仲仁清涼以助結痂之法黃芩銀花川貝甘草地骨皮桔梗連翹苡仁胡十五朝雖然堆沙靨痂咬牙發嗆毒氣未盡上衝心肺補清皆在難進扶過十八日後癰毒尚可療治若發疳蝕恐難全愈炒麥冬白沙參苡仁川貝炒銀花地骨皮沈十三朝漿未充滿忽然乾涸即是倒靨咬牙寒戰元氣大虧非峻補難挽人參鹿茸炒當歸桂心桂圓煨木香程回痂太早餘毒流走四肢臂腿腫痛議活血解毒連翹小生地當歸赤芍刺蒺藜丹皮夏枯草銀花酒半小杯吳十四朝嗆咳嘔逆腹膨都是餘毒內閉小便少大便溏不得爽倘再加喘急便是棘手必得瘍毒外發可望挽回桑白皮大腹皮緑豆皮茯苓皮飛滑石生甘草梢查痂後發痧系肺熱未清宜辛涼佐以解餘毒連翹杏仁桑皮地骨皮黃芩木通銀花牛蒡夏枯草吳十四朝薄漿回痂毒氣未化已有疳蝕之患理進清解餘毒但勉進稀粥溏瀉未罷胃未旺相脾氣積弱議以滲利分消仿古痘毒當利小便意桑皮地骨皮連翹茯苓川貝苡仁銀花某痘未退痂痧火內逼為喘川連犀角連翹銀花元參大貝丹皮地骨皮又痧火未清川連黃芩山梔連翹銀花杏仁甘草沈薄漿回痂毒氣未盡只宜清肺解毒炒川貝茯苓苡仁車前炒澤瀉炒銀花徐十六朝疳毒已發咳嗆未止痂落如麩肌色㿠白雖屬氣血交虛但痘後餘毒未可驟補議進和脾胃利濕方法疳毒宜速調治恐日久愈虛致有慢驚之慮苡仁川斛茯苓百合廣皮炒澤瀉沈二十一朝痰嗆失音不嗜食物晝則稍安暮夜煩躁此肺熱未肅磨耐多日體氣陽亢陰虧肝風內熾突起驚厥可慮地骨皮甘草生地炭緑豆皮炒丹皮炒川貝川斛李二十朝納食嘔吐脾胃不和肝風內動肢浮肉腫治宜培土製木以緩肝風冀免驚疳之患人參茯苓炒芍生穀芽藿香廣皮半夏曲馮二十八朝痂靨黏連神氣昏昧元為漿泄而乏變幻慢驚欲脫此皆稚年陽亢陰虧羞明目竄肝陰乏絶恐難再振人參茯神棗仁歸身炙草炒杞子生白芍又三十七朝陽極則煩陰涸為躁夜甚劇自從陰分設法益虛和陽為治人參熟地芡實茯苓建蓮遠志炒山藥五味楊點來不爽頂有水痕微焦此時氣傳染胎毒未發乃水赤之類痘耳連翹牛蒡丹皮赤芍飛滑石木通山梔甘草邵痘中復感溫邪口鼻觸入由中道以布及絡脈目泛失明左肢不舉少腹突起腫滿兩足皆痿詢知痘見六日陡然頭搖煩躁而得小便淋滴大便漸塞乃厥陰肝熱疝瘕失其疏泄內風旋轉腑陽不通經言暴腫暴脹皆風火變動至於迅速病來其能食消運熱化自可殺穀考古辛散酸泄甘緩三法難圖腑絡壅結仲景於厥陰條例有下之利不止者死之大戒議進鹹苦以通在下結熱愚見若此再與高明商酌良治川楝子小茴蘆薈山梔橘紅龍膽草方諸水七匙徐評諸案切近和平之中又能沉著變化備前人之所未備去其疵而取其純我郡有如此名家而不師法偏拾庸妄人唾餘不論何人不問虛實總以石膏大黃種種惡毒之藥大劑灌死每當出痘之年枉死載道全不知慘此等惡醫皆有豺狼之心也自古治痘名家不啻草數各有精確卓識以補前人之未備雖各有所偏實所以相濟也醫者貴統匯群書隨宜施治安可執偏隅管見以應無窮之變哉先生治痘夙稱神奇觀其案中寒熱攻補不膠於一見如毒火深伏氣血壅遏者藉芳香以搜逐用紫雪丹氣滯血凝毒重火伏者以酒大黃石膏青皮桃仁荊芥犀角豬尾血之類主治肝肺毒火不宣氣血有焦燔之勢者用犀角羚羊紫草丹皮石膏鮮生地之類元氣不支陽虛毒陷而見灰白濕爛泄瀉嘔惡等症者用辛香溫煦如陳文仲之法為要氣血極虛而漿清塌癢全無實症相兼者當峻補氣血用參歸鹿茸湯及坎氣湯之類氣虛莫外乎保元及四君子血虛不離於四物及補血湯又有氣虛血熱者補氣之中兼涼血血虛氣滯者補血之中佐辛香用攻法須分部位經絡用補法當辨寒熱燥濕過清則有冰伏之慮偏熱則有液涸之虞此皆先生採擇先賢之法因人見症而施治可謂善法古者矣夫痘雖以形色辨其吉凶然內症尤為緊要如痘點既起或不慎風寒而營衛凝澀或縱恣飲食而氣機呆鈍以致身熱不食腹膨嘔惡泄瀉漿水不行不究治其病因但執清寒膩補常有凶危之變亦有痘形雖重若神寧安靜飲食二便如常聲音清響調理得宜亦可轉危為安大凡形老而色鮮明者雖甚密變幻恆少形嫩而色晦滯者雖稀疏變幻恆多表裡相參審症的確然後設法處治方無貽誤至於逆症條款已現雖自昔名醫亦莫能挽救小兒夭枉者不可勝數深可憐憫邇年以來幸有種痘一法盛行於世實可挽回造化凡有小兒者俟周歲後即可選用種痘之苗引而發之百不失一此誠補痘科之未備而為最上一乘之法也正痘有先賢諸成法避險有種痘之良方痘症於是乎大全矣陸履安痘之發也一由乎胎毒內伏一由於外感時邪之氣引導而出其症之順逆若內毒輕而外感之氣亦輕者痘必稀疏此為順症苦內毒輕而外感之氣重者慮其遏悶不齊不易灌漿若能至灌漿則時邪漸退後易收功此為先重後輕症若內毒重而外感之氣輕者慮其灌漿已後毒難盡泄不易收靨結痂恐發痘毒疳蝕之患此為先輕後重症若內毒重而外感之氣亦重者痘必稠密色不鮮澤發熱見點之後一路蹭蹬難以收功此為逆症然胎毒之輕重人皆易明若外感之氣人莫能曉夫天地間只有六氣氣平則為和氣不平則有勝復勝復至極則為厲氣為瘟疫氣瘴氣更有道塗中穢濁氣人若感之不拘老幼俱病今出痘所感之氣則異乎是此氣獨與未泄胎毒之小兒兩相感觸未聞痘症盛行之時已出過痘之兒亦染病患也考是氣自古迄今從未有人申説明白確定為何氣故前賢於痘症一科未嘗不殫心瘁慮立論著方因不明其氣之源不無偏執之弊有喜於寒瀉者有喜於溫托者有先用寒瀉而後用溫補者有先用溫托而後用清火解毒者更有不審兒體之虛實寒熱俱宗費建中救偏瑣言每於發熱見點時概用大黃石膏黃連犀角羚羊茅根蘆根等不知費氏之書名為救偏乃救慣用熱藥之偏耳若本不偏而宗其法則不偏者反至偏矣嬰兒之命其何以堪幸古有種痘良法相傳至今其法簡易靈驗至穩至當蓋正痘因外感時邪而發種痘則種於無病之時故所出稀疏輕者不過幾十粒此豈非避危就安之妙法乎倘愚人不信何不將自出與種出彼此相較其理自明假使一村之中有百兒出天花未嘗不延醫服藥若能八九十收功人咸稱為太平痘矣甚有竭力調治而損傷幾及一半者不聞其歸咎於醫生惟有委命於天而已今若種百兒之痘設或損傷四五個則必責罰種師並不容其托足於此一村矣人何篤信醫生而不相信種師耶與其委命於天孰若以人功挽之以此相較則當種與不當種自決矣至於種法全在乎好苗夫苗者即取他兒之痘痂也必要用種出之痘落下之痂謂之種苗此苗之中毫無天行時毒之氣在內故放心可用若自出天花之痂謂之時苗此苗之中有時行之氣若不辨而用之名雖為種實與傳染他兒天行時痘之氣無異此時苗之不可用也然種苗之內尚要揀擇必取痘粒稀少其色紅潤灌漿濃厚所結之痂厚實光澤尖圓者此氣血充足陰陽合德上好之苗也俟痂落下用紙包好記明何日收得收貯新瓷瓶內緊護其口置清涼之處勿觸穢熱之氣其苗在北方天氣涼春月之苗一月之內尚可種冬月之苗四五十日尚可種南方氣溫夏月之苗四五日春月之苗二十日冬月之苗三十日若延日久則氣薄無力恐種不出矣欲覓此等種苗先訪有人家正在種痘之際向彼明言其故懇求四五粒即可源源而種或平日於同道種師內相與一二位志誠老實者議明彼此互借則苗亦可不斷亦有膽大種師於五六月中覓貧家壯實之兒種之不惟不索酬謝反肯津貼銀錢次遞傳種三四個兒延至七月則苗亦可以不斷矣近有種師因種苗已斷權取時苗種之往往有種出稠密棘手重痘者皆時苗之過也不知時苗之性即選上好者亦必要傳種過四五兒俱各順當者其苗性始和平方能與種苗相等至於下手種法尤須詳慎凡種一兒用痘痂三四粒兩兒則用六七粒放於乾淨茶杯中傾入清水四五茶匙用小指尖在內三四攪則痂已濕急將水傾去用柳木杵研其杵約長四寸粗如筆管兩頭要光圓研十數轉足矣如痂太乾加入清水一二滴切不可太潮只要研如干漿糊狀用彈熟新棉花捏一小團如棗核大兩頭要圓其長短粗細量兒鼻孔之大小為之其棉團不可太鬆軟鬆則苗氣易往外泄且見涕則縮小易於脫出將棉團只用一頭蘸痂末糊於上塞兒鼻中男左女右塞不可太進太進則兒不適意亦不可太出太出則易於脫落總要寬緊淺深適中為妙塞後勿放小兒用手拈出若被噴嚏打出急將苗仍塞入鼻下苗後以六個時辰為度天氣熱早取出數刻天氣寒多留數刻痘苗取出之後其苗氣漸次傳遍五臟至七日或八九日始發熱發熱三日而見點矣此誠至穩至當之種法也種痘之苗不過痘痂一味今各處種師詭稱痘痂之外尚要加他藥為引導者此係惑人謊語切勿信之既種後將發熱時小兒頸項內男左女右必發一小塊狀如痰核此乃毒氣結聚於此故痘發必稀疏此塊不必醫治待落痂後則塊亦漸消矣若用時苗種者項中無塊當以此辨之又間有驚痘於發熱時小兒忽然驚搐手足蜷不語目上視有片時即平復者有發一二個時辰者有發一次者有發兩次者總屬不妨斯時切不可擾動叫喚之待其自平即已不必服藥須預對痘家説明免其憂慮以上諸論皆時下種師之祕訣也若夫辨兒之可種與不可種須察兒體之虛實及有無宿病若調治之法當節飲食適寒溫防驚嚇此皆種師俱各明悉茲不重贅鄭望頤疳沈稚年歇乳進谷脾胃氣餒少運腹膨目醫是為五疳夏日中土司令久病投以補氣恰合調其脾胃近日嘔吐泄瀉身熱乃寒暄失和致食不易化小溲既少腑氣不和余幼科久疏憶錢氏每以調中為主而驅邪都主輕法深慮脾土傷則延驚癇耳脾胃虛腑氣不和益智仁焦術茯苓廣皮藿香梗厚朴楂肉澤瀉張四歲五疳腹脹數月法當疏補人參茯苓麥芽炒楂肉廣皮半夏湖蓮又照前方去半夏湖蓮加澤瀉陳五歲官人自汗短氣咳嗽風溫見症肌腠有痤痱之形與疹喑腑病不同但幼稚生陽充沛春深入夏形質日減色脈是虛而補脾辛甘不應腹滿按之自耎二便原得通利腹痛時發時止痛已即能飲食考幼科五疳與大方五勞相類疳必因鬱熱為積為蟲此飲食不充肌膚也病來非暴攻之由漸再論疳熱蟲積古人治肝治胃恆多而潔古東垣於內傷夾滯每制丸劑以緩治取義乎渣質有形與湯飲異歧刻下溫邪擾攘之餘聊以甘涼之屬清養胃陰以化肺熱其辛氣泄表不宜進內傷夾滯蟲積甜杏仁麥冬地骨皮生甘草冬桑葉玉竹和入青甘蔗汁一酒杯丸方仿治疳熱羸瘦從陽明厥陰疏通消補兼施人參黃連蘆薈川楝子使君子茯苓白芍廣皮胡黃連南山楂某七歲食物不節脾胃受戕腹膨大便不調此屬脾疳食傷脾胃焦術茯苓廣皮益智仁大腹皮木瓜炮薑炒神麯吳九歲能食色枯形瘦暮熱泄瀉此皆口腹不慎值長夏溫熱脾胃受傷將成五疳青蒿梗枳實炭胡黃連炒穀芽炒白芍炒山楂廣皮茯苓澤瀉王五疳已久脾胃受傷食物不運腹膨溏瀉此積聚未清中焦先餒完穀不化腫脹皆至難治之症七香餅疳者干也小兒腸胃柔嫩若乳食失調甘肥不節運化不及停積發熱熱久津干此因積成疳者也或五臟偏熱或因病後或醫藥誤下致亡失津液脾不輸化積滯不行此因干致積者也故五疳不離乎脾胃其治法胃滯當消脾弱宜補熱者用苦寒清火冷者宜辛溫健運有蟲者兼用殺蟲之品其虛者各隨本臟補其母總宜丸劑緩調不能旦夕速功或用雞肝納入治疳藥燉食最為有效陸履安徐評此老幼科痘症不僅名家可稱大家矣敬服敬服吐瀉吳身熱吐乳自利溫邪內擾脾胃稚年防驚溫邪藿香葉飛滑石王未到周歲熱犯脾胃嘔逆下利壯熱不已最多慢驚之變人參川連黃芩藿香梗廣皮生白芍烏梅某暑邪犯肺交土王用事脾胃素弱不運暑濕腹鳴泄瀉噁心露睛怕成慢驚暑濕人參藿香炒厚朴木瓜川連茯苓炒扁豆澤瀉章傷食一症考古用五積散之義取暖胃使其腐熟也既上湧頻吐大便溏瀉胃氣益傷陽氣坐困日甚清不升濁不降痰潮乾嘔腹鳴便遺睡則露睛齦黑唇紫小溲竟無陽不流行津液自耗有慢驚昏厥之危議通胃陽讀錢氏薛氏之書能知此意胃陽傷人參鬱金炒半夏炒白附子茯苓菖蒲炒廣皮炒粳米又陽明胃陽受傷腑病以通為補若與守中必致壅逆咋日用方通勝於補獲安幼稚非真虛寒之病人參茯苓益智廣皮炒荷葉炒粳米又鼻明汗出齦血陽明虛胃氣未和不宜涼降六神湯加炒廣皮虞面色痿黃脈形弦遲湯水食物入咽吐出神氣懨懨欲如昏寐此胃陽大乏風木來乘漸延厥逆俗稱慢脾險症幼稚弱質病延半月有餘豈可再以疲藥玩忽宗仲景食谷欲嘔者吳茱萸湯主之人參吳萸茯苓半夏薑汁又昨用泄木救胃土法安受不見嘔吐然中焦陽氣大虛濁氣上僭則為昏厥津液不升唇舌乾燥豈可苦寒再伐生氣今如寐神倦陽陷於陰何疑仲景通陽理虛後賢錢氏薛氏皆宗其義人參炒半夏茯苓廣皮煨薑南棗蘇周歲幼小強食腥面身不大熱神氣呆鈍上吐下瀉最防變出慢驚此乃食傷脾胃為有餘因吐瀉多擾動正氣致傷耳食傷脾胃廣皮厚朴茯苓廣藿香生益智木瓜陳涼風外受內鬱熱伏身發癮疹便解血膩煩渴得汗僅解外風在裡熱滯未和啾唧似痛大便仍有積滯清裡極是但半歲未啖穀食胃弱易變驚症少少與藥鬱熱內伏藿香梗川連黃芩生白芍淡竹葉廣皮滑石炒楂肉余形神衰弱瘕泄純白而癰瘍疳蝕未罷氣喘痰升總是損極今胃虛納減倘內風掀動驚厥立至孰不知因虛變病也胃陽虛人參炒粳米茯神炒廣皮炒荷葉蒂呂十二痰中帶血食已嘔吐因驚僕氣逆令胃不和與黃連溫膽湯因年弱質怯以金石斛代之胃不和溫膽湯去甘草加金石斛薑汁某九歲久嘔少食胃虛氣逆人參半夏茯苓廣皮薑汁某蛔厥少腹痛欲嘔安胃丸王九歲久瀉兼發瘡痍是濕勝熱鬱苦寒必佐風藥合乎東垣脾宜升胃宜降之旨濕熱人參川連黃柏炙草廣皮白朮神麯麥芽柴胡升麻羌活防風何十一夏病入冬仍腹痛下積稚年不慎食物腸胃屢滯利久陰傷身熱發嗆先與理陰疏腑滯濁久痢傷陰積滯未清熟地炭當歸炭山楂炮薑炙草茯苓麥芽世俗所稱慢驚風者不知起於何代創是名者其遺禍於嬰孩已不啻萬億矣蓋就其所指之病而論如吐瀉兼作氣怯神倦虛煩搐搦痰喘不食脈虛無神睡則露睛等症乃與病名毫不相關其所指之症是或由外感未清或諸病誤治或飲食失調或由病後而成以致吐則傷胃瀉則傷脾土衰則不生金中虛木必乘克是皆肝脾肺胃之病治宜急顧本原扶土生金安胃和肝溫養腎陽猶慮弗及若就其名而治之醫家胸中先執慢驚風三字之名概用重墜之藥鎮驚定怯或散風清火豁痰破氣其遺禍可勝言哉蓋是症因中土已虛風木已動延久必現出似驚之狀耳實則並非因驚而起也奈何竟以慢驚風名之豈非指鹿為馬乎要之慢字若以急慢而論則凡病之緩者皆可稱為慢惟驚乃屬急症不可以慢字加之若以傲慢肆慢而講於病名上又甚荒唐惟願觀幼科書者當知其背謬不通勿為其所惑則幸甚今觀先生案中並未嘗用及驚藥風藥是明徵也此症更當兼參東垣立齋景嶽諸法而治之則無遺蘊矣華岫云癇痙厥周稚年癇厥病發迅速醒來二便自通此係陽氣拂逆阻其靈竅姑與清絡宣通方法熱邪阻竅犀角遠志膽星黑山梔元參菖蒲連翹竹葉心唐十四面青脈濡神呆舌縮不伸語寂寂然癇症四肢皆震口吐涎沫此陰風已入脾絡矣陰風入脾絡人參生術蜈蚣全蠍薑汁炒南星薑汁炒白附某伏邪經旬發熱不解唇焦舌渴暮夜神識不清慮其邪陷心胞有痙厥之變邪逼心胞犀角捲心竹葉鮮石菖蒲連翹元參心浙生地又化熱液枯生地竹葉心丹皮元參麥冬生白芍吳冬月伏邪入春病自里發里邪原無發散之理更誤于禁絶水穀徒以芩連枳朴希圖清火消食以退其熱殊不知胃汁再劫肝風掀動變幻痙厥危疴診視舌絳鼻竅黑煤肌膚甲錯乾燥渴欲飲水心中疼熱何一非肝腎陰液之盡引水自救風陽內爍躁亂如狂皆緣醫者未曾曉得溫邪從陰裡熱為病清熱必以存陰為務耳今延及一月五液告涸病情未為穩當所恃童真食谷多歲錢氏謂幼科易虛易實望其尚有生機而已熱邪傷陰肝風動阿膠生地天冬川石斛雞子黃元參心又咸潤頗安其熱邪深入至陰之地古云熱深厥深內涸若此陰液何以上承慮其疳蝕阻咽故以解毒佐之元參心真阿膠真金汁細生地天冬銀花露又胃未得谷風陽再熾入暮煩躁防其復厥生地白芍麥冬金汁阿膠牡蠣金銀花露又神識略蘇常欲煩躁皆是陰液受傷肝風不息議育陰和陽生地牡蠣阿膠麥冬木瓜生白芍又膻中熱熾神躁舌乾痰多咳嗆皆火刑肺金宜用紫雪丹一錢小兒癇痙厥本屬險症十中每死二三奈今之患者十中常死六七其故何也蓋緣醫者不察病情概以芩連鉤藤菖蒲橘紅等夾金石之藥投之以冀清火降痰而已此醫之不善治也而最可惡者尤在病家之父母失於調治有名為愛之實以殺之之故何也小兒諸症如發熱無汗煩躁神昏譫語之頃或戰汗大汗將止之時或嘔吐泄瀉之後或痙厥漸蘇或便久閉而適然大便或灌藥之後斯時正元氣與病邪交戰之際若能養得元氣一分即退一分病邪此際小兒必有昏昏欲睡懶於言語氣怯神弱身不轉動之狀此正當養其元神冀其邪退正復乃病家父母偏於此際張惶驚恐因其不語而呼之喚之因其鼾睡而頻叫醒之因其不動而搖之拍之或因微有昏譫而必詳詰之或急欲以湯飲進之或屢問其痛癢之處嘵嘵不已使其無片刻安寧如此必輕變為重重變為死矣更有豪富之家延醫數人問候者多人房中聚集者多人或互談病情病狀夜則多燃燈燭以照之或對之哭泣不已或信巫不信醫祈禱疊興舉家紛擾此非愛之實以殺之也試以大人之病情體貼之抑好安然寂靜乎抑好喧譁動擾乎此理概可知也豫曾見一孩患暑濕初瘧半月有餘病勢甚重醫者投以蒼朮白虎湯夜半發汗至寅時身體漸涼冷汗不止默默倦睡口不肯言氣息甚微醫云六脈安靜並不煩躁此病退之象也因戒其父母切勿擾動直至申時汗止聲出而病已霍然矣可見無論大人與小兒諸病總宜安然寂靜為主其調養之法有非筆墨所能罄者惟在病家能細心體會醫者能諄諄告戒勿以余言為迂則幸甚更有幼孩發熱昏迷手足厥冷竅絡阻塞哭不出聲藥難下咽斯時惟有請善於推拿者可使立時蘇醒然後再議用藥至於治法癇痙厥本屬三症與大方相類茲不重贅華岫云徐評小兒無癇症不必另立一門即痙厥亦僅病中之一症耳蟲陳七歲濕傷脾胃失調下注小腸蟲從溺竅而出糞溏完穀不可溫補濕熱黃柏茯苓豬苓槐米澤瀉萆薢又蟲自小便而出經月瀉皆黏膩及不化食物此非虛寒皆濕𧈟內蘊運化失司當苦藥勝濕兼理幼稚疳積黃連黃柏茅朮厚朴澤瀉槐角子木通使君子淡竹葉三服後續進肥兒丸龔七歲濕熱生蟲腹痛便溏惡食川連胡連生白芍烏梅枳實川椒炒楂青皮水法丸許腸有濕熱生𧈟蟲用苦寒引導小腸苦楝皮北秦皮槐角子胡粉黃柏牡蠣生研末豬肚腸一條漂潔煮丸張十三丹溪云小兒盜汗不須醫以體屬純陽汗乃陽泄故也至於瘡多濕熱浮腫脹滿得攻下而消此六腑以通為補也其少腹痛屢發亦由濕熱生蟲生積當以酸苦泄熱川連胡連生白芍雞肫皮炒楂肉蘆薈枳實苦楝皮烏梅肉搗丸汪十六肛漏時腫瀉過白蟲手足陽明熱甚陽明熱槐角子黃柏棐子肉生茅朮樗根白皮小川連茯苓炒地榆蒸餅為丸蟲類雖多其源皆由飲食停滯濕熱鬱蒸變化而成者也凡面色痿黃飲食不為肌膚起伏作痛聚散不定痛止即能飲食者皆有蟲積或從嘔或從小便或從大便而出治法當觀其微甚若蟲勢驟急者當用攻逐之劑如黑醜檳榔大黃胡粉山稜莪朮之類蟲去則調其脾胃緩者用酸苦泄熱燥濕兼以相制相畏之品如川連胡連蘆薈苦楝烏梅川椒雷丸蕪荑使君棐肉之類脾弱者兼運其脾胃滯者兼消其滯蟲症治法大略如此陸履安徐評治蟲有緩治之法其病勢甚輕而日久當用膏丸等藥兼補兼消之若病勢危急者必另有峻厲之方並奇藥祕方可殺蟲去積否則元氣消乏不可補救矣
