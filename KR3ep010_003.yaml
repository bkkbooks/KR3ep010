body:
  text: 卷三遺精陳厥後吸短多遺議攝下焦陰虛陽動熟地四錢桑螵蛸二錢覆盆子一錢五味一錢湖蓮三錢芡實二錢茯神三錢山藥二錢某四十夢遺精濁煩勞即發三載不痊腎臟精氣已虧相火易動無制故精不能固由煩動而泄當填補下焦俾精充陽潛可以圖愈熟地八兩麥冬二兩茯神二兩五味二兩線膠四兩川斛膏四兩沙苑二兩遠志一兩芡實三兩湖蓮三兩金櫻膏丸馬二二陰虛體質常有夢泄之疾養陰佐以澀劑仍參入通藥可效六味去丹澤加湖蓮芡實五味遠志秋石金櫻膏丸張陰精走泄陽失依附上冒為熱坎水中陽不藏古人必以厚味填之介類潛之乃從陰以引陽與今人見熱投涼不同熟地龜甲淡菜青鹽茯神柏子仁女貞子山藥旱蓮草某二一脈左弦右濡夢遺咳逆氣急熟地麥冬萸肉五味牡蠣茯神女貞子山藥湖蓮川斛膏芡實金櫻膏加蜜丸每服四五錢淡鹽湯下楊脈垂入尺有夢遺精議填陰攝固其下熟地萸肉五味山藥茯神覆盆子遠志線膠湖蓮芡實金櫻膏丸鹽湯下劉先患目疾流淚嘈雜不欲食內鬱勃陽氣過動陰虛不主攝納春半連次遺泄腰脊酸楚皆肝腎病矣熟地龍骨萸肉茯神丹皮湖蓮芡實遠志某勞損漏瘍大便時溏陰火上升下則遺滑熟地龜版芡實山藥女貞建蓮炙草穭豆皮某少年頻頻遺精不寐心嘈乃屬腎中有火精得熱而妄行日後恐有腎消之纍焦黃柏生地天冬茯苓煅牡蠣炒山藥某脈虛色白陡然大瘦平昔形神皆勞冬至初陽動精搖下泄加以夜坐不靜養暴寒再折其陽身不發熱時時驚惕煩躁從仲景亡陽肉瞤例用救逆湯法必得神氣凝靜不致昏痓瘛瘲之變救逆湯去芍費色蒼脈數煩心則遺陽火下降陰虛不攝有濕熱下注此固澀無功陰虛濕熱萆薢黃柏川連遠志茯苓澤瀉桔梗苡仁吳二二病形在腎肝但得瀉頭中痛微緩少腹陰囊亦脹想陰分固虛而濕熱留著致腑經之氣無以承流宣化理固有諸先泄厥陰鬱熱兼通腑氣再議龍膽草胡黃連萆薢丹皮茯苓澤瀉又閲病原是臟陰陰精之虧致陽浮頭痛兼有遺精月數發下虛上實純以補澀決不應病性不耐丸劑與通攝兩用龜版秋石熟地女貞遠志芡實湖蓮茯苓熬膏錢二十脈右弦左垂陰虛濕熱遺精瘡蝕黃柏知母熟地萆薢茯苓遠志蜜丸某夢遺病乃是陰氣走泄而濕熱二氣乘虛下陷墜自腰中至囊環跳膝蓋諸處可見久遺八脈皆傷議用通藥兼理陰氣豬苓湯又熟地五味芡實茯苓湖蓮山藥宋二三無夢頻頻遺精乃精竅已滑古人謂有夢治心無夢治腎腎陰久損陽升無制喉中貯痰不清皆五液所化胃納少而運遲固下必佐健中下損及中兼治脾胃人參桑螵蛸生龍骨鎖陽芡實熟地茯神遠志金櫻膏丸華二九神傷於上精敗於下心腎不交久傷精氣不復謂之損內經治五臟之損治各不同越人有上損從陽下損從陰之議然必納穀資生脾胃後天得振始望精氣生於穀食自上秋至今日甚乃里真無藏當春令泄越生氣不至漸欲離散從來精血有形藥餌焉能驟然充長攻病方法都主客邪以偏治偏閲古東垣丹溪輩於損不肯復者首宜大進參朮多至數斤謂有形精血難生無形元氣須急固耳況上下交損當治其中若得中蘇加谷繼參入攝納填精斂神之屬方今春木大泄萬花盡放人身應之此一月中急挽勿懈矣參朮膏米飲調送接進寇氏桑螵蛸散去當歸此寧神固精收攝散亡乃澀以治脫之法又半月來服桑螵蛸散以固下參朮膏以益中遺滑得止其下關頗有收攝之機獨是晝夜將寢心中諸事紛紛來擾神傷散越最難斂聚且思慮積勞心脾營血暗損血不內涵神乃孤獨議用嚴氏濟生歸脾方使他臟真氣咸歸於脾今夏前土旺司令把握後天於理最合歸脾湯又立夏四日診左脈百至余頗有斂聚之意右關及尺芤動若革按臍下過寸動氣似若穿梭此關元內空衝脈失養而震躍不息此女子胞胎男子聚精之會也大凡內損精血形氣其胃旺納食者務在滋填今食減不納假寐片晌必煩驚惕醒而汗自述五心熱熾四肢骨節熱痿如墮明是陰精內枯致陽不交陰轉枯轉涸自下及中至上前投桑螵蛸散固澀精竅遺滑經月不來奈寢食不加後天生氣不醒醲厚填補於理難進即參朮甘溫益氣又恐益其枯燥宜參生脈以滋三焦晨進人乳一杯使氣血陰陽引之導之迎夏至一陰來復早用人乳一盞隔湯燉熱服午後略飢用生脈四君子湯又一月來雖經反復參脈症形色生陽頗有根蒂近食蠶豆滯氣腹中微膨食後口味酸濁是久臥重者脾陽運動之機尚少而火升心煩動氣汗出遺精雖減於昔未得平復總是內損已深若調治合宜只要精氣復得一分便減一分病象長夏脾胃主令培土助納為要而精氣散越仍兼攝固之法刻下味酸微膨補脾少佐疏胃宜晚進其早上另制補攝丸劑益臟真以招納散失之氣晚服方人參茯苓白朮炙草廣皮麥冬五味神麯麥芽炒黃柏早上丸方人參桑螵蛸白龍骨淡蓯蓉五味芡實茯神棗仁金箔金櫻膏丸淡鹽湯送三四錢又形色有漸復之象較之夏至病去三四但診右脈弦大尚少衝和左脈細促未靜谷進運遲有吞酸䐜脹寐中仍欲遺精此中焦之陽宜動則運下焦之陰固則能守乃一定成法午後服異功散加炒穀芽晨服遺症固澀下焦乃通套治法想精關已滑澀劑不能取效必用滑藥引導同氣相求古法有諸牛骨髓羊骨髓豬脊髓麋角膠白龍骨生牡蠣熟地萸肉茯神五味山藥芡實湖蓮遠志砂仁膠髓代蜜丸晨服四錢秋石二分化水下毛二六長夏暑溫熱鬱都令脾胃受傷色黃神倦氣分自餒因有遺泄一症在盛年陰虛為多及詢納食未為強旺遺發必勞煩而來脈象非數搏議以養脾立法歸脾去黃耆桂圓加益智龍骨項脈左弱右弦色黃食少腹脹便溏常有夢遺泄此非陰柔澀膩可服用煦陽以涵陰生菟絲子覆盆子蛇床子五味子韭子益智仁煨補骨脂龍骨建蓮粉丸丁陰精走泄陽不內依欲寐即醒心動震悸所謂氣因精奪當養精以固氣從前暖藥不錯但不分剛柔為偏陽是以見血莫見血投涼心腎兼治龜版去牆削光一兩桑螵蛸殼三錢人參一錢當歸一錢青花龍骨三錢飛抱木茯神三錢姚二四始於念萌不遂其欲陽下墜而精泄先夢者心陽注腎久則精血日損不充養筋骨為痛下損及中食不運化此非萸地膩膈以及澀精可效妙香散許十八陰氣走泄遺精務宜滋填塞固今納穀少而不甘胃氣既弱滋膩先妨胃口議用桑螵蛸散蜜丸服三四錢戈遺精數年不但腎關不固陽明脈絡亦已空乏欲得病愈宜戒欲寧心一年寒暑更遷陰陽漸交用桑螵蛸散治之顧十九滑精用陰藥頓然食減藥先傷胃據述夢寐驚狂精走無以護神當固無形矣人參生龍骨桑螵蛸益智仁茯神茯苓遠志木香呂三七有夢乃遺是心有所觸而致經營操持皆擾神動心説商賈客於外非關酒色矣妙香散俞三七壯年形質偉然脈來芤虛述心悸怔多畏懼夜寐不甚寧靜此陽不易交於陰過用勞心使然用妙香散張二四形壯脈小自述心力勞瘁食減遺精仿景嶽精因氣而奪當養氣以充精理其無形以固有形妙香散支二二痰多鼻塞能食有夢遺精醫投疏泄肺氣消痰六十劑不效問讀書夜坐陽氣必升充塞上竅上盛下衰寐則陽直降而精下注為遺用補心丹黃三一真陰損傷而五志中陽上燔喉痛下墜為遺精髓日耗骨痿無力必延枯稿而後已藥餌何足久恃早服補心丹晚服桑螵蛸散胡遺精四年精關久滑不固陰久傷陽氣不入陽蹺穴夜寤不寐前以鎮攝小效獨心中怔悸不已以桑螵蛸散從心腎治畢二六有夢遺精是心腎病清心固腎是為成法得以水火交合病當漸減內傷病從內起豈得與外來六氣混治熟地龍骨遠志五味茯神芡實建蓮金櫻膏丸程左脈剛堅火升神氣欲昏片刻平復宛若無病此皆勞心五志之陽動龍相無制常有遺泄之狀先用滋腎丸三錢淡鹽湯送又早服補陰丸晚服三才加炒黃柏砂仁又交霜降絡中陡然熱蒸肢節皆麻火風震動多因脾腎液枯議用二至百補丸意斑龍二至百補丸加黃柏林十八診脈細澀寐則遺精心熱口渴不時寒熱此腎陰內損心陽暗熾補心丹三錢四服某冬令煩倦嗽加是屬不藏陽少潛伏兩足心常冷平時先夢而遺由神馳致精散必鎮心以安神猶喜胃強納穀若能保養可望漸愈桑螵蛸金櫻子覆盆子芡實遠志茯神茯苓龍骨湖蓮煎膏煉蜜收飢時服七八錢楊十八沖年遺精知識太早難成易虧真陰不得充長及壯盛未有生育而久遺滑漏褚氏謂難狀之疾者蓋病傷可復精損難復也診脈上動尺芤心動神馳神馳精散草木性偏焉得見長務宜斷欲百日以妙香散桑螵蛸散方理心脾以交腎固腎氣以寧心早晚並進百日以驗之呂二四成婚太早精血未滿久泄必關鍵不攝初則精腐變濁久則元精滑溢精濁之病巢氏分晰彰著經言腎虛氣漫為脹咸為腎味上溢口舌皆下失攝納之權腎氣不攝生菟絲子粉蛇床子覆盆子陝沙苑子家韭子五味子鰉魚膠丸許十九脈虛芤應乎失血遺精先天既薄更易泄少藏正褚氏所云難狀之疾沖年須潛心靜處冀水火自交可以精固莫但圖藥餌須堅守瞬刻強制之功鮮河車膏九蒸熟地五味萸肉山藥湖蓮砂仁芡實金櫻膏丸李二五脈小色白失血遺精屢發猶喜納穀胃安封藏固補使其藏聚若再苦寒瀉火胃傷廢食坐以待困矣熟地萸肉五味覆盆子河車膏生菟絲粉山藥湖蓮茯苓芡實金櫻膏丸某脈左部數有鋒芒初夏見紅久遺滑入夜痰升肋痛肝陽上冒腎弱不攝固攝助納必佐涼肝熟地湖蓮芡實生白龍骨茯神川石斛章脈數虛氣衝心熱嗆咳失血屢因嗔怒肝陽升則血湧墜則精遺春末土旺入夏正當發泄主令暮熱晨汗陰陽樞紐失固議進攝真其清寒肺藥須忌兼失血魚鰾膠生龍骨桑螵蛸芡實茯苓五味秋石調入陸二一肌肉鬆柔脈小如數常有夢遺陰精不固上年冬令過溫溫則腠理反疏陽動不藏諸氣皆升絡血隨氣上溢見症如頭面熱目下肉瞤心悸怔忡四末汗出兩足跗腫常冷不溫走動數武即吸短欲喘何一非少陰腎氣失納陽浮不肯潛伏之徵況多夢紛擾由精傷及神氣法當味厚填精質重鎮神佐酸以收之甘以緩之勿因血以投涼莫見下寒輒進燥熱恪守禁忌以安之經年冀有成功所慮沖年志慮未純貽憂反復水制熟地人參秋石拌白龍骨炒杞子五味炒山藥茯神牛膝炭遺精一症前賢各有明辨其義各載本門茲不復贅大抵此症變幻雖多不越乎有夢無夢濕熱三者之範圍而已古人以有夢為心病無夢為腎病濕熱為小腸膀胱病夫精之藏制雖在腎而精之主宰則在心其精血下注濕熱混淆而遺滑者責在小腸膀胱故先生於遺精一症亦不外乎寧心益腎填精固攝清熱利濕諸法如腎精虧乏相火易動陰虛陽冒而為遺精者用厚味填精介類潛陽養陰固澀諸法如無夢遺精腎關不固精竅滑脫而成者用桑螵蛸散填陰固攝及滑澀互施方法如有夢而遺煩勞過度及脾胃受傷心腎不交上下交損而成者用歸脾湯妙香散參朮膏補心丹等方心脾腎兼治之法如陰虛不攝濕熱下注而遺滑者用黃柏萆薢黃連苓澤等苦泄厥陰鬱熱兼通腑氣為主如下虛上實火風震動脾腎液枯而為遺滑者用二至百補丸及通攝下焦之法如龍相交熾陰精走泄而成者用三才封髓丹滋腎丸大補陰丸峻補真陰承製相火以瀉陰中伏熱為主又有房勞過度精竭陽虛寐則陽陷而精道不禁隨觸隨泄不夢而遺者當用固精丸升固八脈之氣又有膏粱酒肉飲醇厚味之人久之脾胃釀成濕熱留伏陰中而為夢泄者當用劉松石豬肚丸清脾胃蘊蓄之濕熱立法雖為大備然臨症之生心化裁存乎其人耳鄒滋九徐評遺精之法固不外乎填精鎮心本無神妙方法俗醫往往用溫熱及黏膩等物必至傷人此老全不犯此但此症總有伏邪為患如火如痰如濕如風不能搜剔餘邪兼以調和臟氣委曲施治方無變病一味安神填腎猶多未盡之理也淋濁某三二濕熱下注淋濁當分利濕熱萆薢淡竹葉瞿麥赤苓細木通萹蓄某二八濕熱下注溺痛淋濁先用分利法萆薢淡竹葉木通赤苓茵陳海金沙魏脈數垂淋濁愈後再發肛脹便不爽余滴更盛萆薢豬苓澤瀉白通草海金沙晚蠶砂丹皮黃柏又滯濁下行痛緩議養陰通腑阿膠生地豬苓澤瀉山梔丹皮毛三四壯盛體豐當夏令濕熱蒸迫水穀氣墜而有淋濁服寒涼腹脹得固澀無效皆非腑病治法子和桂苓飲又前用甘露飲淋濁已止而頭暈左肢麻木胃脘腹中飢則欲痛咽喉中似有物黏著咳咯咽飲不解診脈左徑右濡據症是水弱木失滋涵肝陽化風過膈繞咽達巔木乘胃土陽明脈衰不司束筋骨以利機關脘腹中痛得食則緩者胃虛求助也今壯年有此已屬痱中根萌養肝腎之液以熄虛風補胃土以充絡脈務在守常勿圖速效可望全好制首烏蓯蓉天冬杞子柏子霜茯神菊花炭青鹽紅棗肉丸服四錢晚服豬肚丸方某膏淋濁膩濕熱居多然亦有勞傷腎傷下虛不攝者今以酒客腹中氣墜便積苦辛寒分消治黃柏茯苓萆薢海金沙川楝子青皮防己蠶砂汪脈左堅入尺濕熱下墜淋濁痛陰虛濕熱滋腎丸周二二便濁莖痛滋腎丸三錢吳二四久瘡不愈已有濕熱知識太早陰未生成早泄致陽光易升易降牙宣齦血為濁為遺欲固其陰先和其陽仿丹溪大補陰丸合水陸二仙丹加牡蠣金櫻膏丸黃舌白氣短胸中痛目暗微淋乃陰虛於下氣阻於上暫停參劑早上服都氣丸三錢晚服威喜丸二錢葉三八脈數形瘦素有失血自覺氣從左升痰嗽隨之此皆積勞陽氣鼓動陰弱少制六味壯水和陽極是近日便濁雖宜清熱亦必顧其陰體為要生地丹皮甘草梢澤瀉山梔黑豆皮某陰虛濕熱在腑為濁六味去萸加車前牛膝黃柏萆薢某遺由精竅淋在溺竅異出同門最宜分別久遺不攝是精關不攝為虛但點滴莖中痛癢久腹堅滿此屬淋閉乃隧道不通未可便認為虛況夏令足趾濕腐其下焦先蘊濕熱熱阻氣不流行將膀胱撑滿故令脹堅議理足太陽經五苓散某四五淋濁溺短澀痛先通陽氣下焦陽不流行萆薢三錢烏藥一錢益智五分赤苓三錢遠志四分琥珀末五分蕭四一脈沉淋濁心火下陷分清飲加山梔丹皮茯苓豬苓某二三淋濁小便不利當清利火腑導赤散生地用細者加赤苓瞿麥黃心熱下遺於小腸則為淋濁用藥以苦先入心而小腸火腑非苦不通也既已得效宗前議定法人參黃柏川連生地茯苓茯神丹參桔梗石菖蒲王淋屬肝膽濁屬心腎心火下陷陰失上承故溺濁不禁人參川連生地茯神柏子仁遠志某氏氣閉成淋氣閉紫菀枇杷葉杏仁降香末栝蔞皮鬱金黑山梔又食入痞悶小便淋痛照前方去紫菀黑梔加苡仁某三四小溲短赤帶血膀胱熱血淋導赤散加琥珀末五分赤茯苓胡三五熱入膀胱小溲血淋莖中猶痛非止血所宜議用錢氏導赤散加知柏以清龍雷許十八血淋尿管溺出而痛脈沉實形色蒼黑治從腑熱蘆薈山梔郁李仁紅花當歸酒大黃龍膽草丹皮又血淋未已用堅陰清熱小生地粉丹皮黃柏知母淡竹葉山梔祝五四中年以後瘦人陰虧有熱飲酒濕熱下墜精濁痔血皆熱走入陰則陰不固攝前方宗丹溪補陰丸取其介屬潛陽苦味堅陰若用固澀必致病加精濁陰虛水制熟地龜版膠咸秋石天冬茯苓黃柏知母豬脊筋搗丸範二五精走濁淋脊骨生熱屬陰虛胃弱勿用膩滯龜腹甲心覆盆子五味歸身鹿角膠秋石芡實金櫻膏丸戈四五脈左細徑腰痠溺有遺瀝近日減谷難化此下焦臟陰虛餒漸及中焦腑陽收納肝腎勿損胃氣腎氣不攝熟地杞子柏子仁當歸身紫衣胡桃補骨脂杜仲茯苓青鹽蜜丸某六五六旬有五下焦空虛二便不爽溺管痹痛姑與腎氣湯主治腎氣湯細絹濾清服朱三六血淋管痛腑熱為多經月來每溺或大便其墜下更甚想陰精既損腎氣不收故也咸蓯蓉柏子仁杞子大茴牛膝茯苓某淋濁經年陽損腰痛畏冷熟地杞子鹿角膠巴戟杜仲柏子仁湖蓮芡實葉二七淋屬肝膽濁屬心腎據述病溺出渾濁如膿病甚則多或因遺泄後濁痛皆平或遺後痛濁轉甚想精關之間必有有形敗精凝阻其竅故藥中清濕熱通腑及固澀補陰久餌不效先議通瘀腐一法考古方通淋通瘀用虎杖湯今世無識此藥每以杜牛膝代之敗精濁瘀阻竅用鮮杜牛膝根水洗淨搗爛絞汁大半茶杯調入真麝香一分許隔湯燉溫空心服只可服三四服淋通即止倘日後病發再服又淋病主治而用八正分清導赤等方因熱與濕俱屬無形腑氣為壅取淡滲苦寒濕去熱解腑通病解若房勞強忍精血之傷乃有形敗濁阻於隧道故每溺而痛徒進清濕熱利小便無用者以溺與精同門異路耳故虎杖散小效以麝香入絡通血杜牛膝亦開通血中敗濁也韭白汁九製大黃一兩生白牽牛子一兩歸鬚五錢桂枝木三錢生炒桃仁二兩小茴三錢韭白汁法丸李敗精凝隧通瘀痹宣竅已效生桃仁杜牛膝人中白生黃柏麝香二分調入徐五四五旬又四勞心陽動陰液日損壯年已有痔瘍腸中久有濕熱酒性辛溫亦助濕熱熱下注為癃為淋故初病投八正五苓疏氣之壅也半年不痊氣病漸入於血絡考古方惟虎杖散最宜虎杖散張丹溪謂五淋症濕熱阻竅居多三年前曾有是病月前舉發竟有血塊窒塞尿管大痛不能溺出想房勞強忍敗精離位變成汙濁瘀腐且少腹堅滿大便祕澀臟氣無權腑氣不用考瀕湖發明篇中有外甥柳喬之病與此適符今仿其義參入朱南陽法兩頭尖川楝子韭白小茴桂枝歸尾衝入杜牛膝根汁又痛脹皆減滴瀝成淋前投通濁已效只要凝塊全無便不反復陰藥呆鈍桂附劫液通陽柔劑為宜蓯蓉歸尾柏子仁炒遠志杞子茯苓小茴馬淋閟屬肝膽居多桂附劫陰與剛臟不合診脈沉澀無力非五苓八正可投議用朱南陽法仍是厥陰本方耳老韭根白一兩兩頭尖一百粒小茴香五分川楝子肉一錢歸鬚二錢穿山甲末一錢徐由淋痛漸變赤白濁少年患此多有欲心暗動精離本宮腐敗凝阻溺竅而成乃有形精血之傷三年久病形消肉減其損傷已非一臟一腑然補精充髓必佐宣通為是自能潛心安養尚堪帶病延年熟地生麋角蓯蓉炒遠志赤苓牛膝某每溺尿管窒痛溺後渾濁敗精阻竅濕熱內蒸古方虎杖散宣竅通腐甚妙若去麝香必不靈效較諸湯藥更上一籌矣酒煨大黃炒龍膽草炒焦黃柏牽牛子川楝子黑山梔小茴沉香汁某陰精上蒸者壽陽火下陷者危血淋久而成形窒痛煩心心火直升老人陰精已憊五液化成敗濁阻竅不通欲溺必痛得泄痛減即痛則不通痛隨利緩之謂故知柏六味及歸脾逍遙之屬愈治愈劇其守補升補滋滯澀藥決不中病用琥珀痛減乃通血利竅之意然非久進之方以不傷陰陽之通潤立方生地益母草女貞子阿膠琥珀穭豆皮顧二四敗精宿於精關宿腐因溺強出新者又瘀在裡經年纍月精與血並皆枯稿勢必竭絶成勞不治醫藥當以任督沖帶調理亦如女人之崩漏帶下醫者但知八正分清以濕熱治亦有地黃湯益陰瀉陽總不能走入奇經奇脈病鹿茸龜甲當歸杞子茯苓小茴鮑魚夏六三案牘神耗過動天君陽燧直升直降水火不交陰精變為腐濁精濁與便濁異路故宣利清解無功數月久延其病傷已在任督凡八脈奇經醫每棄置不論考孫真人九法專究其事欲涵陰精不漏意在升固八脈之氣録法參末鹿茸人參生菟絲粉補骨脂韭子舶茴香覆盆子茯苓胡桃肉柏子霜蒸餅為丸劉三九脈緩澀溺後有血或間成塊晨傾溺器必有膠濁黏膩之物四肢寒凜納食如昔病傷奇脈生鹿茸當歸杞子柏子仁沙苑子小茴王五八悲憂驚恐內傷情志沐浴熏蒸外泄陽氣絡中不寧血從漏出蓋衝脈動而諸脈皆動任脈遂失擔任之司下元真氣何以固納述小便欲出有酸楚如淋之狀診脈微小澀最宜理陽通補用青囊斑龍丸淋有五淋之名濁有精濁便濁之別數者當察氣分與血分精道及水道確從何來大凡祕結宜通滑脫當補若因心陽亢而下注者利其火腑濕熱甚而不宣者徹其泉源氣陷用升陽之法血瘀進化結之方此數端人所易曉也獨不知厥陰內患其症最急少腹繞前陰如刺小水點滴難通環陰之脈絡皆痹氣化機關已息先生引朱南陽方法兼參李瀕湖意用滑利通陽辛鹹泄急佐以循經入絡之品豈非發前人之未發耶若夫便濁之恙只在氣虛與濕熱推求實者宣通水道虛者調養中州若虛實兩兼又有益臟通腑之法精濁者蓋因損傷肝腎而致有精瘀精滑之分精瘀當先理其離宮腐濁繼與補腎之治精滑者用固補斂攝倘如不應當從真氣調之景嶽謂理其無形以固有形也然此症但知治肝治腎而不知有治八脈之妙先生引孫真人九法升奇陽固精絡使督任有權漏卮自已可見平日若不多讀古書而臨症焉知此理若不經先生講明豫今日亦不知此方妙處又尿血一症虛者居多若有火亦能作痛當與血淋同治倘清之不愈則專究乎虛上則主於心脾下則從乎肝腎久則亦主於八脈大約與前症相同要在認定陰陽耳邵新甫徐評治淋之法有通有塞要當分別有瘀血積塞住溺管者宜先通無瘀積而虛滑者宜峻補不但煎丸各別並外治之法亦復多端宜博識而詳考之案中並未見及也陽痿徐三十脈小數澀上熱火升喜食辛酸爽口上年因精滑陽痿用二至百補通填未效此乃焦勞思慮郁傷當從少陽以條暢氣血郁柴胡薄荷丹皮鬱金山梔神麯廣皮茯苓生薑仲二八三旬以內而陽事不舉此先天稟弱心氣不主下交於腎非如老年陽衰例進溫熱之比填充髓海交合心腎宜之心腎不交熟地雄羊腎杞子補骨脂黃節遠志茯苓胡桃青鹽鹿筋膠丸王五七述未育子向衰莖縮凡男子下焦先虧客館辦事曲運神思心陽久吸腎陰用斑龍聚精茸珠合方勞心過度男子以八為數年逾六旬而陽事痿者理所當然也若過此猶能生育者此先天稟厚所謂陽常有餘也若夫少壯及中年患此則有色欲傷及肝腎而致者先生立法非峻補真元不可蓋因陽氣既傷真陰必損若純乎剛熱燥澀之補必有偏勝之害每兼血肉溫潤之品緩調之亦有因恐懼而得者蓋恐則傷腎恐則氣下治宜固腎稍佐升陽有因思慮煩勞而成者則心脾腎兼治有郁損生陽者必從膽治蓋經云凡十一臟皆取決於膽又云少陽為樞若得膽氣展舒何郁之有更有濕熱為患者宗筋必弛縱而不堅舉治用苦味堅陰淡滲去濕濕去熱清而病退矣又有陽明虛則宗筋縱蓋胃為水穀之海納食不旺精氣必虛況男子外腎其名為勢若穀氣不充欲求其勢之雄壯堅舉不亦難乎治惟有通補陽明而已華岫云徐評陽痿之病其症多端更僕難盡非專論數千言不明容當另詳茲不復贅汗某二一脈細自汗下體怯冷衛陽式微使然衛陽虛黃耆三錢熟附子七分熟於朮一錢半炙草五分煨薑一錢南棗三錢朱三六脈微汗淋右脅高突而耎色痿足冷不食易飢食入即飽此陽氣大傷衛不擁護法當封固人參黃耆制川附子熟於朮孫五八肉瞤筋惕心悸汗出頭痛愈畏風怕冷陽虛失護用真武湯某勞傷陽虛汗泄黃耆三錢白朮二錢防風六分炙草五分顧氏勞力怫怒心背皆熱汗出往時每以和陽治厥陰肝臟得效今年春夏經行病發且食納頓減褚氏謂獨陰無陽須推異治通補既臻小效不必見熱投涼用鎮其陽以理虛人參半夏茯苓炙草牡蠣小麥南棗張五六脈弦大身熱時作汗出良由勞傷營衛所致經云勞者溫之營衛虛嫩黃耆三錢當歸一錢半桂枝木一錢白芍一錢半炙草五分煨薑一錢南棗三錢某二一脈細弱自汗體冷形神疲瘁知飢少納肢節酸楚病在營衛當以甘溫生黃耆桂枝木白芍炙草煨薑南棗某汗出寒凜真氣發泄痰動風生用辛甘化風法生黃耆桂枝炙草茯苓防風根煨薑南棗梅四三案牘積勞神困食減五心汗出非因實熱乃火與元氣勢不兩立氣泄為熱為汗當治在無形以實火宜清虛熱宜補耳勞傷心神議用生脈四君子湯方茹素惡腥陽明胃弱致厥陰來乘當丑時濈然汗出少寐多夢胃陰虛人參龍骨茯神棗仁炒白芍炙草煎藥吞送蒸熟五味子三十粒又鎮攝汗止火升咳嗽仍屬陰虛難得充復育陰滋液為治熟地炭人參炒麥冬五味炒萸肉川斛茯神女貞子接服瓊玉膏方經云陽之汗以天地之雨名之又云陽加於陰謂之汗由是推之是陽熱加於陰津散於外而為汗也夫心為主陽之臟凡五臟六腑表裡之陽皆心主之以行其變化故隨其陽氣所在之處而氣化為津亦隨其火擾所在之處而津泄為汗然有自汗盜汗之別焉夫汗本乎陰乃人身之津液所化也經云汗者心之液又云腎主五液故凡汗症未有不由心腎虛而得之者心之陽虛不能衛外而為固則外傷而自汗不分寤寐不因勞動不因發散溱溱然自出由陰蒸於陽分也腎之陰虛不能內營而退藏則內傷而盜汗盜汗者即內經所云寢汗也睡熟則出醒則漸收由陽蒸於陰分也故陽虛自汗治宜補氣以衛外陰虛盜汗治當補陰以營內如氣虛表弱自汗不止者仲景有黃耆建中湯先賢有玉屏風散如陰虛有火盜汗發熱者先賢有當歸六黃湯柏子仁丸如勞傷心神氣熱汗泄者先生用生脈四君子湯如營衛虛而汗出者宗仲景黃耆建中湯及辛甘化風法如衛陽虛而汗出者用玉屏風散耆附湯真武湯及甘麥大棗湯鎮陽理陰方法按症施治一絲不亂謂之明醫也夫復奚愧鄒滋九徐評汗出總由於心火不寧屬熱者多屬寒者少今諸方皆用補陽治法乃一偏之見皆由不知汗出之液在何經也誤人多矣亡陽之汗乃陽氣飛越下焦空虛此乃危急之症非參附不能回陽與自盜等大不相同醫者全然不知併為一病貽誤無窮深為可笑脫陳遺尿目瞑口開面亮汗油陽飛欲脫無藥力挽擬參附湯法加入童便圖元真接續耳陽脫又子醜為陰陽交界之時更逢霜降正不相續後現脫象進兩攝陰陽方參附湯加五味子又陽回汗止神蘇無如陰液欲涸心熱渴飲姑救胃汁人參麥冬五味茯神建蓮又腎真未全收納便溺自遺無如咽燥喉痛陽雖初回陰氣欲盡難進溫熱之補大意收攝真陰為治人參麥冬五味熟地炭茯神遠志炭菖蒲根又胃虛客氣上逆為厄噫痰帶血腥咽中微痛用鎮攝法人參熟地北味茯神青鉛周脈革無根左尺如無大汗後寒痙頭巔痛躁渴不寐此屬亡陽平昔飲酒少谷回陽辛甘未得必達有乾嘔格拒之狀真危如朝露矣勉議仲景救逆湯收攝潰散之陽冀有小安再議治病救逆湯加參附徐恰交第七日鼾聲呵欠目瞑煩躁診脈微細而促此皆二氣不相接續衰脫之徵最速是清神熄風方法難以進商急固根蒂仿河間地黃飲陰陽並虛熟地附子蓯蓉萸肉杞子遠志菖蒲川斛黃腎脈不得上縈肝風突起掀旋呵欠鼾聲口噤汗出陰陽不續危期至速地黃飲子極是熟地炭萸肉炭川斛天冬淡蓯蓉牛膝炭五味遠志茯神飲子煎法凌脈大不斂神迷囈語陰陽不相交合為欲脫之象救陰無速功急急鎮固陰陽冀其蘇息人參茯神阿膠淮小麥龍骨牡蠣又陰液枯稿陽氣獨升心熱驚惕倏熱汗泄議用復脈湯甘以緩熱充養五液復脈去薑桂加牡蠣又胃弱微嘔暫與養陽明胃津方人參炒麥冬炒白粳米茯神鮮蓮子肉川斛又人參秋石水拌烘熟地炭天冬麥冬茯神鮮生地又秋燥上薄嗽甚微嘔宜調本兼以清燥人參秋石水拌烘麥冬玉竹生甘草南棗白粳米又安胃丸二錢秋石拌人參湯送某氏脈如雀啄色枯氣促身重如山不思納穀乃氣血大虛慮其暴脫人參生地阿膠麥冬炙草左牡蠣又補攝足三陰人參熟地炭棗仁茯神五味鮮蓮子肉朱氏久損不復真氣失藏交大寒節初之氣厥陰風木主候肝風乘虛上擾氣升則嘔吐氣降則大便寒則脊內更甚熱則神煩不寧是中下之真氣杳然恐交春前後有厥脫變幻擬進鎮逆法人參生牡蠣龍骨附子桂枝木生白芍炙草艾自半月前寒熱兩日色脈愈弱食減寢少神不自持皆虛脫之象議固之澀之不及理病人參生龍骨牡蠣桂枝炙草南棗肉又脈神稍安議足三陰補方人參砂仁末炒熟地炒黑杞子茯神五味牛膝炭脫即死也諸病之死皆謂之脫蓋人病則陰陽偏勝偏勝至極即死矣人之生也負陰抱陽又曰陰在內陽之守也陽在外陰之使也是故陰中有陽陽中有陰其陰陽樞紐自有生以至老死頃刻不離離則死矣故古聖先賢創著醫籍百病千方無非為補偏救弊和協陰陽使人得盡其天年而已夫脫有陰脫陽脫之殊內經論之最詳難經又言脫陽者見鬼脫陰者目盲此不過言其脫時之情狀也明理者須預為挽救則可若至見鬼目盲而治之已無及矣今觀先生之治法回陽之中必佐陰藥攝陰之內必兼顧陽氣務使陽潛陰固庶不致有偏勝之患至於所脫之症不一如中風眩暈嘔吐喘衄汗多亡陽之類是陽脫也瀉痢崩漏胎産下多亡陰之類是陰脫也痧脹乾霍亂痞脹痙厥臟腑窒塞之類是內閉外脫也陽脫於上陰脫於下即人死而魂升魄降之謂也總之陰陽樞紐不脫病雖重不死然則陰陽樞紐何在其在於命門歟華岫云脾胃錢胃虛少納土不生金音低氣餒當與清補胃陰虛不飢不納麥冬生扁豆玉竹生甘草桑葉大沙參王數年病傷不復不飢不納九竅不和都屬胃病陽土喜柔偏惡剛燥若四君異功等竟是治脾之藥腑宜通即是補甘濡潤胃氣下行則有效驗麥冬一錢火麻仁一錢半炒水炙黑小甘草五分生白芍二錢臨服入青甘蔗漿一杯某二四病後胃氣不蘇不飢少納姑與清養鮮省頭草三錢白大麥仁五錢新會皮一錢陳半夏曲一錢川斛三錢烏梅五分某三四脈澀體質陰虧偏熱近日不飢口苦此胃陰有傷邪熱內熾古稱邪火不殺穀是也金石斛陳半夏曲生穀芽廣皮白陳香豉塊茯苓某理肺養胃進以甘寒肺胃陰虛甜杏仁玉竹花粉枇杷葉川貝甜水梨汁某脈數口渴有痰乃胃陰未旺炒麥冬生白扁豆生甘草白粳米北沙參川斛陳二十知飢少納胃陰傷也麥冬川斛桑葉茯神蔗漿某胃陽受傷腑病以通為補與守中必致壅逆胃陽虛人參粳米益智仁茯苓廣皮炒荷葉某食穀不化胃無火也生白芍厚朴新會皮益智仁茯苓砂仁計三三陽微痰黑食入不化人參生益智桂心茯神廣皮煨薑高六八脈耎小帶弦知飢不欲食晨起吐痰是胃陽不足宜用外臺茯苓飲又人參白朮茯苓廣皮半夏枳實皮白蒺藜地栗粉席二三脈右濡臍上過寸有聚氣橫束幾年來食難用飽每三四日一更衣夫九竅失和都屬胃病上脘部位為氣分清陽失司仿仲景微通陽氣為法薤白栝蔞汁半夏薑汁川桂枝鮮菖蒲某三二脈濡自汗口淡無味胃陽憊矣人參淡附子淡乾薑茯苓南棗王脈小右弦病屬勞倦飲食不和醫投柴葛雜入消導升表攻裡致汗泄三日脘中不飢全是胃陽大傷防有噦厄厥逆之變生益智仁薑汁半夏茯苓丁香炒黃米孫長夏熱傷為瘧為痢都是脾胃受傷老年氣衰不肯自復清陽不肯轉旋脘中不得容納口味痰吐不清脈弦右濡澀下焦便不通調九竅不和都胃病也此剛補不安陽土不耐辛熱矣議宣通補方如大半夏湯之類大半夏湯加川連薑汁又小溫中丸錢二二壯年肌柔色黯脈小濡澀每食過不肯運化食冷物臍上即痛色脈參合病象是胃陽不旺濁陰易聚醫知腑陽宜通自有效驗良薑草果紅豆蔻厚朴生香附烏藥汪舌灰黃脘痹不飢形寒怯冷脾陽式微不能運布氣機非溫通焉能宣達脾陽虛半夏茯苓廣皮乾薑厚朴蓽茇周四十脈象窒塞能食少運便溏當溫通脾陽生白朮一錢半茯苓三錢益智仁一錢淡附子一錢乾薑一錢蓽茇一錢又溫通脾陽頗適脈象仍然窒塞照前方再服二劑如丸方當以脾腎同治著想吳酒多谷少濕勝中虛腹痛便溏太陰脾陽少健平胃合四苓加穀芽王五十素有痰飲陽氣已微再加悒鬱傷脾脾胃運納之陽愈憊致食下不化食已欲瀉夫脾胃為病最詳東垣當升降法中求之脾胃陽虛人參白朮羌活防風生益智廣皮炙草木瓜張十九食加便溏胃醒脾不運也方藥當以太陰陽明是調異功散加甘松益智周四二脈緩弱脘中痛脹嘔湧清涎是脾胃陽微得之積勞午後病甚陽不用事也大凡脾陽宜動則運溫補極是而守中及膩滯皆非其通腑陽間佐用之人參半夏茯苓生益智生薑汁淡乾薑大便不爽間用半硫丸朱五四陽微食後吞酸茯苓四兩炒半夏二兩廣皮二兩生於術二兩厚朴一兩淡乾薑一兩蓽澄茄一兩淡吳萸一兩公丁香五錢水法丸某二八脈弦食下䐜脹大便不爽水穀之濕內著脾陽不主默運胃腑不能宣達疏脾降胃令其升降為要濕傷脾胃金石斛三錢厚朴一錢枳實皮一錢廣皮白一錢半苦參一錢神麯一錢半茯苓皮三錢麥芽一錢半陳三八厥陰三瘧半年夏至節交春木退舍大寒熱而倏解病傷未旺雨濕蒸逼外臨內受水穀不運洞泄之後而神倦食減濕傷脾胃清氣用東垣清暑益氣主之清暑益氣法洪嫗脈虛澀弱面乏淖澤鼻冷肢冷肌腠麻木時如寒凜微熱欲溺大便有不化之形穀食不納此陽氣大衰理進溫補用附子理中湯脾腎陽虛趙三七氣分本虛衛少外護畏風怯冷冬天大氣主藏夏季氣泄外越此天熱煩倦一因也是氣分屬陽故桂附理陽頗投考八味古稱腎氣有通攝下焦之功能使水液不致泛溢其中陰藥味厚為君乃陰中之陽藥施於氣虛未為中窾歷舉益氣法無出東垣範圍俾清陽旋轉脾胃自強偏寒偏熱總有太過不及之弊補中益氣加麥冬北味中氣虛又間服四君子湯宣三五痛而納食稍安病在脾絡因飢餓而得當養中焦之營甘以緩之是其治法飢傷歸建中湯戈小便短澀渾濁大便頻溏不欲納穀此傷食惡食也當分消土食傷生益智廣皮茯苓澤瀉炒白芍炒山楂脾胃之論莫詳於東垣其所著補中益氣調中益氣升陽益胃等湯誠補前人之未備察其立方之意因以內傷勞倦為主又因脾乃太陰濕土且世人胃陽衰者居多故用參耆以補中二術以溫燥升柴升下陷之清陽陳皮木香理中宮之氣滯脾胃合治若用之得宜誠效如桴鼓蓋東垣之法不過詳於治脾而略於治胃耳乃後人宗其意者凡著書立説竟將脾胃總論即以治脾之藥籠統治胃舉世皆然今觀葉氏之書始知脾胃當分析而論蓋胃屬戊土脾屬己土戊陽己陰陰陽之性有別也臟宜藏腑宜通臟腑之體用各殊也若脾陽不足胃有寒濕一臟一腑皆宜於溫燥升運者自當恪遵東垣之法若脾陽不虧胃有燥火則當遵葉氏養胃陰之法觀其立論云納食主胃運化主脾脾宜升則健胃宜降則和又云太陰濕土得陽始運陽明陽土得陰自安以脾喜剛燥胃喜柔潤也仲景急下存津其治在胃東垣大升陽氣其治在脾此種議論實超出千古故凡遇稟質木火之體患燥熱之症或病後熱傷肺胃津液以致虛痞不食舌絳咽乾煩渴不寐肌燥熇熱便不通爽此九竅不和都屬胃病也豈可以耆朮升柴治之乎故先生必用降胃之法所謂胃宜降則和者非用辛開苦降亦非苦寒下奪以損胃氣不過甘平或甘涼濡潤以養胃陰則津液來復使之通降而已矣此義即宗內經所謂六腑者傳化物而不藏以通為用之理也今案中所分胃陰虛胃陽虛脾胃陽虛中虛飢傷食傷其種種治法最易明悉余不參贅總之脾胃之病虛實寒熱宜燥宜潤固當詳辨其於升降二字尤為緊要蓋脾氣下陷固病即使不陷而但不健運已病矣胃氣上逆固病即不上逆但不通降亦病矣故脾胃之治法與各門相兼者甚多如嘔吐腫脹泄瀉便閉不食胃痛腹痛木乘土諸門尤宜並參互相討論以明其理可也華岫云徐評發明亦切當木乘土某肝厥犯胃入膈肝胃半夏薑汁杏仁栝蔞皮金鈴子延胡香豆豉白蔻鮑三三情懷不適陽氣鬱勃於中變化內風掀旋轉動心悸流涎麻木悉歸左肢蓋肝為起病之源胃為傳病之所飲酒中虛便易溏滑議兩和肝胃桑葉炒丹皮天麻金斛川貝地骨皮吳脈左數右濡氣塞心痛養胃平肝半夏茯苓炒麥冬柏子仁川楝子青橘葉顧五一脈弦胃脘痹痛子後清水泛溢由少腹湧起顯是肝厥胃痛之症吳萸五分川楝子一錢延胡一錢茯苓三錢桂枝木五分高良薑一錢某二九脈左弦右澀中脘痛及少腹病在肝胃川楝子青皮生香附小茴茯苓南棗某三二舌白噁心液沫泛溢病在肝胃當通陽泄濁吳萸七分乾薑一錢薑汁三分茯苓三錢南棗一枚任三八此情志不遂肝木之氣逆行犯胃嘔吐膈脹開懷談笑可解凝滯血藥乃病之對頭也延胡川楝子蘇梗烏藥香附紅豆蔻王四三胃脘痛高突而堅嘔清涎血沫滴水不能下咽四肢冷肌膚麻木捶背脊病勢略緩此屬肝厥犯胃開口吳萸金鈴子炒延胡生香附高良薑南山楂某脈左弦少寐氣從左升泄肝和胃生左牡蠣五錢川楝子肉一錢化州橘紅一錢半茯苓三錢澤瀉一錢某脈緩左弦晨倦食減在土旺之候急調脾胃戊己湯去甘草加穀芽程五六曲運神機心多擾動必形之夢寐診脈時手指微震食納痰多蓋君相動主消爍安穀不充形骸首宜理陽明以制厥陰勿多歧也人參枳實半夏茯苓石菖蒲某通補陽明和厥陰人參茯苓半夏高良薑吳萸生白芍某四一肝逆犯胃脘痛腹鳴氣撑至咽川楝子桂枝木淡乾薑川椒生白芍吳萸烏梅茯苓程五二操家煩動嗔怒都令肝氣易逆乾嘔味酸木犯胃土風木動乃晨泄食少形瘦脈虛先議安胃和肝人參半夏茯苓木瓜生益智煨薑華二三據説氣攻脅脹春起秋愈此內應肝木飽食不和肝傳胃矣焦白朮半夏柴胡枳實生香附廣皮乾荷葉湯泛丸毛目微黃舌黃煩渴脅肋板實呼吸周身牽掣起於頻吐食物痰飲即胸脘痛脹此肝木犯胃諸氣痹阻雖平昔宜於溫補今治病宜通氣分半夏一錢半廣皮白一錢大杏仁十粒白蔻仁八分川楝子一錢炒延胡一錢生薑五分土栝蔞皮一錢又心中懊惱噎痛氣分熱痰未平用溫膽法竹茹一錢炒黃炒半夏一錢茯苓一錢半枳實一錢桔梗八分橘紅一錢生薑三分王十三癖積是重著有質今痛升有形痛解無迹發於暮夜沖逆欲嘔不吐明是厥氣攻胃由惱怒強食氣滯紊亂而成病發時用河間金鈴子散兼以宣通陽明凝遏可愈金鈴子延胡半夏栝蔞皮山梔橘紅秦二七面長身瘦稟乎木火之形氣阻脘中食少礙痛胃口為逆乃氣火獨熾之象忌用燥熱劫津治以平肝和胃降香鬱金山梔橘紅枇杷葉蘇子川貝母薑皮朱五十半百已衰多因神傷思慮夏四月大氣發泄遂加便溏長夏暑熱無有不大耗氣分寒熱之來乃本氣先怯而六氣得以乘虛今不思納穀之因皆寒熱二氣擾逆胃脘清真受戕所以致困莫蘇不煩不渴胃陽虛也凡醒胃必先制肝而治胃與脾迥別古稱胃氣以下行為順區區術甘之守升柴之升竟是脾藥所以鮮克奏效人參茯苓炒麥冬大麥仁木瓜烏梅董病久正氣已衰喜熱惡寒為虛診得左脈尚弦病在肝但高年非伐肝平肝為事議通補胃陽人參茯苓煨薑新會皮炒粳米炒荷葉蒂陸三六咽屬胃胃陰不升但有陽氣熏蒸致咽燥不成寐沖逆心悸震動如驚厥陰內風乘胃虛以上僭胃脈日虛肢肌麻木當用十味溫膽合秫米湯通攝兼進俾肝胃陽和可以痊安人參茯苓棗仁知母竹茹半夏黃色秫米又用泄少陽補太陰法六君去甘草加丹皮桑葉金斛湯法丸郭脈弦心中熱欲嘔不思食大便不爽乃厥陰肝陽順乘胃口陽明脈絡不宣身體掣痛當兩和其陽酸苦泄熱少佐微辛川連桂枝木生牡蠣烏梅生白芍川楝子芮前議肝病入胃上下格拒考內經諸痛皆主寒客但經年纍月久痛寒必化熱故六氣都從火化河間特補病機一十九條亦然思初病在氣久必入血以經脈主氣絡脈主血也此臟腑經絡氣血須分晰辨明投劑自可入彀更詢初病因驚夫驚則氣逆初病肝氣之逆久則諸氣均逆而三焦皆受不特胃當其衝矣謹陳緩急先後進藥方法厥陰篇云氣上撞心飢不能食欲嘔口吐涎沫夫木既犯胃胃受克為虛仲景謂制木必先安土恐防久克難復議用安胃一法川連川楝子川椒生白芍烏梅淡薑渣歸鬚橘紅內經以攻病剋制曰勝方補虛益體須氣味相生曰生方今胃被肝乘法當補胃但胃屬腑陽凡六腑以通為補黃連味苦能降戴元禮云諸寒藥皆凝澀惟有黃連不凝澀有薑椒歸鬚氣味之辛得黃連川楝之苦仿內經苦與辛合能降能通芍藥酸寒能泄土中木乘又能和陰止痛當歸血中氣藥辛溫上升用須力薄其氣不升梅占先春花發最早得少陽生氣非酸斂之收藥得連楝苦寒內經所謂酸苦泄熱也以氣與熱俱無形無質其通逐之法迥異故辨及之又春分前七日診右脈虛弦帶澀左脈小弦徑而數胃痛已緩但常有畏寒鼓栗俄頃發熱而解此肝病先厥後熱也今歲厥陰司天春季風木主氣肝病既久脾胃必虛風木鬱於土宮營衛二氣未能流暢於經脈為營養護衛此偏熱偏寒所由來矣夫木鬱土位古人制肝補脾升陽散郁皆理偏就和為治勿徒攻補寒熱為調今春半天令漸溫擬兩和氣血佐以宣暢少陽太陰至小滿氣暖泄越必大培脾胃後天方合歲氣體質調理定春季煎丸二方人參茯苓廣皮炙草當歸白芍丹皮桑葉薑棗湯法丸間用煎方人參廣皮穀芽炙草白芍黃芩丹皮柴胡卜有年冬藏不固春木萌動人身內應乎肝水弱木失滋榮陽氣變化內風乘胃為嘔攻脅為痛仲景以消渴心熱屬厥陰內經以吐涎沫為肝病肝居左而病熾偏右木犯土位之徵經旨謂肝為剛臟非柔不和閲醫藥沉桂萸連雜以破泄氣分皆辛辣苦燥有剛以治剛之弊倘忽厥逆瘛瘲奈何議鎮陽熄風法生牡蠣阿膠細生地丹參淮小麥南棗又內風陽氣鼓動變幻皆有形無質為用太過前議鹹苦入陰和陽佐麥棗以和胃制肝獲效蓋肝木肆橫胃土必傷醫治既僻津血必枯唇赤舌絳咽乾穀味即變酸膩顯是胃汁受劫胃陰不復夫胃為陽明之土非陰柔不肯協和與脾土有別故也生牡蠣阿膠細生地小麥炒麻仁炒麥冬炙草張五七脈小弦納穀脘中哽噎自述因乎悒鬱強飲則知木火犯土胃氣不得下行所致議苦辛泄降法黃連鬱金香淡豆豉竹茹半夏丹皮山梔生薑又前方泄厥陰通陽明為沖氣吐涎脘痞不納穀而設且便難艱阻胸脹悶上下交阻有年最慮關格與進退黃連湯江晨起腹痛食谷微滿是清濁之阻按脈右虛左弦不思飲食脾胃困頓都屬虛象古人培土必先制木仿以為法人參淡吳萸淡乾薑炒白芍茯苓周五九酒熱濕痰當有年正虛清氣少旋遂致結祕不能容納食少自述多郁易嗔議從肝胃主治半夏川連人參枳實茯苓薑汁王五五噦逆舉發湯食皆吐病在胃之上脘但不知起病之因由據云左脅內結瘕聚肝木侮胃明系情懷憂勞以致氣鬱結聚久病至頗能安穀非純補可知泄厥陰以舒其用和陽明以利其腑藥取苦味之降辛氣宣通矣川楝子皮半夏川連薑汁左牡蠣淡吳萸唐痞逆噁心是肝氣犯胃食入臥著痛而且脹夜寐不安亦是胃中不和貴乎平肝養胃致其復若見有形沖逆之狀攻伐兢進有痞滿成脹之患川連神麯吳萸川楝子楂肉鬱金姚寒熱嘔吐脅脹脘痹大便乾澀不暢古云九竅不和都屬胃病法當平肝木安胃土更常進人乳薑汁以益血潤燥宣通午後議用大半夏湯人參半夏茯苓金石斛廣皮菖蒲胡氏經後寒熱氣衝欲嘔忽又如飢仍不能食視其鼻準亮咳汗氣短多藥胃傷肝木升逆非上焦表病炙甘草小生地芝麻仁阿膠麥冬白芍牡蠣又照前方去牡蠣加人參又衝陽上逆則煩不得安仍是陰弱夫胃是陽土以陰為用木火無制都系胃汁之枯故腸中之垢不行既知陰虧不必強動大便人參鮮生地火麻仁天冬麥冬炙草徐氏經候適來肢骸若撤環口肉瞤蠕動兩踝臂肘常冷夫衝脈血下蹺維脈怯不用沖隸陽明厥陰對峙因驚肝病木乘土位以致胃衰初則氣升至咽久則懶食脘痞昔人有治肝不應當取陽明陽明不闔空洞若谷厥氣上加勢必嘔脹吞酸然陽明胃腑通補為宜剛藥畏其劫陰少濟以柔藥法當如是人參二錢半夏薑汁炒三錢茯苓三錢淡附子七分白粳米五錢木瓜二錢胃虛益氣而用人參非半夏之辛茯苓之淡非通劑矣少少用附子以理胃陽粳米以理胃陰得通補兩和陰陽之義木瓜以酸救胃汁以制肝兼和半夏附子之剛愎此大半夏與附子粳米湯合方張氏肝病犯胃心痛乾嘔不能納食肢冷泄瀉腑經陽失流展非虛寒也金鈴子散加川連烏梅桂枝生薑徐氏屢屢墮胎下元氣怯而寒熱久嗽氣塞填胸湧吐涎沫乃鬱勃嗔怒肝膽內寄之相火風木內震不息犯胃則嘔逆吞酸乘胸侵咽必脹悶喉痹漸漸昏迷欲厥久延不已為郁勞之疴此治嗽清肺重鎮消痰越醫越凶考內經肝病主治三法無非治用治體又曰治肝不應當取陽明蓋陽明胃土獨當木火之侵侮所以制其沖逆之威也是病原治法大略安胃丸椒梅湯送鮑嫗風泄已止胃逆不納食人參川連烏梅木瓜川斛橘紅朱氏嗔怒動肝氣逆噁心胸脅閃動氣下墜欲便是中下二焦損傷不復約束之司失職擬進培土泄木法亦暫時之計烏梅乾薑川連川椒人參茯苓川楝生白芍王氏寡居多郁宿病在肝邇日暑邪深入肝病必來犯胃吐蛔下利得止不思穀食心中疼熱仍是肝胃本症況暑濕多傷氣分人參輔胃開痞扶胃有益幸無忽致疲可也人參川連半夏薑汁枳實牡蠣又胃開思食仍以制肝和胃人參金石斛半夏枳實茯苓橘紅呂氏季脅之傍是虛里穴今跳躍如梭乃陽明絡空也況衝脈即血海亦屬陽明所管經行後而病忽變前案申説已著茲不復贅大凡絡虛通補最宜身前沖氣欲脹衝脈所主病內經所謂男子內結七疝女子帶下瘕聚今也痛無形象諒無結聚只以冷汗跗寒食入噁心鼻準明環口色青肝胃相對一勝必一負今日議理陽明之陽佐以宣通奇脈仲景於動氣一篇都從陽微起見仿以為法人參茯苓淡熟附子生蘄艾桂枝木炒黑大茴紫石英生杜仲朱氏上冬用溫通奇經帶止經轉兩月間納穀神安今二月初二日偶涉嗔忿即麻痹乾嘔耳聾隨即昏迷如厥診脈寸強尺弱食減少口味淡微汗此厥陰之陽化風乘陽明上犯矇昧清空法當和陽益胃治之人參一錢茯苓三錢炒半夏一錢半生白芍一錢烏梅七分肉小川連二分淡生薑二分廣皮白一錢此厥陰陽明藥也胃腑以通為補故主之以大半夏湯熱擁於上故少佐薑連以瀉心肝為剛臟參入白芍烏梅以柔之也又三月初五日經水不至腹中微痛右脅蠕蠕而動皆陽明脈絡空虛衝任無貯當與通補入絡人參一錢當歸二錢茺蔚子二錢香附醋炒一錢茯苓三錢小茴一錢生杜仲二錢又照方去茺蔚杜仲白芍官桂某氏久有痛經氣血不甚流暢驟加暴怒傷肝少腹沖氣上犯逆行於肺為咳寒熱聲嗄脅中拘急不飢不納乃左升右降不司轉旋致失胃氣下行為順之旨故肝用宜泄胃腑宜通為定例矣鉤藤丹皮桑葉半夏曲茯苓廣皮白又威喜丸唐積勞內傷脘悶脅脹嘔吐格拒眩暈不得臥陽挾內風暴張恐其忽然瘈厥議通胃平肝法小川連薑汁半夏牡蠣川楝子生白芍江拒按為實患目病來屬肝痛必多嘔大便祕澀肝病及胃當苦辛泄降少佐酸味小川連生淡乾薑半夏枳實黃芩生白芍顧五十陽明脈衰形寒痞飢不食心痛洞泄兼嘔人參吳萸茯苓半夏生薑炒黃粳米某勞怒傷陽氣逆血鬱致痛痞脹便溏風木侮土前方既效與通補陽明厥陰大半夏湯去蜜加桃仁柏子仁當歸薑棗湯法丸某脈微小弱是陽氣已衰今年太陰司天長夏熱泄氣分不食不運味變酸苦脾胃先受困也稍涉嗔怒木乘土中益加不安從東垣培土製木法人參廣皮茯苓益智木瓜淡薑渣夏通補陽明開泄厥陰人參半夏茯苓橘紅吳萸白芍汪氏氣滯脾弱肝脾逍遙散加鬱金砂仁末席大便未結腹中猶痛食入有欲便之意胃陽未復肝木因時令尚橫用泄木安土法肝脾胃人參木瓜厚朴茯苓益智仁青皮江鎮衝任溫養下焦頗效所議治嗽肺藥寒涼清火背謬顯然炒黑杞子淡蓯蓉小茴香拌炒當歸沙苑石殼建蓮茯神紫石英煎湯煎藥又動怒脘下痛不飲食是肝厥犯脾胃病外生枝最非善調之理理氣皆破泄難用議進制肝木益胃土一法人參一錢炒焦白芍一錢半真枷南香汁沖五小匙炒焦烏梅三分酸泄肝陽茯苓五錢切小塊甘淡益胃化橘紅五分宣通緩痛又人參嫩鉤藤明天麻化橘紅炒烏梅肉茯苓伽南香朱胃弱痰多補虛宜通肝陽易升左頰赤佐泄少陽肝膽胃人參炒半夏茯苓鉤藤經霜桑葉煨薑南棗範五七脾竅開舌舌出流涎為脾病克脾者少陽膽木以養脾泄膽治膽脾人參於朮天麻薑黃桑葉丹皮某補太陰泄少陽人參茯苓焦術炙草廣皮白芍炒丹皮桑葉又照方去甘草桑葉加木瓜李五十少陽木火犯太陰之土持齋淡薄中虛熱灼以補脾和肝為久長調理四君子加芩芍桑葉丹皮金能食運遲香紋裂左頤肉腫不喜飲水太陰脾陽郁法當補土泄木於朮茯苓新會皮炙草煨益智柴胡丹皮白芍張二九脈小弱是陽虛體質由鬱勃內動少陽木火木犯太陰脾土遂致寢食不適法當補土泄木人參一錢半白朮一錢半半夏一錢茯苓二錢甘草五分廣皮一錢丹皮三錢桑葉一錢薑一錢棗二錢肝為風木之臟又為將軍之官其性急而動故肝臟之病較之他臟為多而於婦女尤甚肝病必犯土是侮其所勝也本臟現症仲景云厥陰之為病消渴氣上撞心心中疼熱飢而不欲食食則吐蛔下之利不止又內經所載肝病難以盡述大凡其脈必弦脅或脹或疼偏寒偏熱先厥後熱若一犯胃則噁心乾嘔脘痞不食吐酸水涎沫克脾則腹脹便或溏或不爽肢冷肌麻案中治法有陰陽虛實之殊略舉而敘述之若肝陰胃陰未虧肝陽亢逆犯胃先生立法用藥則遠柔用剛泄肝如吳萸椒桂通胃如半夏薑汁薑附加益智枳朴等則兼運脾陽中虛必用人參故大半夏湯附子粳米湯進退黃連湯瀉心法治中法溫膽等湯是也若肝陰胃汁已虛木火熾盛風陽擾胃用藥忌剛用柔養肝則阿膠生地白芍麻仁木瓜養胃則人參麥冬知母粳米秫米等是也至於平治之法則剛柔寒熱兼用烏梅丸安胃丸逍遙散若四君六君異功戊己則必加泄肝之品用桑葉丹皮者先生云桑葉輕清清泄少陽之氣熱丹皮苦辛清泄肝膽之血熱用金鈴子散者川楝苦寒直泄肝陽延胡專理氣滯血澀之痛此皆案中之綱領也余另分此一門者因嘔吐不食脅脹脘痞等恙恐醫者但認為脾胃之病不知實由肝邪所致故特為揭出以醒後人之目耳且世人但知風勞臌膈為四大重症不知土敗木賊肝氣日橫脾胃日敗延至不救者多矣可不究心於此哉華岫云徐評諸案大抵皆胸痹痞滿及痰飲內蓄之症治痞痹之方最忌人參而此欲其壯土以制木用者甚多必有遺病至於蓄痰症全不齒及尤屬辨症不清其中精思巧意中病處頗多亦得失參半也腫脹某五一食谷不運䐜脹嘔惡大便不爽脈弦色黃此胃陽式微升降失司使然法當溫通陽氣胃陽虛吳萸八分半夏三錢蓽茇一錢淡乾薑一錢生薑汁五分廣皮白一錢半陳三八診脈右大而緩左如小數促冬季寒熱身痛汗出即解自勞役飢飽嗔怒之後病勢日加面浮足腫呼吸皆喘目淚鼻衄臥著氣衝欲起食納留中不運時序交夏脾胃主候睹色脈情形中滿脹病日來矣蓋此症屬勞倦致損初病即在脾胃東垣云胃為衛之本脾乃營之源臟腑受病營衛二氣晝夜循環失度為寒為熱原非瘧邪半表半裡之症斯時若有明眼必投建中而愈經言勞者溫之損者益之建中甘溫令脾胃清陽自立中原砥定無事更遷仲景亦謂男子脈大為勞則知內經仲景東垣垂訓真規矩準繩至法且汗泄積勞都是陽傷醫藥辛走劫陽苦寒敗胃病人自述飲蔗即中脘不舒頃之少腹急痛便稀其胃陽為苦辛大傷明甚又述咳頻沖氣必自下上逆夫衝脈隸於陽明胃陽傷極中乏坐鎮之真氣衝脈動則諸脈交動濁陰散漫上布此臥著欲起矣愚非遙指其脹正合內經濁氣在上則生䐜脹太陰所至為腹脹相符也昔有見痰休治痰見血休治血當以病因傳變推求故辨論若此厚朴杏仁人參茯苓蜜煨薑南棗厚朴杏仁取其能降氣參苓薑棗取其建立胃中之清陽而和營衛也吳二四單脹溺少溫通頗適當用大針砂丸一錢二分八服脾陽虛某食下䐜脹舌黃當治脾陽生白朮一錢半廣皮一錢茯苓三錢厚朴一錢木瓜五分淡附子七分徐三九攻痞變成單脹脾陽傷極難治之症生白朮熟附子茯苓厚朴生乾薑錢食入腹脹已五十日且痛必有形攻動頭中微痛夫痞滿屬氣痛因氣滯二便既通其滯未必在乎腸胃從太陰脾陽傷以辛溫開泄主之桂枝生白芍淡乾薑厚朴又照方去白芍加生益智仁茯苓楊五十飲酒聚濕太陰脾陽受傷單單腹脹是濁陰之氣錮結不宣通二便不爽治以健陽運濕生茅朮草果附子廣皮厚朴茯苓蓽茇豬苓吳四三食下䐜脹便溏不爽肢木不仁此脾陽困頓不能默運使然溫通中陽為主白朮三錢附子一錢炮薑一錢半桂枝木一錢茯苓三錢蓽茇一錢僧四七俗語云膏粱無厭發癰疽淡泊不堪生腫脹今素有脘痛氣逆嘔吐漸起腫脹乃太陰脾臟之陽受傷不司鼓動運行陰土宜溫佐以制木治生於術茯苓廣皮椒目厚朴益智仁良薑某六七左脈弦脹滿不運便泄不爽當溫通脾陽草果仁一錢茯苓皮三錢大腹皮三錢廣皮一錢半青皮一錢厚朴一錢半木豬苓一錢半椒目五分吳寒熱傷中腹微滿舌白用治中法人參益智廣皮茯苓澤瀉金斛木瓜周五五久嗽四年後失血乃久積勞傷酒肉不忌濕鬱脾陽為脹問小溲僅通大便仍溏濁陰乘陽午後夜分尤劇生於術熟附子陳五十積勞脾陽傷食下脹足腫生白朮茯苓熟附子草果仁厚朴廣皮某躬耕南畝曝於烈日漬於水土暑濕內蒸為瀉痢邪去正傷臨晚跗腫腹滿乃脾陽已困諸氣不司運行濁陰漸爾竊據內經病機諸濕腫滿皆屬於脾生白朮草蔻茯苓厚朴附子澤瀉鄒三九深秋霍亂轉筋必有暴冷傷及脾胃病機一十九條河間皆謂熱亦屬偏見愈瀉愈脹豈是實症夫酒客之濕皆脾胃陽微不運致濕邪凝聚氣壅成脹見脹滿徹投攻下不究致病之因故曰難調之症生白朮草果熟附子厚朴廣皮茯苓陳四四苦寒多用胃陽久傷右脅痛嘔酸濁皆濁陰上干用辛甘溫中補虛痛減病人述早上腹寬暮夜氣緊微硬大便不爽有單腹脹之憂脾胃陽虛人參生白朮茯苓肉桂歸身益智廣皮煨薑趙五四胸腹脹滿久病痰多生白朮二兩茯苓二兩厚朴一兩肉桂五錢薑汁丸本草云厚朴與白朮能治虛脹仿潔古枳朮之意也佐茯苓通胃陽肉桂入血絡則病邪可卻矣楊脈沉小弦中年已後陽氣不足痰飲水寒皆令逆趨致運納失和漸有脹滿浮腫法以辛溫宣通以本病屬脾胃耳人參一錢茯苓三錢白芍一錢半淡附子一錢薑汁三分調倪二十腹耎膨便不爽腑陽不行生益智茯苓生穀芽廣皮砂仁殼厚朴又六腑不通爽凡濁味食物宜忌雞肫皮麥芽山楂砂仁陳香櫞又脈沉小緩早食難化晚食夜脹大便不爽此腑陽久傷不司流行必以溫藥疏通忌食閉氣黏葷生白朮附子厚朴草果茯苓廣皮白檳榔汁浦四九腎氣丸五苓散一攝少陰一通太陽濁泄溺通腹滿日減不為錯誤但虛寒脹病而用溫補閲古人調劑必是通法蓋通陽則濁陰不聚守補恐中焦易鈍喻氏謂能變胃而不受胃變苟非純剛之藥曷勝其任腎胃陽虛議於暮夜服玉壺丹五分晨進人參半夏薑汁茯苓枳實乾薑陳六二老人脾腎陽衰午後暮夜陰氣用事食納不適腸鳴䐜脹時泄治法初宜剛劑俾陰濁不僭陽乃復闢人參一錢半淡附子一錢淡乾薑八分茯苓三錢炒菟絲三錢胡蘆巴一錢此治陽明之陽也若參入白朮甘草則兼走太陰矣某三七腫脹由足入腹診脈細軟不能運谷當治少陰太陰脾腎陽虛生白朮厚朴茯苓淡附子淡乾薑蓽茇馬三六暮食不化黎明瘕泄乃內傷單脹之症脾腎之陽積弱據理當用腎氣丸顧四三脈微而遲色衰萎黃蟹為介屬鹹寒沉降凡陽氣不足者食之損陽其致病之由自試二次矣久利久泄古云無不傷腎今浮腫漸起自下是水失火而敗若非暖下徒見泄瀉有紅為脾胃濕熱必致中滿敗壞生茅朮熟地炭熟附子淡乾薑茯苓車前某脾腎虛寒多瀉由秋冬不愈春木已動勢必剋土腹滿小便不利乃腫病之根若不益火生土日吃疲藥焉能卻病人參白朮附子生益智菟絲子茯苓姚四八據説情懷不適因嗔怒痰嗽有血視中年形瘁肉消漸漸腹脹跗腫下午漸甚陽氣日奪早服腎氣丸三錢晝服五苓散腎陽虛殷氏行動氣墜於下臥著氣擁於上此跗腫晝甚頭脹夜甚總是中年陽微最有腹大喘急之事濟生丸十服某陽微陰結腫脹附子苡仁白朮木防己澤瀉細辛朱陽明胃逆厥陰來犯丹溪謂上升之氣自肝而出清金開氣亦有制木之功能而痛脹稍緩議以溫膽加黃連方肝胃不和半夏茯苓橘紅枳實竹茹川連生白芍某二八舌微黃瘕逆脘胸悉脹當和肝胃桂枝木乾薑青皮吳萸川楝子炒半夏秦兩年初秋發傷脈絡氣血不為流行而腹滿重墜臥則頗安臍左動氣臥則尤甚吐冷沫常覺冷氣身麻語塞肝風日熾疏泄失職經以肝病吐涎沫木侮土位自多䐜脹丹溪云自覺冷者非真冷也兩次潰瘍之後剛燥熱藥似難進商議以宣通肝胃為治有年久恙貴乎平淡矣雲茯苓三錢三角胡麻搗碎滾水洗十次三錢厚橘紅一錢嫩鉤藤一錢熟半夏炒黃一錢半白旋覆花一錢濾清服一杯四帖又接服大半夏湯熟半夏炒二錢半雲苓小塊五錢薑汁調服四分人參同煎一錢方五九診脈百至右緩澀左弦徑始而腸鳴泄氣由漸腹滿䐜脹納食幾廢便難溺少此皆情懷少曠清氣不轉肝木侵侮胃土腑陽窒塞脹滿日甚據云先因胃脘心下痛症氣鬱顯然非旦晚圖功之象議河間分消法肝鬱犯胃兼濕杏仁厚朴海金沙陳香櫞鬱金萊蔔子木通雞肫皮王三七食入不運脘中䐜脹病由悒鬱經年不愈視色黃形瘦按脈小而澀喜涼飲惡熱大便未經通調九竅不和皆胃病矣川連雞肫皮枳實廣皮桔梗栝蔞實半夏萊蔔子鬱金杏仁薑汁竹瀝丸楊四十肝鬱乘胃為脹經年內結有形用緩消一法生茅朮雞肫皮川連生厚朴淡薑渣針砂制椒目湯法丸畢濕熱由腑滯及腸中大便不爽食入不適平昔肝木易動厥陰不主疏泄少腹形脹無非滯氣之壅久則凝瘀日踞小溫中丸三錢十服程三十脈右弦面黃腹滿按之漉漉有聲每大便先腹痛便不能幹爽此胃氣不降陽氣自滯由乎嗔怒不息肝木橫逆疏泄失司䐜脹之來皆由乎此議泄肝通腑濁宣脹減之義杏仁紫厚朴豬苓鬱金椒目檳榔汁接服小溫中九某五七不飢不運少腹胃脘悉滿診脈左弦乃肝木犯胃二腑不主流行濁陰漸次瀰漫他日單脹之作竟有難以杜患者速速戒惱怒安間自在誠治斯疾之良圖小溫中丸一錢五分開水送下夏夏四月脾胃主氣嗔怒怫鬱無不動肝肝木侮土而脾胃受傷郁久氣不轉舒聚而為熱乃壯火害氣宜乎減食䐜脹矣當作木土之郁調治桂附助熱萸地滋滯鬱熱益深是速增其病矣鉤藤丹皮黑山梔川連青皮子紫厚朴萊蔔子廣皮白薄荷梗又脹勢已緩脈來弦實此濕熱猶未盡去必淡泊食物清肅胃口以清滲利水之劑服五六日再議豬苓澤瀉通草海金沙金銀花茯苓皮黑穭豆皮又診脈浮中沉來去不為流利氣阻濕鬱膠痰內著議用控涎丹六分緩攻又服控涎丹大便通而不爽診右脈弦實目黃舌燥中焦濕熱不行因久病神倦不敢過攻議用丹溪小溫中丸每服三錢乃泄肝通胃以緩治其脹謝形神勞煩陽傷腑氣不通疝瘕陰濁從厥陰乘犯陽明胃為陰濁蒙閉腸中氣窒日甚年前邪勢頗緩宣絡可效今閉錮全是濁陰若非辛雄剛劑何以直突重圍脹滿日增人力難施矣生炮川烏頭生淡川附子淡乾薑淡吳萸川楝子小茴香豬膽汁唐氏紫菀杏仁通草鬱金黑山梔又三焦不通脘痹腹脹二便皆祕前方用開手太陰肺苦辛潤降小溲得利兼進小溫中丸泄肝平胃脹勢十減有五但間日寒熱復來必是內郁之氣陽不條達多寒戰栗議用四逆散和解其小溫中丸仍用生白芍枳實柴胡黃芩半夏杏仁竹茹生薑張嫗腹臌䐜脹大便不爽得暖氣稍快乃陽氣不主流行蓋六腑屬陽以通為補春木地氣來升土中最畏木乘勢猖熾治當泄木安土用丹溪小溫中丸每服三錢張氏用鎮肝逆理胃虛方法脈形小弱吐涎沫甚多仍不納穀周身寒凜四肢微冷皆胃中無陽濁上僭踞而為䐜脹所謂食不得入是無火也肝犯胃陽虛人參吳萸乾薑附子川連茯苓丁三十嗔怒氣血逆亂右脅不和夜食噯噫䐜脹乃肝胃病治以解鬱宣通氣血木鬱氣滯血澀鉤藤丹皮桑葉生香附茯苓神麯降香木炒黑楂肉徐平素肝氣不和脅肋少腹䐜脹氣血不調痰飲漸聚厥陰陽明同治桃仁延胡歸尾小茴香附半夏茯苓橘紅神麯馬三四脈實久病瘀熱在血胸不爽小腹墜能食不渴二便澀少兩進苦辛宣腑病未能卻此屬血病用通幽法桃仁郁李仁歸尾小茴紅花製大黃桂枝川楝子又晝日氣墜少腹夜臥不覺甚則頭昏胸悶今年五月初用疏滯繼通三焦續進通幽其墜脹仍若議辛香流氣法川楝子延胡小茴黑山梔青木香橘核生香附磨汁法丸董初因下血轉痢繼而大便祕艱自左脅下有形漸致脹大堅滿小便自利病在血分久病兩年形瘦氣短不敢峻攻若五積成例議用古禹餘糧丸每日一錢鄭氏得食腹痛上及心胸下攻少腹甚至筋脹擾於周身經絡之間大便欲解不通暢此乃腸胃氣阻故痛隨利減神保丸一錢張脈左弦右浮澀始因脘痛貫脅繼則腹大高凸納食減少難運二便艱澀不爽此乃有年操持縈慮太甚肝木拂鬱脾土自困清濁混淆脹勢乃成蓋臟真日漓腑陽不運考古治脹名家必以通陽為務若滋陰柔藥微加桂附凝陰沍濁豈是良法議用局方禹糧丸暖其水臟攻其穢濁俟有小效兼進通陽剛補是為虛症內傷脹滿治法至於攻瀉劫奪都為有形而設與無形氣傷之症不同也肝鬱犯脾局方禹餘糧丸陳嫗久郁傷及脾胃之陽面無華色納粥欲嘔大便溏泄氣陷則跗腫氣呆則脘悶有中滿之憂用治中法肝犯脾胃人參生益智煨薑茯苓木瓜炒廣皮程女脈數噁心脘脹肝脾不和夾暑邪炒半夏廣皮藿香黃連一分煎水拌茯苓鬱金又暑傷脾胃則肝木犯土左腹膨泄瀉人參厚朴廣皮炒澤瀉茯苓木瓜炙草炒楂肉又人參炒柴胡炒白芍炒黃芩茯苓炙草生薑大棗宋食入脘脹此屬胃病視色蒼形瘦自述飲酒嘔吐而得又述耳鳴肉瞤是木火犯中鬱勃病甚議用逍遙減白朮合左金方木火犯土朱四三瘰癧馬刀都是肝膽為病病久延及脾胃腹滿便澀舌黃微渴非溫補可服泄木火以疏之和脾胃以調之冀其脹勢稍減吳萸拌川連生於術川楝子炒山楂黑山梔厚朴青皮椒目唐女氣臌三年近日跌僕嘔吐因驚氣火更逆胸臆填塞脹滿二便皆通自非質滯喜涼飲面起疸瘰從病能篇驟脹屬熱川連淡黃芩半夏枳實乾薑生白芍鐵鏽針顏六三今年風木加臨太陰陽明不及遂為䐜脹小便不利兩跗皆腫大便澀滯治在腑陽用分消湯方肝犯脾胃陽虛有濕生於術茯苓澤瀉豬苓厚朴椒目海金沙湯煎吳今歲厥陰司天加臨驚蟄節病腹滿喘促肢腫面浮寒熱汗出皆木乘土位清陽不得舒展濁氣痞塞僭踞故泄氣少寬姑擬通腑以泄濁生於術茯苓椒目紫厚朴澤瀉淡薑渣朱四九鬱勃久坐中焦不運寒熱小溲不通腹膨脹滿脈小而澀全是腑陽失司與泄木通腑分消法四苓加椒目厚朴大腹皮青皮陳壯盛年歲形消色奪診脈右小促左小弦徑病起上年秋季脘中卒痛有形梗突病後陡遇驚觸漸次食減不適食入不運停留上脘腹形脹滿甚則脅肋皆脹四肢不暖暮夜漸溫大便旬日始通便後必帶血出清早未食自按臍上氣海有瘕形甚小按之微痛身動飲水寂然無蹤天氣稍冷爪甲色紫細推病屬肝脾氣血不通則為郁遏久則陽微痹結上下不行有若否卦之義閲醫藥或消或補總不見效者未知通陽之奧耳肝脾不和清陽痹結薤白桂枝栝蔞仁生薑半夏茯苓又薤白汁桂枝木栝蔞實川楝子皮半夏茯苓歸鬚桃仁延胡薑汁二汁法丸某脹滿跗腫小溲短澀不利便泄不爽當開太陽為主濕濁凝滯小溲不行當開太陽五苓散加椒目某六七少腹單脹二便通利稍舒顯是腑陽窒痹濁陰凝結所致前法專治脾陽宜乎不應當開太陽為要五苓散加椒目鄭兩投通里竅法痛脹頗減無如陰陽不分舌絳煩渴不欲納穀想太陽膀胱不開陽明胃不司闔法當仍與通陽腑為要但五苓桂術斷不適用議用甘露飲意豬苓茯苓澤瀉寒水石椒目炒橘核程今年長夏久熱熱勝陽氣外泄水穀運遲濕自內起漸漸浮腫從下及上至於喘咳不能臥息都是濁水凝痰阻遏肺氣下降之司但小溲不利太陽氣亦不通調此雖陽虛症若腎氣湯中萸地之酸膩力難下行矣茯苓桂枝木杏仁生白芍乾薑五味生牡蠣澤瀉馬五一初起胸痹嘔吐入夏跗臁少腹悉腫食谷不運溲短不利此陽氣式微水穀之濕內蘊致升降之機失司當開太陽姑走濕邪豬苓三錢桂枝木八分茯苓皮三錢澤瀉一錢防己一錢半厚朴一錢四帖邱六歲六齡稚年夏至濕熱外薄所食水穀之氣蒸為濕滯阻遏氣機脾不轉運水道不通腹笥滿脹幼科但知消導不曉通腑泄濕致脾氣大困泄瀉不分陰陽參苓之補僅救消滌之害不能卻除濕滯故雖受無益於病病根都在中宮泄肝以安胃分利以通腑必得小溲頻利冀有中窾之機豬苓澤瀉海金沙通草椒目吳平昔濕痰阻氣為喘茲因過食停滯陰臟之陽不運陽腑之氣不通二便不爽跗腫腹滿診脈沉弦猶是水寒痰滯阻遏氣分上下皆不通調當從三焦分治頃見案頭一方用菟絲子升少陰吳茱萸泄厥陰不知作何解釋不敢附和仍用河間分消定議濕壅三焦肺氣不降大杏仁萊蔔子豬苓澤瀉葶藶子厚朴桑白皮廣皮細木通又三焦分消泄肝通腑二便不爽如昔診脈浮小帶促聞聲呼息不利是氣分在上結阻以致中下不通喘脹要旨開鬼門以取汗潔淨腑以利水無非宣通表裡務在治病源頭據脈症參詳急急開上為法合金匱風水反登義矣麻黃杏仁石膏甘草苡仁朱初因面腫邪干陽位氣壅不通二便皆少桂附不應即與導滯滯屬有質濕熱無形入肺為喘乘脾為脹六腑開合皆廢便不通爽溺短渾濁時或點滴視其舌絳口渴腑病背脹臟病腹滿更兼倚倒左右腫脹隨著處為甚其濕熱布散三焦明眼難以決勝矣經云從上之下者治其上又云從上之下而甚於下者必先治其上而後治其下此症逆亂紛更全無頭緒皆不辨有形無形之誤姑以清肅上焦為先飛滑石一錢半大杏仁去皮尖十粒生苡仁三錢白通草一錢鮮枇杷葉刷淨毛去筋手內揉耎三錢茯苓皮三錢淡豆豉一錢半黑山梔殼一錢急火煎五分服此手太陰肺經藥也肺氣窒塞當降不降杏仁微苦則能降滑石甘涼滲濕解熱苡仁通草淡而滲氣分枇杷葉辛涼能開肺氣茯苓用皮謂諸皮皆涼梔豉宣其陳腐鬱結凡此氣味俱薄為上焦藥仿徐之才輕可去實之義某暴腫氣急小溲澀少此外邪壅肺氣分不通治當從風水皮水宣其經隧以能食能寢為佳勿得誅伐無過之地前胡蜜炙麻黃牛蒡子薑皮紫菀杏仁茯苓皮廣皮王髀尻微腫小腿下臁腫甚乃腑陽不行病甚於暮宜辛香通其經腑之郁下焦寒濕流經生於術炮川烏北細辛茯苓漢防己川獨活又中滿用餘糧丸獲效得暖下泄濁之力腹脹已去而髀尻足跗肌肉腫浮夫臟寒生滿病暖水臟之陽培火生土是法究竟陽未全復四末流行未布前議幽香通其下焦經脈果得腫減議用加味活絡丹炮川烏乾地龍乳香沒藥北細辛桂枝木用油松節三兩酒水各半煎汁法丸汪腫自下起脹及心胸遍身肌膚赤瘰溺無便滑濕熱蓄水橫漬經隧氣機閉塞呻吟喘急濕本陰邪下焦先受醫用桂附耆朮邪蘊化熱充斥三焦以致日加凶危也濕熱壅塞經隧川通草一錢半海金沙五錢黃柏皮一錢半木豬苓三錢生赤豆皮一錢半真北細辛一分又前法腫消三四仍以分消川白通草豬苓海金沙生赤豆皮葶藶子茯苓皮晚蠶砂又間日寒戰發熱渴飲此為瘧乃病上加病飲水結聚以下痛脹不敢用湧吐之法暫與開肺氣壅遏一法大杏仁蜜炒麻黃石膏又濕邪留飲發紅瘰胸聚濁痰消渴未已用木防己湯木防己一錢石膏三錢杏仁三錢苡仁二錢飛滑石一錢半寒水石一錢半通草煎湯代水陳進神芎導水丸二日所下皆黏膩黃濁形色余前議腑氣窒塞水濕黏滯濁攻犯肺為痰嗽水漬脈隧為浮腫大凡經脈六腑之病總以宣通為是內經云六腑以通為補今醫不分臟腑經絡必曰參朮是補豈為明理然肢節足跗之濕出路無由必針刺以決其流此內外冀可皆安戊己丸三錢用二日後再進前藥一服薛十九腹滿下至少腹三陰都已受傷而周身疥瘡數年不斷脈絡中必有濕熱就腹痛泄瀉腑陽不通不獨偏熱偏寒之治常用四苓散豬苓三錢茯苓三錢澤瀉一錢半生於術一錢椒目五分倪嫗濕熱腳氣上攻心胸脘中滿脹嘔逆乃濕上甚為熱化與苦辛先平在上之滿脹用瀉心法濕熱腳氣川連黃芩枳實半夏薑汁杏仁湯囊腫腹脹此屬瘡蠱濕鬱瘡蠱茯苓皮海金沙白通草大腹皮絨厚朴廣皮豬苓澤瀉某三六性躁氣有餘便是火肝膽中木火入絡成形為脹便溺皆赤喉痛聲嘶痰血肝病過膈犯肺久延為單腹脹難治木火入絡小溫中丸三錢吳五五氣逆䐜脹汨汨有聲已屬絡病難除病根氣逆入絡老蘇梗生香附厚朴白蔻仁土栝蔞桔梗枳殼黑山梔汪脈右澀左弱面黃瘦露筋乃積勞憂思傷陽濁陰起於少腹漸至盤踞中宮甚則妨食嘔吐皆單鼓脹之象大著調治最難欲驅陰濁急急通陽陽虛單脹濁陰凝滯乾薑附子豬苓澤瀉椒目又通太陽之裡驅其濁陰已得脹減嘔緩知身中真陽向為群藥大傷議以護陽兼以泄濁法人參塊茯苓生乾薑淡附子澤瀉又陰濁盤踞中土清陽蒙閉腹滿䐜脹氣逆腹痛皆陽氣不得宣通濁陰不能下走擬進白通法生乾薑生炮附子沖豬膽汁黃三八停滯單脹並不渴飲晝則便利不爽夜則小溲略通此由氣分郁痹致中焦不運先用大針砂丸每服一錢五分暖其水臟以泄濁某向有宿痞夏至節一陰來復連次夢遺遂腹形堅大二便或通或閉是時右膝癰腫潰瘍未必非濕熱留阻經絡所致診脈左小弱右緩大面色青減鼻準明亮納食必腹脹愈加四肢惡冷熱自里升甚則衄血牙宣全是身中氣血交結固非積聚停水之脹考古人於脹症以分清氣血為主止痛務在宣通要知攻下皆為通腑溫補乃護陽以宣通今者單單腹脹當以脾胃為病藪太陰不運陽明愈鈍議以緩攻一法川桂枝一錢熟大黃一錢生白芍一錢半厚朴一錢枳實一錢淡生乾薑一錢三帖又診脈細小右微促畏寒甚右脅中氣觸入小腹著臥即有形墜著議用局方禹餘糧丸暖水臟以通陽氣早晚各服一錢流水送八服又脈入尺弦勝於數元海陽虛是病之本肝失疏泄以致䐜脹是病之標當朝用玉壺丹午用疏肝實脾利水分消太陽太陰之邪紫厚朴炒一錢半縮砂仁炒研一錢生於術二錢豬苓一錢茯苓塊三錢澤瀉一錢又脈弦數手足畏冷心中兀兀中氣已虛且服小針砂丸每服八十粒開水送二服以後藥壓之生於術雲茯苓廣皮煎湯一小杯後服又脈如澀凡陽氣動則遺右脅汨汨有聲墜入少腹可知腫脹非陽道不利是陰道實水穀之濕熱不化也議用牡蠣澤瀉散左牡蠣四錢泄濕澤瀉一錢半花粉一錢半川桂枝木五分通陽茯苓三錢化氣紫厚朴一錢午服又脈數實惡水午後手足畏冷陽明中虛水氣聚而為飲也以苓桂朮甘湯劫飲牡蠣澤瀉散止遺逐水照前方去花粉加生於術三錢又手足畏冷不喜飲水右脅汨汨有聲下墜少腹脈雖數而右大左弦信是陽明中虛當用人參熟附生薑溫經補虛之法但因欲回府調理數日方中未便加減且用前方調治太陽太陰生於術三錢左牡蠣生四錢澤瀉炒一錢雲苓三錢生益智四分桂枝木四分炒厚朴一錢午後食遠服朝服小溫中丸五十粒開水送仍用三味煎湯壓之楊十六味過辛酸脾胃氣傷結聚食入則脹滿曾服礞石大黃丸滯濁既下不愈病不在乎腸中前賢治脹治滿必曰分消攻有形不效自屬氣聚為瘕疏胃宜清調脾當暖此宗前賢立法脾胃氣窒不和生茅朮廣皮丁香皮黃柏草豆蔻川黃連厚朴茯苓澤瀉水法丸腫脹證大約腫本乎水脹由乎氣腫分陽水陰水其有因風因濕因氣因熱外來者為有餘即為陽水因於大病後因脾肺虛弱不能通調水道因心火剋金肺不能生腎水以致小便不利因腎經陰虧虛火爍肺金而溺少誤用行氣分利之劑漸至喘急痰盛小水短赤釀成腫證內發者為不足即為陰水若脹病之因更多所脹之位各異或因濕因郁因寒因熱因氣因血因痰因積因蟲皆可為脹或在臟在腑在脈絡在皮膚在身之上下表裡皆能作脹更或始因於寒久郁為熱或始為熱中末傳寒中且也脹不必兼腫而腫則必兼脹亦有腫脹同時並至者其病形變幻不一其病機之參伍錯綜更難敘述故案中諸症有濕在下者用分利有濕在上中下者用分消有濕而著里者用五苓散通達膀胱有濕鬱熱兼者用半夏瀉心法苦辛通降有濕熱氣鬱積者用雞金散加減消利並行有氣血鬱積夾濕熱之邪久留而不散者用小溫中丸清理相火健運中州有濕熱與水寒之氣交橫氣喘溺少通身腫脹者用禹餘糧丸崇土製水暖下泄濁有寒濕在乎氣分則用薑附有寒濕入於血分則用桂附有濕上甚為熱則用麻杏膏苡等味清肅上焦之氣有濕下著為痹則用加味活絡等劑宣通下焦之郁有藉乎薤白栝蔞者滑潤氣機之痹結於腹脅也有藉乎制黃歸尾者搜逐血沫之凝澀於經隧也有藉乎玉壺控涎神保神芎者視其或輕或重之痰飲水積而驅之也此皆未損夫臟氣而第在腑之上下膜之表裡者也若有胃陽虛者參苓必進脾陽衰者朮附必投更有傷及乎腎者則又需加減八味濟生等丸矣其他如養陽明之大半夏湯疏厥陰之逍遙散蓋由證之牽連而及是又案中法外之法也已姚亦陶徐評脹滿之為病即使正虛終屬邪實古人慎用補法又脹必有濕濕則有熱內經所以指為熱症今多用溫補之藥內雖有通利之品而臣不勝主貽誤必多細閲諸案恐愈者少而不治者多也脹滿必有有形之物宜緩緩下之
