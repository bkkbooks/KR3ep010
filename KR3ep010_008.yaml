body:
  text: 卷八衄某溫邪衄血溫邪連翹元參淡黃芩黑山梔皮杏仁鬱金某風溫衄血風溫丹皮元參連翹赤芍茅花黑梔皮某三四此熱蒸於水谷之濕齦血鼽衄納穀如昔治在陽明濕熱胃火上蒸熟地知母石膏元參牛膝陳女常有衄血今夏忽起神識如呆診脈直上魚際大忌驚恐惱怒天癸得通可愈膽火上升心營熱犀角丹參元參生地連翹知母林二六陽升鼻衄不止細生地烏犀角炒知母牛膝黑山梔川斛丹皮炒黑側柏葉某努力傷陽逆鼻衄犀角二錢鎊細生地三錢炒丹皮一錢元參一錢炒牛膝一錢半黑山梔一錢炒黑側柏葉五錢臨服沖鮮荷葉汁一小杯趙二十脈左數衄血火升陰虛陽冒生地阿膠天冬麥冬淡菜生白芍茯神炒山藥程從前衄血都以養陰益氣而愈知非實熱皆勞役陽冒以致陰血之動也今壯年肌肉不充身動氣促如喘口中膩涎濁沫竟是腎精帶傷收納失職之象急急保養遠戒酒色猶可向安熟地人參萸肉湖蓮芡實補骨脂山藥粉丸朱十七脈數陰虧陽升頭暈心中煩雜鼻衄生地元參金銀花川斛丹皮石決明某咳逆失音衄血生地龜板丹皮牛膝山藥茯苓某十歲鼻衄時發生地元參丹皮山藥茯苓澤瀉黃柏人中白某食燒酒辛熱及青梅酸泄遂衄血咳嗽心腹極熱五味偏勝腑陽臟陰為傷此病以養胃陰和法酒熱傷胃生白扁豆北沙參麥冬白粳米血行清道從鼻而出古名曰衄與濁道之吐咯者不同清道即指至高之分由山根以上睛明之次而來也其穴乃手足太陽足陽明陰陽蹺五脈之會及衝脈交會其間可見諸經皆能為衄不獨肺胃而然諸書雖已詳明惟景嶽辨之尤切但衄之為患總由乎火外為六淫之變化內因五志之掀騰氣血日為錯亂陰陽為之相乘天人交感之處虛實攸分矣若風寒壅盛於經陽氣鬱而迫營者宜參麻黃桂枝症之大意若溫風暑熱怫鬱而動血外溢者用辛涼清潤等劑認定經絡之高下若火邪極甚而載血上泛者有苦寒鹹寒之法審其原委之淺深此外因主治法也至於煩冗曲運耗及木火之營肝臟厥陽化火風上灼者甘鹹柔婉理所必需多勞過欲病及天一之真陽浮引陰血以冒上竅者滋潛厚味法從峻補血脫則挽回元氣格陽則導火歸源因酒用和陽消毒之劑因努力用培中益下之方此內因主治法也學者惟審內外兩因庶乎施治無誤矣邵新甫徐評治衄諸方為案中最穩當疝某七疝治法最詳子和其旨辛香以泄肝得氣疏泄而病緩矣按法調理不愈七味導引納腎益氣升舉脾陽而墜氣仍然艾灸蒸臍原得小安內經任脈為病男子內結七疝女子帶下瘕聚同為奇經主之故疏泄諸方能治氣實參朮升補僅治中虛下陷與元海奇經中病無補壯歲至老病根不輟下焦日衰可知升陽一法體症頗合衰年僅可撑持勿使病加可矣督任陽虛生鹿茸三錢鹿角霜一錢當歸二錢生菟絲子五錢沙蒺藜一錢川桂枝尖五分飢時服朱二一勞傷溫里已效臍旁動氣少腹結疝睪丸偏墜皆陽氣不自復濁陰聚絡不宜急於育子濁陰凝聚肝絡當歸舶茴香淡蓯蓉枸杞子安息香茯苓孫疝墜於右筋縮連小腹痛此寒主收引議進溫通厥陰之絡川楝子二兩穿山甲二兩炙炮黑川烏五錢去皮炒黑小茴香一兩橘核二兩炒乳香五錢用老韭白根汁泛丸飢時服二錢五分明臍下少腹形象橫梗發必痛繞脅腰以及陰囊此乃厥陰肝氣不宣議以苦辛加左金佐通經脈之凝澀川連吳萸穿山甲青木香金鈴子延胡青橘葉湯丸郁十七肝病絡虛氣聚少腹滯脹前用河間金鈴子散加牡蠣橘葉合鹹苦辛勝法小效加食述飢則脅腹鳴盛而濁氣下泄頗安乃絡虛不足中之有餘形質瘦怯不可純攻桃仁當歸梢炒小茴橘核郁李仁南山楂蔥白汁丸謝五七七疝皆肝少腹堅聚有形是閉塞不通之象百日久恙血絡必傷古人治疝必用辛香助燥氣勝之品宜緩商矣歸鬚杜牛膝根小茴香川楝子穿山甲柏子仁林脈右弦左澀當臍痛連少腹已屬凝聚有形嘔吐黃濁大便欲解不通若患處漉漉有聲痛勢稍減惟臥著體不轉移其痛更加此屬肝氣疝瘕辛香流氣所稱通則不痛耳炒桃仁炒橘核金鈴子炒延胡韭白汁兩頭尖小茴青皮此通泄厥陰氣血方也痛甚於下濁結有形非辛香無以入絡非穢濁無以直走至陰之域以子和方合奉議意施四八立冬前一日寒戰後熱屬厥陰食蟹鹹寒沉墜浮腫囊大溲溺甚少至晚腫脹愈加顯然陽微濁聚治從氣分開泄冷濕粗桂枝吳萸川楝子茯苓生牡蠣澤瀉磨青皮汁十匙唐三六寒濕已入太陽之裡膀胱之氣不利陰囊莖腫膀胱寒濕凝滯五苓散加獨活漢防己某肝風筋疝怒勞致傷宜通補熄風筋疝蓯蓉補骨脂歸鬚小茴韭子茯苓胡桃肉青鹽羊內腎蒸熟和丸朱動氣疝瘕繞臍汨汨有聲男子精氣不充是下焦損傷溫補勿過剛燥須察八脈以推病情奇脈陽虛淡蓯蓉歸身炒枸杞小茴炒沙苑茯苓紅棗肉汪自云鬱怒不已夏季忽起腹脹醫以快氣疏滯湯藥其脹竟入小腹下墜青筋外突脹甚延及腎囊乃肝疝之症議子和法鬱怒肝疝腫脹歸鬚橘核青木香青皮小茴黑山梔青蔥管周三六久久勞怒肝木內震脅中少腹皆肝脈遊行之所氣凝聚為脹聚久結形為瘕疝情懷憂鬱永不能痊以內起情志不專草木微功耳炒小茴黑山梔川楝子延胡青木香青皮生香附橘核吳六十味酸食不化湧吐述少腹厥氣上衝下有宿疝以肝濁攻胃經云食出完谷是無陽也肝疝犯胃生炮黑附子生淡乾薑豬膽汁吳萸川楝子吳二四疝結少腹按之堅凡過飢必衝突至脘吐酸䐜脹述病從怒勞而得內應乎肝肝逆犯胃飢則胃弱肝乘上噯下泄氣則減肉桂真橘核青木香小茴穿山甲粗桂枝李根白皮項寒勝疝墜亦屬厥陰蓋陽明衰厥邪來乘須胃陽復辟凝寒自罷人參一錢半炮烏頭一錢淡乾薑一錢吳萸泡淡一錢茯苓三錢朱七疝在肝內經謂衝脈為病但衝脈隸於陽明肝木必乘克胃土胃翻湧逆致吐蛔嘔涎湯飲不入厄忒不止皆逆亂無已為臟厥危疴矣肝體本剛相火內寄一派熱燥藥餌以剛濟剛竟有缺折之虞欲泄其濁擬用朱南陽法韭白根兩頭尖金鈴子延胡歸鬚肉桂心毛疝發已過肢冷潮熱其納食減半濁陰內迫犯胃無發汗攻表之理議泄厥陰以安陽明人參炒黑川椒附子茯苓川楝子胡蘆巴詹老年久疝因嗔怒而腫大熱痛肝失疏泄火腑濕熱蘊結不通溫補升陽固謬蓋肝性主剛濕閉反從燥化此龍膽苦堅不應議柔苦制熱反佐辛熱以開血中郁痹用東垣滋腎丸久疝濕熱鬱戴五二濕熱下注久則囊腫形堅下焦血多氣少子和法中原有虎潛諸論後醫棄置不用惜哉龍膽草黃柏蘆薈山梔知母海金沙豬苓澤瀉細辛陳三五疝多肝病宜乎辛泄但形體參脈是濕熱內蘊阻塞二便不為通爽先以通太陽方寒水石海金沙豬苓澤瀉通草木香汁倪疝瘕結聚少腹大便閉阻小溲短澀舌白渴飲不能納穀無對症方藥姑與滋腎丸嘗服千粒分十服許三六久有疝症十年來寒熱勞形則右胸脅中一股氣墜直走少腹凡大小便用力皆然面赤亮痰多食腥膩更令病加此濕熱久壅隧中緩攻為宜控涎丹四分間日服十服又脈沉痰多手骱赤瘡宿疝在下右脅氣墜少腹前議控涎丹逐痹未應想久聚濕熱沉痼非皮膜經脈之壅用浚川丸四十粒勻二服間日一進竟通腑聚然後再議又通腑宣壅黏痰既下其疝仍聚於右且盛於寒天冬月臥安必有聲自消行走勞動必有形直墜陰囊久病急攻無效議辛甘化風方法古人以疝為肝病什居八九當歸鹿角桂枝肉桂小茴川芎炙草茯苓生薑羊肉膠丸張五九痛自腎囊漸踞少腹之左夫厥陰之脈繞乎陰器操持謀慮都主傷肝一氣結聚變幻形象而痛病名曰疝疝分有七暴疝多寒久疝多熱泄氣痛緩宣通可以卻病只因下焦乃深遠之鄉氣熱濕鬱概可知矣川連小茴黑山梔橘核川楝子青木香郁李仁冬葵子陳脈沉弦舌灰邊白腰跨氣痛腎囊睪丸腫大此濕熱為病亂吃發散消導濕熱下墜為疝治當分消萆薢黃柏山梔茯苓丹皮防己豬苓澤瀉陳二二辛香流氣以治疝未嘗不通服之五日遍身疼痛下午四肢浮腫肌膚漸見高突塊瘰思走泄氣勝都是陽傷耆附湯主之疏泄傷衛陽生黃耆一兩附子二錢朱二五厥陰三瘧久延邪攻肝經絡脈少腹痛漸硬氣串繞陰器筋痛乃結疝瘕之象病久雖少壯不可專於泄氣溫腎宣肝為急疝兼瘧母淡蓯蓉歸身枸杞子炒黑小茴穿山甲全蠍陸三九瘧母十年沉痼宿疴藥不能效夫瘧邪既久邪與氣血兩凝結聚絡脈藥難入絡耳瘧不離乎肝膽疝不外乎肝病七疝子和分剖大著虛質不可專以辛香下墜為甚議有情溫通以培生氣鹿茸大茴香穿山甲當歸水安息香炮黑川烏全蠍用黑大豆炒赤淋酒一杯濾酒汁和丸每服二錢暖酒送經云任脈為病男子內結七疝女子帶下瘕聚又督脈生病從少腹上衝心而痛不得前後為沖疝又曰脾傳之腎病名曰疝瘕又曰三陽為病發寒熱其傳為㿗疝又曰邪客於足厥陰之絡令人卒疝暴痛此素問言諸經之疝也又經脈等篇云足陽明之筋病㿉疝腹筋急足太陰之筋病陰器紐痛下引臍兩脅痛足厥陰之經筋病陰器不用此靈樞言諸經之疝也後人因有筋水狐㿗氣血寒七疝之名其主治各有專方立法可謂大備然其中不無錯雜之處終非可訓之定法惟仲景先生獨以寒疝為名其所出三方亦以溫散祛寒調營補虛為主並不雜入氣分之藥而子和治法又以辛香流氣為主謂肝得疏泄而病愈矣其金鈴虎潛諸法可謂發前人所未發故疝病之本不離乎肝又不越乎寒以肝脈絡於陰器為至陰之臟足太陽之脈屬腎絡膀胱為寒水之經故仲景所云寒疝腹中痛逆冷手足不仁腹滿脈弦而緊惡寒不欲食繞臍痛及脅痛裡急是內外皆寒氣作主無復界限其烏頭二方專以破邪治標為急虛實在所不論是急則治標之義也其當歸羊肉一方專以補虛散寒為主故以當歸羊肉辛甘重濁溫暖下元而不傷陰佐以生薑隨血肉有情之品引入下焦溫散沍寒是固本不治標也子和所云疝不離乎肝者以疝病有陰囊腫脹或痛而裡急筋縮或莖中作痛或牽引睪丸或少腹攻衝作痛或號笑忿怒而致此皆肝經脈絡之現症其金鈴散一法以泄肝散逆為主故以川楝導膀胱小腸之熱元胡和一身上下諸痛以肝主疏泄故也其所取虎潛一法以柔緩導引為主故方中用虎骨熄肝風壯筋骨羊肉龜板補髓填精佐以地黃補腎當歸補肝使以陳皮利氣疏肝芍藥通肝調營是治肝而顧及於腎也及觀先生治疝之法又更有進焉者其旨以暴疝多寒久疝多熱為疝病之大綱其餘隨症施治如氣墜下結者以鹿茸鹿角升陽為主其脹結有形痛甚於下者宗丹溪通陽泄濁為治其火腑濕熱鬱結不通者用柔苦制熱反佐辛熱以開血中郁痹為主其寒濕下墜太陽之裡膀胱之氣不和二便不為通利者五苓散加減通太陽膀胱為主其濕熱久聚氣墜少腹陰囊者用控涎丹浚川丸等逐痹通腑分消兼辛甘化風法為主如下焦陰陽兩虛煮用有情溫通以培生氣兼通補熄風為主而先生於治疝之法可謂曲盡病情諸法備矣仲景又有狐疝一方究非王道之品茲不具贅鄒滋九徐評治疝之法大段亦不外此惟㿗疝血疝諸大症尚未有治法想當時未及遇此等大症也頭痛徐六七冬月嘔吐之後漸漸巔頂作痛下焦久有積疝痔瘍厥陰陽明偏熱凡陽氣過動變化火風迅速自為升降致有此患風火連翹心元參心桑葉丹皮黑山梔皮荷葉汁胡六三脈左弦數右偏頭痛左齒痛連翹薄荷羚羊角夏枯草花黑梔皮鮮菊葉苦丁茶乾荷葉邊某高年氣血皆虛新涼上受經脈不和腦後筋掣牽痛倏起倏靜乃陽風之邪議用清散輕劑荷葉邊苦丁茶蔓荊子菊花連翹王六三邪郁偏頭痛鮮荷葉邊三錢苦丁茶一錢半連翹一錢半黑山梔一錢蔓荊子一錢杏仁二錢木通八分白芷一分郁五十風鬱頭疼鮮荷葉苦丁茶淡黃芩黑山梔連翹蔓荊子木通白芷某四七內風頭痛淚冷肝風炒杞子制首烏柏子仁茯神炒菊花炭小黑穭豆皮沈氏痛在頭左腦後厥陽風木上觸細生地生白芍柏子仁炒杞子菊花茯神孫二四暑伏寒熱頭痛伏暑鮮荷葉邊連翹苦丁茶夏枯草山梔蔓荊子厚朴木通某暑風濕熱混於上竅津液無以運行凝滯遂偏頭痛舌強幹涸治宜清散連翹石膏生甘草滑石蔓荊子羚羊角荷梗桑葉程既知去血過多為陰虛陽實之頭痛再加發散與前意相反矣血虛陽浮復脈去參薑桂加左牡蠣又脈數虛而動足徵陰氣大傷陽氣浮越頭痛筋惕仍與鎮攝之法牡蠣阿膠人參生地炙草白芍天冬朱據説就涼則安遇暖必頭痛筋掣外以摩掐可緩大凡肝風陽擾胃絡必虛食進不甘是中焦氣餒雖咸潤介屬潛陽獲效説來依稀想像諒非入理深談聊以代煎酸甘是商且五旬又四中年後矣沉陰久進亦有斫伐生氣之弊半月來乏少診之功姑為認慎用固本膏肝陽犯胃上逆徐當年下虛曾以溫腎涼肝獲效春季患目是陽氣驟升乃冬失藏聚水不生木之徵也頻以苦辛治目風陽上聚頭巔肝木橫擾胃受戕賊至於嘔吐矣今心中乾燥如焚頭中岑岑震痛忽冷忽熱無非陰陽之逆肝為剛臟溫燥決不相安況辛升散越轉凶豈可再蹈前轍姑以鎮肝益虛冀有陽和風熄之理阿膠小麥麥冬生白芍北沙參南棗又倏冷忽熱心煩巔痛厥陽之逆已屬陰液之虧前案申明剛藥之非代赭味酸氣墜乃強鎮之品亦剛藥也考七疝中子和慣投辛香走泄其中虎潛一法亦採可見疝門亦有柔法醫者熟匯成法苟不潛心體認皆希圖附會矣今嘔逆既止其陰藥亦有暫投即水生涵木之法議以固本成方五更時從陽引導可也加秋石葉嫗臨晚頭痛火升心嘈風陽上冒防厥細生地阿膠牡蠣茯神麥冬生白芍史頭形象天義不受濁今久痛有高突之狀似屬客邪蒙閉清華氣血然常餌桂附河車亦未見其害思身半以上屬陽而元首更為陽中之陽大凡陽氣先虛清邪上入氣血瘀痹其痛流連不息法當宣通清陽勿事表散以艾焫按法灸治是一理也厥陰氣血邪痹熟半夏北細辛炮川烏炙全蠍薑汁又陽氣為邪阻清空機竅不宣考周禮採毒藥以攻病藉蟲蟻血中搜逐以攻通邪結乃古法而醫人忽略者今痛滋腦後心下嘔逆厥陰見症久病延虛攻邪須兼養正川芎當歸半夏薑汁炙全蠍蜂房張二二太陽痛連顴骨耳後牙齦夏令至霜降不痊伏邪未解治陽明少陽膽胃伏邪連翹羚羊角牛蒡子葛根赤芍白芷鮮菊葉頭為諸陽之會與厥陰肝脈會於巔諸陰寒邪不能上逆為陽氣窒塞濁邪得以上據厥陰風火乃能逆上作痛故頭痛一症皆由清陽不升火風乘虛上入所致觀先生於頭痛治法亦不外此如陽虛濁邪阻塞氣血瘀痹而為頭痛者用蟲蟻搜逐血絡宣通陽氣為主如火風變動與暑風邪氣上鬱而為頭痛者用鮮荷葉苦丁茶蔓荊山梔等辛散輕清為主如陰虛陽越而為頭痛者用仲景復脈湯甘麥大棗法加膠芍牡蠣鎮攝益虛和陽熄風為主如厥陽風木上觸兼內風而為頭痛者用首烏柏仁穭豆甘菊生芍杞子輩熄肝風滋腎液為主一症而條分縷析如此詳明可謂手法兼到者矣鄒時乘徐評頭風一症往往本熱而標寒案中多清火之藥固能愈風火輕症或有寒邪犯腦或有風寒外束則溫散之法固不可略而外提之法尤當博考也心痛田十三脈細數聞雷被驚心下漾漾作痛驚傷逍遙散去柴胡加鉤藤丹皮宋脈左澀伏心下痛甚舌白不能食谷下咽阻膈痛極昏厥此皆積勞損陽前者曾下瘀血延綿經月不止此為難治勞傷血滯生鹿角當歸鬚薑汁官桂桃仁炒半夏談三五心痛引背口湧清涎肢冷氣塞脘中此為脾厥心痛病在絡脈例用辛香脾寒厥高良薑片薑黃生茅朮公丁香柄草果仁厚朴朱重按痛勢稍衰乃一派苦辛燥劫傷營絡是急心痛症若上引泥丸則大危矣議用金匱法營絡傷急心痛人參桂枝尖川椒炙草白蜜厥心痛一症古人辨論者多且精矣茲不復贅但厥心痛與胃脘痛情狀似一而症實有別世人因內經胃脘當心而痛一語往往混而視之不知厥心痛為五臟之氣厥而入心胞絡而胃實與焉則心痛與胃痛不得不各分一門今先生案中聞雷被驚者用逍遙散去柴胡加釣藤丹皮治之以其肝陽上逆不容升達為之養血以平調也積勞損陽者用歸鹿薑桂桃仁半夏治之以其勞傷血痹無徒破氣為之通絡以和營也脾厥心痛者用良薑薑黃茅朮丁香草果厚朴治之以其脾寒氣厥病在脈絡為之辛香以開通也重按而痛稍衰者用人參桂枝川椒炙草白蜜治之以其心營受傷攻劫難施為之辛甘以化陽也方案雖未全備然其審病之因制方之巧無不一一破的果能舉一反三其義寧有盡乎龔商年徐評心痛胃痛確是二病然心痛絶少而胃痛極多亦有因胃痛而及心痛者故此二症古人不分兩項醫者細心求之自能辨其輕重也胃脘痛嚴二十胃痛半年乾嘔肝犯胃金鈴子延胡半夏茯苓山梔生香附張沖氣上攻成形痛嘔痛後則散此厥陰順乘陽明陽明虛筋骨亦掣痛安蛔丸三錢四服椒梅湯送某三五勞力氣阻胃痛川楝子延胡炒半夏烏藥橘紅生香附汁陳宿病沖氣胃痛今飽食動怒痛發嘔吐是肝木侵犯胃土濁氣上踞脹痛不休逆亂不已變為先寒後熱煩躁面赤汗泄此為厥象厥陰肝臟之現症顯然在目夫痛則不通通字須究氣血陰陽便是看診要旨矣議用瀉心法乾薑川連人參枳實半夏薑汁吳三七食倉痛發嘔水涎沫六年久病入絡述大便忽閉忽溏患處漉漉有聲議通胃陽兼制木侮淡吳萸良薑半夏延胡炮川烏茯苓蒲黃李氏舌白胸痞脘痛如束乾嘔便難氣阻凝痰聚膈當以泄降宣劑若竟攻蕩當夏熱土旺傷及太陰恐滋脹滿之憂醋炒半夏川楝子延胡橘紅杏仁厚朴王氏氣逆填胸阻咽脘痹而痛病由肝臟厥氣乘胃入膈致陽明經脈失和周身掣痛夜甚晝緩者戌亥至陰為肝旺時候也此症多從驚恐嗔郁所致失治變為昏厥半夏薑汁金鈴子延胡杏仁栝蔞皮香豉白蔻又痛緩夜深復熾前後心胸板掣脈左數病在血絡中金鈴子延胡桃仁歸鬚鬱金白蔻仁董氏産後三年經水不轉胃痛得食必嘔汗出形寒腰左動氣閃爍大便七八日始通脈細弦右澀舌白稍渴脘中響動下行痛緩病屬厥陰順乘陽明胃土久傷肝木愈橫法當辛酸兩和厥陰體用仍參通補陽明之陽俾濁少上僭痛有緩期人參同煎一錢開口吳萸滾水泡洗十次一錢生白芍三錢良薑七分熟半夏醋炒焦二錢雲茯苓切塊三錢顧氏天癸當絶仍來昔壯年已有頭暈七年前秋起胃痛若嘈今春悲哀先麻木頭眩痛發下部膝脛冷三日病屬肝厥胃痛述痛引背脅是久病絡脈空隙厥陽熱氣因情志鬱勃拂逆氣攻乘絡內風旋動襲陽明致嘔逆不能進食肝風犯胃液虛九孔石決明清阿膠生地枸杞子茯苓桑寄生川石斛某脅痛入脘嘔吐黃濁水液因驚動肝肝風震起犯胃平昔液衰難用剛燥議養胃汁以熄風方人參茯苓半夏廣皮白麥冬白粳米姚胃痛久而屢發必有凝痰聚瘀老年氣衰病發日重乃邪正勢不兩立也今納物嘔吐甚多味帶酸苦脈得左大右小蓋肝木必侮胃土胃陽虛完穀而出且厄逆沃以熱湯不減其胃氣掀騰如沸不嗜湯飲飲濁彌留脘底用藥之理遠柔用剛嘉言謂能變胃而不受胃變開得上關再商治法肝犯胃兼痰飲胸痹紫金丹含化一丸日三次又議以辛潤苦滑通胸中之陽開滌濁涎結聚古人謂通則不痛胸中部位最高治在氣分鮮薤白去白衣三錢栝蔞實三錢炒焦熟半夏三錢茯苓三錢川桂枝一錢生薑汁四分調入古有薤露之歌謂薤最滑露不能留其氣辛則通其體滑則降仲景用以主胸痹不舒之痛栝蔞苦潤豁痰陷胸湯以之開結半夏自陽以和陰茯苓淡滲桂枝辛甘輕揚載之不急下走以攻病所薑汁生用能通胸中痰沫兼以通神明去穢惡也某氏胃痛引脅肝鬱化火犯胃川楝子柴胡黑山梔鉤藤半夏橘紅朱氏苦寒辛通川連土栝蔞皮白芥子茯苓炒半夏薑汁橘紅竹茹又肝厥胃痛兼有痰飲只因誤用耆朮人參固守中焦痰氣阻閉致痛結痞脹更醫但知理氣使降不知氣閉熱自內生是不中窾前方專以苦寒辛通為法已得效驗況酸味亦屬火化議河間法金鈴子延胡川連黑山梔橘紅半夏張老年鬱勃肝陽直犯胃絡為心下痛久則液枯氣結成格金鈴子延胡黑山梔淡豆豉炒香張十九壯年面色痿黃脈濡小無力胃脘常痛情志不適即發或飲暖酒暫解食物不易消化脾胃之土受克卻因肝木來乘怡情放懷可愈此病郁傷脾胃陽虛人參廣皮半夏茯苓苡仁桑葉丹皮桔梗山梔薑汁炒水泛丸某味淡短氣脘中微痛陽虛人參淡附子桂枝炒遠志煨薑某積滯久著胃腑不宣不時脘痛已經數載陽傷奚疑炒半夏淡乾薑蓽茇草果廣皮茯苓汪五七診脈弦澀胃痛繞背穀食漸減病經數載已入胃絡姑與辛通法甜桂枝八分延胡索一錢半夏一錢茯苓三錢良薑一錢蜜水煮生薑一錢半張陽微不司外衛脈絡牽掣不和胃痛夏秋不發陰內陽外也當冬寒驟加宜急護其陽用桂枝附子湯桂枝附子炙草煨薑南棗戴三九始於傷陰繼則陽損脘痛似乎拘束食物逾時不運當理中焦健運二陽通補為宜守補則謬桂枝木茯苓生薑渣炒焦遠志炒黃半夏生益智仁余三四胃疼發前後心冷嘔吐淡吳萸炒半夏蓽茇淡乾薑草果仁厚朴廣皮桂枝木某中州陽失健運脘中痛食不化益智仁穀芽廣皮炙草茯苓檀香汁半夏曲炒荷葉顧五十清陽失職脘中痹痛得噯曠達當辛以通之薤白半夏桂枝茯苓乾薑顧五一營虛胃痛進以辛甘營絡胃陽兼虛當歸一錢半甜桂枝一錢茯苓三錢炙草五分煨薑一錢半南棗肉二錢費二九勞力氣泄陽傷胸脘痛發得食自緩已非質滯停蓄然初病氣傷久泄不止營絡亦傷古謂絡虛則痛也攻痰破氣不去病即傷胃致納食不甘噯噫欲嘔顯見胃傷陽敗當以辛甘溫方人參桂枝茯苓炙草煨薑南棗某胃痛已久間發風疹此非客氣外感由乎情懷鬱勃氣血少於流暢夫思慮鬱結心脾營血暗傷年前主歸脾一法原有成效今食減形瘦當培中土而理營輔之異功加歸芍用南棗肉湯泛丸程氏脈耎背寒食入脘痛人參茯苓當歸白芍炙草煨薑南棗某女形寒脘痛得食甚手按少緩非有餘客邪病擬進和營衛法歸桂枝去芍加茯苓蔣陽微氣阻右脘痛痹據云努力痛起當兩調氣血胃陽虛氣滯血痹延胡半夏厚朴橘紅桂枝木良薑栝蔞皮茯苓某二八努力飢飽失時好飲冷酒脈弦硬中脘痛熟半夏三錢雲茯苓三錢桃仁去皮尖炒研二錢良薑一錢延胡一錢紅豆蔻一錢去殼方丸熟半夏三兩炒雲茯苓二兩生厚朴二兩小附子一兩炙草果仁去衣一兩高良薑一兩生老薑汁法丸每服三錢朱痛固虛寒吐痰泄氣稍緩當通陽明勿雜多歧陽虛痰滯人參半夏薑汁淡附子茯苓淡乾薑某嫗陽微痰滯胃痠痛脹用阿魏丸六分施六二胃痛濁痰上逆陽虛陰濁凝阻代赭石炒半夏淡吳萸淡乾薑茯苓廣皮蓽茇生益智仁張四八陽微濁凝胃下疼炒黑川椒去目一錢炮黑川烏三錢炮黑川附子三錢炮淡乾薑一錢半高五十素多鬱怒陽氣窒痹濁飲凝沍湯飲下咽吐出酸水胃脘痛痹已經三載漸延噎膈先與通陽徹飲俾陽氣得宣庶可向安半夏枳實皮桂枝木茯苓淡乾薑又脈右弦不飢納穀不運吞酸濁飲尚阻陽仍不宣半夏良薑桂枝木茯苓延胡淡乾薑高脈虛澀胃痛久治在血分血絡瘀痹桃仁當歸桂枝茯神遠志炙草錢三六酒肉滯氣胃痛鄉人稱為穿心箭風方書所無不可稽考苦辛泄降可效延胡川楝子桃仁蒲黃五靈脂盛三六胃痛喜得暖食腸中泄氣則安數年痛必入絡治在血中之氣桂枝木桃仁韭白汁歸鬚茯苓塊又陽微胃痛當歸桂枝木桃仁炙甘草煨薑南棗席經幾年宿病病必在絡痛非虛症因久延體質氣餒遇食物不適或情懷鬱勃痰因氣滯氣阻血瘀諸脈逆亂頻吐汙濁而大便反祕醫見嘔吐肢冷認為虛脫以理中加附子溫里護陽夫陽氣皆屬無形況乎病發有因決非陽微欲脫憶當年病來宛是肝病凡疏通氣血皆效其病之未得全好由乎性情食物居多夏季專以太陰陽明通劑今痛處在脘久則瘀濁復聚宜淡味薄味清養初三竹瀝泛丸仍用早上另立通瘀方法蘇木人參鬱金桃仁歸尾柏子仁琥珀茺蔚紅棗肉丸早服二錢秦久有胃痛更加勞力致絡中血瘀經氣逆其患總在絡脈中痹窒耳醫藥或攻裡或攻表置病不理宜乎無效形瘦清減用緩逐其瘀一法蜣螂蟲炙一兩蟅蟲炙一兩五靈脂炒一兩桃仁二兩川桂枝尖生五錢蜀漆炒黑三錢用老韭根白搗汁泛丸每服二錢滾水下潘氏脈弦澀經事不至寒熱胃痛拒格嘔惡不納此因久病胃痛瘀血積於胃絡議辛通瘀滯法川楝子延胡桂枝木五靈脂蒲黃香附吳氏氣火鬱胃痛氣火鬱川楝子橘紅炒楂肉鬱金黑山梔香附江二十胃疼緩氣逆不降氣逆不降鮮枇杷葉杏仁生香附降香汁厚朴橘紅桔梗白蔻範氏諸豆皆能閉氣漿凝為腐宛是呆滯食物食已脘痞痛脹乃清氣之阻診脈小澀舌白黏膩當理氣以開曠胸中杏仁厚朴老蘇梗廣皮白白蔻仁枳殼汁桔梗汁陽明乃十二經脈之長其作痛之因甚多蓋胃者匯也乃沖繁要道為患最易虛邪賊邪之乘機竊發其間消長不一習俗辛香溫燥之治斷不容一例而漫施然而是病其要何在所云初病在經久痛入絡以經主氣絡主血則可知其治氣治血之當然也凡氣既久阻血亦應病循行之脈絡自痹而辛香理氣辛柔和血之法實為對待必然之理又如飽食痛甚得食痛緩之類於此有宜補不宜補之分焉若素虛之體時就煩勞水穀之精微不足以供其消磨而營氣日虛脈絡枯澀求助於食者甘溫填補等法所宜頻進也若有形之滯堵塞其中容納早已無權得助而為實實攻之逐之等劑又不可緩也寒溫兩法從乎喜暖喜涼滋燥之殊詢其便澀便滑至於飲停必吞酸食滯當噯腐厥氣乃散漫無形瘀傷則定而有象蛔蟲動擾當頻痛而吐沫痰濕壅塞必善吐而脈滑營氣兩虛者不離乎𩞄辣動悸肝陽沖剋者定然煩渴而嘔逆陰邪之勢其來必速鬱火之患由漸而劇也邵新甫徐評治胃痛之方大段亦不外此但痛必有外邪內積不宜輕補而用人參甚多痛久則必熱而用薑附甚多俱為太過脅痛張六五脅脹夜甚響動則降七情致傷之病肝鬱橘葉香附子川楝子半夏茯苓薑渣陳氣熱攻衝擾脘入脅川連牡蠣夏枯草炒半夏香附炒白芥子徐四九勞怒陽動左脅閃閃腹中微滿診脈弦搏左甚當先用苦辛鬱金山梔半夏曲降香末橘紅金石斛湯十八氣逆咳血後脅疼金不制木降香汁八分沖川貝一錢半鮮枇杷葉三錢白蔻仁五分杏仁二錢橘紅一錢丁由虛里痛起左脅下堅滿脹及臍右大便澀滯不爽用緩攻方法濕熱壅滯小溫中丸某痰飲搏擊脅痛痛兼痰飲半夏茯苓廣皮甘草白芥子刺蒺藜鉤藤沈三十左脅下痛食入則安營絡虛寒當歸桂枝湯加肉桂朱五二左乳傍痛繞腰腹重按得熱少緩此屬陰絡虛痛十一年不愈亦痼疾矣當歸三錢肉桂一錢小茴七分丁香皮五分茯苓二錢淡乾薑一錢尤四五痛從中起繞及右脅胃之絡脈受傷故得食自緩但每痛發必由下午黃昏當陽氣漸衰而來是有取乎辛溫通絡矣當歸茯苓炮薑肉桂炙草大棗郭三五痛必右脅中有形攻心嘔吐清涎周身寒凜痛止寂然無蹤此乃寒入絡脈氣乘填塞阻逆以辛香溫通法寒入絡脈氣滯蓽茇半夏川楝子延胡吳萸良薑蒲黃茯苓汪六八嗔怒動肝寒熱旬日左季脅痛難外舒轉此絡脈瘀痹防有見紅之事靜調勿勞可愈血絡瘀痹桃仁歸鬚五加皮澤蘭丹皮鬱金又桃仁歸鬚丹皮桑葉川楝子皮黑山梔皮又絡虛則熱液虧則風動痛減半有動躍之狀當甘緩理虛炙甘草湯去薑桂又痛止便難液耗風動為祕議用東垣通幽法當歸桃仁柏子霜火麻仁郁李仁松子肉紅花凌肝著脅中痛勞怒致傷氣血川楝子皮炒延胡歸鬚桃仁生牡蠣桂枝木沈二一初起形寒寒熱漸及脅肋脘痛進食痛加大便燥結久病已入血絡兼之神怯瘦損辛香剛燥決不可用白旋覆花新絳青蔥管桃仁歸鬚柏子仁王二四左前後脅板著食後痛脹今三年矣久病在絡氣血皆窒當辛香緩通桃仁歸鬚小茴川楝子半夏生牡蠣橘紅紫降香白芥子水泛丸汪痛在脅肋遊走不一漸至痰多手足少力初病兩年寢食如常今年入夏病甚此非臟腑之病乃由經脈繼及絡脈大凡經主氣絡主血久病血瘀瘀從便下諸家不分經絡但忽寒忽熱宜乎無效試服新絳一方小效乃絡方耳議通少陽陽明之絡通則不痛矣歸鬚炒桃仁澤蘭葉柏子仁香附汁丹皮穿山甲乳香沒藥水泛丸程四八診脈動而虛左部小弱左脅疼痛痛勢上引得食稍安此皆操持太甚損及營絡五志之陽動擾不息嗌乾舌燥心悸久痛津液致傷也症固屬虛但參朮歸耆補方未能治及絡病內經肝病不越三法辛散以理肝酸泄以體肝甘緩以益肝宣辛甘潤溫之補蓋肝為剛臟必柔以濟之自臻效驗耳炒桃仁柏子仁新絳歸尾橘紅琥珀痛緩時用丸方真阿膠小生地枸杞子柏子仁天冬刺蒺藜茯神黃菊花四兩丸朱肝絡凝瘀脅痛須防動怒失血旋覆花湯加歸鬚桃仁柏仁李十九左脅痞積攻疼生牡蠣南山楂炒延胡川楝子炒桃仁歸鬚丹皮桂枝木蔣三六宿傷左脅腹背痛炒桃仁歸鬚炒延胡片薑黃五加皮桂枝木橘紅炒小茴沈暮夜五心熱嗌乾左脅痛肝腎陰虧肝腎陰虛人參生地天冬麥冬柏子霜生白芍黃左脅骨痛易飢嘔涎肝風內震入絡肝風入絡生地阿膠生白芍柏子仁丹皮澤蘭又照前方去白芍澤蘭加桃仁桑枝又肝胃絡虛心嘈如飢左脅痛便燥少血生地天冬枸杞桂圓桃仁柏仁熬膏加阿膠收程脅下痛犯中焦初起上吐下瀉春深寒熱不止病在少陽之絡膽絡血滯青蒿根歸鬚澤蘭丹皮紅花鬱金胡三四診脈右弦左小弱澀病起積勞傷陽操持索思五志皆逆而肝為將軍之官謀慮出焉故先脅痛晡暮陽不用事其病漸劇是內傷症乃本氣不足日餌辛燥氣泄血耗六味滋柔膩藥原非止痛之方不過矯前藥之謬而已內經肝病三法治虛亦主甘緩蓋病既久必及陽明胃絡漸歸及右肝胃同病人臥魂藏於肝夢寐紛紜傷及無形矣議用甘藥少佐攝鎮肝腎皆虛人參棗仁茯神炙草柏子仁當歸龍骨金箔桂圓肉煮濃汁搗丸脅痛一症多屬少陽厥陰傷寒脅痛皆在少陽膽經以脅居少陽之部雜症脅痛皆屬厥陰肝經以肝脈布於脅肋故仲景旋覆花湯河間金鈴子散及先生辛溫通絡甘緩理虛溫柔通補辛泄宣瘀等法皆治肝著脅痛之劑可謂曲盡病情諸法畢備矣然其症有虛有實有寒有熱不可概論苟能因此擴充再加詳審則臨症自有據矣鄒時乘徐評案中用藥頗能變通心思有不可及處惟用補之處未免太重耳腹痛裴氏脈數按之澀腹痛嘔吐恐痧穢格拒宜宣通氣分上中二焦氣阻白蔻仁桔梗黑山梔香豉半夏廣皮白某四十腰痛腹痛得冷愈甚陽氣不通桂枝木茯苓蘄艾生香附青皮炒小茴吳五三當臍微痛手按則止此絡空冷乘陽氣久虛之質自述戒酒谷增不可因痛再以破泄真氣茯苓生薑煨熟術肉桂俞十九腹痛六七年每發必周身寒凜吐涎沫而痛止此諸氣鬱痹得湧則宣之象法當升陽散郁郁傷脾陽半夏草果金鈴子延胡厚朴生薑蘇梗程穢濁阻遏中焦氣機不宣腹痛脘痹當用芳香逐穢兼以疏泄穢濁阻氣藿香厚朴杏仁萊蔔子半夏廣皮白鄭脈沉微腹痛欲大便陰濁內凝乃陽氣積衰通陽必以辛熱陰濁內阻腑陽不通生白朮吳萸良薑川熟附茯苓小茴某腑陽不通腹痛用禹餘糧丸暖下通消二便通脹緩腹仄此無形之氣未振宜疏補醒中生白朮厚朴廣皮半夏茯苓生益智薑汁某氣結腹痛食少寒熱肝氣鬱逍遙散去朮加鬱金香附某氏肝鬱腹痛有形經不調肝鬱血滯香附川芎當歸肉桂五靈脂木香吳萸炒白芍畢小便自利大便黑色當臍腹痛十五年漸發日甚脈來沉而結澀此鬱勃傷及肝脾之絡致血敗瘀留勞役動怒宿疴乃發目今冬深閉藏忌用攻下議以辛通潤血所謂通則不痛矣郁傷肝脾絡血凝瘀桃仁桂枝木穿山甲老韭白煎送阿魏丸一錢徐四十疹發五六年形體畏寒病發身不大熱每大便腹痛裡急此皆氣血凝滯當以郁病推求當歸酒製大黃枳實桂枝炙草白芍某勞力傷氣浮腫食入腹痛姑用戊己調中勞傷中陽白芍二錢炙草五分當歸炒焦一錢半生益智七分研廣皮一錢煨薑一錢棗肉三錢河水煎袁四五當臍腹痛發於冬季春深漸愈病發噯氣過飢勞動亦發宜溫通營分主治營分虛寒當歸炙草肉桂茯苓炮薑南棗華腹痛三年時發時止面色明亮是飲邪亦酒濕釀成因怒左脅有形痛繞腹中及胸背諸俞乃絡空飲氣逆攻入絡食辛熱痛止復痛蓋怒則鬱折肝用惟氣辛辣可解論藥必首推氣味鬱怒飲氣入絡粗桂枝木一錢天南星薑汁浸炮黑一錢半生左牡蠣五錢打碎真橘核炒香打一錢半川楝子肉一錢李根東行皮一錢某長夏腹脹減食微痛是暑傷在氣分東垣每調和脾胃疏泄肝木最屬近理若守中之補及膩滯血藥皆左暑傷中氣人參廣皮白芍茯苓穀芽生益智仁腹處乎中痛因非一須知其無形及有形之為患而主治之機宜已先得其要矣所謂無形為患者如寒凝火鬱氣阻營虛及夏秋暑濕痧穢之類是也所謂有形為患者如蓄血食滯癥瘕蛔蟯內疝及平素偏好成積之類是也審其痛勢之高下辨其色脈之衰旺細究其因確從何起大都在臟者以肝脾腎為主在腑者以腸胃為先夫臟有賊克之情非比腑病而以通為用也此通字勿執攻下之謂古之建中湯理中湯三物厚朴湯及厚朴溫中湯各具至理考先生用古若通陽而泄濁者如吳茱萸湯及四逆湯法清火而泄郁者如左金丸及金鈴散法開通氣分者如四七湯及五磨飲法宣攻營絡者如穿山甲桃仁歸鬚韭根之劑及下瘀血湯法緩而和者如芍甘湯加減及甘麥大棗湯法柔而通者如蓯蓉柏子肉桂當歸之劑及復脈加減法至於食滯消之蝤擾安之癥瘕理之內疝平之痧穢之候以芳香解之偏積之類究其原而治之是皆先生化裁之法也若夫瘍科內癰婦科四症兼患是病者更於各門兼參其法而用之則無遺蘊矣邵新甫徐評腹痛久者必有積滯必用消積丸藥以漸除之煎方恐不足以愈久病也案中用丸散絶妙肩臂背痛徐邇日天令驟冷診左脈忽現芤澀痛時筋攣繞掣耳後此營虛脈絡失養風動筋急前法清絡涼劑不應營虛不受辛寒仿東垣舒筋湯意痛繞耳後當歸生黃耆片薑黃桂枝防風生於術煎藥化活絡丹一丸某勞倦肩臂疼肩臂痛川桂枝木木防己五加皮茯苓生苡仁炒白蒺塗六二痛起肩胛漸入環跳髀膝是為絡虛黃耆五錢於朮三錢當歸三錢茯苓二錢防己八分防風根五分羌活五分又照前方去防風羌活加杞子沙苑鄒五旬又四陽明脈衰肩胛筋緩不舉而痛治當通補脈絡莫進攻風生黃耆於朮當歸防風根薑黃桑枝王四二陽明氣衰厥陰風動頭眩目昏右肩痛麻脅下有聚氣足厥陰主治枸杞子四兩歸身三兩羚羊角生研二兩制白蒺去刺三兩嫩黃耆皮四兩胡天麻二兩煨菊花二兩熬汁桑枝四兩熬汁丸徐五二左指脹痛引肩男子血虛風動病在肝形脈不足以柔藥溫養制首烏枸杞子歸身三角胡麻菊花炭柏子仁刺蒺藜桑枝膏丸俞嫗高年陽明氣乏肩胛痛難屈伸法當理衛陽通補黃耆桂枝歸身片薑黃海桐皮夏枯草孫二四腎氣攻背項強溺頻且多督脈不攝腰重頭疼難以轉側先與通陽宗許學士法背痛川椒炒出汗三分川桂枝一錢川附子一錢茯苓一錢半生白朮一錢生遠志一錢凡沖氣攻痛從背而上者系督脈主病治在少陰從腹而上者治在厥陰系衝任主病或填補陽明此治病之宗旨也汪十二肝濁逆攻痛至背淡乾薑八分炒黑川椒三分炒焦烏梅肉五分小川連三分川桂枝木五分北細辛二分黃柏五分川楝子肉一錢生白芍二錢陳氏內經論諸痛皆寒時當冬臘口鼻吸受寒冷阻氣隧之流行痛自胸引及背甚則手足厥冷只宜兩通氣血主治川楝子延胡生香附橘紅吳萸烏藥紅花沈氏脈芤汗出失血背痛此為絡虛人參炒歸身棗仁炒白芍炙草茯神莊三四督虛背疼脊高突生毛鹿角切片三錢鹿角霜一錢半杞子三錢歸身一錢生杜仲一錢半沙苑一錢茯苓一錢半青鹽調入三分張三八督虛背痛遺泄生毛鹿角鹿角霜生菟絲子生杜仲沙苑子白龍骨茯苓當歸肺朝百脈肺病則不能管攝一身故肺俞為病即肩背作痛又背為陽明之府陽明有虧不能束筋骨利機關即肩垂背曲至於臂經絡交會不一而陽明為十二經絡之長臂痛亦當責之陽明但痛有內外兩因虛實迥異治分氣血二致通補攸殊如營虛脈絡失養風動筋急者不受辛寒當仿東垣舒筋湯之意佐以活絡丹勞倦傷陽脈絡凝塞肩臂作痛者以辛甘為君佐以循經入絡之品陽明氣衰厥陰風動右肩痛麻者用枸杞歸身黃耆羚羊桑枝膏為陽明厥陰營氣兩虛主治血虛風動者因陽明絡虛受肝臟風陽之擾用首烏枸杞歸身胡麻柏子仁刺蒺藜藥等味以柔甘為溫養失血背痛者其虛亦在陽明之絡用人參歸身棗仁白芍炙草茯神以填補陽明若腎氣上逆則督虛為主病宜用奇經之藥以峻補真陽至於口鼻吸受寒冷阻鬱氣隧痛自胸引及背者宗內經諸痛皆寒之義以溫藥兩通氣血更有古法如防風湯散肺俞之風指迷丸治痰流臂痛控涎丹治流痹牽引此皆從實症而治所謂通則不痛也醫者不拘守一法洞悉病源運巧思以制方而技於是進龔商年徐評痛定於肩背此著痹之類必用外治之藥以攻之提之煎藥不能取效也腰腿足痛曹三九濕鬱少腹痛引腰右腳痠腰痛木防己晚蠶砂飛滑石茯苓皮杏仁厚朴草果萆薢俞五五勞倦挾濕腰疼川桂枝尖木防己生苡仁茯苓皮晚蠶砂萆薢何四七腰痛環跳穴痛痹沙苑桂枝木小茴茯苓桑寄生炒杞子翁三五正努力傷腰疼生杜仲當歸五加皮炒牛膝枸杞子茯苓青鹽生羊腰子吳氏脈虛身熱腰髀皆痛少腹有形攻觸臟陰奇脈交傷不可作外感治當歸炒白芍桂枝茯苓炙草煨薑大棗汪二三脈澀腰髀環跳悉痛煩勞即發下焦空虛脈絡不宣所謂絡虛則痛是也歸身桂枝木生杜仲木防己沙苑牛膝萆薢小茴某便溏腰痛無力術菟丸方朱脈細色奪肝腎虛腰痛是絡病治法生羊內腎當歸枸杞子小茴紫衣胡桃茯神汪嫗老年腰膝久痛牽引少腹兩足不堪步履奇經之脈隸於肝腎為多腰膝痛鹿角霜當歸肉蓯蓉薄桂小茴柏子仁王三五脈遲緩飲酒便溏遺精數年不已近日腰髀足膝墜痛麻木此濕凝傷其脾腎之陽滋填固澀決不應病先議用苓薑朮桂湯驅濕暖土再商後法吳舌白乾涸脘不知飢兩足膝跗筋掣牽痛雖有宿病近日痛發必挾時序溫熱濕蒸之氣阻其流行之隧理進宣通莫以風藥膝腿足痛飛滑石石膏寒水石杏仁防己苡仁威靈仙蔣七歲足膝腫疼久不止內熱生虎骨炒牛膝萆薢金毛狗脊當歸仙靈脾又照前方加生鹿角黃柏張四二勞力傷左腿骨麻疼生虎骨四兩當歸二兩五加皮二兩仙靈脾二兩牛膝二兩獨活一兩白茄根二兩油松節二兩金毛狗脊八兩朱痛著右腿身前肌肉不腫必在筋骨且入夜分勢篤邪留於陰間有偏墜治從肝經生杜仲一兩當歸鬚二錢穿山甲二錢炙小茴香一錢炒北細辛三分乾地龍炙一錢某嘔逆吐涎沖氣攻心足大拇指硬強而痛足痛淡吳萸熟附子獨活北細辛當歸漢防己某兩足皮膜撫之則痛由厥陰犯陽明胃厥所致脈弦而數治當疏泄川楝子延胡青皮黑山梔歸鬚桃仁橘紅炒黑楂肉陸二四飽食則噦是為胃病兩足骨骱皆痛陽明胃脈不司束筋骨攻痛議轉旋陽氣法苓薑朮桂湯某右足患處麻木筋強微腫老人氣血不得宣通冬病至長夏食不加餐脈小弱主以溫養虎脛骨生打三錢淮牛膝一錢歸身炒一錢杞子炒三錢生杜仲三錢川斛三錢萆薢一錢白蒺藜炒去刺研一錢腰者腎之府腎與膀胱為表裡在外為太陽在內屬少陰又為衝任督帶之要會則腰痛一症不得不以腎為主病然有內因外因不內外因之別舊有五辨一曰陽虛不足少陰腎衰二曰風痹風寒濕著腰痛三曰勞役傷腎四曰墜墮損傷五曰寢臥濕地其説已詳而景嶽更增入表裡虛實寒熱之論尤為詳悉夫內因治法腎臟之陽有虧則益火之本以消陰翳腎臟之陰內奪則壯水之源以制陽光外因治法寒濕傷陽者用苦辛溫以通陽泄濁濕鬱生熱者用苦辛以勝濕通氣不內外因治法勞役傷腎者以先後天同治墜墮損傷者辨傷之輕重與瘀之有無為或通或補若夫腿足痛外感者惟寒濕濕熱風濕之流經入絡經云傷於濕者下先受之故當以治濕為主其間佐溫佐清佐散隨症以制方內傷則不外肝脾腎三者之虛或補中或填下或養肝隨病以致治古來治腰腿足痛之法大略如此也然審症必如燃犀燭怪用藥尤貴以芥投針今閲案中有飲酒便溏遺精不已腰痛麻木者他人必用滋填固澀等藥先生斷為濕凝傷脾腎之陽用苓桂術薑湯以驅濕暖土有老年腰痛者他人但撮幾味通用補腎藥以治先生獨想及奇經之脈隸於肝腎用血肉有情之品鹿角當歸蓯蓉薄桂小茴以溫養下焦有痛著右腿肌肉不腫入夜勢篤者先生斷其必在筋骨邪流於陰用歸鬚地龍山甲細辛以辛香苦溫入絡搜邪有兩足皮膜撫之則痛者似乎風濕等症先生斷其厥陰犯陽明用川楝延胡歸鬚桃仁青皮山梔以疏泄肝臟有飽食則噦兩足骨骱皆痛者人每用疏散攻劫先生宗陽明虛不能束筋骨意用苓薑朮桂湯以轉旋陽氣種種治法非凡手所及要之治病固當審乎虛實更當察其虛中有實實中有虛使第虛者補而實者攻誰不知之潛玩方案足以補後人之心智也豈淺鮮哉龔商年徐評凡有著之邪總以外攻內經有腰痛論一篇亦以服藥不足盡病也諸痛陳久痛必入絡氣血不行發黃非疸也血絡瘀痹旋覆花新絳青蔥炒桃仁當歸尾龐四八絡虛則痛有年色脈衰奪原非香蔻劫散可效醫不明治絡之法則愈治愈窮矣炒桃仁青蔥管桂枝生鹿角歸尾此旋覆花湯之變制也去覆花之咸降加鹿角之上升方中惟有蔥管通下余俱辛散橫行則絡中無處不到矣又辛潤通絡病愈草日因勞再發至於上吐下閉是關格難治矣且痛勢復來姑與通陽阿魏丸四錢分四服李四六積傷入絡氣血皆瘀則流行失司所謂痛則不通也久病當以緩攻不致重損桃仁歸鬚降香末小茴穿山甲白蒺藜片薑黃煨木香韭白汁法丸楊三一由周身筋痛繞至腹中遂不食不便病久入絡不易除根歸身川桂枝茯苓柏子仁遠志青蔥管章痛乃宿病當治病發之由今痹塞脹悶食入不安得頻吐之餘疹形朗發是陳腐積氣膠結因吐經氣宣通仿仲景胸中懊憹例用梔子豉湯主之又胸中稍舒腰腹如束氣隧有欲通之象而血絡仍然錮結就形體畏寒怯冷乃營衛之氣失司非陽微惡寒之比議用宣絡之法歸鬚降香青蔥管鬱金新絳柏子仁黃痛則氣亂髮熱頭不痛不渴飲脈不浮非外感也暫用金鈴散一劑金鈴子炒延胡炒桃仁桂圓又痛而重按少緩是為絡虛一則氣逆紊亂但辛香破氣忌進宗仲景肝著之病用金匱旋覆花湯法旋覆花新絳青蔥管桃仁柏子霜歸尾汪嫗脈小澀久因悒鬱脘痛引及背脅病入血絡經年延綿更兼茹素數載陽明虛餒肩臂不舉倉卒難於奏效是緩調為宜議通血絡潤補勿投燥熱劫液歸鬚柏子仁桂枝木桃仁生鹿角片薑黃朱頭巔至足麻木刺痛熱熾陰分伏熱滋腎丸張初受寒濕久則化熱深入陰分必暮夜痛甚醫用和血驅風焉能直入陰分議東垣滋腎丸搜其深藏伏邪肉桂八錢忌見火黃柏四兩知母四兩俱鹽水炒水泛丸王脈數而細忽痛必熱腫且痛來迅速思五行六氣之流行最速莫如火風高年脂液久耗人身之氣必左升右降相火寄於肝龍火起於腎並從陰發越本乎根蒂先虧內乏藏納之職司矣每日服東垣滋腎丸三錢秋石湯送以瀉陰中伏熱許二一痛為脈絡中氣血不和醫當分經別絡肝腎下病必留連及奇經八脈不知此旨宜乎無功肝腎奇經脈絡不和鹿角霜桑寄生杞子當歸沙苑白薇川石斛生杜仲範病後精采未復多言傷氣行走動筋謂之勞復當與甘溫和養氣血下焦痛肝腎素虛也肝腎虛下焦痛人參小茴香拌炒當歸沙苑蒺藜茯神炒杞子菊花炭經云諸痛癢瘡皆屬於心夫心主君火自當從熱而論然此乃但言瘡耳若瘍科之或癰或疽則有陰有陽不可但執熱而論矣又如舉痛論中所言十四條惟熱留小腸一條則主乎熱余皆主乎寒客故諸痛之症大凡因於寒者十之七八因於熱者不過十之二三而已如欲辨其寒熱但審其痛處或喜寒惡熱或喜熱惡寒斯可得其情矣至於氣血虛實之治古人總以一通字立法已屬盡善此通字勿誤認為攻下通利講解所謂通其氣血則不痛是也然必辨其在氣分與血分之殊在氣分者但行其氣不必病輕藥重攻動其血在血分者則必兼乎氣治所謂氣行則血隨之是也若症之實者氣滯血凝通其氣而散其血則愈症之虛者氣餒不能充運血衰不能滋榮治當養氣補血而兼寓通於補此乃概言其大綱耳若夫諸痛之症頭緒甚繁內因七情之傷必先臟腑而後達於肌軀外因六氣之感必先肌軀而後入於臟腑此必然之理也在內者考內景圖在外者觀經絡圖其十二經遊行之部位手之三陰從臟走手手之三陽從手走頭足之三陽從頭走足足之三陰從足走腹凡調治立方必加引經之藥或再佐以外治之法如針灸砭刺或敷貼尉洗或按摩導引則尤易奏功此外更有跌打閃挫陰疽內癰積聚癥瘕蛔蟯疝痹痧脹中惡諸痛須辨明證端不可混治今觀各門痛證諸案良法盡多難以概敘若撮其大旨則補瀉寒溫惟用辛潤宣通不用酸寒斂澀以留邪此已切中病情然其獨得之奇尤在乎治絡一法蓋久痛必入於絡絡中氣血虛實寒熱稍有留邪皆能致痛此乃古人所未及詳言而先生獨能剖析明辨者以此垂訓後人真不愧為一代之明醫矣華玉堂徐評此等議論以為辨別精詳分毫無誤其實皆浮泛之談無病不可套去而於此症真詮全未夢得明之薛立齋張景嶽終身迷入此中其説愈繁而去道愈遠一派浮談而古昔聖賢治一病必有一主方千變萬化不脫根本此理遂消亡矣耳某溫邪上郁耳聤右脹風溫上郁薄荷馬勃桔梗連翹杏仁通草某二二先起咳嗽繼而耳聤脹痛延綿百日不愈此體質陰虧觸入風溫未經清理外因傷及陰分少陽相火陡起故入暮厥痛愈劇當先清降再議育陰苦丁茶鮮菊葉金銀花生緑豆皮川貝母鮮荷葉梗益元散某女風溫發熱左耳後腫痛乾荷葉苦丁茶馬勃連翹杏仁黑梔皮畢三三壯年脈來小促數自春月風溫咳嗽繼以兩耳失聰據述苦降滋陰不效是不明虛實經絡矣內經以春病在頭膏粱之質厚味酒醴助上痰火固非治腎治肝可效每晚臥時服茶調散一錢又鮮荷葉汁羚羊角石膏末連翹元參鮮菊葉牛蒡子午服又照前方去牛蒡菊葉加鮮生地鮮銀花葉火風侵竅耳聾連翹薄荷甘菊淡黃芩苦丁茶黑山梔顧二二暑邪竅閉耳失聰暑鮮荷葉鮮菊花葉苦丁茶夏枯草蔓荊子連翹淡黃芩黑山梔某十八左耳聤痛舌白脈數體質陰虛挾受暑風上焦氣熱宜用辛涼輕藥鮮菊葉苦丁茶黑山梔飛滑石連翹淡竹葉某二五暑熱上郁耳聤作脹咳嗆當清氣熱杏仁連翹殼淡竹葉川貝白沙參六一散宓頭重耳聤脹目微赤少陽相火上郁以辛涼清解上焦膽火上郁連翹羚羊角薄荷梗丹皮牛蒡子桑葉某風木之郁耳脹欲閉連翹羚羊角薄荷梗苦丁茶夏枯草花黑山梔皮小生香附倪十三因大聲喊叫致右耳失聰想外觸驚氣內應肝膽膽脈絡耳震動其火風之威亦能鬱而阻竅治在少陽忌食腥濁青蒿葉青菊葉薄荷梗連翹鮮荷葉汁苦丁茶汪耳聾咳嗽形體日瘦男子真陰未充虛陽易升乘竅書云膽絡脈附耳先議清少陽鬱熱以左耳為甚故也桑葉丹皮連翹黑山梔青蒿汁象貝母丁腎開竅於耳心亦寄竅於耳心腎兩虧肝陽亢逆故陰精走泄陽不內依是以耳鳴時閉但病在心腎其原實由於郁鬱則肝陽獨亢令膽火上炎清晨服丸藥以補心腎午服湯藥以清少陽以膽經亦絡於耳也郁傷心腎膽火上炎水煮熟地四兩麥冬一兩半龜版二兩牡蠣一兩半白芍一兩半北味一兩建蓮一兩半磁石一兩茯神一兩半沉香五錢辰砂五錢為衣煎方夏枯草二錢丹皮一錢生地三錢山梔一錢女貞子三錢赤苓一錢半生甘草四分姚三十氣閉耳鳴氣閉鮮荷葉杏仁厚朴廣皮木通連翹苦丁茶防己金三八下虛耳鳴失聰腎虛磁石六味去萸加川斛龜甲遠志王腎竅開耳膽絡脈亦附於耳凡本虛失聰治在腎邪干竅閉治在膽乃定例也今年已六旬脈形細數是皆腎陰久虧肝陽內風上旋蒙竅五行有聲多動真氣火風然非苦寒直降可效填陰重鎮滋水制木佐以鹹味入陰酸以和陽藥理當如是議熟地龜版鎖陽牛膝遠志茯神磁石秋石萸肉五味某八十耳聾乃理之常蓋老人雖健下元已怯是下虛上實清竅不主流暢惟固補下焦使陰火得以潛伏磁石六味加龜甲五味遠志腎開竅於耳心亦寄竅於耳膽絡脈附於耳體虛失聰治在心腎邪干竅閉治在膽經蓋耳為清空之竅清陽交會流行之所一受風熱火鬱之邪與水衰火實腎虛氣厥者皆能失聰故先生治法不越乎通陽鎮陰益腎補心清膽等法使清靜靈明之氣上走空竅而聽斯聰矣如溫邪暑熱火風侵竅而為耳聾痛脹者用連翹山梔薄荷竹葉滑石銀花輕可去實之法輕清泄降為主如少陽相火上郁耳聾聤脹者用鮮荷葉苦丁茶青菊葉夏枯草蔓荊子黑山梔羚羊角丹皮辛涼味薄之藥清少陽鬱熱兼清氣熱為主如心腎兩虧肝陽亢逆與內風上旋蒙竅而為耳鳴暴聾者用熟地磁石龜甲沉香二冬牛膝鎖陽秋石山萸白芍味厚質重之藥壯水制陽填陰鎮逆佐以酸味入陰咸以和陽為主因症施治從虛從實直如庖丁之導窾矣鄒時乘徐評耳聾之法多端然大段不過清上鎮下二條案中方極穩當至於外治之法及虛寒等症則不可不知也目某風溫上郁目赤脈左弦當用辛以散之風溫桑葉夏枯草連翹草決明赤芍某二三失血後復受燥熱左目赤痛當以辛涼清之燥熱鮮菊葉冬桑葉生甘草赤苓皮緑豆皮穭豆皮鮑氏秋風化燥上焦受邪目赤珠痛連翹薄荷黃芩山梔夏枯草青菊葉苦丁茶桑皮席用淡滲漸安是暑入氣阻熱蒸濕鬱勿取大辛大苦之開泄仿清邪中上治法暑濕鬱蒸冬桑葉穀精草望月砂苡仁川通草緑豆皮茯苓顧五四頭額悶脹目赤木火上郁羚羊角夏枯草草決明山梔皮連翹生香附潘戒飲濁減十四略可加谷近日竟夕無寐目珠赤痛陽升不交於陰暫停妙香散桑葉丹皮夏枯草黑山梔川貝苡仁陸嫗鬱勃氣火翳遮目睛高年苦辛難進夏枯草穀精草草決明望月砂生香附連翹山梔皮丹皮某頭面風腫目起星是氣中熱羚羊角夏枯草薄荷梗穀精草生香附小生地丹皮望月砂連翹山梔汪脈左弦左目赤痛淚多桑葉丹皮草決明小胡麻夏枯草穀精草緑豆皮黑穭豆皮汪目痛偏左翳膜紅絲診脈左弦澀由肝膽氣熱所致草決明冬桑葉夏枯草小胡麻丹皮穀精草某十一肝火上郁目眶紅腫連翹赤芍菊花葉黑梔皮苦丁茶夏枯草江脈數右大郁久熱生目障心痛夏枯草花小生香附金石斛半夏曲茯苓橘紅某八歲目胞浮腫不飢不運脾肺蘊濕桑皮八分茯苓皮三錢大腹皮一錢廣皮一錢薑皮五分苡仁一錢半通草一錢王嫗高年目暗已久血絡空虛氣熱乘其空隙攻觸脈絡液盡而痛當夜而甚乃熱氣由陰而上想外科用酒調末藥必系溫散攻堅因此而痛虛症可知血絡虛熱羚羊角連翹心夏枯草青菊葉全當歸川桂枝丹皮葉微寒汗大出下有痔漏左眼眶疼痛此陰傷火鬱不可作時邪泛治陰虛火鬱六味去萸加芍蔓荊子丹皮重用某三六右目多淚眥脹心嘈雜陽明空虛肝陽上擾使然當調補肝胃胃虛肝風嫩黃耆三錢當歸一錢半白芍一錢半茯神三錢煨薑一錢南棗一枚祝四八當夏形懶不耐大氣發泄入冬兩目無光精氣無收藏凡五臟精華皆聚於目失藏失聚內乏生真不獨一臟之損當用養營湯營陰虛某三六脈澀細左目痛淚熱翳膜此肝陰內虧厥陽上越所致肝陰虛冬桑葉一錢炒枸杞一錢半小胡麻一錢半望月砂三錢制首烏三錢石決明一具黃菊花一錢穭豆皮三錢某三六目痛無光肝腎虛制首烏六兩枸杞子二兩柏子仁一兩細生地二兩石決明四兩小胡麻三兩望月砂三兩刺蒺藜二兩冬桑葉一兩半黃菊花一兩用穭豆皮八兩穀精珠二兩煎濃汁泛丸每服五錢開水送某眥脹目昏心中嘈雜當治肝腎熟地六兩枸杞子三兩桑椹子二兩沙苑二兩石決明二兩茯神二兩女貞子一兩半青鹽一兩黃菊花一兩川斛四兩加蜜丸早上開水送四錢某三六脈澀眥痛右目當風淚多當治肝腎制首烏枸杞子炒歸身桑椹子沙苑子茯神某二五遺止心嘈目淚仍是陽氣過動當填陰和陽熟地杞子天冬萸肉五味生地茯苓菊花山藥蜜丸某瞳神散大左偏頭痛先損左目是焦煩鬱勃陽升化風劫傷血液使然法當兼補肝腎熟地枸杞子山萸肉五味茯神菊花生神麯穀精草山藥眼科一症古有五輪八廓七十二問之辨傅氏又分為一百零八症因名目太多徒滋惑亂至於見症楊仁齋已備論具載景嶽但陰陽虛實寒熱標本施治不可紊亂經云五臟六腑之精華皆上注於目又云目者肝之竅也肝與膽為表裡肝液膽汁充足目乃能遠視故無論外感與內症皆與肝膽有關係焉夫六淫之邪惟風火燥居多兼寒兼濕者亦間有內起之症肝膽心腎為多他臟亦間有之若夫論治則外感之症必有頭痛寒熱鼻塞筋骨痠疼脈見緊數或浮洪一切表症方可清散至於內因之症有虛實之殊實者肝膽之風熱盛也凡暴赤腫痛脹悶難開翳膜眵淚酸澀作癢斑瘡入睛皆實症也當除風散熱虛者腎經之水火衰也凡久痛昏暗青盲雀目內障昏蒙五色花翳迎風淚出皆虛候也治宜壯水益火若陰血雖虧而風熱未盡則當審其緩急相參而治若久服寒涼虛陽轉盛則當補以甘溫從乎反佐至於紅色淺淡而紫者為虛熱鮮澤而赤者為實熱瞳神內湧白睛帶赤者為熱症瞳神青緑白睛枯稿者為寒症腫脹紅赤眼珠刺痛夜則尤甚目不能開而視物猶見者為邪火熾盛若白翳遮睛珠不甚痛或全不痛目仍能開而視物不見者為真火不足當細察其形症色脈因症而用藥此內治之大法也若日久失調致氣血凝滯火熱壅結而為赤腫腐爛翳膜遮蔽致成外障譬之鏡受汙垢必當濯磨須用點藥若但服藥必不能愈至於內障之症但宜服藥倘用點藥徒傷其氣血必無益而有損更當知目眥白珠屬陽故晝痛點苦寒藥則可效瞳子黑睛屬陰故夜痛點苦寒藥則反劇是外治之法亦當以陰陽區別也若夫偏正頭風屬氣虛痛者朝重暮輕血虛痛者朝輕暮重亦有外感內因之別此症當以補養正氣為主略兼治表倘概以風熱而論專於表散最易損目更有肝陰虧耗木火上炎頭痛惡心眉稜骨痛不欲飲食眼胞紅腫睛珠刺痛眵淚如膿白睛如胬目珠上竄不下不得寤寐甚則巔頂腦後如破如裂此內發之風也夫肝屬木木主風熱盛化風其體必本陰虧男子或有遺精白濁腸風痔漏下血等疾女子或犯淋帶崩漏諸症此係陰傷陽升內風沸起大忌發散宜用育陰熄風柔肝滋腎等法或可救十中之四五凡羌活防風川芎細辛藁本升麻等藥皆不可用倘或失治必致膏傷低陷青黃牒出致成痼疾而不可救專是科者不可不留意焉葉先生雖非眼目專科觀其案內諸法真補前賢之未備較之慣用苦寒升散及概用點藥者不啻如霄壤之殊矣學者當細心而參玩之丁聖彥徐評眼科自有專家其現症各有主治之方案中雖未必切中然清淡和平無苦寒溫補等弊反勝於近日之名為眼科者醫理苟明則無不通矣若欲深求則有專門之書在鼻鮑十七兩三年鼻塞不聞清涕由口嗆出而氣窒仍然大凡頭面諸竅皆清陽交會通行之所就外邪來乘亦必霧露無質清邪邪郁既久氣血失其流暢進藥攻治必不效驗欲治其疴須查手太陰自少商穴起施針刺以泄邪流氣乃一法也清邪郁久肺氣窒塞無方徐四十頭面諸竅皆清陽遊行之所邪處於中則為堵塞陽氣不司流行必畏寒形頽內痹必鬱而成熱有鼻柱鼽衄矣論理當用通聖散遠處江外倉猝就診不可輕投用輕可去實苦丁茶乾荷葉邊蔓荊子連翹心飛滑石白芷毛十四熱壅肺氣失降鼻柱窒痹熱壅肺氣知母水梨肉川貝母水熬膏楊咸降滋填鼻淵止得寐用虎潛法減當歸陳皮加天冬淡菜膠脊筋丸腦熱鼻淵沈氏素有痰火氣逆春令地中陽升木火化風上引巔頂腦熱由清竅以泄越耳鳴鼻淵甚於左者春應肝膽氣火自左而升也宜清熱散郁辛涼達於頭而主治羚羊角黑山梔苦丁茶青菊葉飛滑石夏枯草花又照方去滑石加乾荷葉生石膏又性情躁急陽動太過氣火上升鬱於隧竅由春深病加失其條達之性經言春氣病在頭也考五行六氣迅速變化莫若火風腦熱暗泄而為鼻淵隧道失和結成癭核夫東垣升陽散火丹溪總治諸郁咸取苦辛為法然藥乃片時之效欲得久安以怡悅心志為要旨耳連翹心土貝母海藻昆布黑山梔川芎小生香附鬱金羚羊角夏枯草乾荷葉邊生研末青菊葉汁法丸苦丁茶煎湯送二錢五分汪形瘦尖長稟乎木火陰精不足腦髓不固鼻淵淋下並不腥穢暖天稍止遇冷更甚其為虛證顯然明白醫者愈以風寒中腦主治發散滲泄愈耗正氣豈但欲愈勞怯是憂用天真丸精虛鼻淵人參黃耆白朮山藥蓯蓉當歸天冬羊肉經云肺和則鼻能知香臭矣又云膽移熱於腦令人辛頞鼻淵傳為衄衊瞑目是知初感風寒之邪久則化熱熱鬱則氣痹而塞矣治法利於開上宣郁如蒼耳散防風通聖散川芎茶調散菊花茶調散等類先生則佐以荷葉邊苦丁茶蔓荊連翹之屬以治之此外感宜辛散也內熱宜清涼者如腦熱鼻淵用羚羊山梔石膏滑石夏枯草青菊葉苦丁茶等類苦辛涼散郁之法也久則當用咸降滋填如虎潛減辛再加鎮攝之品其有精氣不足腦髓不固淋下無腥穢之氣者此勞怯根萌以天真丸主之此就案中大概而言之也然症候錯雜再當考前賢之法而治之華玉堂徐評此等病皆有專治之方大概以清火驅風保肺為治於理無害而藥不中窾往往無效所以醫貴博極群書也牙某陰虧體質溫氣上蒸齒痛連及頭巔溫邪用玉女煎某火鬱巔頂屬厥陰上結核齦腫火犀角羚羊角元參知母生甘草連翹黑山梔銀花夏枯草王四一酒客牙宣衄血痰血形寒內熱食少陰藥濁味姑緩陰虛火炎小黑豆皮人中白旱蓮草川斛左牡蠣澤瀉徐二二脈細數上出體屬陰虛內熱牙癰後頰車穴閉口不能張其病在絡藥餌難效擬進宣通絡痹方後牙癰後絡痹羚羊角殭蠶川桂枝尖煨明天麻炒丹皮黑山梔鉤藤汪風熱上蒸齦脹頭痛當用輕清上焦風熱活水蘆根囫圇滑石西瓜翠衣生緑豆皮連翹銀花牙症不外乎風火蟲虛此但言其痛也其他如牙宣牙皯牙菌牙疳牙癰穿牙毒骨槽風走馬牙疳之類皆由於濕火熱毒蘊結牙床須分上下二齒辨明手足陽明及少陰之異又當察其專科而任之華玉堂咽喉陸風火上郁項腫咽痛風火薄荷連翹射干牛蒡子馬勃緑豆皮邵風火上郁咽痛頭脹宜用辛涼西瓜翠衣滑石連翹桑皮射干杏仁汪二三左脈弦數咽痛脘悶陰虧體質不耐辛溫當以輕藥暫清上焦肺燥熱桑葉生緑豆皮白沙參川貝元參川斛王二七勞傷恐有瘀腐進辛潤宣血初服身痛繼漸平復但喉間緊痹而呼吸飲食仍不覺其苦眼白仍帶黃議清肺中氣熱治百部大沙參鮮枇杷葉活水蘆根川貝地骨皮南花粉苡仁徐五六老勞咽疼生雞子白一枚糯稻根鬚水洗五錢甜北沙參一錢半炒麥冬三錢川石斛一錢半生甘草三分楊未病陰氣走泄為虛穢濁上受則實咽喉腫痹上竅邪蒙日暮昏煩陰傷日熾肌膚柔白氣分不足此醫藥雖宜涼解清上但不可犯及中下穢濁上受喉腫痹連翹鬱金馬勃牛蒡子竹葉心黑山梔杏仁橘紅艾上焦之病都是氣分氣窒則上下不通而中宮遂脹熱氣蒸灼喉舌疳蝕清氣之中必佐解毒皆受重藥之纍瘁氣分熱毒銀花二錢川貝三錢馬兜鈴五分連翹心一錢半川通草一錢白金汁一杯活水蘆根汁半杯又餘熱蒸痰壅氣當脘膈因咳而痛議以潤降清肅甜杏仁花粉川貝甘草桔梗孫四九腎液不收肝陽上越巔脹流涕咽喉微痛陰虛火炎六味加牛膝車前五味伍四六咽喉痛痹發時如有物阻膈甚至痛連心下每晚加劇是陰液日枯肝臟厥陽化火風上灼法以柔劑仿甘以緩其急耳細生地天冬阿膠生雞子黃元參心糯稻根鬚陳三七陰陽交虛營衛欹斜為忽冷忽熱周身骸骨皆痛百脈皆損秋半天氣已降身中氣反泄越汗出喉痹陽不入於陰致自為動搏耳夫咽喉之患久則喉痹喉宣妨阻受納最不易治從少陰咽痛例用豬膚湯旬日喉痛得緩對症轉方張二三陰損三年不復入夏咽痛拒納寒涼清咽反加泄瀉則知龍相上騰若電光火灼雖傾盆暴雨不能撲滅必身中陰陽協和方息此草木無情難效耳從仲景少陰咽痛用豬膚湯主之又陰涸於下陽熾於上為少陰喉痛乃損怯之末傳矣用豬膚甘涼益坎有情之屬而效今肉腠消爍殆盡下焦易冷髓空極矣何暇以痰嗽為理議滑澀之補味鹹入腎可也牛骨髓四兩羊骨髓四兩豬骨髓四兩麋角膠四兩用建蓮肉五兩山藥五兩芡實二兩同搗丸金四二臟液不充陽氣虛風鼓動病起喉辣心震頻頻舉發多因勞怒用內經甘緩一法人參萸肉炭白芍炙甘草茯神小麥又復脈湯去桂內經云一陰一陽結謂之喉痹一陰者手少陰君火心之脈氣也一陽者手少陽相火三焦之脈氣也夫二經之脈並絡於喉故氣熱則內結結甚則腫脹脹甚則痹痹甚則不通而死矣即今之所謂喉癬喉風喉蛾等類是也夫推原十二經惟足太陽別下項其餘皆湊咽喉然內經獨言一陰一陽結為喉痹者何也蓋以君相二火獨勝則熱且痛也愚歷考咽喉湯方皆用辛散咸軟去風痰解熱毒為主如元參升麻湯聖濟透關散及玉鑰匙如聖散普濟消毒飲子皆急於治標而緩於治本恐緩則傷人故以治標為急耳又嘗考仲景傷寒論咽喉生瘡等症每用甘草桔梗半夏散及湯為主一為少陰水虧不能上濟君火以致咽喉生瘡不能出聲故以半夏之辛滑佐雞子清利竅通聲使以苦酒入陰劫涎斂瘡桂枝解肌由經脈而出肌表悉從太陽開發而半夏治咽痛可無燥津涸液之患一為陰火上結而為咽痛故用生甘草甘涼泄熱功在緩腎急而救陰液佐以桔梗開提足少陰之熱邪如腎液下泄不能上蒸於肺致絡燥而為咽痛者仲景又有豬膚一法潤燥解熱緩中使其陰陽協和而後愈是固本而兼治標者也如風火上郁陰虧脈數而為咽痛者先生又有辛涼清上諸法如咽喉緊痹氣熱而為咽痛者又有清肺中氣熱一法如情志鬱勃相火上炎而為咽痛者則又有降氣開濁一法如腎液不收肝陽上越而為咽痛者宗錢氏六味湯如陰陽交虛龍相上灼而為咽痛者宗仲景豬膚湯法鄒滋九徐評凡病屬於經絡臟腑者皆煎丸之所能治一屬形體及九竅則屬有形之病實有邪氣凝結之處藥入胃中不過氣到耳安能去凝結之邪故煎丸之功不過居其半耳若欲速效必用外治之法可以應手而愈博考方書廣求祕法自能得之此老尚未知之也故其治有形諸病皆非所長又外治之法上古所鮮聞因其用針灸之術通神入妙何必外治此則外治之最者也後世針法不傳於是乎以藥代針而多外治之法若針灸既廢而外治之法亦不講則天下之病即使用藥的當只能愈其半耳其外症之必需外治者竟無愈理此亦醫道之一大關也後之學者須知之瘡瘍楊十九瘡痍四肢偏多長夏入秋懶倦欲眠乾咳無痰頗知味聽納已少此陽明胃陰因熱致耗即熱傷元氣之徵當與甘藥養胃陰以供肺如金匱麥門冬湯去半夏加黃耆皮瘡吳十八脈不浮大非關外風初起右掌二指已不屈伸頭面身半以上常有瘡泡之形此乃陽明脈絡內留濕熱若非癘氣吸入定然食物中毒姑與宣解緩攻連翹犀角赤芍酒煨大黃荊芥片薑黃又能食二便通調臟腑無病初因膿瘡瘡愈有泡自面及肢體至於右指掌屈伸皆痛為脈絡留邪以致隧道為壅前方辛涼入血先開後降已得小效今制清脈絡壅熱藉酒力以引導通復營衛亦一法也銀花連翹犀角生大黃荊芥丹皮黃芩川芎當歸澤蘭羚羊角大豆黃卷用無灰酒十斤浸金四六血舍空隙內風蠕動外以熱湯先洗濕熱蒸襲肌竅遂有裂膿流水況周身漸加麻痹陽脈亦衰圖治之法清營以熄內風疏利濕熱以肅隧道辛辣腥鮮勿進尚可緩以計功制首烏鮮生地柏子仁川斛黑穭豆皮虎骨蠶砂黃柏萆薢熬膏吳瘡痍之後濕熱未去壅阻隧道水穀下咽亦化為痰中焦受病故不知飢餓痰氣上干漸至喘悶矣但服藥四十劑純是破氣消克胃陽受傷痰氣愈不得去矣半夏茯苓紫老薑炒粳米又瘡痍大發營衛行動於脈中脈外可免腹滿之纍矣第穀食尚未安適猶是苦劣多進之故胃陽未復仍以通調利濕主之半夏苡仁金石斛茯苓澤瀉秦十七久熱瘡痍五六年環口燥裂溺澀莖痛鮮生地熟首烏丹皮丹參茺蔚子銀花地丁紫草共熬膏王血熱風動膚癢荊芥防風地膚子赤芍銀花小生地木通甘草張三四初因嘔吐是肝胃不和致病故辛香剛燥愈劇然久病必入血絡熱則久瘡不愈矣夫木火皆令燥液易飢易飽間有嘔逆斯胃病仍在凡呆滯藥味皆非對症三角胡麻冬桑葉生首烏杏仁鬱金佩蘭葉茯苓苡仁熬自然膏楊十五身瘦久瘡血分有熱精通之年最宜安養脈象非有病生首烏三兩三角胡麻一兩五錢搗碎水洗細生地四兩地骨皮二兩金銀花二兩丹皮二兩生白芍二兩生甘草一兩蜜丸早服王三九脈來濡浮久瘡變幻未罷是衛陽疏豁不耐寒暄初受客邪不解混處氣血浸淫僅在陽分肌腠之患議升舉一法氣壯斯風濕盡驅人參生黃耆川芎當歸防風殭蠶蟬蛻炙草生薑大棗蔣四歲鼻瘡口瘡尿黃膚熱冬瓜皮苡仁鄒四三痰因於濕久而變熱壅於經隧變現瘡疾疥癬己釀風濕之毒混在氣血之中邪正混處搜逐難驅四肢為甚姑從陽明升降法連翹赤芍白殭蠶白蘚皮防風升麻滑石酒浸大黃汪氏風熱既久未解化成瘡痍當以和血驅風當歸赤芍川芎夏枯草花牛蒡子制殭蠶金頭巔熱癤未能泄邪此身熱皆成膿之象辛涼兼理氣血可愈癤連翹犀角銀花丹皮元參生甘草青菊葉某風熱毒閉項後腫風熱項腫竹葉滑石蘆根牛蒡馬勃薄荷葉黑山梔連翹川貝生甘草王疔毒咯血失血都是暑入陰傷疔竹葉心元參心鮮生地黑穭豆皮麥冬知母屠三四秋痢半年未愈瘰堅硬痛瘍膿郁久成熱腑經病可冀其愈瘰癧痰核夏枯草香附茯苓苡仁川貝丹皮糜氏頸項結核腹膨足腫肝木犯中痰氣凝滯夏枯草三兩牡蠣二兩澤瀉一兩半茯苓二兩半夏炒二兩厚朴一兩半橘紅一兩神麯一兩半生香附一兩水磨汁泛丸某氣鬱痰核夏枯草生香附丹皮山梔連翹鬱金赤芍橘紅王十四脈左數右長頸項結癭時衄癭生地三兩丹皮一兩半犀角二兩生夏枯草一兩半生鉤藤一兩半黑山梔二兩土貝母二兩生薄荷五錢陳躁急善怒氣火結癭爍筋為痛熱鬱化風氣阻痹塞則腹鳴脘脹苟非開懷歡暢不能向安土貝母山梔栝蔞皮鬱金白芥子海藻昆布夏枯草沈氏肝氣鬱遏宿痞乳癰乳川楝子夏枯草薄荷梗丹皮黑山梔栝蔞實青橘葉香附汁劉氏乳房為少陽脈絡經行之所此經氣血皆少由情懷失暢而氣血鬱痹有形而痛當治在絡恐年歲日加竟成沉痼非癰膿之症以脈不浮數無寒熱辨之柴胡夏枯草歸身白芍川貝茯苓甘草某氏乳房結核是少陽之結此經絡氣血皆薄攻之非易恐産育有年釀為瘍症耳青蒿香附橘葉青菊葉丹皮澤蘭鬱金當歸鬚孫因嗔忿失血以來致頸項左右筋腫痛連背部此屬郁傷氣血經脈流行失司已經百日不痊竟有流注潰膿延綿之憂治在少陽陽明流注小生香附夏枯草鮮菊葉薄荷梗黑山梔鉤藤丹皮鬱金陳脈左數實血絡有熱暑風濕氣外加遂發疹塊壅腫瘙癢是屬暑瘍暑瘍杏仁連翹滑石寒水石銀花晚蠶砂黃柏防己程瘍毒熱症與參耆不效即當清解為是消導亦是未合今者身熱正晡神識欲昏便溏溺赤煩渴是暑氣攻入內侵肺胃有痙厥之變昨用宣肺解毒雖與暑邪無益然亦無害若加黃耆又屬相反大凡熱氣蒙閉清竅都令神昏當以牛黃清心丸清痰氣之阻使其竅開況暑門中大有是法與解毒勿悖矣李六四初病濕熱在經久則瘀熱入絡膿瘍日多未已漸至筋骨熱痛金匱云經熱則痹絡熱則痿數年宿病勿事速攻瘍犀角連翹心元參丹參野赤豆皮細生地薑黃桑枝午服夜服蒺藜丸某三七瘡瘍服涼藥陽傷氣阻脘悶不運腹膨最怕瘍毒內閉急宜通陽厚朴廣皮薑皮茯苓皮連皮杏仁桂枝木澤瀉大腹皮某服瘍科寒凝之藥以致氣衝作脹喘急不臥無非濁陰上攻議來復丹顧五八脈微小潰瘍半月余腫未消膿水清稀浮腫汗出嘔惡惡食此胃陽垂敗癰毒內攻欲脫夫陽失煦則陰液不承元氣撒則毒愈瀰漫清解苦寒究竟斫伐生陽議甘溫胃受培植其本冀陷者復振余非瘍醫按色脈以推其理耳加桂理中湯潰瘍姚嫗潰瘍久不靨氣血耗盡中宮營液枯涸氣不旋轉得湯飲則痰涎上湧勢如噎膈況久恙若是藥餌難挽勉擬方人參炒麥冬代赭石化橘紅胡納食主胃運化主脾癰瘍痛潰臥床不得舒展臟腑氣機呆鈍何疑外科守定成方耆朮歸地不能補托氣血反壅滯於裡出納之權交失且是症乃水穀濕氣下垂而致結於足厥陰手陽明之界若濕熱不為盡驅藉補托以冀生機養賊貽害焉能濟事金石斛五錢槐米一錢半金銀花三錢茯苓一錢半晚蠶砂二錢寒水石二錢徐營傷心辣納食無味此傷痛大虛當調其中人參歸身炒白芍木瓜熟術廣皮茯神炙草某膿血去多痛猶未息胃傷不嗜谷口無味左關尺細弱無力正虛之著據理進藥仍宜補托人參熟地玉竹柏子仁歸身丹參茯神棗仁遠志某瘍潰膿血去多元真大耗脈無力不嗜食噁心中州不振寐則驚惕神不守也以養營法人參熟術廣皮茯神炙草歸身白芍五味棗仁某八歲瘍損能食身熱六味湯加青蒿節曹三四因瘍漏過進寒涼遂患腰痛牽引脊膂今晨起周身不得自如乃經脈絡脈之中氣血流行失暢久病諒非攻逐議兩和方法瘍漏羚羊角當歸黃耆白蒺藜桂枝桑枝顧潰瘍不合成漏脂液滲去必陽絡空隙內風暗動攻胃則嘔逆吞酸腹痛泄瀉不食津液不升舌焦黑不渴飲內外兼病難治之症人參一錢同煎炒烏梅肉五分炒黑川椒三分茯苓三錢生淡薑五分炒廣皮一錢白芍一錢半顧久損漏瘍胃減腹痛議用戊己湯意人參茯神白芍炙草炒菟絲子王四五痛久屈伸不得自如經脈絡脈呆鈍氣痹血瘀鬱蒸上熱旬日頻頻大便必有血下復喘促煩躁不飢不食並無寒熱汗出全是錮結在裡欲作內癰之象部位臍左之上內應乎肝癰者壅也血結必入於絡吐痰口氣皆臭內癰已見一班矣肝癰炒桃仁新絳降香末野鬱金汁紫菀冬瓜子金銀花某臍旁紫黑先厥後熱少腹痛如刀刮二便皆澀兩足筋縮有腸癰之慮腸癰老韭白兩頭尖小茴香當歸鬚炙山甲某舌焦黃小腹堅滿小便不利兩足皆痿濕熱結聚六腑不通有腸癰之慮川楝子小茴丹皮山梔通草青蔥某壯熱旬日周身筋脈牽掣少腹堅硬小便淋滴忽冷忽熱欲釀膿血乃腸癰為病仿孫真人牡丹皮大黃湯主之戴十九痔瘡下血濕熱居多今色衰微顯是虛寒無速效法則當補脾胃因痔瘡猶痛腫勢尚存佐以淡滲通腑痔生於術生菟絲粉生象牙末生白蠟外症本有專科先生並非瘍醫然觀其憑理立方已勝專科什伯矣惜其案無多法亦未備余不敘述大凡瘍症雖發於表而病根則在於里能明陰陽虛實寒熱經絡俞穴大症化小小症化無善於消散者此為上工其次能審明五善七惡循理用藥其刀針砭割手法靈活敷貼熏洗悉遵古方雖潰易斂此為中工更有不察症之陰陽虛實及因鬱則營衛不和致氣血凝澀釀成瘍症但知概用苦寒攻逐名為清火消毒實則敗胃戕生逮至胃氣一敗則變症蜂起矣又有藉稱以毒攻毒祕方類取毒藥合就丹丸隨症亂投希冀取效於目前不顧貽禍於後日及問其經絡部位症之順逆概屬茫然此殆下工之不如也至於外治之法瘍科尤當究心若其人好學深思博聞廣記隨在留心一有所聞即筆之於書更能博覽醫籍搜採古法海上實有單方家傳豈無神祕其所制敷貼膏丹俱臨症歷試百治百驗能隨手應效者即上工遇之亦當為之遜一籌矣華玉堂徐評凡治病必有專家一切丸散外治等法一有不備即不能建愈功理雖同而法各別如欲治外症不可不另有一番功夫也
