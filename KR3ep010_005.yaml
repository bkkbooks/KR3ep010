body:
  text: 卷五風某二七風傷衛寒熱頭痛脘悶風傷衛蘇梗一錢淡豆豉一錢杏仁三錢桔梗一錢厚朴一錢半連翹一錢半通草一錢滑石三錢某二一風邪外襲肺衛畏風發熱咳嗽脘悶當用兩和表裡淡豆豉一錢半蘇梗一錢杏仁三錢桔梗一錢半連翹一錢半通草一錢江五六勞倦過月氣弱加外感頭痛惡風營衛二氣皆怯嗽則閃爍筋掣而痛大凡先治表後治里世間未有先投黃連清裡後用桂枝和表此非醫藥風傷營衛誤治當歸建中湯沈虛人得感微寒熱體虛感風參歸桂枝湯加廣皮經云風為百病之長蓋六氣之中惟風能全兼五氣如兼寒則風寒兼暑則曰暑風兼濕曰風濕兼燥曰風燥兼火曰風火蓋因風能鼓蕩此五氣而傷人故曰百病之長也其餘五氣則不能互相全兼如寒不能兼暑與火暑亦不兼寒濕不兼燥燥不兼濕火不兼寒由此觀之病之因乎風而起者自多也然風能兼寒寒不兼風何以辨之如隆冬嚴寒之時即密室重幃之中人若裸體而臥必犯傷寒之病此本無風氣侵入乃但傷於寒而不兼風者也風能兼寒者因風中本有寒氣蓋巽為風風之性本寒即巽卦之初爻屬陰是也因風能流動鼓蕩其用屬陽是合乎巽之二爻三爻皆陽爻也如炎歊溽暑之時若使數人扇一人其人必致汗孔閉頭痛惡寒骨節疼等傷寒之病作矣斯時天地間固毫無一些寒氣實因所扇之風風中卻有寒氣故令人受之寒疾頓作此乃因傷風而兼傷寒者也故有但傷寒而不傷風之症亦有因傷風而致兼傷寒之症又有但傷風而不傷寒之症有因傷風而或兼風溫風濕風燥風火等症更有暑濕燥火四氣各自致傷而絶不兼風之症故柯韻伯所注傷寒云傷風之重者即屬傷寒亦有無汗脈緊骨節疼諸症此柯氏之書所以能獨開仲景生面也至仲景所著傷寒書本以寒為主因風能兼寒故以風陪說互相發明耳學者看書不可不知此理若夫臟腑一切內外諸風各有現症具載內經尤當詳考華岫云寒某二二客邪外侵頭脹當用辛散寒邪客肺蘇梗杏仁桔梗桑皮橘紅連翹某寒熱頭痛脘悶淡豆豉嫩蘇梗杏仁桔梗厚朴枳殼某五二復受寒邪背寒頭痛鼻塞風寒傷衛桂枝湯加杏仁某十九時邪外襲衛痹發熱頭痛先散表邪寒邪兼濕淡豆豉蘇梗杏仁厚朴木防己茯苓皮楊四二太陽脈行由背抵腰外來風寒先傷陽經雲霧自下及上經氣逆而病發致嘔痰涎頭痛小溲數行病解膀胱氣通斯逆者轉順矣當通太陽之裡用五苓散倘外感病發再議寒客太陽膀胱經氣逆某二八勞傷陽氣形寒身熱頭疼脘悶身痛勞倦陽虛感寒杏仁三錢川桂枝八分生薑一錢厚朴一錢廣皮一錢茯苓皮三錢傷寒症仲景立法於前諸賢注釋於後先生雖天資穎敏若擬其治法恐亦不能出仲景範圍其所以異於庸醫者在乎能辨症耳不以冬溫春溫風溫溫熱濕溫伏暑內傷勞倦瘟疫等症誤認為傷寒其治溫熱暑濕諸症專辨邪之在衛在營或傷氣分或傷血分更專究三焦故能述前人溫邪忌汗濕家忌汗當用手經之方不必用足經之藥等明訓垂示後人此乃先生獨擅見長之處也若夫傷寒之書自成無己注解以後凡注疏者不啻數百家其尤著者如嘉言三書景嶽書傷寒三注四注等篇近有柯韻伯來蘇集傷寒論翼方翼王晉三古方選注中所解一百十三方諸家析疑辨義處雖稍有異同然皆或登仲景之堂或造仲景之室者業醫者當日置案頭潛心參究庶乎臨症可無誤矣華岫云傷寒一症內經云熱病者皆傷寒之類也又曰凡病傷寒而成溫者先夏至日者為病溫後夏至日者為病暑又曰冬傷於寒春必病溫其症有六經相傳並病合病兩感直中難經又言傷寒有五有中風有傷寒有濕溫有熱病有溫病其所苦各不同再加以六淫之邪有隨時互相兼感而發之病且其一切現症則又皆有頭痛發熱或有汗無汗或惡風惡寒不食倦臥煩渴等則又大略相同故其症愈多其理愈晦毋怪乎醫者臨症時不能灼然分辨即其所讀之書前人亦並無至當不易之論將靈素難經之言及一切外感之症逐一分晰辨明使人有所遵循故千百年來欲求一鑑垣之士察六淫之邪毫不紊亂者竟未見其人幸賴有仲景之書以六經分症治以汗吐下和寒溫諸法故古人云仲景之法不但治傷寒苟能悉明其理即治一切六氣之病與諸雜症皆可融會貫通無所不宜此誠屬高論固深知仲景者也然余謂六淫之邪頭緒甚繁其理甚奧即彙集河間東垣丹溪及前賢輩諸法而治之猶慮未能兼括盡善若沾沾焉必欲但拘仲景之法而施治此乃見聞不廣膠柱鼓瑟不知變通者矣今觀葉氏之書傷寒之法固屬無多然其辨明冬溫春溫風溫溫熱濕溫之治實超越前人以此羽翼仲景差可嘉惠後學觀者幸毋忽諸華玉堂徐評此即俗名著寒之症偶爾受寒之小疾不入經絡之病也何必牽引傷寒大症發諸議論及細閲此編竟無治傷寒一門即此數方為傷寒之法不禁失笑夫醫者之學問全在明傷寒之理則萬病皆通故仲景之書只有二種傷寒論治傷寒之法也金匱治雜症之法也而金匱之方則又半從傷寒論中來則傷寒乃病中之第一症而學醫者之第一功夫也今此編獨闕此一門則平日所習何書所治何病耶此老數十年醫道大行豈無數千百大症經手乃竟只録此數方以了局此非此老之過乃編書之人胸中茫無定見耳風溫僧五二近日風溫上受寸口脈獨大肺受熱灼聲出不揚先與辛涼清上當薄味調養旬日風溫傷肺牛蒡子薄荷象貝母杏仁冬桑葉大沙參南花粉黑山梔皮楊脈左實大頭目如蒙清竅不爽此風溫仍在上焦擬升降法乾荷葉薄荷象貝連翹鉤藤生石膏末某風溫從上而入風屬陽溫化熱上焦近肺肺氣不得舒轉周行氣阻致身痛脘悶不飢宜微苦以清降微辛以宣通醫謂六經輒投羌防泄陽氣劫胃汁溫邪忌汗何遽忘之杏仁香豉鬱金山梔栝蔞皮蜜炒橘紅葉風溫入肺肺氣不通熱漸內郁如舌苔頭脹咳嗽發疹心中懊憹脘中痞滿猶是氣不舒展邪欲結痹宿有痰飲不欲飲水議梔豉合涼膈方法出梔皮豆豉杏仁黃芩栝蔞皮枳實汁郭風溫入肺氣不肯降形寒內熱胸痞皆膹郁之象辛涼佐以微苦手太陰主治黑山梔香豉杏仁桑葉栝蔞皮鬱金秦六三體質血虛風溫上受滋清不應氣分燥也議清其上風溫化燥熱石膏生甘草薄荷桑葉杏仁連翹又照前方去連翹薄荷加陳蔞皮鬱金梔皮某風火上郁耳後結核目眶痛少陽風火薄荷牛蒡子前胡象貝連翹黑梔皮赤芍生甘草某風溫熱伏更劫其陰日輕夜重煩擾不寧風溫傷陰生地阿膠麥冬白芍炙草蔗漿馬三五風溫熱灼之後津液未復陽明脈絡不旺骨酸背楚治以和補生黃耆鮮生地北沙參玉竹麥冬歸身蜜丸某陰虛風濕氣從左升桂枝湯加花粉杏仁風為天之陽氣溫乃化熱之邪兩陽熏灼先傷上焦種種變幻情狀不外手三陰為病藪頭脹汗出身熱咳嗽必然並見當與辛涼輕劑清解為先大忌辛溫消散劫爍清津太陰無肅化之權救逆則有蔗汁廬根玉竹門冬之類也苦寒沉降損傷胃口陽明頓失循序之司救逆則有復脈建中之類大凡此症驟變則為痙厥緩變則為虛勞則主治之方總以甘藥為要或兼寒或兼溫在人通變可也邵新甫溫熱某二十脈數暮熱頭痛腰疼口燥此屬溫邪溫邪入肺連翹淡豆豉淡黃芩黑山梔杏仁桔梗某溫邪化熱肺痹喘急消渴胸滿便溺不爽肺與大腸見症淡黃芩知母鮮生地阿膠天冬花粉謝積勞傷陽衛疏溫邪上受內入乎肺肺主周身之氣氣窒不化外寒似戰栗其溫邪內郁必從熱化今氣短胸滿病邪在上大便瀉出稀水肺與大腸表裡相應亦由熱迫下泄耳用辛涼輕劑為穩杏仁桔梗香豉橘紅枳殼薄荷連翹茯苓龔襁褓吸入溫邪釀為肺脹危症蘆根桃仁苡仁冬瓜子施久患虛損原寢食安舒自服陰柔膩補不但減食不寐脘中常悶渴欲飲涼此口鼻吸入溫邪先干於肺誤補則邪愈熾氣機阻塞弱質不敢開泄援引輕揚肅上兼以威喜丸淡以和氣上焦得行可進養胃法白沙參苡仁天花粉桑葉鬱金兼服威喜丸王溫邪發熱津傷口糜氣穢溫邪劫津捲心竹葉嘉定花粉知母麥冬金石斛連翹某春溫身熱六日不解邪陷劫津舌絳骨節痛以甘寒熄邪竹葉心知母花粉滑石生甘草梨皮丁口鼻吸入熱穢肺先受邪氣痹不主宜通其邪熱由中及於募原布散營衛遂為寒熱既為邪踞自然痞悶不飢雖邪輕未為深害留連不已熱蒸形消所謂病傷漸至於損而後已熱傷胃津桂枝白虎湯又氣分之熱稍平日久胃津消乏不飢不欲納食大忌香燥破氣之藥以景嶽玉女煎多進可效忌食辛辣肥膩自安竹葉石膏湯加鮮枸杞根皮楊伏邪發熱煩渴知飢無寐乃胃津受傷所致擬進竹葉石膏湯加花粉葉熱傷氣分用甘寒方白虎湯加竹葉某右脈未和熱多口渴若再劫胃汁怕有脘痞不飢之事當清熱生津仍佐理痰俟邪減便可再商麥冬人參石膏知母粳米竹葉半夏葉二八仲景云陰氣先傷陽氣獨發不寒疸熱令人消爛肌肉條例下不注方但曰以飲食消息之後賢謂甘寒生津解煩熱是矣今脈數舌紫渴飲氣分熱邪未去漸次轉入血分斯甘寒清氣熱中必佐存陰為法中之法生地石膏生甘草知母粳米白芍竹葉心毛六十溫邪熱入營中心熱悶脅肋痛平素痰火與邪膠結致米飲下咽皆脹老年五液已涸忌汗忌下熱入心營生地麥冬杏仁鬱金汁炒川貝橘紅馬少陰伏邪津液不騰喉燥舌黑不喜飲水法當清解血中伏氣莫使液涸犀角生地丹皮竹葉元參連翹陳嫗熱入膻中夜煩無寐心悸怔舌絳而干不嗜湯飲乃營中之熱治在手經犀角鮮生地黑元參連翹石菖蒲炒遠志又鮮生地元參天冬麥冬竹葉茯神金箔又陽升風動治以鹹寒生地阿膠天冬人參川斛茯神麥冬張營絡熱心震動復脈湯去薑桂參加白芍陸六九高年熱病八九日舌燥煩渴譫語邪入心胞絡中深怕液涸神昏當滋清去邪兼進牛黃丸驅熱利竅熱邪入心胞竹葉心鮮生地連翹心元參犀角石菖蒲胡脈數舌赤耳聾胸悶素有痰火近日冬溫引動宿病加以勞復小溲不利議治胞絡之熱鮮生地五錢竹葉心一錢丹參一錢半元參一錢半石菖蒲根六分陳膽星六分顧溫邪誤表劫津邪入胞絡內閉至寶丹王吸入溫邪鼻通肺絡逆傳心胞絡中震動君主神明欲迷瀰漫之邪攻之不解清竅既蒙絡內亦痹幼科不解投以豁痰降火理氣毫無一效憶平脈篇清邪中上肺位最高既入胞絡氣血交阻逐穢利竅須藉芳香議用局方至寶丹施溫邪如瘧陰氣先傷苦辛再傷陽及胃內風肆橫肢掣瘛瘲邪閉心胞絡中痰潮神昏乃熱氣蒸灼無形無質此消痰消食清火竟走腸胃與病情隔靴搔癢速速與至寶丹三分冷開水調服若得神清再商治法顧飲酒又能納穀是內風主乎消爍當春盡夏初陽氣弛張遂致偏中於右診脈左弦且堅肌腠隱約斑點面色光亮而赤舌胎灰黃其中必夾伏溫邪所怕內閉神昏治法以清絡宣竅勿以攻風劫痰扶助溫邪平定廓清冀其帶病久延而已犀角生地元參連翹心鬱金小青葉竹葉心石菖蒲又目瞑舌縮神昏如醉邪入心胞絡中心神為蒙謂之內閉前案已經論及溫邪鬱蒸乃無形質而醫藥都是形質氣味正如隔靴搔癢近代喻嘉言議謂芳香逐穢宣竅頗為合理絶症難挽聊盡人工至寶丹四丸勻四服涼開水調化包老年下虛春溫上受痰潮昏譫舌絳黃苔面赤微痙先清上焦熱邪閉竅神昏天竺黃金銀花竹葉心連翹竹瀝張溫邪自里而發喉腫口渴舌心灰滯上焦熱蒙最怕竅閉昏痙苦寒直降攻其腸胃與溫邪上郁無涉連翹黑梔皮牛蒡子杏仁花粉馬勃栝蔞皮夏枯草金汁銀花露張周歲內未得穀味精華溫邪吸入上焦先受頭面頤頷腫浮邪與氣血混處刀針破傷經絡溫邪內閉熱壅蔓延三焦昏寐痰潮舌刺捲縮小溲點滴渾濁熱氣結錮在裡但膏連芩梔之屬藥性直降竟由胃達腸而熱氣如煙如霧原非形質可蕩可掃故牛黃産自牛腹原從氣血而成混處氣血之邪藉此破其蘊結是得效之因由也夫溫熱時癘上行氣分而漸及於血分非如傷寒足六經順傳經絡者大抵熱氣鴟張必熏塞經絡內竅故昏躁皆里竅之欲閉欲宣內閉須得芳香氣血久郁必致瘍毒內攻謹陳大意參末議用紫雪丹三分微溫開水調服褚溫邪中自口鼻始而入肺為咳喘繼傳膻中則嗆血乃心營肺衛受邪然邪在上焦壅遏阻氣必聚為熱痰臭嗆渴是欲內閉惜不以河間三焦立法或謂傷寒主六經或謂肺癰專泄氣血致熱無出路胸突腹大危期至速矣即有對病藥餌氣湧沸騰勢必湧吐無餘焉望有濟夫溫熱穢濁填塞內竅神識昏迷脹悶欲絶者須以芳香宣竅佐牛黃金箔深入臟絡以搜錮閉之邪今危篤若此百中圖一而已紫雪丹陳溫邪逆傳膻中熱痰蔽阻空竅所進寒涼消導徒攻腸胃毫無一效痰乃熱熏津液所化膻中乃空靈之所是用藥之最難至寶丹芳香通其神明之竅以驅熱痰之結極是但稚年受溫邪最易陰虧津耗必兼滋清以理久伏溫邪為正犀角鮮生地元參連翹心丹皮石菖蒲化服至寶丹某濕為漸熱之氣迷霧鬲間神機不發三焦皆被邪侵豈是小恙視其舌伸縮如強痰涎黏著內閉之象已見宣通膻中望其少蘇無暇清至陰之熱至寶丹四分石菖蒲金銀花湯送下王十八夜熱早涼熱退無汗其熱從陰而來故能食形瘦脈數左盛兩月不解治在血分熱陷血分生鱉甲青蒿細生地知母丹皮淡竹葉許溫邪已入血分舌赤音低神呆潮熱即發斑疹亦是血中熱邪誤汗消食必變昏厥犀角細生地元參丹皮鬱金石菖蒲張舌絳裂紋面色枯槁全無淖澤形象畏冷心中熱焚邪深竟入厥陰正氣已經虛極勉擬仲景復脈湯合乎邪少虛多治法熱入厥陰復脈去人參生薑加甘蔗汁代水煎又熱病誤投表散消導正氣受傷神昏舌強勢如燎原前進復脈法略有轉機宜遵前方去桂加參以扶正氣為主復脈湯去桂加人參甘蔗汁代水煎藥又進甘藥頗安奈陰液已涸舌強音縮撫之干板較諸已前齦肉映血有間小便欲解掣痛猶是陰氣欲絶欲寐昏沉午間煩燥熱深入陰之徵未能穩許愈期也生白芍炙甘草阿膠雞子黃人參生地麥冬炒麻仁某誤下熱陷於裡而成結胸所以身不大熱但短氣胸滿煩躁此皆邪熱內燔擾亂神明內閉之象棘手重恙仿仲景瀉心法備參末議再候明眼定裁誤下熱陷成結胸川連黃芩半夏炮淡乾薑生薑枳實吳神氣如迷不飢不食乃苦辛消導發散劫奪胃津所致蓋溫邪手經為病今世多以足六經主治故致此誤治傷胃津液細生地竹葉心麥冬元參心連翹心鬱金王嫗溫熱十三日舌黃心中悶痛初病手經不當用足經方老人怕其液涸甘寒醒胃卻熱鮮生地竹葉心麥冬鬱金川斛菖蒲根吳十五近日天未寒冷病虛氣不收藏所感之邪謂冬溫參苓益氣薄荷桔梗杏仁泄氣已屬背謬加補骨脂溫澀腎臟尤不通之極自述夜寐深更漐漐有汗稚年陰不充陽易泄論體質可卻病冬溫傷液桑葉大沙參玉竹苡仁生甘草糯米湯煎藥陳半歲冬溫入肺膠痰化熱因未納穀之身不可重藥消痰通利炒麥冬桑葉大沙參甜杏仁地骨皮某脈數右大煩渴舌絳溫邪氣血兩傷與玉女煎氣血兩傷生地竹葉石膏知母丹皮甘草陳二三陰虛溫邪甘寒清上陰虛感溫邪白沙參甜杏仁玉竹冬桑葉南花粉生甘草關陰虛挾溫邪寒熱不止雖不宜發散消食徒補亦屬無益擬進復脈湯法炙甘草阿膠生白芍麥冬炒生地炒丹皮青甘蔗汁煎黃體虛溫邪內伏頭汗淋漓心腹窒塞上熱下冷舌白煩渴春陽升舉為病猶是冬令少藏所致色脈參視極當謹慎阿膠生地麥冬生牡蠣生白芍茯苓張五五勞倦內傷溫邪外受兩月不愈心中溫溫液液津液無以上供夜臥喉乾燥與復脈湯去薑桂參三服後可加參勞倦感溫陰液燥汪勞倦更感溫邪陽升頭痛寒熱戰栗冷汗邪雖外達陽氣亦泄致神倦欲眠舌赤黃胎口不知味當以育陰除熱為主辛散苦降非宜復脈湯去參薑桂麻加青甘蔗漿曹脈促數舌白不飢寒熱汗出初起腹痛臍右有形乃久傷勞倦復感溫邪今病兩旬又六微咳有痰並不渴飲寒來微微齒痙此營衛二氣大衰恐延虛脫議固衛陽冀寒熱得平勞倦感溫營衛胃陽兼虛黃耆桂枝白芍炙甘草牡蠣南棗陳熱病後不飢能食不寐此胃氣不和病退胃不和香豉黑山梔半夏枳實廣皮白華五五口鼻受寒暄不正之氣過募原擾胃系寒熱已罷猶不飽不飢舌邊赤中心黃餘邪未清食入變酸乃邪熱不勝谷以溫膽和之半曲溫膽去甘草茯苓枳實加鬱金黑山梔林氏腹滿已久非是暴症近日面頷腫脹牙關緊閉先有寒熱隨現是象診脈右搏數左小乃溫邪觸自口鼻上焦先受氣血與熱膠固致清竅不利倏有痹塞之變理當先治新邪況頭面咽喉結邪必辛涼輕劑以宣通若藥味重濁徒攻腸胃矣仿東垣普濟消毒意熱毒壅結上焦連翹牛蒡子馬勃射干滑石夏枯草金銀花露金汁席脈左數右緩弱陽根未固陰液漸涸舌赤微渴喘促自利溲數晡刻自熱神煩囈語夫溫邪久伏少陰古人立法全以育陰祛熱但今見症陰分固有伏邪真陽亦不肯收納議仿劉河間濁藥輕投不為上焦熱阻下焦根蒂自立冀其煩躁熱蒸漸緩陰虛邪伏熟地炭茯苓淡蓯蓉遠志炭川石斛五味子飲子煎法又晚診陰中伏邪晡時而升目赤羞明舌絳而渴與育陰清邪法生地炭元參心川石斛炒麥冬犀角石菖蒲又脈左數右軟舌乾苔白小溲淋瀝吸氣喘促煩汗腎陰不承心神熱灼蒙閉議以三才湯滋水制熱三才加茯神黃柏金箔晚進周少川牛黃清心丸一服又昨黃昏後診脈較諸早上左手數疾頓減惟尺中垂而仍動囈語不已若有妄見因思腎熱乘心膻中微閉神明為蒙自屬昏亂隨進周少川牛黃丸一服俾迷漫無質之熱暫可泄降服後頗安辰刻診脈濡小形質大衰舌邊色淡下利稀水夫救陰是要旨讀仲景少陰下利篇上下交徵關閘欲撒必以堵塞陽明為治以陽明司闔有關無闔下焦之陰仍從走泄矣議用桃花湯人參赤石脂炮姜白粳米又晚服照方加茯苓又脈左沉數右小數暮熱微汗時煩辰刻神清虛邪仍留陰分議用清補人參茯苓川石斛炙甘草黑穭豆皮糯稻根鬚又金匱麥門冬湯程二八溫熱病已傷少陰之陰少壯陰未易復者恰當夏令發泄百益酒釀造有灰辛熱劫陰泄氣致形體頽然藥難見效每日餌雞距子生用其湯飲用馬料豆湯邪熱兼酒熱傷陰冬傷於寒春必病溫者重在冬不藏精也蓋煩勞多欲之人陰精久耗入春則裡氣大泄木火內燃強陽無制燔燎之勢直從里發始見必壯熱煩冤口乾舌燥之候矣故主治以存津液為第一黃芩湯堅陰卻邪即此義也再者在內之溫邪欲發在外之新邪又加蔥豉湯最為捷徑表分可以肅清至於因循貽誤豈止一端或因氣燥津枯或致陰傷液涸先生用挽救諸法如人參白虎湯黃連阿膠湯玉女煎復脈法申明條例甚詳余則治痙厥以甘藥緩肝昏閉用幽芳開竅熱痰之溫膽蓄血而論通瘀井井有條法真周到邵新甫徐評細詳諸案俱是熱邪誤治入臟之壞症居多時邪溫熱之症絶少暑某大凡暑與熱乃地中之氣吸受致病亦必傷人氣分氣結則上焦不行下脘不通不飢不欲食不大便皆氣分有阻如天地不交遂若否卦之義然無形無質所以清之攻之不效暑傷氣分上焦閉郁杏仁通草象貝栝蔞皮白蔻鬱金汁姚奔走氣亂復飲燒酒酒氣辛熱有升無降肺氣膹郁上下不通舌白消渴氣結自胸及腹澼澼自利不爽周身膚腠皆痛汗大出不解無非暑濕熱氣始由肺受漫布三焦群醫消導苦藥但攻腸胃在上痞結仍然議淡滲佐以微辛合乎軒岐上病治上之方西瓜翠衣川白通草大豆黃卷馬兜鈴射干苡仁範伏暑阻其氣分煩渴咳嘔喘急二便不爽宜治上焦杏仁石膏炒半夏黑梔皮厚朴竹茹又痰多咳嘔是暑郁在上醫家亂投沉降所以無效石膏杏仁炒半夏鬱金香豉黑山梔王舌白煩渴心中脹悶熱邪內迫氣分阻閉當治肺經倘逆傳膻中必致昏厥杏仁鬱金滑石黃芩半夏橘紅栝蔞皮陳四五暑濕傷氣肺先受病諸氣皆痹當午後陽升煩喘更加夫無形氣病醫以重藥推消多見不效西瓜翠衣活水蘆根杏仁苡仁又酒客中虛重鎮攻消清氣愈傷夫暑邪皆著氣分苟肺司清肅則其邪不攻自罷議仍以廓清為法若雨露從天下降炎𭶟自蕩掃無餘威喜丸二錢十服某二二身熱頭脹脘悶咳嗆此暑邪外襲於肺衛當清上焦絲瓜葉三錢大杏仁三錢香薷七分通草一錢半飛滑石三錢白蔻仁五分陳脈左徑右濡頭痛脘悶麻痹欲厥舌白此暑邪內中蒙閉清空成瘧之象平昔陰虛勿犯中下二焦嫩竹葉連翹飛滑石野鬱金汁大杏仁川貝母龔二四脈寸大頭暈脘中食不多下暑熱氣從上受治以苦辛寒方竹葉杏仁鬱金滑石香豉山梔張四七三瘧之邪在陰未經向愈春季洞利不食想春雨外濕水穀內聚亦濕即濕多成五泄之謂瘡痍僅泄經隧濕邪而里之濕邪未驅長夏吸受暑邪上蒙清空諸竅咳嗽耳聾的系新邪非得與宿病同日而語連翹飛滑石嫩竹葉荷葉邊汁桑葉杏仁象貝黑山梔程三六暑風必挾濕濕必傷於氣分斷瘧瘡發即濕邪內發之徵濕伏熱蘊致氣壅塞咽底脘中及至進谷無礙二便通調中下無病顯然白通草西瓜翠衣活水蘆根苡仁吳連朝驟熱必有暑氣內侵頭熱目瞑吸短神迷此正虛邪痹清補兩難先與益元散三四錢用嫩竹葉心二錢煎湯涼用三四小杯常用緑豆煎湯服龔六十暑必挾濕二者皆傷氣分從鼻吸而受必先犯肺乃上焦病治法以辛涼微苦氣分上焦廓清則愈惜乎專以陶書六經看病仍是與風寒先表后里之藥致邪之在上漫延結錮四十餘日不解非初受六經不須再辨其謬經云病自上受者治其上援引經義以論治病非邪僻也宗河間法杏仁栝蔞皮半夏薑汁白蔻仁石膏知母竹瀝秋露水煎又脈神頗安昨午發疹先有寒戰蓋此病起於濕熱當此無汗肌腠氣窒至膚間皮脫如麩猶未能全泄其邪風疹再發乃濕因戰栗為解一月以來病魔而肌無膏澤瘦削枯槁古謂瘦人之病慮涸其陰陰液不充補之以味然腥羶濁味徒助上焦熱痰無益培陰養液況宿滯未去腸胃氣尚窒鈍必淡薄調理上氣清爽痰熱不至復聚從來三時熱病怕反復於病後之復當此九仞幸加意留神為上元參心細生地銀花知母生甘草川貝丹皮橘紅鹽水炒竹瀝此煎藥方只用二劑可停未大便時用地冬汁膏大便後可用三才湯池伏暑至深秋而發頭痛煩渴少寐薄荷淡竹葉杏仁連翹黃芩石膏赤芍木通張病幾一月猶然耳聾神識不慧嗽甚痰黏呼吸喉間有音此非傷寒暴感皆夏秋間暑濕熱氣內郁新涼引動內伏之邪當以輕劑清解三焦奈何醫者不曉伏氣為病但以發散消食寒涼清火為事致胃汁消亡真陰盡爍舌邊赤齒板燥裂血邪留營中有內閉瘛瘲厥逆之變況右脈小數左脈澀弱熱固在裡當此陰傷日久下之再犯亡陰之戒從來頭面都是清竅既為邪蒙精華氣血不肯流行諸竅失司聰明矣此輕清清解斷斷然也議清上焦氣血之壅為先不投重劑苦寒正仿古人肥人之病慮虛其陽耳連翹心元參犀角鬱金橘紅蜜水炒黑梔皮川貝鮮菖蒲根加竹瀝又昨進清上焦法諸症雖然略減而神識猶未清爽總由病久陰液內耗陽津外傷聰明智慧之氣俱被濁氣矇蔽所以子後午前稍清他時皆不清明以陽盛時人身應之也擬進局方至寶丹藉其芳香足以護陽逐邪庶無內閉外脫之虞至寶丹每服三分燈心嫩竹葉湯送又脈右緩大左弱面垢色已減痰嗽不爽良由胃中津液為辛散溫燥所傷心營肺衛悉受熱焰蒸迫致神呆喘急耳聾清陽阻痹九竅不利首方宣解氣血繼方芳香通竅無形令其轉旋三焦自有專司豈與俗醫但曉邪滯攻擊而已今已獲效當與清養胃陰肺氣體素豐盛陽弱不耐沉寒然深秋冬交天氣降則上焦先受試觀霜露下垂草木皆改容色人在氣交法乎天地兼參體質施治枇杷葉炒黃川貝橘紅鬱金茯苓苡仁王暑風熱氣入肺上熱痰喘嗽暑風傷肺石膏連翹竹葉杏仁桑皮苡仁橘紅生甘草又肺氣壅遏身熱喘咳溺少葦莖合葶藶大棗湯某二五暑風外襲肺衛氣阻頭脹咳嗆畏風微熱防作肺瘧絲瓜葉大杏仁香薷桔梗連翹六一散某舌灰黃頭痛咳逆左肢掣痛此煩勞陽動暑風乘虛襲入最慮風動中厥鮮荷葉三錢鮮蓮子五錢茯神一錢半益元散三錢川貝母一錢半橘紅一錢楊女暑熱穢濁阻塞肺部氣痹腹滿宜以輕可去實西瓜翠衣白通草活水蘆根生苡仁臨好加入石膏末二錢周二三暑風熱神呆鮮荷葉苦丁茶滑石木通杏仁厚朴廣皮白蔻仁郁二六暑熱頭脹咳喉痛鮮荷葉杏仁射干橘紅桑皮桔梗木通滑石胡不飢不食不便此屬胃病乃暑熱傷氣所致味變酸濁熱痰聚脘苦辛自能泄降非無據也暑熱阻氣中痞不運半夏瀉心湯去甘草乾姜加杏仁枳實王身熱自汗腹痛大小便不利脈虛右大左小暑熱內閉擬和表裡法薄荷枳實黃芩生白芍竹葉心黑山梔通草甘草程四二穢熱由清竅入直犯募原初頭痛肌脹今不飢痞悶以苦辛寒法杏仁半夏厚朴橘紅竹葉黃芩滑石又脈虛舌赤消渴伏暑熱氣過衛入營治在手厥陰竹葉犀角生地麥冬元參某六一舌黃脘悶頭脹口渴溺短此吸受穢氣所致飛滑石三錢白蔻仁七分杏仁三錢厚朴一錢半通草一錢半廣皮白一錢半某三三穢暑吸入內結募原脘悶腹痛便泄不爽法宜芳香逐穢以疏中焦為主藿香梗杏仁厚朴茯苓皮半夏曲廣皮香附麥芽楊秋暑內爍煩渴喜得冷飲脈右小弱者暑傷氣分脈必芤虛也此非結胸症宜辛寒以徹里邪石膏知母厚朴杏仁半夏薑汁沈二三脈小色白氣分不足兼之胃弱少食聞穢濁要刮痧陰柔之藥妨胃助濁常以豬肚丸養胃入夏令熱更傷氣每食遠進生脈四君子湯一劑恪守日服可杜夏季客暑之侵生脈四君子湯長服豬肚丸卜二八春夏必吞酸肢痿麻木此體虛不耐陽氣升泄乃熱傷氣分為病宗東垣清暑益氣之議人參黃耆白朮甘草麥冬五味青皮陳皮澤瀉葛根升麻黃柏歸身神麯任十六沖年真陰未長逢長夏濕熱交迫斯氣泄煩倦當靜坐涼爽過月涼飇至炎𭶟去乃卻病之期與清暑益氣之屬清暑益氣湯徐十四長夏濕熱令行肢起膿窠煩倦不嗜食此體質本怯而濕與熱邪皆傷氣分當以注夏同參用清暑益氣法人參白朮廣皮五味麥冬川連黃柏升麻葛根神麯麥芽穀芽鮮荷葉汁泛丸施四七以煩勞傷陽交長夏發泄令加見症都是氣弱亦熱傷氣也煩渴有痰先治其胃蓋陽明經脈主乎束筋骨以流利機關耳煩勞傷暑胃虛金匱麥門冬湯吳診脈肝膽獨大尺中動數先天素弱水虧木少滋榮當春深長夏天地氣機泄越身中煩倦食減皆熱傷元氣所致進以甘酸充養胃陰少俟秋肅天降培植下焦固納為宜炒麥冬木瓜北沙參生甘草烏梅程暑久入營夜寐不安不飢微痞陰虛體質議理心營暑入心營鮮生地元參川連銀花連翹丹參顧十三陰虛遺熱小便淋瀝近日冒暑初起寒熱頭痛汗出不解肌肉麻木手足牽強神昏如寐成瘧則輕痙厥則重犀角元參小生地連翹心竹葉心石菖蒲滑石化牛黃丸二服某初病伏暑傷於氣分微熱渴飲邪犯肺也失治邪張逆走膻中遂舌絳縮小便忽閉鼻煤裂血口瘡耳聾神呆由氣分之邪熱漫延於血分矣夫肺主衛心主營營衛二氣晝夜行於經絡之間與邪相遇或涼或熱今則入於絡津液被劫必漸昏寐所謂內閉外脫鮮生地連翹元參犀角石菖蒲金銀花汪暑風久入營絡微熱忽涼議用玉女煎暑風入營玉女煎去麥冬牛膝加丹皮竹葉金熱止津津汗出伏暑已解只因病魔日久平素積勞形色脈象虛衰深慮變病今飲食未進寤寐未寧議以斂液補虛暑病久延傷液人參茯神麥冬五味炒白芍塊辰砂一兩綿裹同煎又熱久胃汁被劫不飢不便亦病後常事耳古人論病必究寢食今食未加餐難寐神識未清為病傷元氣而熱病必消爍真陰議用三才湯意人參天冬生地麥冬五味子顧右脈空大左脈小芤寒熱麻痹腰痛冷汗平素積勞內虛秋暑客邪遂干臟陰致神迷心熱煩躁刮痧似乎略爽病不肯解此非經絡間病頗慮熱深劫陰而為痙厥張司農集諸賢論暑病謂入肝則麻痹入腎為消渴此其明徵議清陰分之邪仍以養正輔之暑熱深入劫陰阿膠小生地麥冬人參小川連烏梅肉某暑濕熱氣觸入上焦孔竅頭脹脘悶不飢腹痛惡心延久不清有瘧痢之憂醫者不明三焦治法混投發散消食宜乎無效暑濕瀰漫三焦杏仁香豉橘紅黑山梔半夏厚朴滑石黃芩張舌白罩灰黑胸脘痞悶潮熱嘔惡煩渴汗出自利伏暑內發三焦均受然清理上中為要杏仁滑石黃芩半夏厚朴橘紅黃連鬱金通草某二六暑熱鬱遏頭脹脘痛口渴溺短當清三焦絲瓜葉飛滑石淡竹葉茯苓皮厚朴藿香廣皮通草何暑濕皆客邪也原無質故初起頭脹胸滿但傷上焦氣分耳酒家少谷胃氣素薄一派消導雜以辛散苦寒胃再傷殘在上濕熱延及中下遂協熱自利三焦邪蒸氣衝塞填胸躁亂口渴瓜果下脘格拒相鬥此中宮大傷況進熱飲略受其為胃陽殘憊而邪結內踞可知矣考暑門時風煩躁清濁交亂者昔賢每以來復丹五六十粒轉運清濁為先攻補難施之際望其效靈耳來復丹吳目黃脘悶咽中不爽嘔逆寒少熱多暑濕客氣之傷三焦不通非風寒之症大竹葉黃芩杏仁滑石陳皮厚朴半夏薑汁又暑濕熱皆氣也並釀蓄濁痰於胃遂口甜膩滯不飢議以宣氣理痰川貝母栝蔞皮杏仁黑山梔澤瀉另用二賢散某四一診脈弦午後惡寒似熱不飢溺澀短赤暑熱炎蒸外襲肺衛遊行三焦致氣分窒痹而然當用和法宜薄滋味庶杜瘧患杏仁香薷木通飛滑石茯苓厚朴白蔻仁淡竹葉又照前方去香薷加半夏楊二八暑熱必挾濕吸氣而受先傷於上故仲景傷寒先分六經河間溫熱須究三焦大凡暑熱傷氣濕著阻氣肺主一身周行之氣位高為手太陰經據述病樣面赤足冷上脘痞塞其為上焦受病顯著緣平素善飲胃中濕熱久伏辛溫燥烈不但肺病不合而胃中濕熱得燥熱錮閉下利稀水即協熱下利故黃連苦寒每進必利甚者苦寒以勝其辛熱藥味尚留於胃底也然與初受之肺邪無當此石膏辛寒辛先入肺知母為味清涼為肺之母氣然不明肺邪徒曰生津焉是至理昔孫真人未診先問最不誤事再據主家說及病起兩旬從無汗泄經云暑當汗出勿止氣分窒塞日久熱侵入血中咯痰帶血舌紅赤不甚渴飲上焦不解漫延中下此皆急清三焦是第一章旨故熱病之瘀熱留絡而為遺毒注腑腸而為洞利便為束手無策再論濕乃重濁之邪熱為熏蒸之氣熱處濕中蒸淫之氣上迫清竅耳為失聰不與少陽耳聾同例青蒿減柴胡一等亦是少陽本藥且大病如大敵選藥若選將苟非慎重鮮克有濟議三焦分清治從河間法初三日飛滑石生石膏寒水石大杏仁炒黃竹茹川通草瑩白金汁金銀花露又暮診診脈後腹胸肌腠發現癮疹氣分濕熱原有暗泄之機早間所談餘邪遺熱必兼解毒者為此下午進藥後診脈較大於早晨神識亦如前但舌赤中心甚乾燥身體捫之熱甚於早間此陰分亦被熱氣蒸傷瘦人慮其液涸然痰咯不清養陰藥無往而非膩滯議得早進清膈一劑而三焦熱穢之蓄當用紫雪丹二三匙藉其芳香宣竅逐穢斯錮熱可解濁痰不黏繼此調理之方清營分滋胃汁始可瞻顧其宿垢欲去猶在旬日之外古人謂下不嫌遲非臆說也紫雪丹一錢六分知母竹葉心連翹心炒川貝竹瀝犀角元參金汁銀花露又一劑後用竹葉心知母緑豆皮元參鮮生地金銀花又一劑後去銀花緑豆皮加人參麥冬又初十申刻診經月時邪脈形小數小為病退數為餘熱故皮腠麩蛻氣血有流行之義思食欲餐胃中有醒豁之機皆佳兆也第舌赤而中心黃苔熱蒸既久胃津陰液俱傷致咽物咽中若阻溺溲尿管猶痛咯痰濃厚宿垢未下若急遽攻奪恐真陰更涸矣此存陰為主而清腑兼之故亂進食物便是助熱惟清淡之味與病不悖自來熱病最怕食復勞復舉世共聞非臆說也細生地元參心知母炒川貝麥冬地骨皮銀花露竹瀝又脈症如昨仍議滋清陰分餘熱佐清上脘熱痰照昨日方去地骨皮銀花露加鹽水炒橘紅某脈虛傷暑頭重脘悶跗酸絲瓜葉三錢大杏仁三錢六一散三錢茯苓皮三錢漢防己一錢半綿茵陳一錢細木通一錢白蔻仁五分某中惡暑厥暑厥蒼朮白虎湯加滑石王暑邪寒熱舌白不渴吐血此名暑瘵重症暑瘵西瓜翠衣竹葉心青荷葉汁杏仁飛滑石苡仁萬暑邪不解陷入厥陰舌灰消渴心下板實嘔惡吐蛔寒熱下利血水最危之症暑邪入厥陰川連黃芩乾薑生白芍川椒烏梅人參枳實江暑邪深入厥陰舌縮少腹堅滿聲音不出自利上下格拒危期至速勉擬暑門酸苦泄熱輔正驅邪一法黃連淡乾薑烏梅生白芍半夏人參枳實某十八勞傷挾暑肺氣受戕咳血口乾先清暑熱暑兼血症鮮荷葉白扁豆大沙參茯神苡仁朱三二三伏中陰氣不生陽氣不潛其頭脹身痛是暑邪初受暑濕熱必先傷氣分故舌白口渴身痛早晨清爽午夜煩蒸狀如溫瘧沐浴繞動血絡宿病得時邪而來仲景云先治新病後理宿病是亦陰氣先傷陽氣獨發也鮮生地石膏知母元參連翹竹葉心荷葉汁王三九雖是咳痰失血然強能食不知飢目黃晡熱舌心黃已現暑熱客邪症象此先宜清理肺胃莫因久恙而投膩補杏仁象貝母鬱金川通草桑葉石膏橘紅苡仁又晚服枇杷葉膏早六味加阿膠麥冬又阿膠雞子黃小生地麥冬桑葉炒黑丹皮徐三六勞傷挾暑咳血不飢鮮荷葉汁沖大沙參生苡仁六一散緑豆皮杏仁橘紅白蔻仁天之暑熱一動地之濕濁自騰人在蒸淫熱迫之中若正氣設或有隙則邪從口鼻吸入氣分先阻上焦清肅不行輸化之機失於常度水穀之精微亦蘊結而為濕也人身一小天地內外相應故暑病必挾濕者即此義耳前人有因動因靜之分或傷或中之候以及入心入肝為瘧為痢中痧霍亂暴厥卒死種種傳變之原各有精義可參茲不重悉想大江以南地卑氣薄濕勝熱蒸當此時候更須防患於先昔李笠翁記中所謂使天只有三時而無夏則人之病也必稀此語最確蓋暑濕之傷驟者在當時為患緩者於秋後為伏氣之疾其候也脈色必滯口舌必膩或有微寒或單發熱熱時脘痞氣窒渴悶煩冤每至午後則甚入暮更劇熱至天明得汗則諸恙稍緩日日如是必要兩三候外日減一日方得全解倘如元氣不支或調理非法不治者甚多然是病比之傷寒其勢覺緩比之瘧疾寒熱又不分明其變幻與傷寒無二其愈期反覺纏綿若表之汗不易徹攻之便易溏瀉過清則肢冷嘔惡過燥則唇齒燥裂每遇秋來最多是症求之古訓不載者多獨己任編名之曰秋時晚發感症似瘧總當以感症之法治之要知伏氣為病四時皆有但不比風寒之邪一汗而解溫熱之氣投涼即安夫暑與濕為熏蒸黏膩之邪也最難驟愈若治不中窾暑熱從陽上熏而傷陰化燥濕邪從陰下沉而傷陽變濁以致神昏耳聾舌乾齦血脘痞嘔惡洞泄肢冷棘手之候叢生竟至潰敗莫救矣參先生用意宗劉河間三焦論立法認明暑濕二氣何者為重再究其病實在營氣何分大凡六氣傷人因人而化陰虛者火旺邪歸營分為多陽虛者濕勝邪傷氣分為多一則耐清一則耐溫臟性之陰陽從此可知也於是在上者以辛涼微苦如竹葉連翹杏仁薄荷之類在中者以苦辛宣通如半夏瀉心之類在下者以溫行寒性質重開下如桂苓甘露飲之類此皆治三焦之大意也或有所夾又須通變至於治氣分有寒溫之別寒者宗諸白虎法及天水散意溫者從乎二陳湯及正氣散法理營分知清補之宜清者如犀角地黃加入心之品補者有三才復脈等方又如濕熱沉混之蒼朮石膏湯氣血兩燔之玉女法開閉逐穢與牛黃及至寶紫雪等劑扶虛進參附及兩儀諸法隨其變幻審其陰陽運用之妙存乎心也附驥蕪詞高明教正邵新甫徐評所列諸案皆平素伏暑之症為多其卒然受暑之病絶少若卒受之症則當以香茹飲為主不可不知也此老治暑邪能用輕清涼潤之品以和肺是其所長但暑邪深入必有悶亂煩躁等症近於霍亂此則更有治法至於病重症危屬熱邪橫逆不但人參不可輕用而桂附乾薑服之無不立斃乃亦仿仲景傷寒壞症治法輕於一試當時不知有害與否而耳食之徒竟以為必用之藥託名本於此老我見死者甚多傷心慘目不得不歸咎於作俑之人也濕馮三一舌白頭脹身痛肢疼胸悶不食溺阻當開氣分除濕濕阻上焦肺不肅降飛滑石杏仁白蔻仁大竹葉炒半夏白通草王二十酒肉之濕助熱內蒸釀痰阻塞氣分不飢不食便溺不爽亦三焦病先論上焦莫如治肺以肺主一身之氣化也杏仁栝蔞皮白蔻仁飛滑石半夏厚朴吳五五酒客濕勝變痰化火性不喜甜熱聚胃口犯肺氣逆吐食上中濕熱主以淡滲佐以苦溫大杏仁金石斛飛滑石紫厚朴活水蘆根孔心中熱不飢不寐目黃自利濕熱內伏淡黃芩連翹炒杏仁白通草滑石野赤豆皮某二九濕溫阻於肺衛咽痛足跗痹痛當清上焦濕走氣自和濕溫阻肺飛滑石竹葉心連翹桔梗射干蘆根周病起旬日猶然頭脹漸至耳聾正如內經病能篇所云因於濕首如裹此厄忒鼻衄皆邪混氣之象況舌色帶白咽喉欲閉邪阻上竅空虛之所諒非苦寒直入胃中可以治病病名濕溫不能自解即有昏痙之變醫莫泛稱時氣而已連翹牛蒡子銀花馬勃射干金汁李三二時令濕熱之氣觸自口鼻由募原以走中道遂致清肅不行不飢不食但溫乃化熱之漸致機竅不為靈動與形質滯濁有別此清熱開鬱必佐芳香以逐穢為法濕熱穢氣阻竅栝蔞皮桔梗黑山梔香豉枳殼鬱金降香末某吸受穢邪募原先病嘔逆邪氣分布營衛皆受遂熱蒸頭脹身痛經旬神識昏迷小水不通上中下三焦交病舌白渴不多飲是氣分窒塞當以芳香通神淡滲宣竅俾穢濕濁氣由此可以分消苡仁茯苓皮豬苓大腹皮通草淡竹葉牛黃丸二丸吳濕邪中傷之後脾胃不醒不飢口渴議清養胃津為穩濕熱傷胃津鮮省頭草知母川斛苡仁炒麥冬張嫗體壯有濕近長夏陰雨潮濕著於經絡身痛自利發熱仲景云濕家大忌發散汗之則變痙厥脈來小弱而緩濕邪凝遏陽氣病名濕溫濕中熱氣橫衝心胞絡以致神昏四肢不暖亦手厥陰見症非與傷寒同法也濕溫邪入心胞犀角連翹心元參石菖蒲金銀花野赤豆皮煎送至寶丹蔡陽虛挾濕邪熱內陷所以神識如蒙議用瀉心法濕熱內陷人參生乾薑黃芩川連枳實生白芍張六一此濕蘊氣中足太陰之氣不為鼓動運行試以痞結胸滿仲景列於太陰篇中概可推求其理矣濕鬱脾陽半夏醋炒茯苓川連厚朴通草湯煎周濕傷脾陽腹膨小溲不利茅朮厚朴茯苓澤瀉豬苓秦皮又五苓散又二術膏範四肢乍冷自利未已目黃稍退而神倦不語濕邪內伏足太陰之氣不運經言脾竅在舌邪滯竅必少靈以致語言欲謇必當分利佐辛香以默運坤陽是太陰里症之法生於術三錢厚朴五分茯苓三錢草果仁七分木瓜五分澤瀉五分又身體稍稍轉動語謇神呆猶是氣機未為靈轉色脈非是有餘而濕為陰邪不徒偏寒偏熱已也生於術茯苓苡仁鬱金炒遠志石菖蒲汁又脾胃不醒皆從前濕蒸之纍氣升咳痰參藥緩進炒黃川貝茯苓苡仁鬱金地骨皮淡竹葉又濕滯於中氣蒸於上失降不得寐口數白疳仍不渴飲開上郁佐中運利腸間亦是宣通三焦也生於術五錢苡仁三錢寒水石一錢半桔梗七分豬苓一錢澤瀉一錢廣皮白一錢半曹三十腸胃屬腑濕久生熱氣阻不爽仍以通為法濕阻中焦陽氣生於術川黃連厚朴淡生薑渣廣皮白酒煨大黃水法丸服三錢李四五脈小澀痰多上湧食入脘阻大便不爽上秋至今夏不愈自述飢飽失和曾病黃疸以濕傷氣痹主治大杏仁苡仁半夏薑汁茯苓橘紅鬱金香豉俞五五酒濕鬱傷脘中食阻而痛治以辛苦寒小川連半夏薑汁枳實茯苓香豉某五九舌白目黃口渴溺赤脈象呆鈍此屬濕鬱綿茵陳三錢生白朮一錢寒水石三錢飛滑石三錢桂枝木一錢茯苓皮三錢木豬苓三錢澤瀉一錢李酒客中虛粵地潮濕長夏涉水外受之濕下起水穀不運中焦之濕內聚治法不以宣通經腑致濕阻氣分鬱而為熱自脾胃不主運通水濕橫漬於脈腠之間二便不爽濕熱濁氣交扭混亂前輩治中滿必曰分消此分字明明謂分解之義但亂藥既多不能去病就是脾胃受傷於藥蔓延腿肢腫極且痛病深路遠藥必從喉入胃然後四布病所未得藥益清陽先已受傷此湯藥難以進商也議用丹溪小溫中丸三錢專以疏利腸中取其不致流散諸經亦一理也小溫中丸八服某三六陽微體質濕痰內聚便溏脘悶肌麻舌乾清理濕邪氣機升降自安金石斛茯苓半夏廣皮白鉤藤白蒺藜張脈右緩濕著阻氣厚朴廣皮煨草果炒楂肉藿香梗炒神麯某二二不耐煩勞是本虛脘悶便泄屬濕邪先治濕後治本藿香梗廣皮茯苓大腹皮厚朴穀芽陸濕滯如痞山茵陳草果仁茯苓皮大腹皮絨厚朴廣皮豬苓澤瀉汪三三舌黃脘悶穢濕內著氣機不宣如久釀蒸必化熱氣即有身熱之纍杏仁藿香茯苓皮滑石厚朴廣皮白某閲病源皆濕熱內停之象當去濕清熱為主至於藥酒蘊濕助熱尤當永戒生白朮赤小豆皮綿茵陳黃柏茯苓澤瀉某脈濡頭脹胸身重著而痛寒熱微嘔此濕阻氣分厚朴杏仁白蔻仁木通茯苓皮大腹皮滑石竹葉某長夏外受暑濕與水穀之氣相併上焦不行下脘不通氣阻熱從濕下蒸逼不飢不食目黃舌白氣分之結厚朴杏仁廣皮茯苓半夏薑汁某脈緩身痛汗出熱解繼而復熱此水穀之氣不運濕復阻氣鬱而成病仍議宣通氣分熱自濕中而來徒進清熱不應黃芩滑石茯苓皮大腹皮白蔻仁通草豬苓方四四形質頽然脈遲小澀不食不寐腹痛大便窒痹平昔嗜酒少谷中虛濕結陽傷寒濕濁陰鳩聚為痛炒黑生附子炒黑川椒生淡乾薑蔥白調入豬膽汁一枚王二五冷濕損陽經絡拘束形寒酒客少谷勞力所致桂枝淡乾薑熟附子生白朮莫五十今年夏四月寒熱不飢是時令潮沴氣蒸內應脾胃夫濕屬陰晦必傷陽氣吞酸形寒乏陽運行議鼓運轉旋脾胃一法苓薑朮桂湯某十六地中濕氣自足先腫濕屬陰邪陽不易復畏寒筋骨猶牽強無力以金匱苓薑朮桂湯陳五一濁凝氣結有形酒肉挾濕蓽茇生香附汁木香草果茯苓廣皮白江脈緩臍上痛腹微膨便稀溺短不爽此乃濕鬱脾胃之陽致氣滯裡急宗古人導濕分消用桂苓散方生茅朮官桂茯苓厚朴廣皮白飛滑石豬苓澤瀉炒楂肉林五二中年清陽日薄忽然脘中痞悶乃清陽不自轉旋酒肉濕濁之氣得以凝聚矣過飲溏瀉濕傷脾胃胃陽微仲景法以輕劑宣通其陽若投破氣開降最傷陽氣有格拒之害苓桂朮甘湯嚴三一胸滿不飢是陽不運行嗜酒必挾濕凝阻其氣久則三焦皆閉用半硫丸二便已通議治上焦之陽苓桂朮甘湯王六二病人述病中厚味無忌腸胃滯雖下而留濕未解濕重濁令氣下墜於肛肛墜痛不已胃不喜食陽明失闔舌上有白腐形色議劫腸胃之濕生茅朮人參厚朴廣皮炮姜灰生炒黑附子胡二十受濕患瘡久瘡陽乏氣泄半年淹淹無力食少噯噫難化此脾胃病法以運中陽為要茯苓桂枝生於術炙草苡仁生薑汪夏令脾胃司氣兼以久雨泛潮地中濕氣上干食味重濁少運所謂濕勝成五泄也古云寒傷形熱傷氣芒種夏至天漸熱宜益氣分以充脾胃此夏三月必有康健之理補中益氣湯某五十穢濕邪吸受由募原分布三焦升降失司脘腹脹悶大便不爽當用正氣散法濕邪瀰漫三焦藿香梗厚朴杏仁廣皮白茯苓皮神麯麥芽綿茵陳蔡仲景云小便不利者為無血也小便利者血症諦也此症是暑濕氣蒸三焦瀰漫以致神昏乃諸竅阻塞之兆至小腹硬滿大便不下全是濕鬱氣結彼夯醫猶然以滋味呆鈍滯藥與氣分結邪相反極矣議用甘露飲法豬苓浙茯苓寒水石晚蠶砂皂莢子去皮某十四脘悶便溏身痛脈象模糊此屬濕蘊三焦厚朴廣皮藿香梗茯苓皮大豆黃卷木防己川通草苡仁牛向年積聚誤服燥熱諸藥頻與清奪推陳致新乃安身處江南濕熱之鄉飲啖仍用山右濃重之味留熱由腸升膈三焦不消議攻無形之熱清心涼膈去芒硝加菖蒲韓三一冷酒水濕傷中上嘔食下泄脂液陽氣傷極再加浮腫作脹則危酒濕傷陽郁生胃癰人參茯苓熟附子生於術生白芍生薑又酒濕類聚例以分利診脈微陽氣已敗濕壅生熱至胃癰膿清熱則陽亡即死術苓運中祛濕佐附迅走氣分亦治濕一法茯苓熟附子生白朮左牡蠣澤瀉車前子龐四四濕久脾陽消乏中年未育子腎真亦憊仿安腎丸法陽衰濕傷脾腎鹿茸胡蘆巴附子韭子赤石脂補骨脂真茅朮茯苓菟絲子大茴香張五四陽傷痿弱有濕麻痹痔血生白朮附子乾薑茯苓某三八舌白身痛足跗浮腫從太溪穴水流如注此濕邪伏於足少陰當用溫蒸陽氣為主鹿茸淡附子草果菟絲子茯苓楊厥陰為病必錯雜不一瘧痢之後肝臟必虛發症左脅有痞腹中塊礧外堅脅下每常汨汨有聲惡虛就實常有寒熱胃中不知飢而又嘈雜吞酸脈長而數顯然厥陰陽明濕熱下滲前陰陽縮而為濕熱症也議用升發陽明胃氣滲泄厥陰濕熱其症自愈肝胃濕熱蒼朮半夏茯苓橘紅通草當歸柏子仁沙蒺藜川楝子茴香即丸方浦氏胸膈迷漫胃痛嘔食肢節屈曲處冷痛經落後來時周身腰脊不舒脈弦沉痛即便溏此濕鬱阻閉氣血不行用藥先須斷酒濕鬱肢節冷痛生茅朮炮黑川烏薑汁白芥子厚朴廣皮蓽茇茯苓徐溫瘧初愈驟進濁膩食物濕聚熱蒸蘊於經絡寒戰熱熾骨骱煩疼舌起灰滯之形面目痿黃色顯然濕熱為痹仲景謂濕家忌投發汗者恐陽傷變病蓋濕邪重著汗之不卻是苦味辛通為要耳濕熱入經絡為痹防己杏仁滑石醋炒半夏連翹山梔苡仁野赤豆皮某四七風暑濕渾雜氣不主宣咳嗽頭脹不飢右肢若廢法當通陽驅邪杏仁三錢苡仁三錢桂枝五分生薑七分厚朴一錢半夏一錢半漢防己一錢半白蒺藜二錢某汗多身痛自利小溲全無胸腹白疹此風濕傷於氣分醫用血分涼藥希冀熱緩殊不知濕鬱在脈為痛濕家本有汗不解濕鬱經脈痛苡仁竹葉白蔻仁滑石茯苓川通草濕為重濁有質之邪若從外而受者皆由地中之氣升騰從內而生者皆由脾陽之不運雖雲霧露雨濕上先受之地中潮濕下先受之然霧露雨濕亦必由地氣上升而致若地氣不升則天氣不降皆成燥症矣何濕之有其傷人也或從上或從下或遍體皆受此論外感之濕邪著於肌軀者也此雖未必即入於臟腑治法原宜於表散但不可大汗耳更當察其兼症若兼風者微微散之兼寒者佐以溫藥兼熱者佐以清藥此言外受之濕也然水流濕火就燥有同氣相感之理如其人飲食不節脾家有濕脾主肌肉四肢則外感肌軀之濕亦漸次入於臟腑矣亦有外不受濕而但濕從內生者必其人膏粱酒醴過度或嗜飲茶湯太多或食生冷瓜果及甜膩之物治法總宜辨其體質陰陽斯可以知寒熱虛實之治若其人色蒼赤而瘦肌肉堅結者其體屬陽此外感濕邪必易於化熱若內生濕邪多因膏粱酒醴必患濕熱濕火之症若其人色白而肥肌肉柔軟者其體屬陰若外感濕邪不易化熱若內生之濕多因茶湯生冷太過必患寒濕之症人身若一小天地今觀先生治法若濕阻上焦者用開肺氣佐淡滲通膀胱是即啓上閘開支河導水勢下行之理也若脾陽不運濕滯中焦者用術朴姜半之屬以溫運之以苓澤腹皮滑石等滲泄之亦猶低窊濕處必得烈日曬之或以剛燥之土培之或開溝渠以泄之耳其用藥總以苦辛寒治濕熱以苦辛溫治寒濕概以淡滲佐之或再加風藥甘酸膩濁在所不用總之腎陽充旺脾土健運自無寒濕諸症肺金清肅之氣下降膀胱之氣化通調自無濕火濕熱暑濕諸症若夫失治變幻則有腫脹黃疸泄瀉淋閉痰飲等類俱於各門兼參之可也華岫云徐評方案重復令閲者生厭編書者意欲何為治濕不用燥熱之品皆以芳香淡滲之藥疏肺氣而和膀胱此為良法惟健脾消痰培土之方未備則於固本之法猶有缺耳燥某脈右數大議清氣分中燥熱氣分熱桑葉杏仁大沙參象貝母香豉黑梔皮卞夏熱秋燥致傷都因陰分不足肺胃津液虛冬桑葉玉竹生甘草白沙參生扁豆地骨皮麥冬花粉某燥火上郁齦脹咽痛當辛涼清上火鬱上焦薄荷梗連翹殼生甘草黑梔皮桔梗緑豆皮王六七老人舌腐肉消肌枯心事繁冗陽氣過動致五液皆涸而為燥冬月無妨夏月深處林壑心境凝然可以延年心陽過動傷液每早服牛乳一杯陳秋燥復傷宿恙再發未可補澀姑與甘藥養胃胃陰虛麥冬玉竹北沙參生甘草茯神糯稻根鬚某上燥治氣下燥治血此為定評今陽明胃腑之虛因久病嘔逆投以辛耗破氣津液劫傷胃氣不主下行致腸中傳送失司經云六腑以通為補半月小效全在一通補工夫豈徒理燥而已議甘寒清補胃陰鮮生地天冬人參甜梨肉生白蜜張脈數虛舌紅口渴上齶乾涸腹熱不飢此津液被劫陰不上承心下溫溫液液用炙甘草湯熱劫陰液炙甘草阿膠生地麥冬人參麻仁某氏心中煩熱正值經來而熱渴不已若清肺氣大謬用復脈法炙甘草生地阿膠麥冬棗仁蔗漿某陽津陰液重傷餘熱淹留不解臨晚潮熱舌色若赭頻飲救亢陽焚燎究未能解渴形脈俱虛難投白虎議以仲景復脈一法為邪少虛多使少陰厥陰二臟之陰少蘇冀得胃關復振因左關尺空數不藏非久延所宜耳人參生地阿膠麥冬炙草桂枝生薑大棗燥為乾澀不通之疾內傷外感宜分外感者由於天時風熱過勝或因深秋偏亢之邪始必傷人上焦氣分其法以辛涼甘潤肺胃為先喻氏清燥救肺湯及先生用玉竹門冬桑葉薄荷梨皮甘草之類是也內傷者乃人之本病精血下奪而成或因偏餌燥劑所致病從下焦陰分先起其法以純陰靜藥柔養肝腎為宜大補地黃丸六味丸之類是也要知是症大忌者苦澀最喜者甘柔若氣分失治則延及於血下病失治則槁及乎上喘咳痿厥三消噫膈之萌總由此致大凡津液結而為患者必佐辛通之氣味精血竭而為患者必藉血肉之滋填在表佐風藥而成功在腑以緩通為要務古之滋燥養營湯潤腸丸五仁湯瓊玉膏一氣丹牛羊乳汁等法各有專司也邵新甫徐評有因風而燥當兼治風案中未備疫朱疫癘穢邪從口鼻吸受分布三焦瀰漫神識不是風寒客邪亦非停滯里症故發散消導即犯劫津之戒與傷寒六經大不相同今喉痛丹疹舌如朱神躁暮昏上受穢邪逆走膻中當清血絡以防結閉然必大用解毒以驅其穢必九日外不致昏憒冀其邪去正復癘邪入膻漸干心胞犀角連翹生地玄參菖蒲鬱金銀花金汁姚疫毒口糜丹疹喉啞治在上焦犀角鮮生地玄參連翹石菖蒲銀花金汁至寶丹談口鼻吸入穢濁自肺系漸干心胞絡初病喉痛舌燥最怕竅閉神昏之象疫毒傳染之症不與風寒停滯同法玄參連翹鬱金銀花石菖蒲靛葉射干牛蒡衝入真白金汁一杯楊吸入疫癘三焦皆受久則血分漸瘀愈結愈熱當以鹹苦之制仍是輕揚理上仿古大制小用之意玄參西瓜翠衣金銀花露瑩白金汁金氏人靜則神昏癘邪竟入膻王先生方甚妙愚意兼以芳香宣竅逐穢至寶丹疫癘一症都從口鼻而入直行中道流布三焦非比傷寒六經可表可下夫疫為穢濁之氣古人所以飲芳香採蘭草以襲芬芳之氣者重滌穢也及其傳變上行極而下下行極而上是以邪在上焦者為喉啞為口糜若逆傳膻中者為神昏舌絳為喉痛丹疹今觀先生立方清解之中必佐芳香宣竅逐穢如犀角菖蒲銀花鬱金等類兼進至寶丹從表透里以有靈之物內通心竅搜剔幽隱通者通鎮者鎮若邪入營中三焦相溷熱愈結邪愈深者理宜鹹苦大制之法仍恐性速直走在下故用玄參金銀花露金汁栝蔞皮輕揚理上所謂仿古法而不泥其法者也考是症惟張景嶽喻嘉言吳又可論之最詳然宗張喻二氏恐有遺邪留患若宗吳氏又恐邪去正傷惟在臨症權衡無盛盛無虛虛而遺人夭殃方不愧為良醫矣鄒滋九徐評治時疫不外此等方若癘疫則一時傳染惡毒非用通靈金石之品虔制數種隨症施用不能奏效也癍痧疹瘰張伏氣熱蘊三焦心凜熱發煩渴遍體赤癍夜躁不寐兩脈數搏三焦伏熱羚羊角犀角連翹心玄參心鮮生地金銀花花粉石菖蒲又寒熱必有形象攻觸及於胃脘之下口渴喜飲暖湯癍已發現病不肯退此邪氣久伏厥陰之界矣桂枝川連黃芩花粉牡蠣枳實嚴濕溫雜受身發斑疹飲水渴不解夜煩不成寐病中強食反助邪威議用涼膈疏斑方法濕溫連翹薄荷杏仁鬱金枳實汁炒牛蒡山梔石膏又舌邊赤昏譫早輕夜重斑疹隱約是溫濕已入血絡夫心主血邪干膻中漸至結閉為昏痙之危苦味沉寒竟入中焦消導辛溫徒劫胃汁皆溫邪大禁議清疏血分輕劑以透斑更參入芳香逐穢以開內竅近代喻嘉言申明戒律宜遵也犀角玄參連翹銀花石菖蒲先煎至六分後和入雪白金汁一杯臨服研入周少川牛黃丸一丸江溫邪發疹濕熱內蘊便閉不通先開上焦杏仁蘇子栝蔞皮紫菀山梔某風溫發痧風溫薄荷連翹杏仁牛蒡子桔梗桑皮甘草山梔某風溫發疹薄荷赤芍連翹牛蒡子桔梗桑皮甘草山梔費暴寒驟加伏熱更熾邪鬱則氣血壅遏痧疹不肯外達痰氣交阻神迷喘促漸入心胞絡中有內閉外脫之憂熱注下迫自利黏膩不爽法當開其結閉消毒解其膻中之壅必得神清方保無變熱邪入胞絡連翹心飛滑石石菖蒲炒金銀花射干通草煎化牛黃丸一丸朱十二痧後痰多咳嗽氣急濕熱鬱肺蘆根一兩杏仁一錢半桔梗一錢飛滑石一錢半桑皮八分通草一錢某痧後伏火未清內熱身痛痧後陰傷玉竹白沙參地骨皮川斛麥冬生甘草某痧後熱不止陰傷生白芍炙甘草生扁豆炒麥冬川斛穀芽章涼風外襲伏熱內蒸秋金主令內應乎肺喘咳身熱始而晝熱繼而暮熱自氣分漸及血分齦肉紫而肌壘發疹辛寒清散為是外寒內熱薄荷連翹石膏淡竹葉杏仁桑皮苡仁吳病在暴冷而發肌表頭面不透是外蘊為寒內伏為熱肺病主衛衛氣分兩解為是麻黃石膏牛蒡子枳殼汁杏仁射干桔梗生甘草尹環口燥裂而痛頭面身半以上發出癮疹赤紋乃陽明血熱久蘊成毒瘦人偏熱頗有是症何謂醫人不識陽明血熱犀角地黃湯江溫邪自利癮疹溫邪內陷黃芩連翹牛蒡子桔梗香豉薄荷杏仁橘紅通草李二七發瘰熱腫獨現正面每遇九十月大發五六月漸愈七八年來如是因思夏令陽氣宣越營衛流行無間秋冬氣凜外薄氣血凝滯此濕熱漫無發泄乃少陽木火之郁及陽明蘊蒸之濕故上焦尤甚耳法以辛涼佐以苦寒俾陽分鬱熱得疏庶幾發作勢緩膽火胃濕鬱蒸夏枯草鮮菊葉苦丁茶鮮荷葉邊羚羊角黑梔皮鬱金苡仁唐四五麻木忽高腫發瘰必有風濕襲入皮膜乃軀殼病昔人每以宣行通劑風濕片薑黃羚羊角川桂枝撫芎半夏白芥子某十九風塊瘙癢咳嗽腹痛邪著表裡當用雙和牛蒡子杏仁連翹桔梗桑枝象貝母煎藥送通聖丸癍者有觸目之色而無礙手之質即稠如錦紋稀如蚊跡之象也或布於胸腹或見於四肢總以鮮紅起發者為吉色紫成片者為重色黑者為凶色青者為不治蓋有諸內而形諸外可決其臟腑之安危邪正之勝負也殆傷寒瘟疫諸症失於宣解邪蘊於胃腑而走入營中每有是患耳考方書之治其法不一大抵由失表而致者當求之汗失下而致者必取乎攻火甚清之毒甚化之營氣不足者助其虛而和之托之至於陰癍一說見象甚微若必指定些些之癍點為陰猶恐不能無誤想前人此例無非覺後人勿執見癍為實熱之義也吾故曰必參之脈象及兼證方妥痧者疹之通稱有頭粒而如粟象癮者即疹之屬腫而易癢須知出要周勻沒宜徐緩不外乎太陰陽明之患故繆氏專以肺胃論治為精也若先生之法本乎四氣隨其時令之勝復酌以辛涼辛勝及甘寒苦寒鹹寒淡滲等法而治之凡吾幼科諸友於此尤當究心焉邵新甫痰汪五八宿哮久矣不發心悸震動似乎懊憹之象此屬痰火治以宣通郁遏勿徒呆補痰火半夏川連石菖蒲蛤粉枳實茯苓川鬱金橘紅竹瀝薑汁法丸劉痰火鬱遏氣滯吸烟上熱助壅是酒肉皆不相宜古稱痰因氣滯熱鬱治當清熱理氣為先川連白朮枳實厚朴茯苓半夏淡薑湯泛丸沈三四痰火久嗽海蛤丸張嫗痰火風眩暈防僕跌明天麻炒半夏茯苓橘紅羚羊角鉤藤竹瀝陳嫗老年痰火咳逆痰有穢氣蘆根苡仁桃仁絲瓜子葶藶大棗又下虛不納濁泛嘔逆痰穢氣熟地炭紫衣胡桃肉炒杞子炒牛膝川斛茯神某痰火上逆蒙竅耳鳴頭暈二陳加天麻鉤藤甘菊羚羊蔞皮某夏至節兩關脈弦長五火燔燎而肝陽胃陽尤甚動怒抽掣為肝病食辛香厚味即病至胃病使然痰火根深非頃刻可掃除惟靜養勿恚忿薄味以清裡此病發之勢必緩由漸加功議藥乃近理治法羚羊角犀角川連鬱金山梔北秦皮牛黃膽星橘紅生石膏寒水石金箔方諸水法丸竹葉燈心湯送何嫗診脈右關弦滑痰多舌乾微強語言似謇蓋因痰火上蒙津液不得上承高年頗慮風痱宜清上宣通勿進剛燥及膩滯之藥半夏金石斛橘紅黑山梔茯苓鬱金生甘草石菖蒲竹瀝薑汁張昏昏如寐神憒如迷痰熱內閉勢非輕渺痰熱內閉神昏半夏石菖蒲桔梗枳實鬱金橘紅竹瀝薑汁某郁痰郁痰半夏曲鬱金石菖蒲明天麻白蒺藜橘紅茯苓鉤藤陶脈左弦堅搏痰多食不易運此郁慮已甚肝侮脾胃有年最宜開懷不致延及噎膈半夏薑汁茯苓杏仁鬱金橘紅又脈如前痰氣未降前方去杏仁加白芥子金四六濕熱內蒸痰火日夥根本漸怯陽泄為汗陰泄遺濁酒客喜於爽口食物醫藥中滋膩補方決不適用也濕熱蒸痰豬肚丸方葉久寓南土水穀之濕蒸熱聚痰脈沉弦目黃肢末易有瘡疾皆濕熱盛致氣隧不得流暢法當苦辛寒清裡通肌仿前輩痰因熱起清熱為要生茅朮黃柏栝蔞實山梔萊蔔子川連半夏厚朴橘紅竹瀝薑汁丸某病後厚味蒸痰風化硝栝蔞仁霜枳實鬱金生茯苓薑汁炒山梔竹瀝法丸汪脈脹濕阻熱痰半夏茯苓黑山梔橘紅制蒺藜遠志降香徐陽動內風用滋養肝腎陰藥壯水和陽亦屬近理夏季脾胃主司肝膽火風易於貫膈犯中中土受木火之侮陽明脈衰痰多經脈不利矣議清少陽鬱熱使中宮自安若畏虛滋膩上中愈實下焦愈虛二陳去甘草加金斛桑葉丹皮木火犯中胃虛生痰又脈左浮弦數痰多脘中不爽煩則火升眩暈靜坐神識安舒議少陽陽明同治羚羊角連翹廣皮炒半夏曲黑山梔皮香豉又脈兩手已和惟煩動恍惚欲暈議用靜藥益陰和陽人參熟地天冬金箔汪痰火上盛腎氣少攝朝用通攝下焦暮服清肅上焦方法肝腎虛上有痰火羚羊角半夏茯苓橘紅黑梔皮鬱金苦丁茶煎湯法丸暮服熟地淡蓯蓉杞子五味牛膝茯苓遠志線膠蜜丸早服曹五一色鮮明屬上有痰飲蓋上實則下虛半百年歲未得種玉診得脈左小不靜右部弦滑法當清肺胃之熱痰益腎肝之精血仿曼倩衛生方法燕窩膠甜梨膏人參黃耆麥冬山藥茯苓於朮黃節黑節鹿尾膠羊內腎淡蓯蓉故紙胡桃蒸青鹽芮向來痰多食少而參朮服餌未合此稟質為陽不受溫熱剛燥之劑上年冬季溫暖入春痰愈多體中微倦由乎藏聚未固春氣自地升舉之徵法當攝腎固真乃治痰之本方為有益腎虛痰多熟地茯苓補骨脂胡桃肉杞子五味牛膝遠志車前蜜丸痰症之情狀變幻不一古人不究標本每著消痰之方立消痰之論者甚多後人遵其法而用之治之不驗遂有稱痰為怪病者矣不知痰乃病之標非病之本也善治者治其所以生痰之源則不消痰而痰自無矣余詳考之夫痰乃飲食所化有因外感六氣之邪則脾肺胃升降之機失度致飲食輸化不清而生者有因多食甘膩肥腥茶酒而生者有因本質脾胃陽虛濕濁凝滯而生者有因鬱則氣火不舒而蒸變者又有腎虛水泛為痰者此亦因土衰不能制水則腎中陰濁上逆耳非腎中真有痰水上泛也更有陰虛勞症龍相之火上炎爍肺以致痰嗽者此痰乃津液所化必不濃厚若欲消之不惟無益而徒傷津液其餘一切諸痰初起皆由濕而生雖有風火燥痰之名亦皆因氣而化非風火燥自能生痰也其主治之法惟痰與氣一時壅閉咽喉者不得不暫用豁痰降氣之劑以開之余皆當治其本故古人有見痰休治痰之論此誠千古之明訓蓋痰本飲食濕濁所化人豈能禁絶飲食若專欲消之由於外邪者邪散則痰或可清如寒痰溫之熱痰清之濕痰燥之燥痰潤之風痰散之是也若涉本原者必旋消旋生有至死而痰仍未清者矣此乃不知治本之故耳今觀案中治法有因郁因火者必用開鬱清火為君以消痰佐之有因濕因熱者則用燥濕清熱略佐化痰之品若因肝腎虛而生痰者則純乎鎮攝固補此真知治痰之本者矣若因寒因濕者更當於痰飲門兼參而治之華岫云徐評所列方案皆治肺胃浮痰之藥若透經入絡盤踞臟腑及三焦隱處之老痰尚有峻厲制煉之方此等方不能奏效也痰飲某六一高年衛陽式微寒邪外侵引動飲邪上逆咳嗽形寒仲景云治飲不治咳當以溫藥通和之外寒引動宿飲上逆杏仁三錢粗桂枝一錢淡乾薑一錢半茯苓三錢苡仁三錢炙草四分周向有耳聾鳴響是水虧木火蒙竅冬陽不潛亦屬下元之虛但今咳聾喉下有痰音脅痛臥著氣衝乃衝陽升而痰飲泛脈浮當此驟冷恐有外寒引動內飲議開太陽以肅上雲茯苓粗桂枝乾薑五味同姜打白芍炙草當午時服某二一新涼外束肺受寒冷氣餒不降宿飲上干而病發矣法當曖護背心宿病可卻淡生薑粉半夏蛤蜊粉茯苓桂枝木苡仁煎湯某五十背寒咳逆此屬飲象先當辛通飲邪以降肺氣飲上逆肺氣不降鮮枇杷葉杏仁茯苓橘紅生薑半夏某五二脈右大弦氣喘咳唾濁沫不能著枕喜飲湯水遇寒病發此屬飲邪留於肺衛如見咳投以清潤愈投愈劇矣葶藶子山東大棗徐氏痰飲上吐喘不得臥乃溫邪阻蔽肺氣氣不下降壅滯不能著右議用宣通開氣分方法小青龍去細辛麻黃加苡仁白糖炒石膏沈嫗冬溫陽不潛伏伏飲上泛仲景云脈沉屬飲面色鮮明為飲飲家咳甚當治其飲不當治咳緣高年下焦根蒂已虛因溫暖氣泄不主收藏飲邪上擾乘肺肺氣不降一身之氣交阻熏灼不休絡血上沸經云不得臥臥則喘甚痹塞乃肺氣之逆亂也若以見病圖病昧於色診候氣必致由咳變幻腹腫脹滿漸不可挽明眼醫者勿得忽為泛泛可也茲就管見略述大意議開太陽以使飲濁下趨仍無礙於冬溫從仲景小青龍越婢合法杏仁茯苓苡仁炒半夏桂枝木石膏白芍炙草方氏冷暖失和飲泛氣逆為浮腫喘咳腹脹臥則沖嗆議用越婢方石膏杏仁桂枝炒半夏茯苓炙草施四七勞煩太甚胃陽受傷外衛單薄怯寒畏冷食物少運痰飲內起氣阻濁凝胸背皆痛辛甘理陽已效當此長夏脾胃主令崇其生氣體旺病可全好脾胃陽虛六君子加益智木香黃三四身居沿海氛瘴霧露客邪侵入清陽陽傷畏寒久嗽病人不知卻病護身猶然用力承辦里結飲邪沉痼不卻病茯苓桂枝湯胡四六脈沉而微微則陽氣不足沉乃寒水陰凝心痛怔忡漸及兩脅下墜由陽衰不主運行痰飲聚氣欲阻致痛之來其心震之謂亦如波撼嶽陽之義議用外臺茯苓飲合桂苓方人參茯苓半夏枳實桂枝薑汁白二六脈沉小弦為陰濁飲邪稟質陽不充旺胸中清氣不得舒展曠達偶觸入寒冷或誤進寒物飲邪暴冷凝結胸痞當平日食物忌用酒肉腥濁便清陽流行常服仲景苓桂朮甘湯百劑若病來因冷即服大順散戴病去神已爽慧但本脈帶弦平素有飲為陽氣不足之體年紀漸多防有風痹此酒肉宜少用勞怒當深戒矣議外臺茯苓飲方人參茯苓廣皮枳實半夏金石斛朱四九煩勞太過陽傷痰飲日聚陽蹺脈空寤不成寐衛陽失護毛髮自墜乃日就其衰奪矣初進通飲濁以蘇陽接服外臺茯苓飲吳氏脈弦背中冷左偏微痛食少欲嘔四肢牽強此飲邪內結議通陽氣桂枝茯苓半夏薑汁炙草大棗某眩暈噁心胸脘不爽脈右弦左弱面色紅亮此乃痰飲上泛有厥中之事炒半夏制蒺藜橘紅煨天麻石菖蒲茯苓薑汁尤口中味淡是胃陽虛夫濁飲下降痛緩向有飲濕為患若不急進溫通理陽濁飲必致復聚議大半夏湯法人參半夏茯苓枳實薑汁張二七酒客谷少中虛常進疏散表藥外衛之陽亦傷其痰飲發時胸中痞塞自述或飢遇冷病來其為陽氣受病何疑不必見痰搜逐但護中焦脾胃使陽氣健運不息陰濁痰涎焉有竊踞之理脾陽不運生於術川桂枝茯苓淡姜渣苡仁澤瀉薑棗湯法丸王三二脈沉為痰飲是陽氣不足濁陰欲蔽當以理脾為先俾中陽默運即仲景外飲治脾之意苓桂術甘加半夏陳皮水法丸某三四舌白咳逆不渴非飲象而何宜宣溫藥和之杏仁苡仁半夏乾薑粗桂枝茯苓厚朴炙草某食後脘中痞阻按之漉漉有聲手麻脅痛心煩耳目昏眩是氣不流行痰飲內聚中焦用桂苓丸竹瀝薑汁法丸又桂枝人參茯苓半夏廣皮炙草黃味過甘膩中氣緩不主運延綿百天聚氣結飲東垣云病久發不焦毛不落不食不飢乃痰飲為患飲屬陰類故不渴飲仲景五飲互異其要言不繁當以溫藥和之通陽方法固無容疑惑大意外飲宜治脾內飲治腎是規矩準繩矣議用苓桂朮甘湯某形體似乎壯實陽氣外泄畏風怯冷脾陽消乏不司健運水穀悍氣蒸變痰飲隧道日壅上實下虛仲景謂飲邪當以溫藥和之苓桂術甘得效從外飲立方人參淡附子生於術枳實茯苓澤瀉荊瀝薑汁法丸某老人久嗽妨食議以外飲治脾苓桂朮甘湯王三四脈沉背寒心悸如墜形盛氣衰漸有痰飲內聚當溫通補陽方復辟斯飲濁自解脾腎陽虛人參淡附子乾薑茯苓生於術生白芍馮陽虛則形寒汗出痰飲痞聚都是陰濁成形乘陽氣衰微致上干竊踞古人法則必通其陽以掃陰氛但宿病無急攻方況平素憂鬱氣滯血澀久耗之體不敢純剛防劫液耳人參熟附子淡乾薑炒川椒川桂枝烏梅肉生白芍另真武丸三兩程四八左脈沉靜右脈微弦四旬清陽日薄脾臟鼓運漸遲加以煩心縈思水穀悍氣蘊蒸痰飲仲景謂外飲當治脾陽況中年常有遺泄之患按脈非龍相之動搏議固下益腎轉旋運脾二方分早晚服早服從還少聚精七寶參用丸方熟地蓯蓉枸杞五味萸肉茯神山藥菟絲覆盆魚膠菖蒲遠志龍骨青鹽熟蜜同棗肉搗丸早服五七錢茅朮於朮半夏茯苓廣皮生益智白蒺鉤藤薑棗湯泛丸晚服三錢開水下徐清陽未展濁陰欲踞久延必結痰飲議用真武丸二錢五分人參一錢煎湯送胃陽得震濁當退避矣十服某脈沉弦飲泛嗆咳乃下虛無以制上議早服腎氣丸攝納下焦散失以治水泛之飲午服外臺茯苓飲轉旋中焦使食不致釀痰茯苓飲去朮某七一高年久嗽脈象弦大寤不成寐乃陽氣微漓濁飲上泛仲景云進溫藥和之脾胃陽虛飲逆咳嘔杏仁三錢茯苓三錢川桂枝一錢生薑一錢苡仁三錢炙草四分大棗二枚顧二四咳嗽數月嘔出涎沫建中不應已非營衛損傷視其面色鮮明飲食仍進仿飲邪主治小半夏湯加桂枝杏仁薑汁李三八勞傷陽氣內起痰飲臥著氣鈍飲阻其咳為多痰出稍通勢緩且體常汗泄非風寒表邪不解並不熱渴亦非火炎爍金仲景云飲家而咳當治飲不當治咳茯苓桂枝木苡仁炙草薑汁陳脈澀小舌白不渴身動嘔痰身如在舟車中此寒熱攻胃致傷逆氣痰飲互結通補陽明為正白朮甘草守中未能去濕宜緩商人參汁半夏枳實汁茯苓竹瀝薑汁馬三四肌肉豐溢脈來沉緩始發右季脅痛湯飲下咽汨汨有聲吐痰涎頭痛此皆脾胃陽微寒濕滯聚年方壯盛不必介懷溫中佐其條達運通為宜茅朮厚朴半夏茯苓陳皮淡姜渣胡蘆巴炙草薑汁泛丸馬四十甘緩頗安辛泄不受此陽分氣衰將來飲邪日聚然臥著咳多清氣失旋先用苓桂朮甘湯繼進外臺茯苓飲曹四七中年陽氣日薄痰飲皆屬陰濁上干清道為沖逆咳嗽仲景治法外飲治脾內飲治腎分晰甚明昔年曾用桂苓澤術得效是治支飲治法數年真氣更衰古人謂飲邪當以溫藥和之須忌治嗽肺藥先用小青龍去麻辛接服外臺茯苓飲程五七昔肥今瘦為飲仲景云脈沉而弦是為飲家男子向老下元先虧氣不收攝則痰飲上泛飲與氣湧斯為咳矣今醫見嗽輒以清肺降氣消痰久而不效更與滋陰不明痰飲皆屬濁陰之化滋則堆砌助濁滯氣試述著枕咳嗆一端知身體臥著上氣不下必下衝上逆其痰飲伏於至陰之界腎臟絡病無疑形寒畏風陽氣微弱而藩籬疏撤仲景有要言不煩曰飲邪必用溫藥和之更分外飲治脾內飲治腎不讀聖經焉知此理脾腎陽虛飲逆咳嘔桂苓甘味湯熟附都氣加胡桃陳痛久氣亂陽微水穀不運蘊釀聚濕胃中之陽日薄痰飲水濕必傾囊上湧而新進水穀之氣與宿邪再聚復出致永無痊期仲景云飲邪當以溫藥和之又云不渴者此為飲邪未去故也則知理陽通陽誠有合於聖訓斷斷然矣真武湯張四一痰飲喘咳肌肉麻痹痞脹不堪納穀冬寒日甚春暖日減全是陽氣已衰陰濁逆干犯上肺藥治嗽無非辛泄滋潤蓋辛散則耗陽滋清助陰濁濁阻在陽分氣不肅為夜不得臥小青龍意主乎由上以泄水寒直從太陽之裡以通膀胱表中里藥也仲景謂飲邪當以溫藥和之驅陰邪以復陽一定成法早腎氣去萸換白芍炒楂炭水法丸晚外臺茯苓飲薑棗湯法丸程六十腎虛不納氣五液變痰上泛冬藏失職此病為甚不可以肺咳消痰常用八味丸收納陰中之陽暫時撤飲用仲景桂苓味甘湯孫未交冬至一陽來復老人下虛不主固納飲從下泛氣阻升降而為喘嗽發散寒涼苦瀉諸藥焉得中病仲景云飲家而咳當治飲不當治咳後賢每每以老人喘嗽從脾腎溫養定論是恪遵聖訓也桂枝茯苓五味子甘草湯代水加淡薑棗李腸紅久病不必攻治今者氣衝喘嗽脘脅痞阻是飲濁上僭最宜究悉川桂枝七分茯苓三錢乾薑一錢五味子同姜合搗一錢杏仁一錢半白芍一錢炙草五分生左牡蠣三錢吳二七壯年下元久虛收納氣泄每交秋冬受冷冷氣深入伏飲夾氣上衝為咳喘嘔吐疏肺降氣不效者病在腎絡中也蓋精血少壯不旺難以搜逐病根不去謂此絶欲一年小暑艾灸靜養一百二十天可愈附都氣加車前腎陽虛飲逆喘咳嘔潘二九勞力喘甚肩背惡寒飲泛上逆皆系下元虛損莫以喘用瀉肺等藥薛氏八味丸王秋深天氣收肅背寒喘咳飲濁上泛緣體中陽氣少振不耐風露所致最宜暖護背部進通陽以治飲茯苓桂枝半夏薑汁苡仁炙草又早腎氣丸夜真武丸陳脈虛微春陽地升濁陰上干喘不得臥治在少陰人參淡熟附子豬膽汁又照前方加淡乾薑一錢半又脈弦暮夜濁陰沖逆通陽得效議真武法以撤其飲人參淡附子生白芍茯苓薑汁又真武泄濁脘通思食能寐昨宵已有渴欲飲水之狀考金匱云渴者飲邪欲去也當健補中陽以資納穀人參生於術淡附子茯苓澤瀉又早服腎氣丸四五錢晚用大半夏湯人參半夏茯苓薑汁董脈弦右濡陽微惡寒飲濁上干咳吐涎沫且食減胃衰寒疝竊踞陰濁見症豈止一端喻嘉言謂濁陰上加於天非離照當空氛霧焉得退避反以地黃五味陰藥附和其陰陰霾沖逆肆虐飲邪滔天莫制議以仲景熟附配生薑法掃群陰以驅飲邪維陽氣以立基本況尊年尤宜急護真陽為主人參茯苓熟附子生薑汁南棗戴十二月間診得陽微濁飲上干為咳不能臥曾用小青龍湯減去麻黃細辛服後已得著枕而臥想更醫接用不明治飲方法交驚蟄陽氣發泄病勢再熾頃診脈來濡弱無神痰飲咳逆未已諒非前法可效宗仲景真武湯法以熟附配生薑通陽逐飲立法真武湯去白朮加人參計不臥嗆喘泛起白沫都是腎病議通太陽膀胱腎陽虛膀胱氣化不通降茯苓川桂枝淡乾薑五味子白芍炙草顧飲邪泛溢喘嗽督損頭垂身動喘甚食則脘中痞悶臥則喘咳不得息肺主出氣腎主納氣二臟失司出納失職議用早進腎氣丸三錢以納少陰晚用小青龍法滌飲以通太陽經腑此皆聖人內飲治法與亂投膩補有間矣小青龍去麻辛甘芍加茯苓杏仁大棗某形盛面亮脈沉弦此屬痰飲內聚暮夜屬陰喘不得臥仲景謂飲家而咳當治其飲不當治咳今胸滿腹脹小水不利當開太陽以導飲逆小青龍去麻辛合越婢桂枝半夏乾薑五味杏仁石膏茯苓白芍某服三拗湯音出喘緩可見苦寒沉降之謬素多嘔逆下血中焦必虛而痰飲留伏顯然議治其飲桂枝湯去甘草加杏仁茯苓苡仁糖炒石膏某太陽經氣不開小水不利下肢腫浮漸上著枕氣塞欲坐濁飲上干竟有坐臥不安之象醫者但以肺病刻治於理未合急用小青龍法使膀胱之氣無阻礙濁飲痰氣自無逆沖之患矣桂枝杏仁乾薑五味半夏茯苓章伏飲陰濁上干因春地氣主升而發嘔吐不飢自然脾胃受傷六君子宣補方法未嘗不妙今診得吸氣甚微小溲晨通暮癃足跗浮腫其腑中之氣開闔失司最慮中滿夫太陽司開陽明司闔濁陰瀰漫通腑即是通陽仿仲景開太陽一法牡蠣澤瀉防己茯苓五味乾薑張二七嗆喘哮坐不得臥神迷如呆氣降則清水寒飲邪上衝膻中用逐飲開濁法寒飲濁邪上衝膻中薑汁炒南星薑汁炙白附子茯苓桂枝炙草石菖蒲某三四咳緩痰少脘中不爽肌腠瘙癢皆濕邪未盡痰飲竊踞之象當用六安法肺胃濕痰杏仁白芥子炒半夏茯苓淡乾薑橘紅王當年陽虛濁飲上泛喘急用真武湯丸而效因平素嗜酒少谷中虛濕聚熱蘊蒸痰目黃齦血未可為實熱論治議方用外臺茯苓飲減甘草佐以微苦清滲理其濕熱以酒客忌甜故也中虛濕熱茯苓四兩人參二兩苡仁四兩枳實一兩半夏二兩廣皮二兩金石斛八兩煮汁為丸汪面色鮮明脘中漾漾欲嘔因鬱勃熱氣蒸為痰飲宜暫緩參朮務清中焦熱痰中焦痰熱杏仁枳實汁橘紅栝蔞皮鬱金半夏曲桔梗黑梔皮張氏痰飲挾燥咳喉中癢痰飲挾燥杏仁花粉茯苓象貝母橘紅半夏曲陳嫗痰飲挾氣火上踞脘痞脹不爽宜理氣熱氣火不降半夏茯苓栝蔞皮黑梔皮橘紅鬱金某脈弦右澀面亮舌白口乾不喜飲頭重岑岑然胸脘痹塞而痛得噯氣稍舒酒客谷少中虛痰飲聚蓄當此夏令地氣上升飲邪挾氣上阻清空遂令前症之來金匱云脈弦為飲色鮮明者為留飲口乾不欲飲水者此為飲邪未去故也況漐漐汗出豈是風寒春夏溫邪辛溫發散為大禁自云身體空飄年已六旬又四辛散再泄其陽不亦左乎半夏薑汁川連吳萸茯苓枳實竹瀝潘三八遠客路途風寒外受熱氣內蒸痰飲日聚於臟之外絡脈之中凡遇風冷或曝烈日或勞碌形體心事不寧擾動絡中宿飲飲泛氣逆咳嗽氣塞喉底胸膈不思食物著枕嗆吐稠痰氣降自愈病名哮喘伏飲治之得宜除根不速到老年歲仍受其纍耳哮喘伏飲小青龍湯去細辛童五六背寒短氣背痛映心貫脅入腰食粥噫氣脘痞瀉出黃沫飲邪伏濕乃陽傷竊發此溫經通絡為要緩用人參飲伏經絡川桂枝生白朮炒黑蜀漆炮黑川烏厚朴茯苓葉四十脈右弦舌黃不渴當心似阻昔形壯今漸瘦咳久不已臥著則咳痰出稍安此清陽少旋支脈結飲議通上焦之陽胸次清陽少旋支脈結飲鮮薤白栝蔞皮半夏茯苓川桂枝薑汁楊頭中冷痛食入不消筋脈中常似掣痛此皆陽微不主流行痰飲日多氣隧日結致四末時冷先以微通胸中之陽干薤白桂枝半夏茯苓栝蔞皮薑汁又微通其陽已效痰飲阻氣用茯苓飲去廣皮加薑汁程三三支脈聚飲寒月喘甚初因寒濕而得故食辛稍安支脈結飲杏仁半夏厚朴苡仁茯苓薑汁法丸趙支飲脅痛咳逆小青龍去麻辛汪氏支脈結飲阻氣喘脹入脅則痛厥逆為眩茯苓桂枝半夏杏仁鬱金糖炒石膏黃支脈結飲發必喘急病發用桂枝茯苓五味炙草馮懸飲流入胃中令人痠痛湧噫酸水當辛通其陽以驅飲懸飲桂枝木半夏茯苓炒黑川椒薑汁又照前方加淡附子施診脈右虛左小弦面色黃少華採左脅肋痛五六年未愈凡久恙必入絡絡主血藥不宜剛病屬內傷勿事膩補録仲景旋覆花湯加柏子仁歸鬚桃仁又初服旋覆花湯未應另更醫謂是營虛用參歸熟地桂芍炙草服後大痛醫又轉方用金鈴半夏桃仁延胡茯苓服之大吐大痛復延余治余再議方謂肝絡久病懸飲流入胃絡致痛不已議太陽陽明開闔方法人參茯苓炙草桂枝煨姜南棗服苦藥痛嘔可知胃虛以參苓闔陽明用草桂開太陽並辛香入絡用薑棗通營衛生薑恐伐肝故取煨以護元氣而微開飲氣也又前方服之痛止議丸方人參半夏川椒茯苓桂枝煨姜南棗湯丸某夏季陽氣大升痰多嗆咳甚至夜不得臥穀味皆變大便或溏或祕診脈右大而弦議以懸飲流入胃絡用開闔導飲法人參茯苓桂枝炙草煨姜南棗又早診脈兩手皆弦右偏大凡痰氣上湧咳逆愈甚日來小溲少下焦微腫議通太陽以撤飲邪人參茯苓桂枝炙草五味乾薑又脈弦略數不渴不思飲此飲濁未去清陽不主運行前方甘溫主乎開闔能令胃喜次法開太陽以撤飲邪亦主陽通據自述心下胃口若物阻呆滯其濁錮陽微大著其治咳滋陰適為陰濁橫幟矣議用大半夏湯法大半夏湯加炒黑川椒內經止有積飲之說本無痰飲之名兩漢以前謂之淡飲仲景始分痰飲因有痰飲懸飲溢飲支飲之義而立大小青龍半夏苓桂術甘腎氣等湯以及內飲外飲諸法可謂闡發前賢獨超千古與後人所立風痰濕痰熱痰酒痰食痰之法迥異總之痰飲之作必由元氣虧乏及陰盛陽衰而起以致津液凝滯不能輸布留於胸中水之清者悉變為濁水積陰則為飲飲凝陽則為痰若果真元充足胃強脾健則飲食不失其度運行不停其機何痰飲之有故仲景云病痰飲者當以溫藥和之乃後人不知痰飲之義妄用滾痰丸茯苓丸消痰破氣或滋填膩補等法大傷脾胃堆砌助濁其於仲景痰飲之法豈不大相乖謬乎然痰與飲雖為同類而實有陰陽之別陽盛陰虛則水氣凝而為痰陰盛陽虛則水氣溢而為飲故王晉三先生取仲景之小半夏茯苓及外臺飲三湯從脾胃二經分痰飲立治法而先生又取仲景之苓桂術甘外臺茯苓飲腎氣丸真武湯分內飲外飲治法而於痰飲之症無遺蘊矣愚歷考先生治痰飲之法則又有不止於此者然而病變有不同治法亦有異如脾腎陽虛膀胱氣化不通者取仲景之苓桂朮甘湯茯苓飲腎氣真武等法以理陽通陽及固下益腎轉旋運脾為主如外寒引動宿飲上逆及膀胱氣化不通飲逆肺氣不降者以小青龍合越婢等法開太陽膀胱為主如飲邪伏於經絡及中虛濕熱成痰者則有川烏蜀漆之溫經通絡外臺茯苓飲去甘草少佐苦辛清滲理濕之法其飲邪上衝膻中及懸飲流入胃中而為病者又有姜附南星菖蒲旋覆川椒等驅飲開濁辛通陽氣等法絲絲入扣一以貫之病情治法胸有成竹矣非深於得道者其孰能之鄒滋九
