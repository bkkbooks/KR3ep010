body:
  text: 卷四積聚葛嗔怒強食肝木犯土腹痛突如有形緩則泯然無跡氣下鳴響皆木火餘威乃瘕疝之屬攻伐消導必變腹滿以虛中挾滯最難速功近日痛瀉恐延秋痢木犯土虛中挾滯丁香厚朴茯苓炒白芍廣皮煨益智仁又下午倦甚暮夜痛發陽微陰濁乃踞用溫通陽明法人參吳萸半夏薑汁茯苓炒白芍又照前方去白芍加川楝牡蠣白十四瘧邪久留結聚血分成形仲景有緩攻通絡方法可宗但瘧母必在脅下以少陽厥陰表裡為病今脈弦大面色黃滯腹大青筋皆露頸脈震動純是脾胃受傷積聚內起氣分受病痞滿勢成與瘧母邪結血分又屬兩途經年病久正氣已怯觀東垣五積必疏補兩施蓋緩攻為宜脾胃傷氣分結痞生於術雞肫皮川連厚朴新會皮姜渣水法丸馬三二病後食物失和腸中變化傳導失職氣滯釀濕鬱而成熱六腑滯濁為之聚昔潔古東垣輩於腸胃宿病每取丸劑緩攻當仿之氣滯濕熱腑聚川連蘆薈箬葉上炙雞肫皮不落水去垢新瓦上炙脆煨木香小青皮萊蔔子南山楂紫厚朴蒸餅為小丸陳十八濕勝脾胃食物不化向有聚積腸腑不通熱氣固郁當進和中忌口勿勞不致變病濕熱食滯黃芩枳實廣皮萊蔔子白芍白朮蒼朮雞肫皮水泛丸吳三一右脅有形高突按之無痛此屬瘕痞非若氣聚凝痰難以推求然病久僅阻在脈須佐針刺宣通正在伏天宜商痰凝脈絡真蛤粉白芥子栝蔞皮黑梔皮半夏鬱金橘紅姜皮曹著而不移是為陰邪聚絡診脈弦緩難以五積肥氣攻治大旨以辛溫入血絡治之脈絡凝痹當歸鬚延胡官桂橘核韭白王三七騎射馳驟寒暑勞形皆令陽氣受傷三年來右胸脅形高微突初病脹痛無形久則形堅似梗是初為氣結在經久則血傷入絡蓋經絡繫於臟腑外廓猶堪勉強支撐但氣鈍血滯日漸瘀痹而延癥瘕怒勞努力氣血交亂病必旋發故寒溫消克理氣逐血總之未能講究絡病工夫考仲景於勞傷血痹諸法其通絡方法每取蟲蟻迅速飛走諸靈俾飛者升走者降血無凝著氣可宣通與攻積除堅徒入臟腑者有間録法備參末議蜣螂蟲䗪蟲當歸鬚桃仁川鬱金川芎生香附煨木香生牡蠣夏枯草用大酒麴末二兩加水稀糊丸無灰酒送三錢某伏梁病在絡日後當血凝之慮脈數左大是其徵也伏梁厚朴一錢青皮八分當歸一錢鬱金一錢益母草三錢茯苓一錢澤瀉一錢某脈數堅伏梁病在絡宜氣血分消桃仁三錢炒研鬱金一錢茺蔚子一錢枳實七分厚朴一錢茯苓三錢通草五分自難經分出積者陰氣也五臟所生聚者陽氣也六腑所成後巢氏病源另立癥瘕之名以不動者為癥動者為瘕究之亦即難經積聚之意也前賢有云積聚者就其肓膜結聚之處以經脈所過部分屬臟者為陰陰主靜靜則堅而不移屬腑者為陽陽主動動則移而不定故是案中又從而悟出云著而不移是為陰邪聚絡大旨以辛溫入血絡治之蓋陰主靜不移即主靜之根所以為陰也可容不移之陰邪者自必無陽動之氣以旋運之而必有陰靜之血以倚伏之所以必藉體陰用陽之品方能入陰出陽以施其辛散溫通之力也又云初為氣結在經久則血傷入絡輒仗蠕動之物松透病根是又先生化裁之妙於古人書引伸觸類而得若夫薈肫之去熱滯芥蛤之豁凝痰不過為先生用古處也案中積症第見伏梁不能盡備然宋時諸賢於五積九積治法載在書籍者頗多大略消補兼施並以所惡者攻所喜者誘爾業醫者自當知之稔也姚亦陶徐評積聚之症各殊治法亦迥別案中皆泛泛之方治積聚之法未及百分之一學者宜廣求之痞宋前議辛潤下氣以治肺痹謂上焦不行則下脘不通古稱痞悶都屬氣分之郁也兩番大便胸次稍舒而未為全爽此豈有形之滯乃氣鬱必熱陳腐黏凝膠聚故脘腹熱氣下注隱然微痛法當用仲景梔子豉湯解其陳腐鬱熱暮臥另進白金丸一錢蓋熱必生痰氣阻痰滯一湯一丸以有形無形之各異也痰熱內閉黑山梔香豉鬱金杏仁桃仁栝蔞皮降香另付白金丸五錢孫寒熱由四末以擾胃非藥從口入以擾胃邪熱津液互膠成痰氣不展舒阻痹脘中治法不但攻病前議停藥欲謬藥氣盡病自退避三舍耳人參川連鹽水炒枳實半夏鬱金石菖蒲某脈不清神煩倦中痞噁心乃熱邪里結進瀉心法熱邪里結炒半夏黃芩黃連乾薑枳實杏仁劉熱氣痞結非因食滯胃汁消爍舌乾便難苦辛開氣酸苦泄熱是治法矣川連生薑人參枳實橘紅烏梅生白芍顧氣閉久則氣結不飢不食不大便氣閉化熱川貝母白蔻仁鬱金杏仁金銀花緑豆殼又氣結必化熱乃無形之病故徒補無益鮮省頭草川斛甜杏仁川貝母麻仁何三七煩勞之人衛氣少固霧露雨濕傷其流行清肅瘡痍外涸脘脅反痹乃經脈為病無關腑臟鉤藤生白蒺鬱金白蔻仁桑葉橘紅又氣窒熱鬱仍治上可以通痹杏仁鬱金香附栝蔞皮黑山梔蘇梗周寒熱嘔吐蛔蟲自利是暑濕熱外因因嗔怒動肝邪氣入於厥陰胸滿腹脹消渴議以開痞方法熱邪入厥陰瀉心湯去參甘加枳實白芍伊因驚而得邪遂入肝故厥後熱神識昏狂視得面青舌白微嘔渴飲胸次按之而痛此屬痞結乃在裡之症宗仲景以瀉心湯為法川連半夏乾薑黃芩人參枳實尤面垢油亮目眥黃頭脹如束胸脘痞悶此暑濕熱氣內伏因勞倦正氣泄越而發既非暴受風寒發散取汗徒傷陽氣按脈形濡澀豈是表症凡傷寒必究六經伏氣須明三焦論症參脈壯年已非有餘之質當以勞倦傷伏邪例診治暑濕伏邪夾食滑石黃芩厚朴醋炒半夏杏仁蔻仁竹葉又胸痞自利狀如結胸夫食滯在胃而胸中清氣悉為濕濁阻遏與食滯兩途此清解三焦卻邪湯藥兼進保和丸消導淡黃芩川連淡乾薑厚朴醋炒半夏鬱金白蔻仁滑石送保和丸三錢談氏胸痞不飢熱不止舌白而渴此暑邪未盡仍清氣分暑邪阻氣鮮竹茹淡黃芩知母橘紅鹽水炒滑石桔梗枳殼汁鬱金汁某四一惡寒泄瀉悉減胸脘仍悶余暑未盡胃氣未蘇故耳大麥仁四錢佩蘭葉三錢新會皮一錢半夏曲炒一錢半金斛一錢半茯苓三錢劉濕熱非苦辛寒不解體豐陽氣不足論體攻病為是胸中痞悶不食議治在胃濕熱傷胃川連炒半夏人參枳實薑汁茯苓橘紅邱脈濡而緩不飢不食時令之濕與水穀相併氣阻不行欲作痞結但體質陽微開泄宜輕濕阻氣分炒半夏茯苓杏仁鬱金橘紅白蔻仁某三六舌白脘痛嘔惡腹鳴此濕阻氣分胃痹成痛是不通之象炒半夏三錢高良薑一錢廣藿香一錢橘紅一錢烏藥一錢香附一錢半沈二四精氣內損是皆臟病萸地甘酸未為背謬緣清陽先傷於上柔陰之藥反礙陽氣之旋運食減中痞顯然明白病人食姜稍舒者得辛以助陽之用也至於黃耆麥冬棗仁更蒙上焦斯為背謬極議辛甘理陽可效中陽不運桂枝湯去芍加茯苓汪脈沉中脘不爽肢冷人參七分淡乾薑一錢炒半夏一錢半川熟附七分茯苓三錢草果仁八分朱嫗目垂氣短脘痞不食太陰脾陽不運氣滯痰阻擬用大半夏湯人參炒半夏茯苓伽楠香汁又脈微有歇無神倦欲寐服大半夏湯脘痛不安不耐辛通營液大虛春節在邇恐防衰脫人參炒麥冬北五味某舌白脘悶中焦陽氣不宣半夏草果厚朴廣皮茯苓藿香梗張五二胃寒湧涎中痞胃寒泡淡吳萸乾薑茯苓半夏橘紅川楝子平酒客脾胃陽微下午陰氣漸漫脘中微痛不飢服苦降重墜辛燥愈加不適者清陽再受傷觸也宗仲景聖訓以轉旋胸次之陽為法胸次清陽不運苓桂朮甘湯某氣阻脘痹飲下作痛當開上焦肺氣不降胸脘痹阻枇杷葉大杏仁蘇子降香汁白蔻仁橘紅張脈澀脘痞不飢口乾有痰當清理上焦枇杷葉杏仁山梔香豆豉鬱金栝蔞皮加薑汁炒竹茹陳三四食進頗逸而胸中未覺清曠宜辛潤以理氣分勿以燥藥傷陰枇杷葉大杏仁橘紅黑山梔香豉鬱金栝蔞皮晨服五劑後接服桑麻丸楊瘧母用針是泄肝膽結邪瘦人瘧熱傷陰夢遺五心煩熱亦近理有諸繼患脘膈痞悶不飢食減大便不爽乃氣滯於上與前病兩歧焉得用滋陰凝滯之藥思必病後飲食無忌中焦清濁不和所致杏仁土栝蔞桔梗半夏黑山梔枳實香附汁俞女脘痹身熱當開氣分杏仁栝蔞皮枇杷葉廣皮枳殼汁桔梗王四三勞傷胃痛明是陽傷錯認箭風釣藥敷貼更服丸藥心下堅實按之痛舌白煩渴二便澀少喘急不得進食從痞結論治寒熱客邪互結生薑汁生淡乾薑泡淡黃芩枳實薑汁炒川連半夏案中六淫外侵用仲景瀉心湯脾胃內傷用仲景苓薑桂甘法即遵古賢治痞之以苦為泄辛甘為散二法其於邪傷津液者用辛苦開泄而必資酸味以助之於上焦不舒者既有枳桔杏蔞開降而又用梔豉除熱化腐疏暢清陽之氣是又從古人有形至無形論內化出妙用若所用保和化食白金驅痰附姜暖中參苓養胃生脈斂液總在臨症視其陰陽虛實靈機應變耳姚亦陶徐評痞有二義痞結成形之痞是病胸膈痞滿是症痞結之痞即積聚之類另立一門亦可但痞滿之痞不拘何病皆有此症如何另立一門此非此老之故乃編書之不明也噎膈反胃吳脈小澀脘中隱痛嘔惡吞酸舌絳不多飲此高年陽氣結於上陰液衰於下為關格之漸當開痞通陽議治陽結於上陰衰於下關格川連人參薑汁半夏枳實汁竹瀝盧陰陽逆亂已成關格議用附子瀉心湯為上熱下寒主治徐七八老人食入涎湧吐痰略能咽粥二便艱少是陽不轉旋上結陰枯於下便難極難調治勿用腥油羶味脈弦大而搏議妙香丸又妙香丸仍服每五日服大半夏湯毛老年形消不食不便氣衝湧涎乃關格之症議用進退黃連湯川連淡乾薑半夏薑汁人參茯苓附子生白芍濮七十七旬有年納食脘脹大便乾澀並不渴飲痰氣凝遏阻陽久延關格最怕川連枇杷葉半夏薑汁杏仁枳殼杜六四老人積勞久虛因渴飲冷再傷胃陽洞泄復加嘔吐不受湯飲食物上不得入下不得出此為關格難治人參半夏川連淡乾薑某清陽日結腹窄不能納穀陰液漸涸腸失潤大便難桂枝川連半夏薑汁杏仁茯苓畢五四夏間診視曾說難愈之疴然此病乃積勞傷陽年歲未老精神已竭古稱噎膈反胃都因陰枯而陽結也秋分後復診兩脈生氣日索交早咽燥晝日溺少五液告涸難任剛燥陽藥是病諒非醫藥能愈大半夏湯加黃連薑汁某脈寸口搏大按之則澀形瘦氣逆上不納食下不通便老年積勞內傷陽結不行致脘閉陰枯腑乏津營必二便交阻病名關格為難治人參枳實川連生乾薑半夏茯苓蘇五四向來翻胃原可撐持秋季驟加驚憂厥陽陡升莫制遂廢食不便消渴不已如心熱嘔吐涎沫五味中喜食酸甘肝陰胃汁枯槁殆盡難任燥藥通關胃屬陽土宜涼宜潤肝為剛臟宜柔宜和酸甘兩濟其陰肝陰胃汁枯烏梅肉人參鮮生地阿膠麥冬汁生白芍某陽明汁幹成膈梨汁柿霜玉竹天冬麥冬甜杏仁川貝生白芍三角胡麻王五三老年血氣漸衰必得數日大便通爽然後脘中納食無阻此胃汁漸枯已少胃氣下行之旨噎症萌矣病乃操持太過身中三陽燔燥爍津所致故藥餌未能全功議用丹溪法煩勞陽亢肺胃津液枯麥冬汁鮮生地汁柏子仁汁甜杏仁什黑芝麻汁杜蘇子汁松子仁漿水浸布紙絞汁濾清燉自然膏馬六十勞心勞力經營向老自衰平日服餌桂附生薑三十年病食噎不下膈吐出此在上焦之氣不化津液不注於下初病大便艱澀按經云味過辛熱肝陽有餘肺津胃液皆奪為上燥仿嘉言清燥法麥冬麻仁鮮生地甜水梨桑葉石膏生甘草某脈澀左大食入為噎是屬液虧先宜理氣後用潤劑液虧氣滯半夏雲茯苓枇杷葉枳實竹瀝程舌黃微渴痰多咳逆食下欲噎病在肺胃高年姑以輕劑清降肺胃氣不降鮮枇杷葉杏仁鬱金栝蔞皮山梔淡香豉沈格拒食物涎沫逆氣自左上升此老年悒鬱所致必使腑通濁泄僅可延年議兩通陽明厥陰之法肝鬱氣逆半夏苦杏仁茯苓橘紅竹瀝薑汁俞酒熱鬱傷脘中食阻而痛治以苦辛寒酒熱鬱傷肺胃小川連半夏香豉枳實茯苓薑汁又苦辛化燥噎阻不舒而大便不爽治手太陰鮮枇杷葉紫菀蘇子杏仁桃仁鬱金某憂思鬱結凝痰阻礙已屬噎塞之象當怡情善調憂鬱痰阻炒半夏一錢半茯苓五錢秫米三錢枳實一錢炒薑汁三小匙沖楊四七脈弦而小澀食入脘痛格拒必吐清涎然後再納視色蒼眼筋紅黃昔肥今瘦云是鬱怒之傷少火皆變壯火氣滯痰聚日擁清陽莫展脘管窄隘不能食物噎膈漸至矣法當苦以降之辛以通之佐以利痰清膈莫以豆蔻沉香劫津可也川黃連杏仁桔梗土栝蔞皮半夏橘紅竹瀝薑汁朱五二未老形衰納穀最少久有心下忽痛略進湯飲不安近來常吐清水是胃陽日薄噎膈須防議用大半夏湯補腑為宜胃陽虛人參半夏茯苓白香粳米薑汁河水煎白五六少食頗安過飽食不肯下間有冷膩涎沫湧吐而出此有年胃陽久餒最多噎膈反胃之慮飲以熱酒脘中似乎快爽顯然陽微欲結所幸二便仍通濁尚下泄猶可望安熟半夏姜水炒二兩茯苓二兩生益智仁一兩丁香皮五錢新會皮一兩淡乾薑一兩上藥淨末分量用香淡豆豉一兩洗淨煎汁法丸淡薑湯服三錢呂六十勞倦飢飽皆傷胃陽年及花甲最慮噎膈翻胃此面飯酒肉重濁之物與病不合半夏薑汁香豉土栝蔞皮杏仁橘紅馮六七有年陽微酒濕厚味釀痰阻氣遂令胃失下行為順之旨脘窄不能納物二便如昔病在上中議以苦降辛通佐以養胃用大半夏湯半夏人參茯苓薑汁川連枳實又胃屬腑陽以通為補見症脘中窒塞納食不易過膈膚淺見識以白豆蔻木香沉香麝冀獲速功不知老人日衰愈投泄氣斯沖和再無復振之理故云岐子九法後賢立辨其非夏季宜用外臺茯苓飲加菖蒲佐以竹瀝薑汁辛滑可矣顧四十脈濡緩無力中年胸脅時痛繼以早食晚吐此屬反胃乃胃中無陽濁陰腐壅議仿仲景陽明辛熱宣通例吳萸半夏蓽茇淡乾薑茯苓又辛熱開濁吐減行走勞力即吐痰水食物陽氣傷也用吳萸理中湯尤脈緩右關弦知飢惡食食入即吐肢浮便溏溺少不渴飲此胃陽衰微開合之機已廢老年噎膈反胃乃大症也人參茯苓淡附子淡乾薑炒粳米薑汁又通胃陽法服腑病原無所補只以老年積勞傷陽之質所服之劑開肺即是泄氣芩連苦寒劫陽薑汁與乾薑附子並用三焦之陽皆通耳若枳朴仍是泄氣與前義悖矣人參茯苓淡附子淡乾薑劉五四脈左小弦右濡澀五旬又四陰陽日衰勞煩奔走陽愈傷致清氣欲結食入脘痛痰涎湧逆皆噎膈反胃見症其飲酒愈甚由正氣先餒非酒能致病川連枳實汁茯苓半夏廣皮白黑山梔薑汁竹瀝包六十胸脘痞悶噯逆三四日必嘔吐黏膩或黃緑水液此屬反胃六旬有年是亦重病川連半夏枳實鬱金竹茹薑汁陸脈沉微陽氣大傷陰濁僭踞旦食不能暮食周身掣痛背脹病狀著難愈之症陽虛陰濁凝滯人參附子乾薑茯苓澤瀉姚六二腑陽不通降濁壅為反胃纍遭病反老年難以恢復自能潛心安養望其悠久而已藥不能愈是病矣人參附子乾薑公丁香薑汁和丸某積勞有年陽氣漸衰濁凝瘀阻脘中常痛怕成噎膈便塞之症陽衰脘痹血瘀桃仁紅花延胡川楝子半夏橘紅鬱金汁栝蔞皮李兩關脈緩澀食入氣阻吐涎稍通前已吐過瘀濁膠黏此皆久積勞倦陽氣不主旋運為噎膈反胃之症此病最多反復必須身心安逸方可卻病徒藥無益耳半夏薑汁桃仁韭白汁香豉栝蔞皮鬱金某胃痛得瘀血去而減兩三年宿病復起食進痞悶怕其清陽結而成膈大意益氣佐通仍兼血絡為治人參半夏茯苓新會皮木香生益智當歸桃仁水法丸服三錢張三三早食暮吐大便不爽病在中下初因勞傷胃痛痰瘀有形之阻半夏枳實製大黃桃仁韭白汁經云三陽結謂之膈又云一陽發病其傳為膈仲景云朝食暮吐暮食朝吐宿穀不化名曰胃反丹溪謂噎膈反胃名雖不同病出一體多因氣血兩虛而成然歷觀噎膈反胃之因實有不同大抵飲食之際氣忽阻塞飲食原可下咽如有物梗塞之狀者名曰噎心下格拒飢不能食或食到喉間不能下咽者名曰膈食下良久復出或隔宿吐出者名曰反胃夫噎膈一症多因喜怒悲憂恐五志過極或縱情嗜欲或恣意酒食以致陽氣內結陰血內枯而成治宜調養心脾以舒結氣填精益血以滋枯燥夫反胃乃胃中無陽不能容受食物命門火衰不能熏蒸脾土以致飲食入胃不能運化而為朝食暮吐暮食朝吐治宜益火之源以消陰翳補土通陽以溫脾胃故先生於噎膈反胃各為立法以治之其陽結於上陰虧於下而為噎膈者用通陽開痞通補胃腑以及進退黃連附子瀉心諸法上熱下寒為治其肝陰胃汁枯槁及煩勞陽亢肺胃津液枯而成噎膈者用酸甘濟陰及潤燥清燥為主其液虧氣滯及陽衰血瘀而成噎膈者用理氣逐瘀兼通血絡為主其胃陽虛而為噎膈反胃及憂鬱痰阻而成者用通補胃腑辛熱開濁以及苦降辛通佐以利痰清膈為主其肝鬱氣逆而為噎膈者兩通厥陰陽明為治其酒熱鬱傷肺胃氣不降而為噎膈者用輕劑清降及苦辛寒開肺為主而先生於噎膈反胃治法可謂無遺蘊矣張景嶽云治噎膈大法當以脾腎為主其理甚通當宗之又有飲膈熱膈及憂氣恚食寒之膈其主治各載本門茲不復贅鄒滋九是證每因血枯氣衰致此凡香燥消澀之藥久在禁內案中雖有一二仿用辛熱而亦必諦審其為陽微濁踞者其餘或苦辛泄滯而兼潤養或酸甘化液而直滋清或鬱悶於氣分而推揚穀氣或勞傷於血分而宣通瘀濁總以調化機關和潤血脈為主陽氣結於上陰液衰於下二語實為證之確切論也姚亦陶徐評果系膈症百無一生不必言治若反胃則古人自有主方不得泛用通治之品此老尚未明也案中多用人參其意以為不食胃虛不可不用參以補其精氣不知噎膈之症必有瘀血頑痰逆氣阻膈胃氣其已成者百無一治其未成者用消瘀去痰降氣之藥或可望其通利若用人參雖或一時精氣稍旺而病根益深永無愈期矣噫噯王二二初用辛通見效多服不應想雨濕泛潮都是濁陰上加致胃陽更困仿仲景胃中虛客氣上逆噫氣不除例胃虛客氣上逆人參旋覆花代赭石半夏茯苓乾薑某味淡嘔惡噯氣胃虛濁逆白旋覆花釘頭代赭炒黃半夏薑汁人參茯苓汪三十壯年飲酒聚濕脾陽受傷已久積勞飢飽亦令傷陽遂食入反出噫氣不爽格拒在乎中焦總以溫通鎮逆為例白旋覆花釘頭代赭茯苓半夏淡附子淡乾薑徐噫氣不爽食後甚脾肺郁杏仁半夏曲橘紅厚朴鬱金桔梗陳二十多噎胸膈不爽胃陽弱宜薄味胃陽虛生白朮茯苓新會皮半夏曲益智仁厚朴生薑某噯氣腹微痛脾胃未和脾胃不和人參焦白芍茯苓炙甘草內經止有噫字而無噯字故經云五氣所病心為噫又云寒氣客於胃厥逆從下上散復出於胃故為噫夫噫噯一症或傷寒病後及大病後多有此症蓋以汗吐下後大邪雖解胃氣弱而不和三焦因以失職故清無所歸而不升濁無所納而不降是以邪氣留連噯酸作飽胸膈不爽而為心下痞硬噫氣不除乃胃陽虛而為陰所格阻陽足則充周流動不足則膠固格阻矣仲景立旋覆代赭湯用人參甘草養正補虛薑棗以和脾養胃所以安定中州者至矣更以旋覆花之力旋轉於上使陰中格阻之陽升而上達又用代赭石之重鎮墜於下使戀陽留滯之陰降而下達然後參甘大棗可施其補虛之功而生薑半夏可奏其開痞之效而前賢治噫噯一症無出仲景右矣故先生於胃虛客氣上逆及胃陽虛脾胃不和肺氣不降而為噫噯者每宗仲景法加減出入或加杏仁桔梗以開肺智仁朴術以散滿甘草白芍以和胃靡不應手取愈可謂得仲景心法矣鄒時乘嘔吐高四四咽阻吞酸痞脹食入嘔吐此肝陽犯胃用苦辛泄降肝犯胃吳萸川連川楝子杏仁茯苓半夏厚朴錢三七脈細右堅大向有氣衝長夏土旺嘔吐不納食頭脹脘痹無非厥陽上冒議用苦辛降逆酸苦泄熱不加嗔怒胃和可愈川連半夏薑汁川楝子皮烏梅廣皮白金四三脈細小而弦風木乘土當春勢張食入不變嘔吐得小便通少緩治以通陽炮附子人參半夏吳萸淡姜茯苓又脈右弦澀陽微陰凝食入則吐胃痛脹甚半月前用藥得效後反大便欲解不通腑陽不利濁乃上攻先用玉壺丹七分四服蔣三二脈沉食入嘔吐忌冷滯食物吳萸半夏薑汁茯苓公丁香柄廣皮白顧脈濡弱左脅下久有聚氣納食釀積於胃脘之中兩三日嘔噫吞酸積物上湧吐出此皆怫怒動肝肝木犯胃胃中陽傷不能傳及小腸遂變化失司每七八日始一更衣為胃氣不主下行故也法當溫胃陽制肝逆宿病糾纏恐多反復淡附子淡乾薑薑汁生白芍淡吳萸白粳米朱胃中不和食入嘔吐怒動而病必先制肝溫膽合左金為宜去甘草茯苓加薑汁某氣自左升腹中膨滿嘔吐涎沫黃水暴咳不已是肝氣逆乘過胃犯肺當制肝和胃安蛔丸某嘔黑緑苦水顯屬下焦濁邪犯胃人參川椒烏梅茯苓紫石英桑螵蛸沈食過逾時漾漾湧涎欲吐診脈濡澀以胃虛肝乘宗仲景旋覆代赭法旋覆花代赭石人參半夏茯苓廣皮王四五肝病犯胃嘔逆口吐清涎頭暈乳房痛肢麻痹人參二兩茯苓二兩桂枝木七錢生川楝子一兩蒸川連鹽水炒七錢烏梅一兩半當歸一兩半生白芍一兩半某冷濕傷胃肝木上侮沖氣欲嘔腹痛淡吳萸厚朴草蔻藿香梗木瓜茯苓毛嫗因驚肝氣上犯沖逆嘔吐涎陽升至巔為頭痛脈右弱左弦當從厥陰陽明治人參川連茯苓川楝川椒烏梅乾薑生白芍某脈弦虛食已漾漾欲吐咽阻中痞有痰人參吳萸茯苓半夏廣皮薑汁陸鼻明湯水下咽嘔吐右脈小欲歇明是勞傷肝乘胃反小半夏湯加檀香泥炒白粳米顏氏乾嘔脅痛因惱怒而病是厥陰侵侮陽明脈虛不食當與通補大半夏湯加薑汁桂枝南棗某肥膩滯胃肝木始得再乘土位致氣逆上壅嘔出久病至節反劇最屬不宜總是調攝未盡善奈何暫與降逆平肝安胃一法降香蘇子旋覆花茯苓半夏廣皮韭汁範脅痛入脘嘔吐黃濁水液因驚動肝肝風振起犯胃平昔液衰難用剛燥議養胃汁以熄風方人參炒半夏炒麥冬茯神廣皮白炒香白粳米又六味去萸換芍加麥冬阿膠秋石唐氏動氣肝逆痰性凝寒滯胃卒然大痛嘔涎乃逆滯上攻也治肝厥以通例炒黑川椒烏梅肉生乾薑川桂枝木人參白芍某積勞傷陽先已脘痛引背昨頻吐微眩脈弱汗出胃中已虛肝木來乘防有厄忒吐蛔仿仲景食入則嘔者吳茱萸湯主之吳萸半夏茯苓薑汁粳米王二四早上水飲米粥至晚吐出不化知濁陰酉戌升逆瘕形痛而漸大丸藥吐出不化胃陽乏極矣兩進平肝理氣不效法當辛熱開濁吳萸熟附子良薑川楝子茯苓草果某肝風犯胃嘔逆眩暈苦降酸泄和陽佐微辛以通胃川連黃芩烏梅白芍半夏薑汁李厥吐腹痛氣衝安胃丸王胃虛少谷肝來乘克嘔吐不能受納蓋臟厥象也人參川連附子黃芩乾薑枳實張氏勉強攻胎氣血受傷而為寒熱經脈乏氣而為身痛乃奇經衝任受病而陽維脈不用事也內經以陽維為病苦寒熱維者一身之剛維也既非外感羌蘇柴葛三陽互發世無是病又芩梔枳朴之屬辛散繼以苦寒未能中病胃日屢傷致湯飲皆噦出無餘大便不通已經半月其吐出形色青緑涎沫顯然肝風大動將胃口翻空而腸中汙水得風翔如浪決東西蕩漾矣熄風鎮胃固是定理但危篤若此不易圖也淮小麥百粒火麻仁一錢阿膠二錢生地二錢秋石拌人參一錢南棗肉一錢陳氏未病先有耳鳴眩暈恰值二之氣交是冬藏根蒂未固春升之氣泄越無以制伏更屬産後精氣未復又自乳耗血血去液虧真陰日損陽氣不交於陰變化內風上巔犯竅沖逆肆橫胃掀吐食攻腸為瀉襲走脈絡肌肉皆腫譬如諸門戶盡撤遂致暴風飄漾之狀醫者辛散苦降重墜不但病未曾理致陽更泄陰愈涸煩則震動即厥由二氣不能自主之義閲王先生安胃一法最為卓識所參拙見按以兩脈右手澀弱虛象昭然左脈空大按之不實亦非肝氣肝火有餘皆因氣味過辛散越致二氣造偏茲以病因大旨兼以經義酌方人參茯苓半夏白芍煨姜炒粳米周痛從少腹上衝為嘔為脹是厥陰穢濁致患厥陰濁逆韭白根淡吳萸小茴香桂枝木兩頭尖茯苓又炒橘核炙山甲末韭白歸尾川楝子延胡索小茴香徐四六氣衝偏左厥逆欲嘔嘔盡方適伏飲在於肝絡辛以通之吳萸泡淡八分半夏三錢茯苓塊三錢淡乾薑一錢代赭石三錢旋覆花二錢某脈搏肢冷嘔逆下痢白積生冷水寒鬱生陽氣上塞心大痛乃厥陰濁邪上攻吳萸丁香藿香川楝子木香廣皮茯苓褚二二清涎上湧食物吐出乃飢飽傷及胃中之陽禁鮮葷冷滑經年可安胃陽虛濁陰上逆半夏厚朴生益智薑汁生白朮茯苓宋三四陽微不運水穀悍氣聚濕致食入即嘔周身牽掣不和乃陽明之脈不用事也久延恐致腫脹苓薑朮桂湯加厚朴椒目陸十七食已即吐病在胃也用辛以通陽苦以清降半夏川連厚朴茯苓薑汁曹四七早食頗受晚食必胃痛嘔吐陽氣日微濁陰聚則有形夜痛至曉陰邪用事乃劇半夏薑汁淡乾薑秦椒厚朴茯苓王診脈右濡左弦舌白不飢瘀血上吐下瀉胃陽大傷藥餌下咽則湧前醫用大半夏湯不應詢知所吐皆系酸水痰沫議以理陽方法人參茯苓川椒乾薑潘十八食後吐出水液及不化米粒二便自通並不渴飲五年不愈宜理胃陽用仲景法熟附子半夏薑汁白粳米又泄濁陰劫水飲以安胃陽服四日腹脹吐水已減知陽腑之陽非通不闔再宗仲景法真武湯加人參範脈虛無神聞谷乾嘔汗出振寒此胃陽大虛不必因寒熱而攻邪人參茯苓炒半夏薑汁烏梅陳皮又脈微細小胃陽大衰以理中兼攝其下人參淡熟附子茯苓炒白粳米炒黃淡乾薑又人參茯苓乾薑煨益智仁廣皮生白芍金參藥不受皆濁陰在上阻塞氣機幾無法矣勉與白通湯加人尿豬膽汁急進以通陽泄濁附子生淡姜蔥白五寸人尿豬膽汁沈二九吹笛震動元海病治宜填實下焦但嗆食吐出又便溏不實中無砥柱陰藥下未受益中再受傷矣仿補益中宮仍佐鎮逆一法人參焦術炒焦半夏茯苓旋覆花代赭石吳寒熱邪氣擾中胃陽大傷酸濁上湧吐出脘痛如刺無非陽衰陰濁上僭致胃氣不得下行高年下元衰憊必得釜底暖蒸中宮得以流通擬用仲景附子瀉心湯通陽之中原可泄熱開導煎藥按法用之人參一錢半熟附子一錢半淡乾薑一錢三味另煎汁川連六分炒半夏一錢半枳實一錢茯苓三錢後四味用水一盞滾水一杯煎三十沸和入前三味藥汁服江脈弦遲湯水不下膈嘔吐涎沫此陽結飲邪阻氣議以辛熱通陽反佐苦寒利膈用瀉心法人參附子乾薑先煎一杯入薑汁四分川連黃芩半夏枳實滾水煎和入前藥服孫十四食物隨入即吐並不渴飲當年以苦辛得效三載不發今心下常痛如辣大便六七日始通議通膈上用生薑瀉心湯生薑汁四分調川連六分炒黃芩二錢泡十次熟半夏三錢炒枳實一錢人參五分同煎又問或不吐食物腹中腰膂似乎氣墜自長夏起心痛頭重至今未減思夏熱必兼濕在裡水穀之濕與外來之熱相洽結聚飲邪矣當緩攻之議用控涎丹五分間日一用某五二診脈左弦右弱食粥脘中有聲氣衝湧吐此肝木乘胃生陽已薄皆情懷不適所致大半夏湯某中焦火衰食下不運作酸嘔出中陽虛炒黃乾薑一錢川椒炒三分半夏一錢炒茯苓塊三錢炒飴糖四錢黃氏靈樞經云中氣不足溲便為變是崩淋泄瀉皆脾胃欲敗之現症今湯水下咽少頃傾囊湧出豈非胃陽無有失司納物乎奈何業醫者中懷疑惑但圖疲藥待其自安怕遭毀謗耳此症一投柔藥濁升填塞必致脹滿仲景於陽明滿實致慎攻下者恐以太陰之脹誤治耳今舌微紅微渴皆是津液不肯升揚脾弱不主散精四布世豈有面色如白紙尚不以陽氣為首重也耶人參熟於朮炙甘草炮姜茯神南棗張嘔吐脹悶虛中氣滯人參茯苓砂仁某氏脈微肢冷嘔吐清水食不下化帶下脊髀酸耎陽氣素虛産後奇脈不固急扶其陽用附子理中湯附子人參生白朮炮姜炙草又暖胃陽以劫水濕帶下自緩照前方加胡蘆巴又脈象稍和已得理中之效議用養營法養營去遠志黃耆五味即作丸方蔡嫗凡論病先論體質形色脈象以病乃外加於身也夫肌肉柔白屬氣虛外似豐溢里真大怯蓋陽虛之體為多濕多痰肌疏汗淋唇舌俱白乾嘔胸痞煩渴引飲由乎脾胃之陽傷觸邪得僭踞於中留蓄不解正衰邪熾試以脈之短澀無神論之陽衰邪伏顯然況寒涼不能攻熱清邪便是傷及胃陽之藥今杳不納穀大便漸稀若不急和胃氣無成法可遵所謂肥人之病慮虛其陽參擬一方仍候明眼採擇胃陽虛邪伏不食人參半夏生於術枳實茯苓生薑吳三六壯年形偉脈小濡惡聞穢氣食入嘔噦緣陽氣微弱濁陰類聚口鼻受汙濁異氣先入募原募原是胃絡分布上逆而為嘔吐此病理標者用芳香闢穢扶正氣治本以溫上通陽陽虛吸受穢濁氣藿香草果公丁香茯苓厚朴砂仁殼廣皮蓽茇又人參茯苓生益智胡蘆巴煨木香煨姜孫寒鬱化熱營衛氣窒遂發瘡痍食入即吐胃中熱灼當忌進腥油先用加味溫膽湯嘔傷胃中邪熱劫津鮮竹茹一錢半半夏一錢半金石斛三錢茯苓一錢半廣皮白一錢半枳實一錢薑汁一匙調吳兩番探吐脘痛立止氣固宣暢胃津未能無損風木來乘外冷裡熱診脈右大並不搏指當少少進谷以養胃多噫多下泄氣調和中焦為宜炒竹茹半夏川斛橘紅黑山梔香豉曹四三少腹屬肝肝厥必犯陽明胃腑故作痛嘔二年來病人已不知因何起病醫徒見病圖治想肝腎必自內傷為病久則奇經諸脈交傷經謂衝脈動而諸脈交動也議溫通柔潤劑從下焦虛損主治肝腎虛沖脈氣上逆淡蓯蓉干一錢半茯苓三錢當歸二錢杞子二錢炒沙苑一錢半肉桂心五分後加鹿角霜何寒熱嘔吐胸中格拒喜暖飲怕涼平昔胃陽最虛熱邪內結體虛邪實最防痙厥熱邪內結人參黃芩炒半夏薑汁川連枳實某舌赤濁嘔不寐不飢陽邪上擾治以苦辛進瀉心法淡黃芩川連炒半夏枳實薑汁某鬱熱阻飲痹嘔有年最慮噎膈半夏金斛薑汁茯苓杏仁廣皮白毛氏舊有胃痛脘痹嘔吐之病秋前舉發已得小安近痛嘔復來身體熇熱宿病未罷而暑熱穢氣上竅侵入三焦混淆恐內閉變現痙厥暑穢內結川連淡黃芩半夏薑汁黑山梔枳實汁某舌黃不渴飲久嗽欲嘔吐前用金匱麥門冬湯養胃小效自述背寒口吐清痰暑濕客邪未盡虛體當輔正醒脾卻暑人參茯苓廣皮半夏薑汁郭五八知飢能納忽有氣衝涎沫上湧脘中格拒不堪容物內經謂肝病吐涎沫丹溪云上升之氣自肝而出木火上凌柔金受克咳嗆日加治以養金制木使土宮無戕賊之害滋水制火令金髒得清化之權此皆老年積勞致傷豈攻病可效肝火刑金蘇子麥冬枇杷葉杏仁北沙參桑葉丹皮降香竹瀝曹四五勞倦嗔怒嘔吐身熱得汗熱解而氣急不寐不飢仍是氣分未清先以上焦主治以肺主一身氣化也杏仁鬱金山梔香豉橘紅栝蔞皮嘔吐症內經與金匱論之詳矣乃後人但以胃火胃寒痰食氣滯立論不思胃司納食主乎通降其所以不降而上逆嘔吐者皆由於肝氣衝逆阻胃之降而然也故靈樞經脈篇云足厥陰肝所生病者胸滿嘔逆況五行之生克木動則必犯土胃病治肝不過隔一之治此理淺近易明人乃不能察而好奇之輩反誇隔二隔三之治豈不見笑於大方也哉試觀安胃丸理中安蛔丸所用椒梅及胃虛客氣上逆之旋覆代赭此皆胃藥乎抑肝藥乎於此可省悟矣今觀先生之治法以泄肝安胃為綱領用藥以苦辛為主以酸佐之如肝犯胃而胃陽不衰有火者泄肝則用芩連楝之苦寒如胃陽衰者稍減苦寒用苦辛酸熱此其大旨也若肝陰胃汁皆虛肝風擾胃嘔吐者則以柔劑滋液養胃熄風鎮逆若胃陽虛濁陰上逆者用辛熱通之微佐苦降若但中陽虛而肝木不甚亢者專理胃陽或稍佐椒梅若因嘔傷寒鬱化熱劫灼胃津則用溫膽湯加減若久嘔延及肝腎皆虛沖氣上逆者用溫通柔潤之補下焦主治若熱邪內結則用瀉心法若肝火沖逆傷肺則用養金制木滋水制火總之治胃之法全在溫通虛則必用人參藥味皆屬和平至於治肝之法藥味錯雜或寒熱互用或苦辛酸鹹並投蓋因厥陰有相火內寄治法不得不然耳但觀仲景烏梅丸法概可知矣案輯六十有餘大半皆由肝邪為患非先生之卓識安能暢發此理乎哉華岫云徐評所録諸方屬蓄飲者四五屬反胃者二三反胃自有主治之法蓄飲亦有成方可用乃全不分別惟以治肝胃之藥參錯成方又用人參及姜附者七八皆與反胃蓄飲相反則嘔吐一症此老全未夢見也患諸病者亦大不幸矣洞庭有一金姓者患嘔吐症數年其先人與此老甚相契此老竭力治之年餘皆用此等方而病者幾殆因求治於余余曰蓄飲也世無知者為制一方其病立已其人因受業於余即此可徵矣吐蛔王厥陰吐蛔寒熱乾嘔心胸格拒舌黑渴不欲飲極重之症胃虛肝乘烏梅肉一錢半桂枝木一錢炒黑川椒四分白芍一錢小川連三分黃芩一錢生淡乾薑一錢席脈右歇舌白渴飲脘中痞熱多嘔逆稠痰曾吐蛔蟲此伏暑濕皆傷氣分邪自里發神欲昏冒濕邪不運自利黏痰議進瀉心法半夏瀉心湯又凡蛔蟲上下出者皆屬厥陰乘犯陽明內風入胃嘔吐痰涎濁沫如仲景厥陰篇中先厥後熱同例試論寒熱後全無汗解謂至陰伏邪既深焉能隔越諸經以達陽分閲醫藥方初用治肺胃後用溫膽茯苓飲但和胃治痰與深伏厥陰之邪未達前進瀉心湯苦可去濕辛以通痞仍在上中服後胸中稍舒逾時稍寐寐醒嘔吐濁痰有黃黑之形大凡色帶青黑必系胃底腸中逆湧而出老年衝脈既衰所謂衝脈動則諸脈皆逆自述嘔吐之時周身牽引直至足心其陰陽蹺維不得自固斷斷然矣仲景於半表半里之邪必用柴芩今上下格拒當以桂枝黃連湯為法參以厥陰引經為通里之使俾沖得緩繼進通補陽明此為治厥陰章旨淡乾薑桂枝川椒烏梅川連細辛茯苓又肝鬱不舒理進苦辛佐以酸味者恐其過剛也仿食谷則嘔例人參茯苓吳萸半夏川連烏梅又瘧來得汗陰分之邪已透陽經第痰嘔雖未減青緑形色亦不至最屬可喜舌心白苔未淨舌邊漸紅而神倦困憊清邪佐以輔正一定成法人參半夏茯苓枳實汁乾薑川連又食入欲嘔心中溫溫液液痰沫味鹹脊背上下引痛腎虛水液上泛為涎督脈不司約束議用真武撤其水寒之逆二服後接服人參半夏茯苓桂枝煨姜南棗又別後寒熱三次較之前發減半但身動言語氣衝湧痰吐逆四肢常冷寒熱汗出時四肢反熱此陽衰胃虛陰濁上乘以致清氣無以轉舒議以胃中虛客氣上逆為噫氣嘔吐者可與旋覆代赭湯仍佐通陽以制飲逆加白芍附子又鎮逆方雖小效究是強制之法凡痰飲都是濁陰所化陽氣不振勢必再熾仲景謂飲邪當以溫藥和之前方劫胃水以蘇陽亦是此意議用理中湯減甘草之守仍加姜附以通陽併入草果以醒脾二服後接用人參乾薑半夏生白朮附子生白芍王脈沉弦腹痛嘔吐鼻煤舌絳面帶青晦色夏秋伏暑發熱非冬月乃誤表禁食胃氣受傷致肝木上干胃土蛔蟲上出遂成重病常有厥逆之慮擬進泄肝和胃得痛止嘔緩冀有轉機川椒川連烏梅乾薑人參茯苓生白芍川楝子程大病後胃氣極傷肝木乘土蛔欲透膈脘脅陳痛是土衰木克古人以狐惑蟲厥都以胃虛少谷為訓安胃丸人參川椒烏梅湯化送二錢周三一兩脅痛尤甚於左嘔吐蛔蟲年前好食生米此飢飽加以怒勞胃土不和肝木來犯試觀幼稚有食米麥泥炭者皆里滯久聚初從濕熱鬱蒸而得宜和陽宣腑辛竄通絡濕去熱走腑絡自和川連乾薑桂枝金鈴子延胡蘆薈白芍枳實烏梅丸服三錢李身不壯熱二便頗通已非風寒停滯之病因驚動肝厥氣下泛蛔蟲上攻觸痛嘔吐清涎仲景云蛔蟲厥都從驚恐得之人參安蛔法又古人云上升吐蛔下降狐惑皆胃虛少谷肝臟厥氣上干耳既知胃中虛客氣上衝逆犯斯鎮逆安胃方是遵古治法人參代赭石烏梅肉川椒川楝子茯苓又人參茯苓炒當歸炒白芍桂心炙草煨姜南棗又忽然痛再發診脈微細恰值立夏之交正氣不相接續有復厥之慮人參桂枝木川楝子炒川椒生白芍烏梅肉川連細辛葉十七熱氣上閉耳聾身熱神識不清當清心營肺衛濕熱結於厥陰竹葉心飛滑石連翹川貝石菖蒲根生緑豆皮又暑濕熱內蒸吐蛔口渴耳聾川連水炒四分半夏一錢半枳實一錢廣皮白三錢菖蒲一錢半杏仁三錢又身熱三候不解胸痞入暮譫語耳聾吐蛔此熱結厥陰症勢最險川連黃芩乾薑枳實半夏薑汁茯苓菖蒲吐蛔本屬肝胃症因厥陰之邪上逆蛔不能安故從上而出也今所輯方案皆因客邪病而致吐蛔者雖有瀉心湯桂枝黃連湯安胃丸等然皆不離乎仲景之烏梅丸法以苦辛酸寒熱並用為治當與嘔吐門同參至於幼稚有吐蛔瀉蛔及諸蟲之病治標則有殺蟲之方治本則溫補脾胃或佐清疳熱前人各有成法不必重贅華玉堂徐評所列諸案大半皆嘔逆症並非蛔病其治吐蛔之方亦惟烏梅丸一方加減並無精思博識隨症立法其用人參雖本於烏梅丸之意而多不對症知此老於此病未深講也不食張脈虛緩不食不飢形寒浮腫胃陽虛人參生益智廣皮半夏曲茯苓生白芍煨姜楊氏胃傷惡食絡虛風動浮腫先與荷米煎人參新會皮檀香泥炒粳米炒荷葉蒂潘不飢不食假寐驚跳心營熱入胃汁全虧調攝十日可愈胃陰虛鮮生地麥冬知母竹葉心火麻仁銀花王熱損胃汁不欲食谷麥冬蜜炒知母地骨皮川貝母竹葉心嘉定花粉生甘草甜梨皮陸二一時病後脈弦而徑知飢不納胃氣未和當靜處調養鮮省頭草鮮蓮子茯神大麥仁川斛炒知母鄭四三脈濡無力唇赤舌乾微眩不飢不飽此天暖氣泄而煩勞再傷陽氣夫衛外之陽內應乎胃胃既逆則不納不飢矣炒麥冬木瓜烏梅肉川斛大麥仁某風濕氣痹不飢上焦濕熱阻氣杏仁滑石土蔞皮連翹橘紅鬱金翁二二夏季溫熱上受首先入肺河間主三焦極是今世醫者初用非發散即消食散則耗氣消則劫胃究竟熱蘊未除而胃汁與肺氣皆索故不飢不食不便上脘似格似阻酸濁之氣皆是熱化病延多日苦寒難以驟進先擬開提上焦氣分蘇子杏仁土栝蔞皮枇杷葉黃芩降香有胃氣則生無胃氣則死此百病之大綱也故諸病若能食者勢雖重而尚可挽救不能食者勢雖輕而必致延劇此理亦人所易曉也然有當禁食與不當禁食之兩途如傷寒之邪傳入陽明之腑胃有燥熱昏譫者有乾霍亂之上下不通或正值吐瀉之際或癍痧未達於表或瘟疫之邪客於募原或瘧邪交戰之時或初感六淫之邪發熱脘悶邪氣充塞瀰漫嘔惡痞脹不飢或傷食惡食等症此雖禁其穀食可也其餘一切諸症不食者當責之胃陽虛胃陰虛或濕熱阻氣或命門火衰其他散見諸門者甚多要知此症淡飲淡粥人皆惡之或辛或咸人所喜也或其人素好之物亦可酌而投之以醒胃氣惟酸膩甜濁不可進至於案中治法一覽可盡茲不重贅華玉堂腸痹張食進脘中難下大便氣塞不爽腸中收痛此為腸痹肺氣不開降大杏仁枇杷葉川鬱金土栝蔞皮山梔香豉夏二十食下䐜脹旬日得一更衣腸胃皆腑以通為用丹溪每治腸痹必開肺氣謂表裡相應治法杏仁紫菀冬葵子桑葉土栝蔞皮又腸痹開肺不效用更衣丸三錢吳身重不能轉移尻髀板著必得撫摩少安大便不通小溲短少不飢少飲此時序濕邪蒸郁化熱阻於氣分經腑氣隧皆阻病名濕痹木防己一錢杏仁二錢川桂枝一錢石膏三錢研桑葉一錢丹皮一錢又舌白不渴不飢大便經旬不解皮膚麻癢腹中鳴動皆風濕化熱阻遏氣分諸經脈絡皆閉昔丹溪謂腸痹宜開肺氣以宣通以氣通則濕熱自走仿此論治杏仁栝蔞皮鬱金枳殼汁山梔香豉紫菀沈二五濕結在氣二陽之痹丹溪每治在肺肺氣化則便自通紫菀杏仁枇杷葉土栝蔞皮鬱金山梔皮枳殼汁桔梗汁蔣三一肺痹鼻淵胸滿目痛便阻用辛潤自上宣下法紫菀杏仁栝蔞皮山梔香豉白蔻仁董高年瘧後內傷食物腑氣阻痹濁攻腹痛二便至今不通診脈右部弦搏渴思冷飲昔丹溪大小腸氣閉於下每每開提肺竅內經謂肺主一身氣化天氣降斯雲霧清而諸竅皆為通利若必以消食辛溫恐胃口再傷滋擾憂症聖人以真氣不可破泄老年當遵守紫菀杏仁栝蔞皮鬱金山梔香豉又舌赤咽乾陽明津衰但痰多不飢不食小溲不爽大便尚祕仿古人以九竅不利咸推胃中不和論治炒半夏竹茹枳實花粉橘紅薑汁葉女二便不通此陽痹當治在肺紫菀杏仁蔞皮鬱金黑山梔桔梗又威喜丸某疸瘧肺病未經清理致熱邪透入營中遂有瘀血暴下今診舌白不渴不能納食大便九日不通乃氣痹為結宗丹溪上竅閉則下竅不出矣杏仁枇杷葉栝蔞皮川鬱金香豉苡仁又用手太陰藥即思納穀陽明氣痹無疑紫菀杏仁枇杷葉栝蔞皮鬱金黑山梔腸痹本與便閉同類今另分一門者欲人知腑病治臟下病治上之法也蓋腸痹之便閉較之燥屎堅結欲便不通者稍緩故先生但開降上焦肺氣上竅開泄下竅自通矣若燥屎堅閉則有三承氣潤腸丸通幽湯及溫脾湯之類主之然余謂便閉之症傷寒門中當急下之條無幾余皆感六淫之邪病後而成者為多斯時胃氣未復元氣已虛若遽用下藥於理難進莫若外治之法為穩用蜜煎導法設不通爽虛者間二三日再導余見有漸導漸去燥糞五六枚或七八枚直至二旬以外第七次導去六十餘枚而愈者此所謂下不嫌遲也學者不可忽諸華玉堂便閉葉二十陽氣鬱勃腑失傳導納食中痞大便結燥調理少進酒肉堅凝以宣通腸胃中鬱熱可效大便閉鬱熱燥結川連蘆薈萊蔔子炒山楂廣皮川楝子山梔厚朴薑汁炒青皮又熱鬱氣阻三焦通法杏仁鬱金厚朴廣皮白蘆薈川楝子李四九診脈如前服鹹苦入陰大便仍祕澀針刺一次病無增減可謂沉錮之疾夫病著深遠平素飲酒厚味釀濕聚熱漬筋爍骨既已經年不拔區區湯液焉能通逐議以大苦寒堅陰燥濕方法參入酒醴引導亦同氣相求之至理濕火黃柏茅朮生大黃乾地龍金毛狗脊川連萆薢晚蠶砂穿山甲漢防己仙靈脾海金沙川獨活北細辛油松節白茄根黃酒燒酒各半浸七日吳嫗脈右如昨左略小動肝風震動裡氣大燥更議鎮重苦滑以通火腑逾六時便通濁行亦肝喜疏泄之一助火腑不通更衣丸一錢五分江脾宜升則健胃宜降則和蓋太陰之土得陽始運陽明陽土得陰自安以脾喜剛燥胃喜柔潤仲景急下存津治在胃也東垣大升陽氣治在脾也今能食不運醫家悉指脾弱是病但診脈較諸冬春盛大兼弦據經論病獨大獨小斯為病脈脾臟屬陰胃腑屬陽脈見弦大非臟陰見病之象久病少餐猶勉強支撐兼以大便窒塞泄氣不爽坐談片刻噯氣頻頻平素痔瘡腸紅未向安適此脈症全是胃氣不降腸中不通腑失傳導變化之司古人云九竅不和都屬胃病六腑為病以通為補經年調攝不越參朮桂附而毫乏應效不必再進湯藥議仿丹溪小溫中丸服至七日俾三陰三陽一周再議治之義濕熱小腸痹小溫中丸二兩一錢朱足麻僂廢大熱陰傷內郁大便不通由懷抱不舒病加先用滋腎丸四錢鹽湯下四服腎燥熱某耆朮守中漸生滿脹小便少大便窒腸氣亦滯病久延虛補湯難進議以每日開水送半硫丸一錢五分以通經腑之陽虛風便閉吳有年二氣自虛長夏大氣發泄肝風鴟張見症類中投劑以來諸恙皆減所嫌旬日猶未更衣仍是老人風祕閲古人書以半硫丸為首方今當採取用之半硫丸一錢開水送三服陳三八用苦藥反十四日不大便腸中陽氣窒閉氣結聚成形非硝黃攻堅半硫丸一錢二分又陽氣窒閉濁陰凝痞成氏稱為陰結口甜夜脹清濁未分每日用來復丹一錢五分甘五三脈左微弱右弦前議入夜反胃脘痛是濁陰上攻據說食粥不化早食至晚吐出仍是不變之形火土不生不司腐熟溫藥一定至理第氣攻膈中究瀉不得爽必腸間屈曲隱處無以旋轉機關風動則鳴議用半硫丸周三一減食過半糞堅若彈丸脾胃病從勞傷治血液枯燥當歸麻仁柏子仁肉蓯蓉松子肉某液耗胃弱火升便難三才加麥冬茯神川斛天冬地黃人參麥冬茯神川斛潘肝血腎液久傷陽不潛伏頻年不愈傷延胃腑由陰乾及乎陽越人且畏凡肝體剛腎惡燥問大便五六日更衣小溲時間淋濁尤非呆滯補澀所宜炒杞子沙苑天冬桂酒拌白芍茯苓豬脊筋又精血損傷五液必燥問六七日更衣以潤劑涵下用後有遺精而陽乘巔頂法當潛陽固陰龜甲心生地阿膠鎖陽川石斛顧嫗陽明脈大環跳尻骨筋掣而痛痛甚足筋皆縮大便燥艱常祕此老年血枯內燥風生由春升上僭下失滋養昔喻氏上燥治肺下燥治肝蓋肝風木橫胃土必衰陽明諸脈不主束筋骨流利機關也用微咸微苦以入陰方法鮮生地八錢阿膠三錢天冬一錢半人中白一錢川斛二錢寒水石一錢又鹹苦治下入陰病樣已減當暮春萬花開放陽氣全升於上內風亦屬陽化其下焦脂液悉受陽風引吸燥病之來實基乎此高年生生既少和陽必用陰藥與直攻其病者有間矣丸方生地三錢阿膠二錢天冬一錢麥冬一錢柏子霜二錢松子仁二錢虎潛丸去瑣陽加咸蓯蓉豬脊筋丸包陽升風祕柏子仁當歸紅花桃仁郁李仁牛膝吳液耗便艱進辛甘法杞子柏子仁歸身茯神沙苑炒山楂某飢飽勞碌中州受傷中脘痛兩脅脹噯泄氣寬靜則安大便艱柏子仁歸鬚菠菜韭菜五靈脂桃仁丹皮某高年下焦陰弱六腑之氣不利多痛不得大便乃幽門之病面白脈小不可峻攻擬五仁潤燥以代通幽是王道之治火麻仁郁李仁柏子仁松子仁桃仁當歸白芍牛膝李三六脈小弱形瘦腸風已久年來食少便難得噯噫泄氣自覺爽釋夫六腑通即為補仿東垣通幽意當歸桃仁紅花郁李仁冬葵子柏子霜蘆薈松子肉水熬膏服五錢金二十湯飲下咽噯噫不已不飢不食大便乾堅若彈丸大凡受納飲食全在胃口已經胃逆為病加以嗔怒其肝木之氣貫膈犯胃斯病加劇況平昔常似有形骨梗脈得左部弦實血鬱血結甚肖進商辛潤方法血結桃仁冬葵子皂莢核郁李仁大黃降香鬱金李據云兩次服辛溫藥瘀濁隨溢出口此必熱瘀在肝胃絡間故脘脅痞脹大便阻塞不通蘆薈苦寒通其陰僅僅更衣究竟未能卻瘀攻病有年久恙自當緩攻湯藥蕩滌理難於用議以桃仁承氣湯為丸某三十左脈弦數溺短而痛小便閉導赤散加丹皮赤苓某舌白身熱溺不利濕壅三焦杏仁一錢半桔梗一錢滑石三錢通草一錢半連翹一錢半蘆根一兩汪秋暑穢濁由吸而入寒熱如瘧上咳痰下洞泄三焦皆熱氣不化則小便不通擬芳香闢穢分利滲熱必要小溲通為主藿香梗厚朴檀香汁廣皮木瓜豬苓茯苓澤瀉六一散又昨進分消方熱勢略減小便略通所有濕熱穢濁混處三焦非臆說矣其陰莖囊腫是濕熱甚而下墜入腑與方書莖腫款症有間議河間法飛滑石石膏寒水石大杏仁厚朴豬苓澤瀉絲瓜葉又川連淡黃芩生白芍枳實六一散廣皮白生穀芽陳暑熱不得解散壅腫癃閉宜通六腑已現痙厥非輕小症防己茯苓皮豬苓通草海金沙苡仁又經腑窒熱不通治在氣分三焦之病何疑滑石石膏寒水石豬苓澤瀉蠶砂湯煎藥又定三焦分消葶藶杏仁厚朴大腹皮豬苓澤瀉海金沙煎湯陳六七昨用五苓通膀胱見效治從氣分繼而亂治溲溺不通糞溏急當通陽腎陽不通生乾薑爆黑川附子調入豬膽汁孔六二膏粱形體充盛壯年不覺釀積既久濕熱壅痹致小腸火腑失其變化傳導之司二便閉阻日盛右脅壅阻作疼當以苦藥通調必臻小效二便俱閉小腸火結蘆薈川楝子郁李仁炒桃仁當歸鬚紅花夜服小溫中丸二錢高多郁多怒諸氣皆痹腸胃不司流通攻觸有形乃肝膽厥逆之氣木必犯土嘔咳噁心致納食日減勉進水穀小腸屈曲不司變化為二便不爽所謂不足之中而兼有餘醫勿夯視濕熱小腸痹丹溪小溫中丸每服二錢五分邵二三氣攻腹脅咽脘得溲溺泄氣乃安此病由飢飽失和小腸屈曲之處不為轉旋運行二便皆致不爽當用丹溪小溫中丸金濕熱在經醫不對症遂令一身氣阻邪勢散漫壅腫赤塊初因濕熱為泄瀉今則竅閉致二便不通但理肺氣邪可宣通濕熱肺氣不降葦莖湯去瓜瓣加滑石通草西瓜翠衣許暑濕熱皆氣分先病肺先受傷氣少司降致二便癃閉此滋血之燥無效今雖小安宜生津清養胃陰麥冬知母甜杏仁白沙參三角胡麻顧四二腹滿堅實足跗脛痛腫二便皆不通利因濕熱壅其腑氣也此非中虛當以宣通為法濕熱壅腑黃芩黃連厚朴枳實青皮卜子丹皮山梔皮某少腹脹痛二便皆祕腑陽不行玉壺丹李三四能食知味食已逾時乃脹小便不利氣墜愈不肯出大便四日一通治在小腸火腑火腑不通先用滋腎丸每早服三錢淡鹽湯送某腹中脹滿當通火腑更衣丸一錢六分某脈動數舌乾白不欲飲水交夏臍下左右攻痛服米飲痛緩逾時復痛六七日大便不通小溲甚少部位在小腸屈曲有阻乃痛未便驟認蟲病凡六腑宜通通則不痛以更衣丸二錢專通火腑之壅結一服王日來便難溺澀是下焦幽門氣鈍血燥議東垣通幽意血液枯燥咸蓯蓉一兩細生地二錢當歸一錢半郁李仁二錢研柏子霜一錢半牛膝二錢張四九少腹微脹小便通利方安大便三四日一通而燥堅殊甚下焦諸病須推肝腎腑絡必究幽門二腸閲所服藥是香砂六君以治脾不思腎惡燥耶當歸蓯蓉郁李仁冬葵子牛膝小茴茯苓車前蜜丸張六六脈左弦如刃六旬又六真陰衰五液涸小溲血水點滴不爽少腹右脅聚瘕此屬癃閉非若少壯瀉火通利可效柏子霜小茴鹿角霜茯苓當歸蓯蓉馬三六脈實病久瘀熱在血胸不爽小腹墜能食不渴二便澀少兩進苦辛宣腑病未能卻此屬血病用通幽法氣血結痹桃仁紅花郁李仁製大黃歸鬚小茴桂枝木川楝子薛嫗大小便不爽古人每以通絡兼入奇經六旬有年又屬久病進疏氣開腑無效議兩通下焦氣血方川芎一兩醋炒當歸一兩醋炒生大黃一兩肉桂三錢川楝子一兩青皮一兩蓬朮煨五錢三稜煨五錢五靈脂醋炒五錢炒黑楂肉一兩小香附醋炒一兩上為末用青蔥白去根搗爛略加清水淋濾清汁泛為丸每日進食時服三錢用紅棗五枚生艾葉三分煎湯一杯服藥王遠行勞動肝腎氣乏不司約束肛門痛墜若是瘍症初起必然寒熱排毒藥味苦辛寒燥下焦陰陽再傷二便皆澀此為癃閉背寒煩渴少腹滿脹議通厥陰厥陰熱閉老韭根穿山甲兩頭尖川楝子歸鬚小茴橘紅乳香又驅濁泄肝僅僅泄氣二便仍不得通仿東垣治王善夫癃閉意滋腎丸三錢三服又氣鬱腸中二便交阻清理腸胃壅熱川連黃柏川楝子吳萸黑山梔青皮通草五錢海金沙五錢煎湯代水又苦辛已效當約其制川連黑山梔丹皮川楝子吳萸海金沙飛滑石按便閉症當與腸痹淋濁門兼參其大便不通有血液枯燥者則用養血潤燥若血燥風生則用辛甘熄風或鹹苦入陰故三才五仁通幽虎潛等法所必用者也若血液燥則氣亦滯致氣血結痹又當於養陰潤燥中加行氣活血之品若火腑祕結宜苦滑重鎮者用更衣丸以通之若老人陽衰風閉用半硫丸溫潤以通之腑陽不行則用玉壺丹陽窒陰凝清濁混淆痞脹用來復丹若鬱熱阻氣則用苦寒泄熱辛以開鬱或用三焦通法若濕熱傷氣阻遏經腑則理肺氣以開降之此治大便之閉也小便閉者若小腸火結則用導赤濕壅三焦則用河間分消膀胱氣化失司則用五苓若濕鬱熱伏致小腸痹郁用小溫中丸清熱燥濕若腎與膀胱陰分蓄熱致燥無陰則陽無以化故用滋腎丸通下焦至陰之熱閉以上諸法前人雖皆論及然經案中逐一分晰發明不啻如耳提面命使人得有所遵循矣至若膏粱麴櫱釀成濕火漬筋爍骨用大苦寒堅陰燥濕仍用酒醴引導又厥陰熱閉為癃少腹脹滿用穢濁氣味之品直泄厥陰之閉此皆發前人未發之祕學者尤當究心焉大凡小便閉而大便通調者或系膀胱熱結或水源不清濕症居多若大便閉而小便通調者或二腸氣滯或津液不流燥症居多若二便俱閉當先通大便小溲自利此其大略也至若胃腑邪熱化燥便堅太陽熱邪傳入膀胱之腑癃祕又當於仲景傷寒門下法中承氣五苓等方酌而用之斯無遺義矣華岫云大便燥結本有承氣湯更衣等丸下之外用豬膽蜜煎潤之可謂無遺蘊矣然竟有效有不效者蓋因燥糞未嘗不至肛門奈肛門如錢大燥糞如拳大縱使竭力努掙而終不肯出下既不得出則上不能食而告危矣余友教人先以膽汁或蜜煎導之俟糞既至肛門令病者親手以中指染油探入肛門內將燥糞漸漸挖碎而出中指須要有指甲者為妙竟有大便一次燥糞挖作百餘塊而出者據云此法輾轉授人已救四五十人矣若患此證者切勿嫌穢而棄之徐評方案重復可厭肺痹某肺氣痹阻面浮胸痞寒熱上焦氣分壅熱葦莖湯某肺痹臥則喘急痛映兩脅舌色白二便少肺不開降葦莖湯曹二二清邪在上必用輕清氣藥如苦寒治中下上結更閉兜鈴牛蒡子桔梗生甘草杏仁射干麻黃某經熱津消咳痰痹痛桂枝桑枝木防己生石膏杏仁苡仁花粉又渴飲咳甚大便不爽餘熱壅於氣分紫菀通草石膏花粉木防己苡仁杏仁陸偏冷偏熱肺氣不和則上焦不肅用微苦辛以宣通薄荷梗桑葉象貝杏仁沙參黑山梔某女溫邪形寒脘痹肺氣不通治以苦辛杏仁栝蔞皮鬱金山梔蘇梗香豉曹氏肺痹右肢麻脅痛咳逆喘急不得臥二便不利脘中痞脹得之憂愁思慮所以肺臟受病宜開手太陰為治紫菀栝蔞皮杏仁山梔鬱金汁枳殼汁某二七溫邪郁肺氣痹咳嗽寒熱頭痛開上焦為主活水蘆根一兩大杏仁三錢連翹一錢半通草一錢半桑皮一錢桔梗一錢某十歲脘中稍爽痰黏氣逆腹膨開肺理氣為主枇杷葉厚朴杏仁滑石茯苓皮通草白蔻仁苡仁王脈搏徑舌乾赤噯氣不展狀如厄忒緣頻吐胃傷諸經之氣上逆填胸聚脘出入幾逆周行脈痹肌肉著席而痛轉加平昔辛香燥藥不受先議治肺經以肺主一身之氣化耳枇杷葉汁杏仁共煎湯沖桔梗枳實汁某天氣下降則清明地氣上升則晦塞上焦不行下脘不通周身氣機皆阻肺藥頗投謂肺主一身之氣化也氣舒則開胃進食不必見病治病印定眼目枇杷葉杏仁紫菀苡仁桔梗通草朱風溫不解邪結在肺鼻竅乾焦喘急腹滿聲音不出此屬上痹急病之險篤者急急開其閉塞葶藶大棗合葦莖湯又風溫喘急是肺痹險症未及周歲臟腑柔嫩故溫邪內陷易結前用葦莖湯兩通太陰氣血頗驗仍以輕藥入肺晝夜豎抱勿令橫臥為要用瀉白散法桑白皮地骨皮苡仁冬瓜仁蘆根汁竹瀝某風溫化熱上郁肺氣咽喉阻塞胸脘不通致呻吟呼吸不爽上下交阻逆而為厥乃閉塞之症病在上焦幼科消食發散苦降但表裡之治上氣仍阻久延慢驚莫可救療蘆根桑葉滑石梨皮苡仁通草李肺象空懸氣窒聲音不出舌乃心苗熱灼則舌本不展以唇口肺微之病乃辛熱酒毒之痹主以輕揚為治乃無質之病濕熱傷肺羚羊角連翹心竹葉心野赤豆皮川貝母金銀花又暮服威喜丸二錢唐脈小澀失血嘔逆之後脘中痞悶納穀䐜脹小便短赤大便七八日不通此怒勞致氣分逆亂從肺痹主治怒勞氣逆鮮枇杷葉土栝蔞皮黑梔皮鬱金杏仁杜蘇子紫降香鉤藤又更衣丸肺為呼吸之橐籥位居最高受臟腑上朝之清氣稟清肅之體性主乎降又為嬌臟不耐邪侵凡六淫之氣一有所著即能致病其性惡寒惡熱惡燥惡濕最畏火風邪著則失其清肅降令遂痹塞不通爽矣今先生立法因於風者則用薄荷桑葉牛蒡之屬兼寒則用麻黃杏仁之類若溫熱之邪壅遏而痹者則有羚羊射干連翹山梔兜鈴竹葉沙參象貝因濕則用通草滑石桑皮苡仁威喜丸因燥則梨皮蘆根枇杷葉紫菀開氣則蔞皮香豉蘇子桔梗蔻仁其葦莖湯葶藶大棗湯一切藥品總皆主乎輕浮不用重濁氣味是所謂微辛以開之微苦以降之適有合乎輕清嬌臟之治也肺主百脈為病最多就其配合之臟腑而言肺與大腸為表裡又與膀胱通氣化故二便之通閉肺實有關係焉其他如肺痿肺癰哮喘咳嗽失音各自分門茲不重贅華岫云徐評所列諸症不過喘咳氣逆耳另立肺痹一門甚屬無謂內經有肺痹之名卻非此義當考之胸痹浦中陽困頓濁陰凝沍胃痛徹背午後為甚即不嗜飲食亦是陽傷溫通陽氣在所必施胸脘清陽不運薤白三錢半夏三錢茯苓五錢乾薑一錢桂枝五分華四六因勞胸痹陽傷清氣不運仲景每以辛滑微通其陽薤白栝蔞皮茯苓桂枝生薑王胸前附骨板痛甚至呼吸不通必捶背稍緩病來迅速莫曉其因議從仲景胸痹症乃清陽失展主以辛滑薤白川桂枝尖半夏生薑加白酒一杯同煎謝沖氣至脘則痛散漫高突氣聚如瘕由乎過勞傷陽薤白桂枝茯苓甘草臨服衝入白酒一小杯某六五脈弦胸脘痹痛欲嘔便結此清陽失曠氣機不降久延怕成噎格薤白三錢杏仁三錢半夏三錢薑汁七分厚朴一錢枳實五分徐六一胸痹因怒而致痰氣凝結土栝蔞半夏薤白桂枝茯苓生薑王五七氣逆自左升胸脘阻痹僅飲米湯形質不得下咽此屬胸痹宗仲景法栝蔞薤白湯又脈沉如伏痞脹格拒在脘膈上部病人述氣壅自左覺熱凡木鬱達之火鬱發之患在上宜吐之巴豆霜一分制川貝母三分桔梗二分為細末服吐後服涼水即止之某二六肺衛窒痹胸膈痹痛咳嗆痰黏苦辛開鬱為主當戒腥羶栝蔞皮炒桃仁冬瓜子苦桔梗紫菀川貝母華陽氣微弱胸痹苓桂朮甘湯某二十脈弦色鮮明吞酸胸痹大便不爽此痰飲凝沍清陽失曠氣機不利法當溫通陽氣為主薤白杏仁茯苓半夏厚朴薑汁某三八氣阻胸痛鮮枇杷葉半夏杏仁桔梗橘紅薑汁某脈沉短氣咳甚嘔吐飲食便溏瀉乃寒濕鬱痹胸痹如閟無非清陽少旋寒濕鬱痹小半夏湯加薑汁王三三始於胸痹六七年來發必嘔吐甜水黃濁七八日後漸安自述病發秋月意謂新涼天降郁折生陽甘味色黃都因中焦脾胃主病仿內經辛以勝甘論脾胃陽虛半夏淡乾薑杏仁茯苓厚朴草蔻薑汁法丸某痛久入血絡胸痹引痛血絡痹痛炒桃仁延胡川楝子木防己川桂枝青蔥管胸痹與胸痞不同胸痞有暴寒鬱結於胸者有火鬱於中者有寒熱互郁者有氣實填胸而痞者有氣衰而成虛痞者亦有肺胃津液枯澀因燥而痞者亦有上焦濕濁瀰漫而痞者若夫胸痹則但因胸中陽虛不運久而成痹內經未曾詳言惟金匱立方俱用辛滑溫通所云寸口脈沉而遲陽微陰弦是知但有寒症而無熱症矣先生宗之加減而治亦惟流運上焦清陽為主莫與胸痞結胸噎膈痰食等症混治斯得之矣華玉堂徐評此即俗名心頭痛也病有數種偶然卒得者不外仲景栝蔞薤白湯其餘諸種各有治法非一煎劑所能必愈也案中俱不能見及哮王受寒哮喘痰阻氣不能著枕寒川桂枝一錢茯苓三錢淡乾薑一錢五味一錢同姜搗杏仁一錢半炙草四分白芍一錢制麻黃五分卜十九哮喘當暴涼而發診脈左大右平此新邪引動宿邪議逐伏邪飲氣小青龍法徐四一宿哮草年沉痼之病無奏效之藥起病由於驚憂受寒大凡憂必傷肺寒入背俞內合肺系宿邪阻氣阻痰病發喘不得臥譬之宵小潛伏里閈若不行動犯竊難以強執雖治當於病發投以搜逐而病去必當養正今中年諒無大害精神日衰病加劇矣腎氣去桂膝病發時葶藶大棗湯或皂莢丸陳四八哮喘不臥失血後胸中略爽葦莖湯加葶藶大棗某十三哮喘久咳桂枝木杏仁橘紅厚朴炒半夏炒白芥子馬三二宿哮痰喘頻發哮兼痰飲真武丸朱五一宿哮咳喘遇勞發小青龍去麻辛加糖炒石膏鄒七歲宿哮肺病久則氣泄汗出脾胃陽微痰飲留著有食入泛嘔之狀夏三月熱傷正氣宜常進四君子湯以益氣不必攻逐痰飲氣虛人參茯苓白朮炙草哮與喘微有不同其症之輕重緩急亦微各有異蓋哮症多有兼喘而喘有不兼哮者要知喘症之因若由外邪壅遏而致者邪散則喘亦止後不復發此喘症之實者也若因根本有虧腎虛氣逆濁陰上衝而喘者此不過一二日之間勢必危篤用藥亦難奏功此喘症之屬虛者也若夫哮症亦由初感外邪失於表散邪伏於裡留於肺俞故頻發頻止淹纏歲月更有痰哮咸哮醋哮過食生冷及幼稚天哮諸症案雖未備閲先生之治法大概以溫通肺臟下攝腎真為主久發中虛又必補益中氣其辛散苦寒豁痰破氣之劑在所不用此可謂治病必求其本者矣此症若得明理針灸之醫按穴灸治尤易除根噫然則難遇其人耳華玉堂喘伊先寒後熱不飢不食繼浮腫喘嗆俯不能仰仰臥不安古人以先喘後脹治肺先脹後喘治脾今由氣分膹郁以致水道阻塞大便溏泄仍不爽利其肺氣不降二腸交阻水穀蒸腐之濕橫趨脈絡腫由漸加豈亂醫可效粗述大略與高明論證肺郁水氣不降肺位最高主氣為手太陰臟其臟體惡寒惡熱宣辛則通微苦則降若藥氣味重濁直入中下非宣肺方法矣故手經與足經大異當世不分手足經混治者特表及之麻黃苡仁茯苓杏仁甘草某氣逆咳嗆喘促小青龍去桂枝芍草加杏仁人參某氣逆咳嗆喘急淡乾薑人參半夏五味茯苓細辛單瘡毒內攻所進水穀不化蒸變濕邪漬於經隧之間不能由腸而下膀胱不利濁上壅遏肺氣不降喘滿不堪著枕三焦閉塞漸不可治議用中滿分消之法必得小便通利可以援救葶藶苦杏仁桑皮厚朴豬苓通草大腹皮茯苓皮澤瀉汪脈弦堅動怒氣衝喘急不得臥息此肝升太過肺降失職兩足逆冷入暮為劇議用仲景越婢法肝升飲邪上逆又按之左脅沖氣便喘背上一線寒冷直貫兩足明是肝逆挾支飲所致議用金匱旋覆花湯法旋覆花青蔥管新絳炒半夏姜勞煩哮喘是為氣虛蓋肺主氣為出氣之臟氣出太過但泄不收則散越多喘是喘症之屬虛故益肺氣藥皆甘補土母以生子若上氣散越已久耳目諸竅之阻皆清陽不司轉旋之機不必縷治中氣虛人參建中湯去姜沈二三晨起未食喘急多痰此竟夜不食胃中虛餒陽氣交升中無彈壓下焦陰傷已延及胃難以驟期霍然胃虛黃精三角胡麻炙草茯苓吳濁飲自夜上干填塞故陽不旋降沖逆不得安臥用仲景真武法腎陽虛濁飲上逆人參淡熟附子生淡乾薑茯苓塊豬苓澤瀉徐四二色痿腠疏陽虛體質平昔喜進膏粱上焦易壅中宮少運厚味凝聚蒸痰頻年咳嗽但內傷失和薄味自可清肅醫用皂莢搜攢肺傷氣泄噴涕不已而沉錮膠濁仍處胸背募俞之間玉屏風散之固衛六君子湯之健脾理痰多是守劑不令宣通獨小青龍湯徹飲以就太陽初服喘緩得宜通之意夫太陽但開所缺通補陽明一段工夫不得其闔暫開復痹矣且喘病之因在肺為實在腎為虛此病細診色脈是上實下虛以致耳聾鳴響治下之法壯水源以熄內風為主而胸次清陽少旋濁痰阻氣妨食於臥時繼以清肅上中二焦小劑守常調理百日圖功至於接應世務自宜節省勿在藥理中也腎氣不納熟地砂仁制萸肉龜甲心阿膠牛膝茯苓遠志五味磁石秋石蜜丸早服臥時另服威喜丸竹瀝薑汁泛丸張三十幼年哮喘已愈上年夏令勞倦內傷致病誤認外感亂治其氣泄越哮喘音啞勞倦不復遂致損怯夫外感之喘治肺內傷之喘治腎以腎主納氣耳加減八味丸每服二錢五分鹽湯下六服胡六十脈沉短氣以息身動即喘此下元已虛腎氣不為收攝痰飲隨地氣而升有年陡然中厥最慮熟地淡附子茯苓車前遠志補骨脂吳氣不歸元喘急跗腫冷汗足寒面赤中焦痞結先議通陽熟附子茯苓生薑汁生白芍王十九陰虛喘嗆用鎮攝固納熟地萸肉阿膠淡菜膠山藥茯神湖蓮芡實翁四二脈細尺垂形瘦食少身動即氣促喘急大凡出氣不爽而喘為肺病客感居多今動則陽化由乎陰弱失納乃吸氣入而為喘腎病何辭治法惟以收攝固真上病當實下焦宗腎氣方法意熟地萸肉五味補骨脂胡桃肉牛膝茯苓山藥車前子蜜丸沈二三陰虛陽升氣不攝納為喘熟地萸肉五味海參膠淡菜膠茯神山藥芡實湖蓮肉紫胡桃楊六一老年久嗽身動即喘晨起喉舌乾燥夜則溲溺如淋此腎液已枯氣散失納非病也衰也故治喘鮮效便難乾涸宗腎惡燥以辛潤之熟地杞子牛膝巴戟肉紫衣胡桃青鹽補骨脂陳氏咳喘則暴身熱汗出乃陰陽樞紐不固惟有收攝固元一法人參炙草五味紫衣胡桃熟地萸肉炭茯神炒山藥又攝固頗應人參附子五味炙黃耆白朮某瘡痍疥疾致氣喘咳出血痰固是肺壅熱氣今飲食二便如常行動喘急與前喘更有分別緣高年下虛腎少攝納元海不固氣逆上泛是腫脹之萌宜未雨綢繆六味丸加牛膝車前胡桃孫望八大年因冬溫內侵遂致痰嗽暮甚診脈大而動搏察色形枯汗泄吸音頗促似屬痰阻此乃元海根微不司藏納神衰囈語陽從汗出最有昏脫之變古人老年痰嗽喘症都從脾腎主治今溫邪擾攘上中二焦留熱雖無溫之理然攝固下真以治根本所謂陽根於陰豈可不為講究熟地炭胡桃肉牛膝炭車前子雲茯苓青鉛某熱熾在心上下不接沖逆陡發遍身麻木喘促昏冒腎真不固肝風妄動久病湯藥無功暫以玉真丸主之喘症之因在肺為實在腎為虛先生揭此二語為提綱其分別有四大凡實而寒者必挾凝痰宿飲上干阻氣如小青龍桂枝加朴杏之屬也實而熱者不外乎蘊伏之邪蒸痰化火有麻杏甘膏千金葦莖之治也虛者有精傷氣脫之分填精以濃厚之劑必兼鎮攝腎氣加沉香都氣入青鉛從陰從陽之異也氣脫則根浮吸傷元海危亡可立而待思草木之無情剛柔所難濟則又有人參河車五味石英之屬急續元真挽回頃刻補天之治古所未及更有中氣虛餒土不生金則用人參建中案集三十法凡十九其層次輕重之間絲絲入扣學者宜深玩而得焉邵新甫徐評此篇治下之法已備治上之法尚多遺漏不可不講也厄某面冷頻厄總在咽中不爽此屬肺氣膹郁當開上焦之痹蓋心胸背部須藉在上清陽舒展乃能曠達耳肺氣鬱痹枇杷葉炒川貝鬱金射干白通草香豉王脈微弱面亮戴陽厄逆脅痛自利先曾寒熱下利加以勞煩傷陽高年豈宜反復乃欲脫之象三焦俱有見症議從中治陽虛濁陰上逆人參附子丁香皮柿蒂茯苓生乾薑陳食傷脾胃復病嘔吐發厄下利診兩脈微澀是陽氣欲盡濁陰沖逆閲方雖有姜附之理陽反雜入耆歸呆鈍牽掣後方代赭重墜又混表藥總屬不解今事危至急舍理陽驅陰無別法人參茯苓丁香柿蒂炮附子乾薑吳萸某脈歇止汗出厄逆大便溏此勞倦積傷胃中虛冷陰濁上干人參茯苓生淡乾薑炒川椒炒烏梅肉釘頭代赭石黃脈小舌白氣逆厄忒畏寒微戰胃陽虛肝木上犯議用鎮肝安胃理陽人參代赭石丁香皮茯苓炒半夏淡乾薑又舌白胎厚胃陽未醒厥逆濁陰上干為厄仍用通法人參淡附子丁香皮淡乾薑茯苓又照方加薑汁柿蒂又人參炒川椒附子茯苓淡乾薑炒粳米厄逆一症古無是名其在內經本謂之噦因其厄厄連聲故今人以厄逆名之觀內經治噦之法以草刺鼻嚏嚏而已無息而疾迎引之立已大驚之亦可已然歷考厄逆之症其因不一有胃中虛冷陰凝陽滯而為厄者當用仲景橘皮湯生薑半夏湯有胃虛虛陽上逆病深聲噦者宜用仲景橘皮竹茹湯有中焦脾胃虛寒氣逆為厄者宜理中湯加丁香或溫胃飲加丁香有下焦虛寒陽氣竭而為厄者正以元陽無力易為抑遏不能暢達而然宜用景嶽歸氣飲或理陰煎加丁香有食滯而厄者宜加減二陳加山楂烏藥之屬或大和中飲加乾薑木香凡此諸法不過略述其端其中有宜有不宜各宜隨症施治不可以此為不易之法故先生謂肺氣鬱痹及陽虛濁陰上逆亦能為厄每以開上焦之痹及理陽驅陰從中調治為法可謂補前人之不逮丹溪謂厄逆屬於肝腎之陰虛者其氣必從臍下直衝上出於口斷續作聲必由相火炎上挾其沖氣乃能逆上為厄用大補陰丸峻補真陰承製相火東垣嘗謂陰火上衝而吸氣不得入胃脈反逆陰中伏陽即為厄用滋腎丸以瀉陰中伏熱二法均為至當審證參用高明裁酌可也鄒時乘徐評仲景治厄逆以旋覆代赭石湯為主方案中獨不用此方而純用補熱之劑其症屬虛寒上逆者固有此法但不知何以俱屬寒逆不識當時曾有誤用處否疸沈十九能食煩倦手足汗出目微黃常鼻衄夫熱則消穀水穀留濕濕甚生熱精微不主四布故作煩倦久則痿黃谷疸當與豬肚丸蒼朮換白朮重用苦參谷疸張三二述初病似瘧乃夏暑先伏秋涼繼受因不慎食物胃脘氣滯生熱內蒸變現黃疸乃五疸中之谷疸也溺黃便祕當宣腑濕熱但不宜下恐犯太陰變脹綿茵陳茯苓皮白蔻仁枳實皮杏仁桔梗花粉汪三九飲酒發黃自屬濕熱脈虛澀腹鳴不和病後形體瘦減起居行動皆不久耐全是陽氣漸薄兼之思慮勞煩致損議兩和脾胃之方酒疸戊己加當歸柴胡煨姜南棗王右脅高突刺痛身面發黃不食不便瘀熱久聚恐結癰瘍濕熱鬱蒸大豆黃卷木防己金銀花生牡蠣飛滑石苡仁張脈沉濕熱在裡鬱蒸發黃中痞噁心便結溺赤三焦病也苦辛寒主之杏仁石膏半夏薑汁山梔黃柏枳實汁黃一身面目發黃不飢溺赤積素勞倦再感溫濕之氣誤以風寒發散消導濕甚生熱所以致黃連翹山梔通草赤小豆花粉香豉煎送保和丸三錢劉三九心下痛年餘屢發痛緩能食漸漸目黃溺赤此絡脈中凝瘀蘊熱與水穀之氣交蒸所致若攻之過急必變脹滿此溫燥須忌議用河間金鈴子散合無擇穀芽枳實小柴胡湯法脈絡瘀熱金鈴子延胡枳實柴胡半夏黃芩黑山梔穀芽蔣由黃疸變為腫脹濕熱何疑法亦不為謬據述些少小丸諒非河間子和方法溫下僅攻冷積不能驅除濕熱仍議苦辛滲利每三日兼進浚川丸六七十粒疸變腫脹雞肫皮海金沙厚朴大腹皮豬苓通草張三二夏秋疸病濕熱氣蒸而成治法必用氣分宣通自效蓋濕中生熱外干時令內蘊水穀不化黃乃脾胃之色失治則為腫脹今調治日減便通利主腑已通薄味自可全功平昔攻苦思必傷心郁必傷脾久坐必升太過降不及不與疸症同例疸後郁損心脾歸脾丸楊七十夏熱泄氣脾液外越為黃非濕熱之疸繼而不欲食便溏用大半夏湯通胃開飲已得寢食露降痰血乃氣泄不收肅令淺不必以少壯熱症治順天之氣是老年調理法脾液外越人參炙草生扁豆山藥茯神苡仁黃疸身黃目黃溺黃之謂也病以濕得之有陰有陽在腑在臟陽黃之作濕從火化瘀熱在裡膽熱液泄與胃之濁氣共並上不得越下不得泄熏蒸遏郁侵於肺則身目俱黃熱流膀胱溺色為之變赤黃如橘子色陽主明治在胃陰黃之作濕從寒水脾陽不能化熱膽液為濕所阻漬於脾浸淫肌肉溢於皮膚色如熏黃陰主晦治在脾傷寒發黃金匱黃疸立名雖異治法多同有辨證三十五條出治一十二方先審黃之必發不發在於小便之利與不利疸之易治難治在於口之渴與不渴再察瘀熱入胃之因或因外並或因內發或因食谷或因酣酒或因勞色有隨經蓄血入水黃汗上盛者一身盡熱下郁者小便為難又有表虛里虛熱除作噦火劫致黃知病有不一之因故治有不紊之法於是脈弦脅痛少陽未罷仍主以和渴飲水漿陽明化燥急當瀉熱濕在上以辛散以風勝濕在下以苦泄以淡滲如狂蓄血勢所必攻汗後溺白自宜投補酒客多蘊熱先用清中加之分利後必顧其脾陽女勞有穢濁始以解毒繼之滑竅終當峻補腎陰表虛者實衛裡虛者建中入水火劫以及治逆變證各立方論以為後學津梁若云寒濕在裡之治陽明篇中惟見一則不出方論指人以寒濕中求蓋脾本畏木而喜風燥制水而惡寒濕今陰黃一證外不因於六淫內不傷於嗜欲惟寒惟濕譬以卑監之土須暴風日之陽純陰之病療以辛熱無疑矣方雖不出法已顯然故不用多歧恐滋人惑耳今考諸家之說丹溪云不必分五疸總是如盦醬相似以為得治黃之扼要殊不知是言也以之混治陽黃雖不中窾不致增劇以之治陰黃下咽則斃何異操刃一言之易遺誤後人惟謙甫羅氏具有卓識力辨陰陽遵傷寒寒濕之指出茵陳四逆湯之治繼往開來活人有術醫雖小道功亦茂焉喻嘉言陰黃一證竟謂仲景方論亡失恍若無所循從不意其注傷寒注金匱辨論數千言而獨於關鍵處明文反為之矇昧雖云智者一失亦未免會心之不遠也總之羅氏可稱勤求古訓朱氏失於小成自狃嘉言喻氏病在好發議論而已今觀葉氏黃疸之案寥寥數則而於案中所云夏秋疸病濕熱氣蒸而成其陽黃之治瞭然於胸中案中又有治黃也而有非黃之論揣其是病必求虛實於是知其是病必辨陰陽如遇陰黃求治於先生者決不以治陽之法治陰而夭人長命也苟非師仲景而藐丹溪博覽群賢之論而不陷於一偏之說者烏能及此名不浮於實道之得以久行也固宜蔣式玉徐評疸之變症不一案中只有瀉濕熱一法其餘並無良方不知黃疸之疾輕者即愈重者有黃水成窠久而不化變態百出以至傷生消水窠之法不可不考
