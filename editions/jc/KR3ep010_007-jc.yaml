body:
  text: 卷七痢沈暑必挾濕傷在氣分古稱滯下此滯字非停滯飲食言暑濕內侵腑中流行阻遏而為滯矣消導升舉溫補暑邪無有出路胸痞不飢不食黏膩未已而肛門沉墜里結三焦皆受邪蒸上下渾如兩截延為休息痢疾纏綿展轉豈旦晚驟愈之病暑濕熱淡乾薑生薑小川連淡黃芩人參枳實徐夏季痢症多是濕熱食積初起宜分消其邪但肌柔白嫩乃氣虛之質且性情畏藥只宜少與勿過檳榔汁青皮陳皮厚朴川連黃芩木香炒黑山楂又濕熱下痢必用苦辛寒為治粟殼澀腸止瀉久痢成方當此熱邪未清宣通斯滯可去因色白氣弱未敢峻攻耳厚朴黃芩川連木香汁楂肉炒銀花麥芽盧痢症濕熱皆是夏令伏邪但以攻消大傷胃氣不能去病今微嘔不飢不寐大便欲解不通是九竅六腑不和總是胃病人參一錢吳萸炒川連四分泡淡生乾薑五分茯苓三錢川楝子肉一錢生白芍一錢半某女舌色灰黃渴不多飲不飢噁心下利紅白積滯小溲不利此暑濕內伏三焦氣機不主宣達宜用分理氣血不必見積以攻滌下藥飛滑石川通草豬苓茯苓皮藿香梗厚朴白蔻仁新會皮陸氏經來暑穢痧脹心煩自利黑瘀淡黃芩枳實川連石菖蒲鬱金橘紅陳嫗瀉痢兩月肢體浮腫高年自屬虛象但胸脘痞悶納穀噁心每利必先腹痛是夏秋暑熱鬱滯於中虛體挾邪焉有補澀可去邪扶正之理恐交節令變症明是棘手重症矣人參茯苓川連淡乾薑生白芍枳實某臍上青筋突痛太陰脾受傷此前症也近日腹痛白積兩旬不已是新受夏秋暑濕與病異岐先理新病導氣分消主之藿香厚朴廣皮茯苓皮川連木香木瓜扁豆某痰哮宿病正在初秋而發又值寒熱下痢血積腹痛吐逆脈來右弦左弱目黃羞明必是暑濕凝滯著里以補虛之中佐以清邪乃通劑法人參黃耆白芍廣皮石蓮子川連楂肉草決明金銀花王痢疾古稱滯下乃是濕熱氣薄腸胃阻閉氣分故利仍不爽河間丹溪僉用清熱導氣者為此濕熱黃芩川連草決明炒黑楂肉生白芍石蓮丹皮廣木香汁倪六十面垢舌白心下脘中悽悽痛窒至圊復便不爽此水穀之濕內蒸為熱氣道阻閉上熱下冷若外受客邪既過募原必有寒熱矣淡黃芩川連淡竹葉檳榔汁白芍厚朴廣皮白某濕溫下痢脫肛五苓散加寒水石江食物不調腸胃蘊蓄鬱蒸積聚而滯下三月不愈清疏帶補之人參川連炒白芍炒楂肉廣皮茯苓炒當歸烏梅陸濕熱內蘊中焦痞結陽氣素虛體質濕注自利不爽神識昏亂將變柔痙炒半夏人參枳實川連乾薑黃芩薑汁顧得湯飲腹中漉漉自利稀水平昔酒客留濕濕勝內蘊腸胃不爽凝積東垣清暑益氣亦為濕熱傷氣而設但脾胃久病仍能納食當苦味堅陰芳香理脾生茅朮四兩炒黑黃柏二兩炒黑地榆二兩豬苓一兩半澤瀉一兩半水法丸服三錢葛四十酒客大便久瀉脅上曾發癰瘍春夏脅下有形腹形滿脹此久蘊濕熱癰膿自利未能泄邪腸胃氣壅利頻不爽法當分消以去濕熱若攻劫太過必傷脾胃議用丹溪小溫中丸早進二錢五分夜進二錢五分三兩某潮熱自利腹痛黃芩生白芍枳實桔梗檳榔汁木香汁徐能食腹痛下痢兼和其陰人參生白芍黃芩枳實川連乾薑某十六濕熱內蒸下利紅積炒黑神麯炒黑楂肉茯苓皮飛滑石新會皮厚朴淡竹葉扁豆葉祝三八十年久痢須推飲食避忌酒客濕滯腸中非風藥之辛佐苦味入腸何以勝濕逐熱久病飲食不減腸中病也綿茵陳香白芷北秦皮茯苓皮黃柏藿香某形瘦陰虧濕熱下痢誤投消食反劫津液邪未盡津先耗咽喉痛且嗆咳所謂濕未罷已上燥矣川連銀花通草黃芩川貝茯苓皮某濕熱內阻氣分腹痛下痢目眥黃舌光不渴議清裡泄濕熱黃芩寒水石川連厚朴秦皮鬱金山五十濕鬱腹痛利紅如豆汁生茅朮三錢炒山楂一錢半厚朴一錢紅曲一錢半廣皮一錢豬苓一錢某夏秋痢疾固是濕熱傷氣脾胃氣滯後重裡急不爽古方香連丸取其清裡熱必佐理氣謂氣行斯濕熱積聚無容留矣知母生地滋陰除熱治陰分陽亢之火與痢門濕熱大異蓋滋則呆滯氣鈍窒塞宜乎欲便不出究竟濕熱留邪仍在桂附熱燥又致肛墜痛如刀割補中益氣東垣成法僅僅升舉下焦清陽未能直透腸中再用大黃重藥兼知母生地等味更令傷及下焦書義謂諸痢久都屬腎傷小腹痛墜忌冷顯然是下症議與升陽亦須下治人參茯苓澤瀉炙草防風根羌活獨活細辛生薑大棗某舌白渴不欲飲心腹熱每痢必痛肛墜痢又不爽微嘔有痰口味有變頭中空痛兩頰皆赤此水穀氣蒸濕熱鬱於腸胃清濁交混忽加煩躁難鳴苦況法當苦寒泄熱苦辛香流氣滲泄利濕蓋積滯有形濕與熱本無形質耳川連黃芩鬱金厚朴豬苓槐米秦皮包先厥下利膿血腹痛嘔惡乃寒熱互傷厥陰伏熱淡黃芩川連丹皮生芍炮姜炒銀花陳氏溫邪經旬不解發熱自利神識有時不清此邪伏厥陰恐致變痙白頭翁川連黃芩北秦皮黃柏生白芍又溫邪誤表劫津神昏恐致痙厥炒生地阿膠炒麥冬生白芍炒丹皮女貞子邱嫗進潤劑痛緩積稀知厥陰下利宜柔宜通血虛有風顯然生地阿膠丹皮生白芍銀花小黑穭豆皮某熱漸入里胸痞便泄議酸苦泄熱黃芩川連枳實白芍廣皮白滑石甘草穀芽蔡內虛邪陷協熱自利脈左小右大病九日不減是為重症議用白頭翁湯方加黃芩白芍協熱痢潘時令暑濕都從口鼻而受氣鬱則營衛失於轉運必身熱無汗其邪自上以及中必循募原致腸胃亦郁腹痛瀉積無非濕熱之化此分消利濕則可若以表藥則傷陽氣矣茯苓陳皮厚朴木香炒扁豆炒山楂又協熱下利黏膩血水是腸胃中濕熱之化也北秦皮白頭翁茯苓澤瀉炒銀花益元散某春溫內陷下痢最易厥脫川連阿膠淡黃芩炒生地生白芍炙草王熱毒逗留不化潮熱下利川連黃芩炒白芍茯苓澤瀉木瓜張三三江南地薄氣弱夏季食物內蘊時令熱迫內聚濕熱赤痢入冬不愈皆飲食不忌之累宜淡薄滋味血痢生茅朮厚朴南山楂草果仁樗根皮槐花廣皮銀花又痢血三月晝痢夜止肛門欲墜以氣陷門戶不藏人參當歸白芍肉桂炙草白朮廣皮煨姜南棗某二四血痢半載少腹痛六味地黃加炒楂肉炒延胡某血積痛痢起於夏令秋半不減明是濕熱滯於腸胃久延面色消奪右脈搏大乃痢症所大忌稍通積聚兼以和血酒炒大黃川連黃芩丹皮肉桂歸身白芍生甘草袁二七久痢腹疼下血生黃耆三錢生白朮三錢炒歸身一錢炒楂肉二錢炒地榆一錢半廣皮一錢厚朴一錢羌活五分防風根五分朱三九下痢帶瘀血肛中氣墜腹不痛炒黑樗根皮一兩生茅朮一錢生黃柏一錢炒黑楂肉三錢炒黑地榆一錢半炒焦銀花一錢半赤苓三錢豬苓一錢半某痛痢不爽已有血下暑濕不獨在氣分且積勞茹素攻奪宜慎當歸白芍南山楂厚朴草果炮姜某脈緩臍上痛便稀溺短此乃濕鬱脾胃之陽致氣滯裡急宗古人導濕分消意陽虛氣滯生茅朮廣皮厚朴官桂飛滑石茯苓豬苓澤瀉炒山楂張五七脈沉伏久痢腹痛畏寒少食氣弱腸滯以溫通方法熟附子生茅朮生大黃茯苓厚朴木香又溫下相投腸滯不通皆因腑陽微弱古賢治痢不離通澀二法當歸肉桂心茯苓厚朴南山楂生麥芽王六二平昔溫補相投是陽不足之體聞患痢兩月不忌食物脾胃滯壅今加嘔惡夫六腑宜通治痢之法非通即澀肛腸結閉陽虛者以溫藥通之熟附子製大黃厚朴木香茯苓皮範二七痢稱滯下謂有滯必先痛後下況病起不慎口腹陽氣窒塞積聚留著試閱前方宣通者有效守補則病劇六腑皆以宣通為用附子大黃茯苓厚朴生草果廣皮又溫下已效腸胃留滯都因陽不主運再佐理氣兼之附子製大黃茯苓廣皮厚朴生益智木香豬苓李痢將兩月目微黃舌白口乾唇燥赤腹滿按之軟竟日小便不通病者自述肛門窒塞努掙不已僅得迸出黏積點滴若有稀糞自必傾腸而多思夏秋間暑濕內著為痢軒岐稱曰滯下謂滯著氣血不獨食滯一因凡六腑屬陽以通為用五臟皆陰藏蓄為體先瀉後痢脾傳腎則逆即土剋水意然必究其何以傳克之由蓋伏邪垢滯從中不清因而下注矣遷延日久正氣因虛仲景論列三陰至太陰篇中始挈出腹滿字樣脾為柔臟惟剛藥可以宣陽驅濁但今二腸窒痹氣不流行理中等法決難通腑考內經二虛一實者治其實開其一面也然必溫其陽佐以導氣逐滯欲圖扭轉機關舍此更無他法製附子生厚朴木香製大黃炒黑大茴又懈弛半月脾腎復憊脾敗不主健運納食皆變痰沫腎真失司納氣水液上泛阻咽皆痢傷濁壅變脹末傳脈見弦勁是無胃氣小愈變病最屬不宜入冬為藏陽之令今陽漸潰散而陰液枯槁渴不多飲飲不解渴治陽必用剛藥其陰更涸矣轉展無可借箸勉與脾腎分調脾陽動則冀運腎陽靜可望藏王道固難速功揆之體用不可險藥早服炒焦腎氣丸午服參苓白朮散加益智仁許三三勞倦咳嗽失血仍然不避寒暑食物腹中瀉痢病上加病後感法當先治以分病有新舊陽虛厚朴益智廣皮茯苓皮白芍炙草木瓜炒扁豆又咳嗽瀉痢藥治相背治肺礙脾治脾礙肺方今交冬治痢為要病人說早食相安晚食脹滿脾胃陽氣已乏勿徒消滯寒克矣白芍桂酒拌益智廣皮茯苓焦白朮炙草穀芽砂仁殼張下痢泄瀉之後診脈右弦大胃虛少納陽弱不司運化法當通腑之陽人參益智仁炒菟絲餅炒砂仁末茯苓廣皮白陸二六腹滿自痢脈來濡小病在太陰況小便清長非腑病濕熱之比法當溫之生於術附子茯苓厚朴乾薑許二四痢疾一年已浮腫溺澀古稱久痢必傷腎月前用理陰煎不應詢及食粥吞酸色瘁脈濡中焦之陽日憊水穀之濕不運仍辛溫以蘇脾陽佐以分利用胃苓湯去甘草加益智陳痢積雖然少緩諸款不減面色青晦四肢厥冷仍在險途擬進益黃散法人參煨益智仁公丁香茯苓廣皮青皮木瓜炒冬米某脈微細肢厥下痢無度吳茱萸湯但能止痛仍不進食此陽敗陰濁腑氣欲絕用桃花湯赤石脂乾薑白粳米某痢後大便不實食不健運色脈俱是虛象此清陽失曠於中陰氣先走泄於下先理中焦再當攝陰人參白朮茯苓炙草廣皮炮姜益智某自利不渴者屬太陰呃忒之來由乎胃少納穀沖氣上逆有土敗之象勢已險篤議金匱附子粳米湯人參附子乾薑炙草粳米某長齋有年土薄氣餒加以久痢少谷欲嘔脾胃之陽衰矣由夏及今半載不痊倘忽腫脹何法施治人參白朮乾薑炮姜丁香茯苓袁中下陽微嘔呃下利溫中不應恐延衰脫夫陽宜通陰宜守此關閘不致潰散春回寒谷生氣有以把握候王先生主議人參附子炮姜炒粳米赤石脂生白芍某春痢入冬痢止腹痛食少童年那有淫欲之擾此係寒熱不和脾胃受傷也六君子湯加肉桂某脈沉微下痢紅紫黑舌胎粉白並不渴飲此太陰脾營虛寒也仿理陰煎脾營虛寒當歸頭白芍炮姜炙草茯苓益智唐氏下痢四十餘日形寒腹痛炒當歸生白芍肉桂炒山楂青皮茯苓沈議堵截陽明一法陽明不闔人參炒白粳米炮姜赤石脂某六四高年下痢痰多舌乾脈右空大神困音低乃脾腎兩虧二氣交虛有年致此恐非宜脾腎兼虛人參一錢半菟絲子一錢半赤石脂三錢炮姜一錢半茯苓三錢木瓜一錢王五十久痢久瀉為腎病下瀉久而陰傷氣墜四神丸治脾腎晨泄辛溫香燥皆剛佐入五味酸柔不過稍制其雄烈此肛墜尻酸乃腎液內少而氣陷矣腥油肉食須忌熟地禹餘糧石五味子蔣五一久痢用辛甘溫而效是脾陽久傷治由東垣法極是述食血腥滑必便溏四肢忽有肉疹營衛內應脾胃氣血未得充復五旬外下亦怯用脾腎兩補人參山藥茯苓湖蓮芡實補骨脂蓯蓉萸肉五味巴戟菟絲覆盆子某下痢腹痛舌乾肛墜痢傷陰也痢傷陰液熟地炭炒歸身炒白芍炒楂肉茯苓炙草某滯濁下行痛緩議養陰通腑生地阿膠丹皮山梔豬苓澤瀉孫脈左數下利腹不甚痛暮夜微熱所伏暑熱乘陰虛下陷是清熱理脾不效當攝陰升陽熟地炭當歸炭山楂炭炒黑麥芽炙黑甘草防風根炒黑升麻又照方去山楂麥芽加人參焦白芍又瀉痢久必陰損液耗此口渴微咳非實火客邪與甘酸化陰人參山藥炙草炒烏梅木瓜炒湖蓮肉蔡脈右數左細數面垢舌燥白苔點點肌膚甲錯左脅動氣伏暑當秋涼而發初病如瘧當從苦辛寒法里邪熾烈變為下痢胃津被劫陰液大耗昔賢於熱病液涸急以救陰為務苟胃關得蘇漸以冀安否則犯喻氏所指客邪內陷液枯致危之戒矣復脈湯去薑桂麻又酸甘化陰法人參生地烏梅炙草麥冬木瓜鮑痢久陰液消亡無以上承必唇燥舌乾奈胃關不和善噫難飢此由陰膩柔劑所致擇其不膩滯者調之人參炙草炒白芍炒烏梅肉炒麥冬茯神周五十痢後氣墜都主陰傷但嗔怒不已木犯土致病留連攝陰之中聊佐和肝熟地茯苓炒山楂炒烏梅木瓜某陰液涸則小水不通胃氣逆則厭食欲嘔此皆痢之款症也治以中下二焦為主議理陰煎熟地白芍附子五味炮姜茯苓吳三十痢久陰傷腹痛肛門墜脹秋病入冬不愈已屬休息症和陰劑中仍有升降仿東垣法炒熟地炒當歸炒白芍炙草生山楂生穀芽陳三七瀉痢久則傷腎多見下焦沉墜先傷在陰剛藥不效久痢傷腎下焦不攝人參鹿茸菟絲子茯苓舶茴香制補骨脂砂仁張五一晨泄痢血屬腎病無痛墜等因用黑地黃丸範瀉痢起於長夏醫謂時令濕熱胃苓湯芩芍法固非謬訛因高年腎陽肝陰先虧使客氣內擾阻遏中流乏砥柱坐鎮致狂瀾滔天耳病經兩旬不減重陰無陽驗諸神識尚清其外邪為少而內損為多八脈無權下無收攝漏卮不已理必生陽泄下焦冷此皆陰陽二氣微絕治病則夯治本為宜非置之不理實究天人而已人參二錢鹿茸二錢炒黑當歸三錢生杜仲三錢生沙苑一錢茯苓三錢李五十自痢五六年即周身痛痹蓋腸胃病致經絡筋骨籓籬疏撤陽失衛藥難效靈書此代煎冬於朮蓯蓉熟附子河水煎吳四九治痢大法無過通塞二義夏秋濕熱固多初痢不痛已非濕熱色滯者腸中陳腐也至今痛而痢痢後復痛按之痛減屬虛小雪不愈陽不來復久痢治腎然非滋膩先用苓薑朮桂湯某氏治痢古法不越通澀經停有瘕腹浮腫八脈之病醫惑於見痢認為脾胃症議用濟生腎氣丸朱五七痢久肛墜是下焦腎虛失於收納治脾胃藥無功熟地炭炒歸身赤石脂五味子炒楂肉周四六痢久必傷腎陰八脈不固腸膩自滑而下但執健脾無用病不在中納穀運遲下焦坎陽亦衰用三神丸五味子補骨脂肉果某痢久陰陽兩傷少腹肛墜連兩腰胯脊髀痠痛由臟腑絡傷已及奇經前議輕劑升陽頗投仍從下治人參鹿茸附子炒當歸茴香菟絲子杜仲周轉方柔藥相安顯然久痢傷及腎陰當用理陰煎兼用禹糧石脂丸以攝固腸中熟地炭歸身炭人參炙甘草五味子炒楂肉兼服禹糧赤石脂丸金氏脈數勁下痢腹鳴痛後墜臥則氣衝咳嗽吐黏涎產後過月顯是下損至中納穀日少形神日衰勢已延成蓐勞難期速功熟地炭人參茯神炒山藥建蓮赤石脂某氏休息痢經二年明是下焦陰陽皆虛不能收攝經期不來小腹撫摩有形上行似乎癥瘕其實氣結若不急進溫補恐滋擾腫脹之累也人參附子茯苓炙草五味白芍某氣虛下陷門戶不藏氣虛下陷人參黃耆廣皮炙草歸身炒白芍防風升麻某痢經五十日來小愈再發獨見後重下墜此為氣陷則門戶不藏亦胃弱內風乘襲議陷者舉之人參歸身白芍炙草升麻荷葉石瘧邪熱氣內陷變痢延已三月脾胃氣衰面浮肚膨仍有裡急欲墜之象中虛伏邪進以和解瘧變痢黃芩柴胡人參丹皮炒當歸白芍穀芽炒山楂蔡神氣索然腹中動氣舌紅嗌乾寒熱日遲平素積勞致虛邪伏厥陰脈促細堅溫清難用勉議復脈湯存陰勿涸希圖援救復脈湯又兩投復脈色脈略轉所言平素積虛不但瘧邪內陷陽結於上則胸痞陰走於下則頻利非徒開泄攻邪也救逆湯去姜又奔脈動氣皆是陽虛濁泛當和營理陽人參茯苓歸身炙草桂心牡蠣煨姜大棗又沖氣填塞邪陷下痢勢非輕小用瀉心法人參淡乾薑熟附子川連黃芩枳實又人參淡乾薑生地炒桃仁張氣衰熱伏腹痛下痢脘中痞悶不欲納食由瘧變痢經邪入腑斯病勢已重清理濕熱以開痞延久必須扶正淡黃芩川連人參生白芍乾薑枳實某邪陷瘧後變痢傷及厥陰症見氣上撞心飢不能食乾嘔腹痛全是肝病肝為至陰之臟相火內寄仲景治法不用純剛燥熱之藥以肝為剛臟故也今正交土旺土木為仇五日內未為穩當人參炒當歸炒白芍炒烏梅肉茯苓淡吳萸生香附汁真北秦皮孫下痢無積肛墜腸間汨汨有聲此屬腸風當用攝固腸風熟地炭萸肉炭炒歸身炒杞子川斷北味肉煎藥送赤石脂丸三錢某當年久痢用三神丸得效是脾腎兩因兼理氣分之滯體質陽虛遇冷病加今病起長夏小水不通必系夏熱阻其宣化久則氣血凝著而為腸紅先與桂苓甘露飲分消其濕於朮茯苓豬苓澤瀉滑石桂心包噤口痢川連人參黃芩白芍草決明炒山楂炒銀花又噤口痢乃熱氣自下上衝而犯胃口腸中傳導皆逆阻似閉腹痛在下尤甚香連梅芍僅宣中焦未能泄下熱燔燎若不急清陰液同歸於盡姑明其理以俟高明備採白頭翁湯又脈左細數右弦乾嘔不能納穀腹痛裡急後重痢積不爽此暑濕深入著腑勢屬噤口痢疾症非輕渺議用苦寒清解熱毒必痛緩胃開方免昏厥之變川連乾薑黃芩銀花炒山楂白芍木香汁又下午病劇乃陰氣消亡之徵若但陰柔恐生生不至疏補胃藥正宜進商生地阿膠人參生白芍炒山楂炒銀花矯初起無寒熱即瀉痢嘔惡不食乃噤口痢重病夫暑邪之傷由口鼻吸氣而入邪與水穀交混蒸變濕熱釀為積滯膿血腸胃氣窒欲解不能通爽遂致里結後重香連苦辛理氣導濕清熱初用頗是皆緣勞碌之人非膏粱溫養之質淡薄積勞中氣易傷四十日來積少痛緩醫稱病解而食不下咽不知飢飽診得脈弦形衰舌白不渴飲水日瀉數行全屬胃倒氣奪中宮損極下關不攝谷不能咽焉能承受湯藥藥味氣劣胃衰必惡久痢久瀉務在能食古人非醒脾胃即安腎攝納再詢粉漿下咽或嗆或噎議以上脘宜通其清陽下焦當固攝其滑脫仿古方中參苓白朮散末當以米飲日服二次間以不膩滑之物食些少勿多以示胃之所喜為補必得胃氣漸醒方有轉危為安人參二錢焦術一錢半茯苓一錢半炙草五分炒扁豆二錢苡仁一錢半桔梗一錢砂仁七分炒炮薑炭一錢肉豆蔻一錢上藥研細秤准分兩每次用香粳米飲湯調服一錢五分上藥須日進二次鮑舌心黃邊白渴飲水漿停胃脘乾嘔微微冷呃自痢稀水小便不利診脈堅勁不和八旬又二暑濕熱邪內著必脾胃氣醒始可磨耐以高年不敢過清過消用清暑益氣方法川連黃芩石蓮子煨乾葛青皮人參茯苓厚朴豬苓澤瀉又口中乾燥小水全無泉源已竭陰液無以上承痢症噤口都是濕熱壅於胃口下元衰憊衝脈氣震高突此攻病保真理難捉摸矣川連黃芩草決明石蓮子烏梅白芍痢症古名滯下惟夏秋暑濕挾積者居多其次則風淫火迫寒侵也推之燥氣獨不為患考前法悉有定例不必再述至於暑者有陰暑陽暑之源其邪必兼乎濕夫陰暑由於人之陽氣先虧加以貪涼喜冷郁折生陽故主於溫陽暑由於天之熱伏阻氣化濁則重於清而醫之下手工夫於此須細心認定但邪之來也似水之流臟腑間一有罅隙則乘虛而著故有在氣在血之分傷臟傷腑之異若表之邪郁而氣機下流不息者喻氏論人參敗毒散里之積壅而寒熱交黏者潔古立芍藥湯在氣分有苦辛調氣與辛甘益氣等法在血分有酸苦行血及咸柔養血諸方若表症急從乎三陽有桂枝湯葛根芩連湯小柴胡湯里勢實專究脾胃有小承氣湯溫脾湯總之治腑以三焦見症為憑治臟以足三陰為要領辨得虛實之情形酌以或通或澀之法則臨症權宜庶乎不錯矣但是症不治之條甚多最難愈者莫如休息痢攻補之法非一予亦不贅最危險者莫如噤口痢卻有兩端若因暑濕邪充格拒三焦者氣機皆逆傳而閉上下之勢渾如兩截若治不得其要則邪無出路正立消亡此丹溪立法最高後世都宗其旨先生又借用半夏瀉心湯減去守中之品取補以運之辛以開之苦以降之與病情尤為允協所以先生之見長是集之奧妙每每在此又因脾腎之陽素虛陰邪從中而下者先傷太陰繼傷少陰關閘大開痛泄無度戊癸少化火之機命陽無蒸變之力此不飢不食為嘔為脹理宜然矣與邪多積熱之候相比絕然不同參之仲景理中湯腎氣丸及景岳理陰煎胃關煎等法可也吾鄉姚頤真先生化出捷徑良法以大劑蓯蓉配入參歸姜附桂制白芍之類治之靡不應手而愈想蓯蓉之性溫能達下咸可利胃質之柔潤以補陽中之陰較地黃阿膠尤勝與之腸膏竭盡絡脈結澀而痛者堪稱神品自此推廣用治甚多若曰某方某藥但治某症不知活用反稱杜撰則禁絕後人靈活之心無從施發矣邵新甫徐評夏秋之痢總由濕熱積滯與傷寒傳入三陰之痢不同案中合法者亦甚多一遇老年及久痢即混入陰經治法並參附烏梅五味等全不對症隨筆亂書並與案中之論亦自己相背想是習氣使然抑此中實無定見也後人竟用溫補以為本之此老殺人無算觸目傷懷便血鄭夏至後濕熱內蒸腸風復來議酸苦法濕熱川連黃芩烏梅肉生白芍廣皮厚朴荊芥炭菊花炭又駐車丸二錢某脈右數形色蒼黑體質多熱復受長夏濕熱內蒸水穀氣壅血從便下法以苦寒佐以辛溫薄味經月可冀病愈茅朮川連黃芩厚朴地榆槐米程年前痰飲哮喘不得安臥以辛溫通陽劫飲而愈知脾陽內弱運動失職水穀氣蒸飲邪由濕而成濕屬陰久郁化熱熱入絡血必自下但體質仍屬陽虛凡腸紅成方每多苦寒若臟連之類於體未合毋欲速也生於術茯苓澤瀉地榆炭桑葉丹皮俞陽虛腸紅洞瀉議劫胃水陽虛寒濕理中換生茅朮生厚朴附子炭炮姜程十七脈沉糞後下血少年淳樸得此乃食物不和腸絡空隙所滲與升降法茅朮厚朴廣皮炮姜炙草升麻柴胡地榆又脈緩濡弱陽氣不足過飲濕勝大便溏滑似乎不禁便後血色紅紫兼有成塊而下論理是少陰腎臟失司固攝而陽明胃脈但開無合矣從來治腑以通為補與治臟補法迥異先擬暖胃通陽一法生茅朮人參茯苓新會皮厚朴炮附子炮薑炭地榆炭程三一食入不化飲酒厚味即瀉而腸血未已蓋陽微健運失職酒食氣蒸濕聚陽郁脾傷清陽日陷矣議用東垣升陽法濕遏脾陽人參茅朮廣皮炙草生益智防風炒升麻某陽虛體質食入不化飲酒厚味即瀉而腸血未止蓋陽微健運失職酒食氣蒸濕聚脾陽清陽日陷矣當從謙甫先生法中虛濕下陷人參二錢半乾薑二錢半煨附子三錢茅朮五錢升麻三錢白朮二錢半厚朴二錢半茯神二錢半廣皮二錢半炙草二錢半歸身一錢半白芍一錢半葛根二錢半益智一錢半地榆三錢半神麯一錢半上藥各制薑棗湯丸溫濕勝中虛便紅焦術炒當歸炒白芍炙草防風根煨葛根乾荷葉劉六一鬱怒腸紅復來木火乘腑絡腹中微痛議與和陰鬱怒木火犯土冬桑葉丹皮生白芍黑山梔廣皮乾荷葉邊生穀芽張二年前沖氣入脘有形痛嘔糞前後有血此屬厥陽擾絡風動內爍頭巔皆眩痛每日用龍薈丸葉嗔怒動肝絡血乃下按之痛減為虛夫肝木上升必犯胃口遂脹欲嘔清陽下陷門戶失藏致裡急便血參朮炮姜辛甘溫暖乃太陰脾藥焉能和及肝胃丹溪云上升之氣自肝而出自覺冷者非真冷也駐車丸二錢程四六少陽絡病必犯太陰脾陽衰微中焦痞結色痿如瘁便後有血論脾乃柔臟非剛不能蘇陽然鬱勃致病溫燥難投議補土泄木方法人參當歸枳實汁炒半夏桑葉丹皮參歸養脾之營枳半通陽明之滯桑丹泄少陽之郁某凡有痔疾最多下血今因嗔怒先腹滿隨瀉血向來糞前近日便後是風木鬱於土中氣滯為膨氣走為瀉議理中陽泄木佐之木鬱土中人參附子炮姜茅朮厚朴地榆升麻醋炒柴胡醋炒某便紅脈數大腸血熱生地三錢銀花三錢黃芩一錢白芍一錢半槐花一錢程二三脈數能食腸紅陰自下泄腸腑熱熾所致非溫補之症細生地丹參黃柏黑穭豆皮地榆炭柿餅灰槐花金石斛某三七內熱腸紅髮痔當清陰分之熱生地炒丹皮酒炒黃芩炒黑槐花柿餅灰元參銀花黑山梔汪嗽血已止糞中見紅中焦之熱下移腸胃屬腑止血亦屬易事花甲以外年歲熱移入下到底下元衰矣細生地川石斛柿餅灰天冬趙三六勞倦便後血炒黑樗根皮一兩炒黑地榆三錢炒黑丹皮一錢五加皮三錢炒焦銀花一錢半蒼朮一錢茯苓二錢炒澤瀉一錢錢十八陰虛內熱腸紅不止炒黑樗根皮一兩炒生地三錢炒銀花一錢半炒黑地榆二錢歸身一錢半生白芍一錢半炒丹皮一錢茯苓一錢半蔡三八脈濡小食少氣衰春季便血大便時結時溏思春夏陽升陰弱少攝東垣益氣之屬升陽恐陰液更損議以甘酸固澀闔陽明為法陽明不闔人參炒粳米禹糧石赤石脂木瓜炒烏梅某能食腸血脈細色痿肛痔下墜議酸苦熄風堅陰萸肉炭五味炭黃柏炭地榆炭禹糧石赤石脂吳二八中滿過於消克便血食入易滯是脾胃病血統於脾脾健自能統攝歸脾湯嫌其守疏腑養臟相宜脾胃氣滯九蒸白朮南山楂茯苓廣皮穀芽麥芽薑棗湯法某二三便血如注面黃脈小已經三載當益胃法脾胃陽虛人參一錢焦術三錢茯苓三錢炙草五分木瓜一錢炮姜五分李三十上年夏季絡傷下血是操持損營治在心脾心脾營損歸脾飴糖丸朱入暮腹痛鳴響睪丸久已偏墜春正下血經月顏色鮮明此痛決非傷瘀積聚乃營損寒乘木來侮土致十四載之纏綿調營培土以甘泄木散郁宜辛節口戒欲百天可效人參炒當歸炒白芍肉桂炮姜茯苓炙草南棗又細推病情不但營氣不振而清陽亦傷洞泄不已而辛潤宜減甘溫宜加從桂枝加桂湯立法人參桂枝茯苓生白芍炙草肉桂煨姜南棗又仍議理營人參於朮茯苓炮姜桂心白芍真武丸二錢某十八便後下血此遠血也脾不統血焦術一錢半炒白芍一錢半炮姜一錢炙草五分木瓜一錢炒荷葉邊二錢方脈小左數便實下血乃肝絡熱騰血不自寧醫投參耆歸桂甘辛溫暖昧於相火寄藏肝膽火焰風翔上蒙清空鼻塞頭暈嗆咳不已一誤再誤遺患中厥夫下虛則上實陰傷陽浮冒乃一定至理血去陰傷虛陽上冒連翹心竹葉心鮮生地元參丹皮川斛又下血陰傷走泄虛陽上升頭目清竅參耆朮桂辛甘助上致鼻塞耳聾用清上五六日右脈已小左仍細數乃陰虧本象下愈虛則上愈實議以滋水制火之方生地元參天冬川斛茯神炒牛膝又脈左數耳聾脅痛木失水涵養以致上泛用補陰丸補陰丸五錢又虎潛丸羊肉膠丸某腸紅黏滯四年不痊陰氣致傷肛墜刺痛大便不爽藥難驟功當以潤劑通腑陰虛血澀生地穭豆皮楂肉麻仁冬葵子歸鬚姚勞傷下血絡脈空乏為痛營衛不主循序流行而為偏寒偏熱診脈右空大左小促通補陽明使開合有序勞傷營衛歸耆建中湯唐四七內經以陰絡傷則血內溢蓋燒酒氣雄擾動臟絡聚血之所雖得小愈而神采爪甲不榮猶是血脫之色肛墜便甚治在脾腎以脾為攝血之司腎主攝納之柄故也脾腎虛晚歸脾去木香早六味去丹澤加五味芡實蓮肉阿膠丸沈五五酒濕汙血皆脾腎柔膩主病當與剛藥黑地黃丸凡脾腎為柔臟可受剛藥心肝為剛臟可受柔藥不可不知謙甫治此症立法以平胃散作主加桂附乾薑歸芍重加炒地榆以收下濕用之神效即此意也吳四二腹痛下血食荸薺豆漿而愈乃泄肺導濕之藥既愈以來復有筋骨痿耎寒熱夜臥口乾乃濕去氣泄陽明脈乏不主用事營衛失度津液不升之象天真丸主之去人參支五六痔血久下肌肉痿黃乃血脫氣餒漸加喘促浮腫再延腹脹便不可為此症臟陰有寒腑陽有熱詳於金匱谷疸篇中極難調治人參焦術茯苓炒菟絲子廣皮生益智木瓜楊四八中年形勞氣餒陰中之陽不足且便血已多以溫養固下男子有年下先虛也腎陽虛人參茯苓歸身淡蓯蓉補骨脂巴戟炒遠志生精羊肉熬膏丸服五錢田三八久矣晨泄腹痛近日有紅積此屬腎虛補骨脂大茴香五味茯苓生菟絲陳三七脈左虛澀右緩大尾閭痛連脊骨便後有血自覺惶惶欲暈兼之納穀最少明是中下交損八脈全虧早進青囊斑龍丸峻補玉堂關元暮服歸脾膏涵養營陰守之經年形體自固鹿茸生切薄另研鹿角霜另研鹿角膠鹽湯化柏子仁去油烘乾熟地九蒸韭子鹽水浸炒菟絲子另磨赤白茯苓蒸補骨脂胡桃肉搗爛蒸一日揩淨炒香上溶膏煉蜜為丸每服五錢淡鹽湯送鹿茸壯督脈之陽鹿霜通督脈之氣鹿膠補腎脈之血骨脂獨入命門以收散越陽氣柏子涼心以益腎熟地味厚以填腎韭子菟絲就少陰以升氣固精重用茯苓淡滲本草以陽明本藥能引諸藥入於至陰之界耳不用萸味之酸以酸能柔陰且不能入脈耳胡十八上下失血先瀉血後便瀉逾月陰傷液耗胃納頗安且無操家之勞安養閒坐百日所謂靜則陰充腎陰虛熟地萸肉茯神山藥五味龍骨汪腎虛當春陽升動咳嗽嗽止聲音未震糞有血陰難充復不肯上承用陰藥固攝熟地白芍茯神黑穭豆皮炒焦烏梅肉陳三十腎陰虛絡中熱肝風動腸紅三載不已左脅及腹不爽少陽亦逆多以補中調攝故未見奏功姑用疏補為益臟通腑熟地炭炒當歸炒楂肉炒地榆炒丹皮冬桑葉又益陰泄陽四劑血止但腰痠脘中痹咽燥喜涼飲肛熱若火烙陽不和平仍是陰精失涵用虎潛法熟地炭白芍當歸地榆炭龜膠知母黃柏豬脊髓丸某沫血鮮紅凝塊紫黑陰絡傷損治在下焦況少腹疝瘕肝腎見症前此精濁日久亦令陰傷於下人參茯神熟地炭炒黑杞子五味炒地榆生杜仲又左脈小數堅肛墜脹人參茯神湖蓮肉芡實熟地炭五味陳氏脈小瀉血有二十年經云陰絡傷血內溢自病起十六載不得孕育述心中痛墜血下不論糞前糞後問脊椎腰尻酸楚而經水仍至跗膝常冷而骨髓熱灼由陰液損傷傷及陽不固密閱頻年服藥歸耆雜入涼肝焉是遵古治病議從奇經升固一法奇脈傷鹿茸鹿角霜枸杞子歸身紫石英沙苑生杜仲炒大茴補骨脂禹餘糧石蒸餅漿丸張三九勞力見血胸背脅肋諸脈絡牽掣不和治在營絡勞力傷絡人參歸身白芍茯苓炙草肉桂計五三瘀血必結在絡絡反腸胃而後乃下此一定之理平昔勞形奔弛寒暄飢飽致傷苟能安逸身心瘀不復聚不然年餘再瘀不治血瘀在絡旋覆花新絳青蔥桃仁當歸鬚柏子仁宋氏當年腸紅繼衄血喉痛已見陽氣乘絡絡為氣乘漸若懷孕者然氣攻則動如梭與胎動迥異倘加勞怒必有汙濁暴下推理當如是觀柏子仁澤蘭卷柏黑大豆皮茯苓大腹皮便血一症古有腸風臟毒脈痔之分其見不外乎風淫腸胃濕熱傷脾二義不若內經謂陰絡受傷及結陰之旨為精切仲景之先便後血先血後便之文尤簡括也陰絡即臟腑隸下之絡結陰是陰不隨陽之徵以先後分別其血之遠近就遠近可決其臟腑之性情庶不致氣失統攝血無所歸如漏卮不已耳肺病致燥澀宜潤宜降如桑麻丸及天冬地黃銀花柿餅之類是也心病則火燃血沸宜清宜化如竹葉地黃湯及補心丹之類是也脾病必濕滑宜燥宜升如茅朮理中湯及東垣益氣湯之類是也肝病有風陽痛迫宜柔宜泄如駐車丸及甘酸和緩之劑是也腎病見形消腰折宜補宜填如虎潛丸及理陰煎之類是也至膽經為樞機逆則木火煽營有桑葉山梔柏子丹皮之清養大腸為燥腑每多濕熱風淫如辛涼苦燥之治胃為水穀之海多氣多血之鄉臟病腑病無不兼之宜補宜和應寒應熱難以拘執而言若努力損傷者通補為主膏粱蘊積者清疏為宜痔瘡則滋燥兼投中毒須知寒熱余如黑地黃丸以治脾濕腎燥天真丸以大補真氣真精平胃地榆之升降脾胃歸脾之守補心脾斑龍以溫煦奇督建中之復生陽枳朮之疏補中土禹糧赤脂以堵截陽明用五仁湯復從前之腸液養營法善病後之元虛此皆先生祖古方而運以匠心為後學之津梁也邵新甫徐評以上諸案腸紅痔血俱不能分別人參薑桂一概亂投此老與此症竟茫然無知誤人不少案中不但痔血一症混入腸紅即知其為痔血矣而痔血之方又不中病蓋另有治法不得與腸紅方等也便血腸中必有受之處褚氏所謂腸有竅便血殺人是也當知填竅之法今惟知用人參姜附及五味等燥熱收斂之藥助其腸中之火而於脫血之後更劫其陰苟非純虛是益其疾矣脫肛翁六五濕熱皆主傷氣氣下陷墜肛而痛溲溺後陰囊筋牽著於肛其痛為甚夫厥陰肝脈繞陰按脈濡弱決非疏泄主治議進陷者舉之從東垣補中益氣湯濕熱氣虛下陷孫面色痿黃腹痛下血都因飲食重傷脾胃氣下陷為脫肛經月不愈正氣已虛宜甘溫益氣少佐酸苦務使中焦生旺而稚年易虧之陰自堅冀有向安之理氣虛下陷人參川連炒歸身炒白芍炙草廣皮石蓮肉烏梅又肛翻純血不但脾弱氣陷下焦之陰亦不攝固面色唇爪已無華色此益氣乃一定成法攝陰亦不可少然幼稚補藥須佐宣通以易虛易實之體也人參焦術廣皮白芍炙草歸身五味升麻醋炒柴胡醋炒某便後少腹痛肛墜溺則便滑腎虛不攝腎氣不攝熟地炭五味萸肉炭茯苓炒遠志炒菟絲子某肛墜尻痛利多傷陰熟地炭五味茯神炒山藥炒楂肉炒菟絲子煎送禹糧石脂丸王六二陽氣下陷腎真不攝肛墜氣泄如風向老下元陽憊非升柴能舉其陷人參鹿茸補骨脂炒大茴香茯苓調入陽起石三分吳五六脫肛漏血遇勞即發病經十六載色萎黃背脊痛診脈尺中下垂法當升陽攝陰兼理奇脈斑龍丸加五味子蜜丸脫肛一症其因不一有因久痢久瀉脾腎氣陷而脫者有因中氣虛寒不能收攝而脫者有因酒濕傷脾色欲傷腎而脫者有因腎氣本虛關門不固而脫者有因濕熱下墜而脫者又肛門為大腸之使大腸受寒受熱皆能脫肛老人氣血已衰小兒氣血未旺皆易脫肛經曰下者舉之徐之才曰澀可去脫皆治脫肛之法也觀先生治脫肛之症亦不越乎升舉固攝益氣三法如氣虛下陷而脫者宗東垣補中益氣湯舉陷為主如腎虛不攝而脫者宗仲景禹糧石脂丸及熟地五味菟絲輩固攝下焦陰氣為主如肝弱氣陷脾胃氣虛下陷而脫者用攝陰益氣兼以酸苦泄熱為主如老年陽氣下陷腎真不攝而脫者又有鹿茸陽起石等提陽固氣一法汪訒庵云有氣熱血熱而肛反挺出者宜用芩連槐柏及四物升柴之類愚謂即或間有此症終非可訓之法存之以質君子鄒滋九徐評脫肛多由濁氣下降濕痰毒火合併為害故腫痛異常此實症也必清其大腸之火而用外治之藥以收之無不立愈其有虛人病後清氣下陷則用補中益氣之法以提之十不得一者也乃不論何因俱用升提收斂之法肛門之痰火濁氣將升提而置之何地耶又脫肛之疾屬熱多又用溫燥更非所宜痿湯六三有年偏痿日瘦色蒼脈數從金匱肺熱葉焦則生痿躄論肺熱葉焦玉竹大沙參地骨皮麥冬桑葉苦百合甜杏仁徐三歲面瘰跗耎此屬肺熱痿躄連翹花粉黑山梔赤小豆桑葉白通草張濕中伏熱沉著下焦用苦勝濕辛通氣分然必循經入絡漸次達及陽明濕火綿茵陳三錢生茅朮五分黃柏一錢半晚蠶砂一錢寒水石三錢茯苓皮三錢又色蒼脈實體質強壯雖年逾四旬氣元充旺詢知平日善啖酒醴甘肥此釀成濕火蘊結下焦今少腹微腫硬二便滯澀自覺少腹氣脹上衝兩足沉重艱於步履腿股皮中甚熱即內經所云濕熱不攘大筋緛短小筋弛長緛短為拘弛長為痿也更述曾因熬煉膏藥中有䗪蟲蜈蚣等物吸受穢濁毒氣未始非與濕熱糾蓄沉伏下焦前議苦辛寒燥茲再佐以搜逐絡隧然此病從口而入必茹素戒飲一二年之久病根可拔當恪守勿懈為要綿茵陳三錢黃柏一錢半川萆薢一錢茯苓皮三錢金鈴子一錢半穿山甲三錢大檳榔汁一錢又綿茵陳萆薢茯苓皮黃柏蠶砂漢防己龍膽草山梔青黛又病去七八常服二妙丸可也黃柏八兩略炒茅山術米泔浸切片同烏芝麻拌飯上蒸三五次去芝麻焙乾三兩二味研末水法丸空心服三錢開水下吳二十雨濕泛潮外來水穀聚濕內起兩因相湊經脈為痹始病繼以瘡痍漸致痿緛筋弛氣隧不用濕雖阻氣而熱蒸爍及筋骨久延廢棄有諸濕熱蒸爍筋骨大豆黃卷飛滑石杏仁通草木防己廉三二診脈論體從遺精漏瘍繼而環跳穴痛遂不堪行走臟陰傷及腑陽陽氣日加窒塞經脈不司舒展食入壅脘欲吐大便旬日不通痞阻日甚而為痿症內經論治痿獨取陽明無非流通胃氣蓋胃脈主乎束筋骨利機關竅也議用加味溫膽湯胃氣窒筋骨不利又大便旬日不通用更衣丸取意小腸火腑非苦不通非下不奪也某五歲頭目口鼻喎邪繼而足痿此邪風入絡所致邪風入絡羚羊角犀角元參細生地黃柏川斛川萆薢俞五旬又四陽氣日薄陽明脈絡空乏不司束筋骨以流利機關肩痛肢麻頭目如蒙行動痿弱無力此下虛上實絡熱內風沸起當入夏陽升為甚燥濕利痰必不應病議清營熱以熄內風陽明虛營絡熱內風動犀角鮮生地元參心連翹心冬桑葉丹皮鉤藤明天麻陳陽明脈空厥陰風動自右肩臂漸及足跗痿躄長夏氣泄秋半不主收肅顯然虛症先用通攝方法肝胃虛內風動淡蓯蓉熟地杞子川牛膝川斛茯苓遠志炒黑石菖蒲夏四四自稚壯失血遺精兩交夏月四肢痿㿗不得轉動指節亦不能屈曲凡天地間冬主收藏夏主發泄內損多年不復元陽明脈衰所致肝胃虛當歸羊肉膠杞子鎖陽菊花炭茯苓青鹽吳三九下焦痿躄先有遺泄濕瘍頻進滲利陰陽更傷雖有參耆朮養脾肺以益氣未能救下即如畏冷陽微幾日飯後吐食乃胃陽頓衰應乎外衛失職但下焦之病多屬精血受傷兩投柔劑溫通之補以腎臟惡燥久病宜通任督通攝兼施亦與古賢四斤金剛健步諸法互參至於胃藥必須另用夫胃腑主乎氣氣得下行為順東垣有升陽益胃之條似乎相悖然芩連非苦降之氣味乎凡吐後一二日暫停下焦血分藥即用扶陽理胃二日俾中下兩固經旨謂陽明之脈束筋骨以利機關諒本病必有合矣胃陽督腎皆虛鹿茸淡蓯蓉當歸杞子補骨脂巴戟天牛膝柏子仁茯苓川斛吐後間服大半夏湯加淡乾薑薑汁沈長夏濕熱經脈流行氣鈍兼以下元絡脈已虛痿弱不耐步趨常似酸楚大便或結或溏都屬肝腎為病然益下必佐宣通脈絡乃正治之法倘徒呆補恐季夏後濕熱還擾須為預理濕熱肝腎虛鹿角霜當歸生茅朮熟地薑汁製茯苓桑椹子蓯蓉巴戟遠志小茴金氣狗脊三斤酒蒸水熬膏和丸淡鹽湯送下李四九痿躄在下肝腎病多但素飲必有濕熱熱瘀濕滯氣血不行筋縮肌肉不仁體質重者難移無非濕邪之深沉也若論陽虛不該大發瘡痍但久病非速攻莫計效遲方可愈疾細生地咸蓯蓉當歸鬚牛膝黃柏生刺蒺萆薢包五三寢食如常脈沉而緩獨兩腿內外肌肉麻木五旬又三陽脈漸衰蹺維不為用事非三氣雜感也溫通以佐脈絡之流暢仿古賢四斤金剛之屬淡蓯蓉枸杞子牛膝茯苓白蒺藜木瓜川斛萆薢金毛狗脊膏丸郭兩足痿弱遇冷筋掣三年久病藥力焉得速拔況不明受病何因徒見病而治難期速功據云精滑溺後通納下焦為宜淡蓯蓉茯苓川斛生茅朮生杜仲金毛狗脊沈四四眩暈怔忡行走足肢無力肌肉麻木骨骱色變早晨腹鳴瘕泄此積勞久傷陽氣肝風內動勢欲痿厥法當脾腎雙補中運下攝固體治病脾腎陽虛脾腎雙補丸山藥粉丸繆仲淳方沈三六寢食如常儀容日瘦語言出聲舌絡牽強手足痿弱不堪動作是肝腎內損漸及奇經諸脈乃痿痹之症未能驟期速功肝腎虛地黃飲子去萸味桂席雨水後診得右脈頗和左關尺大堅搏不附骨春陽初萌里真漏泄有風動枯痿之慮議乙癸同涵意熟地淡蓯蓉杞子五味萸肉牛膝川斛茯神菊花山藥粉丸李氏右肢跗足無力如痿交子夜痰多嗆嗽帶下且頻是衝脈虛寒浮火上升非治嗽清熱夫沖為血海隸於陽明女科八脈奇經最要內經論之女子五七年歲陽明日衰今天癸將絕年歲脈絡少氣非見病治病膚淺之見愚意通陽攝陰以實奇脈不必縷治衝脈虛寒薛氏加減八味丸二兩勻七服鹽湯送下許金瘡去血乃經脈營絡之傷若損及臟腑倏忽莫救後此嗔怒動肝屬五志中陽氣逆迸與客邪化火兩途苦辛泄氣頻服既多陽遂發泄形雖若豐盈而收藏固攝失職少腹約束陽道不舉背脊喜靠步履無力皆是痿弱症端漸至痿廢議以通納之法專事涵養生真冀下元之陽八脈之氣收者收通者通庶乎近理腎陽奇脈兼虛鹿角霜淡蓯蓉干生菟絲粉生杜仲粉歸身五味大茴香遠志家韭子覆盆子雲茯苓蒜汁泛丸唐三四脈左沉小右弦兩足腰膝酸耎無力舌本腫脹劑頸轟然蒸熱痰涎湧出味鹹此腎虛收納少權督脈不司約束陰火上泛內風齊煽久延痿厥沉疴病根在下通奇脈以收拾散越之陰陽為法虎潛去知柏歸加枸杞青鹽羊肉膠丸萬脈濡弱右大心熱煩渴兩足膝腰髀伸縮不得自如此乃下焦陰虛熱爍筋骨而為痿躄下焦陰虛生虎潛去龜廣鎖加元參黃二四冬藏精氣既少當春夏發泄失血遺精筋弛骨痿不堪行走精血內怯奇脈中少氣三年久損若不絕欲安閒有僂廢難狀之疾骨痿鹿筋膠羯羊肉膠牛骨髓豬脊髓線魚膠蓯蓉干紫巴戟枸杞子茯苓沙苑子牛膝青鹽某病後陰傷骨痿生杜仲熟地龜甲黃柏虎骨牛膝當歸巴戟某症如歷節但汗出筋縱而痛冬月為甚腰脊傴僂形俯據述未病前夢遺已久是精血內損無以營養筋骨難與攻迫議香茸丸溫通太陽督脈督陽虛鹿茸三兩生當歸二兩麝香一錢生川烏五錢雄羊腎三對酒煮爛搗丸經云肺熱葉焦則生痿躄又云治痿獨取陽明以及脈痿筋痿肉痿骨痿之論內經於痿症一門可謂詳審精密矣奈後賢不解病情以諸痿一症或附錄於虛勞或散見於風濕大失經旨賴丹溪先生特表而出之惜乎其言之未備也夫痿症之旨不外乎肝腎肺胃四經之病蓋肝主筋肝傷則四肢不為人用而筋骨拘攣腎藏精精血相生精虛則不能灌溉諸末血虛則不能營養筋骨肺主氣為高清之臟肺虛則高源化絕化絕則水涸水涸則不能濡潤筋骨陽明為宗筋之長陽明虛則宗筋縱宗筋縱則不能束筋骨以流利機關此不能步履痿弱筋縮之症作矣故先生治痿無一定之法用方無獨執之見如衝任虛寒而成痿者通陽攝陰兼實奇脈為主濕熱沉著下焦而成痿者用苦辛寒燥為主腎陽奇脈兼虛者用通納八脈收拾散越之陰陽為主如下焦陰虛及肝腎虛而成痿者用河間飲子虎潛諸法填納下焦和肝熄風為主陽明脈空厥陰風動而成痿者用通攝為主肝腎虛而兼濕熱及濕熱蒸灼筋骨而成痿者益下佐以溫通脈絡兼清熱利濕為主胃虛窒塞筋骨不利而成痿者用流通胃氣及通利小腸火腑為主胃陽腎督皆虛者兩固中下為主陽明虛營絡熱及內風動而成痿者以清營熱熄內風為主肺熱葉焦而成痿者用甘寒清上熱為主邪風入絡而成痿者以解毒宣行為主精血內奪奇脈少氣而成痿者以填補精髓為主先生立法精詳真可垂諸不朽矣鄒滋九徐評下體痿弱確是屬虛者多案中多溫補肝腎亦不為過但其中必兼有風痰寒濕一味蠻補亦有未到之處此等方起於宋而盛於明古人不如是也痹吳風濕相搏一身盡痛加以墮水外寒裡熱痛極發厥此屬周痹周痹桂枝木片薑黃羚羊角海桐皮花粉白蒺藜又照前方去薑黃白蒺加大豆黃卷木防己鮑四四風濕客邪留於經絡上下四肢流走而痛邪行觸犯不拘一處古稱周痹且數十年之久豈區區湯散可效凡新邪宜急散宿邪宜緩攻蜣螂蟲全蠍地龍穿山甲蜂房川烏麝香乳香上藥制末以無灰酒煮黑大豆汁泛丸杜三三溫暖開泄驟冷外加風寒濕三氣交傷為痹遊走上下為楚邪入經隧雖汗不解貴乎宣通桂枝杏仁滑石石膏川萆薢漢防己苡仁通草又經脈通而痛痹減絡中虛則痿弱無力周身汗出陽泄已多豈可再用苦辛以傷陽泄氣乎內經以筋緩為陽明脈虛當宗此旨黃耆防風白朮茯苓炙草桂枝當歸白芍苡仁又大凡邪中於經為痹邪中於絡為痿今痹痛全止行走痿弱無力經脈受傷陽氣不為護持法當溫養通補經旨春夏養陽重在扶培生氣耳黃耆四兩茯苓三兩生白朮三兩炙草淡蓯蓉二兩當歸三兩牛膝二兩仙靈脾二兩虎骨膠金毛狗脊十二兩無灰酒浸半日蒸熬膏膠膏為丸劉三一瀕海颶風潮濕著於經脈之中此為周痹痹則氣血不通陽明之陽不主司事食腥膩遂不化為溏瀉病有六七年正虛邪實不可急攻宜緩生白朮生黃耆海桐皮川桂枝木羌活防風周痛勢流走而腫後感外邪參藥不可與也從行痹治行痹羌活木防己石膏生甘草海桐皮杏仁吳寒入陰分筋骨痛耎此為痹症遺泄內虛忌用表散劫真當歸沙苑北細辛桂枝木生白朮茯苓又虎骨當歸北細辛生白朮茯苓又行痹入左足生虎骨防己萆薢苡仁半夏茯苓某氏風濕發熱萃於經脈腫痛遊走病名行痹世俗呼為歷節風是也桂枝羌活石膏甘草杏仁防風又行痹腹中痛便難不知飢栝蔞皮紫菀杏仁鬱金半夏山梔桑枝俞肩胛連及臂指走痛而腫一年乃肢痹也絡虛留邪和正祛邪肢痹黃耆防風海桐皮生白朮歸身川羌活片薑黃白蒺藜李三四脈小弱當長夏四肢痹痛一止之後筋骨不甚舒展此衛陽單薄三氣易襲先用陽明流暢氣血方黃耆生白朮漢防己川獨活苡仁茯苓朱三二肢痹痛頻發羚羊角木防己川桂枝尖晚蠶砂川萆薢白通草生苡仁茯苓汪冬月溫暖真氣未得潛藏邪乘內虛而伏因驚蟄節春陽內動伏氣乃發初受風寒已從熱化兼以夜坐不眠身中陽氣亦為泄越醫者但執風寒濕三邪合成為痹不曉病隨時變之理羌防葛根再泄其陽必致增劇矣焉望痛緩議用仲景木防己湯法木防己石膏桂枝片薑黃杏仁桑枝又氣中伏邪得宣右肢痹痛已緩血分留熱壅著左肢痛勢未衰足微腫體質陰虛仍以宣通輕劑羚羊角桂枝木片薑黃花粉木防己杏仁桑皮顧濕熱流著四肢痹痛川桂枝木防己蠶砂石膏杏仁威靈仙某左脈如刃右脈緩澀陰虧本質暑熱為瘧水穀濕氣下墜肢末遂成攣痹今已便瀉減食畏冷陽明氣衰極矣當緩調勿使成疾寒濕生白朮狗脊獨活茯苓木防己仙靈脾防風威靈仙又濕痹脈絡不通用苦溫滲濕小效但汗出形寒泄瀉陽氣大傷難以濕甚生熱例治通陽宣行以通脈絡生氣周流亦卻病之義也生於術附子狗脊苡仁茯苓萆薢徐十九長夏濕勝氣阻不飢不食四肢痹痛痛甚於午後子前乃陽氣被陰濕之遏色痿黃脈小澀以微通其陽忌投劫汗茯苓萆薢木防己晚蠶砂澤瀉金毛狗脊黎肢腠麻痹足膝為甚當歸杞子生虎骨油松節各二兩川芎狗脊萆薢淮牛膝仙靈脾檀香泥白茄根沙苑各一兩火酒醇酒各半浸七日某三七寒濕滯於經絡身半以下筋骨不舒二便不爽若非迅疾飛走不能效蠲痛丹某勞力感濕腰痹痠痛四肢乏力生杜仲生苡仁沙苑子茯苓粗桂枝木金毛狗脊晚蠶砂木防己某十五年中痹痛三發述痛久流及肢節骨骱屈曲之所皆腫赤此寒濕變熱為欲解病在軀殼筋骨無害命之理但病深沉下甚已屬陰邪小腹脹小溲全無川獨活八分漢防己八分川熟附八分粗桂枝木一錢茯苓五錢川萆薢一錢木豬苓一錢又生白朮三錢茯苓三錢川熟附一錢川獨活五分北細辛一分漢防己五分豬苓一錢半澤瀉一錢又陽虛濕痹痹愈下焦無力用斡旋其陽茯苓四兩生白朮二兩泡淡生乾薑一兩肉桂五錢以上四味生研末滾水泛丸每早服三錢開水下何三六脈沉目黃舌腫周身四肢疹發胃痛肢末皆腫強遇冷飲涼即病此久伏濕邪陽氣傷損議溫氣分以通周行之脈川烏頭生白朮桂枝木茯苓半夏薑汁唐嫗右後脅痛連腰胯發必惡寒逆冷暖護良久乃溫此脈絡中氣血不行遂至凝塞為痛乃脈絡之痹症從陽維陰維論病鹿角霜小茴香當歸川桂枝沙苑茯苓王努力經氣受傷客邪乘衛陽之疏而入風濕阻遏經隧為腫為痛大汗連出痛仍不止而大便反滑其濕邪無有不傷陽氣者固衛陽以卻邪古人正治以濕家忌汗耳風濕生於術三錢防風根五分生黃耆三錢片薑黃一錢桂枝木五分海桐皮一錢羌活五分獨活五分又人參一錢生於術二錢黃耆三錢炒當歸一錢半川桂枝一錢炙甘草五分煨姜七分南棗二枚又風濕腫痹舉世皆以客邪宜散愈治愈劇不明先因勞倦內傷也蓋邪之所湊其氣必虛參朮益氣佐以風藥氣壯托出其邪痛斯止矣病人自云手足如墮如無詎非陽微不及行乎四末乎此皆誤治致參藥過費耳人參一錢生於術二錢黃耆二錢歸身一錢半肉桂三分炙甘草三分煨姜一錢南棗一枚又遺泄陰傷兼以斂攝人參一錢生於術二錢黃耆三錢歸身一錢炙草五分熟地三錢茯神三錢五味五分白芍一錢丸方人參二兩黃耆四兩茯神二兩杞子二兩鹿角霜二兩鹿茸二兩歸身三兩炙草一兩菊花炭二兩煉蜜丸王風濕痹痛防己生於術川獨活茯苓炒黃柏生苡仁又痹在四肢羚羊角白蒺藜海桐皮滑石大豆黃卷苡仁又照前方去蒺藜苡仁加連翹青菊葉花粉又羚羊角犀角連翹海桐皮大豆黃卷花粉薑黃金銀花金風濕熱走痛二便不通此痹症也杏仁木防己寒水石鬱金生石膏木通李風濕肌腫而痛畏熱炒黃柏茅朮制蒺藜木防己秦艽鉤藤又黃柏防己茯苓苡仁萆薢虎骨楊四肢流走痹痛風勝移走濕凝為腫下焦為甚邪入陰分蠲痛丹蔣氏便溏食少腰腹以下骨骱肢節沉痛人參生於術制白松香茯苓漢防己北細辛川獨活苡仁王身半以上屬陽風濕雨露從上而受流入經絡與氣血交混遂為痹痛經月來外邪已變火化攻散諸法不能取效急宜宣通清解毋使布及流注防己薑黃蠶砂杏仁石膏滑石毛氏風濕相搏一身腫痛周行之氣血為邪阻蔽仿仲景木防己湯法木防己石膏杏仁川桂枝威靈仙羌活洪四三濕盛生熱生痰漸有痿痹之狀乃陽明經隧為壅不可拘執左屬血右屬氣也金匱云經熱則痹絡熱則痿今有痛處治在氣分濕熱生於術三錢生黃耆三錢片薑黃一錢川羌活一錢半夏一錢防風五分加桑枝五錢又耆朮固衛升陽左肩胛痛未已當治營中以辛甘化風法黃耆當歸炙草防風桂枝肉桂張骨骱走注行痛身體重著不能轉舒此為濕痹但陽虛之質忌辛散苦寒藥桂枝木木防己苡仁羚羊角大豆黃卷杏仁橘紅方左脈弦大面赤痰多大便不爽此勞怒動肝令陽氣不交於陰陽維陽蹺二脈無血營養內風爍筋跗廉痹痛暮夜為甚者厥陰旺時也病在脈絡金斛晚蠶砂漢防己黃柏半夏萆薢大檳榔汁又痛右緩左痛濕熱未盡液虛風動也生地阿膠龜版穭豆皮茯苓通草某十九舌白目彩油光腰痹痛濕邪內蘊尚未外達必分利濕邪為主杏仁蘇梗木防己厚朴茯苓皮花粉晚蠶砂茵陳吳氏風濕化熱蒸於經絡周身痹痛舌乾咽燥津液不得升降營衛不肯宣通怕延中痿生石膏杏仁川桂枝苡仁木防己又石膏杏仁木防己炒半夏橘紅黑山梔薑汁竹瀝石脈數右大溫漸化熱灼及經絡氣血交阻而為痹痛陽邪主動自為遊走陽動化風肉腠浮腫俗諺稱為白虎歷節之謂川桂枝木防己杏仁生石膏花粉鬱金又照前方去鬱金加寒水石晚蠶砂通草又脈大已減右數象未平痛緩什七肌膚甲錯發癢腹微滿大便不通陽明之氣未化熱未盡去陰已先虛不可過劑麻仁鮮生地川斛丹皮寒水石鉤藤某久痹釀成歷節舌黃痰多由濕邪阻著經脈漢防己嫩滑石晚蠶砂寒水石杏仁苡仁茯苓宋病者長夏黴天奔走內踝重墜發斑下焦痛起繼而筋掣及於腰窩左臂經云傷於濕者下先受之夫下焦奇脈不流行內踝重著陰維受邪久必化熱爍血風動內舍乎肝膽所謂少陽行身之側也診得右脈緩左脈實濕熱混處血絡之中搜逐甚難此由濕痹之症失治延為痿廢沉疴矣三年病根非倉猝迅攻姑進先通營絡參之奇經為治考古聖治痿痹獨取陽明惟通則留邪可拔耳濕熱入血絡鹿角霜生白朮桂枝茯苓撫芎歸鬚白蒺藜黃菊花某初病濕熱在經久則瘀熱入絡膿瘍日多未已漸而筋骨疼痛金匱云經熱則痹絡熱則痿數年宿病勿事速攻夜服蒺藜丸午服犀角元參連翹心野赤豆皮細生地丹參薑黃桑枝張二九四肢經隧之中遇天令陰晦疼痛拘攣癰疽瘍潰膿其病不發瘍愈病復至抑且時常衄鼽經以風寒濕三氣合而為痹然經年累月外邪留著氣血皆傷其化為敗瘀凝痰混處經絡蓋有諸矣倘失其治年多氣衰延至廢棄沉疴痰血壅塞經絡當歸鬚四兩乾地龍二兩穿山甲二兩白芥子一兩小撫芎一兩生白蒺二兩酒水各半法丸沈從來痹症每以風寒濕三氣雜感主治召恙之不同由乎暑暍外加之濕熱水穀內蘊之濕熱外來之邪著於經絡內受之邪著於腑絡故辛解汗出熱痛不減余以急清陽明而致小愈病中復反者口鼻復吸暑熱也是病後宜薄味使陽明氣爽斯清陽流行不息肢節脈絡舒通而痹痿之根盡拔至若溫補而圖速效又非壯盛所宜暑傷氣濕熱入絡人參茯苓半夏廣皮生於術枳實川連澤瀉竹瀝薑汁法丸暮服白蒺藜丸某冬月溫舒陽氣疏豁風邪由風池風府流及四末古為痹症忽上忽下以風為陽陽主動也診視鼻明陽明中虛可見卻邪之劑在乎宣通經脈衛陽疏風邪入絡桂枝羚羊角杏仁花粉防己桑枝海桐皮片薑黃又症已漸安脈絡有流通意仲景云經熱則痹絡熱則痿知風淫於內治以甘寒寒可去熱甘味不傷胃也甜杏仁連翹元參花粉綠豆皮梨汁又餘熱尚留下午足寒晨餐頸汗胃未調和食不甘美因大便微溏不必過潤北沙參麥冬川貝川斛陳皮穀芽沈三七用養肝血熄風方右指仍麻行走則屈伸不舒戌亥必心熱煩蒸想前法不效杞歸辛溫陽動風亦動矣議去辛用鹹若疑慮途次瘧邪未盡致脈絡留滯兼以通逐緩攻亦妙肝陰虛瘧邪入血絡熟地龜膠阿膠秋石天冬麥冬五味茯神蜜丸晨服桃仁穿山甲乾地龍撫芎歸鬚丹皮紅花沙苑香附汁丸夜服某仲景以經熱則痹絡熱則痿今痹痛多日脈中筋急熱入陰分血中致下焦為甚所謂上焦屬氣下焦屬血耳熱入下焦血分柏子仁當歸丹皮鉤藤川斛沙苑又痹痛右膝甚生虎骨柏子仁牛膝萆薢苡仁茯苓某四八脈弦勁右足踝臁腫痛得暖得摩稍適此風寒濕三氣混入經隧而為痹也當用辛溫宣通經氣為要風寒濕入下焦經隧活絡丹一丸陳酒下某痹痛在外踝筋骨妨於行走邪留經絡須以搜剔動藥川烏全蠍地龍山甲大黑豆皮某病後過食肥膩氣滯熱鬱口膩黏涎指節常有痹痛當從氣分宣通方法氣滯熱鬱蘇梗杏仁蔞皮鬱金半夏曲橘紅陳五四勞動太過陽氣煩蒸中年液衰風旋周身痹痛此非客邪法宜兩調陽明厥陰肝胃虛滯黃耆生白朮制首烏當歸白蒺藜黑穭豆皮張五三煩勞鬱勃之陽變現熱氣內風內經以熱淫風消必用甘寒前議謂酒客不喜甘味且痰多食少亦忌甘膩滋滯用清少陽膽熱者酒氣先入肝膽也酒汁濕著腸胃受之理明以通胃胃腸氣機流行食加滑泄頗減今者氣熱當午上冒經絡痹痛亦減於平日主以和陽甘寒宣通經脈佐之肝膽風熱童桑羚羊角天門冬枸杞子白蒺藜丹皮茯苓霍山石斛共熬膏某氏血虛風痹骨骱腫痛羚羊角細生地元參當歸桂枝桑枝白蒺藜金三二痹痛在下重著不移論理必系寒濕但左脈搏數經月遺泄三四痛處無形豈是六淫邪聚然隧道深遠藥餌未易奏功佐以艾灸冀得效靈精血虛枸杞子肉蓯蓉虎骨膠麋角膠杜仲桑椹子天冬沙苑茯苓溶膠丸孫脈右大陽明空氣短閃爍欲痛氣虛人參生黃耆熟白朮炙草廣皮當歸白芍半夏防風根羌活又益氣頗安知身半以上痹痛乃陽不足也人參黃耆熟於朮炙草桂枝歸身白芍川羌沈痹痛在右氣弱有痰生於術川桂枝川獨活片薑黃白茯苓陳防己王辛香走竄宣通經隧壅結氣分之濕有卻病之能無補虛之益大凡藥餌先由中宮以布諸經中焦為營氣之本營氣失養轉旋目鈍然攻病必藉藥氣之偏朝夕更改豈是去疾務盡之道另於暮夜進養營一貼營虛人參茯苓桂枝木炙草當歸炒白芍南棗吳三六筋縱痛甚邪留正痹當此天暖間用針刺以宣脈絡初補氣血之中必佐宣行通絡之治筋痹生黃耆防風桂枝炒黑常山歸身青菊葉汁某痹痛偏左入夜尤甚血中之氣不行血中氣滯歸鬚桑枝苡仁白疾黎薑黃木防己劉三八周禮採毒藥以供醫事蓋因頑鈍沉痼著於軀殼非臟腑虛損故必以有毒攻拔使邪不留存凝著氣血乃效既效矣經云大毒治病十去其五當此只宜愛護身體勿勞情志便是全功道理愚人必曰以藥除根不知天地之氣有勝有復人身亦然穀食養生可御一生藥餌偏勝豈可久服不觀方士煉服金石丹藥疽發而死者比比血虛絡澀何首烏黑芝麻桑枝桂枝湯泛丸某脈沉小數營中留熱骱骨尚有微疼宜通經絡佐清營熱營中熱鉤藤細生地當歸鬚白蒺藜丹皮片薑黃此症與風病相似但風則陽受之痹則陰受之故多重著沉痛其在內經不越乎風寒濕三氣然四時之令皆能為邪五臟之氣各能受病其實痹者閉而不通之謂也正氣為邪所阻臟腑經絡不能暢達皆由氣血虧損腠理疏豁風寒濕三氣得以乘虛外襲留滯於內致濕痰濁血流注凝澀而得之故經云三氣雜至合而為痹又云風勝為行痹寒勝為痛痹濕勝為著痹以及骨痹筋痹脈痹肌痹皮痹之義可知痹病之症非偏受一氣足以致之也然而病症多端治法亦異余亦不能盡述茲以先生治痹之法為申明一二有衛陽疏風邪入絡而成痹者以宣通經脈甘寒去熱為主有經脈受傷陽氣不為護持而為痹者以溫養通補扶持生氣為主有暑傷氣濕熱入絡而為痹者用舒通脈絡之劑使清陽流行為主有風濕腫痛而為痹者用參朮益氣佐以風藥壯氣為主有濕熱傷氣及溫熱入血絡而成痹者用固衛陽以卻邪及宣通營絡兼治奇經為主有肝陰虛瘧邪入絡而為痹者以鹹苦滋陰兼以通逐緩攻為主有寒濕入絡而成痹者以微通其陽兼以通補為主有氣滯熱鬱而成痹者從氣分宣通為主有肝胃虛滯而成痹者以兩補厥陰陽明為治有風寒濕入下焦經隧而為痹者用辛溫以宣通經氣為主有肝膽風熱而成痹者用甘寒和陽宣通脈絡為主有血虛絡澀及營虛而成痹者以養營養血為主又有周痹行痹肢痹筋痹及風寒濕三氣雜合之痹亦不外乎流暢氣血祛邪養正宣通脈絡諸法故張景岳云治痹之法只宜峻補真陰宣通脈絡使氣血得以流行不得過用風燥等藥以再傷陰氣亦見道之言也鄒滋九徐評案多重複可刪既知風寒濕為痹則盡屬外邪可知而用人參及溫補之藥者十居二三恐有留邪之患凡屬形體之疾當外治不明外治之法服藥雖中病僅得醫術之半耳痙厥李先因嘔吐腹痛隨即昏迷此氣火痰上蒙清神為厥先用烏梅擦牙令牙關得開然後用藥痰火上閉至寶丹三分某陽氣暴張精絕令人煎厥煎厥細生地一兩阿膠三錢出山鉛打薄五錢調珍珠末一錢又煎厥者下焦陰液枯燥沖氣上逆為厥議用鹹寒降逆血肉填陰細生地元參龜膠阿膠淡菜蚌水又液涸消渴都是臟陰為病前議填陰藥汁濃膩不能多進但胃口不醒生氣何以再振陽明陽土非甘涼不復況肝病治胃自來有諸人參麥冬川斛新會皮白粳米干佩蘭葉王四一經云煩勞則張精絕闢積於夏令人煎厥夫勞動陽氣弛張則陰精不司留戀其陽雖有若無故曰絕積之既久逢夏季陽正開泄五志火動風生若煎熬者然斯為暈厥耳治法以清心益腎使肝膽相火內風不為暴起然必薄味靜養為穩連翹心元參心竹葉心知母細生地生白芍某二九腎厥由背脊而升發時手足逆冷口吐涎沫喉如刀刺蓋足少陰經脈上循喉嚨挾舌本陰濁自下上犯必循經而至仿許學士椒附意通陽以泄濁陰耳腎厥炮附子淡乾薑川椒胡蘆巴半夏茯苓薑汁泛丸某腎厥氣逆至頭玉貞丸二十粒盛四九臍上心下熱熾咽喉間陳腐氣遂神昏僕厥經時汗出而醒病來口湧血沫乃膻中熱擁以致心竅受蒙若非芳香清透不能宣通絡中瘀痹膻中熱鬱心竅蒙生烏犀角一兩天竺黃一兩丹參一兩鬱金一兩云茯神一兩石菖蒲五錢麝香一錢冰片五分各生研野赤豆皮煎湯泛丸竹葉湯送下二錢食後服謝女熱鬱於內則機竅不靈春令升泄木火化風旋擾瘛瘲搐搦有癲癇之慮不可進通經再劫其陰液細生地鬱金犀角丹參石菖蒲生白芍竹瀝又火淫於內治以苦寒佐以鹹寒黃連黃芩黃柏黑山梔牡蠣生地衝入方諸水又脈左堅經阻半載戌亥陰時厥逆肢掣逾時方蘇即欲渴飲龍薈宣竅鹹苦清火未效且大便兩旬不解定是熱結在血仿古人厥應下之義用張子和玉燭散玉燭散羅溫邪內陷津液被劫厥陽挾內風上逆遂致痙厥溫邪劫液風陽上逆生牡蠣阿膠熟地炭生白芍炒遠志石菖蒲又厥陰誤進剛藥五液劫盡陽氣與內風鴟張遂變為痙平昔內損繼以暴邪本屬難調此陰氣竭絕戌亥當防熟地炭磁石生白芍木瓜遠志茯神毛瘦人而病溫熱神呆舌赤診脈時兩手牽掣震動此津液受劫肝風內鼓是發痙之原議以養胃汁熄肝風務在存陰耳用仲景復脈湯法去參薑桂余脈細促神迷舌縮言謇耳聾四肢牽引牙關不緊病已月餘乃溫邪劫液陽浮獨行內風大震變幻痙厥危疴議以育陰熄風法必得痙止神清方有轉機阿膠二錢雞子黃一枚人參秋石拌烘一錢天冬一錢細生地二錢白芍一錢半又神氣稍蘇脈來斂靜五液交涸風陽尚動滋液救其焚燎清補和陽去熱用藥全以甘寒津液來復可望向安阿膠人參淡菜鮮生地天冬川斛毛少陰不藏溫邪深入喘促汗出渴不多飲舌辛似縮症非輕小擬用復脈湯為邪少虛多之治去姜又舌絳汗泄齒燥痰膩熱劫津液最防痙厥復脈湯去薑桂唐積勞伏暑欲寐時心中轟然上升自覺神魂縹緲此皆陽氣上冒內風鼓動所以陡然昏厥暑邪內陷胞絡閉結石膏知母甘草粳米生地麥冬竹葉心方熱閉神狂因乎食復畏人與肢筋牽動仍屬暑病變痙通三焦以清神明冀有轉機紫雪丹二錢又舌欲痿膚燥筋掣熱劫脂液殆盡為痙用河間甘露飲再服紫雪丹一錢楊暑由上受先入肺絡日期漸多氣分熱邪逆傳入營遂逼心胞絡中神昏欲躁舌音縮手足牽引乃暑熱深陷謂之發痙熱閉在裡肢體反不發熱熱邪內閉則外脫豈非至急考古人方法清絡熱必兼芳香開里竅以清神識若重藥攻邪直走腸胃與胞絡結閉無干涉也犀角元參鮮生地連翹鮮菖蒲銀花化至寶丹四丸金暑熱結聚於裡三焦交阻上則神呆不語牙關不開下則少腹沖氣小溲不利邪結皆無形之熱閉塞漸有痙厥之狀昨大便既下而現此象豈是垢滯議芳香宣竅通解在裡蘊熱紫雪丹一錢五分開水化勻三服鮑舌白渴欲冷飲氣促嗆咳而呃胸悶昏譫此暑風濕熱穢濁痹塞宿垢尚在小腸旬日間漸變痙厥是為險機議逐穢結以冀稍清大杏仁連翹心竹葉心川貝母菖蒲根汁辰砂益元散煎藥化牛黃丸一服蔡暑濕熱都著氣分乃消食苦降滋血亂治熱熾津涸舌板成痙究竟邪閉阻竅勢屬不穩人參生甘草石膏知母粳米潘二八肝陽化風上冒為厥風陽內爍脂液涸而作痛此非實症剛燥忌用肝風生地阿膠牡蠣天冬茯神生白芍夏五二中年以後陽氣日衰是下焦偏冷陽不及護衛周身氣分更虛右肢如痿當春地氣上升身中肝風大震心嘈嗔怒痰湧音啞乃厥象也皆本氣自病最難見效熟地熟淡附子牛膝炭炒麥冬遠志炭茯苓馬面青㿠白入夜顴頰漸赤耳聾舌心干板而縮並不渴飲間有寒戰後熱此厥陰肝臟液涸風旋勢成痙厥危症勉從經旨之訓肝苦急當食甘以緩之甘麥大棗湯加阿膠陸面青頭痛動搖手足搐搦牽掣驚嚇惱怒病從肝起如飢求食晝夜無寐都是肝風盤旋鼓舞漸為癇厥此乃五志之病阿膠牡蠣生地天冬小麥生白芍某沖氣巔脹厥龍薈丸一錢二分顧此痿厥也蓋厥陰風旋陽冒神迷則為厥陽明絡空四末不用而為痿厥午後黃昏乃厥陰陽明旺時病機發現矣凡此皆屬絡病金匱篇中有之仲景云諸厥宜下下之利不止者死明不下降之藥皆可止厥但不可硝黃再傷陰陽耳但積年沉疴非旦夕速效可知矣活鱉甲真阿膠方諸水鮮生地元參青黛又照前方去元參加天冬厥從肝起其病在下木必得水而生陰水虧斯陽風爍筋而絡中熱沸即厥拙擬血屬介類味鹹入陰青色入肝潛陽為法又陰絡空隙厥陽內風掀然鼓動而為厥余用鹹味入陰和陽介類有情之潛伏頗見小效但病根在下深遠湯劑輕浮焉能填隙改湯為膏取藥力味重以填實之亦止厥一法鮮鱉甲敗龜版豬脊髓羊骨髓生地天冬阿膠淡菜黃柏熬膏早服七錢午服四錢林據說六七年前驚駭起病氣從左脅有聲攻及胸膈心中脹極氣降脹減必汗出溲溺此屬肝厥凡煩勞動怒即刻舉發肝木風火內寄其來必驟且有聲音久恙非湯藥可投緩調須用丸藥更發作自必輕減人參乾薑附子桂枝川椒小川連川楝子當歸白芍烏梅肉丸顧平昔腸紅陰絡久傷左脅下宿瘕肝家風氣易結形瘦面青陰虛陽氣易冒血絡不得凝靜諸陽一併遂為厥沖氣自下犯胃為呃症似蓄血為狂奈脈細勁咽喉皆痛真陰枯槁之象水液無有風木大震此剛劑強鎮不能熄其厥冒耳生雞子黃一枚真阿膠二錢淡菜泡洗五錢龜版五錢衝入熱童便一杯戴酒客中虛多濕陽明素虛厥陰來乘當穀雨土旺用事風木與陽俱升逆鬱冒而厥此平昔積勞內因與外邪無涉閱醫多用風藥是再傷肌表護衛之陽乃召風以致中耳川桂枝羚羊角炒半夏橘紅明天麻茯苓當歸鉤藤吳三十肝風癇厥迅發莫制都因腎真內怯平素多遺診脈芤弱議用固本丸固本加五味萸肉龍骨金箔蜜丸謝五八有年下虛春木自地而升陽浮上蒙清竅經云下虛上實為厥癲疾肝風內震倘加惱怒必致厥僕痱中大忌攻痰祛風藥熟地天冬萸肉五味牛膝龜甲磁石茯神遠志菖蒲夏十九少腹氣攻有形嘔吐頭脹陰脈不至頭而厥陰脈上至巔頂四肢逆冷即厥象也不是瘧母宿冷肝脈環繞陰器為遺泄厥陰寒厥炒黑川椒川楝子炒橘核青木香小茴香茯苓王右脈已伏左小緊四肢冰冷乾嘔煩渴厥陰濁泛胃陽欲絕此屬痛厥姑以辛熱泄濁通陽泡淡吳萸製附子川楝子延胡索淡乾薑茯苓又脈微為無陽下利冷汗嘔逆不食肢厥不肯回陽一團濁陰阻蔽卻有閉脘之危議四逆之屬護陽驅濁人參淡附子枳實茯苓生淡乾薑又肢厥噁心吞酸胸滿大便不通有六日川連淡乾薑人參枳實陳皮半夏茯苓史溫熱已入厥陰陰傷致風陽上巔遂為痙厥厥發醜寅陽明少陽之陽震動昨進鹹苦清其陰分之熱已效今復入鎮陽以止厥厥陰熱邪生地天冬阿膠雞子黃生龍骨小麥蔣眩暈心痛脹嘔吐涎沫周身麻木此厥陰肝臟中陽過胃貫膈逆沖不已有痙厥之意川連吳萸煮乾薑川楝子烏梅牡蠣白芍又開泄和陽入陰已效當停煎藥龍薈丸程厥邪熱深生薑性辛溫大泄肝陰陽遂上冒心熱暈厥但陰虛熱熾苦寒不可多進以滋陰卻熱為穩生鱉甲鮮生地生白芍知母山梔橘紅張未病先有驚恐先寒戰後發熱心中極熱乾嘔煩躁渴飲冷仍不解渴診脈小弦舌白無胎曾肢冷如冰此熱邪已入厥陰肝經所謂熱深厥深也病全入里極為棘手議用紫雪丹開深伏之熱結取其芳香宣竅冀得躁擾勢緩方有轉機紫雪丹二錢王心中疼熱耳聾自利熱邪已入厥陰三日不厥方有好音鬱金川連秦皮黃芩連翹心石菖蒲汁某先發水痘已感冬溫小愈不忌葷腥餘邪復熾熱不可遏入夜昏煩輒雲頭痛邪深走厥陰所以發厥診脈兩手俱細是陽極似陰鼻煤舌乾目眥黃多屬邪閉壞敗諒難挽回用涼膈散伍女室女經來衝脈自動動則陽升內風繞旋不息為薄厥煎厥陽明虛胃失降厥陰熱肝愈橫風陽上冒清空神迷諸竅似阻皆入夏大地發泄之徵本虛表實先理其實議用局方龍薈丸純苦直降非湯飲留連腸胃之比每服三錢不拘二三次分服接用復脈法去參薑桂肝風爍陰施氏諸厥屬肝肝病犯胃為嘔逆腹痛乃定例也診脈虛小望色㿠白據述懷妊病竟不發思中流砥柱斯肝木凝然則知培植胃土乃治病法程矣肝逆胃虛六君子去朮皮加芍藥木瓜煨姜南棗某氏厥屬肝病幾番病發都因經水適來夫血海貯聚既下斯衝脈空乏而風陽交動厥之暴至之因由也鹹寒濡潤亦和陽泄內風之義治之未應下焦獨冷喉嗆胸痹思衝脈乃陽明所屬陽明虛則失闔厥氣上犯莫遏內經治肝不應當取陽明制其侮也暫用通補入腑取乎腑以通為補小半夏湯加白糯米龔三一諸厥皆隸厥陰疝瘕心熱脅脹中消便難乃肝陽內風妄動消爍犯及陽明矣經言治肝不應當取陽明肝胃一臟一腑相對不耐溫補者是肝用太過肝體不及也九孔石決明淮小麥清阿膠細生地天冬茯神陳嗔怒微厥肝陽升舉宜益胃陰以制伏怒人參冷沖麥冬茯神鮮蓮子竹葉心生甘草微溫服葉氏脈右大熱升風動鬱冒為厥宗陳無擇羚羊角散方奇脈虛風陽動羚羊角小生地元參丹參連翹黑豆皮又厥後驚惕汗泄陽風無制都緣陰枯不主戀陽議用六味益陰和陽炒六味去山藥加人參秋石又渴不欲飲陰不上乘況寐醒神識不靜易驚汗出法當斂補人參萸肉炭熟地五味茯神遠志又半月經水兩至痛自下焦衝突而厥病由陰維衝任蓋八脈所司也此養營僅到中宮所以無效蓯蓉鹿角霜當歸柏子霜桂枝木茯苓又前法已中病情須從奇經治義照前方去桂枝木加鹿角膠又病去八九僅以溫補下元為法不必窮治淡蓯蓉炒杞子當歸柏子仁茯苓小茴香陶氏脈數厥止熱在營中心營熱犀角元參丹皮連翹心膽星橘紅王口鼻觸入異氣胃傷嘔吐土衰則木克肝風內橫三蟲擾動為痛從蛔厥論治蛔厥嘔吐川椒乾薑桂枝木川楝子人參川連烏梅生白芍黃二十據述十一年前夏秋間多用井水鹽梅因此昏厥以後三五日一發病愈雖醒日瘦日減間有語言不自接續想其至理水鹽梅酸大泄肝腎臟陰厥者陽氣逆亂冒神憒憒勢成沉痼非癇厥門治痰治火清竅者是臟陰受病臟主乎藏蓄醫偏搜逐劫爍凡陰涸欲絕譬諸油盡燈焰忽明忽昏撲然息矣先聖先賢從無成法未敢湊藥欺人陰涸欲絕常用人乳一杯某脈左動如數右小濡弱病起嗔怒即寒熱汗出心悸繼而神魂自覺散越夫肝臟藏魂因怒則諸陽皆動所見病源無非陽動變化內風而為厥故凡屬厥症多隸厥陰肝病考內經治肝不外辛以理用酸以治體甘以緩急今精彩散失鎮固收攝猶慮弗及而方書泄肝平肝抑肝方法盡多至於補法多以子母相生為治此病全以肝腎下焦主法為正所服醫藥並無師古之方未識何見阿膠一錢半雞子黃一枚人參一錢生地三錢金箔五片某冷自足上貫於心初起周身麻木今則口鼻皆有冷氣病起驚恐內傷肝腎為厥衝脈隸於肝腎二臟失藏沖氣沸亂其脈由至陰而上故多冷耳肝腎虛沖氣逆淡蓯蓉熟地炭五味子紫石英茯苓牛膝汪胃陽傷殘濁氣上攻將為痛厥當治陽明之陽痛厥吳茱萸薑汁半夏茯苓粳米又照前方去吳萸加廣皮某熱甚而厥其熱邪必在陰分古稱熱深厥深病中遺泄陰傷邪陷發表攻裡斷難施用和正托邪是為正法瘧厥草果知母人參半夏薑汁烏梅厥者從下逆上之病也痙者明其風強之狀也所以二字每每並言原與傷寒門所載者有間想是症總由氣血日偏陰陽一併而成譬如風雷之猛烈鬱極而發也若發而漸復者猶可轉危為安若發而轉逆者必至直拔根荄乃已斯存亡之機在乎命臟之盈虧耳考方書之名目不一致病之因由亦繁大抵可吐者如痰食填塞於胸中用瓜蒂散之類及燒鹽探引方法可清可折者如厥陽壯火升逆而莫制用玉女煎及宣明龍薈丸法可開可降者如氣厥薄厥而形氣暴絕有五磨飲子及蒲黃酒法穢濁蒙神而昏亂無知有牛黃至寶及蘇合香丸之兩法飛屍卒厥先宜酒醴以引導並可按穴而施針法及灸法若從虛而論者如內奪而厥則為喑痱有地黃飲子之通攝下焦法煩勞陽張令人煎厥有人參固本加入金箔方諸水為壯水制火法血厥而陽騰絡沸參乎從陰從陽法色厥而精脫於下急與大劑挽元法腎厥宗許學士之椒附以通陽蛔厥有仲景之安蛔法陽極用救陰峻劑陰極有扶陽方法種種規模已為全備及參案中先生於是症獨重在肝蓋肝者將軍之官善幹他臟者也要知肝氣一逆則諸氣皆逆氣逆則痰生遂火沸風旋神迷魂蕩無所不至矣若犯於上者不免凌金爍液有門冬湯及瓊玉膏之補金柔製法若犯於中而為嘔為脹者用六君去朮加木瓜姜芍之類及附子粳米湯加人參為補胃凝肝法若震及心脾而為悸為消者用甘麥大棗湯合龍蠣之屬為緩急重鎮法若挾少陽之威而乘巔搖絡者用羚羊鉤藤元參連翹之劑為熄風清絡法若本臟自病而體用失和者以椒梅桂芍之類為益體宣用法若因母臟之虛而擾及子臟之位者用三才配合龜甲磁朱及復脈減辛味復入雞黃之屬為安攝其子母法至於痿厥之治尤覺神奇取血肉介類改湯為膏謂其力味重實填隙止厥最速此豈非補前人之未備開後學之法門者乎參是案者幸毋忽諸邵新甫徐評案中所載甚雜或有癇症或有痙症或有怔忡症或有火鬱症或有驚恐症或有痰迷症皆謂之厥此編書者之過也至於當用人參則厥症十不得一者乃居其三四恐留邪之害必有受之者矣驚某驚則氣逆陽泄為汗用重鎮壓驚氣逆陽泄川桂枝木五分黃耆去心二錢人參一錢龍骨煅一錢半左顧牡蠣煅一錢半某驚恐傷神不語痰火阻竅建蘭根汁薑汁金汁共和一處隔湯燉徐徐服某因驚外觸見症神怯欲迷已經肢厥冷汗怕動仿鎮怯理虛臟燥陽浮人參茯神棗仁生龍骨石菖蒲炙草南棗陳淮小麥早上服楊氏經血期至驟加驚恐即病寒熱心悸不寐此驚則動肝恐則傷腎最慮久延臟燥即有肝厥之患淮小麥天冬龍骨牡蠣白芍茯神陳二九心中若煙霧噯則氣散少頃即聚易驚恐畏懼嘔逆不渴自述難鳴苦況瀉後亡陰熱藥劫陰前議和胃不應主以鎮之攝之炙甘草淮小麥大棗棗仁青龍骨某驟驚陽逆暴厥為肝膽病晝則心悸是陽動夜則氣墜屬陰虧用收固腎肝可效肝腎陰虛陽浮生地五錢萸肉一錢龍骨三錢牡蠣三錢五味一錢真金箔三張經云驚則傷膽恐則傷腎大凡可畏之事猝然而至者謂之驚若從容而至可以宛轉思維者謂之恐是驚急而恐緩也夫驚症大人亦有之小兒最多因其神志未堅膽氣未充故每遇稍異之形聲即陡然而驚矣驚之所傷由心猝及乎膽由膽即及乎肝遂致心主君火兼肝膽中相火風木驟然而起症現搐搦瘈瘲神昏譫妄肢冷厥逆吐乳身熱目竄口噤種種所患無非心肝膽之現症而實毫無外感之風邪此因外受之驚而動內之木火風也故但當以一驚字立為病名斯乃切當因其內風沸起遂加一風字因病來迅速又加一急字故遂有急驚風之病名此已屬牽強附會矣至於今之混稱為急驚風者更屬背謬總因小兒陰氣未充外感之風溫風熱風火以及寒邪化熱並燥火諸症最易傷陰陰傷則血不營筋液傷則脈絡滯澀熱盛亦能使內之木火風相繼而起所現之症與受驚者類亦相同然實非因受驚而起其所治之法大有區別如果因驚者治宜安養心神鎮驚定怯甘涼清內熱柔潤熄肝風或少佐芳香通其竅絡舒其結閉至於剛熱燥澀表散之藥概不可用若無驚而但感外邪者有宜於涼散有宜於溫散有宜於苦寒清火有宜於甘溫扶陽或補或瀉自當按六淫之邪而施治與驚字毫無關涉奈今之醫者每遇非驚之症因不能辨明六氣中所傷何氣卻定不出病名遂強將一驚字混入藉口漫稱為急驚風症掩飾欺人病家亦酷信之以為小兒防範難周焉有無驚之理其所訂之方錯雜遊移不知治驚總以心肝膽為主若治時邪須兼肺胃脾腎三焦營衛經絡而論大不相同也更有一種稱慢驚風之病名者尤屬怪誕不經必當亟為駁正有論在幼科吐瀉之後宜合觀之華岫云徐評風字最妙凡肝膽之疾無不因風肝為風臟經云風者百病之長也不但外風名風即內風亦名風故大人口眼歪斜神昏厥冒亦名中風與小兒亦相類何獨小兒之病不得名風也癲癇孫十八神呆脈沉因驚恐以致癇疾語言不甚明瞭此痰火阻其靈竅深戒酒肉厚味靜室善調經年可愈驚恐痰火升黃連黃芩山梔枳實橘紅膽星菖蒲遠志陳動怒驚觸乃外加擾內致五志陽越莫制古人集癲癇狂辨以陽並於陰陰並於陽互異今以陽逆狂亂非苦藥之降未能清爽其神識也當歸龍薈丸三錢倪驟然驚惕陽氣上逆遂神呆不寐倏爾叫喊不食不飢不便有癲癇之象龍薈丸二服盧十四痰病已成癇疾難愈竹節白附子天竺黃陳膽星石菖蒲川連鬱金茯神橘紅汪驚恐陽升風動宿癇遂發吐痰嘔逆不言絡脈失利也陽氣鬱竅絡阻羚羊角石菖蒲膽星遠志連翹鉤藤天麻橘紅曹十四春病及長夏癇厥屢發前用龍薈丸意苦泄肝膽初服即瀉此久病陰分已虛議理陰和陽入酸以約束之生雞子黃阿膠川連黃柏生白芍米醋金二十癇厥神呆肢強犀角羚羊角元參菖蒲炒半夏炒遠志鬱金橘紅吳驚狂乃木火擾動雖得平靜仍心悸怔忡夜臥不寐診脈虛細如絲已非痰火有餘議補心丹以理心之用木火動心神虛人參茯神棗仁元參丹參天冬麥冬生地川連柏子仁菖蒲桔梗遠志葉氏每遇經來紫黑癇疾必發暮夜驚呼聲震晝則神呆面青多笑火風由肝而至泄膽熱以清神再商後法木火鬱血滯丹皮丹參細生地黑山梔茺蔚子胡黃連調入琥珀末張二二入冬不寐癇疾遂發此陽不潛藏治在肝腎肝腎陽升用虎潛法某癲疾脈不鼓指議交心腎益神志火鬱心腎不交生地龜甲黃柏川連酒炒菖蒲茯神遠志山梔竹葉葉二九五志陽升神識迷惑忽清忽甚者非有形質之邪乃熱氣化風上巔致於竟夜不寐攻痰疏利決不效驗先以極苦之藥冀其亢陽潛降風陽陽亢生地龍膽草丹參木通山梔蘆薈青黛薄荷某平昔操持身心皆動悲憂驚恐情志內傷漸漸神志恍惚有似癲癇其病不在一臟矣醫藥中七情致損二千年來從未有一方包羅者然約旨總以陰陽迭偏為定評凡動皆陽當宗靜以生陰是議陽乘於絡臟陰不安斂攝鎮固久進可效家務見聞必宜屏絕百日為期勞心太過人參廉珠茯神棗仁炙草生龍骨萸肉五味金箔天地一陰陽也陰陽和則天清地寧一有偏勝遂有非常之變人身亦一陰陽也陰陽和則神清氣定一有偏勝自致不測之疴故內經曰重陽者狂重陰者癲癇與癲其原則同也古人集癲癇狂辨以為陽並於陰陰並於陽此誠不刊之論言乎現症狂則少臥不飢妄言妄笑甚則上屋逾垣其候多躁而常醒癲則或歌或哭如醉如癡甚至不知穢潔其候多靜而常昏癇則發作無時卒然昏僕筋瘛瘲口中作聲後人因其聲似分馬癇牛癇豬癇羊癇雞癇五名其候經時而必止推其病因狂由大驚大怒病在肝膽胃經三陽並而上升故火熾則痰湧心竅為之閉塞癲由積憂積鬱病在心脾胞絡三陰蔽而不宣故氣鬱則痰迷神志為之混淆癇病或由驚恐或由飲食不節或由母腹中受驚以致內臟不平經久失調一觸積痰厥氣內風猝焉暴逆莫能禁止待其氣反然後已至於主治察形證診脈候以辨虛實狂之實者以承氣白虎直折陽明之火生鐵落飲重製肝膽之邪虛者當壯水以制火二陰煎之類主之癲之實者以滾痰丸開痰壅閉清心丸泄火鬱勃虛者當養神而通志歸脾枕中之類主之癇之實者用五癇丸以攻風控涎丸以劫痰龍薈丸以瀉火虛者當補助氣血調攝陰陽養營湯河車丸之類主之狂癲癇三症治法大旨不越乎此今如肝風痰火者苦辛以開泄神虛火炎者則清補並施肝膽厥陽化風旋逆者以極苦之藥折之神志兩虛者用交心腎法勞神太過者宗靜以生陰意為斂補鎮攝方案雖未詳備而零珠碎玉不悉堪為世寶哉醫者惟調理其陰陽不使有所偏勝則鬱逆自消而神氣得反其常焉矣龔商年
