body:
  text: 卷六郁於五五郁損心陽陽墜入陰為淋濁由情志內傷即為陰虛致病見症亂治最為庸劣心藏神神耗如憒諸竅失司非偏寒偏熱藥治必得開爽冀有向安服藥以草木功能恐不能令其歡悅郁損心陽妙香散陸二六心脾氣結神志不清人參桔梗烏藥木香各三分磨汁又夜服白金丸又久郁心脾氣結利竅佐以益氣人參石菖蒲龍骨棗仁遠志茯神胡四六悲泣乃情懷內起之病病生於郁形象漸大按之堅硬正在心下用苦辛泄降先從氣結治心下痞結川連乾薑半夏薑汁茯苓連皮栝蔞季六九老年情志不適鬱則少火變壯火知飢脘中不爽口舌糜腐心脾營損木火劫爍精華肌肉日消惟怡悅開爽內起鬱熱可平但執清火苦寒非調情志內因鬱熱矣郁損心脾營內熱金石斛連翹心炒丹皮經霜桑葉川貝茯苓接服養心脾之營少佐苦降法人參川連炒丹皮生白芍小麥茯神某脘痛已止味酸乃肝鬱也肝鬱金石斛黑山梔丹皮半夏曲橘紅枇杷葉某初起左邊麻木舌強筋吊腦後痛痰阻咽喉此係肝風上引必由情懷鬱勃所致羚羊角連翹心鮮生地元參石菖蒲鬱金汁某氣鬱不舒木不條達噯則少寬逍遙散去白朮加香附某肝鬱成熱加味逍遙去白朮加鬱金某鬱熱吞酸溫膽湯加山梔丹皮鬱金薑汁炒黃連沈四三脈虛澀情懷失暢肝脾氣血多郁半載不愈難任峻劑議以局方逍遙散兼服補中益氣莫以中宮虛塞為泥肝脾氣血鬱吳四十勞倦嗔怒致傷病在肝脾久有腦泄髓脂暗損暫以解鬱繼當宣補鉤藤生香附丹皮桑葉神麯白芍茯苓廣皮葉氏悒鬱動肝致病久則延及脾胃中傷不納不知味火風變動氣橫為痛為脹疏泄失職便秘忽瀉情志之郁藥難霍然數年久病而兼形瘦液枯若再香燥劫奪必變格拒中滿與辛潤少佐和陽柏子仁二錢歸鬚二錢桃仁三錢生白芍一錢小川連三分川楝子一錢某惱怒肝鬱思慮脾傷面黃脈澀寤不成寐宗薛氏法治之人參黃耆熟於朮茯神棗仁桂圓肉當歸炙草黑山梔丹皮遠志戴氏隱情曲意不伸是為心疾此草木攻病難以見長乃七情之郁損以丹溪越鞠方法香附川芎小川連茯苓半夏橘紅炒楂肉神麯漿丸程嫗脈弦澀外寒內熱齒痛舌乾無寐乃肝脾鬱結不舒鬱金鉤藤丹皮夏枯草生香附薄荷廣皮茯苓吳四一操持過動肝膽陽升胃氣日減脈應左搏從鬱熱治肝膽鬱熱丹皮黑山梔薄荷梗鉤藤廣皮白芍茯苓神麯陸二四郁傷筋脹心痛鉤藤生香附鬱金白蒺藜丹皮薄荷廣皮茯苓王六三勞怒傷陽氣逆血鬱致痛痞脹便溏風木侮土前方既效與通補陽明厥陰肝犯胃氣逆血鬱大半夏湯加桃仁柏仁當歸薑棗湯法朱三二因抑鬱悲泣致肝陽內動陽氣變化火風有形有聲貫膈沖咽自覺冷者非真寒也內經以五志過極皆火但非六氣外來芩連之屬不能制伏固當柔緩以濡之合乎肝為剛臟濟之以柔亦和法也肝鬱風火升生地天冬阿膠茯神川斛牡蠣小麥人中白熬膏趙四四鬱勃日久五志氣火上升胃氣逆則脘悶不飢肝陽上僭風火凌竅必旋暈咽痹自覺冷者非真寒也皆氣痹不通之象病能篇以諸禁鼓慄屬火丹溪謂上升之氣從肝膽相火非無據矣生地阿膠玄參丹參川斛黑穭豆皮朱氏脈弦右大乳房刺痛經阻半年若遇勞怒腹痛逆氣上衝此邪郁既久少火化為壯火氣鈍不循胞脈遂痹治以泄少陽補太陰氣血流利鬱熱可解膽脾氣血鬱人參柴胡當歸白朮丹皮甘草茯苓吳三八脈弦澀數頸項結癭咽喉痛腫阻痹水穀難下此皆情志鬱勃肝膽相火內風上循清竅雖清熱直降難制情懷之陽是以頻藥勿效也木火上升喉腫痹鮮枇杷葉射干牛蒡子蘇子大杏仁紫降香朱情懷悒鬱五志熱蒸痰聚阻氣脘中窄隘不舒脹及背部上焦清陽欲結治肺以展氣化務宜怡悅開懷莫令郁痹綿延木火上升肺不肅降鮮枇杷葉杏仁栝蔞皮鬱金半夏茯苓薑汁竹瀝又脈左大弦數頭目如蒙背俞䐜脹都是鬱勃熱氣上升氣有餘便是火治宜清上羚羊角夏枯草青菊葉栝蔞皮杏仁香附連翹山梔又苦辛清解鬱勃頭目已清而膈噯氣頗覺穢濁此肝膽厥陽由胃繫上沖所致丹溪謂上升之氣自肝而出是其明徵矣川連薑汁半夏枳實桔梗橘紅栝蔞皮吳氏氣血鬱痹久乃化熱女科八脈失調漸有經阻瘕帶諸疾但先治其上勿滋膩氣機鬱熱先清上焦黑山梔皮炒黃川貝枇杷葉栝蔞皮杏仁鬱金橘紅徐氏火升頭痛來去無定期咽喉垂下心悸二便不爽帶下不已固奇經通補陽明及養肝熄風展轉未能卻病病從情志內傷治法惟宜理偏議先用滋腎丸三錢早上淡鹽湯送四服陰火上炎虞三四脈數舌白神呆得之鬱怒鬱熱犀角羚羊角野鬱金炒遠志鮮石菖蒲炒丹皮黑山梔茯神王三十痰多咽痛頻遭家難郁傷心中空洞嗆逆不已議與胃藥郁傷胃金匱麥門冬湯陸二五病起憂慮上損兩年調理幾經反復今夏心胸右脅之間常有不舒之象此氣血內郁少展支脈中必有痰飲氣阻是宣通流暢脈絡夏季宜進商矣郁損脈絡痰飲阻氣天竺黃茯神鬱金橘紅遠志石菖蒲丹參琥珀竹瀝法丸趙六二脈左澀右弦始覺口鼻中氣觸腥穢今則右脅板痛呼吸不利臥著不安此屬有年郁傷治當宣通脈絡血絡郁痹右脅痛金鈴子延胡桃仁歸鬚鬱金降香王女陰虛齒衄腸血未出閣鬱熱為多與養肝陰方鬱熱傷肝陰生地天冬阿膠女貞子旱蓮草白芍茯神烏骨雞張六六情志連遭鬱勃臟陰中熱內蒸舌絳赤糜乾燥心動悸若飢食不加餐內傷情懷起病務以寬懷解釋熱在至陰咸補苦泄是為醫藥肝腎鬱熱雞子黃清阿膠生地知母川連黃柏許厥陰少陰臟液乾涸陽升結痹於喉舌皆心境失暢所致藥無效者病由情懷中來草木涼藥僅能治六氣外來之偏耳肝腎液涸陽升喉痹熟地女貞天冬霍山石斛柏子仁茯神龍五六久鬱氣血不行升降皆鈍外涼內熱骨節沉痛肌腫腹膨膚腠無汗用藥務在宣通五郁六郁大旨經絡氣血鬱痹香附汁白蒺藜鉤藤丹皮山梔撫芎澤蘭薑黃神麯金氣血久郁成熱脘脅痹悶不通常有風疹腹痛瘀痹已深發時宜用通聖一劑半時以通調氣熱之郁土栝蔞皮枇杷葉黑山梔鬱金桃仁杏仁楊驚惶忿怒都主肝陽上冒血沸氣滯瘀濁宜宣通以就下因誤投止塞舊瘀不清新血又瘀絡中匝月屢屢反復究竟肝膽氣血皆郁仍宜條達宣揚漏瘍在肛得體中稍健設法旋覆花新絳青蔥管炒桃仁柏子仁趙氏瘰癧寒熱盜汗脘中瘕聚經期不來大便溏嗆咳減食春深至冬未痊此乃郁損成勞難治之症郁勞香附丹皮歸身白芍川貝茯苓牡蠣夏枯草胡氏頭項結核暮夜寒熱盜汗此乃憂鬱不解氣血皆虛倘若經阻便難調治炒當歸炒白芍炙草廣皮茯神鉤藤南棗張氏據說喪子悲哀是情志中起因郁成勞知飢不能食內珠忽陷忽脹兩脅忽若刀刺經先期色變瘀紫半年來醫藥無效者情懷不得解釋草木無能為矣人參當歸生白芍炙草肉桂炒杞子茯苓南棗素問六元正紀大論言五郁之發乃因五運之氣有太過不及遂有勝復之變由此觀之天地且有郁而況於人乎故六氣著人皆能鬱而致病如傷寒之邪鬱於衛鬱於營或在經在腑在臟如暑濕之蘊結在三焦瘟疫之邪客於募原風寒濕三氣雜感而成痹症總之邪不解散即謂之郁此外感六氣而成者也前人論之詳矣今所輯者七情之郁居多如思傷脾怒傷肝之類是也其原總由於心因情志不遂則鬱而成病矣其症心脾肝膽為多案中治法有清泄上焦鬱火或宣暢少陽或開降肺氣通補肝胃泄膽補脾宣通脈絡若熱鬱至陰則用鹹補苦泄種種治法未能按症分析詳論今舉其大綱皆因鬱則氣滯氣滯久則必化熱熱鬱則津液耗而不流升降之機失度初傷氣分久延血分延及郁勞沉疴故先生用藥大旨每以苦辛涼潤宣通不投燥熱斂澀呆補此其治療之大法也此外更有當發明者鬱則氣滯其滯或在形軀或在臟腑必有不舒之現症蓋氣本無形鬱則氣聚聚則似有形而實無質如胸膈似阻心下虛痞脅脹背脹脘悶不食氣瘕攻衝筋脈不舒醫家不察誤認有形之滯放膽用破氣攻削迨至愈治愈劇轉方又屬呆補此不死於病而死於藥矣不知情志之郁由於隱情曲意不伸故氣之升降開闔樞機不利雖內經有泄折達發奪五郁之治猶慮難獲全功故疏五過論有始富後貧故貴脫勢總屬難治之例蓋鬱症全在病者能移情易性醫者構思靈巧不重在攻補而在乎用苦泄熱而不損胃用辛理氣而不破氣用滑潤濡燥澀而不滋膩氣機用宣通而不揠苗助長庶幾或有幸成耳華岫云肝火秦氏年前肝風眩暈主以涼血分和陽熄風一年未發今歲正月春寒非比天暖開泄此番病發必因勞怒觸動情志至於嘔逆微冷倏熱交醜寅漸作耳鳴咽痹食納久留脘中想少陽木火盛於寅膽脈貫耳犯逆之威必向陽明而後上憑諸竅脈右澀大胃逆不降食味不甘而脘中逆亂熏蒸日熾營血內耗無以養心斯寤不肯寐心搖盪漾有難以鳴狀之象今頭重脘痹全是上焦為木火升騰阻遏清陽前方滋清血藥居多必不奏功今議湯劑方以苦降其逆辛通其痹然湯宜小其制度以久病體虛初春若此冬藏未為堅固可知其丸劑當以局方龍薈丸暫服半月再議風火上郁連翹一錢半黑梔皮一錢羚羊角一錢鮮菊葉三錢紫菀二錢鬱金八分大杏仁去皮尖勿研六粒土栝蔞皮一錢鮮菖蒲根四分忌鐵午服沈女腹痛少減嘔逆已止上焦熱下焦冷肝陽尚未和平擬進當歸龍薈法當歸龍膽草川楝子蘆薈川連吳萸大茴黃氏肝膽風火上郁頭面清空之筋掣不和治以清散羚羊角犀角山梔連翹栝蔞皮荷葉梗薄荷梗青菊葉鄭氏巔脹神迷經脈抽痛脹悶不欲納食一月經期四至此郁傷氣血成病龍薈丸二錢五分三服葉氏厥陽擾亂神明經色已黑肢冷麵青便秘龍薈丸一錢二分十服闕十八誦讀吟詠身雖靜坐而心神常動凡五志之動皆陽陽冒無制清靈遂蒙易旨以蒙乃外加之義述病發之時頭中欲掐脘欲撫摩二便必不自利此腑氣之窒由乎肝膽厥怫逆起見矣議從手經上焦治勞心陽動木火上蒙羚羊角連翹心元參石菖蒲根鬱金麥冬竹葉唐女脈左澀右弦氣火不降胸脅隱痛脘不爽最慮失血氣火鬱脘痛川貝山梔丹皮鬱金汁鉤藤栝蔞皮茯苓橘紅又氣火上郁脘中窒痛嘔涎先以開通壅遏香豉栝蔞皮山梔鬱金竹茹半夏曲杏仁葛嗔怒喧嚷氣火逆飛致血痹咽痛食物厭惡耳前後繞肩閃刺議解少陽怒動膽火夏枯草丹皮桑葉鉤藤山梔地骨皮朱五四頭痛神煩忽然而至五行之速莫如風火然有虛實內外之因非徒發散苦寒為事矣如向有肝病目疾喪明是陰氣久傷體質今厥陰風木司天春深發泄陽氣暴張即外感而論正內經冬不藏精春必病溫育陰可使熱清大忌發散蓋陰根久傷表之再傷陽劫津液仲景謂一逆尚引日再逆促命期矣余前主阿膠雞子黃湯佐地冬壯水芍甘培土亟和其厥陽沖逆之威鹹味入陰甘緩其急與內經肝病三法恰合今已入夏三日虛陽倏上煩躁頭痛當大滋腎母以蘇肝子補胃陰以杜木火乘侮旬日不致反復經月可望全好肝腎陰虛風陽上升人參熟地天冬麥冬龜膠阿膠北味茯神陸鼻左竅有血左肩胛臂痛皆君相多動營熱氣偏脈得右虛左數先以清肝通絡絡熱丹皮山梔羚羊角夏枯草蠶砂鉤藤連翹青菊葉肝者將軍之官相火內寄得真水以涵濡真氣以制伏木火遂生生之機本無是症之名也蓋因情志不舒則生郁言語不投則生嗔謀慮過度則自竭斯罷極之本從中變火攻衝激烈升之不熄為風陽抑而不透為鬱氣脘脅脹悶眩暈猝厥嘔逆淋閉狂躁見紅等病由是來矣古人雖分肝風肝氣肝火之殊其實是同一源若過郁者宜辛宜涼乘勢達之為妥過升者宜柔宜降緩其旋擾為先自竭者全屬乎虛當培其子母之臟至於犯上侮中乘下諸累散見各門可考邵新甫不寐倪多痛陽升陰液無以上注舌涸赤絳煩不成寐當益腎水以制心火心火鮮生地元參麥冬綠豆皮銀花竹葉心吳少陽鬱火不寐膽火丹皮半夏鉤藤桑葉茯苓橘紅程氏上晝氣逆填脘子夜寤不肯寐乃陽氣不降議用溫膽湯溫膽去枳實加金斛滾痰丸二錢五分顧四四須鬢已蒼面色光亮操心煩勞陽上升動痰飲亦得上溢靈樞云陽氣下交入陰陽蹺脈滿令人得寐今氣越外泄陽不入陰勉飲酒醴欲其神昏假寐非調病之法程凡中年已後男子下元先損早上宜用八味丸晚時用半夏秫米湯陽蹺脈虛某陽不交陰夜臥寐躁小半夏湯趙氏嘔吐眩暈肝胃兩經受病陽氣不交於陰陽蹺穴空寤不肯寐靈樞方半夏秫米湯主之又接用人參溫膽湯某四二脈澀不能充長肌肉夜寐不適脾營消索無以灌溉故耳當用歸脾湯意溫之脾營虛嫩黃耆於朮茯神遠志棗仁當歸炙草桂圓新會皮某肝陽不降夜無寐進酸棗仁法膽液虧陽升虛煩棗仁知母炙草茯神小麥川芎某不寐六十日溫膽諸藥不效嘔痰不適明系陽升不降用金匱酸棗仁湯棗仁知母茯苓川芎炙草陳陰精走泄復因洞瀉重亡津液致陽暴升胃逆食入欲嘔神識不靜無寐議酸棗仁湯棗仁五錢炙草五分知母二錢茯苓二錢某三三寤不成寐食不甘味尫羸脈細數澀陰液內耗厥陽外越化火化風燔燥煽動此屬陰損最不易治姑與仲景酸棗仁湯棗仁炒黑勿研三錢知母一錢半云茯神三錢生甘草五分川芎五分田臟液內耗心腹熱灼陽氣不交於陰陽蹺穴空令人寤不成寐靈樞有半夏秫米法但此病乃損及肝腎欲求陽和須介屬之咸佐以酸收甘緩庶幾近理肝腎陰虧陽浮龜膠淡菜熟地黃柏茯苓萸肉五味遠志又鹹苦酸收已效下焦液枯須填實肝腎龜鹿膠熟地蓯蓉天冬萸肉五味茯苓羊內腎不寐之故雖非一種總是陽不交陰所致若因外邪而不寐者如傷寒瘧疾等暴發營衛必然窒塞升降必然失常愁楚呻吟日夜難安當速去其邪攘外即所以安內也若因里病而不寐者或焦煩過度而離宮內燃從補心丹及棗仁湯法或憂勞憤郁而耗損心脾宗養心湯及歸脾湯法或精不凝神而龍雷震盪當壯水之主合靜以制動法或肝血無藏而魂搖神漾有咸補甘緩法胃病則陽蹺穴滿有靈樞半夏秫米湯法膽熱則口苦心煩前有溫膽湯先生又用桑葉丹皮山梔等輕清少陽法營氣傷極人參人乳並行陽浮不攝七味八味可選余如因驚宜鎮因怒宜疏飲食痰火為實新產病後為虛也邵新甫徐評不寐之因不一案中十不得一博考方知𩞄亦不必另立一門此症中之一也某陽升𩞄雜陽升麥冬三錢生地二錢柏子仁一錢川斛三錢茯神三錢黑穭豆皮三錢某心中煩熱頭上汗泄汗止自安易𩞄心陽熱淮小麥柏子仁茯神炙草南棗辰砂程氏血虛心𩞄咽嗆血虛生地天冬麥冬女貞子生白芍炙草茯神麻仁某氏經半月一至夜𩞄痛肝陰虛生地阿膠天冬茯神白芍丹參𩞄有虛實真偽其病總在於胃經云飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺又云脾與胃以膜相連耳又云脾主為胃行其津液者也由此觀之脾屬陰主乎血胃屬陽主乎氣胃易燥全賴脾陰以和之脾易濕必賴胃陽以運之故一陰一陽互相表裡合沖和之德而為後天生化之源也若脾陰一虛則胃家飲食遊溢之精氣全輸於脾不能稍留津液以自潤則胃過於燥而有火矣故欲得食以自資稍遲則𩞄雜愈甚得食則𩞄可暫止若失治則延便閉三消噎膈之症治當補脾陰養營血兼補胃陰甘涼濡潤或稍佐微酸此乃脾陰之虛而致胃家之燥也更有一切熱病之後胃氣雖漸復津液尚未充亦有是症此但以飲食調之可以自愈此二種乃為虛𩞄症所謂實者年歲壯盛脾胃生髮之氣與腎陽充旺食易消磨多食易飢而𩞄得食即止此非病也不必服藥以上皆是真𩞄症所云偽者因胃有痰火以致飲食輸化不清或現噁心吞酸微煩眩暈少寐似飢非飢雖飽食亦不能止此乃痰火為患治宜清胃稍佐降痰苦寒及膩滯之藥不宜多用又有胃陽衰微以致積飲內聚水氣泛溢似有凌心之狀悽悽慼慼似酸非酸似辣非辣飲食減少此屬脾胃陽虛治宜溫通仿痰飲門而治之此二種乃似𩞄之偽症若夫所云心𩞄者誤也心但有煩而無𩞄胃但有𩞄而無煩亦不可不辨明之今先生之法僅有四案倘有心之士更能搜採補入則幸甚華岫云三消計四十能食善飢渴飲日加癟瘦心境愁郁內火自燃乃消症大病鬱火生地知母石膏麥冬生甘草生白芍王五八肌肉瘦減善飢渴飲此久久煩勞壯盛不覺體衰病發皆內因之症自心營肺衛之傷漸損及乎中下按脈偏於左搏營絡虛熱故苦寒莫制其烈甘補無濟其虛是中上消之病煩勞心營熱犀角三錢鮮生地一兩元參心二錢鮮白沙參二錢麥冬二錢柿霜一錢生甘草四分鮮地骨皮三錢又固本加甜沙參楊二八肝風厥陽上衝眩暈犯胃為消肝陽犯胃石膏知母阿膠細生地生甘草生白芍某液涸消渴是臟陰為病但胃口不醒生氣曷振陽明陽土非甘涼不復肝病治胃是仲景法人參麥冬粳米佩蘭葉川斛陳皮胡五七元陽變動為消與河間甘露飲方陽動爍津河間甘露飲錢十五陽動消爍甘緩和陽生津生地炙黑甘草知母麥冬棗仁生白芍楊二六渴飲頻飢溲溺渾濁此屬腎消陰精內耗陽氣上燔舌碎絳赤乃陰不上承非客熱宜此乃臟液無存豈是平常小恙腎消熟地萸肉山藥茯神牛膝車前某脈左數能食腎陰虛胃火旺六味加二冬龜版女貞旱蓮川斛王四五形瘦脈搏渴飲善食乃三消症也古人謂入水無物不長入火無物不消河間每以益腎水制心火除腸胃激烈之燥濟身中津液之枯是真治法腎陰虛心火亢玉女煎姜五三經營無有不勞心心陽過動而腎陰暗耗液枯陽愈燔灼凡入火之物必消爍乾枯是能食而肌肉消癟用景岳玉女煎三消一症雖有上中下之分其實不越陰虧陽亢津涸熱淫而已考古治法唯仲景之腎氣丸助真火蒸化上升津液本事方之神效散取水中鹹寒之物遂其性而治之二者可謂具通天手眼萬世準繩矣他如易簡之地黃引子朱丹溪之消渴方以及茯苓丸黃耆湯生津甘露飲皆錯雜不一毫無成法可遵至先生則範於法而不囿於法如病在中上者膈膜之地而成燎原之場即用景岳之玉女煎六味之加二冬龜甲旱蓮一以清陽明之熱以滋少陰一以救心肺之陰而下顧真液如元陽變動而為消爍者即用河間之甘露飲生津清熱潤燥養陰甘緩和陽是也至於壯水以制陽光則有六味之補三陰而加車前牛膝導引肝腎斟酌變通斯誠善矣鄒滋九徐評消渴之症有數種案中俱未備宜詳考之脾癉某無形氣傷熱邪蘊結不飢不食豈血分膩滯可投口甘一症內經稱為脾癉中焦困不轉運可知中虛伏熱川連淡黃芩人參枳實淡乾薑生白芍某口甜是脾胃伏熱未清宜用溫膽湯法川連山梔人參枳實花粉丹皮橘紅竹茹生薑口甘一症內經謂之脾癉此甘非甘美之甘癉即熱之謂也人之飲食入胃賴脾真以運之命陽以腐之譬猶造酒蒸釀者然倘一有不和肥甘之疾頓發五液清華失其本來之真味則淫淫之甜味上泛不已也胸脘必痞口舌必膩不飢不食之由從此至矣內經設一蘭草湯其味辛足以散結其氣清足以化濁除陳解鬱利水和營為奇方之祖也夾暑夾涇之候每兼是患以此為君參以苦辛之勝配合瀉心等法又如胃虛谷少之人亦有是症又當宗大半夏湯及六君子法遠甘益辛可也邵新甫脾癉症經言因數食甘肥所致蓋甘性緩肥性膩使脾氣遏郁致有口甘內熱中滿之患故云治之以蘭除陳氣也陳氣者即甘肥釀成陳腐之氣也夫蘭草即為佩蘭俗名為省頭草婦人插於髻中以闢發中油穢之氣其形似馬蘭而高大其氣香其味辛其性涼亦與馬蘭相類用以醒脾氣滌甘肥也今二案中雖未曾用然用人參以助正氣余用苦辛寒以開氣泄熱枳實以理氣滯亦祖蘭草之意即所謂除陳氣也此症久延即化燥熱轉為消渴故前賢有膏粱無厭發癰疽熱燥所致淡薄不堪生腫脹寒濕而然之論余於甘肥生內熱一症悟出治胃寒之一法若貧人淡薄茹素不因外邪亦非冷飲停滯其本質有胃寒症者人皆用良薑丁香蓽茇吳萸乾薑附子等以溫之不知辛熱剛燥能散氣徒使胃中陽氣逼而外泄故初用似效繼用則無功莫若漸以甘肥投之或稍佐鹹溫或佐酸溫凝養胃陽使胃脂胃氣日厚此所謂藥補不如食補也又有腎陽胃陽兼虛者曾見久服鹿角膠而愈即此意也未識高明者以為然否華岫云瘧孫陰氣先傷陽氣獨發猶是伏暑內動當與金匱癉瘧同例癉瘧竹葉麥冬生地玄參知母梨汁蔗漿施發熱身痛咳喘暑濕外因內阻氣分有似寒慄皆肺病也竹葉連翹薄荷杏仁滑石鬱金汁又微寒多熱舌心干渴飲脘不爽此屬癉瘧治在肺經杏仁石膏竹葉連翹半夏橘紅程陰氣先傷陽氣獨發有癉熱無寒之慮鮮生地知母麥冬竹葉心滑石唐未病形容先瘦既病暮熱早涼猶然行動安舒未必真正重病傷寒也但八九日病來小愈驟食粉團腥面當宗食谷發熱損谷則愈仲景未嘗立方此腹痛洞瀉食滯阻其腸胃大腑不司變化究其病根論幼科體具純陽瘦損於病前亦陽亢為消爍仲景謂癉瘧者單熱不寒本條云陰氣孤絕陽氣獨發熱灼煩冤令人消爍肌肉亦不設方但云以飲食消息之嘉言主以甘寒生津可愈重後天胃氣耳洞瀉既頻津液更傷苦寒多餌熱仍不已暮夜昏譫自言胸中格拒腹中不和此皆病輕藥重致陰陽二氣之殘憊法當停藥與谷諒進甘酸解其煩渴方有斟酌又鼻煤唇裂舌腐頻與芩連熱不肯已此病本輕藥重於攻擊致流行之氣結閉不行郁遏不通其熱愈甚上則不嗜飲不納食小溲頗利便必管痛三焦皆閉神昏瘛瘲有諸連翹心三錢鮮石菖蒲汁一錢半川貝母三錢杏仁二十粒射干二分淡竹葉一錢半又自停狠藥日有向愈之機胃困則痞悶不欲食今雖未加餐已知甘美皆醒之漸也童真無下虛之理溲溺欲出尿管必痛良由肺津胃汁因苦辛燥熱烈氣味劫奪枯槁腸中無以運行庸醫睹此必以分利所謂泉源既竭當滋其化源九竅不和都屬胃病麥門冬二錢甜杏仁四錢甜水梨皮三錢蔗漿一木杓張舌赤煩汗不寐肢體忽冷乃稚年癉瘧暑邪深入所致杏仁滑石竹葉西瓜翠衣知母花粉又熱甚而厥幼稚瘧症皆然竹葉石膏湯去人參半夏加知母某風溫陽瘧溫瘧杏仁滑石連翹黃芩青蒿淡竹葉丁脈右數左小弱面明夏秋伏暑寒露後發微寒多熱嘔逆身痛蓋素有痰火暑必挾濕病自肺經而起致氣不宣化不飢不食頻溺短縮乃熱在氣分當與溫瘧同例忌葛柴足六經藥桂枝白虎湯加半夏胡按仲景云脈如平人但熱無寒骨節煩疼微嘔而渴者病名溫瘧桂枝白虎湯主之桂枝白虎湯蓋今年夏秋久熱口鼻吸暑其初暑邪輕小不致病發秋深氣涼外束裡熱欲出與衛營二氣交行邪與二氣遇觸斯為熱起臨解必有微汗者氣邪兩泄然邪不盡則混處氣血中矣故聖人立法以石膏辛寒清氣分之伏熱佐入桂枝辛甘溫之輕揚引導涼藥以通營衛兼知母專理陽明獨勝之熱而手太陰肺亦得秋金肅降之司甘草粳米和胃陰以生津此一舉兼備方下自注云一劑知二劑已知者謂病已知其對症已者中病當愈之稱耳鄧寒少熱多胸中痞脹溫邪未解謾言止截淡黃芩炒半夏薑汁生白芍草果知母烏梅又照前方去半夏薑汁加鱉甲吳間日寒熱目黃口渴溫邪兼雨濕外薄為瘧滑石杏仁白蔻仁淡黃芩半夏鬱金又脈數舌紅口渴熱邪已入血分竹葉石膏生地丹皮知母青蒿梗又飲食不節腹中不和瘧邪攻胃鮮首烏烏梅肉生鱉甲黃芩丹皮草果知母送保和丸二錢又人參生穀芽枳實汁茯苓廣皮炒半夏曲朱舌黃煩渴身痛心腹中熱躁暑熱不解為瘧經言暑脈自虛皆受從前疲藥之累瘁暑瘧石膏知母生甘草炒粳米麥冬竹葉何勞倦傷氣遺泄傷陰暑邪變瘧熾則煩冤最盛分解使邪勢輕參朮耆附皆固閉邪氣也草果仁知母淡黃芩川貝母青蒿花粉馮暑傷氣分上焦先受河間法至精至妙後醫未讀其書焉能治病臻效邪深則瘧來日遲氣結必胸中混濛如痞無形之熱漸蒸有形之痰此消導發散都是劫津無能去邪矣石膏杏仁半夏厚朴知母竹葉黃脈數目眥黃舌心乾白黃胎口中黏膩脘中痞悶不思納穀由於途次暑風客邪內侵募原營衛不和致發瘧疾夫暑必兼濕濕也熱也皆氣也氣與邪搏則清濁交混升降自阻古稱濕遏必熱自生矣聖帝論病本乎四氣其論藥方推氣味理必苦降辛通斯熱氣痞結可開消導攻滯香燥泄氣置暑熱致病之因於不治不識何解川連黃芩花粉桔梗白蔻仁鬱金橘紅六一散又苦降能驅熱除濕辛通能開氣宣濁已經見效當減其制仍祖其意川連桔梗白蔻仁厚朴茵陳茯苓皮銀花白通草胡間日瘧痰多脘悶汗多心熱伏暑內熾忌與風寒表藥滑石黃芩厚朴杏仁通草白蔻半夏栝蔞皮知母又黃芩草果知母半夏生白芍烏梅汪氏微冷熱多舌白脘悶嘔惡暑穢過募原為瘧杏仁鬱金滑石厚朴黃芩炒半夏白蔻橘紅某舌白脘悶寒起四末渴喜熱飲此濕邪內蘊脾陽不主宣達而成濕瘧濕瘧厚朴一錢半杏仁一錢半草果仁一錢半夏一錢半茯苓三錢廣皮白一錢半某二五瘧止面浮漸及脘腹苡仁桑白皮茯苓大腹皮姜皮廣皮某間瘧寒熱俱微此屬濕瘧杏仁三錢厚朴一錢桂枝木五分飛滑石三錢草果八分炒半夏一錢半茯苓皮三錢綿茵陳一錢半牛四八寒來喜飲熱湯發熱後反不渴間瘧已四十日今雖止不飢不思食五味入口皆變初病舌白乾嘔濕邪中於太陰脾絡濕鬱氣滯喜熱飲暫通其鬱邪蒸濕中生熱六腑熱灼津不運行至大便硬秘此為氣痹濕結當薄味緩調令氣分清肅與脾約似同但仲景氣血兼治此病卻專傷氣分炒黃半夏生益智仁綿茵陳廣皮厚朴茯苓又瘧止舌白不飢大便旬日不通此皆留邪堵塞經腑隧道之流行久延必致腹脹癥瘕杏仁白蔻仁半夏厚朴生香附汁廣皮茯苓皮接服半硫丸二錢某脈右弦左弱留邪未盡大便黏稀最防轉痢較七八日前勢減一二但去疾務盡苦辛寒逐其蘊伏而通利小便亦不可少草果知母厚朴茯苓木通滑石曹身痛舌白口渴自利此濕溫客氣為瘧不可亂投柴葛仲景有濕家忌汗之律濕熱飛滑石杏仁鬱金淡黃芩白蔻仁防己又濕甚為熱心痛舌白便溏治在氣分竹葉心麥冬鬱金菖蒲飛滑石橘紅化服牛黃丸又心下觸手而痛自利舌白煩躁都是濕熱阻氣分議開內閉用瀉心湯川連淡黃芩乾薑半夏人參枳實又神氣稍清痛處漸下至臍濕傷在氣熱結在血吐咯帶血猶是上行為逆熱病瘀留必從下出為順川連黃芩乾薑半夏人參枳實白芍炒楂肉費舌白渴飲身痛嘔惡大便不爽診脈濡小乃暑濕從口鼻入濕甚生熱四末擾中瘧發脘痞脹痹當以苦辛寒清上徹邪不可謂遺泄而病輒與溫補助邪黃芩知母白蔻鬱金蔞皮厚朴杏仁半夏薑汁石膏又脈濡口渴餘熱尚熾人參知母石膏竹葉甘草麥冬又熱緩不欲食津液受爍當和胃生津人參五味知母橘紅炒白芍半夏曲張瘡家濕瘧忌用表散蒼朮白虎湯加草果曹寒從背起汗泄甚面無淖澤舌色仍白邪未盡正先怯心虛痙震恐亡陽厥脫議用仲景救逆法加參陽虛又舌絳口渴汗泄瘧來日晏寒熱過多身中陰氣大傷剛補勿進議以何人飲人參何首烏孫陽虛之體伏暑成瘧涼藥只宜少用身麻屬氣虛用生薑瀉心法半夏生薑汁茯苓炙甘草南棗肉沈陽微復瘧桂枝當歸黃耆防風鹿角屑薑汁南棗範五三勞瘧入陰夏月陽氣發泄仍然勞苦經營以致再來不愈用藥以辛甘溫理陽為正但未易驟效耳人參當歸肉桂炙草川蜀漆生薑南棗方寒甚於背陽脈衰也人參鹿茸炒當歸炙草鹿角霜官桂鱉甲煎丸吳六一背寒舌白粉胎知飢食無味此為無陽溫中下以托邪生白朮厚朴桂枝附子草果仁茯苓又照方去茯苓加人參炙草生薑程寒熱經月不止屬氣弱留邪以益氣升陽補中益氣湯又生鹿茸鹿角霜人參歸身茯苓炙草生薑某氏建中法甚安知營衛二氣交餒夫太陽行身之背瘧發背冷不由四肢是少陰之陽不營太陽此汗大泄不已矣孰謂非柴葛傷陽之咎歟議用桂枝加熟附子湯人參桂枝湯加熟附子華氏二十歲天癸始通面黃汗泄內熱外冷先天既薄瘧傷不復內經謂陽維為病苦寒熱綱維無以振頓四肢骨節疼痛通八脈以和補調經可以卻病淡蓯蓉鹿角霜當歸川芎杜仲小茴茯苓香附顧氏進護陽方法諸症已減寒熱未止乃久病陽虛脈絡未充尚宜通補為法人參生鹿茸當歸紫石英茯苓炙草煨姜大棗又經邪不盡寒熱未止緣瘧久營衛氣傷脈絡中空乏屢進補法僅能填塞絡中空隙不能驅除蘊伏之邪擬進養營法取其養正邪自卻之意人參當歸杞子生白芍茯神桂心炙草遠志煨姜南棗袁嫗脈弦緩寒戰甚則嘔吐噫氣腹鳴溏泄是足太陰脾寒也且苦辛寒屢用不效俱不對病反傷脾胃人參半夏草果仁生薑新會皮醋炒青皮又靈樞經云中氣不足溲便為變況老年人驚恐憂勞深夜不得安寐遂致寒戰瘧發當以病因而體貼諦視其為內傷實屬七八見瘧通套已屬非法若云肺瘧則秋涼不發何傳及於冬令小雪當以勞瘧稱之夫勞必傷陽氣宜乎四末先冷瘧邪傷中為嘔惡腹鳴矣用露姜飲又陽陷入陰必目瞑欲寐寒則肉腠筋骨皆疼其籓籬護衛太怯杳不知飢焉得思谷老年人須血氣充溢使邪不敢陷伏古賢有取升陽法嫩毛鹿角人參當歸桂枝炙甘草又前議勞傷陽氣當知內損邪陷之理凡女人天癸既絕之後其陰經空乏豈但營衛造偏之寒熱而已故溫脾胃及露姜治中宮營虛但畏寒不知熱為牝瘧蓋牝為陰身體重者亦是陰象此辛甘理陽鹿茸自督脈以煦提非比姜附但走氣分之剛暴驅邪益虛卻在營分奇經曰陽維脈為病發寒熱也鹿茸鹿角霜人參當歸潯桂茯苓炙草又正氣和營瘧戰已止當小其制人參鹿茸當歸炒杞子沙苑茯苓炙草某瘧後脾腎陽虛便溏畏寒肢體疲倦當防腫脹附子白朮茯苓澤瀉苡仁生薑大棗某陰瘧已亂汗多桂枝牡蠣生黃耆炙草歸身五味煨姜大棗某脈沉舌白呃忒時時煩躁向系陽虛痰飲瘧發三次即止此邪窒不能宣越並非邪去病解今已變病陰冱痰濁阻塞於中致上下氣機不相維續症勢險篤舍通陽一法無方可擬必得中陽流運瘧症復作庶有愈機淡附子一錢半生草果仁錢半生白芍三錢茯苓三錢生厚朴一錢薑汁五分一劑此冷香真武合劑某伏暑冒涼發瘧以羌防蘇蔥辛溫大汗汗多衛陽大傷胃津亦被劫干致渴飲心煩無寐診脈左弱右促目微黃嗜酒必中虛谷少易於聚濕蘊熱勿謂陽傷驟補仿內經辛散太過當食甘以緩之胃陽虛濕聚大麥仁炙草炒麥冬生白芍茯神南棗又藥不對症先傷胃口宗內經辛苦急急食甘以緩之仲景謂之胃減有不飢不欲食之患議用金匱麥門冬湯蘇胃汁以開痰飲仍佐甘藥取其不損陰陽耳金匱麥門冬湯去棗米加茯神糯稻根鬚又脈右大間日寒熱目眥微黃身痛此平素酒濕挾時邪流行經脈使然前因辛溫大汗所以暫養胃口今脈症既定仍從瘧門調治草果知母人參枳實黃芩半夏薑汁項瘧已過月形脈俱衰平素陽虛虛則邪難解散腹脹是太陰見症治從脾胃脾胃陽虛人參一錢半夏二錢生於術二錢茯苓二錢草果仁二錢淡姜一錢陳邪伏於裡積久而發道路已遠未能日有寒熱汗出不解攻表無謂平昔肛垂骱痛必有濕痰阻隧舌白不喜飲治在太陰陽明炒半夏厚朴草果知母薑汁杏仁某遺泄損陰瘧熱再傷陰聲嘶火升乃水源不充易怒神躁水不涵木之象用何人飲佐清陰火陰虛制首烏人參天冬麥冬知母茯苓某氏瘧已半年今但微熱無汗身弱自乳血去傷陰此頭痛是陽氣浮越心痛如飢晡熱都是陰虛成勞若不斷乳經去不至為乾血則服藥亦無用生地三錢阿膠一錢半生白芍一錢炙黑甘草四分麥冬一錢半火麻仁一錢粗桂枝木三分某瘧後心悸氣怯便後有血是熱入傷陰用固本丸加首烏阿膠人參生地熟地天冬麥冬制首烏阿膠某陰液消亡小溲短赤皆瘧熱所傷不飢不納陰藥勿以過膩甘涼養胃為穩人參生地天冬麥冬川斛蔗漿另服資生丸鄭自來陰虛有遺泄瘧邪更傷其陰寐多盜汗身動氣促總是根本積弱不主斂攝此養陰一定成法陰虛熱伏血分熟地生白芍五味炒山藥茯神芡實湖蓮肉張脈數瘧來日遲舌乾渴飲積勞悒鬱內傷居多致邪氣乘虛漸劫陰氣熱邪墜於陰熱來小溲頻數故汗多不解議清陰分之熱以救津液活鱉甲知母草果鮮生地炒桃仁花粉翁脈左弦暮熱早涼汗解渴飲治在少陽青蒿桑葉丹皮花粉鱉甲知母沈十九用力失血無非陽乘攻絡瘧熱再傷真陰肌消食減自述夏暑汗泄頭巔脹大都是陰虛陽升清火皆苦寒未必能和身中之陽也鱉甲生白芍天冬首烏炙草茯神某氏瘧熱傷陰小溲淋痛生地鱉甲丹皮知母茯苓澤瀉朱十五瘧久後陰傷溺血炒焦六味加龜甲黃柏吳十四陰瘧後內熱清骨散項陽氣最薄暑入為瘧先由肺病桂枝白虎湯氣分以通營衛為正治今中焦痞阻冷飲不適熱邪宜清胃陽亦須扶護用半夏瀉心法熱邪痞結半夏川連薑汁茯苓人參枳實王汗出不解心下有形自按則痛語言氣窒不爽瘧來鼻準先寒邪結在上當開肺痹醫見瘧治瘧焉得中病熱邪痞結肺痹桂枝杏仁炙草茯苓乾薑五味又汗少喘緩肺病宛然獨心下痞結不通猶自微痛非關誤下結胸陷胸等法未妥況舌白渴飲邪在氣分仿仲景耎堅開痞生牡蠣黃芩川桂枝薑汁花粉炒黑蜀漆又照前方去花粉加知母草果又鱉甲煎丸一百八十粒王舌白不大渴寒戰後熱神躁欲昏而心胸飽悶更甚瘧系客邪先由四肢以擾中宮痰嗽嘔逆顯是肺胃體虛邪聚閉塞不通故神昏煩悶鬱蒸汗泄得以暫解營衛之邪未清寒熱漫延無已此和補未必中竅按經設法為宜白蔻仁大杏仁焦半夏薑汁黃芩淡竹葉又寒熱瘧邪交會中宮邪聚必脹悶嘔逆邪散則安舒當心胸之間並無停食之地夫不正之氣為邪穢濁瀰漫原非形質可以攻消苟非芳香何以開其蒙閉之穢濁欲少望見效舍此捷徑無成法可遵道中知否耶牛黃丸二服樂二九熱多昏譫舌邊赤舌心黃煩渴脈弱是心經熱瘧醫投發散消導津劫液涸痙厥至矣心經瘧犀角竹葉連翹玄參麥冬銀花陳前方復瘧昏迷此皆陽氣上冒救逆湯去姜加芍又鎮逆厥止議養心脾營陰乃病後治法人參炙草杞子桂圓炒白芍棗仁茯神遠志某四三舌白渴飲咳嗽寒從背起此屬肺瘧肺瘧桂枝白虎湯加杏仁範脈寸大汗出口渴伏邪因新涼而發間日瘧來議治手太陰淡竹葉大杏仁滑石花粉淡黃芩橘紅金氏肺瘧脘痞黃芩白蔻仁杏仁橘紅青蒿梗白芍張嫗暑風入肺成瘧淡黃芩杏仁滑石橘紅青蒿梗連翹陳六歲冷暖不調夜熱多汗咳嗽忌葷腥油膩可免疳勞溫邪如瘧當治手太陰竹葉心麥冬粳米飛滑石知母炙草柳暑濕都傷氣分不渴多嘔寒起四肢熱聚心胸乃太陰瘧也仍宜苦辛或佐宣解裡熱之郁脾瘧川連黃芩炒半夏枳實白芍薑汁煩躁甚另用牛黃丸一丸某寒起嘔痰熱久不渴多煩中焦之邪仍以太陰脾法草果知母生薑烏梅炒半夏桂枝木早服鱉甲煎方葛瘧久舌白泄瀉太陰脾傷肌肉微浮宜補中卻邪大忌消克發散人參草果白芍茯苓煨老薑炙草王脈濡不渴嘔痰不飢是太陰脾瘧當辛溫以理中焦之陽生於術半夏草果紫厚朴茯苓薑汁又太陰脾瘧必有寒濕凝阻其運動之陽所防久虛變幻浮腫腹脹人參未能多用權以生術代之但與絡方少遜佐以通藥則無礙生於術桂枝木炒常山茯苓生鹿角生薑汁某二二寒起四末渴喜熱飲屬脾瘧狀先當溫散杏仁厚朴草果仁知母生薑半夏金既成間日寒熱瘧嘔吐痰涎其瘧邪大犯脾胃故不飢不食脈仍虛舌白治在太陰不必攻表人參半夏草果橘紅黃芩知母薑汁沈十歲脈濡寒熱瘧日遲腹微滿四肢不暖是太陰脾瘧用露姜飲以升陽人參一錢生薑一錢露一宿溫暖服華用劫藥瘧止新沐瘧來陽弱失衛外邪直侵入里證以瘧來不得汗邪不從外解大著厥陰瘧川桂枝炮黑川烏生白朮炒黑蜀漆全蠍厚朴薑汁丸王五二暑濕傷氣瘧久傷陰食谷煩熱愈加邪未盡也病已一月不飢不飽大便秘阻仍有潮熱全是津液暗傷胃口不得甦醒甘寒清熱佐以酸味胃氣稍振清補可投胃陰虛麥冬干首烏烏梅肉知母火麻仁生白芍高陰虛溫瘧雖止而腰獨痛先理陽明胃陰俾得安穀再商治腎北沙參麥冬木瓜蜜水炒知母大麥仁烏梅周舌白脈小暑邪成瘧麻黃劫汗傷陽遂變痙症今痰咸有血右脅痛引背部不知飢飽當先理胃津大沙參桑葉麥冬茯神生扁豆苡仁楊高年瘧熱劫胃汁遂不飢不飽不食不便渴不嗜飲味變酸濁藥能變胃方蘇胃逆不降人參川連枳實牡蠣淡乾薑生薑徐脈數左寸大關弦瘧後食大葷太早胃氣受傷不得下降致痞悶噁心痰多唇燥大便不利俱是腑氣不宣之象擬進溫膽湯法以和胃氣炒焦竹茹炒焦半夏草果仁生枳實杏仁橘紅金斛花粉黃瘧後不飢咽即吐此脘膈痰與氣阻胃不降則不受納仿溫膽湯意佐以苦味降逆鮮竹茹枳實炒半夏茯苓橘紅川連苦杏仁鬱金汁李不飢口湧甜水瘧邪未清肝胃不和肝胃川連乾薑枳實栝蔞仁半夏廣皮白薑汁又口湧甜水脾癉川連黃芩厚朴半夏生乾薑廣皮煎送脾約丸又橘半枳朮丸金寒自背起沖氣由臍下而升清涎上湧嘔吐遂飢不能食此瘧邪深藏厥陰邪動必犯陽明舌白形寒寒勝都主胃陽之虛然徒補鈍守無益人參半夏廣皮白薑汁川椒烏梅附子生乾薑方先厥而瘧蛔蟲下出嘔逆腹鳴脘痞窒塞此厥陰瘧疾勿得亂治川連淡乾薑薑汁川桂枝生白芍烏梅肉黃芩秋露水煎藥又陽微寒勝瘧久不已理胃陽以壯中宮使四末之邪不令徒犯脾胃人參炒半夏生薑烏梅草果炒常山秋露水煎又辛酸兩和肝胃已效人參草果生薑生白芍烏梅炙鱉甲吳體豐色白陽氣本虛夏秋伏暑挾痰飲為瘧寒熱夜作邪已入陰冷汗頻出陽氣益傷今診得脈小無力舌白虛象已著恐延厥脫之慮擬進救逆湯法人參龍骨牡蠣炙草桂枝木炒蜀漆煨姜南棗又閩產陽氣偏泄今年久熱傷元初瘧發散不能去病便是再劫胃陽致邪入厥陰昏冒大汗思肝腎同屬下焦厥陽挾內風冒厥吐涎沫膠痰陽明胃中久寒熱戕擾空虛若谷風自內生閱醫藥不分經辨症但以稱虛道實宜乎鮮有厥效議用仲景安胃泄肝一法人參川椒烏梅附子乾薑桂枝川連生牡蠣生白芍又諸症略減寒熱未止尚宜實陽明泄厥陰為法人參炒半夏淡乾薑桂枝木茯苓生牡蠣又天暴冷陽傷泄瀉脈得左手似數而堅口微渴舌仍白陰液既虧飲水自救非熱熾也議通塞兩用冀其寒熱再緩人參淡附子桂枝木茯苓生牡蠣炒黑蜀漆蔡惡進穀食舌乾齦脹不飢不知味寤多寐少皆由瘧汗嘔逆都令諸陽交升胃氣不降則不食陽不下潛則無寐肝風內震則火升心熱法當和胃陽平肝氣肝平胃醒必谷進能寢矣知母北沙參麥冬新會皮烏梅肉新谷露沖金七五強截瘧疾里邪痞結心下水飲皆嘔吐無餘病在胃口之上老年陽衰防其呃厥舍瀉心之外無專方人參枳實乾薑半夏川連黃芩又舌白氣衝心痛噯噫味酸嘔吐涎沫皆胃虛肝乘仿仲景胃中虛客氣上逆可與旋覆花代赭石湯旋覆花代赭石人參半夏茯苓薑汁粳米又諸恙向安寢食頗逸平昔肝木易動左脈較右脈弦長味變酸木侮土秋前宜慎人參半夏茯苓廣皮生穀芽生白芍馬瘧半月不止左脅下已有瘧母寒熱時必氣痞嘔逆乃肝邪乘胃有邪陷厥陰之象擬進瀉心法川連黃芩乾薑半夏人參枳實朱女厥陰沖氣上攻眩暈間瘧安胃丸三錢椒梅湯送陳氏瘧母是瘧邪入絡與血氣扭結必凝然不動今述遇冷勞怒沖氣至脘痛必嘔逆必三日氣降痛緩而後水飲得入此厥逆之氣由肝入胃衝脈不和則經水不調延胡川楝子半夏蓬朮蒲黃五靈脂薑汁韓二七瘧不止欲吐炒半夏一錢半厚朴一錢青皮一錢炒焦知母一錢半草果仁一錢橘紅一錢臨服調入薑汁一錢吳背寒瘧來漸晏邪有入陰之意此伏邪不肯解散都因久積煩勞未病先虛也飲水少腹如墜脘中痞結不舒中焦屢受邪迫陽氣先已餒弱議兩和太陰陽明法脾胃草果知母半夏厚朴薑汁烏梅黃芩花粉又進兩和陰陽寒熱已止診脈右濡明是氣衰宜和胃生津使餘邪不攻自解人參知母炙鱉甲生白芍烏梅肉大麥仁炒丹皮又脈左數舌絳暮渴炒麥冬人參首烏白芍丹皮茯神另更衣丸二錢陸六十口湧清涎不飢不食寒熱邪氣交會中焦脾胃日困半夏薑汁茯苓厚朴炒常山草果烏梅又大半夏湯加草果烏梅凌十三瘧久脾胃氣傷不食倦怠半年不肯復元論理必用參朮益氣但貧窘豈能久用然久延不蘇倘腹滿浮腫便難調治白朮膏加砂仁末某三一瘧邪由四末以擾中宮脾胃受傷無疑但寒暑更遷病邪既久臟腑真氣自衰兩年來納穀不運漸覺衰微不耐風冷之侵並無凝痰聚氣見症此必胸中宗氣自餒致清陽不司轉運當以仲景苓桂朮甘湯又六君子湯去甘草加檀香泥桂枝木吳瘧已復瘧溺濁淋痛稚年脾瘧食物不慎色黃腹膨有滯脾胃愈衰東垣云中氣不足溲便乃變初秋交冬迭加反復久則五疳勞瘵當慎於食物令脾胃氣靈可效宗脾胃論升降疏補法人參茯苓炙草廣皮使君子神麯楂肉麥芽澤瀉祝此勞傷陽氣更感冷熱不正之氣身熱無汗肢冷腹熱自利舌灰白微嘔顯然太陰受病診脈小右濡不飢入夜昏譫語但如寐不加狂躁論脾為柔臟體陰用陽治法雖多從未及病當遵前輩冷香縮脾遺意人參益智仁茯苓新會皮生厚朴苡仁木瓜砂仁又脈右弦來去不齊左小耎弱舌邊紅舌心白黃微縐鼻冷四肢冷熱時微渴不飢不思食前議太陰脾臟受病瘧邪從四末乘中必脾胃受病鼻準四肢皆冷是陽氣微弱因病再傷竟日不暖但形肉消爍不敢剛劫攻邪以宣通脾胃之陽在陰伏邪無發散清熱之理人參草果炒半夏生薑茯苓新會皮蒸烏梅肉二帖後加附子後又加牡蠣吳十七瘧傷脾胃腹中不和脈右澀食入脹甚前方通調氣血佐以泄木服之積滯既下痛隨利減仍宜制木安土不可作陽虛溫補治生於術川連椒目麥芽雞肫皮廣皮厚朴炒山楂陳四六瘧邪由四末以擾中皆陽明厥陰界域陽明衰則厥陰來乘津液少斯內風必動昔賢以麻屬氣虛木是濕痰敗血今戊亥頻熱行走淋汗顯然液虛陽動風生脂液不得灌溉肢末非濕痰氣分之恙肝風冬桑葉九蒸熟首烏黑芝麻柏子仁茯神當歸杞子菊花炭蜜丸李脈左弦嘔吐發熱後脘中痞悶不爽宜慎口腹清肅上中二焦不致再延成瘧進苦辛法痞杏仁鬱金山梔豆豉白蔻枳殼孫高年發瘧寒熱夜作胸悶不欲食煩渴熱頻最慮其邪陷為厥進陽旦法桂枝黃芩花粉生白芍生左牡蠣煨姜南棗姬瘧脈沉澀中脘痞結此屬裡症用瀉心法半夏川連橘紅枳實黃芩生薑汁又脈沉右關大瘧未止寒熱子後作煩渴中悶不欲食醋炒半夏杏仁黃芩花粉草果生薑陸瘧截虛氣痞結成身痛桂枝炒焦半夏薑汁廣皮白當歸茯苓錢氏暑熱傷氣成瘧胸痞結嘔吐痰沫皆熱氣之結前醫瀉心法極是人參汁枳實汁黃連黃芩炒半夏杏仁厚朴薑汁汪此濕熱與水穀交蒸全在氣分嘗得三焦分消清解既成間日瘧疾邪正互爭原無大害初誤於混指傷寒六經再謬於參朮守補致邪瀰漫神昏喘急譫妄痙搐皆邪無出路內閉則外脫求其協熱下利已不可得診脈細澀按腹膨滿夫痞滿屬氣燥實在血今洞利後而加腹滿諸氣皆結豈非閉塞而然潰敗決裂至此難望挽救細葉菖蒲根汁二錢草果仁五分茯苓皮三錢紫厚朴一錢綿茵陳三錢辰砂益元散五錢連翹心一錢半金銀花三錢另用牛黃丸一服用涼開水緩緩以茶匙挑化服潘氏伏邪發熱厥後成瘧間日一至咳嗽痰多噁心中痞其邪在肺胃之絡擬進苦辛輕劑杏仁黃芩半夏橘紅白蔻花粉程氏脈右大寒熱微嘔脘痞不納四末瘧邪交於中宮當苦辛泄降酸苦泄熱邪勢再減二三必從清補可愈川連炒半夏薑汁黃芩知母草果炒厚朴烏梅肉毛氏用玉女煎寒熱未已渴飲仍然嘔惡已減周身皆痛診脈兩手俱數舌色灰白邊赤汗泄不解擬用酸苦泄其在裡熱邪務以瘧止再調體質黃芩黃連草果白芍烏梅知母用秋露水煎藥又寒熱由四末以擾中宮胃口最當其戕害熱悶不飢胃傷邪留清熱利痰固為要法但有年氣弱兼之病經匝月清邪之中必佐輔正議用半夏瀉心法人參半夏黃連黃芩枳實薑汁方勞瘧再發勞瘧人參草果生薑烏梅秋露水煎又補中益氣湯加草果知母薑棗陳絡虛則痛陽微則脹左脅有瘧母邪留正傷此勞瘧人參當歸肉桂焦術炙草茯苓廣皮生薑南棗四劑後用五苓散一服某勞瘧畏寒下虛不納六味加肉桂五味某瘧未止熱陷下痢中痞不欲食瘧兼熱痢人參川連黃芩生白芍廣皮炒當歸炒山楂乾薑枳實銀花又瘧後勞復人參當歸白芍棗仁茯神廣皮生薑南棗範三三脈小澀病起瘧後食物不和仍誦讀煩勞遂至左肋連及少腹常有厥起或攻胃脘或聚腹中凝著䐜脹古語云瘧不離乎肝膽亦猶咳不離乎肺也蓋肝得邪助木勢張揚中土必然受侮本氣自怯運納之權自減清陽既少展舒濁陰日踞漸為痞滿上年溫養辛甘久進未見病去其治體之法諒不能卻自述靜處病加煩動小安其為氣血久阻為郁議用通絡法以病根由瘧久邪留絡中耳氣血凝絡紫降香桃仁小香附淡姜渣神麯雞肫皮南山楂韭根汁法丸高瘧發既多邪入於絡絡屬血分汗下未能逐邪仲景制鱉甲煎丸一法搜剔絡中留伏之邪五六日必效早午暮各服七粒某瘧邪經月不解邪已入絡絡聚血邪攻則血下究竟寒熱煩渴目黃舌膩溺赤短少全是里邪未清凡腥葷宜禁蔬食不助邪壅閱醫藥柴葛攻表消導通便與瘧無與用仲景鱉甲煎丸早十粒午十粒黃昏十粒開水送費瘧邪迫傷津液胃減不飢腸燥便紅左脅微堅有似瘧母結聚當宣絡熱以肅餘邪生地知母丹皮麻仁生鱉甲某氏瘧邪內陷變成陰瘧久延成勞務以月經通爽不致邪劫乾血生鱉甲一兩桃仁三錢炒丹皮一錢穿山甲三錢楂肉一錢半生香附一錢半顧左脅有瘧母乃氣血交結之故治宜通絡瘧母鱉甲桃仁金鈴子牡蠣丹皮夏枯草江遠客水土各別胃受食物未和更遭嗔怒動肝木犯胃土瘧傷脅中有形瘕聚三年宿恙氣血暗消但久必入血湯藥焉能取效宜用緩法以疏通其絡若不追拔致陽結陰枯釀成噎膈難治矣生鱉甲桃仁麝香䗪蟲韭白根粉歸鬚郁李仁冬葵子熬膏吳二四瘧反復左脅瘧母生鱉甲生牡蠣炒桃仁當歸鬚炒延胡柴胡梢桂枝木炒楂肉青皮某夏秋濕熱瘧痢正虛邪留混入血絡結成癥瘕瘧母夫濕氣熱氣本屬無形醫治非法血脈蘊邪故寒熱間發仲景立法務在緩攻急則變為中滿慎之兼服鱉甲煎丸知母草果半夏黃芩烏梅生薑秋露水煎金十一經年老瘧左脅已結瘧母邪已入絡與氣血膠結成形區區表裡解散之藥焉得入絡通血脈攻堅壘佐以辛香是絡病大旨生牡蠣三錢歸鬚二錢桃仁二錢桂枝五分炒蜀漆一錢公丁香三粒某三八少陰三瘧已久當升陽溫經三日瘧陽虛鹿茸熟附子人參粗桂枝當歸炒黑蜀漆呂二四陰瘧一年方止羸瘦妨食食入不運不飲湯水四肢無力診脈微弱不鼓屢進六君益氣無效當溫里通陽從火生土意人參熟附子生益智茯神白芍生薑吳四一三瘧愈後反復寒多有汗勞則陽泄致瘧議護陽卻邪川桂枝熟附子生於術炙草生薑南棗肉某陰瘧汗多下焦冷用升陽法人參鹿茸桂枝木當歸炙甘草生薑大棗陸四七邪深留陰三日始有瘧發但熱來必神昏譫妄是膻中震動所致議定未病兩日日進清心牛黃丸一服試看後期瘧至何如邪擾心營蔡氏三日瘧一年有餘勞則欲發內熱素有結痞今長大攻走不定氣逆欲嘔酸經閉四載當厥陰陽明同治肝胃半夏川連乾薑吳萸茯苓桂枝白芍川椒烏梅蔡五三三瘧不飢不納噁心渴喜熱飲診脈沉細脾陽困頓不能送邪外出治以四獸飲脾陽虛沈五二三瘧腹脹不渴嘔水邪在脾胃之絡溫疏里邪勿用表散草果粗桂枝生薑厚朴炒蜀漆茯苓又溫脾通胃得效生於術淡附子川桂枝炒黑蜀漆厚朴生薑某四五三瘧經年至今復受濕邪及發日來舌白脘悶渴喜熱飲當溫太陰杏仁草果知母桂枝半夏生薑厚朴烏梅詹二九三瘧脾發用露姜法寒止熱盛加入烏梅五分取其酸味以和陰謂其瘧久陰亦傷耳胡陰瘧滯傷脾胃用苦辛溫得效瘧未已腹脹便泄議理中陽人參益智木香茯苓厚朴廣皮生薑錢三五遇勞瘧發數年初起即三陰此傷損已在臟陰之絡最難速效甘溫益氣久進益氣湯某四三三瘧早截中陽窒塞脘脹不運背寒肢冷草果仁杏仁半夏茯苓桂枝厚朴廣皮生薑某脈濡面黃舌白脘中格拒湯水皆嘔三日瘧一至據色脈診乃足太陰陽微飲結當以溫藥和之半夏蓽茇丁香柄草蔻厚朴薑汁李初病勞倦晡熱投東垣益氣湯未嘗背謬而得湯反劇聞穀氣穢間日瘧來渴思涼飲此必暑邪內伏致營衛周流與邪觸著為寒熱分爭矣故甘溫益氣升舉脾臟氣血與暑熱異岐胃中熱灼陽土愈燥上脘不納腸結便閉其初在經在氣其久入絡入血由陽入陰間日延為三瘧奇脈蹺維皆被邪傷內經謂陽維為病苦寒熱也維為一身綱維故由四末寒凜而起但仍是脈絡為病故參耆朮附不能固陽以益其虛歸桂地芍無能養營以卻邪矣昔軒岐有刺瘧之旨深慮邪與氣血混成一所汗吐下無能分其邪耳後漢張仲景推廣聖經蘊奧謂瘧邪經月不解勢必邪結血中有癥瘕瘧母之累瘁制方鱉甲煎丸方中大意取用蟲蟻有四意謂飛者升走者降靈動迅速追拔沉混氣血之邪蓋散之不解邪非在表攻之不驅邪非著里補正卻邪正邪並樹無益故聖人另闢手眼以搜剔絡中混處之邪治經千百歷有明驗服十二日乾支一周倘未全功當以升其八脈之氣由至陰返於陽位無有不告安之理氣血凝絡某陰瘧兩月或輕或重左脅按之痠痛邪伏厥陰血絡恐結瘧母議通絡以逐邪用仲景鱉甲煎丸每早服三十粒當寒熱日勿用昌二四三瘧皆邪入陰絡故汗下為忌經年瘧罷癥瘕瘧母仍聚季脅邪攻血氣之結攻逐瘀聚升降以通陰陽乃仲景成法但診脈細微食減神衰攻法再施恐擾中滿前與溫補通陽頗安然守中之補姑緩為宜瘧母人參當歸淡附子淡乾薑茯苓肉桂鱉甲膠丸諸瘧由伏邪而成非旦夕之因為患也六淫之氣惟燥不能為害而新涼收束實屬有關考之聖訓獨手三陽手厥陰卻無其症名醫者當辨其六氣中所傷何氣六經中病涉何經若小柴胡專主少陽豈能兼括也夫溫瘧癉瘧痰食瘴癘諸瘧皆有成方予不復贅但此症春月及冬時間有惟夏秋暑濕為患者居多暑必挾濕專傷氣分第一要分別其上焦中焦之因暑濕二氣何者為重若暑熱重者專究上焦肺臟清氣瘧來時必熱重而寒微唇舌必絳赤煩渴而喜涼飲飲多無痞滿之患其脈色自有陽勝之候當宗桂枝白虎法及天水散加辛涼之品為治若濕邪重者當議中焦脾胃陽氣瘧來時雖則熱勢蒸燔舌必有黏膩之苔渴喜暖湯胸脘覺痞脹嘔惡其脈色自有陽氣不舒之情狀當宗正氣散及二陳湯去甘草加杏蔻生薑之類主之必要陽勝於陰而後配和陽之劑日後方無貽累倘症象兩兼則兩法兼之可也大凡是症若邪氣輕而正不甚虛者寒熱相等而作止有時邪氣重而正氣怯者寒熱模糊來勢必混而不分又云邪淺則一日一發邪稍深則間日一發邪最深則三日一發古稱為三陰大瘧以肝脾腎三臟之見症為要領其補瀉寒溫亦不離仲景治三陰之法為根蒂可知陽經輕淺之方治之無益也所云移早則邪達於陽移晏則邪陷於陰陰陽勝復於此可參若久而不已必有他症之虞太陰之虛浮脹滿有通補之理中法開腑之五苓湯少陰之痿弱成勞有滋陰之復脈湯溫養之升奇法厥陰之厥逆吐蛔及邪結為瘧母有烏梅丸與鱉甲煎法又如心經瘧久勢必動及其營則為煩渴見紅之累肺經瘧久理必傷及其津則為胃秘腸痹之候一則涼陰為主一則清降為宜然而瘧之名目不一而瘧之兼症甚多若不達權通變而安能一一盡善即如暑濕格拒三焦而嘔逆不納者宗半夏瀉心法穢濁矇蔽膻中而清靈昧甚者用牛黃清心丸心陽暴脫有龍蠣之救逆胃虛嘔呃有旋覆代赭之成方如表散和解通陽補氣滋陰化營搜邪入絡動藥劫截辛酸兩和營氣並補及陽瘧之後養胃陰陰瘧之後理脾陽等法已全備矣彙集諸家融通無拘所謂用藥如用兵先生不愧良工之名也邵新甫徐評皆依樣畫葫蘆之談又評古聖凡一病必有一主方如瘧疾小柴胡湯主方也瘧象不同總以此方加減或有別症則不用原方亦可蓋不用柴胡湯而亦可愈者固有此理若以為瘧而斷不可用柴胡則亂道矣余向聞此老治瘧禁用柴胡耳食之人相傳以為秘法相戒不用余以為此乃妄人傳說此老決不至此今閱此案無一方用柴胡乃知此語信然則此老之離經叛道真出人意表者矣夫柴胡湯少陽經之主方凡寒熱往來之症非此不可而仲景用柴胡之處最多傷寒論云凡傷寒之柴胡症有數論但見一症便是不必悉具其推崇柴胡如此乃此老偏與聖人相背獨不用柴胡譬之太陽症獨不許用桂枝陽明症獨不許用葛根此必無知妄人豈有老名醫而有此等議論者真天下之怪事也泄瀉周因長夏濕熱食物失調所謂濕多成五泄也先用胃苓湯分利陰陽暑濕熱胃苓湯去甘草溫長夏濕勝為瀉腹鳴溺少腑陽不司分利先宜導濕和中胃苓湯又向年陰分傷及陽位每有腹滿便溏長夏入秋常有滯下此中焦氣分積弱水穀之氣易於聚濕或口鼻觸入穢邪遂令脾胃不和是夏秋調攝最宜加意擬夏秋應用方備採天暖氣蒸南方最有中痧痞脹諸恙未受病前心懷疑慮即飲芳香正氣之屬毋令邪入為第一義藿香梗白蔻仁橘紅桔梗杏仁鬱金降香厚朴夏至後熱勝濕蒸氣傷神倦用東垣益氣湯若汗出口渴兼生脈散斂液某秋暑穢濁氣從吸入寒熱如瘧上咳痰下洞泄三焦蔓延小水短赤議芳香闢穢分利滲濕藿香厚朴廣皮茯苓塊甘草豬苓澤瀉木瓜滑石檀香汁又進藥稍緩所言穢濁非臆說矣其陰莖囊腫是濕熱甚而下墜入腑與方書莖款症有間議河間法厚朴杏仁滑石寒水石石膏豬苓澤瀉絲瓜葉某陰瘧久傷成損俯不能臥脊強脈垂足跗浮腫乃督脈不用漸至傴僂廢疾近日暑濕內侵泄瀉先宜分利和中厚朴藿香廣皮茯苓澤瀉木瓜炒扁豆炒楂肉炒砂仁蔡二一氣短少續為虛近日腹中不和泄瀉暑傷先以清暑和脾預防滯下厚朴廣皮炙草茯苓澤瀉炒扁豆麥芽木瓜炒楂肉砂仁又香砂異功散葉五七平素操持積勞五志之火易燃上則鼻竅堵塞下有肛痔腸紅冬春溫邪是陽氣發越邪氣乘虛內伏夫所伏之邪非比暴感發散可解況兼勞倦內傷之體病經九十日來足跗日腫大便日行五六次其形黏膩其色黃赤紫滯小便不利必隨大便而稍通此腎關樞機已廢二腸陽腑失司所進水穀脾胃不主運行釀濕墜下轉為瘀腐之形正當土旺入夏脾胃主氣此濕熱內淫由乎脾腎日傷不得明理之醫一誤再誤必致變現腹滿矣夫左脈之緩澀是久病陰陽之損是合理也而右脈弦大豈是有餘形質之滯即仲景所云弦為胃減大則病進亦由陽明脈絡漸弛腫自下日上之義守中治中有妨食滋滿之弊大旨中宜運通下宜分利必得小溲自利腑氣開闔始有轉機若再延綿月餘夏至陰生便難力挽矣四苓加椒目厚朴益智廣皮白又服分消方法五日瀉減溺通足跗浮腫未消要知脾胃久困濕熱滯濁無以運行所進水穀其氣蒸變為濕濕勝多成五瀉欲使濕去必利小便然滲利太過望六年歲之人又當慮及下焦久病入夏正脾胃司令時候脾臟宜補則健胃腑宜疏自清扶正氣驅濕熱乃消補兼施治去晚服資生丸炒米湯送下早服人參廣皮防己厚朴茯苓生術澤瀉神麯黃連吳萸朱口腹不慎濕熱內起泄瀉復至此濕多成五泄氣瀉則腹脹矣濕熱人參茅朮川連黃芩白芍廣皮茯苓澤瀉楂肉陳脈緩大腹痛泄瀉小溲不利此水穀內因之濕鬱蒸腸胃致清濁不分若不清理分消延為積聚黏膩滯下議用芩芍湯淡黃芩生白芍廣皮厚朴藿香茯苓豬苓澤瀉張脈緩澀腹滿痛瀉不爽氣鬱滯久濕凝在腸用丹溪小溫中丸針砂小川連蒼朮白朮香附半夏廣皮青皮神麯漿丸程診脈肝部獨大脾胃緩弱平昔納穀甚少而精神頗好其先天充旺不待言矣目今水瀉少腹滿脹少腹為厥陰肝位由陰陽不分濁踞於下致肝失疏泄當以五苓散導水利濕仿古急開支河之法黃九歲久瀉兼發瘡痍是濕勝熱鬱苦寒必佐風藥合乎東垣脾宜升胃宜降之旨人參川連黃柏廣皮炙草生於術羌活防風升麻柴胡神麯麥芽朱三四形瘦尖長木火體質自上年泄瀉累用脾胃藥不效此陰水素虧酒食水穀之濕下墜陰弱不能包涵所致宜苦味堅陰淡滲勝濕炒川連炒黃柏厚朴廣皮白茯苓豬苓澤瀉炒楂肉陳寒濕已變熱鬱六腑為窒為瀉生臺術厚朴廣皮白茯苓益智仁木瓜茵陳澤瀉某三三酒濕內聚痰飲余濕下注五泄常用一味茅朮丸炒半夏茯苓苡仁刺蒺藜新會皮王氏頭脹喜冷飲咳嘔心中脹泄瀉不爽此為中暑故止澀血藥更甚舌色白議清上焦氣分中暑石膏淡黃芩炒半夏橘紅厚朴杏仁王二七自春徂冬瀉白積至今腹痛小水不利想食物非宜脾胃水寒偏注大腸當分其勢以導太陽胃苓湯主之中陽濕滯胡二三三瘧劫截不效必是陰臟受病衄血熱渴食入不化痛瀉二者相反思病延已久食物無忌病中勉強進食不能充長精神即為滯濁阻痹先以脹瀉調理不必以瘧相混草果厚朴陳皮木香茯苓皮腹皮豬苓澤瀉郁四八經營勞心納食違時飢飽勞傷脾胃受病脾失運化夜屬陰晦至天明洞瀉黏膩食物不喜脾弱惡食柔濁之味五苓通膀胱分泄濕氣已走前陰之竅用之小效東垣謂中氣不足溲便乃變陽不運行濕多成五泄矣人參生白朮茯苓炙草炮姜肉桂某五八形寒便瀉舌白厚朴廣皮半夏茯苓皮桂枝木生薑程氏寒濕腹痛噁心泄瀉寒濕厚朴藿香梗益智仁廣皮炒茅朮煨木香茯苓澤瀉吳氏寒凝胃陽腹痛泄瀉草果厚朴茅朮廣皮吳萸炒楂肉程氏瀉後腹膨人參生益智炮姜茯苓厚朴廣皮砂仁陸嫗氣滯為脹濕鬱為瀉主以分消炒厚朴大腹皮茯苓澤瀉煨益智廣皮炒楂肉某氏雨濕涼氣乘於脾胃泄瀉之後腹膨減食宜健中運濕焦白朮炭厚朴廣皮生穀芽炒扁豆木瓜茯苓澤瀉程女濕鬱脾陽腹滿肢冷泄瀉四苓散加厚朴廣皮鄒嫗濕傷泄瀉小便全少腹滿欲脹舌白不飢病在足太陰脾宜溫中佐以分利生茅朮厚朴草果廣皮茯苓豬苓澤瀉炒砂仁又早服真武丸薑湯送二錢五分一兩夜服針砂丸開水送一錢五分六錢又人參附子枳實茯苓乾薑生白芍某氏脈沉緩肌肉豐盛是水土稟質陽氣少於運行水穀聚濕布及經絡下焦每有重著筋痛食稍不運便易泄瀉經水色淡水濕交混總以太陰脾臟調理若不中窾恐防脹病人參茯苓白朮炙草廣皮羌活獨活防風澤瀉倪六七陽傷濕聚便溏足腫粗桂枝生白朮木防己茯苓澤瀉又脈緊足腫便溏陽微濕聚氣不流暢怕成單脹照前方加茵陳又晨泄肢腫生白朮桂枝木淡附子茯苓澤瀉陸五一當臍動氣子夜瘕泄晝午自止是陽衰寒濕冱凝腑陽不運每瀉則脹減宜通不宜澀制川烏生茅朮茯苓木香厚朴廣皮朱消渴乾嘔口吐清涎舌光赤泄瀉熱病四十日不愈熱邪入陰厥陽犯胃吞酸不思食久延為病傷成勞肝犯胃川連烏梅黃芩白芍人參訶子皮陶十八病由春木正旺中焦受克先泄瀉繼以腹痛小便不利食不思納皆是六腑不和所致夫胃為陽土肝屬陰木腑宜通肝宜柔宜涼治胃必佐泄肝制其勝也閱方呆補不知臟腑陰陽故辨及之泡淡黃芩炒小川連炒廣皮厚朴生白芍炒烏梅肉豬苓澤瀉楊因驚而瀉腹痛欲嘔是為蛔厥當用酸苦忌進甜物川椒烏梅肉川連淡乾薑金鈴子延胡索桂枝木生白芍唐胃中不和不飢少寐肝風震動頭迷溏泄高年經月未復兩和厥陰陽明炒半夏人參枳實茯苓炒烏梅肉潘入夜咽乾欲嘔食納腹痛即瀉此胃口大傷陰火內風劫爍津液當以肝胃同治用酸甘化陰方人參一錢半焦白芍三錢訶子皮七分炙草五分陳倉米三錢又去陳米加南棗一枚又咽乾不喜湯飲腹鳴溺濁五液消爍虛風內風擾於腸胃人參木瓜焦白芍赤石脂炙草朱經月減食泄瀉下焦無力以扶土泄木法人參焦術炒益智茯苓木瓜廣皮某病後陰傷作瀉烏梅白芍炙草廣皮茯苓荷葉王霍亂後痛瀉已緩心中空洞肢節痿弱此陽明脈虛內風閃爍蓋虛象也異功去參朮加烏梅木瓜白芍又上吐下瀉之後中氣大虛身痛肢浮虛風內動以補中為法異功散加木瓜薑棗某腹鳴晨泄巔眩脘痹形質似屬陽不足診脈小弦非二神四神溫固之症蓋陽明胃土已虛厥陰肝風振動內起久病而為飧泄用甘以理胃酸以制肝人參茯苓炙草廣皮烏梅木瓜某頭痛損目黎明腸鳴泄瀉煩心必目刺痛流淚是木火生風致脾胃土位日戕姑議泄木安土法人參半夏茯苓炙草丹皮桑葉徐六六自春季胸脅肌腠以及腹中疼痛從治肝小愈腹鳴泄瀉不止久風飧泄都因木乘土位東垣云治脾胃必先制肝仿此肝犯脾胃人參焦術炙草木瓜烏梅炒菟絲餅程勞損經年食入腹脹痛瀉心中寒凜膚腠熱蒸此陽不內潛脾胃久困萬無治嗽清降之理議用戊己湯扶土製木法葉三六左脅氣脹在皮膜之裡此絡脈中病也泄肝破氣久服脾胃受困而為泄瀉得養中小愈然以藥治藥脈絡之病仍在半夏桂枝茯苓遠志歸鬚橘紅薑棗湯泛丸張嫗腹鳴䐜脹清晨瘕泄先以熄肝風安脾胃方人參茯苓木瓜炒烏梅炒菟絲子又泄肝醒胃方吳萸生白芍炒烏梅人參茯苓某脈右弦腹膨鳴響痛瀉半年不痊此少陽木火鬱傷脾土久則浮腫脹滿法當疏通泄郁非辛溫燥熱可治膽郁傷脾黃芩白芍桑葉丹皮柴胡青皮吳陽虛惡寒噁心吞酸泄瀉乃年力已衰更飲酒中虛治法必以脾胃扶陽脾胃陽虛人參茯苓附子白朮乾薑胡蘆巴趙晨泄難忍臨晚稍可寧耐易飢善食仍不易消磨其故在乎脾胃陰陽不和也讀東垣脾胃論謂脾宜升則健胃宜降則和援引升降為法人參生於術炮附子炙草炒歸身炒白芍地榆炭炮姜灰煨葛根煨升麻又腸風鳴震泄利得緩猶有微痛而下都緣陽氣受傷垢滯永不清楚必以溫通之劑為法生茅朮三錢炙草五分生炮附子一錢厚朴一錢廣皮一錢製大黃五分金五八能食不化腹痛泄瀉若風冷外乘肌肉著冷其病頃刻即至上年用石刻安腎丸初服相投兩旬不效知是病在中焦不必固下矣自述行走數十里未覺衰倦痛處繞臍議用治中法足太陰陽明主治生於術生茅朮生益智淡乾薑胡蘆巴茯苓木瓜蓽茇王三五三年久損氣怯神奪此溫養補益皆護元以冀卻病原不藉乎桂附辛熱以劫陰液今胃減咽乾大便溏泄經月夏三月脾胃主候宜從中治人參炒白芍炙草煨益智炒木瓜茯苓廣皮金沖年遺恙先天最薄夏秋瘧傷食少不運痞脹溏瀉都是脾胃因病致虛當薄味調和進治中法人參益智廣皮茯苓木瓜炒澤瀉穀芽煨姜李氏脈沉形寒腰髀牽強腹鳴有形上下攻觸每晨必瀉經水百日一至仿仲景意茯苓炮淡乾薑生於術肉桂某氏陽微濁滯吐瀉心痛當辛溫開氣胃陽甦醒乃安炒半夏厚朴廣皮益智仁煨木香烏藥香附汁薑汁某二十色白脈耎體質陽薄入春汗泄神力疲倦大便溏泄不爽皆脾陽困頓不克勝舉無以鼓動生生陽氣耳刻下姑與和中為先脾陽虛益智仁八分廣皮一錢姜灰七分茯苓三錢生穀芽三錢楊小便不利大便溏泄補脾法中佐以淡滲分其陰陽人參熟術茯苓象牙屑澤瀉苡仁廣皮白芍薛十三水穀濕邪內著脾氣不和腹膨不飢便溏四肢酸痹厚朴茯苓皮大腹皮防己廣皮澤瀉苡仁桂枝木又肢酸腹膨便溏木防己生白朮苡仁木瓜桂枝木澤瀉馬四一飲酒少谷中氣久虛晨泄下部冷腎陽脾陽兩憊知飢少納法當理陽酒客性不喜甘膩滋柔之藥脾腎陽虛茯苓覆盆子生益智炒菟絲餅補骨脂芡實朱四十酒濕內困脾腎陽虛用黑地黃丸蒸餅水煮和丸徐五九晨泄病在腎少腹有瘕亦是陰邪若食葷腥厚味病即頓發乃陽氣積衰議用四神丸席五四陰瘧初愈不慎食物清陽既微健運失司腸胃氣滯遂為洞泄且足跗微腫慮其腹笥欲滿夏季脾胃主令尤宜淡薄藥以通陽為先平時脾腎兩治胃苓湯去白朮甘草接服黑地黃丸去五味朱四一久瀉無有不傷腎者食減不化陽不用事八味腎氣乃從陰引陽宜乎少效議與升陽鹿茸人參陽起石茯苓炮附子淡乾薑又久瀉必從脾腎主治但痛利必有黏積小溲短縮不爽溫補不應議通腑氣厚朴廣皮茯苓豬苓澤瀉川連煨木香炒山楂炒神麯僧五五瘕泄一年食減腹鳴屬脾腎陽衰近腹中微痛兼理氣滯用陳無擇三神丸某背部牽掣入脅晨瀉苓桂術甘去甘加鹿角薑棗龔五二診脈兩關緩弱尺動下垂早晨未食心下懊憹納穀仍不易化蓋脾陽微中焦聚濕則少運腎陰衰固攝失司為瘕泄是中宜旋則運下宜封乃藏是醫藥至理議早進治中法夕用四神丸高氏經來腹膨臍脊酸垂自秋季泄瀉不已脘痞妨食用濟生丸不應鹿角霜炒菟絲餅生杜仲淡蓯蓉茯苓沙苑焦歸身炒黑小茴陳氏產育十五胎下元氣少固攝晨泄自古治腎陽自下涵蒸脾陽始得運變王氏以食下不化為無陽凡腥膩沉著之物當忌早用四神丸晚服理中去朮草加益智木瓜砂仁張嫗泄瀉脾腎虛得食脹人參炒菟絲子炒黃乾薑茯苓煨益智木瓜某瀉五十日腹鳴渴飲溲溺不利畏寒形倦寐醒汗出用溫中平木法人參胡蘆巴炮姜茯苓訶子皮附子粟殼某脾腎不攝五更瀉巴戟菟絲子五味補骨脂芡實建蓮山藥炙草某久瀉脈虛人參五味禹餘糧石張氏產後不復腹疼瘕瀉炒菟絲餅鹿角霜生杜仲淡補骨脂炒黑小茴炒杞子茯苓顧氏閱病原是勞損自三陰及於奇經第腹中氣升胃痛暨有形動觸衝任脈乏守補則滯涼潤則滑漏瘍久瀉寒熱最為吃緊先固攝下焦為治人參炒菟絲餅芡實湖蓮茯神赤石脂某腎虛瘕泄炒香菟絲子生杜仲炒焦補骨脂茴香雲茯苓又陽微子後腹鳴前方瘕泄已止人參炒菟絲子炒補骨脂湖蓮肉芡實茯苓顧脾腎瘕泄腹膨肢腫久病大虛議通補中下之陽人參川熟附茯苓澤瀉炒黃乾薑某腎虛瘕泄乃下焦不攝純剛恐傷陰液以腎惡燥也早服震靈丹二十丸晚間米飲湯調服參苓白朮散二錢二藥服十二日高脈細下垂高年久咳腹痛泄瀉形神憔悴乃病傷難復非攻病藥石可愈擬進甘緩法中虛腹痛炙甘草炒白芍炒飴糖茯神南棗王過食泄瀉胃傷氣陷津不上涵臥則舌乾微渴且宜薄味調攝和中之劑量進二三可安食傷人參葛根生穀芽炙甘草廣皮荷葉蒂泄瀉注下症也經云濕多成五泄曰飧曰溏曰鶩曰濡曰滑飧泄之完穀不化濕兼風也溏泄之腸垢汙積濕兼熱也驚溏之澄清溺白濕兼寒也濡泄之身重軟弱濕自勝也滑泄之久下不能禁固濕勝氣脫也是以胃風湯治有血之飧泄清六丸療腸垢之熱溏鶩溏便清溺白中有硬物選用理中治中滑泄脈微氣脫洞下不禁急投四柱六柱飲惟濡泄有虛有實或以胃苓或以朮附至於脾泄胃泄腎泄大腸泄小腸泄大瘕泄痰泄郁泄傷酒傷食泄古方古法條載甚詳其急則治標必使因時隨症理固然也及其緩則治本惟知燥脾滲濕義有未盡者乎蓋脾同坤土本至靜之體而有干健之用生萬物而役於萬物從水從火為寒為熱歷觀協熱下利者十不得一二從水之寒泄者十常八九焉言當然者主治在脾推所以然者必求之水火因思人身水火猶權衡也一勝則一負火勝則水負水勝則火負五泄多濕濕水同氣水之盛則火之衰也於是推少陽為三陽之樞相火寄焉風火扇胃而熟腐五穀少陰為三陰之樞龍火寓焉熏蒸臟腑而轉輸糟粕胃之納脾之輸皆火之運也然非雷藏龍馴何能無燥無濕勢有冒明燎上之眚如果土奠水安從此不泛不濫定無清氣在下之患矣吾故曰五泄之治平水火者清其源崇堤土者塞其流耳令觀葉氏診記配合氣味妙在清新縱橫治術不離規矩依然下者升滑者固寒者溫熱者清脈弦治風脈濡滲濕總之長於辨症立方因而投劑自能輒效所謂讀古而不泥於古採方而不執於方化裁之妙人所難能者余友吳子翼文昔在葉氏門牆曾言先生洞達人情諳練時務使之應世一人傑也以故小道居此盛名又聞其應酬之暇好讀兩漢出辭自必高古惜乎著作長案不能一見令人嘆息不忘耳蔣式玉徐評治瀉之法不過分清降濁利水通氣案中方亦平妥重複者七八編書之人意欲何為凡泄瀉無不有痰有濕有寒有風故腸內不和而生此病案中一味蠻補蠻澀人參五味方居其半無邪而純虛者或能有效如正雖虛而尚有留邪者則此症永無愈期矣當時誤人亦不少也當時此老名重凡延診者想必病重而久故案中補澀之味甚多而分清降濁者少也
