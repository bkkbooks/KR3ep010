body:
  text: 卷一中風錢偏枯在左血虛不縈筋骨內風襲絡脈左緩大肝腎虛內風動制首烏四兩烘枸杞子去蒂二兩歸身二兩用獨枝者去梢淮牛膝二兩蒸明天麻二兩面煨三角胡麻二兩打碎水洗十次烘黃甘菊三兩水煎汁川石斛四兩水煎汁小黑豆皮四兩煎汁用三汁膏加蜜丸極細早服四錢滾水送陳四七肝血腎液內枯陽擾風旋乘竅大忌風藥寒涼炒杞子桂圓肉炒菊花炙黑甘草黃耆去心牡蠣金失血有年陰氣久傷復遭憂悲悒鬱陽挾內風大冒血舍自空氣乘於左口喎肢麻舌喑無聲足痿不耐行走明明肝腎虛餒陰氣不主上承重培其下冀得風熄議以河間法熟地四兩牛膝一兩半萸肉二兩遠志一兩半炒黑杞子二兩菊花二兩炒五味一兩半川斛二兩四錢茯神二兩淡蓯蓉干一兩二錢加蜜丸服四錢沈四九脈細而數細為臟陰之虧數為營液之耗上年夏秋病傷更因冬暖失藏入春地氣升肝木風動遂令右肢偏痿舌本絡強言謇都因根蒂有虧之症庸俗泄氣降痰發散攻風再劫真陰漸漸神憒如寐倘加昏厥將何療治議用仲景復脈法液虛風動復脈湯去薑桂又操持經營神耗精損遂令陰不上朝內風動躍為痱中之象治痰攻劫溫補陰愈損傷枯槁日甚幸以育陰熄風小安今夏熱益加發泄真氣更虛日餌生津益氣勿怠大暑不加變動再商調理固本丸去熟地加北味天冬生地人參麥冬五味金六九初起神呆遺溺老人厥中顯然數月來夜不得寐是陽氣不交於陰勿謂痰火專以攻消乃下虛不納議與潛陽龜腹甲心熟地炭干蓯蓉天冬生虎脛骨淮牛膝炒杞子黃柏盧嗔怒動陽恰值春木司升厥陰內風乘陽明脈絡之虛上凌咽喉環繞耳後清空之地升騰太過脂液無以營養四末而指節為之麻木是皆痱中根萌所謂下虛上實多致巔頂之疾夫情志變蒸之熱閱方書無芩連苦降羌防辛散之理肝為剛臟非柔潤不能調和也陽升熱蒸液虧鮮生地元參心桑葉丹皮羚羊角連翹心又生地阿膠牡蠣川斛知母汪五三左肢麻木膝蓋中牽縱忽如針刺中年後精血內虛虛風自動乃陰中之陽損傷陰中陽虛淡蓯蓉干二兩枸杞三兩歸身二兩生虎骨二兩沙苑二兩巴戟天二兩明天麻二兩桑寄生四兩精羊肉膠阿膠丸早服四錢交冬加減用人參丸服錢五八用力努掙精從溺管瀝出已經兩耳失聰腎竅失司顯然虛象凡腎液虛耗肝風鴟張身肢麻木內風暗襲多有痱中之累滋液熄風溫柔藥涵養肝腎經言肝為剛臟而腎臟惡燥若攻風劫痰捨本求末矣陰陽並虛熟地枸杞蓯蓉石菖蒲當歸沙苑巴戟遠志張四九中風以後肢麻言謇足不能行是肝腎精血殘憊虛風動絡下寒二便艱阻凡腎虛忌燥以辛潤溫藥蓯蓉枸杞當歸柏子仁牛膝巴戟川斛小茴陳五九中絡舌喑不言痛自足起漸上麻木䐜脹已屬痼疾參苓益氣兼養血絡僅堪保久人參茯苓白朮枸杞當歸白芍天麻桑葉周大寒土旺節候中年勞倦陽氣不藏內風動越令人麻痹肉瞤心悸汗泄煩躁乃里虛欲暴中之象議用封固護陽為主無暇論及痰飲他歧陽虛衛疏人參黃耆附子熟術某陽明脈絡空虛內風暗動右肩胛及指麻木胃虛表疏玉屏風散加當歸天麻童桑俞氏寡居一十四載獨陰無陽平昔操持有勞無逸當夏四月陽氣大泄主令忽然右肢麻木如墮不舉汗出麻冷心中卒痛而呵欠不已大便不通診脈小弱豈是外感病象似乎痱中其因在乎意傷憂愁則肢廢也攻風劫痰之治非其所宜大旨以固衛陽為主而宣通脈絡佐之衛虛絡痹桂枝附子生黃耆炒遠志片薑黃羌活唐六六男子右屬氣虛麻木一年入春口眼歪邪乃虛風內動老年力衰當時令之發泄忌投風藥宜以固衛益氣氣虛人參黃耆白朮炙草廣皮歸身天麻煨姜南棗凡中風症有肢體緩縱不收者皆屬陽明氣虛當用人參為首藥而附子黃耆炙草之類佐之若短縮牽攣則以逐邪為急胡五六陽明脈絡已空厥陰陽氣易逆風勝為腫熱久為燥面熱喉舌乾涸心中填塞無非陽化內風胃受沖侮不飢不納矣有年久延頗慮痱中風陽燥熱羚羊角連翹丹皮黑山梔青菊葉元參花粉天麻張五七痱中經年眩暈汗出陽氣有升無降內風無時不動此竟夜不寐屬衛陽不肯交於營陰矣沉痼之症循理按法尚難速效紛紛亂藥焉望向安議用固陽明一法胃虛陽升桂枝木生黃耆川熟附炒遠志龍骨牡蠣姜棗劉七三神傷思慮則肉脫意傷憂愁則肢廢皆痿象也緣高年陽明脈虛加以愁煩則厥陰風動木橫土衰培中可效若窮治風痰便是劫爍則謬黃耆於朮桑寄生天麻白蒺藜當歸枸杞菊花汁加蜜丸包老年隆冬暴中乃陰陽失交本病脈左大右濡內風掀越中陽已虛第五日已更衣神憊欲寐宗王先生議陽明厥陰主治法以候裁肝胃同治人參茯苓白蒺藜炒半夏炒杞子甘菊某陽明虛內風動右肢麻痹痰多眩暈天麻鉤藤半夏茯苓廣皮沈風中廉泉舌腫喉痹麻木厥昏內風亦令阻竅上則語言難出下則二便皆不通調考古人呂元膺每用芳香宣竅解毒勿令壅塞致危也胞絡熱邪阻竅至寶丹四丸勻四服葛三八年未四旬肌肉充盈中病二年猶然舌強言謇舌厚邊紫而納食便溺仍好乃心胞絡間久積之熱瀰漫以致機竅不靈平昔酒肉助熱動風為病病成反聚於清空之絡醫藥之治痰治火直走腸胃是以久進多投無效至寶丹程脈濡無熱厥後右肢偏痿口喎舌歪聲音不出此陰風濕晦中於脾絡加以寒滯湯藥蔽其清陽致清氣無由展舒法宗古人星附六君子湯益氣仍能攻風祛痰若曰風中廉泉乃任脈為病與太陰脾絡有間矣風濕中脾絡人參茯苓新會皮香附汁南星薑汁炒竹節白附子薑汁炒呂五九陽邪襲經絡而為偏痱血中必熱艾灸反助絡熱病劇廢食清涼固是正治然須柔劑不致傷血且有熄風功能艾灸絡熱犀角羚角生地元參連翹橘紅膽星石菖蒲楊中後不復交至節四日寒戰汗泄遂神昏不醒是陰陽失於交戀真氣欲絕有暴脫之慮擬進回陽攝陰法脫人參乾薑淡附子五味豬膽汁又人參三錢附子三錢又人參附子五味龍骨牡蠣龔五七厥症脈虛數病在左軀腎虛液少肝風內動為病偏枯非外來之邪腎陰虛肝風動制首烏生地杞子茯神明天麻菊花川斛徐四一水虧風動舌強肢麻中絡之象當通補下焦復以清上熟地淡蓯蓉杞子牛膝五味遠志羚羊角茯苓麥冬菖蒲蜜丸丁大寒節真氣少藏陽挾內風旋動以致痱中舌邊赤中有苔滯忌投攻風劫痰益腎涼肝治本為法生地元參麥冬川斛遠志石菖蒲蔗漿曾五二脈絃動眩暈耳聾行走氣促無力肛痔下垂此未老欲衰腎陰弱收納無權肝陽熾虛風蒙竅乃上實下虛之象質厚填陰甘味熄風節勞戒飲可免僕中虎潛去鎖陽知母加大肉蓯蓉煉蜜丸張脈細小帶弦冬季藏納少固遂至痱中百餘日來諸患稍和惟語言欲出忽謇多言似少相續此皆腎脈不營舌絡以致機竅少宣乃虛象也早用地黃飲子煎法以治下晚用星附六君子以益虛宣竅某嫗今年風木司天春夏陽升之候兼因平昔怒勞憂思以致五志氣火交併於上肝膽內風鼓動盤旋上盛則下虛故足膝無力肝木內風壯火乘襲胃土胃主肌肉脈絡應肢繞出環口故唇舌麻木肢節如痿固為中厥之萌觀河間內火召風之論都以苦降辛泄少佐微酸最合經旨折其上騰之威使清空諸竅毋使濁痰壯火矇蔽乃暫藥權衡也至於頤養工夫寒暄保攝尤當加意於藥餌之先上午服金石斛三錢化橘紅五分白蒺藜二錢真北秦皮一錢草決明二錢冬桑葉一錢嫩鉤藤一錢生白芍一錢又前議苦辛酸降一法肝風胃陽已折其上引之威是諸症亦覺小愈雖曰治標正合歲氣節候而設思夏至一陰來復高年本病預宜持護自來中厥最防於暴寒驟加致身中陰陽兩不接續耳議得攝納肝腎真氣補益下虛本病九制熟地先用水煮半日徐加醇酒砂仁再煮一日曬乾再蒸如法九次乾者炒存性八兩肉蓯蓉用大而黑色者去甲切片盛竹籃內放長流水中浸七日曬乾以極淡為度四兩生虎膝骨另搗碎研二兩淮牛膝鹽水蒸三兩制首烏四兩烘川萆薢鹽水炒二兩川石斛八兩熬膏赤白茯苓四兩柏子霜二兩上藥照方制末另用小黑穭豆皮八兩煎濃汁法丸每早百滾水服三錢議晚上用健中運痰兼制亢陽火動風生從外臺茯苓飲意人參二兩熟半夏二兩茯苓四兩生廣皮肉二兩川連薑汁炒一兩枳實麩炒二兩明天麻二兩煨鉤藤三兩白蒺藜雞子黃拌煮洗淨炒去刺三兩地慄粉二兩上末用竹瀝一杯薑汁十匙法丸食遠開水服三錢又近交秋令燥氣加臨先傷於上是為肺燥之咳然下焦久虛厥陰繞咽少陰循喉往常口燥舌糜是下虛陰火泛越先治時病燥氣化火暫以清潤上焦其本病再議白扁豆勿研三錢玉竹三錢白沙參二錢麥冬去心三錢甜杏仁去皮尖勿研二錢象貝母去心勿研二錢冬桑葉一錢捲心竹葉一錢洗白糯米七合清湯煎又暫服煎方北沙參三錢生白扁豆二錢麥冬三錢干百合一錢半白茯神一錢半甜杏仁去皮尖一錢半又痰火上實清竅為蒙於暮夜兼進清上方法麥冬八兩天冬四兩苡米八兩柿霜四兩長條白沙參八兩生白扁豆皮八兩甜梨汁二觔甘蔗漿二斤水熬膏真柿霜收每服五錢開水送下又夏熱秋燥陽津陰液更傷口齒咽喉受病者屬陰火上乘氣熱失降使然進手太陰清燥甘涼方法甚安其深秋初冬調理大旨以清上實下則風熄液潤不致中厥至冬至一陽初復再議燕窩菜洗淨另熬膏一斤甜梨去皮核絹袋絞汁熬膏二十個人參另熬收三兩九制熟地水煮四兩天冬去心蒸二兩麥冬去心四兩黃耆皮生用四兩炙黑甘草二兩五味二兩蒸云茯神三兩蒸又左關尺脈獨得動數多語則舌音不清麻木偏著右肢心中熱熾難以鳴狀此陽明脈中空乏而厥陰之陽挾內風以糾擾真氣不主藏聚則下無力以行動虛假之熱上泛為喉燥多咳即下虛者上必實意冬至後早服方從丹溪虎潛法九制熟地照前法制八兩肉蓯蓉照前制四兩天冬去心蒸烘四兩當歸炒焦二兩生白芍三兩川斛熬膏八兩黃柏鹽水炒二兩淮牛膝鹽水蒸三兩上為末另用虎骨膠三兩溶入蜜搗丸服五錢滾水送又太太諸恙向安今春三月陽氣正升肝木主乎氣候肝為風臟風亦屬陽卦變為巽兩陽相合其勢方張內風挾陽動旋脂液暗耗而麻痹不已獨甚於四肢者風淫末疾之謂也經云風淫於內治以甘寒夫痰壅無形之火火灼有形之痰甘寒生津痰火風兼治矣天冬四兩麥冬八兩長白沙參八兩明天麻四兩煨白蒺藜照前制四兩甜梨汁一斤蘆根汁流水者可用八兩青蔗漿一斤鮮竹瀝八兩柿霜四兩先將二冬沙參天麻白蒺藜加泉水煎汁濾過配入四汁同熬成膏後加柿霜收每日下午食遠服五錢百滾水調服又下虛上實君相火亢水涸液虧多有暴怒跌僕之虞此方滋液救焚使補力直行下焦不助上熱議鐵甕申先生瓊玉膏方鮮生地水洗淨搗自然汁二斤綿紙濾清隨和入生白沙蜜一斤另置一鉛罐或圓鉛球盛前藥封堅固用鐵鍋滿盛清水中做井字木架放罐在上桑柴火煮三晝夜頻添水不可住火至三日後連器浸冷水中一日頃取出入後項藥人參蒸烘研細末六兩白茯苓蒸研粉十六兩真秋石銀罐內煅候冷研一兩三味拌入前膏如干豆沙樣收貯小口瓷瓶內紮好勿令泄氣每早百滾水調服五六錢又立冬後三日診得左脈小絃動數右手和平略虛問得春夏平安交秋後有頭暈左目流淚足痿無力不能行走舌生紅刺微咳有痰此皆今年天氣大熱已久熱則真氣泄越虛則內風再旋經言痿生大熱熱耗津液而舌刺咳嗽流淚者風陽升於上也上則下焦無氣矣故補肝腎以攝納腎氣為要而清上安下其在甘涼不傷脾胃者宜之制首烏四兩杞子炒一兩半天冬去心二兩茺蔚子蒸二兩黃甘菊一兩半黑穭豆皮二兩茯苓蒸二兩川石斛熬膏八兩虎骨膠二兩水溶上末以川斛膏同溶化虎骨膠搗丸早上滾水服三四錢又久熱風動津液日損舌刺咳嗽議以甘藥養其胃陰老年納穀為寶生扁豆四兩麥冬四兩北沙參三兩天花粉二兩甘蔗漿十二兩柿霜二兩白花百合四兩熬膏加飴糖兩許每服時滾水調服三四錢晚上服又液燥下虧陽挾內風上引陰不上承舌絡強則言謇氣不注脈則肢痿乏力步趨凡此皆肝腎臟陰本虛鎮補之中微逗通陽為法以臟液虛不受純溫藥耳水制熟地四兩阿膠二兩女貞實二兩穭豆皮二兩淡肉蓯蓉一兩茯神二兩旱蓮草二兩川石斛三兩用精羯羊肉膠為丸早上滾水服四五錢又暫服煎方生地沙參茺蔚子黑穭豆皮川斛牛膝又晚服丸方九蒸桑葉八兩三角胡麻四兩九制首烏三兩白茯神三兩人參二兩炙甘草一兩酸棗仁二兩炒苡仁二兩上為末桂圓肉三兩煎湯法丸每服三錢百滾水下又今年天符歲會上半年陽氣大泄見病都屬肝胃以厥陰為風臟而陽明為盛陽耳陰陽不肯相依勢必暴來厥中過大暑可免以暑濕大熱更多開泄致元氣不為相接耳然此本虛標實氣火升騰所致經旨以苦寒咸潤酸泄少佐微辛為治議進補陽明泄厥陰法人參一錢生牡蠣五錢生白芍二錢烏梅肉四分川黃連鹽水炒六分熟半夏醋炒清水漂洗一錢上午服丸方人參二兩茯苓三兩生鹽水炒黃連五錢半夏醋炒水洗淨一兩半鹽水炒廣皮二兩枳實麩炒一兩半白蒺藜雞子黃制一兩半生白芍一兩半烏梅肉蒸一兩為末竹瀝法丸早上服三錢百滾湯下又夏月進酸苦泄熱和胃通隧為陽明厥陰治甚安入秋涼爽天人漸有收肅下降之理緣有年下虧木少水涵相火內風旋轉熏灼胃脘逆沖為嘔舌絡被熏則絳赤如火消渴便阻猶剩事耳凡此仍屬中厥根萌當加慎靜養為宜生雞子黃一枚阿膠一錢半生白芍三錢生地三錢天冬去心一錢川連一分生上午服又心火亢上皆為營液內耗先以補心湯理心之用人參同煎一錢川連水炒六分犀角二錢鎊元參二錢鮮生地五錢丹參一錢捲心竹葉二錢又苦味和陽脈左頗和但心悸少寐已見營氣衰微仿金匱酸棗仁湯方仍兼和陽益心氣以通肝絡酸棗仁炒黑勿研五錢茯神三錢知母一錢川芎一分人參六分同煎天冬去心一錢陳脈左數右弦緩有年形盛氣衰冬春之交真炁不相維續內風日熾左肢麻木不仁舌歪言謇此屬中絡調理百日戒酒肉可望向愈痰火阻絡羚羊角陳膽星丹皮橘紅連翹心石菖蒲鉤藤川斛又羚羊角元參連翹花粉川貝母橘紅竹瀝又丹溪云麻為氣虛木是濕痰敗血診左脈濡澀有年偏枯是氣血皆虛方書每稱左屬血虛右屬氣虛未必盡然人參半夏廣皮茯苓歸身白芍炙草桑枝又經絡為痰阻大便不爽昨日跌僕氣亂痰出甚艱轉方以宣經隧炒半夏石菖蒲廣橘紅茯苓膽星枳實竹瀝薑汁葉初春肝風內動眩暈跌僕左肢偏痿舌絡不和呼吸不爽痰火上蒙根本下衰先宜清上痰火羚羊角茯苓橘紅桂枝半夏鬱金竹瀝薑汁又風熱爍筋骨為痛痰火氣阻呼吸不利照前方去鬱金竹瀝薑汁加白蒺藜鉤藤又炒半夏茯苓鉤藤橘紅金石斛石菖蒲竹瀝薑汁又人參半夏枳實茯苓橘紅蒺藜竹瀝薑汁風為百病之長故醫書咸以中風列於首門其論症則有真中類中中經絡血脈臟腑之分其論治則有攻風劫痰養血潤燥補氣培元之治蓋真中雖風從外來亦由內虛而邪得以乘虛而入北方風氣剛勁南方風氣柔和故真中之病南少北多其真中之方前人已大備不必贅論其類中之症則河間立論云因煩勞則五志過極動火而卒中皆因熱甚生火東垣立論因元氣不足則邪湊之令人僵仆卒倒如風狀是因乎氣虛而丹溪則又云東南氣溫多濕由濕生痰痰生熱熱生風故主乎濕三者皆辨明類中之由也類者偽也近代以來醫者不分真偽每用羌防星半烏附細辛以祛風豁痰虛症實治不啻如枘鑿之殊矣今葉氏發明內風乃身中陽氣之變動肝為風臟因精血衰耗水不涵木木少滋榮故肝陽偏亢內風時起治以滋液熄風濡養營絡補陰潛陽如虎潛固本復脈之類是也若陰陽並損無陰則陽無以化故以溫柔濡潤之通補如地黃飲子還少丹之類是也更有風木過動中土受戕不能御其所勝如不寐不食衛疏汗泄飲食變痰治以六君玉屏風茯苓飲酸棗仁湯之屬或風陽上僭痰火阻竅神識不清則有至寶丹芳香宣竅或辛涼清上痰火法雖未備實足以補前人之未及至於審症之法有身體緩縱不收耳聾目瞀口開眼合撒手遺尿失音鼾睡此本實先撥陰陽樞紐不交與暴脫無異並非外中之風乃純虛症也故先生急用大劑參附以回陽恐純剛難受必佐陰藥以挽回萬一若肢體拘攣半身不遂口眼喎邪舌強言謇二便不爽此本體先虛風陽夾痰火壅塞以致營衛脈絡失和治法急則先用開關繼則益氣養血佐以消痰清火宣通經隧之藥氣充血盈脈絡通利則病可痊愈至於風痱風懿風痹癱瘓乃風門之兼症理亦相同案中種種治法余未能盡宣其理不過略舉大綱分類敘述以便後人觀覽余門仿此華岫云徐評凡風淫所勝之病自內經以及唐宋名家皆以辛涼甘寒為本而佐以驅風益血之藥至河間有地黃飲子之法此乃治腎虛痱症有類中風並非以此方治中風之急症乃近日諸醫遇中風之症總以人參附桂為開手第一方輕者不起重者立斃問所從來曰本之葉先生余始亦信其說果從葉氏出及閱此書乃知此翁學有淵源心思靈變與前人所論分毫不背其人參亦於病勢已退後用以培元養氣當病甚時必於驅風之藥同用其分兩亦不過幾分至錢無不中度乃今之竊附其門牆盜取其餘論者事事相反此翁有知能無痛恨而以此等邪說誣此翁以害人者對此書能無愧死肝風某內風乃身中陽氣之動變甘酸之屬宜之肝陰虛生地阿膠牡蠣炙草萸肉炭王陽挾內風上巔目昏耳鳴不寐肝經主病熟地炙炙龜甲萸肉五味磁石茯苓旱蓮草女貞子曹三二辛寒清上頭目已清則知火風由臟陰而起剛藥必不見效緩肝之急以熄風滋腎之液以驅熱治法大旨如此生地阿膠天冬元參川斛小黑豆皮陳四五操持煩勞五志陽氣挾內風上擾清空頭眩耳鳴目珠痛但身中陽化內風非發散可解非沉寒可清與六氣火風迥異用辛甘化風方法乃是補肝用意枸杞子桂圓肉歸身炙草甘菊炭女貞子陸四二肝風陽氣乘陽明之虛上冒牙肉腫痛議和陽熄風生地阿膠牡蠣天冬茯神川斛旱蓮草女貞子凌交節病變總是虛症目泛舌強脊背不舒溲淋便澀皆腎液不營肝風乃張當宗河間濁藥輕服名曰飲子熟地五錢咸蓯蓉八錢炒杞子三錢麥冬二錢雲苓一錢半川石斛三錢生沙苑一錢石菖蒲一錢遠志肉四分飲子煎法胡緩肝潤血熄風制首烏杞子歸身冬桑葉三角胡麻柏子仁茯神天冬黑穭豆皮蜜丸某高年水虧肝陽升逆無制兩脅漐漐如熱則火升面赤遇煩勞為甚宜養肝陰和陽為法九蒸何首烏四兩九蒸冬桑葉三兩徽州黑芝麻三兩小黑穭豆皮三兩巨勝子二兩即胡麻浸淡天冬去心一兩真北沙參二兩柏子仁一兩半去油云茯神二兩女貞實二兩上為末青果汁法丸早服三錢開水送張氏肝陽虛風上巔頭目不清陽明脈空腰膝酸耎議養血熄風菊花炭熟首烏牛膝炭枸杞子炭黑穭豆茯神沈沖氣左升當鎮肝攝腎肝腎陰虛地黃阿膠萸肉淡菜茯苓丁四三因縈思擾動五志之陽陽化內風變幻不已夫陽動莫制皆臟陰少藏自覺上實下虛法當介以潛之酸以收之味厚以填之偏寒偏熱烏能治情志中病熟地萸肉五味磁石茯神青鹽鱉甲膠龜版膠即溶膠為丸朱嫗心中熱辣寤煩不肯寐皆春令地氣主升肝陽隨以上擾老年五液交枯最有癇痙之慮生地阿膠生白芍天冬茯神小黑穭豆皮程氏伏暑深秋而發病從里出始如瘧狀熱氣逼迫營分經事不當期而來舌光如鏡面黯青晦而胸痞隱痛正氣大虛熱氣內閉況乎周身皆痛衛陽失和極矣先擬育陰驅熱肝風不旋不致痙厥五日中不興風波可望向安生地阿膠天冬麥冬麻仁生牡蠣金女溫邪深入營絡熱止膝骨痛甚蓋血液傷極內風欲沸所謂劇則瘛瘲痙厥至矣總是消導苦寒冀其熱止獨不慮胃汁竭肝風動乎擬柔藥緩絡熱熄風復脈湯去參姜麻仁生鱉甲湯煎藥王氏痛從腿肢筋骨上及腰腹貫於心胸若平日經來帶下其症亦至此素稟陰虧衝任奇脈空曠凡春交地中陽氣升舉虛人氣動隨升絡血失養諸氣橫逆面赤如赭飢不欲食耳失聰寤不成寐陽浮脈絡交空顯然先和陽治絡細生地生白芍生鱉甲生龜甲生虎骨糯稻根煎藥送滋腎丸一錢半又前用滋腎丸痛緩面浮跗腫血氣俱乏內風泛越經言風勝則動濕勝則腫陰虛多熱之質議先用虎潛丸每服四錢四服某五三下元水虧風木內震肝腎虛多驚恐非實熱痰火可攻劫者生地清阿膠天冬杞子菊花炭女貞實胡久病耳聾微嗆喉中不甚清爽是陰不上承陽挾內風得以上侮清空諸竅大凡肝腎宜潤宜涼龍相寧則水源生矣人參一錢秋石一分化水拌烘乾同煎鮮生地三錢阿膠一錢淡菜三錢白芍一錢茯神一錢半又陰虛液耗風動陽升雖諸恙皆減兩旬外大便不通斷勿欲速惟靜藥補潤為宜照前方去白芍加柏子仁又大便兩次頗逸全賴靜藥益陰之力第納食未旺議與胃藥人參茯神炒麥冬炙甘草生穀芽南棗又緩肝益胃人參茯神生穀芽炙甘草木瓜南棗周怒動肝風筋脹脅板喉痹阿膠天冬柏子仁牡蠣小麥吳脈弦小數形體日瘦口舌糜碎肩背掣痛肢節麻木膚腠瘙癢目眩暈耳鳴已有數年此屬操持積勞陽升內風旋動爍筋損液古謂壯火食氣皆陽氣之化先擬清血分中熱繼當養血熄其內風安靜勿勞不致痿厥陽升血熱生地元參天冬丹參犀角羚羊角連翹竹葉心丸方何首烏生白芍黑芝麻冬桑葉天冬女貞子茯神青鹽某嫗脈右虛左數營液內耗肝陽內風震動心悸眩暈少寐心營熱生地阿膠麥冬白芍小麥茯神炙草吉三五心悸盪漾頭中鳴七八年中頻發不止起居飲食如常此肝膽內風自動宜鎮靜之品佐以辛泄之味如枕中丹風陽擾神王氏驚悸微腫內風動也人參龍骨茯神五味煨姜南棗曹肝膽陽氣挾內風上騰不熄心中熱驚怖多恐進和陽鎮攝方法龜甲龍骨牡蠣茯神石菖蒲遠志又神識略安夜不得寐胸臍閒時時閃爍欲動乃內風不熄也進補心法生地丹參元參茯神棗仁遠志菖蒲天冬麥冬桔梗硃砂王氏神呆不語心熱煩躁因驚而後經水即下肉腠刺痛時微痞頭即搖肝風內動變痙厥之象血去陽升小川連黃芩阿膠牡蠣秦皮陳嫗虛風麻痹清竅阻塞風陽阻竅天麻鉤藤白蒺藜甘菊連翹桑枝包嫗右太陽痛甚牙關緊閉環口牽動咽喉如有物阻乃陽升化風肝病上犯陽絡大便欲閉議用龍薈丸每服二錢又肝風阻竅脈象模糊有外脫之危今牙關緊咽痹不納湯水雖有方藥難以通關當刮指甲末略以溫湯調灌倘得關開再議他法另以蘇合香擦牙鄭三九脈右弦頭脹耳鳴火升此肝陽上郁清竅失司細生地夏枯草石決明川斛茯神桑葉陳夏季陽氣暴升煩勞擾動致內風上阻清竅口喎舌強呵欠機竅阻痹不靈脈數舌胎忌投溫散乃司氣所致非表邪為病也絡熱竅痹犀角羚羊角鬱金菖蒲膽星鉤藤連翹橘紅竹瀝薑汁又清絡得效火風無疑忌投剛燥犀角羚羊鬱金菖蒲連翹生地元參廣皮竹瀝薑汁又脈數面赤肝風尚動宜和陽熄風鮮生地元參羚羊角連翹菖蒲根鮮銀花麥冬汪如寐舌喑面赤亮汗出未病前一日頓食麵頗多病來倉猝乃少陰腎臟陰陽不續厥陰肝風突起以致精神冒昧今七八日來聲音不出乃機竅不靈治法以固護正氣為主宣利上焦痰熱佐之若地冬養陰陰未驟生徒使壅滯在脘急則治標古有諸矣捱過十四十五日冀有轉機痰熱阻竅人參半夏茯苓石菖蒲竹瀝薑汁江左脅中動躍未平猶是肝風未熄胃津內乏無以擁護此清養陽明最要蓋胃屬腑腑強不受木火來侵病當自減與客邪速攻純虛重補迥異肝胃陰虛酸棗仁湯去川芎加人參又諸恙向安惟左脅中動躍多年時有氣升欲噫之狀肝陰不足陽震不息一時不能遽已今穀食初加乙癸同治姑緩人參茯神知母炙草硃砂染麥冬調入金箔又鮮生地麥冬硃砂拌竹葉心知母沖冷參湯席五七脈來絃動而虛望六年歲陽明脈衰厥陰內風暗旋不熄遂致胃脈不主束筋骨以利機關肝陽直上巔頂汗從陽氣泄越春月病發勞力病甚此氣愈傷陽愈動矣法當甘溫益氣攻病驅風皆劫氣傷陽是為戒律胃虛表疏人參黃耆當歸炙草冬桑葉麥冬地骨皮花粉孫氏胃虛肝風內震嘔痰咳逆頭痛眩暈肢麻汗出寒熱胃虛痰滯二陳湯加天麻鉤藤沈五六色蒼形瘦木火體質身心過動皆主火化夫吐痰沖氣乃肝膽相火犯胃過膈納食自少陽明已虛解鬱和中兩調肝胃節勞戒怒使內風勿動為上滋肝和胃枸杞子酸棗仁炒柏子仁金石斛半夏曲橘紅茯苓黃菊花膏丸梁木火體質復加鬱勃肝陰愈耗厥陽升騰頭暈目眩心悸養肝熄風一定至理近日知飢少納漾漾欲嘔胃逆不降故也先當泄木安胃為主泄肝安胃桑葉一錢鉤藤三錢遠志三分石菖蒲三分半夏曲一錢廣皮白一錢半金斛一錢半茯苓三錢又左脈弦氣撐至咽心中憒憒不知何由乃陰耗陽亢之象議養肝之體清肝之用九孔石決明一具鉤藤一兩橘紅一錢抱木茯神三錢鮮生地三錢羚羊角八分桑葉一錢半黃甘菊一錢沈年歲壯盛脘有氣瘕噯噫震動氣降乃平流痰未愈睪丸腫硬今入夜將寐少腹氣衝至心竟夕但寤不寐頭眩目花耳內風雷四肢麻痹肌腠如刺如蟲行此屬操持怒勞內損乎肝致少陽上聚為瘕厥陰下結為疝衝脈不靜脈中氣逆混擾氣燥熱化風陽交動營液日耗變亂種種總是肝風之害非攻消溫補能治惟以靜養勿加怒勞半年可望有成怒勞傷肝結疝瘕阿膠細生地天冬茯神陳小麥南棗肉王五十驚恐惱怒動肝內風陽氣沸騰脘痹咽阻筋惕肌麻皆風木過動致陽明日衰先以鎮陽熄風法驚怒動肝阿膠細生地生牡蠣川斛小麥茯神曹氏離愁菀結都系情志中自病恰逢冬溫陽氣不潛初交春令陽已勃然變化內風遊行擾絡陽但上冒陰不下吸清竅為蒙狀如中厥舌喑不言劉河間謂將息失宜火盛水衰風自內起其實陰虛陽亢為病也既不按法論病設治至驚蟄雷鳴身即汗泄春分氣暖而晝夜寤不肯寐甚至焦煩迥異於平時何一非陽氣獨激使然耶夫肝風內擾陽明最當其衝犯病中暴食以內風消爍求助於食今胃脈不復氣愈不振不司束筋骨以利機關致鼻準光亮肌肉浮腫考古人虛風首推候氏黑散務以填實腸胃空隙庶幾內風可息奈何醫者不曰清火豁痰即曰膩補或雜風藥內因之恙豈有形質可攻偏寒偏熱皆非至理風陽擾胃生牡蠣生白芍炒生地菊花炭炙甘草南棗肉大凡攻病驅邪藥以偏勝如內經咸勝苦苦勝辛之類藉其剋制以圖功耳今則情志內因致病系乎陰陽臟腑不和理偏就和宜崇生氣如天地間四時陰陽迭運萬物自有生長之妙案中曰陽冒不潛法當和陽以就陰牡蠣體沉味鹹佐以白芍之酸水生木也地黃微苦菊微辛從火炒變為苦味木生火也益以甘草大棗之甘充養陽明火生土也藥雖平衍無奇實參軒岐底蘊世皆忽略不究但執某藥治何病者多矣經云東方生風風生木木生酸酸生肝故肝為風木之臟因有相火內寄體陰用陽其性剛主動主升全賴腎水以涵之血液以濡之肺金清肅下降之令以平之中宮敦阜之土氣以培之則剛勁之質得為柔和之體遂其條達暢茂之性何病之有倘精液有虧肝陰不足血燥生熱熱則風陽上升竅絡阻塞頭目不清眩暈跌僕甚則瘛瘲痙厥矣先生治法所謂緩肝之急以熄風滋腎之液以驅熱如虎潛侯氏黑散地黃飲子滋腎丸復脈等方加減是介以潛之酸以收之厚味以填之或用清上實下之法若思慮煩勞身心過動風陽內擾則營熱心悸驚怖不寐脅中動躍治以酸棗仁湯補心丹枕中丹加減清營中之熱佐以斂攝神志若因動怒鬱勃痰火風交熾則有二陳龍薈風木過動必犯中宮則嘔吐不食法用泄肝安胃或填補陽明其他如辛甘化風甘酸化陰清金平木種種治法未能備敘然肝風一症患者甚多因古人從未以此為病名故醫家每每忽略余不辭杜撰之咎特為拈出另立一門以便後學考覈云華岫云徐評肝風即中風一類南方最多卻不必另立一門眩暈徐脈左浮弦數痰多脘中不爽煩則火升眩暈靜坐神識稍安議少陽陽明同治法痰火羚羊角連翹香豆豉廣皮白半夏曲黑山梔某痰火風在上舌乾頭眩天麻鉤藤菊花橘紅半夏曲茯苓山梔花粉某酒客中虛痰暈二陳加朮白蒺藜鉤藤天麻江五十脈絃動眩暈痰多胸痹窒塞此清陽少旋內風日沸當春地氣上升最慮風痱內風挾痰明天麻白蒺藜桂枝木半夏橘紅茯苓苡仁炙草又頭額悶脹痰多作眩外臺茯苓飲加羚羊角桂枝竹瀝薑汁法丸吳四五診脈芤弱痰多眩暈心神過勞陽升風動不可過飲助升治痰須健中熄風可緩暈九蒸白朮炒杞子白蒺藜茯苓菊花炭周內風挾痰眩暈吐出清水半夏茯苓廣皮天麻鉤藤菊花張肝風內沸劫爍津液頭暈喉舌乾涸肝風大生地天冬麥冬萸肉阿膠生白芍陳肝風動逆不熄頭暈九制首烏四兩甘菊炭一兩杞子二兩桑椹子二兩黑芝麻二兩巨勝子一兩半牛膝一兩半茯神二兩青果汁法丸洪四十內風逆頭暈經霜桑葉一錢炒黃甘菊花炭一錢生左牡蠣三錢黑穭豆皮三錢徽州黑芝麻二錢茯神一錢半某兩寸脈浮大氣火上升頭眩甚則欲嘔吐厥陰上干久則陽明失降土被木克脾胃俱傷先當鎮肝陽制首烏穭豆皮炒杞子柏子仁紫石英茯神天冬南棗某操持驚恐相火肝風上竄目跳頭暈陰弱欲遺脈左弦勁右小平生地白芍丹皮鉤藤天麻白蒺藜黃菊花橘紅王六三辛甘寒眩暈已緩此絡脈中熱陽氣變現內風上冒是根本虛在下熱化內風在上上實下虛先清標恙絡熱羚羊角元參心鮮生地連翹心鬱金石菖蒲又照前方去菖蒲鬱金加川貝花粉某二四暈厥煩勞即發此水虧不能涵木厥陽化風鼓動煩勞陽升病斯發矣據述幼年即然藥餌恐難杜絕陰虛陽升熟地四兩龜版三兩牡蠣三兩天冬一兩半萸肉二兩五味一兩茯神二兩牛膝一兩半遠志七錢靈磁石一兩田二七煩勞陽氣大動變化內風直冒清空遂為眩暈能食膚充病不在乎中上以介類沉潛真陽鹹酸之味為宜淡菜膠龜版膠阿膠熟地萸肉茯苓川斛建蓮山藥漿丸嚴四五營虛內風逆心悸頭暈營血虛炒杞子柏子仁三角胡麻川斛生左牡蠣冬桑葉李七三高年頗得納穀安寢春夏以來頭暈跗腫不能健步此上實下虛腎氣衰不主攝納肝風動清竅漸蒙大凡腎宜溫肝宜涼溫納佐涼乃復方之劑下虛附都氣加車前淡天冬建蓮丸經云諸風掉眩皆屬於肝頭為六陽之首耳目口鼻皆系清空之竅所患眩暈者非外來之邪乃肝膽之風陽上冒耳甚則有昏厥跌僕之虞其症有夾痰夾火中虛下虛治膽治胃治肝之分火盛者先生用羚羊山梔連翹花粉元參鮮生地丹皮桑葉以清泄上焦竅絡之熱此先從膽治也痰多者必理陽明消痰如竹瀝薑汁菖蒲橘紅二陳湯之類中虛則兼用人參外臺茯苓飲是也下虛者必從肝治補腎滋肝育陰潛陽鎮攝之治是也至於天麻鉤藤菊花之屬皆系熄風之品可隨症加入此症之原本之肝風當與肝風中風頭風門合而參之華岫云徐評眩暈清火養肝固為正治但陽氣上升至於身體不能自主此非浮火之比古人必用金石鎮墜之品此則先生所未及知也憶余初至郡中治病是時喜用唐人方先生見之謂人曰有吳江秀才徐某在外治病頗有心思但藥味甚雜此乃無師傳授之故以後先生得宋板外臺秘要讀之復謂人曰我前謂徐生立方無本誰知俱出外臺可知學問無窮讀書不可輕量也先生之服善如此猶見古風所謂藥味雜即指金石品也因附記於此頭風趙右偏頭痛鼻竅流涕仍不通爽咽喉疳腐寤醒肢冷汗出外邪頭風已留數月其邪混處精華氣血咸為蒙閉豈是發散清寒可解頭巔藥鉺務宜清揚當刺風池風府投藥仍以通法苟非氣血周行焉望卻除宿病暑熱上蒙清竅西瓜衣鮮蘆根苡仁通草煎送臘礬丸何四一右偏風頭痛從牙齦起木火上炎炒生地三錢蔓荊子炒一錢黃甘菊一錢茯苓一錢半炒杞子二錢冬桑葉一錢炒丹皮一錢川斛一錢半王五一中年陰中之陽已虛內風偏頭痛冷淚出陰中陽虛還少丹徐四一頭風既愈復發痛甚嘔吐不已陽明胃虛肝陽化風愈動恐有失明之憂胃虛風陽上逆炒半夏茯苓苦丁茶菊花炭炒杞子柏子霜朱五四陽明脈弦大而堅厥陰脈小弦數促面赤頭痛繞及腦後驚惕肉瞤漐漐汗出早晨小安入暮偏劇此操持怫鬱肝陽挾持內風直上巔頂木火戕胃為嘔逆陽越為面赤汗淋內因之病加以司候春深慮有暴厥瘈痙之幻夫肝為剛臟胃屬陽土姑議柔緩之法冀有陽和風熄之理復脈去參薑桂加雞子黃白芍王始用茶調散得效今宜養血和血川芎歸身白芍酒炒白蒺藜炒桑枝朱三四頭風目痛昏赤火風上郁最多及詢病有三四年遇風冷為甚其衛陽清氣久而損傷非徒清散可愈從治風先治血意杞子歸身炒白芍沙苑菊花鉤藤頭風一症有偏正之分偏者主乎少陽而風淫火鬱為多前人立法以柴胡為要藥其補瀉之間不離於此無如與之陰虛火浮氣升吸短者則厥脫之萌由是而來矣先生則另出心裁以桑葉丹皮山梔荷葉邊輕清涼泄使少陽郁遏之邪亦可倏然而解倘久則傷及肝陰參入咸涼柔鎮可也所云正者病情不一有氣虛血虛痰厥腎厥陰傷陽浮火亢邪風之不同按經設治自古分晰甚明茲不再述至於肝陰久耗內風日旋厥陽無一息之寧痛掣之勢已極此時豈區區湯散可解計惟與復脈之純甘壯水膠黃之柔婉以熄風和陽俾剛亢之威一時頓熄予用之屢效如神決不以虛諛為助邵新甫虛勞王二二此少壯精氣未旺致奇脈綱維失護經云形不足者溫之以氣精不足者補之以味今納穀如昔當以血肉充養陰虛牛骨髓羊骨髓豬骨髓茯神枸杞當歸湖蓮芡實溫三二陰虛督損六味加麋角膠秋石川石斛膏陳十七癧勞在出幼之年形脈生氣內奪冬月可延入夏難捱由真陰日消爍救陰無速功故難治兩儀煎陳二一春病至夏日漸形色消奪是天地大氣發泄真氣先傷不主內守為損怯之症不加靜養損不肯復故治嗽治熱無用交節病加尤屬虛象脈左數甚肛有漏瘍最難全好熟地炒山藥建蓮茯苓豬脊筋徐四一清金潤燥熱緩神象乃病衰成勞矣男子中年行走無力寐中咳逆溫補剛燥難投天冬生地人參茯苓白蜜黃二六陰傷勞損清阿膠雞子黃生地麥冬麻子仁炙甘草南棗某攝陰得效佐以益氣合補三陰之臟人參熟地炒杞子五味牛膝炭建蓮炒山藥芡實錢陽外泄為汗陰下注則遺二氣造偏陰虛熱勝腦為髓海腹是至陰皆陽乘於陰然陽氣有餘益見陰弱無以交戀其陽因病致偏偏久致損坐功運氣陰陽未協損不肯復頗為可慮今深秋入冬天令收肅身氣泄越入暮灼熱總是陰精損傷而為消爍耳川石斛炒知母女貞子茯神糯稻根小黑穭豆皮又暮夜熱熾陰虛何疑但從前表散致衛陽疏泄穿山甲鑽筋流利後致經絡氣血劫撒內損不復衛陽藩籬交空斯時亦可撐半壁矣失此機宜秋收冬藏主令其在封固蟄藏耳張季明謂元無所歸則熱灼亦是丸方人參河車熟地五味蓮肉山藥茯苓食後逾時服六神湯張六七有年呼氣頗和吸氣則脅中刺痛是肝腎至陰臟絡之虛初投辛酸而效兩和肝之體用耳大旨益腎當溫復入涼肝滋液忌投剛燥大熟地天冬枸杞柏子霜茯苓桂圓肉女貞子川斛蜜丸徐今年長夏久熱傷損真陰深秋天氣收肅奈身中泄越已甚吸短精濁消渴眩暈見症卻是肝腎脈由陰漸損及陽明胃絡納穀減肢無力越人所云陰傷及陽最難充復誠治病易治損難耳人參天冬生地茯神女貞遠志鍾二十少年形色衰奪見症已屬勞怯生旺之氣已少藥難奏功求醫無益食物自適者即胃喜為補扶持後天冀其久延而已魚鰾湖蓮秋石芡實金櫻子周七十脈神形色是老年衰憊無攻病成法大意血氣有情之屬栽培生氣而已每日不拘用人乳或牛乳約茶盞許燉暖入薑汁三分某女交夏潮熱口渴肌膚甲錯此屬骨蒸潮熱生鱉甲銀柴胡青蒿黃芩丹皮知母湯女天癸未至入暮寒熱此先天真陰不足為損怯延挨之病腹膨減食治在太陰厥陰熟白朮二錢生厚朴一錢當歸二錢丹皮一錢半淡黃芩一錢生鱉甲五錢此一通一補之法白朮補太陰厚朴通陽明當歸補厥陰丹皮泄少陽黃芩清氣分之熱鱉甲滋血分之熱也陳十二稚年陰虧陽亢春陽化風地升暮熱晨汗肌柔白脈數虛非客邪清解仿仲景復脈法本方去薑桂加甘蔗汁王十二稚年純陽諸陽皆聚於骨陰未充長陽未和諧凡過動煩怒等因陽驟升巔為痛熟寐痛止陽潛入陰也此非外邪常用錢氏六味丸加龜甲知母咸秋石以滋養壯陰曹十三肌肉蒼赤脈小數疾童真陰未充長囊下肛前已有漏卮陽獨升降巔竅如蒙常與壯水制火猶慮變幻損怯生六味去萸肉加生白芍黃柏知母人中白蜜丸施三二脈尺垂少藏唾痰灰黑陰水內虧陽火來乘皆損怯之萌可冀胃旺加餐耳年歲已過三旬苟能靜養百天可以充旺熟地天冬川斛茯神遠志山藥建蓮芡實秋石豬脊髓丸張勞煩夏秋氣泄而病交小雪不復元咽中微痛血無華色求源內損不藏陰中之陽不伏恐春深變病熟地炭清阿膠川斛浸白天冬秋石二分許三二陰傷及陽畏風外冷午後潮熱舌絳渴飲剛峻難進腰脊墜音啞心嘈姑與柔陽滋液首烏枸杞天冬黑穭豆皮茯神建蓮黃當純陽發泄之令辛散亂進火升咽乾氣促病根在下焦陰虛成勞最難調治熟地炒山藥五味芡實茯神湖蓮又照前方加人參宋勞損三年肉消脂涸吸氣喘促欲咳不能出聲必踞按季脅方稍有力寐醒喉中乾涸直至胸脘此五液俱竭法在不治援引人身脂膏為繼續之算莫言治病鮮河車人乳汁真秋石血餘灰吳二八遺濁已久上冬喉中哽噎醫投寒解入夏不痊緣腎陰為遺消爍龍雷不肯潛伏於冬令收藏之候反升清空之所內經以少陰之脈循喉嚨挾舌本陰質既虧五液無以上承徒有浮陽蒸灼柔嫩肺日傷為痹為宣不外陰虛陽亢但養育陰氣貴乎寧靜夫思煩嗔怒誦讀吟詠皆是動陽助熱不求諸己工夫日啖草木藥汁生氣暗傷豈曰善策然未嘗無藥也益水源之弱制火炎之熾早用六味減丹澤加阿膠秋石龜膠牡蠣湖蓮肉之屬以入下介以潛陽滋填澀固卻是至靜陰藥臥時量進補心丹寧神解熱俾上下得交經年可冀有成陰虛陽浮沈脈細澀入尺澤下元精虧龍旺火熾是口齒齦腫皆下焦之虛陽上越引火歸窟未嘗不通只以形瘦液少慮其劫陰致有瘍癰起患當預慮也虎潛去廣歸鎖陽加山藥蓯蓉青鹽羊肉膠丸安脈堅咽阻心熱得噯氣略爽腰膝耎弱精滑自遺必因驚恐傷及肝腎下虛則厥陽沖逆而上法宜鎮逆和陽繼當填下生白芍桂枝木生牡蠣龍骨茯神大棗小黑穭豆皮鄭脈數垂入尺澤穴中此陰精未充早泄陽失潛藏汗出吸短龍相內灼升騰面目肺受熏蒸嚏涕交作兼之胃弱少谷精濁下注溺管疼痛肝陽吸其腎陰善怒多郁顯然腎虛如繪議有情之屬以填精仿古滑澀互施法牛骨髓四兩羊骨髓四兩豬脊髓四兩麋角膠四兩熟地八兩人參四兩萸肉四兩五味三兩芡實四兩湖蓮四兩山藥四兩茯神四兩金櫻膏三兩膠髓丸曹二一精氣內奪冬乏收藏入夜氣衝嗆逆不得安寢皆勞怯之末傳難治人參鮮紫河車茯苓茯神五味紫衣胡桃肉姚二三脈左細右空色奪神夭聲嘶乃精傷於下氣不攝固而為咳汗勞怯重病藥難奏功用大造丸方程脈左弦搏著枕眠臥冷痰上升交子後乾咳此腎虛陽不潛伏乃虛症也從攝固引導勿驟進溫熱燥藥熟地炭生白芍山藥茯苓丹皮澤瀉車前牛膝胡桃肉蔣脈細促三五欲歇止頭垂欲俯著枕即氣衝不續此腎臟無根督脈不用虛損至此必無挽法熟地五味茯苓青鉛豬脊髓朱二九真陰久傷不復陽氣自為升降行動即覺外感皆體質失藏外衛不固矣治在少陰用固本丸之屬加入潛陽介類固本丸加淡菜秋石阿膠金二二虛症五年真陰既損不復長夏陰不生成陽擾升越巔頂而為痛脹目患不痊病根亦在肝腎與潛陽以益乙癸磁石六味加龜甲胡厥陽上衝心痛振搖消渴齒血都是下焦精損質重味厚填補空隙可冀其效熟地四兩五味二兩茯神二兩建蓮二兩芡實二兩山藥二兩人乳粉二兩秋石二兩生精羊肉膠丸早服四錢程今年厥陰司天春分地氣上升人身陽氣上舉風乃陽之化氣陰衰於下無以制伏上愈熱斯下愈寒總屬虛象故龜膠人乳皆血氣有情服之小效者非沉苦寒威也茲定鹹味入陰介類潛陽法炒熟地龜膠阿膠炒遠志炒山藥湖蓮六七日後仍進瓊玉膏減沉香蔣三五肝厥用鹹味入陰水生木體是虛症治法夏令大氣主泄因煩勞病發勢雖減於昔日而脈症仍然必靜養經年陰陽自交病可全去議介類潛陽佐酸味以斂之熟地柏子霜萸肉五味鎖陽淡菜膠海參膠真阿膠龜版膠茯苓湖蓮芡實青鹽金肝血腎精無藏陽乏依附多夢紛紜皆陽神浮越當以介屬有情填補下焦熟地淡菜阿膠萸肉小麥龍骨牡蠣又腎虛氣攻於背肝虛熱觸於心都是精血內奪神魂不主依附此重鎮以理其怯填補以實其下血肉有情皆充養身中形質即治病法程矣熟地牡蠣淡菜五味萸肉龍骨杞子吳十八診脈細數左垂尺澤先天最素薄真陰未充當精通年歲陰氣早泄使龍相刻燃津液暗消有虛怯根萌藥宜至靜純陰保養尤為要旨知柏六味去丹澤加龜甲天冬豬脊髓丸錢五十據說熱自左升直至耳前後脹視面色油亮足心灼熱每午後入暮皆然上年用茶調散宣通上焦鬱熱不應此肝腎陰火乘竅卻因男子精虧陽不下交經言以滋填陰藥必佐介屬重鎮試以安寢竟夜乃安參陽動陰靜至理熟地龜版萸肉五味茯苓磁石黃柏知母豬脊髓丸顧二二陰精下損虛火上炎脊腰髀痠痛髓空斯督帶諸脈不用法當填髓充液莫以見熱投涼熟地水煮杞子魚膠五味茯神山藥湖蓮芡實金櫻膏為丸陳二十喉痹目珠痛吸氣短促曾咯血遺精皆陰不內守孤陽上越諸竅當填下和陽熟地枸杞炭旱蓮草菊花炭女貞茯苓某三二心煩不寧目彩無光少陰腎水枯槁厥陽上越不潛議用填陰潛陽人參一錢半熟地五錢天冬一錢麥冬三錢茯神三錢龜版一兩某女渴不欲飲陰不上承況寐醒神識不靜易驚汗出法當斂補人參熟地炭萸肉炭茯神五味炒遠志邵精血傷氣不潛納陽浮擾神則魂魄不寧臟陰不安其位人參炙草建蓮茯神龍骨金箔盧有形血液從破傷而損神氣無以擁護當此冬令藏陽陽微畏寒奇脈少津乏氣貫布行步欹斜健忘若憒何一非精氣內奪之徵將交大雪純陰無陽冬至一陽來復也見此離散之態平素不受暖補是氣元長旺今乃精衰氣竭之象又不拘乎此例也陽虛人參鹿茸歸身炒杞子茯苓沙苑馬陰精走泄於下陽氣鬱冒於上太衝脈衰厥氣上衝陡然癇厥陰陽既失交偶內隨陽掀旋陽從汗泄矣宜遠房幃獨居靜室醫治之法從陰引陽從陽引陰大封大固以蟄藏為要百日可效經年可以復元淡蓯蓉五味遠志茯神芡實建蓮生羊腰子孫四二形軀豐溢脈來微小乃陽氣不足體質理煩治劇曲運神機都是傷陽之助溫養有情栽培生氣即古聖春夏養陽不與逐邪攻病同例用青囊斑龍丸某二十少壯形神憔悴身體前後牽掣不舒此奇經脈海乏氣少陰腎病何疑淡蓯蓉甘枸杞當歸牛膝沙苑茯苓某陰陽二氣不振春初進八味減桂之辛益以味芍之酸從陽引陰兼以歸脾守補其營方得效驗茲當春升夏令裡虛藏聚未固升泄主令必加煩倦古人謂寒則傷形熱則傷氣是當以益氣為主通攝下焦兼之仿內經春夏養陽秋冬養陰為法非治病也乃論體耳夏季早服青囊斑龍丸方法鹿茸鹿角霜鹿角膠赤白茯苓熟地蓯蓉補骨脂五味子晚服歸脾去木香加枸杞子王氏凡女科書首篇必論調經既嫁必究孕育結褵十載未能得胎病在至陰之臟延及奇經八脈述經遲晨泄心若搖漾得食姑緩肛瘍久漏都屬下損人參麋茸紫石英茯苓當歸補骨脂棗艾湯泛丸汪氏女科首列調經今經不調和耳鳴心漾汗出畏恐神痹兩足皆冷兼浮腫冬至節交病甚於前都因肝腎內怯陽不交陰所至薛氏加減八味丸淡鹽湯送三錢萬二七診脈數左略大右腰牽絆足痿五更盜汗即醒有夢情欲則遺自病半年脊椎六七節骨形凸出自述書齋坐臥受濕若六淫致病新邪自解驗色脈推病是先天稟賦原怯未經充旺肝血腎精受戕致奇經八脈中乏運用之力乃筋骨間病內應精血之損傷也人參一錢鹿茸二錢杞子炒黑三錢當歸一錢舶茴香炒黑一錢紫衣胡桃肉二枚生雄羊內腎二枚夫精血皆有形以草木無情之物為補益聲氣必不相應桂附剛愎氣質雄烈精血主臟臟體屬陰剛則愈劫脂矣至於丹溪虎潛法潛陽堅陰用知柏苦寒沉著未通奇脈余以柔劑陽藥通奇脈不滯且血肉有情栽培身內之精血但王道無近功多用自有益朱三六辛溫咸潤乃柔劑通藥謂腎惡燥也服有小效是勞傷腎真而八脈皆以廢弛失職議進升陽法陽虛奇脈兼病鹿茸蓯蓉歸身杞子柏子仁杜仲菟絲子沙苑範二一父母弱症早喪稟質不克充旺年二十歲未娶見病已是損怯此寒熱遇勞而發即內經陽維脈衰不司維續護衛包舉下部無力有形精血不得充涵筋骨矣且下元之損必累八脈此醫藥徒補無用鹿茸杞子歸身巴戟沙苑茯苓舶茴香羊肉膠丸施沖氣貫脅上咽形體日漸枯槁此勞傷肝腎而成損怯由乎精氣不生厥氣上逆耳議以通陽攝陰冀其漸引漸收非見病治病之方法矣陰陽並虛蓯蓉熟地五味枸杞柏子霜茯苓桑椹子砂仁青鹽羊肉膠丸王三十陽虛背寒肢冷陰虛火升煩驚宿病偏傷不復總在虛損一門鎮攝之補宜商早用薛氏八味丸晚歸脾去耆木香某肝腎損傷八脈無氣未老衰憊大著姑議通陽守陰一法俟明眼裁之淡蓯蓉熟地炭鹿角霜五味子肉柏子仁茯苓王二九搖精驚恐肝腎臟陰大泄陽不附和陰中百脈之氣自足至巔起自湧泉以少陰之脈始此欲使陰陽翕闔譬諸招集潰散卒伍所謂用藥如用兵熟地枸杞當歸五味遠志龜版鹿鞭羊肉某脈虛細夜熱晨寒煩倦口渴汗出臟液已虧當春氣外泄宗內經凡元氣有傷當與甘藥之例陰虛者用復脈湯炙甘草七分人參一錢阿膠二錢火麻仁一錢生地二錢麥冬一錢桂枝三分生白芍一錢半某二四陰傷及陽加以春夏大地陽氣主泄真無內聚形神痿靡大凡熱必傷氣固氣正以迎夏至一陰來復人參熟地五味炒山藥芡實建蓮張二四臟陰久虧八脈無力是久損不復況中脘微痛臍中動氣決非滋膩涼藥可服仿大建中之制溫養元真壯其奇脈為通納方法人參生於術炙草茯苓熟地淡蓯蓉歸身白芍真潯桂枸杞五味蜜丸服四錢許十九善嗔食減無味大便溏瀉三年久病內傷何疑但清內熱潤肺理嗽總是妨礙脾胃思人身病損必先陰陽致偏是太陰脾臟日削自然少陽膽木來侮宗內經補臟通腑一法四君子加桑葉炒丹皮又虛勞三年形神大衰食減無味大便溏瀉寒起背肢熱從心熾每咳必百脈動掣間或脅肋攻觸種種見症都是病深傳遍前議四君子湯以養脾胃沖和加入桑葉丹皮和少陽木火使土少侵服已不應想人身中二氣致偏則病今脈症乃損傷已極草木焉得振頓見病治病諒無禆益益氣少靈理從營議食少滑泄非滋膩所宜暫用景岳理陰煎法參入鎮逆固攝若不胃蘇知味實難擬法又人參秋石山藥茯苓河車膠丸張汗多亡陽是醫人不知勞倦受寒病兼內傷但以風寒外感發散致誤淹淹半年乃病傷不復能食者以氣血兼補人參白朮茯苓沙苑蓯蓉歸身枸杞張十九陰傷成勞因減食便溏寒熱姑從中治者以脾為營胃主衛也異功加五味子吳三六虛損至食減腹痛便溏中宮後天為急不必泥乎痰嗽縷治異功散去朮加炒白芍煨益智仁楊氏背寒心熱胃弱少餐經期仍至此屬上損上損及胃生地茯神炒麥冬生扁豆生甘草仲久嗽神衰肉消是因勞倦內傷醫不分自上自下損傷但以苦寒沉降氣泄汗淋液耗夜熱胃口得苦傷殘食物從此頓減老勞纏綿詎能易安用建中法黃耆建中湯去姜又照前方加五味子又平補足三陰法人參炒山藥熟地五味女貞子炒黑杞子時二十脈細屬臟陰之損平素畏寒怯冷少年陽氣未得充長夏令暴瀉是時令濕熱未必遽然虛損若此今谷減形瘦步履頓加喘息勞怯顯然當理脾腎下損及中早服加減八味丸晚服異功散某由陰損及乎陽寒熱互起當調營衛參耆建中湯去薑糖某入夏發泄主令由下損以及中焦減谷形衰陰傷及陽畏冷至下春季進河車羊肉溫養固髓方法積損難充不禁時令之泄越耳古人減食久虛必須胃藥晚進參朮膏早用封固佐升陽法長夏不復奈何鹿茸生研一兩鹿角霜一兩熟地二兩生菟絲子一兩人參一兩茯苓一兩韭子二兩補骨脂胡桃蒸一兩枸杞子一兩柏子霜一兩蜜丸早服四錢參湯送參朮膏方人參四兩另用泉水熬九蒸於朮四兩另用泉水熬各熬膏成以炭火厚掩干灰將藥罐燉收至極老為度每用膏二錢五分開水化服李二九勞怯形色奪肌肉消食減便滑兼痰嗆喉痛知醫理者再無清咽涼肺滋陰矣病人述心事操持病加顯然內損關係臟真冬寒藏陽人身之陽升騰失交收藏失司豈見病治病膚淺之見識據說食進逾時必有痛瀉經言食至小腸變化屈曲腸間有阻常有諸矣凡湯藥氣升宜丸劑疏補資生丸食後服脾腎兼虛晨服人參坎炁茯苓黑殼建蓮五味芡實山藥漿丸楊發墮於少壯之年能食不化噫氣小溲淋濁便糞漸細少年脾腎損傷宜暖下焦以醒中陽濟生丸三錢開水送下陳十八陰損於下中焦運陽亦弱見症少年損怯先天不充以後天維續但食少難化膩滯勿用由陰損及陽用雙補丸某久勞食減便溏不爽氣短促異功加五味子王二四脈如數垂入尺澤病起肝腎下損廷及脾胃昔秦越人云自下焦損傷過中焦則難治知有形精血難復急培無形之氣為旨食少便溏與錢氏異功散蔡久嗽氣浮至於減食泄瀉顯然元氣損傷若清降消痰益損真氣大旨培脾胃以資運納暖腎臟以助冬藏不失帶病延年之算異功散兼服熟地炭茯神炒黑枸杞五味建蓮肉炒黑遠志山藥粉丸早上服葉三一病損不復八脈空虛不時寒熱間或便溏雖步履飲食如常周身氣機尚未得雍和倘調攝失慎慮其反復前丸藥仍進煎方宗脾腎雙補法人參一錢茯苓三錢廣皮一錢炒沙苑一錢益智仁煨研一錢炒菟絲餅二錢華二八勞損加以煩勞肉消形脫潮熱不息胃倒泄瀉沖氣上攻則嘔當此發泄主令難望久延胃虛嘔瀉人參訶子皮赤石脂蒸熟烏梅肉新會皮炒白粳米呂沖年久坐誦讀五志之陽多升咽乾內熱真陰未能自旺於本宮診脈寸口動數怕有見紅之慮此甘寒緩熱為穩不致胃枯耳陰虛陽浮兼胃陰虛生地天冬女貞茯神炙草糯稻根鬚杜二一陰精久損投以填納溫潤入夏至晚火升食物少減仍屬陰虧但夏三月必佐胃藥參鬚麥冬五味茯神建蓮芡實許脈左堅上下直行精損熱自升降細生地玄參心女貞川斛糯稻根鬚又甜北沙參天冬炒麥冬茯神阿膠秋石又人參麥冬生甘草扁豆胡四三補三陰臟陰是迎夏至生陰而暈逆欲嘔吐痰全是厥陽犯胃上巔必靜養可制陽光之動久損重虛用甘緩方法金匱麥門冬湯去半夏王春半寐則盜汗陰虛當春陽發泄胃口弱極六黃苦味未宜用甘酸化陰法人參熟地五味炙草湖蓮茯神某二一誦讀身靜心動最易耗氣損營心脾偏多不時神煩心悸頭眩脘悶故有自來也調養溉灌營陰俾陽不升越恐擾動絡血耳營虛淮小麥三錢南棗肉一枚炒白芍一錢柏子仁一錢半茯神三錢炙草四分某四十脈弦脅痛引及背部食減此屬營損傳勞桂枝木四分生白芍一錢半炙草四分歸身一錢半茯神三錢生牡蠣三錢煨姜一錢南棗三錢某三十脈耎不嗜食腰痠無力咳煩勞營虛所致當歸生白芍桂枝木茯苓炙草飴糖煨姜南棗汪脈左小右虛背微寒肢微冷痰多微嘔食減不甘此胃陽已弱衛氣不得擁護時作微寒微熱之狀小便短赤大便微溏非實邪矣當建立中氣以維營衛東垣云骨為衛之本營乃脾之源偏熱偏寒猶非正治人參歸身米拌炒桂枝木白芍炒焦南棗陸勞傷陽氣不肯復元秋冬之交余宗東垣甘溫為法原得小效眾楚交咻柴葛枳樸是餌二氣散越交紐失固閃氣疼痛脘中痞結皆清陽凋喪無攻痛成法唯以和補使營衛之行冀其少緩神蘇而已人參當歸炒白芍桂心炙草茯神又右脈濡來去澀辛甘化陽用大建中湯人參桂心歸身川椒茯苓炙草白芍飴糖南棗汪勞倦陽傷形寒骨熱脈來小弱非有質滯著與和營方當歸酒炒白芍炙草廣皮煨姜大棗程脈左甚倍右病君相上亢莫制都因操持勞思所傷若不山林靜養日藥不能卻病勞傷心神鮮生地玄參心天冬丹參茯神鮮蓮肉顏三四操持思慮心營受病加以勞力泄氣痰帶血出脈形虛小右部帶弦議用歸脾湯減桂圓木香白朮加炒白芍炒麥冬又勞心營液既耗氣分之熱自灼手足心熱咽乾煩渴多是精液之損非有餘客熱前議歸脾加減乃子母同治法今以滋清制亢之劑理心之用以復五液人參生地天冬麥冬丹參茯神燈心竹葉心某神傷精敗心腎不交上下交損當治其中中虛參朮膏米飲湯調送華三七春深地氣升陽氣動有奔馳飢飽即是勞傷內經勞者溫之夫勞則形體震動陽氣先傷此溫字乃溫養之義非溫熱競進之謂勞傷久不復元為損內經有損者益之之文益者補益也凡補藥氣皆溫味皆甘培生生初陽是勞損主治法則春病入秋不愈議從中治據述晨起未納水穀其咳必甚胃藥坐鎮中宮為宜金匱麥門冬湯去半夏徐二七虛損四年肛瘍成漏食物已減什三形瘦色黃當以甘溫培中固下斷斷不可清熱理嗽人參茯苓山藥炙草芡實蓮肉某積勞神困食減五心熱汗出是元氣虛陰火盛宜補中生脈四君子湯楊二八內損陰及陽分即為勞怯胃弱少納當以建中湯加人參朱二七既暮身熱汗出早涼仍任勞辦事食減半色脈形肉不足病屬內損勞怯人參小建中湯楊三二知飢減食外寒忽然久病行走喘促坐臥稍安此勞傷不復議從中以益營衛九蒸冬朮炙甘草煨姜南棗汪三九此勞力傷陽之勞非酒色傷陽之勞也胃口消憊生氣日奪豈治嗽藥可以奏功黃耆建中湯去姜仲三八久勞內損初春已有汗出入夏食減皆身中不耐大氣泄越右脈空大色痿黃衰極難復無卻病方法議封固一法人參黃耆熟於朮五味嚴二八脈小右弦久嗽晡熱著左眠稍適二氣已偏即是損怯無逐邪方法清泄莫進當與甘緩黃耆建中去姜又建中法頗安理必益氣以止寒熱人參黃耆焦術炙草歸身廣皮白煨升麻煨柴胡王二六脈大而空亡血失精午食不運入暮反脹陰傷已及陽位纏綿反復至矣歸芍異功散劉女年十六天癸不至頸項癭痰入夏寒熱咳嗽乃先天稟薄生氣不來夏令發泄致病真氣不肯收藏病屬勞怯不治戊己湯去白朮某陽傷背寒胃傷谷減小建中湯某畏風面冷衛外陽微參耆建中去姜加茯神華二十此勞怯損傷不復之病已經食減便溏欲嘔腹痛二氣交傷然後天為急舍仲景建中法都是盲醫矣建中湯去糖加人參尹四九中年衰頹身動喘嗽脈細無神食減過半乃下元不主納氣五液蒸變黏涎未老先衰即是勞病腎氣不納人參坎炁紫衣胡桃炒菟絲子茯苓五味炒砂仁山藥漿丸金七十寤則心悸步履如臨險阻子後沖氣上逆此皆高年下焦空虛腎氣不納所致八味丸三錢先服四日淡蓯蓉一兩河車膠一具紫石英二兩小茴五錢杞子三兩胡桃肉二兩牛膝一兩半五味一兩茯苓二兩沙苑一兩半補骨脂一兩桑椹子二兩紅棗肉丸王久客勞傷氣分痹阻則上焦清空諸竅不利初病在氣久則入血身痛目黃食減形瘦由病患及乎元虛攻補未能除病思人身左升屬肝右降屬肺當兩和氣血使升降得宜若再延挨必瘀滯日甚結為腑聚矣氣血滯升降阻旋覆花湯加桃仁歸鬚蔞皮郁氏失血咳嗽繼而暮熱不止經水仍來六七年已不孕育乃肝腎衝任皆損二氣不交延為勞怯治以攝固包舉其泄越肝腎衝任皆虛鮮河車膠黃柏熟地淡蓯蓉五味茯神蜜丸屠二八勞力傷陽延三年損傷延及中宮狀如反胃諸氣欹斜交會失序遂有寒熱脫力損傷脾胃牛屬坤土當以霞天膏勞力傷脾胃朱十二奔走之勞最傷陽氣能食不充肌膚四肢常自寒冷乃經脈之氣不得貫串於四末有童損之憂勞動傷經脈蓯蓉二兩當歸二兩杞子一兩茯苓二兩川芎五錢沙苑五錢黃鱔一條為丸邢四四努力傷身痛無力歸桂枝湯去姜加五加皮虛損之症經義最詳其名不一考內經論五臟之損治各不同越人有上損從陽下損從陰之議其於針砭所莫治者調以甘藥金匱遵之而立建中湯急建其中氣俾飲食增而津血旺以致充血生精而復其真元之不足但用稼穡作甘之本味而酸辛鹹苦在所不用蓋舍此別無良法可醫然但能治上焦陽分之損不足以培下焦真陰之本也賴先生引伸三才固本天真大造桂枝龍骨牡蠣復脈等湯以及固攝諸方平補足三陰法為兼治五臟一切之虛而大開後人聾聵可為損症之一助也夫金匱又云男子脈大為勞極虛亦為勞夫脈大為氣分泄越思慮鬱結心脾營損於上中而營分萎頓是歸脾建中養營四君五味異功等湯之所宜也脈極虛亦為勞為精血內奪肝腎陰不自立是六味八味天真大造三才固本復脈等湯以及平補足三陰固攝諸法所宜也然仲景以後英賢輩出豈無闡揚幽隱之人而先生以上又豈無高明好學之輩然欲舍仲景先生之法而能治虛勞者不少概見即如東垣丹溪輩素稱前代名醫其於損不肯復者每以參朮為主有用及數斤者其意謂有形精血難復急培無形之氣為要旨亦即仲景建中諸湯而擴充者也又厥後張景岳以命門陰分不足是為陰中之陰虛以左歸飲左歸丸為主命門陽分不足者為陰中之陽虛以右歸飲右歸丸為主亦不外先生所用三才固本天真大造等湯以及平補足三陰固攝諸法而又別無所見也故後人稱仲景先生善治虛勞者得其旨矣鄒滋九久虛不復謂之損損極不復謂之勞此虛勞損三者相繼而成也參其致病之由原非一種所現之候難以縷析大凡因煩勞傷氣者先生用治上治中所以有甘涼補肺胃之清津柔劑養心脾之營液或甘溫氣味建立中宮不使二炁日偏營衛得循行之義又因縱欲傷精者當治下而兼治八脈又須知填補精血精氣之分益火滋陰之異或靜攝任陰溫理奇陽之妙處若因他症失調蔓延而致者當認明原委隨其機勢而調之揣先生之用意以分其體質之陰陽為要領上中下見症為著想傳變至先後天為生死斷訣若逐節推求一一有根荄可考非泛泛然而湊用幾味補藥漫言為治也邵新甫徐評此老治虛勞之法不外清肺養胃滋腎雖無大害而毫無意義輕者可愈重者病日增而已至其所遵仲景之法又大失先賢本旨當時仲景之所謂虛勞者乃虛寒之症故其脈浮大芤遲又方中用飴糖乃因腹中痛而設今日之所謂虛勞乃陰竭而浮火上炎脈皆細數與建中湯正相反乃亦以此為治此所謂耳食之學也余曾目睹此老治陰虛火升之人與建中而變喉痹血冒者不下數人當時此老竟不悟也故附記於此
