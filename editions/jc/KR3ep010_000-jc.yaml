body:
  text: 附錄案中所用諸方開載於後以便初學之士查閱桂枝湯桂枝白芍炙草生薑大棗桂枝加附子湯即桂枝湯加附子苓桂朮甘湯茯苓白朮桂枝炙草小建中湯白芍桂枝炙草生薑大棗飴糖桂枝去芍藥加蜀漆龍骨牡蠣救逆湯桂枝炙草生薑大棗蜀漆龍骨牡蠣生薑瀉心湯生薑乾薑半夏黃芩黃連甘草人參大棗甘草瀉心湯甘草乾薑半夏黃芩黃連大棗半夏瀉心湯半夏黃芩黃連人參炙草乾薑大棗附子瀉心湯附子黃芩黃連大黃黃芩湯黃芩白芍甘草大棗黃連阿膠湯黃芩黃連白芍阿膠雞子黃旋覆花代赭石湯旋覆花代赭石人參半夏甘草生薑大棗炙甘草湯又名復脈湯炙草桂枝人參麻仁生地阿膠麥冬生薑大棗烏梅丸烏梅人參當歸黃連黃柏桂枝乾薑蜀椒附子細辛白虎湯石膏知母甘草粳米白虎加人參湯即白虎湯加人參竹葉石膏湯竹葉石膏人參麥冬半夏甘草粳米白頭翁湯白頭翁秦皮黃連黃柏大黃黃連瀉心湯大黃黃連豬膚湯豬膚白蜜白粉四逆湯甘草乾薑附子人參四逆湯即四逆湯加人參通脈四逆湯即四逆湯加蔥白更有隨症加法通脈四逆加豬膽汁湯即通脈四逆湯加豬膽汁白通湯蔥白乾薑附子白通加豬膽汁湯即白通湯加豬膽汁人尿朮附湯白朮附子甘草生薑大棗桂枝附子湯桂枝附子甘草生薑大棗理中湯丸同人參甘草白朮乾薑吳茱萸湯吳茱萸人參生薑大棗真武湯茯苓白芍白朮附子生薑桃花湯赤石脂乾薑粳米麻黃杏仁甘草石膏湯麻黃杏仁甘草石膏小青龍湯麻黃桂枝白芍乾薑細辛五味子甘草半夏梔子豉湯梔子香豉桃仁承氣湯桃仁桂枝大黃芒硝甘草四逆散柴胡枳實白芍甘草白散桔梗貝母巴豆五苓散豬苓茯苓澤瀉白朮桂枝豬苓湯豬苓茯苓澤瀉阿膠滑石牡蠣澤瀉散牡蠣澤瀉海藻蜀漆葶藶商陸根栝蔞根上仲景傷寒中方鱉甲煎丸鱉甲烏扇黃芩柴胡鼠婦乾薑大黃芍藥桂枝葶藶石葦厚朴丹皮瞿麥紫威半夏人參䗪蟲阿膠蜂窠赤硝蜣螂桃仁煅灶下灰清酒千金方有海藻大戟無鼠婦赤硝白虎加桂枝湯即白虎湯加桂枝崔氏八味丸乾地黃山茱萸山藥丹皮茯苓澤瀉附子桂枝桂枝加龍骨牡蠣湯即桂枝湯加龍骨牡蠣酸棗仁湯棗仁甘草知母茯苓川芎黃耆建中湯即小建中湯加黃耆皂莢丸皂莢蜜丸棗膏湯送麥門冬湯麥冬半夏人參甘草大棗粳米葶藶大棗瀉肺湯葶藶大棗千金葦莖湯葦莖苡仁桃仁瓜瓣栝蔞薤白白酒湯栝蔞實薤白白酒赤石脂丸蜀椒烏頭附子炮姜赤石脂附子粳米湯附子半夏甘草粳米大棗當歸生薑羊肉湯當歸生薑羊肉甘遂半夏湯甘遂半夏芍藥甘草一本無木防己湯木防己石膏桂枝人參小半夏湯半夏生薑外臺茯苓飲茯苓人參白朮枳實橘皮生薑桂苓五味甘草湯桂枝茯苓五味甘草越婢湯麻黃石膏甘草生薑大棗防己茯苓湯防己黃耆桂枝茯苓甘草大半夏湯半夏人參白蜜大黃牡丹湯大黃丹皮桃仁瓜子芒硝當歸建中湯即小建中湯加當歸甘草小麥大棗湯甘草小麥大棗旋覆花湯旋覆花蔥新絳腎氣丸與崔氏八味丸同上金匱要略中方六味地黃丸即八味去桂附煎服名六味地黃湯都氣丸即六味丸加北味再加附子名附都氣丸還少丹熟地山藥牛膝枸杞山萸茯苓杜仲遠志五味子楮實小茴巴戟蓯蓉石菖蒲丹溪滋陰大補丸即還少丹去楮實黑地黃丸蒼朮熟地五味乾薑虎潛丸熟地虎脛骨龜板黃柏知母瑣陽當歸牛膝白芍陳皮羯羊肉天真丸精羊肉肉蓯蓉山藥當歸天冬黃耆人參白朮三才湯天冬熟地人參大造丸紫河車龜板人參熟地天冬麥冬黃柏牛膝杜仲人參固本丸人參天冬麥冬生地熟地補心丸生地人參元參丹參棗仁遠志茯神柏子仁天冬麥冬當歸五味桔梗石菖蒲辰砂枕中丹龍骨龜板遠志菖蒲大補陰丸黃柏知母熟地龜板豬脊髓滋腎丸黃柏知母肉桂斑龍丸鹿角膠鹿角霜熟地菟絲子柏子仁玉真丸硫黃硝石石膏半夏薑汁糊丸來復丹玄精石硫黃硝石五靈脂青皮陳皮半硫丸半夏硫黃黑錫丹黑鉛硫黃二至丸冬青子旱蓮草參苓白朮散人參茯苓白朮甘草山藥扁豆苡仁建蓮砂仁桔梗陳皮玉屏風散黃耆防風白朮四君子湯人參茯苓白朮甘草六君子湯即四君子加陳皮半夏異功散即四君子湯加陳皮四獸飲即六君子湯加烏梅草果生薑大棗六神散即四君子湯加山藥扁豆薑棗煎補中益氣湯人參黃耆白朮甘草陳皮當歸升麻柴胡生薑大棗三拗湯麻黃杏仁甘草蔥豉湯蔥白淡豆豉川芎茶調散川芎薄荷荊芥羌活白芷甘草防風細辛為末茶調服霞天膏牛肉熬膏加面防風通聖散防風荊芥麻黃連翹薄荷川芎當歸白芍白朮山梔大黃芒硝黃芩石膏桔梗甘草滑石姜蔥溫膽湯陳皮半夏茯苓甘草枳實竹茹十味溫膽湯即溫膽湯加人參遠志棗仁熟地逍遙散柴胡當歸白芍白朮茯苓甘草煨姜薄荷本方加丹皮山梔名加味逍遙散六和湯砂仁藿香厚朴杏仁半夏扁豆木瓜人參赤茯苓白朮甘草姜棗藿香正氣散藿香紫蘇白芷大腹皮茯苓白朮陳皮半夏曲厚朴桔梗甘草姜棗駐車丸黃連阿膠乾薑當歸越鞠丸香附蒼朮川芎神麯山梔四物湯生地當歸白芍川芎張子和玉燭散歸尾生地川芎赤芍大黃芒硝甘草歸脾湯人參白朮茯神棗仁龍眼肉黃耆當歸遠志木香炙草生薑大棗人參養榮湯人參茯苓白朮甘草當歸白芍熟地黃耆肉桂五味遠志陳皮加薑棗犀角地黃湯犀角生地白芍丹皮地黃飲子熟地巴戟山萸蓯蓉附子官桂石斛茯苓菖蒲遠志麥冬五味活絡丹川烏草烏膽星地龍乳香沒藥附子理中湯即理中湯加附子理中安蛔丸即理中湯去甘草加茯苓川椒烏梅連理湯即理中湯加黃連茯苓治中湯即理中湯加青皮陳皮四神丸破故紙五味